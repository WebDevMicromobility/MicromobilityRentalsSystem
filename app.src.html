}

async function saveSessionEdit(){
  const oldId=S.editSessionId;
  const sess=allSessions().find(s=>s.id===oldId);if(!sess)return;
  const newDate=S.editSessDate||oldId;
  const esStart=S.editSessStartTime||document.getElementById('es-start')?.value||'21:00';
  const esEnd=S.editSessEndTime||document.getElementById('es-end')?.value||'23:00';
  const timeVal=`${esStart} - ${esEnd}`;
  let slots,total;
  if(S.editSessMode==='counts'){
    const ts=S.editSessTypeSizes||{};
    const sizes=['XS','S','M','L'];
    total=['Road','Hybrid','Mountain'].reduce((sum,ty)=>sum+sizes.reduce((s,sz)=>s+(ts[ty]?.[sz]||0),0),0);
    if(total===0){toast(t('errAddBikeToSession'),'error');return;}
    slots={_time:timeVal};
    ['Road','Hybrid','Mountain'].forEach(ty=>{
      const rowTot=sizes.reduce((s,sz)=>s+(ts[ty]?.[sz]||0),0);
      if(rowTot>0)slots[ty]=ts[ty];
    });
  }else{
    const assignedIds=S.editSessAssignedIds;
    if(assignedIds.length===0){toast(t('errAddBikeToSession'),'error');return;}
    const allBk=getBikes();
    const typeCounts={};
    assignedIds.forEach(id=>{const b=allBk.find(x=>x.id===id);if(b)typeCounts[b.type]=(typeCounts[b.type]||0)+1;});
    slots={_bikes:assignedIds,...typeCounts,_time:timeVal};
    total=assignedIds.length;
  }
  const newStatus=S.editSessStatus||sess.status;
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const newDay=dayNames[new Date(newDate+'T00:00:00').getDay()];

  
  const prevSlots=sess.bike_slots;const prevCap=sess.capacity;
  const prevStatus=sess.status;const prevDate=sess.session_date||sess.id;const prevDay=sess.day;

  try{
    if(newDate!==oldId){
      
      const existing=allSessions().find(s=>s.id===newDate&&s.id!==oldId);
      if(existing){toast(t('errDateExists'),'error');return;}
      await sb.from('sessions').insert({
        id:newDate,day:newDay,session_date:newDate,capacity:total,
        status:newStatus,created_at:sess.created_at||new Date().toISOString(),
        bike_slots:JSON.stringify(slots)
      });
      
      await sb.from('queue_entries').update({
        session_id:newDate,session_date:newDate,session_day:newDay
      }).eq('session_id',oldId);
      await sb.from('sessions').delete().eq('id',oldId);
    } else {
      await sb.from('sessions').update({
        day:newDay,session_date:newDate,capacity:total,
        status:newStatus,bike_slots:JSON.stringify(slots)
      }).eq('id',oldId);
    }
    // Persist offered add-ons separately so a missing column can't block the save (always written so removals stick)
    {try{await sb.from('sessions').update({addons:JSON.stringify(S.editSessAddons||[])}).eq('id',newDate);}catch(e){}}
    await loadData();
    const displayDate=shortDate(newDate);
    toast(t('toastSessionUpdated').replace('{0}',displayDate));
    pushUndo(`${t('undoEditSession')} ${displayDate}`,async()=>{
      const currentId=newDate!==oldId?newDate:oldId;
      if(newDate!==oldId){
        
        await sb.from('sessions').insert({
          id:oldId,day:prevDay,session_date:prevDate,capacity:prevCap,
          status:prevStatus,created_at:sess.created_at||new Date().toISOString(),
          bike_slots:prevSlots||null
        });
        await sb.from('queue_entries').update({
          session_id:oldId,session_date:prevDate,session_day:prevDay
        }).eq('session_id',currentId);
        await sb.from('sessions').delete().eq('id',currentId);
      } else {
        await sb.from('sessions').update({
          day:prevDay,session_date:prevDate,capacity:prevCap,
          status:prevStatus,bike_slots:prevSlots||null
        }).eq('id',oldId);
      }
      await loadData();renderSessions();renderStaffQueue();
    });
    S.editSessionId=null;S.editSessTypeSizes={Road:{XS:0,S:0,M:0,L:0},Hybrid:{XS:0,S:0,M:0,L:0},Mountain:{XS:0,S:0,M:0,L:0}};
    renderSessions();renderStaffQueue();
  }catch(e){toast(t('errServerError'),'error');console.error(e);}
}

async function addSession(){
  const date=document.getElementById('ns-date')?.value;
  if(!date){toast(t('errPickDate'),'error');return;}
  const startEl=document.getElementById('ns-start');const endEl=document.getElementById('ns-end');
  const startT=startEl?startEl.value:'09:00';const endT=endEl?endEl.value:'11:00';
  const timeVal=`${startT} - ${endT}`;
  let slots,total;
  if(S.newSessMode==='counts'){
    
    const ts=S.newSessTypeSizes||{};
    const sizes=['XS','S','M','L'];
    total=['Road','Hybrid','Mountain'].reduce((sum,ty)=>sum+sizes.reduce((s,sz)=>s+(ts[ty]?.[sz]||0),0),0);
    if(total===0){toast(t('errAddBikeToSession'),'error');return;}
    slots={_time:timeVal};
    ['Road','Hybrid','Mountain'].forEach(ty=>{
      const rowTot=sizes.reduce((s,sz)=>s+(ts[ty]?.[sz]||0),0);
      if(rowTot>0){
        slots[ty]=ts[ty]; 
      }
    });
  }else{
    const assignedIds=S.newSessAssignedIds;
    if(assignedIds.length===0){toast(t('errAddBikeToSession'),'error');return;}
    const allBk=getBikes();
    const typeCounts={};
    assignedIds.forEach(id=>{const b=allBk.find(x=>x.id===id);if(b)typeCounts[b.type]=(typeCounts[b.type]||0)+1;});
    slots={_bikes:assignedIds,...typeCounts,_time:timeVal};
    total=assignedIds.length;
  }
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const weeks=Math.max(1,Math.min(12,parseInt(document.getElementById('ns-repeat')?.value||'1')||1));
  // Build one session per week (same weekday/time/config), skipping dates that already exist
  const base=new Date(date+'T00:00:00');
  const _iso=dt=>`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  const sessLocation=(document.getElementById('ns-location')?.value||S.newSessLocation||(S.bkLocations&&S.bkLocations[0])||'').trim();
  // id = date + branch slug: the plain-date id made the SECOND branch's session on the same
  // date collide (23505) and silently report "date exists". Same date+branch still skips.
  const _locSlug=sessLocation?'-'+sessLocation.toLowerCase().replace(/[^a-z0-9]+/g,'').slice(0,10):'';
  const rows=[];
  for(let i=0;i<weeks;i++){
    const dt=new Date(base);dt.setDate(base.getDate()+i*7);const ds=_iso(dt);
    rows.push({id:ds+_locSlug,day:dayNames[dt.getDay()],session_date:ds,capacity:total,status:'closed',
      bike_slots:JSON.stringify(slots),created_at:new Date().toISOString()});
  }
  try{
    let created=0,skipped=0,otherErr=null;const createdIds=[];
    for(const row of rows){
      const{error}=await sb.from('sessions').insert(row);
      if(error){ if(error.code==='23505')skipped++; else otherErr=error; }
      else {created++;createdIds.push(row.id);}
    }
    if(created===0&&otherErr)throw otherErr;
    // Set branch + offered add-ons separately so missing columns can never block session creation
    const _sessUpd={};
    if(sessLocation)_sessUpd.location=sessLocation;
    if((S.newSessAddons||[]).length)_sessUpd.addons=JSON.stringify(S.newSessAddons);
    if(Object.keys(_sessUpd).length&&createdIds.length){try{await Promise.all(createdIds.map(id=>sb.from('sessions').update(_sessUpd).eq('id',id)));}catch(e){}}
    await loadData();
    S.showAddSession=false;S.newSessDate='';S.newSessAssignedIds=[];S.newSessStartTime='21:00';S.newSessEndTime='23:00';S.newSessRepeat='1';S.newSessAddons=[];
    S.newSessTypeSizes={Road:{XS:0,S:0,M:0,L:0},Hybrid:{XS:0,S:0,M:0,L:0},Mountain:{XS:0,S:0,M:0,L:0}};
    if(created===0&&skipped>0)toast(t('errDateExists'),'error');
    else if(skipped>0)toast(t('someDatesSkipped').replace('{0}',created).replace('{1}',skipped));
    else if(created>1)toast(t('toastRecurringCreated').replace('{0}',created));
    else toast(`${shortDate(date)} - ${t('toastSessionReady')}`);
    renderSessions();
  }catch(e){toast(t('errCreateSession'),'error');}
}

async function toggleSession(id,newStatus){
  try{
    const prev=allSessions().find(s=>s.id===id);
    const prevStatus=prev?prev.status:'closed';
    await sb.from('sessions').update({status:newStatus}).eq('id',id);
    await loadData();
    const lbl={open:t('sessOpened'),closed:t('sessClosed'),full:t('statusFull')+'.'}[newStatus]||newStatus;
    toast(lbl);
    pushUndo(`${t('undoSessionStatus')} ${shortDate(prev?.session_date||id)} → ${newStatus}`,async()=>{
      await sb.from('sessions').update({status:prevStatus}).eq('id',id);
      await loadData();renderSessions();renderStaffQueue();
    });
    renderSessions();renderStaffQueue();
  }catch(e){toast(t('errServerError'),'error');}
}

async function deleteSession(id){
  if(!isAdmin()){toast(t('adminOnlyMsg'),'error');return;}
  try{
    const bookings=getQueue().filter(e=>e.sessionId===id&&e.status!=='removed'&&e.status!=='cancelled'&&e.status!=='noshow').length;
    if(bookings>0){toast(t('errHasBookings'),'error');return;}
    // Don't orphan sales: block delete if the session has any non-refunded cashier rows
    const sales=(S.cashSales||[]).filter(r=>r.session_id===id&&r.pay!=='refunded'&&r.category!=='__cardmeta__'&&r.category!=='__discount__').length;
    if(sales>0){toast(t('errHasSales'),'error');return;}

    await sb.from('sessions').update({status:'deleted'}).eq('id',id);
    await loadData();
    toast(t('sessDeleted'));
    renderSessions();
  }catch(e){toast(t('errDeleteSession'),'error');}
}

async function restoreSession(id){
  try{
    await sb.from('sessions').update({status:'closed'}).eq('id',id);
    await loadData();
    toast(t('sessRestored'));
    renderSessions();
  }catch(e){toast(t('errConnection'),'error');}
}

function closeBookingEditModal(){const m=document.getElementById('booking-edit-modal');if(m){m.style.display='none';m.innerHTML='';}S._beId=null;S._beRender=null;S._beType=null;}
async function saveBookingEdit(){
  const e=getQueue().find(x=>x.id===S._beId);if(!e){closeBookingEditModal();return;}
  const name=(document.getElementById('be-name')?.value||'').trim();
  if(!name){const i=document.getElementById('be-name');if(i){_fieldErr(i,t('errFieldRequired'));i.focus();}return;}
  const phone=(document.getElementById('be-phone')?.value||'').trim();
  const height=parseInt(document.getElementById('be-height')?.value)||null;
  const ty=S._beType||e.typePreference||'Any';
  const toSessionId=document.getElementById('be-sess')?.value||e.sessionId;
  const prev={name:e.name,phone:e.phone||'',height:e.height||null,size:e.size||'',type_preference:e.typePreference,price:e.price??DEFAULT_PRICE,
    session_id:e.sessionId,session_day:e.sessionDay,session_date:e.sessionDate,queue_num:e.queueNum,status:e.status};
  const patch={name,phone,height,size:height?heightToSize(height):(e.size||'')};
  if(ty!==e.typePreference){
    patch.type_preference=ty;
    // Reprice on type change like the customer flow, but never stomp a manual/promo price:
    // only when unpaid and still on the old type's default.
    if(!e.paid&&(e.price??DEFAULT_PRICE)===priceForType(e.typePreference||'Any'))patch.price=priceForType(ty);
  }
  const moving=toSessionId!==e.sessionId;
  if(moving){
    const newSess=allSessions().find(s=>s.id===toSessionId);if(!newSess)return;
    const cap=newSess.capacity||12;
    const taken=getQueue().filter(x=>x.sessionId===toSessionId&&(x.status==='waiting'||x.status==='active')).length;
    if(cap-taken<1){toast(t('rescheduleFull'),'error');return;}
    patch.session_id=toSessionId;patch.session_day=newSess.day;patch.session_date=newSess.session_date||toSessionId;
    patch.queue_num=nextQNum(toSessionId); // fresh number in the target session; the old number's gap stays (numbers are never shifted)
    if(e.status==='waitlist')patch.status='waiting';
  }
  const res=await sb.from('queue_entries').update(patch).eq('id',e.id);
  if(_writeErr(res,'edit booking'))return;
  if(moving&&e.status==='waitlist')await _addonStockQ(entryAddons(e),-1); // waitlist -> confirmed: reserve the add-ons, like the customer reschedule
  const id=e.id;
  pushUndo(`${t('undoEditBooking')} #${prev.queue_num} ${prev.name}`,async()=>{
    await sb.from('queue_entries').update(prev).eq('id',id);
    await loadDataLight();renderStaffQueue();
  });
  closeBookingEditModal();
  logAction(`${t('editBookingTitle')}: #${prev.queue_num} ${prev.name}${moving?` → ${shortDate(patch.session_date)}`:''}`);
  await loadDataLight();
  toast(t('toastBookingUpdated'));
  S._flashId=id;S._flashColor='green';setTimeout(()=>{S._flashId=null;},800);
  renderStaffQueue();
}
// Density preference persists across sessions (operational dashboards best practice).
function setQueueDensity(d){S.queueDensity=d;try{localStorage.setItem('cq_density',d);}catch(e){}renderStaffQueue();}
function renderStaffQueue(){
  {const _sy=window.scrollY;requestAnimationFrame(()=>{if(Math.abs(window.scrollY-_sy)>1)window.scrollTo(0,_sy);});} // keep scroll position across the in-place rebuild
  if(!S.dataLoaded){const _el=document.getElementById('tab-queue');if(_el)_el.innerHTML=skeletonList(7);return;}
  const _qvPills=`<div class="filter-row" style="margin-bottom:12px">
    <button class="filter-pill${(S.queueView||'bookings')==='bookings'?' active':''}" onclick="S.queueView='bookings';renderStaffQueue()">${t('tabQueue')}</button>
    <button class="filter-pill${S.queueView==='sessions'?' active':''}" onclick="S.queueView='sessions';renderStaffQueue()">${t('tabSessions')}</button>
  </div>`;
  if(S.queueView==='sessions'){ // Sessions view lives inside the Bookings tab now
    const _qh=document.getElementById('tab-queue');
    if(_qh){_qh.innerHTML=_qvPills+'<div id="sess-host"></div>';renderSessions();}
    return;
  }
  reconcileOrphanBikes();
  const queue=getQueue();const sessions=allSessions();
  const base=S.sfSession!=='all'
    ?queue.filter(e=>e.sessionId===S.sfSession&&e.status!=='removed'&&e.status!=='cancelled')
    :queue.filter(e=>e.status!=='removed'&&e.status!=='cancelled');
  // "Expected"/"On Bike" are LIVE counts. When viewing ALL sessions, exclude past-dated sessions,
  // or riders left stuck in 'waiting'/'active' on old sessions (never checked in / never returned)
  // inflate them — e.g. showing "4 expected" when nothing is actually pending today. A specific
  // session selection keeps its own raw counts.
  const _liveOnly=S.sfSession==='all',_liveDay=todayStr();
  // Upper bound (~1 year out) so an absurd far-future date — e.g. stray test data dated 2099 —
  // can never inflate the live Expected/On Bike counts.
  const _capDay=new Date(Date.now()+366*864e5).toLocaleDateString('en-CA',{timeZone:KSA_TZ});
  const _isLive=e=>{if(!_liveOnly)return true;const d=String(e.sessionDate||e.sessionId||'').slice(0,10);return d>=_liveDay&&d<=_capDay;};
  const total=base.length,nWait=base.filter(e=>e.status==='waiting'&&_isLive(e)).length,
        nBike=base.filter(e=>e.status==='active'&&_isLive(e)).length,nDone=base.filter(e=>e.status==='done').length,
        nDonePaid=base.filter(e=>e.status==='done'&&e.paid).length;
  const nRiders=new Set(base.map(e=>e.customerId||e.id)).size;
  const nWaitingRiders=new Set(base.filter(e=>e.status==='waiting').map(e=>e.customerId||e.id)).size;
  let filtered=[...base];
  if(S.sfStatus==='cancelled'){
    filtered=S.sfSession!=='all'
      ?queue.filter(e=>e.sessionId===S.sfSession&&e.status==='cancelled')
      :queue.filter(e=>e.status==='cancelled');
  }else if(S.sfStatus!=='all'){
    filtered=filtered.filter(e=>e.status===S.sfStatus);
  }
  if(S.sfPay==='paid')  filtered=filtered.filter(e=>e.paid);
  if(S.sfPay==='pending')filtered=filtered.filter(e=>!e.paid);
  if(S.sfSize!=='all')  filtered=filtered.filter(e=>e.size===S.sfSize);
  if(S.sfSearch.trim()){const q=S.sfSearch.trim().toLowerCase().replace(/^#/,'');filtered=filtered.filter(e=>e.name.toLowerCase().includes(q)||(e.phone||'').includes(q)||(e.email||'').toLowerCase().includes(q)||String(e.queueNum)===q);}
  const _sfd=S.sfSortDir;
  filtered.sort((a,b)=>{
    if(S.sfSort==='name')   return _sfd*a.name.localeCompare(b.name);
    if(S.sfSort==='type')   return _sfd*resolvedType(a).localeCompare(resolvedType(b));
    if(S.sfSort==='paid')   return _sfd*(Number(a.paid)-Number(b.paid));
    if(S.sfSort==='status') return _sfd*(a.status||'').localeCompare(b.status||'');
    return _sfd*(a.sessionId.localeCompare(b.sessionId)||a.queueNum-b.queueNum);
  });
  function thQSort(col,label,cls=''){
    const active=S.sfSort===col;
    const arrow=active?(S.sfSortDir===1?'↑':'↓'):'';
    return`<th class="an-sort-th${active?' an-sort-active':''}${cls?' '+cls:''}" onclick="setSfSort('${col}')">${label}${active?' '+arrow:''}</th>`;
  }
  const waitingBase=base.filter(e=>e.status==='waiting').sort((a,b)=>a.queueNum-b.queueNum);
  const nextRider=waitingBase[0];
  const totalWaiting=new Set(waitingBase.map(e=>`${e.sessionId}:${e.queueNum}`)).size;
  const nextUp=nextRider?`<div class="next-up-banner">
    <div>
      <div class="next-up-label">${t('nextUpLabel')} &nbsp;<span style="font-size:12px;color:var(--muted);font-weight:600">${totalWaiting} ${t('inLine')}</span></div>

  const qStatusOpts=['all','waiting','active','done','noshow','cancelled'].map(s=>{
    const l={all:t('filterAll'),waiting:t('statExpected'),active:t('onBikeStat'),done:t('statCompleted'),noshow:t('filterNoshow'),cancelled:t('statusCancelled')}[s];
    return`<option value="${s}"${S.sfStatus===s?' selected':''}>${l}</option>`;}).join('');

  const livePosMap={};

  const sessPosCounter={};

  allWaiting.forEach(e=>{
    const key=`${e.sessionId}:${e.queueNum}`;
    if(!seenBookings.has(key)){
      seenBookings.add(key);
      sessPosCounter[e.sessionId]=(sessPosCounter[e.sessionId]||0)+1;

    livePosMap[e.id]=sessPosCounter[e.sessionId]||0;

  const sessWaitCount={};
  allWaiting.forEach(e=>{
    const key=`${e.sessionId}:${e.queueNum}`;

  function buildQueueGroups(entries){
    // O(n): index rows by customer+session in one pass instead of re-filtering the whole list
    // per group (which was O(n²) on the flat Bookings view and slow with many bookings).
    const byKey=new Map(),order=[];

      const k=e.customerId+'|'+e.sessionId;
      let g=byKey.get(k);
      if(!g){g=[];byKey.set(k,g);order.push({key:k});}
      g.push(e);

    const rowCls=e.status==='active'?'row-active':(e.status==='noshow'||e.status==='cancelled')?'row-noshow-cancel':(e.status==='done'&&e.paid)?'row-done-paid':(e.status==='done')?'row-done':'';

    const allColors=assignedBikes.flatMap(b=>b.colors&&b.colors.length?b.colors:[]);
    const colorSwatches=allColors.length?allColors.map(c=>`<span style="display:inline-block;width:13px;height:13px;border-radius:50%;background:${c};border:1.5px solid rgba(0,0,0,.3);flex-shrink:0"></span>`).join(''):'<span style="color:var(--muted)">—</span>';
    const lp=livePosMap[e.id];
    const totalW=sessWaitCount[e.sessionId]||0;
    const posCell=e.status==='waiting'&&lp
      ?`<div class="pos-badge" style="font-size:12px;padding:3px 8px">${lp} / ${totalW}</div>`
      :`<span style="color:var(--muted);font-size:12px">—</span>`;
    const _flashStyle=S._flashId===e.id?`animation:rowFlash_${S._flashColor||'green'} .75s ease forwards;`:''
    return`<tr class="${rowCls}"${_flashStyle?` style="${_flashStyle}"`:''}>
      <td style="min-width:52px">
        <span class="queue-num-cell" style="font-size:${e.status!=='waiting'?'18':'22'}px">#${e.queueNum}</span>
        <button onclick="showEditQNumModal('${e.id}')" title="${t('editQNumTip')}" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:6px 8px;min-width:24px;min-height:24px;line-height:1;display:block;margin:2px 0 0 -8px" onmouseover="this.style.color='var(--green)'" onmouseout="this.style.color='var(--muted)'">#</button>
      </td>
      <td style="text-align:center">${posCell}</td>
      <td><div class="rider-name">${esc(e.name)}${wiTag}${noShowFlag(e)}</div><div class="rider-sub">${esc(fmtPhone(e.phone))||'—'}</div>${_adChips(e)}</td>
      <td style="font-size:12px;font-weight:700;color:var(--green);white-space:nowrap">${e.height?e.height+' cm':'<span style="color:var(--muted)">—</span>'}</td>
      <td>${typeBadge(resolvedType(e))}</td>
      ${S.sfSession==='all'?`<td class="hide-mobile">${dayLabel(e.sessionDay)||''} ${shortDate(e.sessionDate)}</td>`:'<td class="hide-mobile" style="display:none"></td>'}
      <td>${assignedBikes.length>0
        ?assignedBikes.map((b,i)=>`<div style="display:flex;align-items:center;gap:5px;${i>0?'margin-top:3px':''}">
            <span style="font-size:9px;font-weight:900;color:var(--muted);min-width:12px">${i+1}.</span>
            <span style="font-weight:700;font-size:13px">${esc(b.name)}</span>
          </div>`).join('')
        :'<span style="color:var(--muted)">—</span>'}</td>
      <td><div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">${colorSwatches}</div></td>
      <td style="font-weight:800;white-space:nowrap">${(()=>{const _p=e.price??DEFAULT_PRICE,_a=addonsCost(entryAddons(e));return _a>0?`SAR ${Math.round((_p+_a)*100)/100}<div style="font-size:10px;color:var(--muted);font-weight:600;margin-top:2px">${t('reviewRentalLabel')} ${_p} + ${t('addonsLabel')} ${_a}</div>`:`SAR ${_p}`;})()}</td>
      <td onclick="event.stopPropagation()">
        <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
          <button class="pay-toggle ${e.paid&&(e.price??DEFAULT_PRICE)===0?'house':e.paid?'paid':'pending'}" onclick="showPayMenu('${e.id}',event)">
            ${e.paid&&(e.price??DEFAULT_PRICE)===0?' '+t('onTheHouseLabel'):e.paid?'✓ '+t('paidLabel'):' '+t('pendingLabel')}
          </button>
          <button onclick="showEditPriceModal('${e.id}')" title="${t('editPriceBtn')}" aria-label="${t('editPriceBtn')}" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:6px;min-width:24px;min-height:24px;line-height:1" onmouseover="this.style.color='var(--green)'" onmouseout="this.style.color='var(--muted)'">${ICON_PENCIL}</button>
        </div>
      </td>
      <td>${statusCellHtml(e)}</td>
      <td>${_contactCell(entryPhone(e),e)}</td>
      <td><div class="actions-cell">${_entryActions(e)}</div></td>
    </tr>`;
  }

  function renderGroupRow(group){
    if(group.length===1)return renderQRow(group[0]);
    const primary=group[0];
    const n=group.length;
    const allSameQ=group.every(e=>e.queueNum===primary.queueNum);
    const isConsec=!allSameQ&&group.every((e,i)=>i===0||e.queueNum===group[i-1].queueNum+1);
    const qNumDisplay=allSameQ
      ?`#${primary.queueNum}`
      :isConsec
        ?`#${primary.queueNum}&thinsp;-&thinsp;#${group[n-1].queueNum}`
        :group.map(e=>`#${e.queueNum}`).join(', ');
    const allTerminal=group.every(e=>['done','noshow','cancelled'].includes(e.status));
    const groupCls=group.some(e=>e.status==='active')?'row-active'
      :group.every(e=>['noshow','cancelled'].includes(e.status))?'row-noshow-cancel'
      :(allTerminal&&group.filter(e=>e.status==='done').every(e=>e.paid)&&group.some(e=>e.status==='done'))?'row-done-paid'
      :allTerminal?'row-done':'';
    const lp=livePosMap[primary.id];
    const totalW=sessWaitCount[primary.sessionId]||0;
    const posCell=primary.status==='waiting'&&lp
      ?`<div class="pos-badge" style="font-size:12px;padding:3px 8px">${lp} / ${totalW}</div>`
      :`<span style="color:var(--muted);font-size:12px">—</span>`;
    const activeGroup=group.filter(e=>!['cancelled','noshow'].includes(e.status));
    const _r2g=n=>Math.round(n*100)/100;
    const adTotal=_r2g(activeGroup.reduce((s,e)=>s+addonsCost(entryAddons(e)),0));
    const adPaid=_r2g(activeGroup.filter(e=>e.paid).reduce((s,e)=>s+addonsCost(entryAddons(e)),0)); // add-ons follow the rider's paid state, same rule as the close-out
    const totalPrice=_r2g(activeGroup.reduce((s,e)=>s+(e.price??DEFAULT_PRICE),0)+adTotal);
    const paidAmt=_r2g(activeGroup.filter(e=>e.paid&&(e.price??DEFAULT_PRICE)>0).reduce((s,e)=>s+(e.price??DEFAULT_PRICE),0)+adPaid);
    const houseAmt=activeGroup.filter(e=>e.paid&&(e.price??DEFAULT_PRICE)===0).length;
    const remaining=_r2g(totalPrice-paidAmt);
    const paidCount=activeGroup.filter(e=>e.paid&&(e.price??DEFAULT_PRICE)>0).length;
    const priceSpan=`<span style="font-weight:800;white-space:nowrap">SAR ${totalPrice}</span>
      ${adTotal>0?`<div style="font-size:10px;color:var(--muted);font-weight:600;margin-top:2px">${t('addonsLabel')}: SAR ${adTotal}</div>`:''}
      <div style="font-size:10px;color:var(--muted);font-weight:600;margin-top:2px">${paidCount}/${activeGroup.length} ${t('paidLabel')}${houseAmt>0?` · ${houseAmt} `:''}</div>
      ${remaining>0?`<div style="font-size:11px;font-weight:800;color:#e08828;margin-top:3px">SAR ${remaining} ${t('dueWord')}</div>`:`<div style="font-size:11px;font-weight:800;color:var(--green);margin-top:3px">✓ ${t('settledLabel')}</div>`}`;

    return group.map((e,i)=>{
      const isFirst=i===0;
      const isLast=i===n-1;
      const rowCls=e.status==='active'?'row-active':(e.status==='noshow'||e.status==='cancelled')?'row-noshow-cancel':(e.status==='done'&&e.paid)?'row-done-paid':(e.status==='done')?'row-done':groupCls;
      const assignedBikes=getAssignedBikes(e);
      const allColors=assignedBikes.flatMap(b=>b.colors&&b.colors.length?b.colors:[]);
      const colorSwatches=allColors.length
        ?allColors.map(c=>`<span style="display:inline-block;width:13px;height:13px;border-radius:50%;background:${c};border:1.5px solid rgba(0,0,0,.3);flex-shrink:0"></span>`).join('')
        :'<span style="color:var(--muted)">—</span>';
      const bikeNames=assignedBikes.length
        ?assignedBikes.map(b=>`<span style="font-weight:700;font-size:13px">${esc(b.name)}</span>`).join('<br>')
        :'<span style="color:var(--muted)">—</span>';
      const ownerPhone=isFirst?entryPhone(primary):'';
      const riderCell=`<div style="display:flex;align-items:baseline;gap:5px">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;background:var(--green);color:#000;font-size:10px;font-weight:900;flex-shrink:0">${i+1}</span>
        <span class="rider-name" style="margin:0;font-weight:${isFirst?'900':'600'}">${esc(e.name)}${isFirst?noShowFlag(e):''}</span>
      </div>${isFirst&&ownerPhone?`<div class="rider-sub" style="margin-top:3px;padding-left:22px">${esc(fmtPhone(ownerPhone))}</div>`:''}${_adChips(e)}`;
      const heightCell=`<td style="vertical-align:middle;font-size:12px;font-weight:700;color:var(--green);white-space:nowrap">${e.height?e.height+' cm':'<span style="color:var(--muted)">—</span>'}</td>`;
      const groupLine=isFirst?'border-top:2px solid rgba(var(--green-rgb),.15)':'';
      const bottomLine=isLast?'border-bottom:2px solid rgba(var(--green-rgb),.15)':'';
      const leftLine='border-left:2px solid rgba(var(--green-rgb),.2)';
      const flashAnim=S._flashId===e.id?`animation:rowFlash_${S._flashColor||'green'} .75s ease forwards;`:'';
      const trStyle=[groupLine,bottomLine,leftLine,flashAnim].filter(Boolean).join(';');

      if(isFirst){
        return`<tr class="${rowCls}" style="${trStyle}">
          <td rowspan="${n}" style="min-width:52px;vertical-align:middle">
            <span class="queue-num-cell" style="font-size:15px;line-height:1.25">${qNumDisplay}</span>
            <div style="font-size:10px;color:var(--green);font-weight:800;margin-top:3px">${n} ${t('bike')||'Bikes'}</div>
            <button onclick="showEditQNumModal('${primary.id}')" title="${t('editQNumTip')}" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:6px 8px;min-width:24px;min-height:24px;line-height:1;margin:3px 0 0 -8px;display:block" onmouseover="this.style.color='var(--green)'" onmouseout="this.style.color='var(--muted)'">#</button>
          </td>
          <td rowspan="${n}" style="text-align:center;vertical-align:middle">${posCell}</td>
          <td style="vertical-align:middle">${riderCell}</td>
          ${heightCell}
          <td style="vertical-align:middle">${typeBadge(resolvedType(e))}</td>
          ${S.sfSession==='all'?`<td class="hide-mobile" rowspan="${n}" style="vertical-align:middle">${dayLabel(primary.sessionDay)||''} ${shortDate(primary.sessionDate)}</td>`:'<td class="hide-mobile" style="display:none"></td>'}
          <td style="vertical-align:middle">${bikeNames}</td>
          <td style="vertical-align:middle"><div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">${colorSwatches}</div></td>
          <td rowspan="${n}" style="vertical-align:middle">${priceSpan}</td>
          <td style="vertical-align:middle" onclick="event.stopPropagation()">
            <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
              <button class="pay-toggle ${e.paid&&(e.price??DEFAULT_PRICE)===0?'house':e.paid?'paid':'pending'}" onclick="showPayMenu('${e.id}',event)">
                ${e.paid&&(e.price??DEFAULT_PRICE)===0?' '+t('onTheHouseLabel'):e.paid?'✓ '+t('paidLabel'):' '+t('pendingLabel')}
              </button>
              <button onclick="showEditPriceModal('${e.id}')" title="${t('editPriceBtn')}" aria-label="${t('editPriceBtn')}" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:6px;min-width:24px;min-height:24px;line-height:1" onmouseover="this.style.color='var(--green)'" onmouseout="this.style.color='var(--muted)'">${ICON_PENCIL}</button>
            </div>
          </td>
          <td style="vertical-align:middle">${statusCellHtml(e)}</td>
          <td rowspan="${n}" style="vertical-align:middle">${_contactCell(entryPhone(primary),primary)}</td>
          <td style="vertical-align:middle"><div class="actions-cell">${_entryActions(e)}</div></td>
        </tr>`;
      }else{
        return`<tr class="${rowCls}" style="${trStyle}">
          <td style="vertical-align:middle">${riderCell}</td>
          ${heightCell}
          <td style="vertical-align:middle">${typeBadge(resolvedType(e))}</td>
          ${S.sfSession!=='all'?'<td class="hide-mobile" style="display:none"></td>':''}
          <td style="vertical-align:middle">${bikeNames}</td>
          <td style="vertical-align:middle"><div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">${colorSwatches}</div></td>
          <td style="vertical-align:middle" onclick="event.stopPropagation()">
            <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
              <button class="pay-toggle ${e.paid&&(e.price??DEFAULT_PRICE)===0?'house':e.paid?'paid':'pending'}" onclick="showPayMenu('${e.id}',event)">
                ${e.paid&&(e.price??DEFAULT_PRICE)===0?' '+t('onTheHouseLabel'):e.paid?'✓ '+t('paidLabel'):' '+t('pendingLabel')}
              </button>
              <button onclick="showEditPriceModal('${e.id}')" title="${t('editPriceBtn')}" aria-label="${t('editPriceBtn')}" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:6px;min-width:24px;min-height:24px;line-height:1" onmouseover="this.style.color='var(--green)'" onmouseout="this.style.color='var(--muted)'">${ICON_PENCIL}</button>
            </div>
          </td>
          <td style="vertical-align:middle">${statusCellHtml(e)}</td>
          <td style="vertical-align:middle"><div class="actions-cell">${_entryActions(e)}</div></td>
        </tr>`;
      }
    }).join('');
  }

  
  function renderGroupCard(group){
    const n=group.length;
    const primary=group[0];
    const allSameQ=group.every(e=>e.queueNum===primary.queueNum);
    const isConsec=!allSameQ&&group.every((e,i)=>i===0||e.queueNum===group[i-1].queueNum+1);
    const qNumDisplay=allSameQ?`#${primary.queueNum}`:isConsec?`#${primary.queueNum}&ndash;#${group[n-1].queueNum}`:group.map(e=>`#${e.queueNum}`).join(', ');
    const groupCls=group.some(e=>e.status==='active')?'row-active':group.every(e=>['noshow','cancelled'].includes(e.status))?'row-noshow-cancel':group.every(e=>['done','noshow','cancelled'].includes(e.status))&&group.some(e=>e.status==='done'&&e.paid)?'row-done-paid':group.every(e=>['done','noshow','cancelled'].includes(e.status))?'row-done':'';
    const lp=livePosMap[primary.id];const totalW=sessWaitCount[primary.sessionId]||0;
    const posTag=primary.status==='waiting'&&lp?`<span class="pos-badge" style="font-size:11px;padding:2px 7px">${lp}/${totalW}</span>`:'';
    const sessLabel=S.sfSession==='all'?`<div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px">${dayLabel(primary.sessionDay)||''} &middot; ${shortDate(primary.sessionDate)}</div>`:'';
    const riderRows=group.map((e,i)=>{
      const assignedBikes=getAssignedBikes(e);
      const bikeInfo=assignedBikes.length?assignedBikes.map(b=>b.name).join(', '):'';
      const isHouse=e.paid&&(e.price??DEFAULT_PRICE)===0;
      const payTag=isHouse?`<span style="font-size:12px"></span>`:e.paid?`<span style="font-size:12px;font-weight:800;color:var(--green)">✓</span>`:`<span style="font-size:12px;font-weight:800;color:var(--muted)"></span>`;
      const indent=n>1?'padding-left:22px':'';
      return`<div style="padding:6px 0;${i>0?'border-top:1px solid rgba(var(--tint-rgb),.05)':''}">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <div style="display:flex;align-items:center;gap:6px;min-width:0">
            ${n>1?`<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--green);color:#000;font-size:9px;font-weight:900;flex-shrink:0">${i+1}</span>`:''}
            <span style="font-weight:800;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px">${esc(e.name)}</span>
            ${e.height?`<span style="font-size:11px;font-weight:800;color:var(--green);flex-shrink:0"><bdi>${e.height} ${t('cmUnit')}</bdi></span>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">${statusBadge(e.status)}${payTag}</div>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;${indent}">
          ${typeLabel(e.typePreference)}${bikeInfo?` &middot; <span style="color:var(--muted-l)">${esc(bikeInfo)}</span>`:''}
        </div>
      </div>`;
    }).join('');
    const actionsHtml=group.map((e,i)=>`<div style="${n>1&&i>0?'border-top:1px solid rgba(var(--tint-rgb),.05);padding-top:6px;margin-top:2px':''}">
      ${n>1?`<div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:4px">${esc(e.name)}</div>`:''}
      <div style="display:flex;gap:6px;flex-wrap:wrap">${_entryActions(e)}</div>
    </div>`).join('');
    return`<div class="q-card${groupCls?' '+groupCls:''}" style="${n>1?'border-left:2px solid rgba(var(--green-rgb),.25)':''}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:${sessLabel?'4':'6'}px">
        <span class="queue-num-cell" style="font-size:22px">${qNumDisplay}</span>
        ${n>1?`<span style="font-size:10px;color:var(--green);font-weight:800">${n} ${t('bike')||'Bikes'}</span>`:''}
        ${posTag}
        <button onclick="showEditQNumModal('${primary.id}')" title="${t('editQNumTip')}" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:6px 8px;min-width:24px;min-height:24px;line-height:1;margin-left:auto" onmouseover="this.style.color='var(--green)'" onmouseout="this.style.color='var(--muted)'">#</button>
      </div>
      ${sessLabel}
      <div>${riderRows}</div>
      ${(()=>{
        const canEdit=group.some(e=>['waiting','active','waitlist'].includes(e.status));
        return group.map(e=>{
          const ad=addonLineItems(entryAddons(e));
          if(!ad.length&&!canEdit)return'';
          return`<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(var(--tint-rgb),.06)">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <span style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">${n>1?esc(e.name)+' · ':''}${t('addonsLabel')}</span>
              ${canEdit?`<button type="button" onclick="event.stopPropagation();showAddonPicker('${e.id}')" style="background:rgba(var(--green-rgb),.1);border:1px solid rgba(var(--green-rgb),.25);color:var(--green);font-family:inherit;font-size:11px;font-weight:800;padding:6px 10px;min-height:24px;border-radius:3px;cursor:pointer">+ ${t('addonAddBtn')}</button>`:''}
            </div>
            ${ad.map(a=>`<div style="display:flex;align-items:center;gap:7px;margin-top:5px;font-size:12px"><span style="flex:1;min-width:0;font-weight:700">${esc(a.name)}${a.qty>1?` ×${a.qty}`:''}</span><bdi style="font-weight:800">SAR ${a.lineTotal}</bdi></div>`).join('')}
          </div>`;
        }).join('');
      })()}
      ${(()=>{const ph=entryPhone(primary);return ph?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(var(--tint-rgb),.06)">${_contactCell(ph,primary)}</div>`:''})()}
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">${actionsHtml}</div>
    </div>`;
  }

// Reorder a waiting entry by swapping its queue number with the adjacent waiting entry
async function moveQueueEntry(id,dir){
  const e=getQueue().find(x=>x.id===id);if(!e||e.status!=='waiting')return;
  const waiting=getQueue().filter(x=>x.sessionId===e.sessionId&&x.status==='waiting').sort((a,b)=>a.queueNum-b.queueNum);
  const idx=waiting.findIndex(x=>x.id===id);
  const swapWith=waiting[idx+dir];
  if(!swapWith)return;
  const a=e.queueNum,b=swapWith.queueNum;
  // Swap through a temporary number, sequentially, so a unique (session_id, queue_num) index never sees two rows share a number mid-swap.
  const tmp=nextQNum(e.sessionId);
  for(const[eid,num]of[[e.id,tmp],[swapWith.id,a],[e.id,b]]){
    const{error}=await sb.from('queue_entries').update({queue_num:num}).eq('id',eid);
    if(error){toast(error.message||t('errConnection'),'error');await loadData();renderStaffQueue();return;}
  }
  await loadData();renderStaffQueue();
}

async function togglePayment(id,mode){
  const entry=getQueue().find(e=>e.id===id);
  if(!entry)return;
  const isHouse=entry.paid&&(entry.price??DEFAULT_PRICE)===0;
  
  let newPaid,newPrice;
  if(mode==='house'){newPaid=true;newPrice=0;}
  else if(mode===true||mode==='paid'||mode==='cash'||mode==='card'){newPaid=true;newPrice=entry.price===0?_entryFallbackPrice(entry):(entry.price??DEFAULT_PRICE);}
  else if(mode===false||mode==='pending'){newPaid=false;newPrice=entry.price===0?_entryFallbackPrice(entry):(entry.price??DEFAULT_PRICE);}
  else{
    
    if(!entry.paid){newPaid=true;newPrice=entry.price;}
    else if(!isHouse){newPaid=true;newPrice=0;}
    else{newPaid=false;newPrice=_entryFallbackPrice(entry);}
  }
  let newMethod=entry.pay_method||null; // card vs cash for the rental (aggregates to the close-out split)
  if(mode==='card')newMethod='card';else if(mode==='cash')newMethod='cash';else if(mode==='house'||mode==='pending'||mode===false||(newPaid&&newPrice===0))newMethod=null;
  const prevPaid=entry.paid,prevPrice=entry.price,prevMethod=entry.pay_method||null,prevCard=entry.card_amount??null;
  entry.paid=newPaid;entry.price=newPrice;entry.pay_method=newMethod;entry.card_amount=null; // cash/card/house/pending clear any prior split
  renderStaffQueue();renderHistory();
  const stateLabel=newPaid&&newPrice===0?' '+t('onTheHouseLabel'):newPaid?'✓ '+t('paidLabel'):t('pendingLabel');
  toast(stateLabel,newPaid?'':'warning');
  const _pr=await sb.from('queue_entries').update({paid:newPaid,price:newPrice}).eq('id',id);
  if(_writeErr(_pr,'payment')){await loadDataLight();renderStaffQueue();renderHistory();return;} // surface failure and revert the optimistic toggle
  try{await sb.from('queue_entries').update({pay_method:newMethod,card_amount:null}).eq('id',id);}catch(e){} // tolerant: columns may not exist yet
  await loadDataLight();renderStaffQueue();renderHistory(); // queue-only change: slim re-sync (no photo refetch)
  pushUndo(`${t('undoPayment')} #${entry.queueNum} ${entry.name}`,async()=>{
    await sb.from('queue_entries').update({paid:prevPaid,price:prevPrice}).eq('id',id);
    try{await sb.from('queue_entries').update({pay_method:prevMethod,card_amount:prevCard}).eq('id',id);}catch(e){}
    await loadDataLight();renderStaffQueue();renderHistory();
  });
}
// Split a rental between card and cash: prompt for the card portion, the rest is cash
async function splitRentalPayment(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry)return;
  const price=Math.round(((entry.price===0?_entryFallbackPrice(entry):(entry.price??DEFAULT_PRICE)))*100)/100;
  const raw=prompt(t('splitCardPrompt'),entry.card_amount!=null?String(entry.card_amount):'');if(raw===null)return;
  let card=parseFloat(raw);if(isNaN(card)||card<0)card=0;card=Math.round(Math.min(card,price)*100)/100;
  const prevPaid=entry.paid,prevPrice=entry.price,prevMethod=entry.pay_method||null,prevCard=entry.card_amount??null;
  entry.paid=true;entry.price=price;entry.pay_method='split';entry.card_amount=card;
  renderStaffQueue();renderHistory();
  toast(`✓ ${t('cashCard')} ${card} · ${t('cashCash')} ${Math.round((price-card)*100)/100}`);
  const _sr=await sb.from('queue_entries').update({paid:true,price:price}).eq('id',id);
  if(_writeErr(_sr,'split payment')){await loadDataLight();renderStaffQueue();renderHistory();return;}

function _saveFullLog(){try{localStorage.setItem('cq_full_log',JSON.stringify(S.fullLog));}catch(e){}}
// Stable per-device id + optional operator name, so audit rows are attributable across devices (the PIN is shared).
function _deviceId(){try{let d=localStorage.getItem('cq_device_id');if(!d){d='d'+Math.random().toString(36).slice(2,8);localStorage.setItem('cq_device_id',d);}return d;}catch(_){return'd?';}}
function _opName(){try{return localStorage.getItem('cq_op_name')||'';}catch(_){return'';}}
function setOpName(v){try{localStorage.setItem('cq_op_name',String(v||'').trim().slice(0,40));}catch(_){}}
function logAction(label){
  if(!label)return;
  const op=_opName();
  const by=S.view==='staff'?(op||'Staff'):((S.loggedIn&&S.loggedIn.name)||'Guest');
  S.fullLog.push({ts:Date.now(),label:String(label),by,view:S.view||''});
  if(S.fullLog.length>2000)S.fullLog=S.fullLog.slice(-2000); // rotate locally; the shared staff_actions table keeps the full history
  _saveFullLog();
  // Mirror to a shared audit table so every device's actions are attributable (tolerant: table may not exist yet)
  try{if(sb&&S.view==='staff')sb.from('staff_actions').insert({at:new Date().toISOString(),action:String(label).slice(0,300),who:op.slice(0,40)||null,device:_deviceId(),view:S.view||''}).then(()=>{},()=>{});}catch(_){}
  if(S.view==='staff'&&S.staffTab==='history'&&S.histView==='log')renderLogs();
}
function pushUndo(label,fn){
  logAction(label);
  const logId='alog-'+Date.now()+'-'+Math.random().toString(36).slice(2);
  const logEntry={id:logId,label,fn,timestamp:Date.now(),undone:false};
  S.actionLog.unshift(logEntry);
  if(S.actionLog.length>100)S.actionLog.pop();
  S.undoStack.push({label,fn});
  if(S.undoStack.length>20)S.undoStack.shift();
  showUndoBar(label,async()=>{
    if(logEntry.undone)return; // already reversed (e.g. via the logs view) — never run the reversal twice
    S.undoStack=S.undoStack.filter(i=>i.label!==label||i.fn!==fn);
    logEntry.undone=true;
    await fn();
    if(S.staffTab==='history'&&S.histView==='log')renderLogs();
  });
  renderTopbarRight();
  if(S.staffTab==='history'&&S.histView==='log')renderLogs();
}
async function doUndo(){
  const item=S.undoStack.pop();
  if(!item)return;
  // The undo BAR and the logs view both reverse via the same logEntry, guarded by .undone.
  // The topbar button ran the raw fn without setting that flag, so the bar/logs could reverse
  // the SAME action a second time (double restock / double renumber). Mark it undone and drop
  // the bar so no other entry point can re-run it.
  const logEntry=(S.actionLog||[]).find(l=>l.fn===item.fn&&!l.undone);
  if(logEntry&&logEntry.undone)return;
  try{
    await item.fn();
    if(logEntry)logEntry.undone=true;
    const bar=document.getElementById('undo-bar-el');if(bar){try{clearInterval(_undoBarTimer);}catch(_){}bar.remove();}
    toast(t('undoneMsg'));
  }catch(e){
    S.undoStack.push(item);
    toast(t('undoFailed'),'error');
  }
  renderTopbarRight();
}

// Self-service reschedule: move a whole booking (all the customer's waiting riders in one session) to another open upcoming session
function showRescheduleModal(fromSessionId){
  const cust=S.loggedIn;if(!cust)return;
  const moving=getQueue().filter(e=>e.customerId===cust.id&&e.sessionId===fromSessionId&&(e.status==='waiting'||e.status==='waitlist'));
  if(!moving.length){toast(t('errCancelWaiting'),'error');return;}
  const today=_todayISO();
  const opts=allSessions().filter(s=>s.id!==fromSessionId&&s.status==='open'&&(s.session_date||s.id)>=today)
    .sort((a,b)=>new Date(a.session_date||a.id)-new Date(b.session_date||b.id));

    const cap=s.capacity||12;

function closeRescheduleModal(){const m=document.getElementById('reschedule-modal');if(m){m.style.display='none';m.innerHTML='';}}
async function rescheduleBooking(fromSessionId,toSessionId){
  const cust=S.loggedIn;if(!cust)return;
  const moving=getQueue().filter(e=>e.customerId===cust.id&&e.sessionId===fromSessionId&&(e.status==='waiting'||e.status==='waitlist'));
  if(!moving.length){closeRescheduleModal();return;}
  const newSess=allSessions().find(s=>s.id===toSessionId);if(!newSess){closeRescheduleModal();return;}
  const cap=newSess.capacity||12;
  const taken=getQueue().filter(e=>e.sessionId===toSessionId&&(e.status==='waiting'||e.status==='active')).length;
  if(cap-taken<moving.length){toast(t('rescheduleFull'),'error');return;}
  closeRescheduleModal();
  const base=nextQNum(toSessionId);
  const sorted=moving.slice().sort((a,b)=>(a.queueNum||0)-(b.queueNum||0));
  const wasAllWaitlist=moving.every(e=>e.status==='waitlist');
  await Promise.all(sorted.map((e,i)=>sb.from('queue_entries').update({session_id:toSessionId,session_day:newSess.day,session_date:newSess.session_date||toSessionId,queue_num:base+i,status:'waiting'}).eq('id',e.id)));
  await loadData();
  if(wasAllWaitlist)for(const _m of moving)await _addonStockQ(entryAddons(_m),-1); // per-rider: reserve every moving rider's add-ons (not just the first), now that the waitlist booking is confirmed
  toast(t('toastRescheduled'));
  renderMyRides();
}

async function cancelBooking(id,reason){
  const entry=getQueue().find(e=>e.id===id);
  if(!entry||(entry.status!=='waiting'&&entry.status!=='waitlist')){toast(t('errCancelWaiting'),'error');return;}
  const isWaitlist=entry.status==='waitlist';
  const savedQNum=entry.queueNum;
  const bikeIds=getAssignedBikeIds(entry);
  await _ownEntryUpdate(id,{status:'cancelled',assigned_bike_id:null});
  if(bikeIds.length)await Promise.all(bikeIds.map(bid=>sb.from('bikes').update({status:'available'}).eq('id',bid)));
  if(!isWaitlist)await _shiftDownAfter(entry.sessionId,savedQNum); // close the number gap

  if(reason){
    S.cancellationLog.unshift({
      entryId:id,name:entry.name,queueNum:savedQNum,reason,
      session:dayLabel(entry.sessionDay)+' '+shortDate(entry.sessionDate),
      time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),
      timestamp:Date.now()
    });
    if(S.cancellationLog.length>100)S.cancellationLog.pop();
    try{localStorage.setItem('cq_cancellations',JSON.stringify(S.cancellationLog));}catch(e){}
  }
  await loadData();
  if(!isWaitlist)await _restockAddonsOnExit(entry); // waitlist bookings never reserved stock, so nothing to restock
  toast(t('toastBookingCancelled'));
  pushUndo(`${t('undoCancelBooking')} #${savedQNum} ${entry.name}`,async()=>{
    await _ownEntryUpdate(id,{status:isWaitlist?'waitlist':'waiting',queue_num:_restoreNum(entry.sessionId,savedQNum,id)});
    await loadData();
    if(!isWaitlist)await _consumeAddonsOnEnter(entry); // the restore brings the booking back, so re-reserve the add-ons that were restocked on cancel
    renderMyRides();renderStaffQueue();
  });
  renderMyRides();
}

        toast(`Booking #${entry.queueNum} cancelled.`);
        pushUndo(`${t('undoStaffCancel')} #${entry.queueNum} ${entry.name}`,async()=>{
          const assignedVal=bikeIds.length===1?bikeIds[0]:(bikeIds.length?JSON.stringify(bikeIds):null);
          const calls2=[sb.from('queue_entries').update({status:savedStatus,assigned_bike_id:assignedVal,queue_num:_restoreNum(entry.sessionId,entry.queueNum,id)}).eq('id',id)];
          bikeIds.forEach(bid=>calls2.push(sb.from('bikes').update({status:'in-use'}).eq('id',bid)));
          await Promise.all(calls2);
          await loadData();
          await _consumeAddonsOnEnter(entry); // the restore brings the booking back, so re-reserve the add-ons that were restocked on cancel
          renderStaffQueue();
        });
      }
      renderMyRides();renderStaffQueue();
    }
  });
}

// Reads the staff_actions table (all devices) and merges the local device log as a fallback,
// deduping this device's mirrored writes by minute+text. The table may not exist yet: local-only then.
let _dbLogBusy=false;
async function _loadDbLogs(){
  if(_dbLogBusy||!sb)return;
  if(S._dbLog&&Date.now()-(S._dbLogAt||0)<60000)return; // 60s cache so re-renders don't hammer the DB
  _dbLogBusy=true;
  try{
    const{data,error}=await sb.from('staff_actions').select('*').order('at',{ascending:false}).limit(1500);
    if(!error&&Array.isArray(data)){S._dbLog=data.map(r=>({ts:new Date(r.at).getTime()||0,label:r.action||'',by:r.who||'Staff'}));S._dbLogAt=Date.now();}
  }catch(_){}
  _dbLogBusy=false;
  if(S.view==='staff'&&S.staffTab==='history'&&S.histView==='log')renderLogs();
}
// Category of a log line, matched bilingually (labels are stored in whichever UI language was active when written)
function _logCatOf(lbl){
  const s=(lbl||'').toLowerCase();
  if(/login|logged|logout|unlock|password|account|switched|\u062f\u062e\u0648\u0644|\u062e\u0631\u0648\u062c|\u0643\u0644\u0645\u0629|\u062d\u0633\u0627\u0628|\u0641\u062a\u062d|\u062a\u062d\u0648\u064a\u0644/.test(s))return'auth';
  if(/bike|fleet|retire|maintenance|\u062f\u0631\u0627\u062c\u0629|\u0623\u0633\u0637\u0648\u0644|\u0635\u064a\u0627\u0646\u0629/.test(s))return'bike';
  if(/inventory|stock|item|reorder|\u0645\u062e\u0632\u0648\u0646|\u0639\u0646\u0635\u0631/.test(s))return'inv';
  if(/paid|payment|refund|price|receipt|sale|discount|\u062f\u0641\u0639|\u0645\u062f\u0641\u0648\u0639|\u0627\u0633\u062a\u0631\u062f\u0627\u062f|\u0633\u0639\u0631|\u0641\u0627\u062a\u0648\u0631\u0629|\u0628\u064a\u0639|\u062e\u0635\u0645/.test(s))return'pay';
  if(/book|cancel|no-?show|check|queue|promot|waitlist|renumber|session|rider|\u062d\u062c\u0632|\u0625\u0644\u063a\u0627\u0621|\u062d\u0636\u0648\u0631|\u062a\u0633\u062c\u064a\u0644|\u0637\u0627\u0628\u0648\u0631|\u062a\u0631\u0642\u064a\u0629|\u0627\u0646\u062a\u0638\u0627\u0631|\u062c\u0644\u0633\u0629|\u0631\u0627\u0643\u0628|\u0631\u0642\u0645/.test(s))return'book';
  return'other';
}
const _LOG_CATS=[['pay','logCatPay'],['book','logCatBook'],['bike','logCatBike'],['inv','logCatInv'],['auth','logCatAuth'],['other','logCatOther']];
// Finds the still-reversible action (from this session's S.actionLog) that a displayed
// log row corresponds to, matched by exact label + closest timestamp. Returns null for
// text-only/past entries whose reversal function no longer exists (can't be undone).
function _undoableFor(item){
  if(!item)return null;
  const cands=(S.actionLog||[]).filter(a=>a&&!a.undone&&typeof a.fn==='function'&&a.label===item.label);
  if(!cands.length)return null;
  return cands.reduce((best,a)=>Math.abs((a.timestamp||0)-(item.ts||0))<Math.abs((best.timestamp||0)-(item.ts||0))?a:best);
}

async function promoteWaitlist(id){

  const newNum=nextQNum(e.sessionId);
  const{error}=await sb.from('queue_entries').update({status:'waiting',queue_num:newNum}).eq('id',id);
  if(error){toast(error.message||t('errConnection'),'error');return;}
  await loadData();

  logAction&&logAction(t('logPromotedFromWaitlist').replace('{0}',newNum).replace('{1}',e.name));
  toast(t('toastPromoted'));
  renderStaffQueue();renderMyRides();
}
// When a spot frees up (cancel / no-show), promote the oldest waitlisted rider in that session.
async function _autoPromoteOldestWaitlist(sessionId){
  const wl=getQueue().filter(x=>x.sessionId===sessionId&&x.status==='waitlist')
    .sort((a,b)=>new Date(a.registeredAt)-new Date(b.registeredAt));
  if(!wl.length)return false;
  const e=wl[0];
  const newNum=nextQNum(sessionId);
  await sb.from('queue_entries').update({status:'waiting',queue_num:newNum}).eq('id',e.id);
  await _consumeAddonsOnEnter(e); // promoted booking now reserves its add-on stock
  return true;
}
async function doNoShow(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry)return;
  const savedQNum=entry.queueNum;
  // Ticket numbers are stable and never reused; no-show just frees the slot and leaves a gap (no shifting, which a unique index would reject).
  await sb.from('queue_entries').update({status:'noshow'}).eq('id',id);
  const _promoted=await _autoPromoteOldestWaitlist(entry.sessionId);
  await loadDataLight(); // queue-only status change: slim re-sync (no photo refetch)
  await _restockAddonsOnExit(entry);
  toast(_promoted?`${t('toastNoShow')} · ${t('toastPromoted')}`:t('toastNoShow'));
  S._flashId=id;S._flashColor='orange';setTimeout(()=>{S._flashId=null;},800);
  pushUndo(`${t('undoNoShow')} #${savedQNum} ${entry.name}`,async()=>{
    await sb.from('queue_entries').update({status:'waiting',queue_num:savedQNum}).eq('id',id);
    await loadData();
    await _consumeAddonsOnEnter(entry); // undo brings the rider back — re-reserve the add-ons restocked on no-show (was leaking stock)
    renderStaffQueue();
  });
  renderStaffQueue();
}
async function doUndoNoShow(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry||entry.status!=='noshow')return;
  // The rider keeps their original ticket number. If a live booking already holds that number (a leftover duplicate from the old shifting logic), give this rider a fresh number so the unique index is satisfied.
  const slotTaken=getQueue().some(e=>e.sessionId===entry.sessionId&&e.queueNum===entry.queueNum&&e.id!==id&&['waiting','active','done'].includes(e.status));
  const oldQNum=entry.queueNum;
  const upd={status:'waiting'};
  if(slotTaken)upd.queue_num=nextQNum(entry.sessionId);
  try{
    const{error}=await sb.from('queue_entries').update(upd).eq('id',id); // Supabase returns the error rather than throwing, so check it explicitly
    if(error)throw error;
  }catch(err){
    console.error('doUndoNoShow failed',err);
    toast(t('errSomethingWrong')+(err&&(err.message||err.code)?' ('+(err.message||err.code)+')':''),'error');
    await loadDataLight();renderStaffQueue();
    return;
  }
  if(upd.queue_num!=null)entry.queueNum=upd.queue_num;
  await loadDataLight(); // queue-only status change: slim re-sync
  await _consumeAddonsOnEnter(entry); // rider is active again, re-reserve stock that was restocked on no-show
  toast(t('toastUndoNoShow'));
  pushUndo(`${t('undoUndoNoShow')} #${oldQNum} ${entry.name}`,async()=>{
    await sb.from('queue_entries').update({status:'noshow',queue_num:oldQNum}).eq('id',id);
    await loadData();
    await _restockAddonsOnExit(entry); // re-no-showing returns the add-ons to stock (mirror of the consume above)
    renderStaffQueue();
  });
  renderStaffQueue();
}
// Restore a cancelled booking back into the queue (the reverse of a cancel). Its old
// number may now be held by a live row (the cancel shifted the queue down), so take a
// fresh number if so, keeping the partial unique index satisfied.
async function doRestoreCancelled(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry||entry.status!=='cancelled')return;
  if(spotsLeft(entry.sessionId)<=0){ // session already at capacity — confirm before over-filling it
    confirmDialog({
      title:t('restoreFullTitle'),
      body:t('restoreFullBody'),
      confirmLabel:t('restoreBookingBtn'),
      confirmClass:'btn-muted',
      onConfirm:()=>_execRestoreCancelled(id),
    });
    return;
  }
  await _execRestoreCancelled(id);
}
async function _execRestoreCancelled(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry||entry.status!=='cancelled')return;
  const slotTaken=getQueue().some(e=>e.sessionId===entry.sessionId&&e.queueNum===entry.queueNum&&e.id!==id&&['waiting','active','done'].includes(e.status));
  const newQNum=slotTaken?nextQNum(entry.sessionId):entry.queueNum;
  try{
    const{error}=await sb.from('queue_entries').update({status:'waiting',queue_num:newQNum}).eq('id',id);
    if(error)throw error;
  }catch(err){
    console.error('doRestoreCancelled failed',err);
    toast(t('errSomethingWrong')+(err&&(err.message||err.code)?' ('+(err.message||err.code)+')':''),'error');
    await loadDataLight();renderStaffQueue();return;
  }
  entry.queueNum=newQNum;entry.status='waiting';
  await loadDataLight();
  await _consumeAddonsOnEnter(entry); // rider is back in the queue: re-reserve the add-on stock returned on cancel
  toast(t('toastBookingRestored'));
  pushUndo(`${t('logRestoredBooking')} #${newQNum} ${entry.name}`,async()=>{
    await sb.from('queue_entries').update({status:'cancelled'}).eq('id',id);
    try{await _restockAddonsOnExit(entry);}catch(e){}
    await loadData();renderStaffQueue();
  });
  renderStaffQueue();renderMyRides();
}

  if(newNum===oldNum){closeEditQNumModal();return;}
  // Reject if a live booking already holds the target number (the unique session_id+queue_num index would reject it anyway)
  if(getQueue().some(e=>e.sessionId===entry.sessionId&&e.queueNum===newNum&&!['cancelled','removed','noshow'].includes(e.status))){
    if(inp)inp.style.borderColor='var(--red)';toast(t('errQNumTaken'),'error');return;
  }
  const group=getQueue().filter(e=>e.sessionId===entry.sessionId&&e.queueNum===oldNum&&e.status!=='cancelled'&&e.status!=='removed');
  closeEditQNumModal();
  const _qr=await Promise.all(group.map(e=>sb.from('queue_entries').update({queue_num:newNum}).eq('id',e.id)));
  const _qe=_qr.find(r=>r&&r.error);
  if(_qe){toast(t('errSomethingWrong')+(_qe.error.message?' ('+_qe.error.message+')':''),'error');await loadData();renderStaffQueue();return;}
  await loadData();renderStaffQueue();renderHistory();
  pushUndo(`${t('undoRenumber')} #${oldNum}→#${newNum} ${entry.name}`,async()=>{
    const restored=getQueue().filter(e=>e.sessionId===entry.sessionId&&e.queueNum===newNum&&group.map(x=>x.id).includes(e.id));
    await Promise.all(restored.map(e=>sb.from('queue_entries').update({queue_num:oldNum}).eq('id',e.id)));
    await loadData();renderStaffQueue();renderHistory();
  });
  toast(`#${oldNum} → #${newNum}`);
}


// Admin maintenance: renumber any leftover duplicate (session_id, queue_num) rows so every booking is unique again.
// Keeps the earliest booking's number and pushes each duplicate above that session's current max (collision-safe under the unique index).
async function fixDuplicateQNums(){
  if(!isAdmin()){toast(t('adminOnlyMsg'),'error');return;}
  const bySession={};
  getQueue().filter(e=>e.status!=='cancelled'&&e.status!=='removed').forEach(e=>{(bySession[e.sessionId]=bySession[e.sessionId]||[]).push(e);}); // recycled cancelled/removed numbers are legitimate
  const toFix=[];
  Object.keys(bySession).forEach(sid=>{
    const rows=bySession[sid];
    let maxN=rows.reduce((m,e)=>Math.max(m,e.queueNum||0),0);
    const groups={};
    rows.forEach(e=>{(groups[e.queueNum]=groups[e.queueNum]||[]).push(e);});
    Object.keys(groups).forEach(qn=>{
      const g=groups[qn];
      if(g.length<2)return;
      g.sort((a,b)=>new Date(a.registeredAt||0)-new Date(b.registeredAt||0)||String(a.id).localeCompare(String(b.id)));
      g.slice(1).forEach(e=>{maxN+=1;toFix.push({id:e.id,newNum:maxN});}); // earliest keeps its number; the rest move above the session max
    });
  });
  if(!toFix.length){toast(t('fixDupNone'));return;}
  confirmDialog({
    title:t('fixDupTitle'),
    body:t('fixDupBody').replace('{0}',toFix.length),
    confirmLabel:t('fixDupConfirm'),
    confirmClass:'btn-muted',
    onConfirm:async()=>{
      let ok=0;
      for(const f of toFix){ // sequential: each new number is above the session max, so a unique index never sees a collision
        const res=await sb.from('queue_entries').update({queue_num:f.newNum}).eq('id',f.id);
        if(_writeErr(res,'fix duplicate numbers'))break;
        ok++;
      }
      await loadData();renderStaffQueue();if(S.staffTab==='history'&&S.histView==='log')renderLogs();
      toast(t('fixDupDone').replace('{0}',ok));
      try{logAction&&logAction(t('fixDupLog').replace('{0}',ok));}catch(e){}
    }
  });
}

// End-of-day close-out: bike rentals + product sales for the selected session's whole day, by payment type
function printCloseout(){
  const sel=allSessions().find(s=>s.id===S._ctSession);
  if(!sel){toast(t('errSelectSession'),'error');return;}
  const ar=S.lang==='ar';const r2=n=>Math.round(n*100)/100;
  const date=sel.session_date||sel.id;
  const daySessions=allSessions().filter(s=>(s.session_date||s.id)===date);
  const sessIds=new Set(daySessions.map(s=>s.id));
  const rentEntries=getQueue().filter(e=>sessIds.has(e.sessionId)&&(e.status==='active'||e.status==='done'));
  const rentCollected=r2(rentEntries.filter(e=>e.paid).reduce((s,e)=>s+(e.price??DEFAULT_PRICE),0));
  const rentPending=r2(rentEntries.filter(e=>!e.paid).reduce((s,e)=>s+(e.price??DEFAULT_PRICE),0));
  const _rcard=e=>{const p=e.price??DEFAULT_PRICE;if(e.card_amount!=null)return Math.min(Math.max(0,Number(e.card_amount)||0),p);return e.pay_method==='card'?p:0;};
  const rentCard=r2(rentEntries.filter(e=>e.paid).reduce((s,e)=>s+_rcard(e),0));
  const rentCash=r2(Math.max(0,rentCollected-rentCard));
  // Booking add-on revenue, per-rider, following each rider's paid state (collected if the rider is paid, else pending)

async function doRemove(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry)return;
  const prevStatus=entry.status;
  const savedQNum=entry.queueNum;
  const restocks=prevStatus==='waiting'||prevStatus==='active'; // pre-ride removal returns add-ons; done = delivered, noshow/cancelled already restocked
  addHistLog(t('histRemoved'),entry,async()=>{
    await sb.from('queue_entries').update({status:prevStatus==='done'?'done':'waiting',queue_num:_restoreNum(entry.sessionId,savedQNum,id)}).eq('id',id);
    await loadData();
    if(restocks)await _consumeAddonsOnEnter(entry); // the restore brings the booking back, so re-reserve what the removal restocked
    renderStaffQueue();renderHistory();
  });
  await sb.from('queue_entries').update({status:'removed'}).eq('id',id);
  if(prevStatus==='waiting')await _shiftDownAfter(entry.sessionId,savedQNum); // close the number gap
  await loadData();
  if(restocks)await _restockAddonsOnExit(entry);
  toast(t('toastRiderRemoved'));
  renderStaffQueue();renderHistory();
}

async function doRestoreEntry(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry)return;
  const originalStatus=entry.status;
  const restoreStatus=entry.assignedBikeId?'done':'waiting';
  const consumes=restoreStatus==='waiting'; // back to the queue = its add-ons must be reserved again (they were restocked when it exited)
  addHistLog(t('histRestored'),entry,async()=>{
    await sb.from('queue_entries').update({status:originalStatus}).eq('id',id);
    await loadData();
    if(consumes)await _restockAddonsOnExit(entry); // undoing the restore sends it back out, so return the add-ons again
    renderHistory();
  });
  await sb.from('queue_entries').update({status:restoreStatus,queue_num:_restoreNum(entry.sessionId,entry.queueNum,id)}).eq('id',id);
  await loadData();
  if(consumes)await _consumeAddonsOnEnter(entry);
  toast(t('restoreEntryBtn')||'Restored');
  renderHistory();
}

async function undoHistLog(logId){
  const log=S.histLog.find(l=>l.id===logId);
  if(!log||log.undone||!log.undoFn){toast(t('toastNothingUndo'),'warning');return;}

    await log.undoFn();
    log.undone=true;
    renderHistory();

}

function _stopScanStream(){

  _scanDetector=null;_scanLastTxt='';_scanLastAt=0;
}
function closeScanModal(){

async function _startScanner(){
  try{
    if('BarcodeDetector' in window){
      try{_scanDetector=new BarcodeDetector({formats:['qr_code']});}catch(e){_scanDetector=null;}
    }
    if(!_scanDetector)await _loadJsQR();
    _scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
    const v=document.getElementById('scan-video');
    if(!v){_stopScanStream();return;}
    v.srcObject=_scanStream;
    await v.play();
    _scanTick();
  }catch(err){
    const el=document.getElementById('scan-msg');
    if(el){
      el.style.color='var(--red)';
      el.textContent=(err&&(err.name==='NotAllowedError'||err.name==='SecurityError'))?t('scanCamDenied'):t('scanCamError');
    }
    _stopScanStream();
  }
}
async function _scanTick(){
  if(!_scanStream)return;
  const v=document.getElementById('scan-video');
  if(v&&v.readyState>=2){
    let txt='';
    try{
      if(_scanDetector){
        const codes=await _scanDetector.detect(v);
        if(codes&&codes.length)txt=codes[0].rawValue||'';
      }else if(window.jsQR&&v.videoWidth){
        const c=_scanCanvas||(_scanCanvas=document.createElement('canvas'));
        const w=Math.min(v.videoWidth,480),h=Math.round(v.videoHeight*(w/v.videoWidth));
        c.width=w;c.height=h;
        const ctx=c.getContext('2d',{willReadFrequently:true});
        ctx.drawImage(v,0,0,w,h);
        const d=ctx.getImageData(0,0,w,h);
        const code=window.jsQR(d.data,w,h);
        if(code&&code.data)txt=code.data;
      }
    }catch(e){}
    if(txt)_onScanPayload(txt);
  }
  if(_scanStream)_scanTimer=setTimeout(_scanTick,150);
}
function _onScanPayload(raw){
  const txt=String(raw||'').trim();
  const now=Date.now();
  if(txt===_scanLastTxt&&now-_scanLastAt<2500)return;
  _scanLastTxt=txt;_scanLastAt=now;
  const el=document.getElementById('scan-msg');
  const say=(msg,color)=>{if(el){el.textContent=msg;el.style.color=color||'var(--muted)';}};
  const m=txt.match(/^MMC-(\d+)-([0-9a-fA-F][0-9a-fA-F-]{3,7})$/);
  if(!m){say(t('scanNotFound'),'var(--red)');return;}
  const ref=m[2].toLowerCase();
  const entry=getQueue().find(e=>String(e.queueNum)===m[1]&&String(e.id).toLowerCase().startsWith(ref));
  if(!entry){say(t('scanNotFound'),'var(--red)');return;}
  const nm=entry.name||'';
  if(entry.status==='waiting'){
    try{if(navigator.vibrate)navigator.vibrate(80);}catch(e){}
    toast(t('scanFound').replace('{0}',entry.queueNum).replace('{1}',nm));
    closeScanModal();
    openModal(entry.id);
    return;
  }
  if(entry.status==='active'){say(t('scanAlreadyActive').replace('{0}',entry.queueNum).replace('{1}',nm),'#ffb347');return;}
  if(entry.status==='done'){say(t('scanDone').replace('{0}',entry.queueNum).replace('{1}',nm),'var(--muted-l)');return;}
  if(entry.status==='cancelled'){say(t('scanCancelled'),'var(--red)');return;}
  if(entry.status==='noshow'){say(t('scanNoshow'),'var(--red)');return;}
  say(t('scanNotFound'),'var(--red)');
}
