// Inventory category/brand dropdowns with a custom-add button
function _invSelHtml(id,value,addMode,options,addLabel){
  if(addMode){
    return`<div style="display:flex;gap:6px">
      <input id="${id}" type="text" value="${esc(value==='__pending__'?'':value)}" placeholder="${addLabel}" style="flex:1"
        onkeydown="if(event.key==='Enter'){event.preventDefault();_invOptSave('${id}')}">
      <button class="btn-primary" style="padding:8px 12px;flex-shrink:0" onclick="_invOptSave('${id}')">✓</button>
      <button class="btn-secondary" style="padding:8px 10px;flex-shrink:0" onclick="_invOptCancel('${id}')" aria-label="${t('cancelBtn')}">✕</button>
    </div>`;
  }
  return`<select id="${id}" onchange="_invSelChange('${id}',this.value)">
    ${options.map(o=>`<option value="${esc(o.v)}"${o.v===value?' selected':''}>${esc(o.l)}</option>`).join('')}
    <option value="__add__">+ ${addLabel}</option>
  </select>`;
}
function _invSelChange(id,val){
  if(val==='__add__'){
    if(id==='inv-cat'){S._invCatAdd=true;S._invCat='__pending__';}
    else if(id==='inv-flav'){S._invFlavAdd=true;S._invFlav='__pending__';}
    else if(id==='inv-subtype'){S._invSubtypeAdd=true;S._invSubtype='__pending__';}
    else{S._invBrandAdd=true;S._invBrand='__pending__';}
    renderInventory();setTimeout(()=>document.getElementById(id)?.focus(),50);return;
  }
  if(id==='inv-cat'){S._invCat=val;if(val==='ProteinSnacks'&&!S._invSubtype)S._invSubtype=_defaultSubtype();renderInventory();} // picking Protein Snacks reveals the Type dropdown; pre-select a type
  else if(id==='inv-subtype'){S._invSubtype=val;}
  else if(id==='inv-flav'){S._invFlav=val;}
  else{S._invBrand=val;const _list=((S.invFlavoursByBrand||{})[val||''])||[];if(S._invFlav&&!_list.includes(S._invFlav))S._invFlav='';renderInventory();} // flavours are per-brand: refresh the list, drop a flavour that doesn't belong to the new brand
}
function _defaultSubtype(){return[...PROTEIN_SUBTYPES,...(S.proteinSubtypes||[])][0]||'';}
function _invOptSave(id){
  const v=(document.getElementById(id)?.value||'').trim();
  if(!v){_invOptCancel(id);return;}
  const isSupp=(S.invSection==='supplements');
  if(id==='inv-cat'){
    const listKey=isSupp?'invCatsSupp':'invCatsEquip',lsKey=isSupp?'cq_inv_cats_supp':'cq_inv_cats_eq',presets=isSupp?SUPP_CATS:EQUIP_CATS;
    if(!presets.includes(v)&&!(S[listKey]||[]).includes(v)){S[listKey]=[...(S[listKey]||[]),v];try{localStorage.setItem(lsKey,JSON.stringify(S[listKey]));}catch(e){}}
    S._invCat=v;S._invCatAdd=false;
  }else if(id==='inv-flav'){
    if(_badFlav(v)){_invOptCancel(id);return;}
    const _bk=S._invBrand||'';const _m=S.invFlavoursByBrand||{};if(!((_m[_bk]||[]).includes(v))){_m[_bk]=[...(_m[_bk]||[]),v];S.invFlavoursByBrand=_m;try{localStorage.setItem('cq_inv_flavs_by_brand',JSON.stringify(_m));}catch(e){}}
    S._invFlav=v;S._invFlavAdd=false;
  }else if(id==='inv-subtype'){
    _rememberSubtype(v);S._invSubtype=v;S._invSubtypeAdd=false;
  }else{
    const listKey=isSupp?'invBrandsSupp':'invBrandsEquip',lsKey=isSupp?'cq_inv_brands_supp':'cq_inv_brands_eq';
    if(!(S[listKey]||[]).includes(v)){S[listKey]=[...(S[listKey]||[]),v];try{localStorage.setItem(lsKey,JSON.stringify(S[listKey]));}catch(e){}}
    S._invBrand=v;S._invBrandAdd=false;
    if(S._invFlav&&!(((S.invFlavoursByBrand||{})[v]||[]).includes(S._invFlav)))S._invFlav=''; // new brand has its own flavour list
  }
  renderInventory();
}
function _invOptCancel(id){
  if(id==='inv-cat'){S._invCatAdd=false;if(S._invCat==='__pending__')S._invCat=(S.invSection==='supplements'?'ProteinSnacks':'Helmet');}
  else if(id==='inv-flav'){S._invFlavAdd=false;if(S._invFlav==='__pending__')S._invFlav='';}
  else if(id==='inv-subtype'){S._invSubtypeAdd=false;if(S._invSubtype==='__pending__')S._invSubtype=_defaultSubtype();}
  else{S._invBrandAdd=false;if(S._invBrand==='__pending__')S._invBrand='';}
  renderInventory();
}
// Share the reorder list (low / out-of-stock items with suggested amounts) via WhatsApp so staff can send it straight to a supplier.
function _shareReorderList(){
  const sold=(typeof _itemSoldUnits==='function')?_itemSoldUnits():{};
  const ro=(S.inventory||[]).filter(i=>{const q=Number(i.qty)||0,lo=Number(i.low_threshold)||0;return q<=0||(lo>0&&q<=lo);})
    .map(i=>{const q=Number(i.qty)||0,lo=Number(i.low_threshold)||0,s=sold[i.id]||0;const need=Math.max(1,Math.ceil(Math.max(lo*2,s,4)-q));return{i,q,need};})
    .sort((a,b)=>b.need-a.need);
  if(!ro.length){toast(t('reorderNone'));return;}
  const lines=ro.map(({i,q,need})=>`- ${i.name}${i.brand?' ('+i.brand+')':''}: ${t('invQty')} ${q} → +${need}`);
  const txt=t('reorderShareTitle')+'\n\n'+lines.join('\n');
  try{window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');}catch(e){}
}

function setInvSection(v){S.invSection=v;S.showAddInv=false;S.editInvId=null;renderInventory();}

function startInvEdit(id){

async function addInvItem(){

  if(S._invPhoto){try{await sb.from('inventory').update({photo:S._invPhoto}).eq('id',item.id);}catch(e){}}
  {const _p=parseFloat(S._invPrice);const pv=S._invFree?0:((!isNaN(_p)&&_p>0)?_p:null);if(pv!=null){try{await sb.from('inventory').update({price:pv}).eq('id',item.id);}catch(e){}}}
  {const _c=parseFloat(S._invCost);if(!isNaN(_c)&&_c>=0){try{await sb.from('inventory').update({cost:_c}).eq('id',item.id);}catch(e){}}} // tolerant: no-op if the column isn't there yet

let _invAdjPend={},_invAdjTimer=null;
async function adjInv(id,delta){
  const it=(S.inventory||[]).find(x=>x.id===id);if(!it)return;
  const q=Math.max(0,(Number(it.qty)||0)+delta);
  const applied=q-(Number(it.qty)||0); // clamped at 0, so a - tap on an empty item logs nothing
  it.qty=q;renderInventory();
  // Debounced audit log: rapid +/- taps collapse into one net entry per item
  if(applied){_invAdjPend[id]=(_invAdjPend[id]||0)+applied;clearTimeout(_invAdjTimer);_invAdjTimer=setTimeout(()=>{const pend=_invAdjPend;_invAdjPend={};Object.keys(pend).forEach(iid=>{const d=pend[iid];if(!d)return;const item=(S.inventory||[]).find(x=>x.id===iid);logAction(t('logStockAdj').replace('{0}',item?item.name:iid).replace('{1}',(d>0?'+':'')+d));});},2500);}
  const{error}=await sb.from('inventory').update({qty:q,updated_at:new Date().toISOString()}).eq('id',id);
  if(error){toast(error.message,'error');await loadData();renderInventory();}
}
function toggleStockTake(){S.invCount=!S.invCount;S.invCounts={};renderInventory();}
function _stockTakeDiffs(){
  return Object.entries(S.invCounts||{}).map(([id,v])=>{
    if(v===''||v==null)return null;
    const it=(S.inventory||[]).find(x=>x.id===id);if(!it)return null;
    const to=Math.max(0,parseInt(v)||0),from=Number(it.qty)||0;
    return to!==from?{it,from,to}:null;
  }).filter(Boolean);
}
async function applyStockTake(){
  const diffs=_stockTakeDiffs();
  if(!diffs.length){toast(t('stNoChanges'),'warning');return;}
  confirmDialog({
    title:t('stStartBtn'),
    body:diffs.slice(0,10).map(d=>`${esc(d.it.name)}: ${d.from} → ${d.to}`).join('<br>')+(diffs.length>10?'<br>…':''),
    confirmLabel:t('stApplyBtn').replace('{0}',diffs.length),
    confirmClass:'btn-green',
    onConfirm:async()=>{
      for(const d of diffs){
        const res=await sb.from('inventory').update({qty:d.to,updated_at:new Date().toISOString()}).eq('id',d.it.id);
        if(_writeErr(res,'stock-take'))break; // stop on the first failure; already-applied corrections stay logged
        d.it.qty=d.to;
        logAction(t('logStockTake').replace('{0}',d.it.name).replace('{1}',d.from).replace('{2}',d.to));
      }
      S.invCount=false;S.invCounts={};
      renderInventory();
    }
  });
}
function delInvItem(id){
  if(!isAdmin()){toast(t('adminOnlyMsg'),'error');return;}

  }});
}

function setLb(k,v){S[k]=v;if(k==='lbScope')S.lbMetric=(v==='rider'?'duration':'count');renderCommunity();}
function _lbWeekStart(d){const x=new Date(d);x.setHours(0,0,0,0);x.setDate(x.getDate()-x.getDay());return x;}
function _lbInWindow(e,win,ref){
  const ds=(e.sessionDate||e.registeredAt||'').slice(0,10);if(!ds)return false;
  const d=new Date(ds+'T00:00:00');if(isNaN(d))return false;
  if(win==='all')return true;
  const now=ref||new Date();
  if(win==='week'){const s=_lbWeekStart(now);const e2=new Date(s);e2.setDate(s.getDate()+7);return d>=s&&d<e2;}
  if(win==='month')return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  return true;
}
// Aggregate completed+paid rides. scope 'owner' = booking account credited for EVERY rider it booked;
// scope 'rider' = each individual rider counted on their own.
function _lbAgg(win,scope,ref){
  const locOf=id=>{const s=(S.sessions||[]).find(x=>x.id===id);return s?s.location:null;};
  const rides=getQueue().filter(e=>e.status==='done'&&e.paid&&_lbInWindow(e,win,ref)&&(S.lbBranch==='all'||locOf(e.sessionId)===S.lbBranch));
  const map={};
  rides.forEach(e=>{
    const key=scope==='owner'?(e.customerId||('walk:'+e.id)):((e.name||'?').trim().toLowerCase());
    let m=map[key];if(!m)m=map[key]={key,name:e.name||'?',count:0,duration:0,spent:0,minQ:Infinity,weeks:new Set()};
    m.count++;m.duration+=(e.rideDuration||0);m.spent+=(e.price??DEFAULT_PRICE);
    if(scope==='owner'){if((e.queueNum||0)<m.minQ){m.minQ=e.queueNum||0;m.name=e.name||m.name;}}else{m.name=e.name||m.name;}
    const ds=(e.sessionDate||e.registeredAt||'').slice(0,10);if(ds){const w=_lbWeekStart(new Date(ds+'T00:00:00')).getTime();if(!isNaN(w))m.weeks.add(w);}
  });
  return map;
}
function _lbStreak(weeks){if(!weeks||!weeks.size)return 0;const wk=6048e5;const arr=[...weeks].sort((a,b)=>b-a);let s=1;for(let i=1;i<arr.length;i++){if(arr[i-1]-arr[i]===wk)s++;else break;}return s;}
function _riderTier(n){const tiers=[[50,'tierLegend'],[25,'tierElite'],[10,'tierPro'],[3,'tierRegular']];for(const[th,k]of tiers)if(n>=th)return t(k);return t('tierNewcomer');}

// Run-rate: project the current calendar month from the pace so far.
function _anMonthForecast(allSess,allQ,now){

  const ids=new Set((allSess||[]).filter(s=>{const d=new Date(s.session_date||s.id);return !isNaN(d.getTime())&&d.getFullYear()===y&&d.getMonth()===m;}).map(s=>s.id));

// RFM bucket from recency (days since last ride) and frequency (ride count).
function _anRFMSegment(recencyDays,freq){

// Pearson correlation between two equal-length numeric series.
function _anCorrelation(xs,ys){const n=xs.length;if(n<2)return 0;const mx=xs.reduce((a,b)=>a+b,0)/n,my=ys.reduce((a,b)=>a+b,0)/n;let num=0,dx=0,dy=0;for(let i=0;i<n;i++){const a=xs[i]-mx,b=ys[i]-my;num+=a*b;dx+=a*a;dy+=b*b;}const den=Math.sqrt(dx*dy);return den?num/den:0;}
// Fetch daily high temps for Jeddah (last ~92 days) from Open-Meteo (free, keyless); cache 24h; re-render when in.

    const j=await r.json();const days=(j&&j.daily&&j.daily.time)||[],temps=(j&&j.daily&&j.daily.temperature_2m_max)||[];

// Market-basket: count unordered product pairs that appear on the same receipt.
function _anBasketPairs(receipts){
  const pc={};
  (receipts||[]).forEach(items=>{const u=[...new Set(items)].filter(Boolean).sort();for(let i=0;i<u.length;i++)for(let j=i+1;j<u.length;j++){const k=u[i]+' + '+u[j];pc[k]=(pc[k]||0)+1;}});
  return Object.entries(pc).map(([pair,count])=>({pair,count})).sort((a,b)=>b.count-a.count).slice(0,8);
}
// Group completed rides by customer into {times:[ms…], spend} — shared by retention & LTV.
function _anCustJourneys(entries){
  const c={};
  (entries||[]).forEach(e=>{if(!e.customerId)return;const ts=new Date(e.checkedInAt||e.registeredAt||0).getTime();if(!ts)return;const j=c[e.customerId]||(c[e.customerId]={_bySess:{},spend:0});const sid=e.sessionId||('t'+ts);if(j._bySess[sid]==null||ts<j._bySess[sid])j._bySess[sid]=ts;if(e.paid)j.spend+=(e.price??DEFAULT_PRICE);try{j.spend+=addonsCost(entryAddons(e));}catch(_){}});
  Object.values(c).forEach(j=>{j.times=Object.values(j._bySess).sort((a,b)=>a-b);delete j._bySess;});
  return c;
}
// Retention curve: of riders whose first ride is ≥N days old, the % who rode again within N days.
function _anRetentionCurve(entries,nowMs){
  nowMs=nowMs||Date.now();const j=_anCustJourneys(entries);const res={};
  [7,30,90].forEach(w=>{const ms=w*86400000;let elig=0,ret=0;Object.values(j).forEach(({times})=>{const first=times[0];if(nowMs-first<ms)return;elig++;if(times.some(tt=>tt>first&&tt<=first+ms))ret++;});res[w]={eligible:elig,returned:ret,pct:elig?Math.round(ret/elig*100):0};});
  return res;
}
// Tiny inline sparkline SVG from a series of numbers.
function _anSparkline(values,color,w,h){
  w=w||120;h=h||30;const v=(values||[]).filter(x=>x!=null&&!isNaN(x));
  if(v.length<2)return'';
  const mn=Math.min(...v),mx=Math.max(...v),rng=(mx-mn)||1;
  const y=val=>(h-2-((val-mn)/rng)*(h-4));
  const pts=v.map((val,i)=>((i/(v.length-1))*w).toFixed(1)+','+y(val).toFixed(1)).join(' ');
  return`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block"><polyline points="${pts}" fill="none" stroke="${color||'var(--green)'}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${w}" cy="${y(v[v.length-1]).toFixed(1)}" r="2.4" fill="${color||'var(--green)'}"/></svg>`;
}
// Gross margin: product revenue minus cost-of-goods for sold lines that map to an item cost.
function _anMargin(lines,costById){
  let rev=0,cogs=0,haveCost=false;
  (lines||[]).forEach(l=>{if(l.cat==='__discount__'||l.cat==='__cardmeta__'||l.pay==='refunded')return;const q=Number(l.qty)||0;if(q<=0)return;rev+=q*(Number(l.price)||0);if(l.item_id!=null&&costById[l.item_id]!=null){cogs+=q*costById[l.item_id];haveCost=true;}});
  rev=Math.round(rev);cogs=Math.round(cogs);
  return{rev,cogs,profit:rev-cogs,marginPct:rev>0?Math.round((rev-cogs)/rev*100):0,haveCost};
}
// Lifetime value by first-ride month cohort: avg total spend per rider.
function _anLTVByCohort(entries){

  return Object.entries(mo).sort((a,b)=>a[0]<b[0]?1:-1).slice(0,6).map(([month,v])=>({month,customers:v.n,avgLtv:Math.round(v.spend/v.n)}));

// ── Height & bike-type report: per session, the riders' heights + count of each bike type rented.
// Respects the current analytics range and the chosen session filter.
function _anHeightBikeData(){
  let sess=[...allSessions()].sort((a,b)=>new Date(a.session_date||a.id)-new Date(b.session_date||b.id));
  const R=S.analyticsRange;
  if(R==='month'){const mo=new Date();mo.setDate(1);mo.setHours(0,0,0,0);sess=sess.filter(s=>new Date(s.session_date||s.id)>=mo);}
  else if(R==='year'){const yr=new Date().getFullYear();sess=sess.filter(s=>new Date(s.session_date||s.id).getFullYear()===yr);}
  else if(R==='daterange'){if(S.analyticsDateFrom)sess=sess.filter(s=>(s.session_date||'')>=S.analyticsDateFrom);if(S.analyticsDateTo)sess=sess.filter(s=>(s.session_date||'')<=S.analyticsDateTo);}
  if(S.anSession&&S.anSession!=='all')sess=sess.filter(s=>s.id===S.anSession);
  return sess.map(s=>{
    const riders=getQueue().filter(e=>e.sessionId===s.id&&(e.status==='done'||e.status==='active')); // only riders who actually rode (checked in / completed)
    const people=riders.filter(r=>r.height!=null&&String(r.height).trim()!=='').map(r=>{const bk=getAssignedBikes(r);const _tp=(r.typePreference&&r.typePreference!=='Any')?r.typePreference:'—';return{name:r.name||'—',height:r.height,type:bk.length?bk[0].type:_tp};}).sort((a,b)=>(Number(a.height)||0)-(Number(b.height)||0));
    // Count EVERY rider (same set as the heights list), by the bike they were assigned — or, if not
    // yet assigned, their booked type. So the type total always equals the rider/height count.
    const typeCounts={Road:0,Hybrid:0,Mountain:0};let other=0;
    people.forEach(p=>{if(typeCounts[p.type]!=null)typeCounts[p.type]++;else other++;});
    const _hs=people.map(x=>Number(x.height)).filter(h=>h>=100&&h<=250);
    const hSummary={count:_hs.length,avg:_hs.length?Math.round(_hs.reduce((a,b)=>a+b,0)/_hs.length):0,min:_hs.length?Math.min(..._hs):0,max:_hs.length?Math.max(..._hs):0};
    const hRanges=[['<160',0],['160-169',0],['170-179',0],['180+',0]];
    _hs.forEach(h=>{if(h<160)hRanges[0][1]++;else if(h<170)hRanges[1][1]++;else if(h<180)hRanges[2][1]++;else hRanges[3][1]++;});
    return{sess:s,people,typeCounts,other,rented:typeCounts.Road+typeCounts.Hybrid+typeCounts.Mountain+other,hSummary,hRanges};
  });
}

// ── Supabase Realtime: ONE channel pushes DB changes to the screen (debounced); the 30s poll is the fallback. ──
// Routes by table: bikes/inventory changes trigger a full reload (new rows + photos); everything else uses the slim
// path. Auto-reconnects with capped backoff so a dropped socket recovers instead of going silently stale.
let _rtChannel=null,_rtDebounce=null,_rtRetry=0,_rtWantFull=false;
function _rtApply(){
  if(_rtDebounce)clearTimeout(_rtDebounce);
  _rtDebounce=setTimeout(async()=>{
    if(document.hidden)return; // visibilitychange catches us up — keep _rtWantFull for it
    if(typeof window!=='undefined'&&window.__noWiden)return; // tests pin state; realtime must not reload over it
    const full=_rtWantFull;_rtWantFull=false;
    try{
      if(S.view==='staff'){await _autoRefresh(full);}
      else if(S.view==='customer'&&S.custTab==='myrides'){await(full?loadData():loadDataLight());_lastRefresh=Date.now();renderMyRides();renderLandingAvail();}
      else{renderLandingAvail();}
    }catch(e){console.warn('Realtime refresh error:',e);}
  },350);
}
function _onRt(payload){if(payload&&(payload.table==='bikes'||payload.table==='inventory'))_rtWantFull=true;_rtApply();}
function setupRealtime(){
  if(!sb||!sb.channel)return;
  try{if(_rtChannel){sb.removeChannel(_rtChannel);_rtChannel=null;}}catch(_){}
  try{
    _rtChannel=sb.channel('mmcq-live')
      .on('postgres_changes',{event:'*',schema:'public',table:'queue_entries'},_onRt)
      .on('postgres_changes',{event:'*',schema:'public',table:'sessions'},_onRt)
      .on('postgres_changes',{event:'*',schema:'public',table:'bikes'},_onRt)
      .on('postgres_changes',{event:'*',schema:'public',table:'inventory'},_onRt)
      .on('postgres_changes',{event:'*',schema:'public',table:'cashier_sales'},_onRt)
      .subscribe(status=>{
        S._rtConnected=(status==='SUBSCRIBED');
        if(status==='SUBSCRIBED'){_rtRetry=0;}
        else if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'||status==='CLOSED'){
          const delay=Math.min(30000,1000*Math.pow(2,Math.min(_rtRetry++,5))); // 1s,2s,4s…capped 30s
          setTimeout(setupRealtime,delay);
        }
        _updateConnUI();
      });
  }catch(e){console.warn('Realtime init failed:',e);}
}
_sbReady.then(()=>{try{setupRealtime();}catch(e){}});

  }catch(_){}
  try{ // does cashier_sales have customer_id? if not, sales record name-only so nothing ever fails to sync
    const{error}=await sb.from('cashier_sales').select('customer_id').limit(1);
    if(error){const m=((error.code||error.message)||'')+'';if(m.includes('42703')||/customer_id/i.test(m)||/does not exist/i.test(m))S.hasCsCust=false;}
  }catch(_){}
}
_sbReady.then(()=>{try{_probeSchema();}catch(e){}});

// ── Staff keyboard shortcuts ──
document.addEventListener('keydown',e=>{
  const tag=(e.target&&e.target.tagName||'').toLowerCase();
  if(tag==='input'||tag==='textarea'||tag==='select'||(e.target&&e.target.isContentEditable))return;
  if(e.metaKey||e.ctrlKey||e.altKey)return;
  if(S.view!=='staff')return;
  // Don't hijack keys while a modal / PIN / auth overlay is open
  if(document.querySelector('.modal-backdrop,.pin-backdrop,.auth-backdrop'))return;
  const k=e.key.toLowerCase();
  if(k==='/'){e.preventDefault();if(S.staffTab!=='queue')setStaffTab('queue');setTimeout(()=>{const el=document.getElementById('sf-search-input');if(el){el.focus();try{el.select();}catch(_){}}},60);return;}
  if(k==='n'){e.preventDefault();_kbCheckInNext();return;}
  if(k==='r'){e.preventDefault();if(typeof _autoRefresh==='function')_autoRefresh(true);return;}
  const tabKeys={b:'queue',s:'queue',i:'inventory',c:'community',a:'analytics',h:'history',l:'history'};
  if(k==='l')S.histView='log';else if(k==='h')S.histView='rides';
  if(k==='s')S.queueView='sessions';else if(k==='b')S.queueView='bookings';
  if(tabKeys[k]){e.preventDefault();setStaffTab(tabKeys[k]);return;}
});

// ── Modal accessibility: trap Tab focus inside the open dialog + Escape to close ──
function _visibleModals(){return[...document.querySelectorAll('.modal-backdrop,.pin-backdrop,.auth-backdrop')].filter(m=>m.getClientRects().length>0);}
document.addEventListener('keydown',e=>{
  if(e.key!=='Tab'&&e.key!=='Escape')return;
  const modals=_visibleModals();const modal=modals[modals.length-1];
  if(!modal)return;
  if(e.key==='Escape'){
    // Only the standard dismissible modals close on Escape (not the PIN gate / login)
    if(modal.classList.contains('modal-backdrop')){e.preventDefault();modal.click();}
    return;
  }
  const list=[...modal.querySelectorAll('a[href],button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])')].filter(el=>el.getClientRects().length>0);
  if(!list.length)return;
  const first=list[0],last=list[list.length-1],inside=modal.contains(document.activeElement);
  if(e.shiftKey&&(document.activeElement===first||!inside)){e.preventDefault();last.focus();}
  else if(!e.shiftKey&&(document.activeElement===last||!inside)){e.preventDefault();first.focus();}
});

// (Realtime is set up once above via setupRealtime(); the old second channel was removed to avoid double-fetching.)
try{window.addEventListener('online',()=>{_updateConnUI();_outboxFlush();_bookOutboxFlush();try{setupRealtime();}catch(_){}});}catch(e){} // sync queued work + re-subscribe when the connection returns
try{window.addEventListener('offline',()=>{S._rtConnected=false;_updateConnUI();});}catch(e){}
// ── Pull-to-refresh: drag down at the top of the queue / sessions / dashboard / My Rides lists to refresh ──
(function(){
  let startY=0,pulling=false,dist=0;
  function eligible(){
    if(document.querySelector('.modal-backdrop,.pin-backdrop,.auth-backdrop,.pay-menu-popup'))return false;
    if(S.view==='staff')return S.staffTab==='queue'; // covers both Bookings and Sessions sub-views
    if(S.view==='customer')return S.custTab==='myrides';
    return false;
  }
  function ind(){let e=document.getElementById('ptr-ind');if(!e){e=document.createElement('div');e.id='ptr-ind';e.innerHTML='<div class="ptr-spin" aria-hidden="true"></div>';document.body.appendChild(e);}return e;}
  function sTop(){return window.scrollY||document.documentElement.scrollTop||document.body.scrollTop||0;}
  function reset(el){el.classList.remove('ready','refreshing');el.style.transform='translateX(-50%) translateY(-64px)';el.style.opacity='0';}
  document.addEventListener('touchstart',e=>{
    if(!eligible()||sTop()>2||e.touches.length!==1){pulling=false;return;}
    startY=e.touches[0].clientY;pulling=true;dist=0;
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!pulling)return;
    const dy=e.touches[0].clientY-startY;
    if(dy<=0||sTop()>2){pulling=false;ind().style.opacity='0';return;}
    dist=Math.min(dy*0.5,90);
    if(dy>8)e.preventDefault();              // replace native rubber-band with our indicator (only when pulling down at the very top)
    const el=ind();el.style.transform=`translateX(-50%) translateY(${Math.min(dist-50,16)}px)`;el.style.opacity=String(Math.min(1,dist/60));
    el.classList.toggle('ready',dist>=60);
  },{passive:false});
  document.addEventListener('touchend',()=>{
    if(!pulling)return;pulling=false;
    const el=ind();
    if(dist>=60){
      el.classList.add('refreshing','ready');el.style.transform='translateX(-50%) translateY(14px)';el.style.opacity='1';
      Promise.resolve().then(()=>S.view==='staff'?_autoRefresh(true):loadData().then(()=>{renderMyRides();renderLandingAvail();}))
        .catch(()=>{}).finally(()=>setTimeout(()=>reset(el),450));
    }else reset(el);
    dist=0;
  },{passive:true});
})();
_sbReady.then(()=>{try{_outboxFlush();}catch(e){}try{_bookOutboxFlush();}catch(e){}});
// Background retry: flushes only fire on enqueue/online/load, so a queue that didn't drain (page opened offline, transient blip) would otherwise show "pending sync" forever. Retry every 15s while anything is pending; _outboxFlush no-ops when busy/offline/sb-missing.
try{setInterval(()=>{if(_outboxCount()||_bookOutboxCount()){_outboxFlush();_bookOutboxFlush();}},15000);}catch(e){}
// ── Global error capture: keep the last 50 errors locally, surface a throttled toast, log to a tolerant table ──
let _errToastAt=0;
let _errPingAt=0;
function _logError(msg,src,silent){
  msg=String(msg||'error').slice(0,500);src=String(src||'');
  try{const a=JSON.parse(localStorage.getItem('cq_errors')||'[]');a.push({t:new Date().toISOString(),msg,src});while(a.length>50)a.shift();localStorage.setItem('cq_errors',JSON.stringify(a));}catch(e){}
  try{console.error(msg,src);}catch(e){}
  try{if(typeof sb!=='undefined'&&sb)sb.from('error_log').insert({at:new Date().toISOString(),msg,src,ua:(navigator.userAgent||'').slice(0,200)}).then(()=>{},()=>{});}catch(e){}
  // Proactive alert ping (no-op unless the DISCORD_WEBHOOK env var is set on the Pages project). Heavily throttled.
  try{const now2=Date.now();if(navigator.onLine!==false&&now2-_errPingAt>120000){_errPingAt=now2;fetch('/api/log-error',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({msg,src,ua:(navigator.userAgent||'').slice(0,160)})}).then(()=>{},()=>{});}}catch(e){}
  if(silent)return; // telemetry-only callers (auth failures) already show their own message
  const now=Date.now();if(now-_errToastAt>15000){_errToastAt=now;try{toast(t('errSomethingWrong'),'error');}catch(e){}}
}
try{window.addEventListener('error',e=>{_logError((e&&e.message)||(e&&e.error&&e.error.message)||'error',((e&&e.filename)||'')+':'+((e&&e.lineno)||''));});}catch(e){}
try{window.addEventListener('unhandledrejection',e=>{const r=e&&e.reason;_logError((r&&(r.message||r))||'unhandledrejection','promise');});}catch(e){}
try{window._mmErrors=()=>{try{return JSON.parse(localStorage.getItem('cq_errors')||'[]');}catch(e){return[];}};}catch(e){}
// Accessibility: Escape closes the topmost open modal (z-order: team mgr / receipt edit on top, then the rest)
try{document.addEventListener('keydown',function(e){
  if(e.key!=='Escape'&&e.keyCode!==27)return;
  var order=[['team-mgr-modal','closeTeamManager'],['receipt-edit-modal','closeReceiptEdit'],['cashier-modal','closeCashierModal'],['return-pay-modal','closeReturnPayModal'],['reschedule-modal','closeRescheduleModal'],['edit-price-modal','closeEditPriceModal'],['rate-modal','closeRateModal'],['print-opts-modal','_closePrintOpts'],['bike-profile-modal','closeBikeProfile'],['bike-modal','closeModal'],['receipt-modal',''],['cust-modal',''],['auth-modal','closeAuthModal']];
  for(var i=0;i<order.length;i++){var el=document.getElementById(order[i][0]);if(el&&el.style.display&&el.style.display!=='none'){var fn=order[i][1];if(fn&&typeof window[fn]==='function'){try{window[fn]();}catch(_){el.style.display='none';}}else{el.style.display='none';el.innerHTML='';}return;}}
});}catch(e){}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('service-worker.js').catch(e=>console.warn('SW registration failed:',e));});
  // Self-updating shell: the SW messages us when a NEW deploy replaced the cached index.html.
  // If the page just opened and the user hasn't touched anything, reload silently so they run
  // the fresh build (stale builds caused 'Connection error' signups after fixes shipped).
  // Mid-session, don't yank the page away — show a toast instead.
  const _swBootAt=Date.now();let _userTouched=false;
  try{['pointerdown','keydown'].forEach(ev=>window.addEventListener(ev,()=>{_userTouched=true;},{once:true,passive:true}));}catch(e){}
  try{navigator.serviceWorker.addEventListener('message',ev=>{
    if(!ev.data||ev.data.type!=='shell-updated')return;
    if(sessionStorage.getItem('cq_upd_reload')==='1')return; // at most one auto-reload per session (no loops)
    if(Date.now()-_swBootAt<8000&&!_userTouched){try{sessionStorage.setItem('cq_upd_reload','1');}catch(e){}location.reload();return;}
    try{toast(t('updateReadyToast'));}catch(e){}
  });}catch(e){}
}
