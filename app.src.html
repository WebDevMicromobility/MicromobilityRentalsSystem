  const fmt=slotsFormat(slots);

  
  function inFleet(b){
    if(!slots)return true;
    if(fmt==='ids')return(slots._bikes||[]).includes(b.id);
    if(fmt==='counts')return(slots[b.type]||0)>0;
    
    return slots[b.type]&&(typeof slots[b.type]==='number'?(slots[b.type]>0):(slots[b.type][b.size]||0)>0);
  }

  
  const prefType=PREMIUM_TIERS[rider.typePreference]||rider.typePreference; // premium tiers are fulfilled by their base fleet type
  const sizeOrd={XS:0,S:1,M:2,L:3};
  const statusOrd={'available':0,'in-use':1,'maintenance':2};
  const sortBikes=arr=>{
    const d=S.modalSortDir;
    if(S.modalSort==='name')return[...arr].sort((a,b)=>d*a.name.localeCompare(b.name));
    if(S.modalSort==='brand')return[...arr].sort((a,b)=>{const ab=(a.brand||'').toLowerCase(),bb=(b.brand||'').toLowerCase();return d*(ab.localeCompare(bb)||(a.model||'').toLowerCase().localeCompare((b.model||'').toLowerCase()));});
    if(S.modalSort==='type')return[...arr].sort((a,b)=>d*a.type.localeCompare(b.type));
    if(S.modalSort==='size')return[...arr].sort((a,b)=>d*((sizeOrd[a.size]??99)-(sizeOrd[b.size]??99)));
    if(S.modalSort==='status')return[...arr].sort((a,b)=>d*((statusOrd[a.status]??99)-(statusOrd[b.status]??99)));
    return[...arr].sort((a,b)=>{const aFree=a.status==='available'?0:1,bFree=b.status==='available'?0:1;const aSz=a.size===rider.size?0:1,bSz=b.size===rider.size?0:1;const aFleet=inFleet(a)?0:1,bFleet=inFleet(b)?0:1;return aFree-bFree||aSz-bSz||aFleet-bFleet||a.name.localeCompare(b.name);});
  };
  const mq=(S.modalSearch||'').trim().toLowerCase();
  const matchSearch=b=>!mq||[b.name,b.brand,b.model,b.type,b.size,b.groupset].some(v=>v&&String(v).toLowerCase().includes(mq));
  const matchFilter=b=>(S.modalFilterSize==='all'||b.size===S.modalFilterSize)&&(S.modalFilterBrand==='all'||(b.brand||'')===S.modalFilterBrand)&&(S.modalFilterModel==='all'||(b.model||'')===S.modalFilterModel);
  const prefBikes=sortBikes((prefType==='Any'?allBikes:allBikes.filter(b=>b.type===prefType)).filter(b=>matchSearch(b)&&matchFilter(b)));
  const otherBikes=prefType==='Any'?[]:sortBikes(allBikes.filter(b=>b.type!==prefType&&matchSearch(b)&&matchFilter(b)));
  const otherAvail=otherBikes.filter(b=>b.status==='available').length;
  const allBrands=[...new Set(allBikes.map(b=>b.brand).filter(Boolean))].sort();
  const brandModels=[...new Set(allBikes.filter(b=>S.modalFilterBrand==='all'||(b.brand||'')===S.modalFilterBrand).map(b=>b.model).filter(Boolean))].sort();

  const thS='padding:7px 14px;text-align:left;font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-bottom:1px solid rgba(var(--tint-rgb),.08)';
  const thSort=(col,label,extra='')=>{const act=S.modalSort===col;const arr=act?(S.modalSortDir===1?' ▲':' ▼'):'';return`<th style="${thS}${extra};cursor:pointer;user-select:none${act?';color:var(--green)':''}" onclick="if(S.modalSort==='${col}'){S.modalSortDir*=-1;}else{S.modalSort='${col}';S.modalSortDir=1;}renderModal()">${label}${arr}</th>`;};
  function bikeRow(b,altType=false){
    const free=b.status==='available';
    const selIdx=S.modalBikes.indexOf(b.id);
    const sel=selIdx>=0;
    const unavail=!free&&!sel;
    const dotCls=free?'dot-green':b.status==='in-use'?'dot-orange':'dot-red';
    const statusColor=free?'var(--green)':b.status==='in-use'?'var(--orange)':'var(--red)';
    const slbl=free?t('availLabel'):b.status==='in-use'?t('inUseLabel'):t('maintLabel');
    const bikeColors=b.colors&&b.colors.length?b.colors:['#03ff89'];
    const colorDots=bikeColors.map((c,ci)=>{
      const cn=b.color_names&&b.color_names[ci]?b.color_names[ci]:'';
      return`<span title="${esc(cn)}" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${c};border:1.5px solid rgba(0,0,0,.3);flex-shrink:0"></span>`;
    }).join('');
    const sizeMatch=b.size===rider.size;
    const badges=[];
    if(sizeMatch)badges.push(`<span style="font-size:10px;font-weight:800;color:var(--green);background:rgba(var(--green-rgb),.15);padding:2px 6px;border-radius:2px;white-space:nowrap">${t('sizeMatchLabel')}</span>`);
    if(inFleet(b)&&slots)badges.push(`<span style="font-size:10px;font-weight:800;color:var(--green);background:rgba(var(--green-rgb),.1);padding:2px 6px;border-radius:2px;white-space:nowrap">${t('fleetBadge')}</span>`);
    if(altType)badges.push(`<span style="font-size:10px;font-weight:800;color:var(--muted-l);background:rgba(var(--tint-rgb),.07);padding:2px 6px;border-radius:2px;white-space:nowrap">${t('altBadge')}</span>`);
    const selCell=sel
      ?`<div style="width:22px;height:22px;border-radius:50%;background:var(--green);color:#000;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0">${selIdx+1}</div>`
      :`<div style="width:22px;height:22px;border-radius:50%;border:2px solid rgba(var(--tint-rgb),.15);flex-shrink:0"></div>`;
    const specs=[b.groupset,b.speeds?`${b.speeds}sp`:''].filter(Boolean).join(' · ')||'—';
    return`<tr style="border-bottom:1px solid rgba(var(--tint-rgb),.05);background:${sel?'rgba(var(--green-rgb),.05)':'transparent'};${unavail?'opacity:.32':'cursor:pointer'};transition:background .12s"
      ${!unavail?`onclick="pickBike('${b.id}')" onmouseover="if(!this.style.background.includes('255,137'))this.style.background='rgba(var(--tint-rgb),.025)'" onmouseout="if(!this.style.background.includes('255,137'))this.style.background='transparent'"`:''}>
      <td style="padding:10px 14px;text-align:center;width:44px">${selCell}</td>
      <td style="padding:10px 14px">
        <div style="font-weight:800;font-size:13px">${esc(b.name)}</div>
        ${badges.length?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">${badges.join('')}</div>`:''}
      </td>
      <td style="padding:10px 14px;font-size:12px;font-weight:600;color:var(--muted-l)">
        ${b.brand?`<div style="font-weight:700;color:var(--text);font-size:12px">${esc(b.brand)}</div>${b.model?`<div style="margin-top:1px">${esc(b.model)}</div>`:''}` :`<span style="color:var(--muted)">—</span>`}
      </td>
      <td style="padding:10px 14px">${typeBadge(b.type)}</td>
      <td style="padding:10px 14px;font-weight:800;font-size:13px;text-align:center">${b.size}</td>
      <td style="padding:10px 14px"><div style="display:flex;gap:3px;align-items:center">${colorDots}</div></td>
      <td style="padding:10px 14px;font-size:12px;color:var(--muted-l);font-weight:600;white-space:nowrap">${specs}</td>
      <td style="padding:10px 14px">
        <div style="display:flex;align-items:center;gap:6px;white-space:nowrap">
          <span class="avail-dot ${dotCls}" style="flex-shrink:0"></span>
          <span style="font-size:12px;font-weight:700;color:${statusColor}">${slbl}</span>
        </div>
      </td>
    </tr>`;
  }
  function bikeTable(bikes,altType){
    if(!bikes.length)return'';
    return`<div style="overflow-x:auto;border-radius:4px;border:1px solid rgba(var(--tint-rgb),.07);margin-bottom:8px">
      <table style="width:100%;border-collapse:collapse;min-width:620px">
        <thead><tr style="background:rgba(var(--tint-rgb),.025)">
          <th style="${thS}"></th>
          ${thSort('name',t('bikeNameLabel'))}
          ${thSort('brand',t('bikeBrand')+' / '+t('bikeModel'))}
          ${thSort('type',t('bikeTypeLabel'))}
          ${thSort('size',t('frameSizeLabel'),';text-align:center')}
          <th style="${thS}">${t('colColor')||'Color'}</th>
          <th style="${thS}">${t('bikeGroupset')} / Spd</th>
          ${thSort('status',t('colStatus'))}
        </tr></thead>
        <tbody>${bikes.map(b=>bikeRow(b,altType)).join('')}</tbody>
      </table>
    </div>`;
  }

  const prefEmpty=prefBikes.length===0;
  const prefSection=prefBikes.length
    ?bikeTable(prefBikes,false)
    :`<div style="color:var(--muted);font-size:13px;font-weight:700;padding:16px 0;text-align:center">${t('noBikesForType').replace('{0}',typeLabel(prefType))}</div>`;

  const otherToggle=otherAvail>0||S.modalShowAll?`
    <div style="margin-top:12px">
      <button onclick="S.modalShowAll=!S.modalShowAll;renderModal()"
        style="width:100%;padding:10px;border-radius:4px;border:1.5px dashed rgba(var(--tint-rgb),.15);
          background:rgba(var(--tint-rgb),.03);cursor:pointer;font-family:'Barlow',sans-serif;
          font-size:12px;font-weight:800;color:var(--muted);transition:all .2s"
        onmouseover="this.style.borderColor='rgba(var(--green-rgb),.35)';this.style.color='var(--green)'"
        onmouseout="this.style.borderColor='rgba(var(--tint-rgb),.15)';this.style.color='var(--muted-l)'">
        ${S.modalShowAll?t('hideOtherTypes'):`${t('showOtherTypes')} (${otherAvail} ${t('available2')})`}
      </button>
      ${S.modalShowAll?`
        <div style="display:flex;align-items:center;gap:8px;margin:12px 0 8px">
          <div style="flex:1;height:1px;background:var(--border)"></div>
          <span style="font-size:10px;font-weight:900;color:var(--muted-l);text-transform:uppercase;letter-spacing:.6px">${t('showOtherTypes').replace(/^[↓↑]\s*/,'')}</span>
          <div style="flex:1;height:1px;background:var(--border)"></div>
        </div>
        ${bikeTable(otherBikes,true)}`:''}
    </div>`:
    (prefEmpty?`<div style="margin-top:10px;font-size:12px;color:var(--muted);font-weight:600;text-align:center">${t('noOtherTypes')}</div>`:'');

  const fleetLine=slots?`<div style="font-size:12px;color:var(--muted);margin-bottom:16px">${t('sessionFleetLabel')}: ${slotsLabel(slots)}</div>`:'';
  const searchBar=`<div style="position:relative;margin-bottom:10px">
    <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted);pointer-events:none"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>
    <input id="modal-search-input" type="text" value="${esc(S.modalSearch)}"
      placeholder="${t('searchLabel')||'Search bikes...'}"
      oninput="S.modalSearch=this.value;_debRender('modal',()=>{renderModal();const i=document.getElementById('modal-search-input');if(i){i.focus();const l=(S.modalSearch||'').length;i.setSelectionRange&&i.setSelectionRange(l,l);}})"
      style="width:100%;padding:9px 12px 9px 34px;background:var(--s3);border:1px solid rgba(var(--tint-rgb),.1);border-radius:4px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;outline:none;transition:border-color .15s"
      onfocus="this.style.borderColor='rgba(var(--green-rgb),.4)'" onblur="this.style.borderColor='rgba(var(--tint-rgb),.1)'">
    ${S.modalSearch?`<button onclick="S.modalSearch='';renderModal()" aria-label="Clear search" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:2px" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">&times;</button>`:''}
  </div>`;
  const selStyle=`background:var(--s3);border:1px solid rgba(var(--tint-rgb),.1);border-radius:3px;color:var(--text);font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;padding:4px 8px;cursor:pointer;outline:none;height:30px`;
  const anyFilterActive=S.modalFilterSize!=='all'||S.modalFilterBrand!=='all'||S.modalFilterModel!=='all'||S.modalSort!=='default';
  const filterBar=`<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:12px;padding:8px 10px;background:rgba(var(--tint-rgb),.02);border:1px solid rgba(var(--tint-rgb),.06);border-radius:4px">
    <span style="font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0">${t('mfSize')}</span>
    ${['all','XS','S','M','L'].map(sz=>`<button onclick="S.modalFilterSize='${sz}';renderModal()" style="padding:3px 9px;border-radius:3px;border:1.5px solid ${S.modalFilterSize===sz?'rgba(var(--green-rgb),.6)':'rgba(var(--tint-rgb),.1)'};background:${S.modalFilterSize===sz?'rgba(var(--green-rgb),.12)':'transparent'};color:${S.modalFilterSize===sz?'var(--green)':'var(--muted-l)'};font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;cursor:pointer">${sz==='all'?'All':sz}</button>`).join('')}
    <span style="font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;margin-left:4px">${t('mfBrand')}</span>
    <select style="${selStyle}" onchange="S.modalFilterBrand=this.value;S.modalFilterModel='all';renderModal()">
      <option value="all"${S.modalFilterBrand==='all'?' selected':''}>${t('filterAll')}</option>
      ${allBrands.map(br=>`<option value="${esc(br)}"${S.modalFilterBrand===br?' selected':''}>${esc(br)}</option>`).join('')}
    </select>
    ${brandModels.length?`<span style="font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0">${t('mfModel')}</span>
    <select style="${selStyle}" onchange="S.modalFilterModel=this.value;renderModal()">
      <option value="all"${S.modalFilterModel==='all'?' selected':''}>${t('filterAll')}</option>
      ${brandModels.map(m=>`<option value="${esc(m)}"${S.modalFilterModel===m?' selected':''}>${esc(m)}</option>`).join('')}
    </select>`:''}
    ${anyFilterActive?`<button onclick="S.modalSort='default';S.modalSortDir=1;S.modalFilterSize='all';S.modalFilterBrand='all';S.modalFilterModel='all';renderModal()" style="margin-left:auto;padding:3px 10px;border-radius:3px;border:1px solid rgba(255,100,100,.3);background:rgba(255,100,100,.06);color:var(--red);font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;cursor:pointer">${t('resetFiltersBtn')}</button>`:''}
  </div>`;
  const noResults=(!prefBikes.length&&!otherBikes.length)&&(mq||S.modalFilterSize!=='all'||S.modalFilterBrand!=='all'||S.modalFilterModel!=='all')?`<div style="text-align:center;padding:28px 16px;color:var(--muted);font-size:13px;font-weight:700">${t('noResultsLabel')||'No bikes match your search.'}</div>`:'';
  const cards=`${searchBar}${filterBar}${prefSection}${noResults}${otherToggle}`;

  const isHouseRider=rider.paid&&(rider.price??DEFAULT_PRICE)===0;
  const _pbs='padding:4px 10px;border-radius:3px;border:1.5px solid;display:inline-flex;align-items:center;gap:4px;font-family:\'Barlow\',sans-serif;font-size:11px;font-weight:700;cursor:pointer;background:transparent';
  const priceWidget=S.modalPriceEdit
    ?`<span style="display:inline-flex;align-items:center;gap:4px">SAR&nbsp;<input id="modal-price-inp" type="number" min="0" step="0.5" value="${rider.price??DEFAULT_PRICE}" style="width:68px;padding:3px 8px;background:var(--s3);border:1px solid rgba(var(--tint-rgb),.2);border-radius:2px;color:var(--text);font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;outline:none" onkeydown="if(event.key==='Enter')saveModalPrice('${rider.id}')"><button onclick="saveModalPrice('${rider.id}')" style="${_pbs};color:var(--green);border-color:rgba(var(--green-rgb),.4)">${t('setBtnShort')}</button><button onclick="S.modalPriceEdit=false;renderModal()" aria-label="${t('cancelBtn')}" style="${_pbs};color:var(--muted);border-color:rgba(var(--tint-rgb),.15)">✕</button></span>`
    :`<span onclick="S.modalPriceEdit=true;renderModal()" title="${t('editPriceTip')}" style="cursor:pointer;font-size:12px;font-weight:800;color:var(--muted-l);border-bottom:1px dashed rgba(var(--tint-rgb),.25);padding-bottom:1px">SAR ${rider.price??DEFAULT_PRICE} </span>`;
  const paySection=!rider.paid
    ?`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:rgba(var(--warn-rgb),.1);border:1px solid rgba(var(--warn-rgb),.3);border-radius:4px;padding:10px 14px;margin-bottom:14px">
        <span style="font-size:16px"></span>
        <span style="font-size:12px;font-weight:800;color:var(--muted-l)">${t('payPendingWarning')} –</span>
        ${priceWidget}
        <button class="pay-toggle pending" style="font-size:11px" onclick="togglePayment('${rider.id}',true);S.modalPriceEdit=false;renderModal()"> ${t('paidLabel')}?</button>
        <button class="pay-toggle house" style="font-size:11px" onclick="togglePayment('${rider.id}','house');S.modalPriceEdit=false;renderModal()"> ${t('onTheHouseLabel')}</button>
      </div>`
    :isHouseRider
      ?`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:rgba(var(--purple-rgb),.08);border:1px solid rgba(var(--purple-rgb),.3);border-radius:4px;padding:10px 14px;margin-bottom:14px">
          <span style="font-size:16px"></span>
          <span style="font-size:12px;font-weight:800;color:var(--purple)">${t('onTheHouseLabel')}</span>
          <button class="pay-toggle pending" style="font-size:11px" onclick="togglePayment('${rider.id}','pending');S.modalPriceEdit=false;renderModal()">↩ ${t('pendingLabel')}</button>
          <button class="pay-toggle paid" style="font-size:11px" onclick="togglePayment('${rider.id}','paid');S.modalPriceEdit=false;renderModal()">✓ ${t('paidLabel')}</button>
        </div>`
      :`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:rgba(var(--green-rgb),.06);border:1px solid rgba(var(--green-rgb),.2);border-radius:4px;padding:10px 14px;margin-bottom:14px">
          <span style="font-size:13px;font-weight:800;color:var(--green)">✓ ${t('paidLabel')} –</span>
          ${priceWidget}
          <button class="pay-toggle pending" style="font-size:11px" onclick="togglePayment('${rider.id}','pending');S.modalPriceEdit=false;renderModal()">↩ ${t('pendingLabel')}</button>
          <button class="pay-toggle house" style="font-size:11px" onclick="togglePayment('${rider.id}','house');S.modalPriceEdit=false;renderModal()"> ${t('onTheHouseLabel')}</button>
        </div>`;
  const heightBadge=rider.height?`<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(110,232,154,.12);border:1px solid rgba(110,232,154,.3);border-radius:2px;padding:3px 8px;font-size:11px;font-weight:700;color:var(--green)"><bdi>${rider.height} ${t('cmUnit')}</bdi></span>`:'';

  
  if(S.modalShowAddBike&&!S.modalAddBikeLocation)S.modalAddBikeLocation=S.bkLocations[0]||'JCC';
  if(S.modalShowAddBike&&!S.modalAddBikeNumber)S.modalAddBikeNumber=String(_nextBikeNumber());
  const addBikeTypeBtns=['Road','Hybrid','Mountain','Gravel'].map(ty=>
    `<button type="button" class="toggle-btn${S.modalAddBikeType===ty?' active':''}" style="font-size:11px;padding:5px 10px"
      onclick="S.modalAddBikeType='${ty}';renderModal()">${typeLabel(ty)}</button>`).join('');
  const addBikeSizeBtns=['XS','S','M','L'].map(sz=>
    `<button type="button" class="toggle-btn${S.modalAddBikeSize===sz?' active':''}" style="font-size:11px;padding:5px 10px"
      onclick="S.modalAddBikeSize='${sz}';renderModal()">${sz}</button>`).join('');
  const modalLocOpts=(S.bkLocations||[]).map(l=>`<option value="${esc(l)}"${l===S.modalAddBikeLocation?' selected':''}>${esc(l)}</option>`).join('');
  const modalFrameOpts=FRAME_TYPES.map(f=>`<option value="${f}"${S.modalAddBikeFrame===f?' selected':''}>${t('frame'+f)}</option>`).join('');
  const modalAutoName=genBikeName(S.modalAddBikeType,S.modalAddBikeFrame,S.modalAddBikeNumber||0,S.modalAddBikeSize);
  const quickAddForm=S.modalShowAddBike?`
    <div style="margin-top:16px;padding:16px;background:rgba(var(--tint-rgb),.03);border:1.5px solid rgba(var(--tint-rgb),.1);border-radius:7px">
      <div style="font-size:13px;font-weight:800;margin-bottom:12px">${t('quickAddBikeTitle')}</div>
      <div class="form-group" style="margin-bottom:10px">
        <label style="font-size:11px">${t('bikeTypeLabel')}</label>
        <div class="toggle-group" style="margin-top:4px">${addBikeTypeBtns}</div>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap">
        <div class="form-group" style="flex:1;min-width:130px">
          <label style="font-size:11px">${t('bikeLocationLabel')}</label>
          <select onchange="S.modalAddBikeLocation=this.value;renderModal()">${modalLocOpts}</select>
        </div>
        <div class="form-group" style="flex:1;min-width:130px">
          <label style="font-size:11px">${t('bikeFrameTypeLabel')}</label>
          <select onchange="S.modalAddBikeFrame=this.value;renderModal()"><option value=""${!S.modalAddBikeFrame?' selected':''}>—</option>${modalFrameOpts}</select>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:flex-end">
        <div class="form-group" style="flex:1;min-width:110px">
          <label style="font-size:11px">${t('bikeNumberLabel')} &nbsp;<span class="label-hint">(${t('autoLabel')||'auto'})</span></label>
          <input type="text" value="${String(Number(S.modalAddBikeNumber)||0).padStart(4,'0')}" readonly style="background:var(--s2);color:var(--muted);cursor:not-allowed">
        </div>
        <div class="form-group" style="flex:1;min-width:110px">
          <label style="font-size:11px">${t('frameSizeLabel')}</label>
          <div class="toggle-group" style="margin-top:4px">${addBikeSizeBtns}</div>
        </div>

async function confirmAssign(){
  if(S.modalBikes.length===0){toast(t('errSelectBike'),'error');return;}
  const rider=getQueue().find(e=>e.id===S.modalRider);
  
  if(S.modalBikes.length>1){toast(t('errMaxOneBike'),'error');S.modalBikes=S.modalBikes.slice(0,1);return;}
  const allBikes=getBikes();
  const selected=S.modalBikes.map(id=>allBikes.find(b=>b.id===id)).filter(Boolean);
  
  const alreadyAssigned=rider?getAssignedBikeIds(rider):[];
  const needsUpdate=selected.filter(b=>!alreadyAssigned.includes(b.id));
  const unavail=needsUpdate.filter(b=>b.status!=='available');
  if(unavail.length>0){toast(`${unavail[0].name}: ${t('errBikeUnavailable')}`,'error');return;}
  const riderId=S.modalRider;
  const qn=rider?rider.queueNum:'?';const rName=rider?rider.name:'';
  const bikeNames=selected.map(b=>b.name).join(', ');
  const prevPrice=rider?rider.price:null;
  
  const priceUpdate={};
  // Reprice from the assigned bike(s) — EXCEPT for an on-the-house booking (paid, price 0):
  // overwriting its 0 with the bike price made it silently display as a normal paid ride.
  // Also EXCEPT premium tiers (e.g. Road Carbon): they're fulfilled with a base-type bike,
  // so bike-derived repricing would silently undercharge the booked premium price.
  const _onHouse=rider&&rider.paid&&(rider.price??DEFAULT_PRICE)===0;
  const _premiumTier=rider&&PREMIUM_TIERS[rider.typePreference]!=null;
  if(rider&&selected.length>0&&!_onHouse&&!_premiumTier){
    priceUpdate.price=selected.reduce((s,b)=>s+priceForBike(b),0);
  }
  const isReassign=rider&&rider.status==='active';
  
  const toFree=alreadyAssigned.filter(id=>!S.modalBikes.includes(id));
  // Atomically claim each needed bike: the conditional .eq('status','available') means only ONE device
  // can flip a given bike available->in-use. If 0 rows come back, another device grabbed it first.
  const claimed=[];
  for(const b of needsUpdate){
    let taken=false;
    try{
      const{data,error}=await sb.from('bikes').update({status:'in-use'}).eq('id',b.id).eq('status','available').select('id');
      if(error)throw error;
      taken=!!(data&&data.length>0);
    }catch(err){
      await Promise.all(claimed.map(id=>sb.from('bikes').update({status:'available'}).eq('id',id))).catch(()=>{});
      toast((err&&err.message)||t('errConnection'),'error');
      await loadData();renderModal();return;
    }
    if(!taken){
      // 0 rows is ambiguous: (a) another device grabbed it (now in-use by someone else),
      // (b) our conditional UPDATE applied but RLS wouldn't return the row via .select(), or
      // (c) the write was rejected server-side and the bike is still available. Read the bike
      // back to tell these apart instead of always blaming "bike no longer available".
      let cur=null;
      try{const{data:cd}=await sb.from('bikes').select('status').eq('id',b.id).maybeSingle();cur=cd&&cd.status;}catch(e){}
      if(cur!=='in-use'){
        // still available (or unreadable) => the write did not apply (permission/RLS), not a race
        await Promise.all(claimed.map(id=>sb.from('bikes').update({status:'available'}).eq('id',id))).catch(()=>{});
        toast(t('errCheckinRejected'),'error');
        await loadData();renderModal();return;
      }
      // bike is in-use: only a genuine conflict if ANOTHER active rider holds it; otherwise it's
      // ours (write applied, row just not returned) or an orphan we can safely take.
      await loadData();
      const heldByOther=getQueue().some(e=>e.status==='active'&&e.id!==riderId&&getAssignedBikeIds(e).includes(b.id));
      if(heldByOther){
        await Promise.all(claimed.map(id=>sb.from('bikes').update({status:'available'}).eq('id',id))).catch(()=>{});
        toast(`${b.name}: ${t('errBikeUnavailable')}`,'error');
        renderModal();return;
      }
    }
    claimed.push(b.id);
  }
  // We own every needed bike now; release any the rider is giving up (reassign case)
  if(toFree.length)await Promise.all(toFree.map(id=>sb.from('bikes').update({status:'available'}).eq('id',id))).catch(()=>{});

  let assignedVal;
  const _relClaimed=()=>Promise.all(claimed.map(id=>sb.from('bikes').update({status:'available'}).eq('id',id))).catch(()=>{});
  if(S.modalBikes.length===1){
    assignedVal=S.modalBikes[0];
    // Fresh check-in (waiting->active) is guarded on status: if another device already checked
    // this rider in, our update hits 0 rows — release the bike we claimed so it isn't left
    // in-use assigned to nobody (orphaned).
    let _q=sb.from('queue_entries').update({status:'active',assigned_bike_id:assignedVal,...priceUpdate}).eq('id',riderId);
    if(!isReassign)_q=_q.eq('status','waiting');
    const _ar=await _q.select('id');
    if(_writeErr(_ar,'check-in')){await _relClaimed();await loadData();closeModal();return;} // surface a failed check-in instead of silently closing
    if(!isReassign&&!(_ar.data&&_ar.data.length>0)){
      // 0 rows with no error: the status-guarded write either (a) actually applied but RLS didn't
      // return the row, (b) lost a real race (another device already checked this rider in), or
      // (c) was rejected server-side (rider still waiting). Re-read the rider to decide, rather
      // than always reporting "bike no longer available".
      await loadData();
      const fresh=getQueue().find(e=>e.id===riderId);
      if(fresh&&fresh.status==='active'){
        // rider is checked in. If not onto our bike, release what we claimed; either way it worked.
        if(!getAssignedBikeIds(fresh).includes(assignedVal))await _relClaimed();
        closeModal();return;
      }
      await _relClaimed();
      toast(fresh&&fresh.status==='waiting'?t('errCheckinRejected'):`${selected[0].name}: ${t('errBikeUnavailable')}`,'error');
      renderModal();return;
    }
  }else{
    
    const jsonVal=JSON.stringify(S.modalBikes);
    const{error}=await sb.from('queue_entries').update({status:'active',assigned_bike_id:jsonVal,...priceUpdate}).eq('id',riderId);
    if(error){
      
      assignedVal=S.modalBikes[0];
      await sb.from('queue_entries').update({status:'active',assigned_bike_id:assignedVal,...priceUpdate}).eq('id',riderId);
      
      S._extraBikes=S._extraBikes||{};
      S._extraBikes[riderId]=S.modalBikes;
    }else{
      assignedVal=jsonVal;
    }
  }
  try{await sb.from('queue_entries').update({checked_in_at:new Date().toISOString()}).eq('id',riderId);}catch(_){} // tolerant: exact check-in stamp
  if(rider&&rider.typePreference==='Any'&&selected.length>0){
    await sb.from('queue_entries').update({type_preference:selected[0].type}).eq('id',riderId);
  }
  await loadData();closeModal();
  if(isReassign){
    toast(t('toastBikeChanged'));
    pushUndo(`${t('undoChangeBike')} #${qn} ${rName}`,async()=>{
      const undoAssign={assigned_bike_id:alreadyAssigned.length===1?alreadyAssigned[0]:JSON.stringify(alreadyAssigned)};
      if(priceUpdate.price!=null&&prevPrice!=null)undoAssign.price=prevPrice;
      delete S._extraBikes[riderId];
      await Promise.all([
        ...needsUpdate.map(b=>sb.from('bikes').update({status:'available'}).eq('id',b.id)),
        ...toFree.map(id=>sb.from('bikes').update({status:'in-use'}).eq('id',id)),
        sb.from('queue_entries').update(undoAssign).eq('id',riderId),
      ]);
      await loadData();renderStaffQueue();
    });
  }else{
    toast(`${bikeNames} ${t('toastAssignedChecked')}`);
    try{localStorage.setItem('cq_ct_'+riderId,Date.now());}catch(e){}
    pushUndo(`${t('undoCheckin')} #${qn} ${rName}`,async()=>{
      try{localStorage.removeItem('cq_ct_'+riderId);}catch(e){}
      const undoEntry={status:'waiting',assigned_bike_id:null};
      if(priceUpdate.price!=null&&prevPrice!=null)undoEntry.price=prevPrice;
      await Promise.all([
        ...needsUpdate.map(b=>sb.from('bikes').update({status:'available'}).eq('id',b.id)),
        sb.from('queue_entries').update(undoEntry).eq('id',riderId),
      ]);
      await loadData();renderStaffQueue();
    });
  }
  S._flashId=riderId;S._flashColor='green';setTimeout(()=>{S._flashId=null;},800);
  renderStaffQueue();
}

            `<option value="75"${sel==='75'?' selected':''}>SAR 75</option>`,
            `<option value="95"${sel==='95'?' selected':''}>SAR 95</option>`,
            `<option value="105"${sel==='105'?' selected':''}>SAR 105</option>`,
            `<option value="175"${sel==='175'?' selected':''}>SAR 175 - ${t('priceVipDiscount')}</option>`,
            `<option value="250"${sel==='250'?' selected':''}>SAR 250</option>`,
            `<option value="custom"${sel==='custom'?' selected':''}>${t('priceCustomOpt')}</option>`,
          ].join('');
          return`<select id="bk-rental-price" onchange="setBkRentalPrice(this.value)">${opts}</select>`
            +(isCustom?`<div style="font-size:12px;color:var(--green);font-weight:700;margin-top:5px">${t('customWord')}: SAR ${S._bkRentalPrice}</div>`:'');
        })()}
      </div>
    </div>
    <div class="form-group" style="margin-bottom:16px"><label>${t('bikeTypeLabel')}</label><div class="toggle-group">${bkTypeBtns}</div></div>
    <div class="form-group" style="margin-bottom:16px">
      <label>${t('bikeColorsLabel')} &nbsp;<span class="label-hint">${t('colorsHint')}</span></label>
      <div class="color-builder">
        <div id="color-prev" style="display:flex;gap:8px;align-items:center;padding:6px 0">${S.addBikeColors.map(c=>`<span style="display:inline-block;width:28px;height:28px;border-radius:50%;background:${c};border:2px solid rgba(0,0,0,.3);flex-shrink:0"></span>`).join('')}</div>
        <div class="color-slots">${colorSlots}${addColorBtn}</div>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label>${t('profilePhotoLabel')}</label>
      <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
        ${S._bkPhoto?`<img loading="lazy" decoding="async" src="${esc(S._bkPhoto)}" alt="" style="width:54px;height:54px;border-radius:4px;object-fit:cover;border:1px solid var(--border)">`:''}
        <label class="btn-secondary" style="font-size:12px;padding:8px 14px;cursor:pointer;margin:0">${t('uploadPhotoBtn')}<input type="file" accept="image/*" style="display:none" onchange="pickImage(this,u=>{S._bkPhoto=u;renderBikes();},480)"></label>
        ${S._bkPhoto?`<button class="btn-secondary" style="font-size:12px;padding:8px 12px" onclick="S._bkPhoto='';renderBikes()">${t('removePhotoBtn')}</button>`:''}
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-primary" onclick="${isEdit?'saveBikeEdit()':'addBike()'}"> ${isEdit?t('saveBikeBtn'):t('addBikeBtn')}</button>
      <button class="btn-secondary" onclick="cancelBikeForm()">${t('cancelBtn')}</button>
    </div>
  </div>`:'';
  
  const sortOrder={available:0,'in-use':1,maintenance:2,retired:3};
  const sizeOrder={XS:0,S:1,M:2,L:3};

  
  const bikeUserMap={};
  getQueue().filter(e=>e.status==='active').forEach(e=>{
    getAssignedBikeIds(e).forEach(bid=>{if(!bikeUserMap[bid])bikeUserMap[bid]=e;});
  });

  function renderBikeRow(b){
    const isRetired=b.status==='retired'||b.status==='maintenance';
    const isMaint=b.status==='maintenance';
    const sel=(S.bkSelected||[]).includes(b.id);
    const dot=b.status==='available'?'dot-green':b.status==='in-use'?'dot-blue':isMaint?'dot-orange':'dot-red';
    const slbl=b.status==='available'?t('availLabel'):b.status==='in-use'?t('inUseLabel'):isMaint?t('maintLabel'):t('retiredLabel');
    const sclr=b.status==='available'?'var(--green)':b.status==='in-use'?'var(--blue)':isMaint?'var(--orange)':'var(--red)';
    const colors=b.colors&&b.colors.length?b.colors:['#03ff89'];
    const colorSwatches=colors.map((c,ci)=>{
      const cn=b.color_names&&b.color_names[ci]?b.color_names[ci]:'';
      return`<div style="display:flex;flex-direction:column;align-items:center;gap:3px">
        <span title="${esc(cn)}" style="display:inline-block;width:13px;height:13px;border-radius:50%;background:${c};border:1.5px solid rgba(0,0,0,.3);flex-shrink:0"></span>
        ${cn?`<span style="font-size:9px;font-weight:700;color:var(--muted-l);white-space:nowrap;max-width:40px;overflow:hidden;text-overflow:ellipsis">${esc(cn)}</span>`:''}
      </div>`;
    }).join('');
    
    const user=bikeUserMap[b.id];
    const orphaned=b.status==='in-use'&&!user;
    const el=b.status==='in-use'&&user?rideElapsed(user.id):null;
    const riderCell=user
      ?`<div style="font-size:12px;font-weight:800;color:var(--text)">${esc(user.name)}</div>
        <div style="font-size:11px;color:var(--blue);font-weight:700">#${user.queueNum}${el?` &nbsp;·&nbsp; <span style="color:var(--muted-l)">${el}</span>`:''}</div>`
      :orphaned
        ?`<div style="font-size:11px;font-weight:700;color:#e08828">${t('noRiderAssigned')}</div>`
        :`<span style="color:var(--muted)">—</span>`;
    const rowBorderClr=orphaned?'rgba(var(--warn-rgb),.7)':b.status==='available'?'rgba(var(--green-rgb),.45)':b.status==='in-use'?'rgba(var(--blue-rgb),.45)':'rgba(var(--red-rgb),.45)';
    const rowBg=orphaned?'background:rgba(var(--warn-rgb),.06);':b.status==='in-use'?'background:rgba(var(--blue-rgb),.025);':isRetired?'background:rgba(var(--red-rgb),.025);opacity:.75;':'';
    return`<tr style="border-left:3px solid ${rowBorderClr};${rowBg}${sel?'background:rgba(var(--green-rgb),.07);':''}">
      <td style="text-align:center"><input type="checkbox" aria-label="${esc(b.name)}" ${sel?'checked':''} onclick="_bkToggleSel('${b.id}')"></td>
      <td><div style="display:flex;align-items:center;gap:10px">${b.photo?`<img loading="lazy" decoding="async" src="${esc(b.photo)}" alt="" style="width:38px;height:38px;border-radius:3px;object-fit:cover;border:1px solid var(--border);flex-shrink:0">`:''}<button type="button" onclick="openBikeProfile('${b.id}')" title="${esc(b.name)}" style="background:none;border:none;padding:8px 6px;margin:-8px -6px;cursor:pointer;text-align:start;font:inherit;color:var(--text)"><span class="rider-name" style="text-decoration:underline;text-decoration-color:rgba(var(--tint-rgb),.2);text-underline-offset:2px">${esc(b.name)}</span></button></div></td>
      <td style="font-weight:700;font-size:13px">${b.brand?esc(b.brand):`<span style="color:var(--muted)">—</span>`}</td>
      <td style="font-weight:700;font-size:13px">${b.model?esc(b.model):`<span style="color:var(--muted)">—</span>`}</td>
      <td style="font-weight:700;font-size:13px">${b.groupset?esc(b.groupset):`<span style="color:var(--muted)">—</span>`}</td>
      <td style="font-weight:700;font-size:13px;text-align:center">${b.speeds?`${b.speeds}`:`<span style="color:var(--muted)">—</span>`}</td>
      <td>${typeBadge(b.type)}</td>
      <td style="font-weight:800">${b.size}</td>
      <td style="font-weight:700;white-space:nowrap">${b.rental_price!=null?`SAR ${b.rental_price}`:`<span style="color:var(--muted)">—</span>`}</td>
      <td><div style="display:flex;gap:4px;align-items:center">${colorSwatches}</div></td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="avail-dot ${dot}" style="display:inline-block;flex-shrink:0"></span>
          <span style="color:${sclr};font-weight:700;font-size:12px">${slbl}</span>
        </div>
      </td>
      <td>${riderCell}</td>
      <td><div class="actions-cell">
        <button class="btn-sm btn-green" onclick="startEdit('${b.id}')">${t('editBtn')}</button>
        ${b.status==='available'?`<button class="btn-sm btn-muted" onclick="setMaintenance('${b.id}')">${t('maintBtn')}</button>`:''}
        ${orphaned?`<button class="btn-sm btn-muted" onclick="releaseBike('${b.id}')">${t('releaseBikeBtn')}</button>`:`<button class="btn-sm btn-${isRetired?'green':'muted'}" onclick="${isMaint?`setMaintenance('${b.id}')`:`toggleRetire('${b.id}')`}">${isRetired?t('restoreBtn'):t('retireBtn')}</button>`}
        <button class="btn-sm btn-red" ${b.status!=='in-use'&&!isRetired?`onclick="delBike('${b.id}')"`:' disabled'}>${t('deleteBtn')}</button>
      </div></td>
    </tr>`;
  }

  function sortDir(col){return S.bkSortCol===col?S.bkSortDir:0;}
  function sortHdr(col,label){
    const d=sortDir(col);
    const arrow=d===1?' ↑':d===-1?' ↓':'';
    return`<th style="cursor:pointer;user-select:none;white-space:nowrap${d?';color:var(--green)':''}" onclick="S.bkSortDir=(S.bkSortCol==='${col}'&&S.bkSortDir===1)?-1:1;S.bkSortCol='${col}';renderBikes()">${label}${arrow}</th>`;
  }

  function renderBikeGrid(typeBikes){
    if(!typeBikes.length)return`<div class="empty-state">${t('noBikes')}</div>`;
    return`<div class="bike-grid">${typeBikes.map(b=>{
      const isMaintG=b.status==='maintenance';
      const dot=b.status==='available'?'dot-green':b.status==='in-use'?'dot-blue':isMaintG?'dot-orange':'dot-red';
      const user=bikeUserMap[b.id];
      const orphaned=b.status==='in-use'&&!user;
      const sclr=b.status==='available'?'var(--green)':b.status==='in-use'?'var(--blue)':isMaintG?'var(--orange)':'var(--red)';
      const borderClr=orphaned?'rgba(var(--warn-rgb),.7)':b.status==='available'?'rgba(var(--green-rgb),.4)':b.status==='in-use'?'rgba(var(--blue-rgb),.4)':'rgba(var(--red-rgb),.4)';
      const isRetiredG=b.status==='retired'||b.status==='maintenance';
      const bgStyle=orphaned?'background:rgba(var(--warn-rgb),.06);':b.status==='in-use'?'background:rgba(var(--blue-rgb),.025);':isRetiredG?'background:rgba(var(--red-rgb),.025);opacity:.75;':'';
      const colors=b.colors&&b.colors.length?b.colors:['#03ff89'];
      const dots=colors.map(c=>`<span style="width:11px;height:11px;border-radius:50%;background:${c};border:1.5px solid rgba(0,0,0,.3);display:inline-block;flex-shrink:0"></span>`).join('');
      const el=b.status==='in-use'&&user?rideElapsed(user.id):null;
      return`<div class="bike-grid-card" style="border-color:${borderClr};${bgStyle}">
        ${b.photo?`<img loading="lazy" decoding="async" src="${esc(b.photo)}" alt="" style="width:100%;height:110px;border-radius:4px;object-fit:cover;border:1px solid var(--border);margin-bottom:8px">`:''}
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:6px">
          <button type="button" onclick="openBikeProfile('${b.id}')" style="background:none;border:none;padding:8px 6px;margin:-8px -6px;cursor:pointer;text-align:start;font-weight:900;font-size:13px;line-height:1.3;color:var(--text)"><span style="text-decoration:underline;text-decoration-color:rgba(var(--tint-rgb),.2);text-underline-offset:2px">${esc(b.name)}</span></button>
          <div style="display:flex;gap:3px;flex-shrink:0">${dots}</div>
        </div>
        <div style="display:flex;gap:5px;align-items:center;margin-bottom:8px;flex-wrap:wrap">
          ${typeBadge(b.type)}
          <span style="background:var(--s3);border:1px solid rgba(var(--tint-rgb),.08);border-radius:2px;padding:2px 8px;font-size:10px;font-weight:800;color:var(--muted-l)">${b.size}</span>
        </div>
        <div style="display:flex;align-items:center;gap:5px${(user||orphaned)?';margin-bottom:5px':''}">
          <span class="avail-dot ${dot}" style="display:inline-block;flex-shrink:0"></span>
          <span style="color:${sclr};font-weight:700;font-size:12px">${b.status==='available'?t('availLabel'):b.status==='in-use'?t('inUseLabel'):isMaintG?t('maintLabel'):t('retiredLabel')}</span>
          ${el?`<span style="font-size:10px;color:var(--blue);font-weight:700;margin-left:2px"> ${el}</span>`:''}
        </div>
        ${user?`<div style="font-size:11px;font-weight:700;color:var(--green)">#${user.queueNum} ${esc(user.name)}</div>`:orphaned?`<div style="font-size:11px;font-weight:700;color:#e08828">${t('noRiderAssigned')}</div>`:''}
        <div style="display:flex;flex-direction:column;gap:4px;margin-top:10px">
          <div style="display:flex;gap:4px">
            <button class="btn-sm btn-green" style="flex:1" onclick="startEdit('${b.id}')">${t('editBtn')}</button>
            <button class="btn-sm btn-red" style="flex:1" ${b.status!=='in-use'&&!isRetiredG?`onclick="delBike('${b.id}')"`:' disabled'}>${t('deleteBtn')}</button>
          </div>
          ${orphaned?`<button class="btn-sm btn-muted" style="width:100%;justify-content:center;text-align:center" onclick="releaseBike('${b.id}')">${t('releaseBikeBtn')}</button>`:`<button class="btn-sm btn-${isRetiredG?'green':'muted'}" style="width:100%;justify-content:center;text-align:center" onclick="toggleRetire('${b.id}')">${isRetiredG?t('restoreBtn'):t('retireBtn')}</button>`}
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  function renderTypeSection(ty,color){
    if(S.bkTypeFilter!=='all'&&S.bkTypeFilter!==ty) return '';
    // A type with zero bikes ever added gets a compact one-line prompt instead of a full
    // empty header+table, so a fresh fleet doesn't force scrolling past several blank tables.
    if(!bkSearch&&S.bkStatus==='all'&&S.bkSize==='all'&&!bikes.some(b=>b.type===ty)){
      return`<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:4px;height:20px;border-radius:3px;background:${color};flex-shrink:0"></div>
          <div style="font-size:14px;font-weight:800">${typeLabel(ty)}</div>
          <div style="font-size:12px;color:var(--muted)">${t('noBikes')}</div>
        </div>
        <button class="btn-secondary" style="font-size:12px;padding:6px 12px"
          onclick="S.showAddBike=true;S.addBikeType='${ty}';S.editBikeId=null;S.addBikeSize='M';S.addBikeColors=['#03ff89'];S.addBikeColorNames=[''];S._bkName='';S._bkFrame='';S._bkLocationAdd=false;S._bkLocation=S.bkLocations[0]||'JCC';S._bkNumber=String(_nextBikeNumber());renderBikes();_scrollToBikeForm()">
          + ${typeLabel(ty)}
        </button>
      </div>`;
    }
    let typeBikes=bikes.filter(b=>b.type===ty);
    // Status-aware: 'all' hides retired+maintenance; a specific status (incl. maintenance/retired) shows only that
    if(S.bkStatus==='all') typeBikes=typeBikes.filter(b=>b.status!=='retired'&&b.status!=='maintenance');
    else                   typeBikes=typeBikes.filter(b=>b.status===S.bkStatus);
    if(S.bkSize!=='all')   typeBikes=typeBikes.filter(b=>b.size===S.bkSize);
    if(bkSearch){
      const q=bkSearch.toLowerCase();
      typeBikes=typeBikes.filter(b=>[b.name,b.brand,b.model,b.groupset,b.size,b.type].some(v=>v&&String(v).toLowerCase().includes(q)));
    }
    const col=S.bkSortCol||'name';const dir=S.bkSortDir||1;
    typeBikes.sort((a,b)=>{
      let v=0;
      if(col==='name')    v=a.name.localeCompare(b.name);
      else if(col==='brand')   v=(a.brand||'').localeCompare(b.brand||'');
      else if(col==='model')   v=(a.model||'').localeCompare(b.model||'');
      else if(col==='groupset')v=(a.groupset||'').localeCompare(b.groupset||'');
      else if(col==='speeds')  v=(a.speeds||0)-(b.speeds||0);
      else if(col==='size')    v=(sizeOrder[a.size]??9)-(sizeOrder[b.size]??9);
      else if(col==='status')  v=(sortOrder[a.status]??9)-(sortOrder[b.status]??9);
      return v!==0?v*dir:a.name.localeCompare(b.name);
    });
    const all=bikes.filter(b=>b.type===ty&&b.status!=='retired'&&b.status!=='maintenance');
    const tyAvail=all.filter(b=>b.status==='available').length;
    const tyUse  =all.filter(b=>b.status==='in-use').length;
    const headCount=S.bkStatus==='all'?all.length:typeBikes.length;
    const _vis=typeBikes.map(b=>b.id);
    const _allSel=_vis.length>0&&_vis.every(id=>(S.bkSelected||[]).includes(id));
    const _selHdr=`<th style="width:34px;text-align:center"><input type="checkbox" aria-label="${t('bkSelectAll')}" title="${t('bkSelectAll')}" ${_allSel?'checked':''} onclick="_bkSelectMany(${esc(JSON.stringify(_vis))},this.checked)"></th>`;
    const typeContent=S.bkView==='grid'
      ?renderBikeGrid(typeBikes)
      :`<div class="table-wrapper" style="overflow-x:auto;max-width:100%;-webkit-overflow-scrolling:touch"><table class="queue-table" style="min-width:560px">
        <thead><tr>
          ${_selHdr}
          ${sortHdr('name',t('bikeNameLabel'))}
          ${sortHdr('brand',t('bikeBrand'))}
          ${sortHdr('model',t('bikeModel'))}
          ${sortHdr('groupset',t('bikeGroupset'))}
          ${sortHdr('speeds',t('bikeSpeeds'))}
          <th>${t('bikeTypeLabel')}</th>
          ${sortHdr('size',t('frameSizeLabel'))}
          <th>${t('bikeRentalPrice')}</th>
          <th>${t('colColor')}</th>
          ${sortHdr('status',t('colStatus'))}
          <th>${t('colRider')}</th>
          <th>${t('colManageBike')}</th>
        </tr></thead>
        <tbody>${typeBikes.length?typeBikes.map(renderBikeRow).join(''):`<tr><td colspan="13" style="padding:16px 0">${emptyIllustration(ILLUS_BIKE_OK,t('noBikes'))}</td></tr>`}</tbody>
      </table></div>`;
    return`<div style="margin-bottom:28px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:4px;height:32px;border-radius:3px;background:${color};flex-shrink:0"></div>
          <div>
            <div style="font-size:17px;font-weight:900">${typeLabel(ty)}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px;font-weight:600">
              <bdi>${all.length} ${t('bikesWord')}</bdi> &nbsp;·&nbsp;
              <bdi style="color:var(--green)">${tyAvail} ${t('availLabel').toLowerCase()}</bdi>
              ${tyUse>0?` &nbsp;·&nbsp; <bdi style="color:var(--muted-l)">${tyUse} ${t('inUseLabel').toLowerCase()}</bdi>`:''}
            </div>
          </div>
        </div>
        <button class="btn-secondary" style="font-size:12px;padding:6px 12px"
          onclick="S.showAddBike=true;S.addBikeType='${ty}';S.editBikeId=null;S.addBikeSize='M';S.addBikeColors=['#03ff89'];S.addBikeColorNames=[''];S._bkName='';S._bkFrame='';S._bkLocationAdd=false;S._bkLocation=S.bkLocations[0]||'JCC';S._bkNumber=String(_nextBikeNumber());renderBikes();_scrollToBikeForm()">
          + ${typeLabel(ty)}
        </button>
      </div>
      ${typeContent}
    </div>`;
  }

  const typeColorMap={Road:'#4aa8f8',Hybrid:'#03ff89',Mountain:'#e08828',Gravel:'#a06af0'};
  const typeSections=['Road','Hybrid','Mountain','Gravel'].map(ty=>renderTypeSection(ty,typeColorMap[ty])).join('');
  const retiredBikes=bikes.filter(b=>b.status==='retired'||b.status==='maintenance');
  // Only show the collapsed graveyard in the default 'all' view — a specific status filter shows those bikes inline instead
  const retiredSection=(retiredBikes.length&&S.bkStatus==='all')?`<div style="margin-bottom:28px">
    <button onclick="S.bkShowRetired=!S.bkShowRetired;renderBikes()" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(var(--tint-rgb),.02);border:1.5px solid rgba(var(--tint-rgb),.07);border-radius:6px;cursor:pointer;font-family:'Barlow',sans-serif;transition:border-color .2s" onmouseover="this.style.borderColor='rgba(var(--tint-rgb),.15)'" onmouseout="this.style.borderColor='rgba(var(--tint-rgb),.07)'">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:4px;height:24px;border-radius:3px;background:rgba(160,160,160,.4);flex-shrink:0"></div>
        <div style="font-size:15px;font-weight:900;color:var(--muted-l)">${t('retiredLabel')} &amp; ${t('maintLabel')}</div>
        <div style="background:rgba(var(--tint-rgb),.07);border-radius:2px;padding:2px 8px;font-size:11px;font-weight:800;color:var(--muted)">${retiredBikes.length}</div>
      </div>
      <span style="font-size:16px;color:var(--muted)">${S.bkShowRetired?'▲':'▼'}</span>
    </button>
    ${S.bkShowRetired?`<div style="margin-top:10px">
      ${S.bkView==='grid'
        ?`<div class="bike-grid" style="opacity:.75">${retiredBikes.map(b=>{
          const colors=b.colors&&b.colors.length?b.colors:['#03ff89'];
          const dots=colors.map(c=>`<span style="width:11px;height:11px;border-radius:50%;background:${c};border:1.5px solid rgba(0,0,0,.3);display:inline-block;flex-shrink:0"></span>`).join('');
          return`<div class="bike-grid-card" style="border-color:rgba(160,160,160,.2)">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:6px">
              <div style="font-weight:900;font-size:13px;line-height:1.3;color:var(--muted-l)">${esc(b.name)}</div>
              <div style="display:flex;gap:3px;flex-shrink:0">${dots}</div>
            </div>
            <div style="display:flex;gap:5px;align-items:center;margin-bottom:8px;flex-wrap:wrap">
              ${typeBadge(b.type)}
              <span style="background:var(--s3);border:1px solid rgba(var(--tint-rgb),.08);border-radius:2px;padding:2px 8px;font-size:10px;font-weight:800;color:var(--muted-l)">${b.size}</span>
            </div>

// Smoothly bring the bike add/edit form into view (offset for the 64px sticky topbar)

    const top=f.getBoundingClientRect().top+window.pageYOffset-80;
    try{window.scrollTo({top:Math.max(0,top),behavior:_sb()});}catch(e){window.scrollTo(0,Math.max(0,top));}

function toggleAddBike(){_resetBikeForm();S._bkNumber=String(_nextBikeNumber());S.showAddBike=true;renderBikes();_scrollToBikeForm();}

function _todayISO(){return new Date().toLocaleDateString('en-CA');}
function _bikeLifespan(b){
  const s=b.in_service_date||'',e=b.retired_date||'';
  if(!s&&!e)return '—';
  const fmt=d=>d?shortDate(d):'?';
  let days='';
  if(s&&e){const d=Math.max(0,Math.round((new Date(e)-new Date(s))/86400000));days=` · ${d} ${t('daysLabel')||'days'}`;}
  return `${fmt(s)} → ${fmt(e)}${days}`;
}
async function addBike(){
  const size=document.getElementById('bk-size').value||'M';
  const brandRaw=document.getElementById('bk-brand')?.value.trim();
  const brand=(brandRaw&&brandRaw!=='__add__')?brandRaw:null;
  const modelRaw=document.getElementById('bk-model')?.value.trim();
  const model=(modelRaw&&modelRaw!=='__add__')?modelRaw:null;
  const groupsetRaw=document.getElementById('bk-groupset')?.value.trim();
  const groupset=(groupsetRaw&&groupsetRaw!=='__add__')?groupsetRaw:null;
  const speedsRaw=document.getElementById('bk-speeds')?.value.trim();
  const speeds=speedsRaw?parseInt(speedsRaw)||null:null;
  if(!S.addBikeType){toast(t('errBikeTypeReq'),'error');return;}
  if(!S._bkFrame){toast(t('errBikeFrameReq'),'error');return;}
  const location=(document.getElementById('bk-location')?.value||S._bkLocation||'').trim();
  if(!location||location==='__add__'){toast(t('errBikeLocationReq'),'error');return;}
  const bikeNum=parseInt(document.getElementById('bk-number')?.value||S._bkNumber||'');
  if(!bikeNum||bikeNum<1){toast(t('errBikeNumberReq'),'error');return;}
  if(getBikes().some(b=>Number(b.bike_number)===bikeNum)){toast(t('errBikeNumberDup'),'error');return;}
  const customName=(document.getElementById('bk-name')?.value||'').trim();
  const name=customName||genBikeName(S.addBikeType,S._bkFrame,bikeNum,size);
  _autoSaveBkOpts(brand,model,groupset);
  const colorNames=S.addBikeColorNames.slice(0,S.addBikeColors.length).map(n=>n||'');
  const rentalPrice=S._bkRentalPrice?parseFloat(S._bkRentalPrice)||null:null;
  const startDate=(document.getElementById('bk-start')?.value||S._bkStartDate||_todayISO());
  const bike={id:uid(),name,size,type:S.addBikeType,colors:[...S.addBikeColors],color_names:colorNames,status:'available',brand,model,groupset,speeds,rental_price:rentalPrice,location,frame_type:S._bkFrame,bike_number:bikeNum,in_service_date:startDate,retired_date:null};
  let{error:insErr}=await sb.from('bikes').insert(bike);
  // Race/unique-violation guard: another bike grabbed this number — retry once with a fresh number
  if(insErr){
    await loadData();
    const retryNum=_nextBikeNumber();
    bike.bike_number=retryNum;bike.name=customName||genBikeName(S.addBikeType,S._bkFrame,retryNum,size);
    ({error:insErr}=await sb.from('bikes').insert(bike));
    if(insErr){toast(insErr.message||t('errBikeNumberDup'),'error');return;}
  }
  // Photo saved separately so a missing 'photo' column can't block adding a bike
  if(S._bkPhoto){try{await sb.from('bikes').update({photo:S._bkPhoto}).eq('id',bike.id);}catch(e){}}
  await loadData();
  _resetBikeForm();
  toast(`${bike.name} ${t('toastAddedToFleet')}`);
  pushUndo(`${t('undoAddBike')} ${name}`,async()=>{
    await sb.from('bikes').delete().eq('id',bike.id);
    await loadData();renderBikes();
  });
  renderBikes();
}
function startEdit(id){
  const bike=getBikes().find(b=>b.id===id);if(!bike)return;
  S.editBikeId=id;S.showAddBike=false;S.addBikeType=bike.type;S.addBikeSize=bike.size;
  S.addBikeColors=bike.colors&&bike.colors.length?[...bike.colors]:['#6ee89a'];
  S.addBikeColorNames=bike.color_names&&bike.color_names.length?[...bike.color_names]:S.addBikeColors.map(()=>''); // map the DEFAULTED colors — bike.colors may be undefined (legacy/imported bike) and would crash
  S._bkName=bike.name;S._bkNameCustom=bike.name!==genBikeName(bike.type,bike.frame_type,bike.bike_number,bike.size);S._bkBrand=bike.brand||'';S._bkModel=bike.model||'';
  S._bkGroupset=bike.groupset||'';S._bkSpeeds=bike.speeds!=null?String(bike.speeds):'';S._bkRentalPrice=bike.rental_price!=null?String(bike.rental_price):'';
  S._bkBrandAdd=false;S._bkModelAdd=false;S._bkGroupsetAdd=false;
  S._bkLocation=bike.location&&S.bkLocations.includes(bike.location)?bike.location:(S.bkLocations[0]||'JCC');
  S._bkLocationAdd=false;S._bkFrame=bike.frame_type||'';S._bkNumber=bike.bike_number!=null?String(bike.bike_number):'';
  S._bkStartDate=bike.in_service_date||'';S._bkPhoto=bike.photo||'';
  _autoSaveBkOpts(bike.brand,bike.model,bike.groupset);
  renderBikes();_scrollToBikeForm();
}
async function saveBikeEdit(){
  const size=document.getElementById('bk-size').value||'M';
  const brandRaw=document.getElementById('bk-brand')?.value.trim();
  const brand=(brandRaw&&brandRaw!=='__add__')?brandRaw:null;
  const modelRaw=document.getElementById('bk-model')?.value.trim();
  const model=(modelRaw&&modelRaw!=='__add__')?modelRaw:null;
  const groupsetRaw=document.getElementById('bk-groupset')?.value.trim();
  const groupset=(groupsetRaw&&groupsetRaw!=='__add__')?groupsetRaw:null;
  const speedsRaw=document.getElementById('bk-speeds')?.value.trim();
  const speeds=speedsRaw?parseInt(speedsRaw)||null:null;
  if(!S.addBikeType){toast(t('errBikeTypeReq'),'error');return;}
  if(!S._bkFrame){toast(t('errBikeFrameReq'),'error');return;}
  const location=(document.getElementById('bk-location')?.value||S._bkLocation||'').trim();
  if(!location||location==='__add__'){toast(t('errBikeLocationReq'),'error');return;}
  const bikeNum=parseInt(document.getElementById('bk-number')?.value||S._bkNumber||'');
  if(!bikeNum||bikeNum<1){toast(t('errBikeNumberReq'),'error');return;}
  if(getBikes().some(b=>b.id!==S.editBikeId&&Number(b.bike_number)===bikeNum)){toast(t('errBikeNumberDup'),'error');return;}
  const name=(document.getElementById('bk-name')?.value||'').trim()||genBikeName(S.addBikeType,S._bkFrame,bikeNum,size);
  _autoSaveBkOpts(brand,model,groupset);
  const b=getBikes();const existing=b.find(x=>x.id===S.editBikeId);if(!existing)return;
  const editColorNames=S.addBikeColorNames.slice(0,S.addBikeColors.length).map(n=>n||'');
  const rentalPrice=S._bkRentalPrice?parseFloat(S._bkRentalPrice)||null:null;
  const startDate=(document.getElementById('bk-start')?.value||S._bkStartDate||existing.in_service_date||_todayISO());
  const prev={name:existing.name,size:existing.size,type:existing.type,colors:[...existing.colors],color_names:[...(existing.color_names||[])],status:existing.status,brand:existing.brand||null,model:existing.model||null,groupset:existing.groupset||null,speeds:existing.speeds||null,rental_price:existing.rental_price??null,location:existing.location||null,frame_type:existing.frame_type||null,bike_number:existing.bike_number??null,in_service_date:existing.in_service_date||null};
  const bid=S.editBikeId;
  const{error}=await sb.from('bikes').update({name,size,type:S.addBikeType,colors:[...S.addBikeColors],color_names:editColorNames,status:existing.status,brand,model,groupset,speeds,rental_price:rentalPrice,location,frame_type:S._bkFrame,bike_number:bikeNum,in_service_date:startDate}).eq('id',bid);
  if(error){toast(error.message||'Save failed','error');return;}
  try{await sb.from('bikes').update({photo:S._bkPhoto||null}).eq('id',bid);}catch(e){}
  await loadData();
  _resetBikeForm();
  toast(t('toastBikeUpdated'));
  pushUndo(`${t('undoEditBike')} ${name}`,async()=>{
    await sb.from('bikes').update(prev).eq('id',bid);
    await loadData();renderBikes();
  });
  renderBikes();
}
async function toggleRetire(id){
  const bike=getBikes().find(x=>x.id===id);if(!bike)return;
  if(bike.status==='in-use'){toast(t('errBikeInUse'),'error');return;}
  const prevStatus=bike.status;
  const prevRetired=bike.retired_date||null;
  const isRetired=prevStatus==='retired'||prevStatus==='maintenance';
  const newStatus=isRetired?'available':'retired';
  const newRetired=isRetired?null:_todayISO();
  const{error}=await sb.from('bikes').update({status:newStatus,retired_date:newRetired}).eq('id',id);
  if(error){toast(error.message,'error');return;}
  await loadData();
  toast(`${bike.name} ${isRetired?t('restoreBtn').toLowerCase():t('retiredLabel').toLowerCase()}`);
  pushUndo(`${isRetired?t('undoRestoreBike'):t('undoRetire')} ${bike.name}`,async()=>{
    await sb.from('bikes').update({status:prevStatus,retired_date:prevRetired}).eq('id',id);

function _bkSelChange(id,val){

function _bkOptSave(id){
  const el=document.getElementById(id);

  const _add=(lsKey,arr,stateKey)=>{
    if(!S[arr].includes(v)){S[arr]=[...S[arr],v].sort((a,b)=>a.localeCompare(b));try{localStorage.setItem(lsKey,JSON.stringify(S[arr]));}catch{}}
    S[stateKey]=v;
  };
  if(id==='bk-brand'){_add('cq_bk_brands','bkBrands','_bkBrand');S._bkBrandAdd=false;}

  else if(id==='bk-groupset'){_add('cq_bk_groupsets','bkGroupsets','_bkGroupset');S._bkGroupsetAdd=false;}

        return`<div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:12px 0 4px">${t('custPurchTitle')} · <bdi>SAR ${ptot}</bdi></div>
        <div style="max-height:200px;overflow-y:auto">${purch.slice().sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0)).map(r=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">
          <div style="flex:1;min-width:0;font-weight:700;font-size:13px">${esc(r.name||'')}${Number(r.qty)>1?` <span style="color:var(--muted)">×${r.qty}</span>`:''}</div>
          <span style="font-size:11px;color:var(--muted)">${r.created_at?shortDate(String(r.created_at).slice(0,10)):''}</span>
          <bdi style="font-weight:800;font-size:12px">SAR ${Math.round((Number(r.qty)||0)*(Number(r.price)||0)*100)/100}</bdi>
        </div>`).join('')}</div>`;
      })()}
    </div>
  </div>`;
  document.getElementById('cust-modal').style.display='flex';
}

function renderHistory(){

  S.histSelected=(S.histSelected||[]).filter(id=>{const e=hist.find(x=>x.id===id);return e&&e.status==='done'&&!e.paid;}); // drop rows that got paid/removed since selection
  const sessionFiltered=(S.histSess!=='all'?hist.filter(e=>e.sessionId===S.histSess):hist).filter(_hrOk);
  const nDone=sessionFiltered.filter(e=>e.status==='done').length,nPaid=sessionFiltered.filter(e=>e.status==='done'&&e.paid).length,
        nPend=sessionFiltered.filter(e=>e.status==='done'&&!e.paid).length,nNoShow=sessionFiltered.filter(e=>e.status==='noshow').length;
  const _hr2=n=>Math.round(n*100)/100;
  const sarCollected=_hr2(sessionFiltered.filter(e=>e.status==='done'&&e.paid).reduce((s,e)=>s+(e.price??DEFAULT_PRICE),0));
  const sarPending=_hr2(sessionFiltered.filter(e=>e.status==='done'&&!e.paid).reduce((s,e)=>s+(e.price??DEFAULT_PRICE),0));
  let filtered=[...hist];
  if(S.histSess!=='all')   filtered=filtered.filter(e=>e.sessionId===S.histSess);

  if(S.histPay==='paid')   filtered=filtered.filter(e=>e.paid);
  if(S.histPay==='pending')filtered=filtered.filter(e=>!e.paid&&e.status==='done');
  if(S.histType!=='all')   filtered=filtered.filter(e=>resolvedType(e)===S.histType);

  if(S.histSearch.trim()){const q=S.histSearch.trim().toLowerCase().replace(/^#/,'');filtered=filtered.filter(e=>e.name.toLowerCase().includes(q)||(e.phone||'').includes(q)||(e.email||'').toLowerCase().includes(q)||String(e.queueNum)===q);}
  const _hd=S.histSortDir;
  filtered.sort((a,b)=>{
    if(S.histSort==='name')   return _hd*a.name.localeCompare(b.name);

function exportHistoryCSV(){
  let hist=getQueue().filter(e=>['done','noshow','cancelled','removed'].includes(e.status));
  if(S.histSess!=='all') hist=hist.filter(e=>e.sessionId===S.histSess);
  const _xCut=S.histRange==='today'?todayStr():S.histRange==='7d'?fmtDate(new Date(Date.now()-7*864e5)):S.histRange==='30d'?fmtDate(new Date(Date.now()-30*864e5)):null;
  if(_xCut)hist=hist.filter(e=>String(e.sessionDate||'')>=_xCut);
  const sess=S.histSess!=='all'?allSessions().find(s=>s.id===S.histSess):null;
  const filename=sess
    ?`rides_${dayLabel(sess.day)}_${sess.session_date||sess.id}.csv`
    :'rides_all_sessions.csv';
  const headers=[t('colQueueNum'),t('nameLabel'),t('repColPhone'),t('repColEmail'),t('colSession'),t('colDate'),t('timeLabel'),t('colBike'),t('repColType'),t('repPriceSar'),t('paidLabel'),t('colStatus')];
  const rows=hist.map(e=>{
    const assignedBikes=getAssignedBikes(e);
    const bikeNamesCsv=assignedBikes.map(b=>b.name).join('; ');
    const entSess=allSessions().find(s=>s.id===e.sessionId);
    return[
      e.queueNum,
      e.name,
      e.phone||'',
      e.email||'',
      dayLabel(e.sessionDay),
      shortDate(e.sessionDate),
      sessionTime(entSess),
      bikeNamesCsv,
      resolvedType(e),
      e.price??DEFAULT_PRICE,
      e.paid?t('repYes'):t('repNo'),
      reportStatusLabel(e.status)
    ].map(_csvCell);
  });
  if(!rows.length){toast(t('noHistory'),'warning');return;}
  const csv=[headers.map(_csvCell).join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});

function _uid(){return Math.random().toString(36).slice(2,7);}

function _areaChart(series,labels,opts={}){
  const {W=460,H=148,unitPfx=''}=opts;
  const n=labels.length;
  if(!n)return`<div style="padding:28px 0;text-align:center;color:var(--muted);font-size:12px">${t('anNoData2')}</div>`;
  const pL=44,pR=14,pT=14,pB=28,cW=W-pL-pR,cH=H-pT-pB;
  const maxV=Math.max(...series.flatMap(s=>s.vals),1);
  const xOf=i=>pL+(n===1?cW/2:i/(n-1)*cW);
  const yOf=v=>pT+cH-(v/maxV)*cH;
  const nth=Math.ceil(n/7);
  let defs='',paths='';
  series.forEach(s=>{
    const pts=s.vals.map((v,i)=>[xOf(i),yOf(v)]);
    const lD=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    const aD=`M${pts[0][0].toFixed(1)},${(pT+cH).toFixed(1)} ${pts.map(p=>`L${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ')} L${pts[n-1][0].toFixed(1)},${(pT+cH).toFixed(1)}Z`;
    if(s.fill!==false){
      const gid='g'+_uid();
      defs+=`<linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${s.color}" stop-opacity=".25"/><stop offset="100%" stop-color="${s.color}" stop-opacity=".02"/></linearGradient>`;
      paths+=`<path d="${aD}" fill="url(#${gid})"/>`;
    }
    paths+=`<path d="${lD}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"${s.dashed?' stroke-dasharray="5 4"':''}/>`;
    pts.forEach((p,i)=>{if(n<=14||i%2===0||i===n-1)paths+=`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${n>10?2.5:3}" fill="${s.color}" stroke="rgba(10,10,10,.7)" stroke-width="1.5"/>`;});
  });
  const grid=[0,.25,.5,.75,1].map(pct=>{
    const v=maxV*pct,y=(pT+cH-pct*cH).toFixed(1);
    return`<line x1="${pL}" y1="${y}" x2="${pL+cW}" y2="${y}" stroke="rgba(var(--tint-rgb),.04)" stroke-width="1"/><text x="${pL-5}" y="${(parseFloat(y)+4).toFixed(1)}" font-size="9" text-anchor="end" fill="rgba(var(--tint-rgb),.28)">${unitPfx}${Math.round(v)}</text>`;
  }).join('');
  const xlbls=labels.map((l,i)=>{
    if(i%nth!==0&&i!==n-1)return'';
    const align=i===0?'start':i===n-1?'end':'middle';
    return`<text x="${xOf(i).toFixed(1)}" y="${H-5}" font-size="8.5" text-anchor="${align}" fill="rgba(var(--tint-rgb),.28)">${l}</text>`;
  }).join('');
  // Hover columns with native tooltips: exact per-point values for every series
  const bandW=cW/Math.max(n,1);
  const hover=labels.map((l,i)=>{
    const tip=l+'\n'+series.map(s=>`${s.label}: ${opts.unitPfx||''}${Math.round(s.vals[i])}`).join('\n');
    return`<rect class="an-hit" x="${(xOf(i)-bandW/2).toFixed(1)}" y="${pT}" width="${bandW.toFixed(1)}" height="${cH}" fill="transparent"><title>${tip}</title></rect>`;
  }).join('');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block;overflow:visible"><defs>${defs}</defs>${grid}${paths}${xlbls}${hover}</svg>`;
}

function _donut(segs,size=110){
  const total=segs.reduce((s,d)=>s+d.v,0);
  if(!total)return`<div style="padding:16px;text-align:center;color:var(--muted);font-size:12px">${t('anNoData2')}</div>`;
  const r=34,cx=size/2,cy=size/2,sw=13,C=2*Math.PI*r;
  let off=-0.25;
  const arcs=segs.filter(d=>d.v>0).map(d=>{
    const pct=d.v/total,rot=(off*360).toFixed(2);
    off+=pct;
    return`<circle class="an-hit" cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.c}" stroke-width="${sw}" stroke-dasharray="${(C*pct).toFixed(2)} ${(C*(1-pct)).toFixed(2)}" transform="rotate(${rot} ${cx} ${cy})"><title>${d.label?d.label+': ':''}${d.v} (${Math.round(pct*100)}%)</title></circle>`;
  }).join('');
  return`<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="display:block;flex-shrink:0"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(var(--tint-rgb),.07)" stroke-width="${sw}"/>${arcs}<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="900" fill="white">${total}</text></svg>`;
}

function _vbars(data,opts={}){
  const {W=320,H=130,color='#6ee89a',refVal=null}=opts;
  const n=data.length;
  if(!n)return`<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">${t('anNoData2')}</div>`;
  const pL=8,pR=8,pT=10,pB=22,cW=W-pL-pR,cH=H-pT-pB;
  const maxV=Math.max(...data.map(d=>d.v),refVal||0,1);
  const bW=Math.max(5,cW/n-4);
  const xOf=i=>pL+(i+.5)*(cW/n);
  const yOf=v=>pT+cH-(v/maxV)*cH;
  const nth=Math.ceil(n/8);
  const barsHtml=data.map((d,i)=>{
    const bH=Math.max(2,(d.v/maxV)*cH);
    return`<rect class="an-hit" x="${(xOf(i)-bW/2).toFixed(1)}" y="${(pT+cH-bH).toFixed(1)}" width="${bW.toFixed(1)}" height="${bH.toFixed(1)}" rx="2" fill="${d.c||color}" opacity=".85"><title>${d.label}: ${d.v}%</title></rect>${(i%nth===0||i===n-1)?`<text x="${xOf(i).toFixed(1)}" y="${H-4}" font-size="8" text-anchor="middle" fill="rgba(var(--tint-rgb),.3)">${d.label}</text>`:''}`;
  }).join('');
  const refLine=refVal!==null?`<line x1="${pL}" y1="${yOf(refVal).toFixed(1)}" x2="${pL+cW}" y2="${yOf(refVal).toFixed(1)}" stroke="rgba(var(--tint-rgb),.2)" stroke-width="1" stroke-dasharray="4 3"/>`:'' ;
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block">${refLine}${barsHtml}</svg>`;
}

// Aggregate sale lines -> category breakdown + collected/pending/free/team/refunds/discount totals.
// Special lines: cat '__discount__' (negative, reduces totals), cat '__cardmeta__' (qty 0, ignored), pay 'refunded' (reversed).
function _salesTotals(lines){
  const byCat={};let units=0,value=0,collected=0,pending=0,free=0,team=0,refunded=0,discount=0;
  (lines||[]).forEach(p=>{
    const q=Number(p.qty)||0;
    if(p.cat==='__cardmeta__'||q===0)return; // payment-split metadata, not a real line
    const v=q*(Number(p.price)||0),cat=p.cat||'Other';
    if(p.pay==='refunded'){refunded+=v;return;} // refunded sales reversed out (a discount line is negative and must REDUCE the refunded amount, not inflate it)
    if(cat==='__discount__'){discount+=-v;value+=v;if(p.pay==='paid')collected+=v;else pending+=v;return;} // discount: reduce, not a category
    byCat[cat]=byCat[cat]||{cat,qty:0,value:0};byCat[cat].qty+=q;byCat[cat].value+=v;units+=q;value+=v;
    if(p.pay==='paid')collected+=v;else if(p.pay==='house')free+=v;else if(p.pay==='team')team+=v;else pending+=v;
  });
  const r2=n=>Math.round(n*100)/100;

function _cashCardCash(sessId){

    const k=r.receipt_id||r.id;byR[k]=byR[k]||{paid:0,card:0,refunded:false};
    if(r.pay==='refunded'){byR[k].refunded=true;return;}
    if(r.category==='__cardmeta__'){byR[k].card=Number(r.price)||0;return;}
    if(r.pay==='paid')byR[k].paid+=(Number(r.qty)||0)*(Number(r.price)||0);

  let card=0,cash=0;

// Voided sale ids (kept locally so a voided purchase can never reappear, even if the DB DELETE was blocked/no-op)

// Persist data we MUST NOT lose (queued offline sales/bookings). If the quota is full, the
// snapshot cache is disposable — drop it and retry. Only then, if it still fails, surface the
// error rather than silently losing a sale/booking (the old save just swallowed the exception).
function _lsSetCritical(key,val){
  try{localStorage.setItem(key,val);return true;}catch(e){
    try{localStorage.removeItem('cq_snapshot');}catch(_){}
    try{localStorage.setItem(key,val);return true;}catch(e2){
      try{_logError('localStorage quota exceeded saving '+key,'storage');}catch(_){}
      try{toast(t('errStorageFull'),'error');}catch(_){}
      return false;
    }
  }
}
function _outbox(){try{const o=JSON.parse(localStorage.getItem('cq_sales_outbox')||'[]');let ch=false;o.forEach(op=>{if(!op.oid){op.oid=uid();ch=true;}});if(ch)_outboxSave(o);return o;}catch(_){return[];}}
function _outboxSave(o){_lsSetCritical('cq_sales_outbox',JSON.stringify(o));}

let _outboxBusy=false;
async function _outboxFlush(){
  if(_outboxBusy||!sb||(typeof navigator!=='undefined'&&navigator.onLine===false))return;
  _outboxBusy=true;
  const snapshot=_outbox();const doneIds=[];
  for(const op of snapshot){
    try{
      const res=op.kind==='delete'?await sb.from('cashier_sales').delete().eq('id',op.id):await sb.from('cashier_sales').upsert(op.data);
      if(!(res&&res.error))doneIds.push(op.oid);
    }catch(_){/* keep op for retry */}
  }

async function _outboxRetryOrClear(){

// Local + queued upsert/delete of a sale row (never lost on refresh; syncs to the DB when online)
function _salesUpsert(row){const i=(S.cashSales||[]).findIndex(r=>r.id===row.id);if(i>=0)S.cashSales[i]=row;else S.cashSales=[...(S.cashSales||[]),row];_outboxEnqueue('upsert',row.id,row);}
function _salesDelete(id){_voidedAdd(id);S.cashSales=(S.cashSales||[]).filter(r=>r.id!==id);_outboxEnqueue('delete',id,null);}
// ── Offline-safe bookings: queue queue_entries inserts locally and sync when the connection returns ──
function _bookOutbox(){try{return JSON.parse(localStorage.getItem('cq_book_outbox')||'[]');}catch(_){return[];}}
function _bookOutboxSave(o){_lsSetCritical('cq_book_outbox',JSON.stringify(o));}
function _bookOutboxAdd(row){const o=_bookOutbox();o.push(row);_bookOutboxSave(o);}
function _bookOutboxCount(){return _bookOutbox().length;}
function _applyBookOutbox(){const bo=_bookOutbox();if(!bo.length)return;const have=new Set((S.queue||[]).map(e=>e.id));bo.forEach(db=>{if(!have.has(db.id)){try{S.queue.push(entryFromDB(db));}catch(_){}}});}
let _bookBusy=false;
async function _bookOutboxFlush(){
  if(_bookBusy||!sb||(typeof navigator!=='undefined'&&navigator.onLine===false))return;
  _bookBusy=true;
  const snap=_bookOutbox();const done=[];const renum={};
  for(const row of snap){
    try{
      let res=await sb.from('queue_entries').upsert(row);
      // queue_num collides with a booking made on another device while offline: the partial unique
      // index rejects it and it would otherwise retry forever. Take a fresh number and re-upsert
      // (one bump per flush; a further collision resolves on the next flush as data loads).
      if(res&&res.error&&/23505|duplicate|unique/i.test((res.error.code||'')+' '+(res.error.message||''))){
        const fresh=nextQNum(row.session_id);
        if(fresh&&fresh!==row.queue_num){renum[row.id]=fresh;row.queue_num=fresh;res=await sb.from('queue_entries').upsert(row);}
      }
      if(!(res&&res.error))done.push(row.id);
    }catch(_){}
  }
  // Persist any queue-number bump onto the surviving outbox rows AND the live queue copy.
  const cur=_bookOutbox().map(r=>renum[r.id]?{...r,queue_num:renum[r.id]}:r).filter(r=>done.indexOf(r.id)<0);_bookOutboxSave(cur);
  Object.keys(renum).forEach(id=>{const e=(S.queue||[]).find(x=>x.id===id);if(e)e.queueNum=renum[id];});
  _bookBusy=false;
}

function _ctDiscountSAR(cartTotal){const v=parseFloat(S._ctDisc);if(isNaN(v)||v<=0)return 0;const d=S._ctDiscPct?cartTotal*(v/100):v;return Math.min(Math.max(0,cartTotal),Math.round(d*100)/100);}
// Live preview of discounted total + card/cash split without a full re-render (avoids swallowing the next click)
function _ctPreview(){
  const cart=S._ctCart||[];
  const cartTot=Math.round(cart.reduce((s,l)=>s+(Number(l.qty)||0)*(Number(l.price)||0),0)*100)/100;
  const cartPaidNum=cart.filter(l=>l.pay==='paid').reduce((s,l)=>s+(Number(l.qty)||0)*(Number(l.price)||0),0);
  const disc=_ctDiscountSAR(cartTot),after=Math.round((cartTot-disc)*100)/100;
  const paidAfter=Math.max(0,Math.round((cartPaidNum-disc)*100)/100),card=_ctCardSAR(paidAfter),cash=Math.max(0,Math.round((paidAfter-card)*100)/100);
  const g=document.getElementById('ct-grand');if(g)g.textContent='SAR '+after;

}
function _ctCardSAR(paidTotal){const v=parseFloat(S._ctCard);if(isNaN(v)||v<=0)return 0;const c=S._ctCardPct?paidTotal*(v/100):v;return Math.min(Math.max(0,paidTotal),Math.round(c*100)/100);}
async function _ctRecord(){
  const sessId=S._ctSession;if(!sessId){toast(t('errSelectSession'),'error');return;}
  if(!(S._ctCart||[]).length){toast(t('cashCartEmpty'),'error');return;}
  const rid=uid(),cust=(S._ctCust||'').trim()||null,at=new Date().toISOString();
  const rows=S._ctCart.map(l=>({id:uid(),receipt_id:rid,session_id:sessId,customer_name:l.pay==='team'?null:cust,item_id:l.item_id||null,name:l.name,category:l.cat,qty:l.qty,price:l.price,pay:l.pay,team_name:l.team||null,created_at:at})); // MM Team lines belong to the team member, not a customer
  // Per-receipt discount as a negative 'paid' line (no schema change needed)
  const cartTotal=S._ctCart.reduce((s,l)=>s+l.qty*l.price,0);
  const discSAR=_ctDiscountSAR(cartTotal);
  if(discSAR>0)rows.push({id:uid(),receipt_id:rid,session_id:sessId,customer_name:cust,item_id:null,name:t('cashDiscount'),category:'__discount__',qty:1,price:-discSAR,pay:S._ctCart.some(l=>l.pay==='paid')?'paid':'pending',team_name:null,created_at:at});
  // Card/cash split as a qty-0 metadata line (never affects sales totals)
  const paidTotal=rows.filter(r=>r.pay==='paid').reduce((s,r)=>s+r.qty*r.price,0);
  const cardSAR=_ctCardSAR(paidTotal);
  if(cardSAR>0)rows.push({id:uid(),receipt_id:rid,session_id:sessId,customer_name:cust,item_id:null,name:t('cashCard'),category:'__cardmeta__',qty:0,price:cardSAR,pay:'paid',team_name:null,created_at:at});
  if(S._ctCustId&&S.hasCsCust!==false)rows.forEach(r=>{r.customer_id=S._ctCustId;}); // link the receipt to the chosen account (column optional; boot detect clears the flag if missing)
  rows.forEach(r=>_salesUpsert(r)); // local + queued for offline-safe sync
  await _addonStockBatch(rows,-1); // decrement stock for stocked items (summed per item — no concurrent-write race)
  logAction(`${t('cashierTitle')}: ${t('cashReceiptWord')} ×${S._ctCart.length}${cust?` (${cust})`:''}`);
