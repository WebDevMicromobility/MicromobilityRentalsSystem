  const al=document.getElementById('bnav-account-lbl');if(al)al.textContent=t('tabAccount');
  // Tab-label localization is non-critical chrome; guard it so a failure here can
  // never abort render() before the actual view content is drawn (blank-page insurance).
  try{
  document.querySelectorAll('#customer-tab-nav .tab-btn').forEach(b=>{
    if(b.dataset.ctab==='register')b.textContent=t('tabReserve');
    if(b.dataset.ctab==='myrides')b.textContent=t('tabMyRides');

    if(b.dataset.stab==='cashier')b.textContent=t('tabCashier');
    if(b.dataset.stab==='inventory'){const _lo=(S.inventory||[]).filter(it=>{const q=Number(it.qty)||0,lo=Number(it.low_threshold)||0;return q<=0||(lo>0&&q<=lo);}).length;b.innerHTML=esc(t('tabInventory'))+(_lo?` <span class="tab-badge" title="${esc(t('invLowAlert').replace('{0}',_lo))}" aria-label="${esc(t('invLowAlert').replace('{0}',_lo))}">${_lo}</span>`:'');}
    if(b.dataset.stab==='community')b.textContent=t('tabCommunity');
  });
  }catch(e){try{_logError('tab-label render: '+((e&&e.message)||e),'render');}catch(_){}}
  renderTopbarRight();
  if(S.view==='customer'){renderRegister();renderMyRides();if(S.custTab==='account')renderAccount();}

  else if(S.view==='landing')renderLandingAvail();
  if(document.getElementById('auth-modal')?.style.display!=='none')renderAuthModal();
}

function _getPinLock(){try{return{until:parseInt(localStorage.getItem('cq_pin_until')||'0'),lockouts:parseInt(localStorage.getItem('cq_pin_lockouts')||'0'),attempts:parseInt(localStorage.getItem('cq_pin_attempts')||'0')};}catch(e){return{until:0,lockouts:0,attempts:0};}}
// ── Staff Supabase Auth (SECURE_AUTH): the DB trusts the Auth session, not the client-side PIN ──
// Normalize any phone entry to one canonical form (Saudi +966 default) so every format
// a staffer might type — 0562989838, 562989838, 966…, 00966…, +966… — maps to one key.
function _staffPhoneE164(raw){
  // Delegate to the hardened customer normalizer: Arabic-Indic digits, "+9660…" trunk zeros,
  // 00966/966/05/bare — the staff login previously missed the first two.
  return _normPhone(raw,'+966')||'';
}
// Staff phone → account email. Lets staff sign in by phone WITHOUT Supabase's (paid,
// Twilio-backed) phone provider: we resolve the phone to the email, then do the normal
// email+password sign-in. Add one line per staff phone (canonical form auto-handles all
// the formats above). The email must be an existing staff Auth account.
const STAFF_PHONE_MAP={
  '+966562847777':'salemb@micromobility.sa',
  '+966566668818':'mohammad.alhosni@micromobility.sa',
  '+966565834444':'ahmadb@micromobility.sa',
};
// Resolve a login identifier to the account email: email as-is, phone via the map.
// Checks the built-in STAFF_PHONE_MAP first, then a DB-backed staff_phones table (via
// the staff_email_for_phone RPC) so new staff phones can be added with pure SQL — no
// code change needed. Async because of the DB lookup.
async function _staffLoginEmail(identifier){
  const id=String(identifier||'').trim();
  if(id.includes('@'))return id.toLowerCase();
  const e164=_staffPhoneE164(id);
  if(STAFF_PHONE_MAP[e164])return STAFF_PHONE_MAP[e164];
  try{const{data}=await sb.rpc('staff_email_for_phone',{p_phone:e164});if(data&&typeof data==='string')return data.toLowerCase();}catch(e){}
  return null;
}
async function staffAuthSignIn(identifier,password){
  const email=await _staffLoginEmail(identifier);
  if(!email)return{ok:false,msg:t('errInvalidCredentials')}; // phone not registered to a staff account
  const{data,error}=await sb.auth.signInWithPassword({email,password});
  if(error||!data||!data.user)return{ok:false,msg:(error&&/invalid/i.test(error.message||''))?t('errInvalidCredentials'):((error&&error.message)||t('errConnection'))};
  let row=null;
  try{const r=await sb.from('staff').select('*').eq('user_id',data.user.id).maybeSingle();row=r.data;}catch(e){}
  if(!row){try{await sb.auth.signOut();}catch(e){}return{ok:false,msg:t('errStaffNotAuthorized')};}
  S._staffAuthed=true;S._mustChangePwd=!!row.must_change_pwd;setStaffRole(row.role==='frontdesk'?'frontdesk':'admin');
  return{ok:true};
}
async function staffAuthSignOut(){S._staffAuthed=false;try{await sb.auth.signOut();}catch(e){}}
// On boot: an unlocked staff device must still hold a live Auth session that maps
// to a staff row, or the unlock flag is dropped and the PIN gate returns.
async function staffAuthRestore(){
  if(!sb||localStorage.getItem('cq_staff')!=='1')return;
  try{
    const{data}=await sb.auth.getSession();
    const uid=data&&data.session&&data.session.user&&data.session.user.id;
    if(!uid)throw 0;
    const{data:row}=await sb.from('staff').select('*').eq('user_id',uid).maybeSingle();
    if(!row)throw 0;
    S._staffAuthed=true;S._mustChangePwd=!!row.must_change_pwd;setStaffRole(row.role==='frontdesk'?'frontdesk':'admin');
  }catch(e){
    // Secure mode: no Auth session means no access — drop the unlock. Open mode: keep the
    // local unlock (reads are public); only the _staffAuthed extras stay off.
    if(SECURE_AUTH){try{localStorage.removeItem('cq_staff');}catch(_){}}
    S._staffAuthed=false;
  }
}
async function lockStaff(){try{localStorage.removeItem('cq_staff');}catch(e){}await staffAuthSignOut();window.location.href='./';}
function _clearPinLock(){try{localStorage.removeItem('cq_pin_until');localStorage.removeItem('cq_pin_lockouts');localStorage.removeItem('cq_pin_attempts');}catch(e){}}
function _fmtLock(ms){const s=Math.ceil(ms/1000);if(s<60)return`${s}s`;const m=Math.floor(s/60),r=s%60;if(m<60)return r?`${m}m ${r}s`:`${m}m`;const h=Math.floor(m/60),rm=m%60;return rm?`${h}h ${rm}m`:`${h}h`;}

// Open mode (or an authed staff session): the full queue_entries table.
// Secure mode as a customer: the table's SELECT is locked, so availability comes
// from the no-PII queue_public view and the customer's own rows (full fields,
// needed for My Rides tickets) from the token-checked my_bookings() RPC.
async function _queueFetch(windowed){
  const wantSecure=SECURE_AUTH&&!S._staffAuthed;
  if(!wantSecure){
    let sel=sb.from('queue_entries').select('*');
    if(windowed)sel=sel.gte('session_date',_qWindowCut());
    return sel.order('session_id').order('queue_num');
  }
  let pubSel=sb.from('queue_public').select('*');
  if(windowed)pubSel=pubSel.gte('session_date',_qWindowCut());
  const cust=S.loggedIn||getSession();
  const [pub,mine]=await Promise.all([
    pubSel.order('session_id').order('queue_num'),
    (cust&&cust.session_token)?sb.rpc('my_bookings',{p_id:cust.id,p_token:cust.session_token}):Promise.resolve({data:[]}),
  ]);
  const mineRows=(mine&&!mine.error&&mine.data)||[];
  const mineIds=new Set(mineRows.map(r=>r.id));
  return{data:[...mineRows,...((pub&&pub.data)||[]).filter(r=>!mineIds.has(r.id))],error:pub&&pub.error};
}

function hashPwd(s){
  let h=5381;
  for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);

}

async function verifyPwd(pwd,stored){
  if(!stored)return false;
  if(stored.indexOf('sha256:')===0){if(!_cryptoOK())return false;const p=stored.split(':');return (await sha256Hex(p[1]+':'+pwd))===p[2];}

  return hashPwd(pwd)===stored; 
}

  const bad=[].concat(res).find(r=>r&&r.error);
  if(!bad)return false;
  console.error((ctx||'save')+' failed',bad.error);
  toast(t('errSomethingWrong')+(bad.error.message?' ('+bad.error.message+')':''),'error');
  return true;
}
// Memoized bike lookup (id -> bike); rebuilds only when the bikes array/length changes. Holds live
// references, so in-place status edits are reflected. Avoids O(entries x bikes) finds in render loops.
let _bbRef=null,_bbLen=-1,_bbMap=null;
function bikeById(id){
  const bs=getBikes();
  if(_bbRef!==bs||_bbLen!==bs.length||!_bbMap){_bbMap=new Map(bs.map(b=>[b.id,b]));_bbRef=bs;_bbLen=bs.length;}
  return _bbMap.get(id);
}
function getAssignedBikeIds(entry){
  if(!entry)return[];
  
  const fallback=S&&S._extraBikes&&S._extraBikes[entry.id];
  if(fallback)return fallback;
  if(!entry.assignedBikeId)return[];
  try{const p=JSON.parse(entry.assignedBikeId);return Array.isArray(p)?p:[p];}catch{return[entry.assignedBikeId];}
}
function getAssignedBikes(entry){return getAssignedBikeIds(entry).map(id=>bikeById(id)).filter(Boolean);}


async function reconcileOrphanBikes(){
  if(!sb||S.view!=='staff'||S._reconcilingBikes)return;
  const used=new Set();
  getQueue().filter(e=>e.status==='active').forEach(e=>getAssignedBikeIds(e).forEach(id=>used.add(id)));
  const orphans=getBikes().filter(b=>b.status==='in-use'&&!used.has(b.id));
  if(!orphans.length)return;
  S._reconcilingBikes=true;
  try{
    await Promise.all(orphans.map(b=>sb.from('bikes').update({status:'available'}).eq('id',b.id)));
    orphans.forEach(b=>{b.status='available';});
  }catch(e){console.warn('reconcileOrphanBikes failed:',e);}
  S._reconcilingBikes=false;
  renderStaffQueue();renderBikes();
}
function resolvedType(entry){
  if(!entry||entry.typePreference!=='Any')return entry?entry.typePreference:'Any';
  const bikes=getAssignedBikes(entry);
  return(bikes.length>0&&bikes[0].type&&bikes[0].type!=='Any')?bikes[0].type:'Any';
}
function heightToSize(h){if(h<=166)return'XS';if(h<=172)return'S';if(h<=178)return'M';return'L';}
function sizeLabel(sz){return{XS:'XS (166 cm & under)',S:'S (167-172 cm)',M:'M (173-178 cm)',L:'L (179 cm & up)'}[sz]||sz;}
function sizeRange(sz){

  return{XS:`≤ 166 ${cm}`,S:`167-172 ${cm}`,M:`173-178 ${cm}`,L:`≥ 179 ${cm}`}[sz]||'';

function bikeGradient(c){if(!c||!c.length)return'var(--green)';if(c.length===1)return c[0];return`linear-gradient(135deg,${c.join(',')})`;}
function bikeStrip(c){
  if(!c||!c.length)return'var(--green)';
  if(c.length===1)return c[0];
  const pct=100/c.length;
  const stops=c.flatMap((col,i)=>[`${col} ${(i*pct).toFixed(2)}%`,`${col} ${((i+1)*pct).toFixed(2)}%`]);
  return`linear-gradient(to bottom,${stops.join(',')})`;
}

const STATUS_CLS={waiting:'badge-waiting',waitlist:'badge-waiting',active:'badge-active',done:'badge-done',noshow:'badge-noshow',cancelled:'badge-noshow',removed:'badge-noshow'};

// Scroll behavior that honors the OS 'reduce motion' setting (CSS can't gate JS smooth scroll).
function _sb(){try{return (window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches)?'auto':'smooth';}catch(e){return 'smooth';}}
// Debounced re-render: coalesce rapid state changes (typing in a search box, tapping a number
// stepper) into ONE re-render after a short pause, instead of rebuilding a whole list per
// keystroke. Native input keeps focus between keystrokes; the render restores focus on fire.
const _debTimers={};
function _debRender(key,fn,ms){if(_debTimers[key])clearTimeout(_debTimers[key]);_debTimers[key]=setTimeout(()=>{_debTimers[key]=null;try{fn();}catch(e){}},ms||160);}
function fmtPhone(p){

}

let _undoBarTimer=null;
function showUndoBar(label,fn){
  
  const old=document.getElementById('undo-bar-el');if(old)old.remove();
  clearInterval(_undoBarTimer);
  const DURATION=5000;
  const bar=document.createElement('div');
  bar.id='undo-bar-el';bar.className='undo-bar';
  bar.innerHTML=`
    <div class="undo-bar-text">${esc(label)}</div>
    <button class="undo-bar-action" id="undo-bar-btn">${t('undoBtn')}</button>
    <div class="undo-bar-progress" id="undo-bar-prog" style="width:100%"></div>`;
  document.getElementById('toast-container').appendChild(bar);
  const prog=document.getElementById('undo-bar-prog');
  const btn=document.getElementById('undo-bar-btn');
  const start=Date.now();
  
  _undoBarTimer=setInterval(()=>{
    const elapsed=Date.now()-start;
    const pct=Math.max(0,100-elapsed/DURATION*100);
    if(prog)prog.style.width=pct+'%';
    if(elapsed>=DURATION){clearInterval(_undoBarTimer);bar.remove();}
  },80);
  btn.onclick=async()=>{
    clearInterval(_undoBarTimer);bar.remove();
    try{await fn();toast(t('undoneMsg'));}catch(e){toast(t('undoFailed'),'error');}
    renderTopbarRight();renderStaffQueue();
  };
}

function _phoneMatches(stored,cc,phoneRaw){
  const norm=x=>String(x||'').replace(/\D/g,'').replace(/^0+/,'');
  const s=norm(stored),p=norm(phoneRaw);
  if(!s||p.length<7)return false;
  const ccd=String(cc||'').replace(/\D/g,'');
  return [p,ccd+p].some(c=>s===c||s.endsWith(c)||c.endsWith(s));

function authErr(msg){const el=document.getElementById('auth-err');if(el){el.textContent=msg;if(msg){try{el.scrollIntoView({block:'center',behavior:_sb()});}catch(e){}}}}

// ── Inline field validation: specific message directly under the field, icon + text so the
// error is never color-only, aria-invalid/aria-describedby for screen readers. The message
// clears itself as soon as the user edits the field. ──
function _fieldErr(el,msg){
  if(!el)return;
  if(!el.id)el.id='f'+Math.random().toString(36).slice(2,9);
  const errId=el.id+'-err';
  el.setAttribute('aria-invalid','true');
  el.setAttribute('aria-describedby',errId);
  el.classList.add('field-invalid');
  let e=document.getElementById(errId);
  if(!e){
    e=document.createElement('div');e.className='field-err';e.id=errId;
    // when the input shares a line (phone cc+number, height+cm), place the message under the row
    const host=el.closest('.phone-row,.auth-cc-row,.height-row')||el;
    host.insertAdjacentElement('afterend',e);
  }
  e.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg><span>'+esc(msg)+'</span>';
  if(!el._feBound){el._feBound=true;el.addEventListener('input',()=>_fieldOk(el));}
}
function _fieldOk(el){
  if(!el)return;
  el.removeAttribute('aria-invalid');el.classList.remove('field-invalid');
  const e=el.id?document.getElementById(el.id+'-err'):null;if(e)e.remove();
}
// Blur-time validator (never per-keystroke). Empty fields stay quiet on blur — required-ness
// is enforced at submit; blur only judges what the user actually typed.
function _vBlur(el,kind){
  if(!el)return true;
  const v=(el.value||'').trim();
  if(!v){_fieldOk(el);return true;}
  let msg='';
  if(kind==='name'&&v.split(/\s+/).length<2)msg=t('errEnterName');
  else if(kind==='email'&&!/^[^\s<>"'()]+@[^\s<>"'()]+\.[^\s<>"'()]+$/.test(v))msg=t('errValidEmail');
  else if(kind==='phone'&&v.replace(/\D/g,'').length<8)msg=t('errValidPhone');
  else if(kind==='pwd'&&(v.length<8||!/[A-Z]/.test(v)||!/[0-9]/.test(v)))msg=t('errPasswordLen');
  else if(kind==='height'){const h=parseInt(v);if(isNaN(h)||h<100||h>250)msg=t('errValidHeightCm');}
  if(msg){_fieldErr(el,msg);return false;}
  _fieldOk(el);return true;
}
// Server/connection failure in an auth flow: offline gets an honest message instead of the
// generic one, and the failure is logged to error_log (code/message only — never credentials).
function _authFail(where,error){
  try{_logError('auth:'+where+' '+(((error&&(error.code||''))+' '+((error&&error.message)||'')).trim()||'fail'),'auth',true);}catch(e){}
  authErr(navigator.onLine===false?t('errNoInternet'):t('errConnection'));
}
// Arabic-Indic (٠-٩) and Eastern (۰-۹) numerals → ASCII digits. Saudi customers on Arabic
// keyboards type these; regex \D treated them as junk, so their phone number was silently
// deleted as they typed.
// Invisible characters (RTL/LTR marks U+200E-F, zero-width U+200B-D, bidi embeds, NBSP)
// ride along with Arabic-keyboard input and survive trim(). One inside an email at signup
// makes every future login "invalid credentials" — the stored address LOOKS identical but
// never string-matches again. Strip them from identity fields.
function _cleanIdent(v){return String(v==null?'':v).replace(/[\u200B-\u200F\u202A-\u202E\u2066-\u2069\uFEFF\u00A0]/g,'').trim();}
function _asciiDigits(v){return String(v==null?'':v).replace(/[٠-٩]/g,c=>String.fromCharCode(c.charCodeAt(0)-1584)).replace(/[۰-۹]/g,c=>String.fromCharCode(c.charCodeAt(0)-1728));}
// Live phone mask: groups digits as "5XX XXX XXXX" while typing (display only; saved value is stripped to digits)
function fmtPhoneInput(el){
  if(!el)return;
  let d=_asciiDigits(el.value).replace(/\D/g,'');
  if(d.slice(0,2)==='00')d=d.slice(2);                 // pasted 00966…
  if(d.indexOf('966')===0&&d.length>=11)d='0'+d.slice(3); // pasted +966… → local 05…, keeping ALL digits (slicing first corrupted the number)
  d=d.slice(0,10);
  let out=d;
  if(d.length>6)out=d.slice(0,3)+' '+d.slice(3,6)+' '+d.slice(6);
  else if(d.length>3)out=d.slice(0,3)+' '+d.slice(3);
  el.value=out;
}
// Compose a clean E.164 phone from whatever the customer typed + the selected country
// code, WITHOUT doubling the code. Handles +966…, 966…, 00966…, 0562…, 562… → +966562….
function _normPhone(raw,cc){
  cc=cc||'+966';
  const ccd=cc.replace(/\D/g,''); // e.g. "966"
  let s=_asciiDigits(String(raw==null?'':raw)).trim().replace(/[\s()\-]/g,'');
  if(!s)return '';
  if(s[0]==='+'){let d=s.slice(1).replace(/\D/g,'');if(ccd&&d.indexOf(ccd+'0')===0)d=ccd+d.slice(ccd.length+1);return '+'+d;} // explicit +, but drop a stray trunk 0 after the country code ("+9660…")
  s=s.replace(/\D/g,'');
  if(!s)return '';
  if(s.slice(0,2)==='00')return '+'+s.slice(2);                // 00 international prefix
  if(ccd&&s.indexOf(ccd)===0&&s.length>=ccd.length+6)return '+'+s; // already includes the country code
  if(s[0]==='0')return cc+s.slice(1);                          // strip national trunk 0
  return cc+s;                                                 // bare local number
}

  return 'complete';
}

async function doLogin(){
  const rawInput=_cleanIdent(document.getElementById('a-identifier')?.value||'');
  const identifier=rawInput.toLowerCase();
  const pwd=(document.getElementById('a-pwd')?.value||'');
  if(!identifier){authErr(t('errEmailOrPhone'));return;}
  if(!pwd){authErr(t('errPasswordRequired'));return;}
  if(S._authBusy)return;S._authBusy=true;_authBtnBusy(true);
  try{
    if(CUST_RPC){
      // The DB matches phone digits EXACTLY, so "0508…" / "508…" must be normalized to the
      // stored +966… form or phone login always fails with "invalid credentials".
      const ident=identifier.includes('@')?identifier:(_normPhone(rawInput,'+966')||identifier);
      const{data,error}=await sb.rpc('customer_login',{p_identifier:ident,p_pwd:pwd});
      if(error){if(/LOCKED/.test((error.message||'')+(error.hint||'')))authErr(t('errLoginLocked'));else if(/PGRST|Failed to fetch|network/i.test((error.code||'')+(error.message||'')))_authFail('login',error);else authErr(t('errInvalidCredentials'));return;}
      const customer=(data&&data[0])||null;
      if(!customer){authErr(t('errInvalidCredentials'));return;}
      S.loggedIn=customer;setSession(customer);
      await loadData();
      closeAuthModal();prefillFromAccount();renderTopbarRight();renderRegister();renderMyRides();if(S.view!=='customer')goCustomer('register'); // don't strand them on the landing page after signing in
      logAction(t('logLoggedIn')+customer.name);
      toast(`${t('toastWelcomeBack')}, ${customer.name}!`);
      return;
    }
    const isEmail=identifier.includes('@');
    const filters=[];
    if(isEmail){
      filters.push(`email.eq.${identifier}`);
    }else{
      const digits=rawInput.replace(/\D/g,''); 
      const bare=digits.replace(/^0+/,'');     
      
      const candidates=new Set([rawInput,digits,bare,`+966${bare}`,`00966${bare}`]);
      candidates.forEach(c=>{if(c&&c.length>=5&&/^[+\d]+$/.test(c))filters.push(`phone.eq.${c}`);});
    }
    const{data:rows}=await sb.from('customers')
      .select('id,name,email,phone,height,type_preference,created_at,birth_date,country,city,photo,password_hash')
      .or(filters.join(','))
      .limit(5);
    let customer=null;
    for(const row of (rows||[])){if(await verifyPwd(pwd,row.password_hash)){customer=row;break;}}
    if(!customer){authErr(t('errInvalidCredentials'));return;}
    
    if(String(customer.password_hash||'').indexOf('sha256:')!==0&&customer.password_hash!=='oauth:google'){
      try{const up=await makePwdHash(pwd);await sb.from('customers').update({password_hash:up}).eq('id',customer.id);}catch(e){}
    }
    delete customer.password_hash;
    S.loggedIn=customer;setSession(customer);
    await loadData();

function prefillFromAccount(){
  if(!S.loggedIn)return;
  S._rName=S.loggedIn.name||'';
  S._rEmail=S.loggedIn.email||'';
  if(S.loggedIn.phone){
    const match=COUNTRY_CODES.find(([code])=>S.loggedIn.phone.startsWith(code));
    if(match){S._rCC=match[0];S._rPhone=S.loggedIn.phone.slice(match[0].length);}
    else S._rPhone=S.loggedIn.phone;
  }
  if(S.loggedIn.height){
    S._rHeight=String(S.loggedIn.height);
    if(S.regBikeHeights.length===0)S.regBikeHeights=[String(S.loggedIn.height)]; else S.regBikeHeights[0]=String(S.loggedIn.height);
  }
  
  if(S.loggedIn.type_preference&&S.loggedIn.type_preference!=='Any'){
    if(S.regBikeTypes.length===0)S.regBikeTypes=[S.loggedIn.type_preference];

function _autoSelectSession(){

    .sort((a,b)=>new Date(a.session_date||a.id)-new Date(b.session_date||b.id));

  const todaySess=open.find(s=>(s.session_date||s.id)===today);

  m.style.cssText='position:fixed;inset:0;z-index:9600;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.6)';
  m.innerHTML=`<div class="pin-box" onclick="event.stopPropagation()">
      <div class="pin-title">${t('staffPwdTitle')}</div>
      <div style="font-size:12px;color:var(--muted);font-weight:600;margin:-4px 0 14px">${mandatory?t('staffPwdMustHint'):t('authPasswordHint')}</div>
      <input id="staff-newpwd" type="password" autocomplete="new-password" placeholder="${t('authPassword')}" style="width:100%;margin-bottom:8px">
      <input id="staff-newpwd2" type="password" autocomplete="new-password" placeholder="${t('authConfirmPassword')}" style="width:100%;margin-bottom:10px" onkeydown="if(event.key==='Enter')_staffPwdSubmit()">
      <div id="staff-pwd-err" style="color:var(--red);font-size:12px;font-weight:700;min-height:16px;margin-bottom:6px"></div>
      <button class="btn-primary" style="width:100%" onclick="_staffPwdSubmit()">${t('saveBtn')}</button>
      ${mandatory?'':`<button class="pin-cancel" onclick="document.getElementById('staff-pwd-modal').remove()">${t('cancelBtn')}</button>`}
    </div>`;
  if(!mandatory)m.onclick=e=>{if(e.target===m)m.remove();}; // mandatory: backdrop click does nothing
  setTimeout(()=>document.getElementById('staff-newpwd')?.focus(),50);
}
async function _staffPwdSubmit(){
  const p1=document.getElementById('staff-newpwd')?.value||'';
  const p2=document.getElementById('staff-newpwd2')?.value||'';
  const err=m=>{const el=document.getElementById('staff-pwd-err');if(el)el.textContent=m;};
  if(p1.length<8||!/[A-Z]/.test(p1)||!/[0-9]/.test(p1))return err(t('errPasswordLen'));
  if(p1!==p2)return err(t('errPasswordMatch'));
  const btn=document.querySelector('#staff-pwd-modal .btn-primary');if(btn)btn.disabled=true;
  try{
    const{error}=await sb.auth.updateUser({password:p1});
    if(error){err(error.message||t('errConnection'));if(btn)btn.disabled=false;return;}
  }catch(e){err(t('errConnection'));if(btn)btn.disabled=false;return;}
  try{await sb.rpc('staff_mark_pwd_changed');}catch(e){} // clear the must-change flag (no-op until the migration is run)
  S._mustChangePwd=false;S._pwdMandatory=false;
  document.getElementById('staff-pwd-modal')?.remove();
  toast(t('staffPwdDone'));
  try{logAction(t('staffPwdLog'));}catch(e){}
}
function openPinModal(upgrade){
  S.pinDigits='';S.pinError=false;S._pinUpgrade=!!upgrade;
  // The staff gate is ALWAYS the email/password Auth login (the 4-digit PIN was removed;
  // it must not resurface when the queue lockdown flag is off). A real Auth session is also
  // what satisfies the DB's is_staff() write policies on inventory/sessions/bikes.
  S._pinStage='auth';
  renderPinModal();
}

function renderPinModal(){
  // Secure-mode stage 2: PIN accepted, now the staff Auth account signs in.
  if(S._pinStage==='auth'){
    const modal=document.getElementById('pin-modal');
    modal.style.display='flex';
    modal.innerHTML=`<div class="pin-backdrop" onclick="if(event.target===this)closePinModal()">
      <div class="pin-box" id="pin-box">
        <div class="pin-title">${t('staffAuthTitle')}</div>
        <div style="font-size:12px;color:var(--muted);font-weight:600;margin:-4px 0 14px">${t('staffAuthHint')}</div>
        <input id="staff-auth-email" type="text" autocomplete="username" autocapitalize="none" spellcheck="false" placeholder="${t('staffAuthEmailPh')}" style="width:100%;margin-bottom:8px">
        <input id="staff-auth-pwd" type="password" autocomplete="current-password" placeholder="${t('staffAuthPwdPh')}" style="width:100%;margin-bottom:10px" onkeydown="if(event.key==='Enter')_staffAuthSubmit()">
        <div id="staff-auth-err" style="color:var(--red);font-size:12px;font-weight:700;min-height:16px;margin-bottom:6px"></div>
        <button class="btn-primary" style="width:100%" onclick="_staffAuthSubmit()">${t('staffAuthBtn')}</button>
        <button class="pin-cancel" onclick="closePinModal()">${t('cancelBtn')}</button>
      </div>
    </div>`;
    setTimeout(()=>document.getElementById('staff-auth-email')?.focus(),50);
    return;
  }
  const {until,lockouts,attempts}=_getPinLock();
  const now=Date.now();
  const isLocked=until>now;
  const remaining=isLocked?until-now:0;
  if(S.pinCountdownInterval){clearInterval(S.pinCountdownInterval);S.pinCountdownInterval=null;}
  if(isLocked){
    S.pinCountdownInterval=setInterval(()=>{
      if(Date.now()>=until){clearInterval(S.pinCountdownInterval);S.pinCountdownInterval=null;}
      renderPinModal();
    },1000);
  }
  const dots=Array(4).fill(0).map((_,i)=>{
    const cls=S.pinError?'pin-dot error':i<S.pinDigits.length?'pin-dot filled':'pin-dot';
    return`<div class="${cls}"></div>`;
  }).join('');
  const attemptsLeft=5-attempts;
  const warnMsg=(!isLocked&&attempts>0)?`<div style="font-size:11px;color:var(--muted-l);margin-top:6px">${t('pinAttemptsWarn').replace('{0}',attemptsLeft)}</div>`:'';
  const modal=document.getElementById('pin-modal');
  modal.style.display='flex';
  modal.innerHTML=`<div class="pin-backdrop" onclick="if(event.target===this)closePinModal()">
    <div class="pin-box" id="pin-box">
      <img class="pin-logo" src="logo.png" alt="">
      <div class="pin-title">${t('pinTitle')}</div>
      ${isLocked
        ?`<div class="pin-sub" style="color:var(--red);font-weight:700;text-align:center">${t('pinLocked').replace('{0}',_fmtLock(remaining))}</div>`
        :`<div class="pin-sub">${t('pinSub')}</div>`
      }
      ${isLocked?'':`<div class="pin-dots">${dots}</div>`}
      <div class="pin-error">${!isLocked&&S.pinError?t('errPinWrong'):''}</div>
      ${warnMsg}
      ${isLocked?'':`<div class="pin-numpad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="pinPress('${n}')">${n}</button>`).join('')}
        <button class="pin-key empty"></button>
        <button class="pin-key" onclick="pinPress('0')">0</button>
        <button class="pin-key del" onclick="pinDel()">&#x232B;</button>
      </div>`}
      <button class="pin-cancel" onclick="closePinModal()">${t('cancelBtn')}</button>
    </div>
  </div>`;
}

async function _staffAuthSubmit(){
  const email=(document.getElementById('staff-auth-email')?.value||'').trim();
  const pwd=document.getElementById('staff-auth-pwd')?.value||'';
  const err=m=>{const el=document.getElementById('staff-auth-err');if(el)el.textContent=m;};
  if(!email||!pwd){err(t('errEmailOrPhone'));return;}
  const btn=document.querySelector('#pin-modal .btn-primary');if(btn)btn.disabled=true;
  const res=await staffAuthSignIn(email,pwd);
  if(btn)btn.disabled=false;
  if(!res.ok){err(res.msg||t('errInvalidCredentials'));return;}
  const wasUpgrade=S._pinUpgrade;S._pinUpgrade=false;S._pinStage=null;
  closePinModal();
  if(wasUpgrade&&S.view==='staff'){logAction(t('logSwitchedAdmin'));}
  else{goStaff();logAction(t('logStaffUnlocked'));toast(t('toastStaffPanel'));}
}
async function pinPress(d){
  const {until,lockouts,attempts}=_getPinLock();
  if(until>Date.now())return;
  if(S.pinDigits.length>=4)return;
  S.pinDigits+=d;
  S.pinError=false;
  if(S.pinDigits.length===4){
    const pinOK=_cryptoOK()&&(await sha256Hex('mmpin:'+S.pinDigits))===STAFF_PIN_HASH;
    if(pinOK){
      _clearPinLock();
      if(S.pinCountdownInterval){clearInterval(S.pinCountdownInterval);S.pinCountdownInterval=null;}
      // Secure mode: the PIN alone no longer unlocks anything — the database only
      // answers to a staff Auth session, so ask for the account after the PIN.
      if(SECURE_AUTH&&!S._staffAuthed){S.pinDigits='';S._pinStage='auth';renderPinModal();return;}
      const wasUpgrade=S._pinUpgrade;S._pinUpgrade=false;
      closePinModal();
      if(wasUpgrade&&S.view==='staff'){
        setStaffRole('admin');
        logAction(t('logSwitchedAdmin'));
      } else {
        goStaff();
        logAction(t('logStaffUnlocked'));
        toast(t('toastStaffPanel'));
      }
    } else {
      S.pinError=true;
      const newAttempts=attempts+1;
      if(newAttempts>=5){
        const durMin=PIN_LOCKOUT_MINS[Math.min(lockouts,PIN_LOCKOUT_MINS.length-1)];
        try{
          localStorage.setItem('cq_pin_until',Date.now()+durMin*60000);
          localStorage.setItem('cq_pin_lockouts',lockouts+1);
          localStorage.setItem('cq_pin_attempts','0');
        }catch(e){}
        S.pinDigits='';
        renderPinModal();
      } else {
        try{localStorage.setItem('cq_pin_attempts',newAttempts);}catch(e){}
        renderPinModal();
        const box=document.getElementById('pin-box');
        if(box){box.classList.add('shake');setTimeout(()=>{box.classList.remove('shake');S.pinDigits='';renderPinModal();},400);}
      }
    }
  } else {
    renderPinModal();
  }
}

function pinDel(){
  if(S.pinDigits.length===0)return;
  S.pinDigits=S.pinDigits.slice(0,-1);
  S.pinError=false;
  renderPinModal();
}

function closePinModal(){
  if(S.pinCountdownInterval){clearInterval(S.pinCountdownInterval);S.pinCountdownInterval=null;}
  document.getElementById('pin-modal').style.display='none';
  S.pinDigits='';S.pinError=false;S._pinStage=null;
}


document.addEventListener('keydown',e=>{
  // Only drive the numeric keypad; ignore keys during the secure-mode staff
  // sign-in stage (which reuses #pin-modal for an email/password form) and
  // whenever focus is in a text field, so typing a password never feeds the PIN.
  if(document.getElementById('pin-modal').style.display==='flex'&&S._pinStage!=='auth'){
    const tag=(e.target&&e.target.tagName)||'';
    if(tag==='INPUT'||tag==='TEXTAREA'){if(e.key==='Escape')closePinModal();return;}
    if(e.key>='0'&&e.key<='9')pinPress(e.key);
    else if(e.key==='Backspace')pinDel();
    else if(e.key==='Escape')closePinModal();
  }
});

function _setRegAddonQty(id,delta){
  S.regAddons=(S.regAddons||[]).map(x=>(x&&typeof x==='object')?x:{id:x,qty:1});
  const it=(S.inventory||[]).find(x=>x.id===id);const _stk=it?(Number(it.qty)||0):0;

  else{a.qty=Math.min(max,Math.max(0,a.qty+delta));if(a.qty<=0)S.regAddons=S.regAddons.filter(x=>x.id!==id);}
  renderRegister();
}

// Promo codes: discount on the booking total
function _promoDiscount(total){
  const p=S.promoApplied;if(!p)return 0;
  if(p.applies_to){
    // Type-restricted code: discount each matching bike in the booking, nothing else.
    let d=0;
    S.regBikeTypes.slice(0,S.regQty).forEach(ty=>{
      if(ty===p.applies_to){
        const base=priceForType(ty);
        d+=p.kind==='flat'?Math.min(Number(p.value),base):base*(Number(p.value)/100);
      }
    });
    return Math.min(total,Math.max(0,Math.round(d*100)/100));
  }
  const d=p.kind==='flat'?Number(p.value):total*(Number(p.value)/100);
  return Math.min(total,Math.max(0,Math.round(d*100)/100));
}
function applyPromoCode(){
  const v=(document.getElementById('reg-promo')?.value||'').trim();
  if(!v){S.promoApplied=null;S._promoMsg='';renderRegister();return;}
  const match=(S.promoCodes||[]).find(c=>c.active&&String(c.code).toLowerCase()===v.toLowerCase());
  if(!match){S.promoApplied=null;S._promoMsg=t('promoInvalidMsg');renderRegister();return;}
  if(match.applies_to&&!S.regBikeTypes.slice(0,S.regQty).includes(match.applies_to)){
    S.promoApplied=null;S._promoMsg=t('promoTypeOnlyMsg').replace('{0}',typeLabel(match.applies_to));renderRegister();return;
  }
  S.promoApplied={code:match.code,kind:match.kind,value:match.value,applies_to:match.applies_to||null};
  S._promoMsg='';renderRegister();
}

function validateRegInputs(){
  const cust=S.loggedIn||getSession();
  if(!cust){toast(t('errLoginFirst'),'error');return false;}
  if(!S.selSession){toast(t('errSelectSession'),'error');return false;}
  const qty=S.regQty||1;
  ensureBikeSizes();
  for(let i=0;i<qty;i++){
    const h=parseInt(S.regBikeHeights[i]);
    if(isNaN(h)||h<100||h>250){
      const hInp=document.getElementById(`reg-height-${i}`);
      if(hInp){_fieldErr(hInp,t('errValidHeightCm'));hInp.scrollIntoView({behavior:_sb(),block:'center'});hInp.focus({preventScroll:true});}
      else toast(qty>1?`${t('errValidHeightCm')} (${t('bike')} ${i+1})`:t('errValidHeightCm'),'error');
      return false;
    }
  }
  let firstErrEl=null;
  const markErr=el=>{if(el&&!firstErrEl){firstErrEl=el;el.style.outline='2px solid var(--red)';el.style.borderRadius='10px';setTimeout(()=>{el.style.outline='';el.style.borderRadius='';},2500);}};
  for(let i=0;i<qty;i++){
    if(!S.regBikeTypes[i]){
      markErr(document.getElementById(`reg-type-wrap-${i}`));
      toast(qty>1?`${t('errSelectTypeGeneric')} (${t('bike')} ${i+1})`:t('errSelectTypeGeneric'),'error');
      if(firstErrEl)firstErrEl.scrollIntoView({behavior:_sb(),block:'center'});
      return false;
    }
    if(qty>1&&!(S.regRiderNames[i]!==undefined?S.regRiderNames[i]:i===0?cust.name:'').trim()){
      markErr(document.getElementById(`reg-rider-name-${i}`));
      toast(`${t('riderName')||"Rider's Full Name"} (${t('bike')} ${i+1})`,'error');
      if(firstErrEl)firstErrEl.scrollIntoView({behavior:_sb(),block:'center'});
      return false;
    }
  }
  return true;
}

  const st=document.querySelector('.reg-summary-total span:last-child');
  if(st){
    const q=S.regQty;
    const tMin=S.regBikeTypes.slice(0,q).reduce((s,ty)=>s+priceForType(ty||'Any'),0);
    const tMax=S.regBikeTypes.slice(0,q).reduce((s,ty)=>s+priceForTypeMax(ty||'Any'),0);

      :(hR?(()=>{const lo=Math.round((tMin+at)*100)/100,hi=Math.round((tMax+at)*100)/100;return lo===hi?`SAR ${lo}`:`SAR ${lo} - ${hi}`;})():`SAR ${Math.round((tMin+at)*100)/100}`);
  }

function ensureBikeSizes(){
  while(S.regBikeHeights.length<S.regQty) S.regBikeHeights.push('');
  while(S.regBikeHeights.length>S.regQty) S.regBikeHeights.pop();
  while(S.regBikeTypes.length<S.regQty)  S.regBikeTypes.push('');
  while(S.regBikeTypes.length>S.regQty)  S.regBikeTypes.pop();
  while(S.regRiderNames.length<S.regQty) S.regRiderNames.push(undefined);
  while(S.regRiderNames.length>S.regQty) S.regRiderNames.pop();
}

async function submitReg(){
  if(S.regSubmitting)return;
  const cust=S.loggedIn||getSession();
  if(!cust){toast(t('errLoginFirst'),'error');return;}
  if(!S.selSession){
    const sp=document.getElementById('session-picker-wrap');
    if(sp){sp.style.outline='2px solid var(--red)';sp.style.borderRadius='14px';setTimeout(()=>{sp.style.outline='';sp.style.borderRadius='';},2500);}
    toast(t('errSelectSession'),'error');
    document.getElementById('session-picker-wrap')?.scrollIntoView({behavior:_sb(),block:'center'});
    return;
  }
  const _selSess0=allSessions().find(s=>s.id===S.selSession);
  if(!_selSess0||(_selSess0.status!=='open'&&_selSess0.status!=='full')){toast(t('errSessionClosed'),'error');return;}

  const qty=S.regQty||1;
  ensureBikeSizes();
  if(!validateRegInputs())return;
  const heights=[];
  for(let i=0;i<qty;i++)heights.push(parseInt(S.regBikeHeights[i]));

  // A full session is joinable, but as a waitlist booking (promoted later if a spot opens).
  // Decide by ACTUAL remaining spots too, not just the manually-set 'full' status — capacity
  // could be reached without staff marking it, and a group needs qty spots, not one.
  const sess0=allSessions().find(s=>s.id===S.selSession);
  const bookingStatus=(sess0&&sess0.status==='full')||spotsLeft(S.selSession)<qty?'waitlist':'waiting';

  const email=cust.email||'',phone=cust.phone||'';
  
  const riderNames=Array.from({length:qty},(_,i)=>{
    const entered=S.regRiderNames[i];
    return (entered!==undefined&&entered.trim())?entered.trim():(i===0?cust.name:'');
  });
  const queue=getQueue();
  
  const activeStatuses=['waiting','active','waitlist'];
  const existingActive=cust.id
    ?queue.find(e=>e.customerId===cust.id&&e.sessionId===S.selSession&&activeStatuses.includes(e.status))
    :(phone?queue.find(e=>e.phone===phone&&e.sessionId===S.selSession&&activeStatuses.includes(e.status)):null);
  if(existingActive){
    
    S._alreadyBookedSession=S.selSession;
    renderRegister();
    
    setTimeout(()=>{const b=document.getElementById('already-booked-banner');if(b)b.scrollIntoView({behavior:_sb(),block:'center'});},80);
    return;
  }

  S.regSubmitting=true;
  renderRegister();
  try{
    
    await loadData();
    const sess=allSessions().find(s=>s.id===S.selSession)||{day:'',session_date:S.selSession};
    const baseQNum=nextQNum(S.selSession);
    
    const entries=Array.from({length:qty},(_,i)=>({
      id:uid(),name:riderNames[i],email,phone,
      size:heights[i]?heightToSize(heights[i]):'',height:heights[i]||null,
      typePreference:S.regBikeTypes[i],paid:false,
      assignedBikeId:null,sessionId:S.selSession,sessionDay:sess.day,sessionDate:sess.session_date||S.selSession,
      queueNum:baseQNum+i,status:bookingStatus,registeredAt:new Date().toISOString(),walkIn:false,
      customerId:cust.id,price:priceForType(S.regBikeTypes[i])
    }));
    // Apply promo discount across the entries' prices
    if(S.promoApplied){
      const p=S.promoApplied;
      if(p.applies_to){
        // Type-restricted code (e.g. MMTEAM on Road Carbon): discount lands exactly on the
        // matching bikes, per bike — other riders in the group keep their full price.
        entries.forEach(e=>{
          if(e.typePreference===p.applies_to){
            const d=p.kind==='flat'?Math.min(Number(p.value),e.price||0):(e.price||0)*(Number(p.value)/100);
            e.price=Math.max(0,Math.round(((e.price||0)-d)*100)/100);
          }
        });
      }else{
        const base=entries.reduce((s,e)=>s+(e.price||0),0);
        const disc=_promoDiscount(base);
        if(base>0&&disc>0){
          const f=(base-disc)/base,target=Math.round((base-disc)*100)/100;
          entries.forEach(e=>{e.price=Math.max(0,Math.round((e.price||0)*f*100)/100);});
          // per-rider rounding can drift a halala or two off the promised total — the last rider absorbs it
          const sum=Math.round(entries.reduce((s2,e)=>s2+e.price,0)*100)/100,drift=Math.round((target-sum)*100)/100;
          if(drift!==0&&entries.length)entries[entries.length-1].price=Math.max(0,Math.round((entries[entries.length-1].price+drift)*100)/100);
        }
      }
      if(S.promoApplied.code)entries.forEach(e=>{e.promoCode=String(S.promoApplied.code);}); // carry the code at insert so the price trigger allows the discount
    }
    const _offline=(typeof navigator!=='undefined'&&navigator.onLine===false);
    let _queued=false;
    if(_offline){
      // Offline: queue the inserts and confirm the booking optimistically (synced on reconnect)
      entries.forEach(e=>_bookOutboxAdd(entryToDB(e)));
      S.queue=[...(S.queue||[]),...entries.map(e=>entryFromDB(entryToDB(e)))];
      _queued=true;_bookOutboxFlush();
    }else{
      let _ok=false;
      for(let _try=0;_try<4&&!_ok;_try++){
        try{
          const insRes=await Promise.all(entries.map(e=>sb.from('queue_entries').insert(entryToDB(e))));
          const insFail=insRes.find(r=>r&&r.error);
          if(insFail)throw insFail.error;
          _ok=true;
        }catch(err){
          if(typeof navigator!=='undefined'&&navigator.onLine===false){
            // Connection dropped mid-submit: queue instead of losing the booking
            entries.forEach(e=>_bookOutboxAdd(entryToDB(e)));
            S.queue=[...(S.queue||[]),...entries.map(e=>entryFromDB(entryToDB(e)))];
            _queued=true;_ok=true;_bookOutboxFlush();
          }else{
            const _msg=((err&&(err.code||err.message))||'')+'';
            const _dup=_msg.includes('23505')||/duplicate|unique/i.test(_msg); // unique (session_id,queue_num) clash
            // Roll back any rows that DID insert before retrying or bailing
            await Promise.all(entries.map(e=>sb.from('queue_entries').delete().eq('id',e.id))).catch(()=>{});
            if(_dup&&_try<3){
              await loadData();
              const _base=nextQNum(S.selSession);entries.forEach((e,i)=>{e.queueNum=_base+i;}); // fresh numbers, then retry
              continue;
            }
            toast((err&&err.message)||t('errConnection'),'error');
            return;
          }
        }
      }
    }
    // Race guard (online inserts only): if a simultaneous booking grabbed the same number(s), renumber ours
    if(!_queued&&bookingStatus==='waiting'){
      await loadData();
      const clash=entries.some(e=>getQueue().some(o=>o.id!==e.id&&o.sessionId===e.sessionId&&o.queueNum===e.queueNum&&!['cancelled','removed','waitlist'].includes(o.status)));
      if(clash){
        const fresh=nextQNum(S.selSession);
        await Promise.all(entries.map((e,i)=>{e.queueNum=fresh+i;return sb.from('queue_entries').update({queue_num:e.queueNum}).eq('id',e.id);}));
      }
    }

    
    if(!cust.height&&heights[0]){
      try{
        await sb.from('customers').update({height:heights[0]}).eq('id',cust.id);
        S.loggedIn.height=heights[0];setSession(S.loggedIn);
      }catch(e){}
    }
    // Save selected add-ons on every entry (tolerant: a missing 'addons' column won't break the booking)
    if((S.regAddons||[]).length){
      const _aj=JSON.stringify(S.regAddons);
      try{await _ownEntryUpdate(entries[0].id,{addons:_aj});entries[0].addons=S.regAddons;}catch(e){} // add-ons attach to the account holder only (per-rider, not the whole booking)
      // Consume add-on stock once for the whole booking
      if(bookingStatus!=='waitlist')await _addonStockQ(S.regAddons,-1);
    }
    // Record the promo code used (tolerant) so redemptions can be reported
    if(S.promoApplied&&S.promoApplied.code){const _pc=String(S.promoApplied.code);try{await Promise.all(entries.map(e=>_ownEntryUpdate(e.id,{promo_code:_pc})));}catch(e){}}

    await loadData();
    _sendBookingEmail(entries[0]); // confirmation email (no-op unless Brevo is configured server-side)
    S.lastTickets=entries.map(e=>getQueue().find(q=>q.id===e.id)||e);
    S._rHeight='';S._rDate='';S.selSession=null;S.regType=null;
    S.regQty=1;S.regBikeSizes=[];S.regBikeHeights=[];S.regBikeTypes=[];S.regRiderNames=[];S._alreadyBookedSession=null;S.regStep=1;S.promoApplied=null;S._promoMsg='';S.regAddons=[];
    const _qn=entries.map(e=>e.queueNum);
    const numStr=qty>1?`#${_qn[0]} – #${_qn[_qn.length-1]}`:`#${_qn[0]}`;
    logAction(`${bookingStatus==='waitlist'?t('logWaitlistedWord'):t('logBookedWord')} ${numStr} (${(S.loggedIn&&S.loggedIn.name)||'rider'})`);
    toast(bookingStatus==='waitlist'?`${t('toastWaitlisted')} ${numStr}`:`${t('toastRegistered')} ${numStr}`);
    renderRegister();renderMyRides();
    showBoothPopup();
  }finally{
    S.regSubmitting=false;
    renderRegister();
  }
}

async function submitModifyBooking(){
  const cust=S.loggedIn||getSession();
  if(!cust){toast(t('errLoginFirst'),'error');return;}
  if(!S.selSession){toast(t('errSelectSession'),'error');return;}

  const existing=getQueue().filter(e=>
    e.customerId===cust.id&&e.sessionId===S.selSession&&e.status==='waiting'
  ).sort((a,b)=>a.queueNum-b.queueNum);

  const newQty=S.regQty||1;
  ensureBikeSizes();

  
  for(let i=0;i<newQty;i++){
    if(!S.regBikeTypes[i]){
      const wrap=document.getElementById(`reg-type-wrap-${i}`);
      if(wrap){wrap.style.outline='2px solid var(--red)';wrap.style.borderRadius='10px';setTimeout(()=>{wrap.style.outline='';wrap.style.borderRadius='';},2500);wrap.scrollIntoView({behavior:_sb(),block:'center'});}
      toast(newQty>1?`${t('errSelectTypeGeneric')} (${t('bike')} ${i+1})`:t('errSelectTypeGeneric'),'error');return;
    }
  }

  const sess=allSessions().find(s=>s.id===S.selSession)||{day:'',session_date:S.selSession};
  const calls=[];

  
  for(let i=0;i<Math.min(newQty,existing.length);i++){
    const entry=existing[i];
    const newType=S.regBikeTypes[i];
    if(entry.typePreference!==newType){
      calls.push(_ownEntryUpdate(entry.id,{type_preference:newType,price:priceForType(newType)}));
    }
  }


  if(newQty<existing.length){
    const toRemove=existing.slice(newQty);
    toRemove.forEach(e=>calls.push(_ownEntryUpdate(e.id,{status:'cancelled'})));
  }

  
  const addedEntries=[];
  if(newQty>existing.length){
    
    let nextNum=nextQNum(S.selSession);
    for(let i=existing.length;i<newQty;i++){
      const modRiderName=i===0?cust.name:(S.regRiderNames[i]||'').trim();
      const modHeight=parseInt(S.regBikeHeights[i])||null;
      const entry={
        id:uid(),name:modRiderName,email:cust.email||'',phone:cust.phone||'',
        size:modHeight?heightToSize(modHeight):'',height:modHeight,typePreference:S.regBikeTypes[i],
        paid:false,assignedBikeId:null,
        sessionId:S.selSession,sessionDay:sess.day,sessionDate:sess.session_date||S.selSession,
        queueNum:nextNum++,status:'waiting',
        registeredAt:new Date().toISOString(),walkIn:false,
        customerId:cust.id,price:priceForType(S.regBikeTypes[i])
      };
      addedEntries.push(entry);
      calls.push(sb.from('queue_entries').insert(entryToDB(entry)));
    }
  }

  if(calls.length>0){
    const res=await Promise.all(calls);
    const fail=res.find(r=>r&&r.error);
    if(fail){toast(fail.error.message||t('errConnection'),'error');return;}
  }
  await loadData();


  const allUpdatedIds=[...existing.map(e=>e.id),...addedEntries.map(e=>e.id)];
  S.lastTickets=allUpdatedIds.map(id=>getQueue().find(e=>e.id===id)).filter(Boolean).slice(0,newQty);
  logAction(`${t('logUpdatedBooking')} (${(S.loggedIn&&S.loggedIn.name)||'rider'})`);

  if(addedEntries.length>0){
    toast(`${t('toastBookingUpdated')} + ${t('toastRegistered')} ${addedEntries.map(e=>`#${e.queueNum}`).join(', ')}`);
  }else{
    toast(t('toastBookingUpdated'));
  }

  S.modifyEntryId=null;S.selSession=null;S.regStep=1;
  S.regBikeSizes=[];S.regBikeTypes=[];S.regRiderNames=[];S.regQty=1;S.regBikeHeights=[];
  renderRegister();renderMyRides();
}

// Build & download a .ics calendar file for a session (fully client-side, no service)
function downloadBookingICS(sessionId){
  const sess=allSessions().find(s=>s.id===sessionId);
  if(!sess){toast(t('errSessionClosed'),'error');return;}
  const dateRaw=(sess.session_date||sess.id||'').slice(0,10);
  const date=dateRaw.replace(/-/g,'');
  if(date.length!==8){toast(t('errSessionClosed'),'error');return;}
  const raw=((parseSlots(sess.bike_slots)||{})._time)||'09:00 - 11:00';
  const m=raw.match(/(\d{1,2}):(\d{2})\s*[-–]\s*(\d{1,2}):(\d{2})/);
  const pad=n=>String(n).padStart(2,'0');
  let st='090000',en='110000';
  if(m){st=pad(m[1])+pad(m[2])+'00';en=pad(m[3])+pad(m[4])+'00';}
  const stamp=new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  const esc2=s=>String(s).replace(/[\\,;]/g,x=>'\\'+x).replace(/\n/g,'\\n');
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//MicroMobility//Corniche Circuit//EN','CALSCALE:GREGORIAN','BEGIN:VEVENT',
    'UID:'+sessionId+'-'+Date.now()+'@micromobility','DTSTAMP:'+stamp,
    'DTSTART:'+date+'T'+st,'DTEND:'+date+'T'+en,
    'SUMMARY:'+esc2('MicroMobility Ride - '+(dayLabel(sess.day)||'')),
    'LOCATION:'+esc2(({'JCC':'Jeddah Corniche Circuit','Sharafeyah Branch':'Sharafeyah, Jeddah'})[sess.location]||sess.location||'Jeddah Corniche Circuit'),
    'DESCRIPTION:'+esc2('Your MicroMobility bike rental booking. Arrive 10 minutes early and show your ticket at the desk.'),
    'BEGIN:VALARM','TRIGGER:-PT2H','ACTION:DISPLAY','DESCRIPTION:MicroMobility ride reminder','END:VALARM',
    'END:VEVENT','END:VCALENDAR'];
  const blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='micromobility-'+date+'.ics';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}

// Rebook the same riders/types/heights as a past booking (customer picks a new session)
// One-tap rebooking for returning riders: pre-fill a solo booking with their remembered height + favourite bike type,
// auto-pick the soonest open session matching their favourite time-of-day, and drop them on review to just confirm.
function bookMyUsual(){
  const cust=S.loggedIn||getSession();if(!cust||!cust.id)return;
  const mine=getQueue().filter(e=>e.customerId===cust.id);
  // Favourite session time-of-day, by how often they've booked it
  const timeCount={};
  mine.forEach(e=>{const s=(S.sessions||[]).find(x=>x.id===e.sessionId);if(!s)return;const tm=(parseSlots(s.bike_slots)||{})._time;if(tm)timeCount[tm]=(timeCount[tm]||0)+1;});
  const favTime=Object.keys(timeCount).sort((a,b)=>timeCount[b]-timeCount[a])[0]||null;
  // Open sessions they are not already in, soonest first; prefer ones with a free spot, matching the favourite time
  const bookedIds=new Set(mine.filter(e=>e.status==='waiting'||e.status==='active'||e.status==='waitlist').map(e=>e.sessionId));
  const open=allSessions().filter(s=>s.status==='open'&&!bookedIds.has(s.id)).sort((a,b)=>new Date(a.session_date||a.id)-new Date(b.session_date||b.id));
  if(!open.length){toast(t('noSessionsAvail'),'warning');return;}
  const withSpot=open.filter(s=>spotsLeft(s.id)>0);
  const pool=withSpot.length?withSpot:open;
  const pick=(favTime&&pool.find(s=>(parseSlots(s.bike_slots)||{})._time===favTime))||pool[0];
  S.selSession=pick.id;
  S.regQty=1;
  S.regBikeTypes=[cust.type_preference||'Any'];
  S.regBikeHeights=[cust.height?String(cust.height):''];
  S.regRiderNames=[cust.name||''];
  S.regBikeSizes=[''];
  S.lastTickets=[];S.modifyEntryId=null;S._alreadyBookedSession=null;
  S.regStep=(cust.height&&cust.type_preference)?3:2; // if we already know their setup, jump straight to review; otherwise let them fill rider details
  setCustTab('register');
  try{window.scrollTo({top:0,behavior:_sb()});}catch(e){}
  toast(t('bookUsualToast'));
}
function bookAgain(ids){
  const entries=String(ids).split(',').map(id=>getQueue().find(e=>e.id===id)).filter(Boolean);
  if(!entries.length)return;
  entries.sort((a,b)=>(a.queueNum||0)-(b.queueNum||0));

  S.regBikeSizes=entries.map(()=>'');

  setCustTab('register');

}

// ── Post-ride rating (bike + experience, 1-10, plus a note) ──
function openRateModal(id,forced){
  const e=getQueue().find(x=>x.id===id);if(!e)return;
  S._rateId=id;S._rateBike=e.ratingBike||0;S._rateExp=e.ratingExp||0;S._rateNote=e.feedback||'';S._rateForced=!!forced;
  renderRateModal();
  document.getElementById('rate-modal').style.display='flex';
}
function closeRateModal(){
  const m=document.getElementById('rate-modal');if(m)m.style.display='none';
  // A forced prompt dismissed without a rating is snoozed for this session so it doesn't instantly re-open (it re-prompts on reload or when another ride completes).
  if(S._rateForced&&S._rateId){const e=getQueue().find(x=>x.id===S._rateId);if(e&&!(e.ratingExp||e.ratingBike)){S._rateSnoozed=S._rateSnoozed||new Set();S._rateSnoozed.add(S._rateId);}}
  S._rateForced=false;
}
// Force post-ride rating only for a genuinely COMPLETED ride = bike physically returned
// (checked_out_at stamped by _execReturn) AND paid. A payment toggle while the bike is still
// out (status 'active') never qualifies. Scoped to today's session, oldest unrated first.
function _pendingRatingId(){
  const cust=S.loggedIn;if(!cust)return null;
  const today=todayStr();
  const done=getQueue().filter(e=>e.customerId===cust.id&&e.status==='done'&&!!e.checkedOutAt&&e.paid&&(e.sessionDate||e.sessionId)===today);
  const map={};done.forEach(e=>{(map[e.sessionId]=map[e.sessionId]||[]).push(e);});
  const groups=Object.values(map).map(g=>g.slice().sort((a,b)=>(a.queueNum||0)-(b.queueNum||0)));
  const snz=S._rateSnoozed||new Set();
  const unrated=groups.filter(g=>!(g[0].ratingExp||g[0].ratingBike)&&!snz.has(g[0].id));
  return unrated.length?unrated[0][0].id:null;
}
// Auto-open the rating for a just-completed ride. Runs from renderMyRides, which realtime fires the moment staff marks the ride done.
function _forceRatingPrompt(){
  if(S.view!=='customer'||!S.loggedIn)return;
  const rm=document.getElementById('rate-modal');if(rm&&rm.style.display==='flex')return;
  const id=_pendingRatingId();if(!id)return;
  openRateModal(id,true);
}
function setRate(kind,v){if(kind==='bike')S._rateBike=v;else S._rateExp=v;renderRateModal();}
function renderRateModal(){
  const scale=n=>{const cur=n==='bike'?S._rateBike:S._rateExp;return Array.from({length:10},(_,i)=>i+1).map(v=>`<button onclick="setRate('${n}',${v})" aria-label="${v}" style="width:28px;height:28px;border-radius:50%;border:1px solid ${cur>=v?'var(--green)':'var(--border)'};background:${cur>=v?'rgba(var(--green-rgb),.18)':'transparent'};color:${cur>=v?'var(--green)':'var(--muted)'};font-weight:800;font-size:11px;cursor:pointer">${v}</button>`).join('');};
  const _re=getQueue().find(x=>x.id===S._rateId);
  const _rs=_re?allSessions().find(s=>s.id===_re.sessionId):null;
  const _rmeta=_re?`${_rs&&_rs.day?dayLabel(_rs.day)+' · ':''}${shortDate(_re.sessionDate||_re.sessionId)}${_rs&&_rs.location?' · '+esc(_rs.location):''}`:'';
  document.getElementById('rate-modal').innerHTML=`<div class="modal-backdrop" onclick="${S._rateForced?'':'if(event.target===this)closeRateModal()'}">
    <div class="modal-box" role="dialog" aria-modal="true" style="max-width:440px">
      <div class="modal-title">${t('rateTitle')}</div>
      ${_rmeta?`<div style="font-size:12px;color:var(--green);font-weight:700;margin-top:4px">${_rmeta}</div>`:''}
      ${S._rateForced?`<div style="font-size:12px;color:var(--muted);margin-top:4px">${t('rateForcedHint')}</div>`:''}
      <div style="margin:16px 0">
        <div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">${t('rateBikeLabel')}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">${scale('bike')}</div>
      </div>
      <div style="margin:16px 0">
        <div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">${t('rateExpLabel')}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">${scale('exp')}</div>
      </div>
      <div class="form-group" style="margin:16px 0">
        <label>${t('rateNoteLabel')}</label>
        <textarea id="rate-note" rows="3" oninput="S._rateNote=this.value" style="width:100%;background:var(--s3);border:1px solid var(--border);border-radius:4px;padding:10px;color:var(--text);font-family:'Barlow',sans-serif;resize:vertical">${esc(S._rateNote||'')}</textarea>
      </div>
      <div class="modal-footer">
        ${S._rateForced?'':`<button class="btn-secondary" onclick="closeRateModal()">${t('cancelBtn')}</button>`}
        <button class="btn-primary" style="${S._rateForced?'width:100%':''}" onclick="submitRating()">${t('rateSubmitBtn')}</button>
      </div>
    </div>
  </div>`;
}
async function submitRating(){
  const id=S._rateId;if(!id)return;
  const note=(document.getElementById('rate-note')?.value||S._rateNote||'').trim();
  S._rateNote=note;
  if(S._rateForced&&!(S._rateExp>0)){ // forced prompt: the experience rating is mandatory
    toast(t('rateRequiredScore'),'warning');
    return;
  }
  const{error}=await _ownEntryUpdate(id,{rating_bike:S._rateBike||null,rating_exp:S._rateExp||null,feedback:note||null});
  if(error){toast(error.message||t('errConnection'),'error');return;}
  const e=getQueue().find(x=>x.id===id);if(e){e.ratingBike=S._rateBike||null;e.ratingExp=S._rateExp||null;e.feedback=note||null;}
  closeRateModal();toast(t('rateThanks'));renderMyRides();
}

function renderMyRides(){
  const cust=S.loggedIn;
  if(!cust){document.getElementById('tab-myrides').innerHTML='';return;}
  const allEntries=getQueue().filter(e=>e.customerId===cust.id);
  
  const map={};
  allEntries.forEach(e=>{(map[e.sessionId]=map[e.sessionId]||[]).push(e);});
  const currentGroups=[],pastGroups=[];
  Object.values(map).forEach(g=>{
    const upcoming=g.filter(e=>e.status==='waiting'||e.status==='active'||e.status==='waitlist');
    if(upcoming.length){currentGroups.push(upcoming);}
    else{
      
      const saved=g.filter(e=>e.status==='done'&&e.paid);
      if(saved.length)pastGroups.push(saved);
    }
  });
  const byDateDesc=(a,b)=>new Date(b[0].sessionDate||b[0].sessionId)-new Date(a[0].sessionDate||a[0].sessionId);
  currentGroups.sort(byDateDesc);pastGroups.sort(byDateDesc);
  const completed=allEntries.filter(e=>e.status==='done'&&e.paid);
  const currentCards=currentGroups.length
    ?currentGroups.map(g=>renderBookingTicket(g,{actions:true})).join('')
    :`<div class="empty-state" style="grid-column:1/-1">${t('noCurrentRides')}</div>`;
  const pastCards=pastGroups.length
    ?pastGroups.map(g=>renderBookingTicket(g,{bookAgain:true})).join('')
    :`<div class="empty-state" style="grid-column:1/-1">${t('noPastRides')}</div>`;
  // v2 empty state: no rides at all -> big gray 0 with a booking prompt instead of two empty sections
  if(!currentGroups.length&&!pastGroups.length){
    document.getElementById('tab-myrides').innerHTML=`
      <div class="page-title">${t('myRidesTitle')}</div>
      <div class="page-sub">${t('myRidesSub')}</div>
      <div class="rides-zero">
        <div class="rides-zero-num">0</div>
        <div class="rides-zero-msg">${t('noCurrentRides')}</div>
        <button class="btn-primary" onclick="setCustTab('register')">${t('navReserve')}</button>
      </div>`;
    try{_forceRatingPrompt();}catch(e){}
    return;
  }
  document.getElementById('tab-myrides').innerHTML=`
    <div class="page-title">${t('myRidesTitle')}</div>
    <div class="page-sub">${t('myRidesSub')}</div>
    <div class="rides-stat-row">${(()=>{
      const _typeCount={};completed.forEach(e=>{_typeCount[resolvedType(e)]=(_typeCount[resolvedType(e)]||0)+1;});
      const _favType=Object.keys(_typeCount).sort((a,b)=>_typeCount[b]-_typeCount[a])[0]||'—';
      const _memberSince=cust.created_at?new Date(cust.created_at).toLocaleDateString('en-GB',{month:'short',year:'numeric'}):'—';
      return`
      <div class="rides-stat-card"><div class="rides-stat-num" style="color:var(--green)">${completed.length}</div><div class="rides-stat-label">${t('statTotalRides')}</div></div>
      <div class="rides-stat-card"><div class="rides-stat-num" style="color:var(--muted-l);font-size:18px">${_memberSince}</div><div class="rides-stat-label">${t('statMemberSince')}</div></div>
      <div class="rides-stat-card"><div class="rides-stat-num" style="font-size:16px;padding-top:4px">${_favType!=='—'?typeBadge(_favType):t('anNoData2')}</div><div class="rides-stat-label">${t('statFavType')}</div></div>`;
    })()}</div>
    <div class="analytics-section-title" style="margin-top:24px">${t('myCurrentRides')}</div>
    <div class="myrides-grid">${currentCards}</div>
    <div class="analytics-section-title" style="margin-top:30px">${t('myPastRides')}</div>
    <div class="myrides-grid">${pastCards}</div>`;
  try{_forceRatingPrompt();}catch(e){} // force the rating the moment a ride is marked completed (realtime fires this)

// Output a resized canvas as a small image: upload to the public Supabase Storage bucket 'photos' (tiny
// row payloads, browser-cacheable) and hand back its URL; if Storage isn't set up or fails, fall back to a
// data URL (current behaviour). Existing data-URL photos keep rendering either way.
function _photoOut(c,cb){
  const dataUrl=c.toDataURL('image/jpeg',0.82);
  if(!sb||!sb.storage||!c.toBlob){cb(dataUrl);return;}
  try{
    c.toBlob(async blob=>{
      if(!blob){cb(dataUrl);return;}
      try{
        const path='p/'+uid()+'.jpg';
        const{error}=await sb.storage.from('photos').upload(path,blob,{contentType:'image/jpeg',upsert:true,cacheControl:'31536000'}); // 1-year cache: photos are content-addressed by uid, so they never change
        if(error){cb(dataUrl);return;}
        const{data}=sb.storage.from('photos').getPublicUrl(path);
        cb((data&&data.publicUrl)?data.publicUrl:dataUrl);
      }catch(e){cb(dataUrl);}
    },'image/jpeg',0.82);
  }catch(e){cb(dataUrl);}
}
// ── Profile photo: resize client-side to a small square; stored to Storage (URL) or as a data-URL fallback ──
function pickImage(input,cb,max,square){
  const file=input.files&&input.files[0];if(!file)return;
  max=max||300;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      if(square){
        // center-crop to a square, then scale to max×max
        const side=Math.min(img.width,img.height);
        const sx=(img.width-side)/2,sy=(img.height-side)/2;
        const c=document.createElement('canvas');c.width=max;c.height=max;
        c.getContext('2d').drawImage(img,sx,sy,side,side,0,0,max,max);
        _photoOut(c,cb);return;
      }
      let w=img.width,h=img.height;
      if(w>h){if(w>max){h=Math.round(h*max/w);w=max;}}else{if(h>max){w=Math.round(w*max/h);h=max;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      _photoOut(c,cb);
    };
    img.onerror=()=>toast(t('photoErrToast'),'error');
    img.src=ev.target.result;
  };
  reader.onerror=()=>toast(t('photoErrToast'),'error');
  reader.readAsDataURL(file);
}

function parseSlots(raw){
  if(!raw)return null;
  if(typeof raw==='string'){try{return JSON.parse(raw);}catch{return null;}}
  return raw;
}
function slotsFormat(s){
  
  if(!s)return null;
  if(s._bikes)return 'ids';
  if(typeof s.Road==='number'||typeof s.Hybrid==='number'||typeof s.Mountain==='number')return 'counts';
  return 'legacy';
}
function slotsLabel(raw){
  const s=parseSlots(raw);if(!s)return'—';
  const fmt=slotsFormat(s);
  const abbr={Road:'Road',Hybrid:'Hybrid',Mountain:'Mtn'};
  if(fmt==='ids'){
    
    const counts={};
    (s._bikes||[]).forEach(id=>{const b=bikeById(id);if(b)counts[b.type]=(counts[b.type]||0)+1;});
    return Object.entries(counts).filter(([,v])=>v>0).map(([ty,v])=>`${abbr[ty]||ty}×${v}`).join(', ')||'—';
  }
  if(fmt==='counts'){
    return Object.entries(s).filter(([k,v])=>v>0&&k!=='_bikes').map(([ty,v])=>`${abbr[ty]||ty}×${v}`).join(', ')||'—';
  }
  
  const parts=[];
  for(const[ty,szs]of Object.entries(s)){
    if(ty==='_bikes')continue;
    const sum=typeof szs==='number'?szs:Object.values(szs||{}).reduce((a,b)=>a+(b||0),0);
    if(sum>0)parts.push(`${abbr[ty]||ty}×${sum}`);
  }
  return parts.join(', ')||'—';
}

// Read a session's offered add-on inventory items. Sold-out items stay in the
// list (rendered dimmed with a sold-out badge, unselectable) sorted after stock.
function sessionAddonItems(sess){
  if(!sess)return[];
  let ids=[];try{ids=sess.addons?(Array.isArray(sess.addons)?sess.addons:JSON.parse(sess.addons)):[];}catch(_){ids=[];}
  return ids.map(id=>(S.inventory||[]).find(it=>it.id===id)).filter(Boolean)
    .sort((a,b)=>(((Number(a.qty)||0)>0)?0:1)-(((Number(b.qty)||0)>0)?0:1));
}
// A booking's add-ons normalized to [{id,qty}] (back-compat: legacy format was a flat [id] array)
function entryAddons(e){
  let raw=[];try{raw=e&&e.addons?(Array.isArray(e.addons)?e.addons:JSON.parse(e.addons)):[];}catch(_){raw=[];}
  const out=[];
  (raw||[]).forEach(a=>{
    const id=(a&&typeof a==='object')?a.id:a;
    const qty=(a&&typeof a==='object')?Math.max(1,Number(a.qty)||1):1;
    if(!id)return;const ex=out.find(x=>x.id===id);if(ex)ex.qty+=qty;else out.push({id,qty});
  });
  return out;
}
// Flat list of add-on ids for a booking (back-compat helper)
function entryAddonIds(e){return entryAddons(e).map(a=>a.id);}
// Join add-ons to inventory -> [{id,qty,name,brand,photo,price,lineTotal}]
function addonLineItems(arr){
  return (arr||[]).map(a=>{
    const id=(a&&typeof a==='object')?a.id:a;
    const qty=(a&&typeof a==='object')?Math.max(1,Number(a.qty)||1):1;
    const it=(S.inventory||[]).find(x=>x.id===id)||{};
    const price=it.price!=null?Number(it.price):0;
    return{id,qty,name:it.name||id,brand:it.brand||'',photo:it.photo||'',price,lineTotal:Math.round(price*qty*100)/100};
  }).filter(a=>a.id);
}
// Total SAR cost of a set of add-ons
function addonsCost(arr){return Math.round(addonLineItems(arr).reduce((s,a)=>s+a.lineTotal,0)*100)/100;}
// Tally add-ons across booking groups (qty-aware). Returns {items:[{id,name,brand,units,value}], totalUnits, totalValue}
function addonSalesFromGroups(groups){
  const tally={};let totalUnits=0,totalValue=0;
  (groups||[]).forEach(group=>{
    (group||[]).forEach(e=>entryAddons(e).forEach(({id,qty})=>{ // per-rider: every rider's own add-ons, not just the lead
      const it=(S.inventory||[]).find(x=>x.id===id);
      const name=it?it.name:id,brand=it?(it.brand||''):'',price=(it&&it.price!=null)?Number(it.price):0;
      if(!tally[id])tally[id]={id,name,brand,units:0,value:0};
      tally[id].units+=qty;tally[id].value+=price*qty;totalUnits+=qty;totalValue+=price*qty;
    }));
  });
  return{items:Object.values(tally).sort((a,b)=>b.units-a.units||b.value-a.value),totalUnits,totalValue};
}
// Adjust inventory stock for a set of add-on ids by delta (-1 when a booking consumes them, +1 on cancel/no-show). Clamped at 0; tolerant of a missing qty column.
async function _addonStock(ids,delta){
  if(!ids||!ids.length||!sb)return;
  await Promise.all(ids.map(async id=>{
    const it=(S.inventory||[]).find(x=>x.id===id);if(!it)return;
    const q=Math.max(0,(Number(it.qty)||0)+delta);it.qty=q;
    try{await sb.from('inventory').update({qty:q,updated_at:new Date().toISOString()}).eq('id',id);}catch(e){}
  }));
}
// Apply stock deltas from a set of receipt/cart lines, SUMMED per unique item so each inventory
// row takes exactly one absolute write. Two lines of the same item would otherwise fire concurrent
// absolute-value writes that can land out of order (over-sell on decrement, under-restock on refund).
async function _addonStockBatch(lines,sign){
  const agg={};(lines||[]).forEach(l=>{if(l&&l.item_id)agg[l.item_id]=(agg[l.item_id]||0)+(Number(l.qty)||1)*sign;});
  await Promise.all(Object.keys(agg).map(id=>_addonStock([id],agg[id])));
}
// Qty-aware stock adjustment for a booking's add-ons [{id,qty}] (sign -1 consume, +1 restock)
async function _addonStockQ(arr,sign){
  const norm=(arr||[]).map(a=>(a&&typeof a==='object')?{id:a.id,qty:Math.max(1,Number(a.qty)||1)}:{id:a,qty:1}).filter(a=>a.id);
  if(!norm.length||!sb)return;
  // Update the local copy first so the UI reflects the change immediately.
  norm.forEach(({id,qty})=>{const it=(S.inventory||[]).find(x=>x.id===id);if(it)it.qty=(Number(it.qty)||0)+sign*qty;}); // may go negative: backordered add-ons owed to bookings; cancel/undo stays symmetric
  if(_asCustomer()){
    // Inventory writes are staff-only after Section 6; a customer's add-on stock
    // change (book/cancel) goes through the token-checked RPC instead.
    const c=S.loggedIn||getSession();
    if(c&&c.session_token){try{await sb.rpc('customer_addon_stock',{p_id:c.id,p_token:c.session_token,p_items:norm.map(({id,qty})=>({id,delta:sign*qty}))});}catch(e){}}
    return;
  }
  await Promise.all(norm.map(async({id,qty})=>{
    const it=(S.inventory||[]).find(x=>x.id===id);if(!it)return;

async function _consumeAddonsOnEnter(entry){
  const ad=entryAddons(entry);if(!ad.length)return;

// Core: add (+1) or remove (−1) one unit of an add-on on a booking; updates stock + DB. No render.
async function _entryAddonMutate(id,addonId,delta){
  const e=getQueue().find(x=>x.id===id);if(!e)return false;
  const it=(S.inventory||[]).find(x=>x.id===addonId);if(!it)return false;
  const stock=Number(it.qty)||0;
  let cur=entryAddons(e);
  const a=cur.find(x=>x.id===addonId);
  if(delta>0){if(stock<=0)return false;if(a)a.qty+=1;else cur.push({id:addonId,qty:1});}
  else{if(!a)return false;a.qty-=1;if(a.qty<=0)cur=cur.filter(x=>x.id!==addonId);}
  e.addons=cur;                                            // live update so totals/views reflect immediately
  await _addonStockQ([{id:addonId,qty:1}],delta>0?-1:1);   // consume on +, restock on - (per rider)
  try{await sb.from('queue_entries').update({addons:JSON.stringify(cur)}).eq('id',id);}catch(err){} // tolerant: missing column won't break
  return true;
}
async function _addonPickerStep(addonId,delta){
  await _entryAddonMutate(S._addonPickerEntry,addonId,delta);
  renderAddonPicker();
  if(S.view==='staff')renderStaffQueue();else if(S.view==='customer')renderMyRides();
}

// One-click data backup (admin): downloads the whole dataset as JSON
// Repeat no-show count for the rider behind an entry (by account, else name+phone)
// No-show tallies, built once per queue and cached (rebuilds when the queue array/length changes).
// noShowFlag() is rendered for every booking row, so scanning the whole queue per call made the
// Bookings tab O(n²) and slow to load; this map makes each lookup O(1).
let _nsRef=null,_nsLen=-1,_nsById=null,_nsByNP=null;
function _noShowCounts(){
  const ql=S.queue||[];
  if(_nsRef===S.queue&&_nsLen===ql.length&&_nsById)return{byId:_nsById,byNP:_nsByNP};
  const byId={},byNP={};
  ql.forEach(x=>{if(x.status!=='noshow')return;if(x.customerId){byId[x.customerId]=(byId[x.customerId]||0)+1;}else{const nm=(x.name||'').trim(),ph=(x.phone||'').trim();if(nm||ph)byNP[nm+'␀'+ph]=(byNP[nm+'␀'+ph]||0)+1;}});
  _nsRef=S.queue;_nsLen=ql.length;_nsById=byId;_nsByNP=byNP;return{byId,byNP};
}
function customerNoShows(e){
  if(!e)return 0;
  const{byId,byNP}=_noShowCounts();
  if(e.customerId)return byId[e.customerId]||0;
  // No account: identify by name+phone. If both are missing (e.g. PII-free data), we can't
  // tell riders apart — don't group them (that once made every anonymous row count as one).
  const nm=(e.name||'').trim(),ph=(e.phone||'').trim();
  if(!nm&&!ph)return 0;
  return byNP[nm+'␀'+ph]||0;
}

async function addPromo(){
  const code=(document.getElementById('pc-code')?.value||S._pcCode||'').trim().toUpperCase();
  const value=parseFloat(document.getElementById('pc-value')?.value||S._pcValue||'')||0;
  if(!code||value<=0){toast(t('promoInvalidMsg'),'error');return;}
  const row={id:uid(),code,kind:S._pcKind||'percent',value,active:true,created_at:new Date().toISOString()};
  if(S._pcType)row.applies_to=S._pcType;
  let{error}=await sb.from('promo_codes').insert(row);
  // Tolerant column: a DB that predates the applies_to migration rejects the key — retry
  // without it so the code still saves (unrestricted), and tell the operator why.
  if(error&&row.applies_to&&/applies_to/i.test(error.message||'')){
    delete row.applies_to;
    ({error}=await sb.from('promo_codes').insert(row));
    if(!error)toast('applies_to column missing - run add-roadcarbon-mmteam.sql; code saved without a type restriction','warning');
  }
  if(error){toast(error.message,'error');return;}
  S._pcCode='';S._pcValue='';S._pcType='';await loadData();toast(t('promoSavedToast'));renderSessions();
}
async function togglePromoActive(id){

function delPromo(id){
  if(!isAdmin()){toast(t('adminOnlyMsg'),'error');return;}

  confirmDialog({title:t('deleteBtn'),body:c.code,confirmLabel:t('deleteBtn'),confirmClass:'btn-red',onConfirm:async()=>{
