</div>

<header id="topbar">

<div id="view-landing">

</div>

// in-place status edits stay live because the map holds entry references). Kills O(n^2) per-session filters.

let _bootDone=false; 
async function loadData(showLoader=false){
  if(!sb){S.dataLoaded=true;return;}
  if(showLoader){const ls=document.getElementById('loading-screen');if(ls)ls.style.display='flex';}
  const startToken=Date.now();
  // NOTE: we deliberately do NOT bulk-fetch the customers table here. Doing so used to
  // download every customer's name/email/phone into every visitor's browser. Staff views
  // already use the denormalized name/phone/email on each queue_entry, so the dump is unneeded.
  let q,b,ses;
  try{
    [q,b,ses]=await Promise.all([
      sb.from('queue_entries').select('*').gte('session_date',_qWindowCut()).order('session_id').order('queue_num'),
      sb.from('bikes').select('*'),
      sb.from('sessions').select('*').order('session_date'),
    ]);
  }catch(e){q={data:null,error:e};b={data:null,error:e};ses={data:null,error:e};}
  const c={data:[],error:null};
  if(q.error)console.error('loadData queue error:',q.error.message);
  if(b.error)console.error('loadData bikes error:',b.error.message);
  if(c.error)console.error('loadData customers error:',c.error.message);
  if(ses.error)console.error('loadData sessions error:',ses.error.message);
  const anyError=q.error||b.error||c.error||ses.error;
  if(anyError&&!q.data&&!b.data&&!c.data&&!ses.data){S.dataLoaded=true;try{_applyBookOutbox();}catch(_){}_bookOutboxFlush();toast(t('toastConnStale'),'error');return;}

  if(_bootDone&&startToken<_bootReadyAt)return;
  S.queue=(q.data||[]).map(entryFromDB);
  try{_applyBookOutbox();}catch(_){}_bookOutboxFlush(); // surface + sync any bookings queued while offline
  S.bikes=b.data||[];
  S.customers=c.data||[];
  S.sessions=ses.data||[];
  S.dataLoaded=true; // first successful load - render real content instead of skeletons
  // Inventory + promo codes are optional/error-tolerant (tables may not exist until migration is run)
  try{const inv=await sb.from('inventory').select('*');if(!inv.error)S.inventory=inv.data||[];}catch(e){}
  try{const pc=await sb.from('promo_codes').select('*');if(!pc.error)S.promoCodes=pc.data||[];}catch(e){}
  try{const cs=await sb.from('cashier_sales').select('*');if(!cs.error)S.cashSales=cs.data||[];}catch(e){}
  try{_outbox().forEach(op=>{if(op.kind==='delete')S.cashSales=(S.cashSales||[]).filter(r=>r.id!==op.id);else{const i=(S.cashSales||[]).findIndex(r=>r.id===op.id);if(i>=0)S.cashSales[i]=op.data;else S.cashSales.push(op.data);}});}catch(e){} // keep unsynced offline sales visible
  try{const _v=_voidedIds();if(_v.length)S.cashSales=(S.cashSales||[]).filter(r=>_v.indexOf(r.id)<0);}catch(e){} // never resurrect a voided sale
  _outboxFlush();
  try{const _tm=localStorage.getItem('cq_team');if(_tm!==null){S.teamMembers=JSON.parse(_tm)||[];}else{S.teamMembers=[...new Set((S.cashSales||[]).map(r=>r.team_name).filter(Boolean))].sort();localStorage.setItem('cq_team',JSON.stringify(S.teamMembers));}}catch(e){}
  _lastLoadOk=true;_cacheSave();
}

function hashPwd(s){
  let h=5381;
  for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);
  return(h>>>0).toString(16);
}

function _hex(buf){return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
function _cryptoOK(){return typeof crypto!=='undefined'&&crypto.subtle;}
function genSalt(){const a=new Uint8Array(8);if(typeof crypto!=='undefined'&&crypto.getRandomValues)crypto.getRandomValues(a);else for(let i=0;i<8;i++)a[i]=Math.floor(Math.random()*256);return _hex(a.buffer);}
async function sha256Hex(str){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return _hex(buf);}
async function makePwdHash(pwd){if(!_cryptoOK())return hashPwd(pwd);const salt=genSalt();return 'sha256:'+salt+':'+(await sha256Hex(salt+':'+pwd));}
async function verifyPwd(pwd,stored){
  if(!stored)return false;
  if(stored.indexOf('sha256:')===0){if(!_cryptoOK())return false;const p=stored.split(':');return (await sha256Hex(p[1]+':'+pwd))===p[2];}
  if(stored==='oauth:google')return false;
  return hashPwd(pwd)===stored; 
}

// Memoized bike lookup (id -> bike); rebuilds only when the bikes array/length changes. Holds live
// references, so in-place status edits are reflected. Avoids O(entries x bikes) finds in render loops.
let _bbRef=null,_bbLen=-1,_bbMap=null;
function bikeById(id){
  const bs=getBikes();
  if(_bbRef!==bs||_bbLen!==bs.length||!_bbMap){_bbMap=new Map(bs.map(b=>[b.id,b]));_bbRef=bs;_bbLen=bs.length;}
  return _bbMap.get(id);
}
function getAssignedBikeIds(entry){
  if(!entry)return[];
  
  const fallback=S&&S._extraBikes&&S._extraBikes[entry.id];
  if(fallback)return fallback;
  if(!entry.assignedBikeId)return[];
  try{const p=JSON.parse(entry.assignedBikeId);return Array.isArray(p)?p:[p];}catch{return[entry.assignedBikeId];}
}
function getAssignedBikes(entry){return getAssignedBikeIds(entry).map(id=>bikeById(id)).filter(Boolean);}


async function reconcileOrphanBikes(){
  if(!sb||S.view!=='staff'||S._reconcilingBikes)return;
  const used=new Set();
  getQueue().filter(e=>e.status==='active').forEach(e=>getAssignedBikeIds(e).forEach(id=>used.add(id)));
  const orphans=getBikes().filter(b=>b.status==='in-use'&&!used.has(b.id));
  if(!orphans.length)return;
  S._reconcilingBikes=true;
  try{
    await Promise.all(orphans.map(b=>sb.from('bikes').update({status:'available'}).eq('id',b.id)));
    orphans.forEach(b=>{b.status='available';});
  }catch(e){console.warn('reconcileOrphanBikes failed:',e);}
  S._reconcilingBikes=false;
  renderStaffQueue();renderBikes();
}
function resolvedType(entry){
  if(!entry||entry.typePreference!=='Any')return entry?entry.typePreference:'Any';
  const bikes=getAssignedBikes(entry);
  return(bikes.length>0&&bikes[0].type&&bikes[0].type!=='Any')?bikes[0].type:'Any';
}
function heightToSize(h){if(h<=166)return'XS';if(h<=172)return'S';if(h<=178)return'M';return'L';}
function sizeLabel(sz){return{XS:'XS (166 cm & under)',S:'S (167-172 cm)',M:'M (173-178 cm)',L:'L (179 cm & up)'}[sz]||sz;}
function sizeRange(sz){
  const cm=S.lang==='ar'?'سم':'cm';
  return{XS:`≤ 166 ${cm}`,S:`167-172 ${cm}`,M:`173-178 ${cm}`,L:`≥ 179 ${cm}`}[sz]||'';
}
function bikeGradient(c){if(!c||!c.length)return'var(--green)';if(c.length===1)return c[0];return`linear-gradient(135deg,${c.join(',')})`;}
function bikeStrip(c){
  if(!c||!c.length)return'var(--green)';
  if(c.length===1)return c[0];
  const pct=100/c.length;
  const stops=c.flatMap((col,i)=>[`${col} ${(i*pct).toFixed(2)}%`,`${col} ${((i+1)*pct).toFixed(2)}%`]);
  return`linear-gradient(to bottom,${stops.join(',')})`;
}

function dayLabel(day){return S.lang==='ar'?(DAY_NAMES_AR[day]||day):day;}
function spotsLeftLabel(n){

  if(S.lang==='ar')return`${n} ${n===1?'مقعد متبقي':'مقاعد متبقية'}`;

}
const TYPE_CLS={Road:'type-road',Hybrid:'type-hybrid',Mountain:'type-mountain',Gravel:'type-gravel',Any:'type-any'};
function typeLabel(ty){const m={Road:t('typeRoad'),Hybrid:t('typeHybrid'),Mountain:t('typeMountain'),Gravel:t('typeGravel'),Any:t('typeAny')};return m[ty]||ty;}

const FRAME_TYPES=['Steel','Aluminum','Carbon','Titanium'];
const _BIKE_TYPE_CODE={Road:'R',Hybrid:'H',Mountain:'M',Gravel:'G'};
const _FRAME_CODE={Steel:'ST',Aluminum:'AL',Carbon:'C',Titanium:'T'};

function _nextBikeNumber(){
  const used=getBikes().filter(b=>b.bike_number!=null).map(b=>Number(b.bike_number));
  let n=1;while(used.includes(n))n++;return n;
}

function genBikeName(type,frame,num,size){
  const tc=_BIKE_TYPE_CODE[type]||'X';
  const fc=_FRAME_CODE[frame]||'';
  const pn=String(Number(num)||0).padStart(4,'0');
  return `${tc}-${fc}-${pn}-${size||''}`;
}
const typeBadge=ty=>`<span class="type-badge ${TYPE_CLS[ty]||'type-any'}">${bikeTypeIcon(ty,12)} ${typeLabel(ty)}</span>`;
const STATUS_CLS={waiting:'badge-waiting',waitlist:'badge-waiting',active:'badge-active',done:'badge-done',noshow:'badge-noshow',cancelled:'badge-noshow',removed:'badge-noshow'};
const STATUS_KEY={waiting:'statusWaiting',waitlist:'statusWaitlist',active:'statusActive',done:'statusDone',noshow:'statusNoshow',cancelled:'statusCancelled',removed:'removedLabel'};
const statusBadge=s=>`<span class="status-badge ${STATUS_CLS[s]||'badge-done'}">${t(STATUS_KEY[s]||'statusDone')}</span>`;
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtPhone(p){
  if(!p)return'';
  const match=COUNTRY_CODES.find(([code])=>p.startsWith(code));
  if(match)return match[0]+' '+p.slice(match[0].length);
  return p;
}
function toast(msg,type){
  const el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');el.textContent=msg;
  const container=document.getElementById('toast-container');
  container.appendChild(el);
  setTimeout(()=>el.remove(),2800);
}

let _undoBarTimer=null;
function showUndoBar(label,fn){
  
  const old=document.getElementById('undo-bar-el');if(old)old.remove();
  clearInterval(_undoBarTimer);
  const DURATION=5000;
  const bar=document.createElement('div');
  bar.id='undo-bar-el';bar.className='undo-bar';
  bar.innerHTML=`
    <div class="undo-bar-text">${esc(label)}</div>
    <button class="undo-bar-action" id="undo-bar-btn">${t('undoBtn')}</button>
    <div class="undo-bar-progress" id="undo-bar-prog" style="width:100%"></div>`;
  document.getElementById('toast-container').appendChild(bar);
  const prog=document.getElementById('undo-bar-prog');
  const btn=document.getElementById('undo-bar-btn');
  const start=Date.now();
  
  _undoBarTimer=setInterval(()=>{
    const elapsed=Date.now()-start;
    const pct=Math.max(0,100-elapsed/DURATION*100);
    if(prog)prog.style.width=pct+'%';
    if(elapsed>=DURATION){clearInterval(_undoBarTimer);bar.remove();}
  },80);
  btn.onclick=async()=>{
    clearInterval(_undoBarTimer);bar.remove();
    try{await fn();toast(t('undoneMsg'));}catch(e){toast(t('undoFailed'),'error');}
    renderTopbarRight();renderStaffQueue();
  };
}

function _phoneMatches(stored,cc,phoneRaw){
  const norm=x=>String(x||'').replace(/\D/g,'').replace(/^0+/,'');
  const s=norm(stored),p=norm(phoneRaw);
  if(!s||p.length<7)return false;
  const ccd=String(cc||'').replace(/\D/g,'');
  return [p,ccd+p].some(c=>s===c||s.endsWith(c)||c.endsWith(s));
}
async function doForgotVerify(){
  const email=(document.getElementById('a-forgot-email')?.value||'').trim().toLowerCase();
  const cc=document.getElementById('a-forgot-cc')?.value||'+966';
  const phoneRaw=(document.getElementById('a-forgot-phone')?.value||'').trim();
  if(!email||!/^\S+@\S+\.\S+$/.test(email)){authErr(t('errValidEmail'));return;}
  if(!phoneRaw){authErr(t('errPhoneRequired'));return;}
  if(SECURE_AUTH){
    // Can't pre-read the locked table; capture inputs and let customer_reset() validate at step 2.
    S.forgotEmail=email;S.forgotCc=cc;S.forgotPhoneRaw=phoneRaw;S.forgotVerified='pending';S.forgotStep=2;
    renderAuthModal();return;
  }
  const btn=document.querySelector('#auth-modal .auth-submit');
  if(btn){btn.disabled=true;btn.textContent=t('verifying')||'…';}
  const{data:customer}=await sb.from('customers').select('id,name,phone,password_hash').eq('email',email).maybeSingle();
  if(btn){btn.disabled=false;btn.textContent=t('forgotVerifyBtn');}
  if(!customer){authErr(t('errAccountNotFound'));return;}
  if(customer.password_hash==='oauth:google'){authErr(t('errGoogleNoPw'));return;}
  if(!_phoneMatches(customer.phone,cc,phoneRaw)){authErr(t('errResetNoMatch'));return;}
  S.forgotEmail=email;S.forgotVerified=customer.id;S.forgotStep=2;
  renderAuthModal();
}
async function doResetPassword(){
  if(!S.forgotVerified||!S.forgotEmail){authErr(t('errConnection'));return;}
  const pwd=(document.getElementById('a-reset-pwd')?.value||'');
  const pwd2=(document.getElementById('a-reset-pwd2')?.value||'');
  if(pwd.length<8||!/[A-Z]/.test(pwd)||!/[0-9]/.test(pwd)){authErr(t('errPasswordLen'));return;}
  if(pwd!==pwd2){authErr(t('errPasswordMatch'));return;}
  try{
    if(SECURE_AUTH){
      const ph=(S.forgotCc||'')+(S.forgotPhoneRaw||'');
      const{data,error}=await sb.rpc('customer_reset',{p_email:S.forgotEmail,p_phone:ph,p_new_hash:await makePwdHash(pwd)});
      const customer=(data&&data[0])||null;
      if(error||!customer){authErr(t('errResetNoMatch'));return;}
      S.loggedIn=customer;setSession(customer);S.forgotStep=1;S.forgotEmail='';S.forgotVerified=null;S.authMode='login';
      await loadData();
      closeAuthModal();prefillFromAccount();renderTopbarRight();renderRegister();renderMyRides();
      logAction(t('logPwdResetSelf')+(customer.email||''));
      toast(t('toastPwReset'));return;
    }
    const{data:customer}=await sb.from('customers')
      .select('id,name,email,phone,height,type_preference,created_at,birth_date,country,city,photo')
      .eq('id',S.forgotVerified).maybeSingle();
    if(!customer){authErr(t('errAccountNotFound'));return;}
    const{error}=await sb.from('customers').update({password_hash:await makePwdHash(pwd)}).eq('id',customer.id);
    if(error)throw error;
    S.loggedIn=customer;setSession(customer);S.forgotStep=1;S.forgotEmail='';S.forgotVerified=null;S.authMode='login';
    await loadData();
    closeAuthModal();prefillFromAccount();renderTopbarRight();renderRegister();renderMyRides();
    logAction(t('logPwdResetSelf')+(customer.email||''));
    toast(t('toastPwReset'));
  }catch(e){authErr(t('errConnection'));}
}

// Live phone mask: groups digits as "5XX XXX XXXX" while typing (display only; saved value is stripped to digits)
function fmtPhoneInput(el){
  if(!el)return;
  const d=el.value.replace(/\D/g,'').slice(0,10);
  let out=d;
  if(d.length>6)out=d.slice(0,3)+' '+d.slice(3,6)+' '+d.slice(6);
  else if(d.length>3)out=d.slice(0,3)+' '+d.slice(3);
  el.value=out;
}

async function doSignup(){
  const name=(document.getElementById('a-name')?.value||'').trim();
  const email=(document.getElementById('a-email')?.value||'').trim().toLowerCase();
  const cc=document.getElementById('a-cc')?.value||'+966';
  const phone=(document.getElementById('a-phone')?.value||'').replace(/\D/g,'');
  const pwd=(document.getElementById('a-pwd')?.value||'');
  const pwd2=(document.getElementById('a-pwd2')?.value||'');
  if(!name||name.trim().split(/\s+/).length<2){authErr(t('errEnterName'));return;}
  if(!S.signupGender){authErr(t('errSelectGender'));return;}
  if(!email){authErr(t('errEmailRequired'));return;}
  if(!/^\S+@\S+\.\S+$/.test(email)){authErr(t('errValidEmail'));return;}
  if(!phone){authErr(t('errPhoneRequired'));return;}
  if(pwd.length<8||!/[A-Z]/.test(pwd)||!/[0-9]/.test(pwd)){authErr(t('errPasswordLen'));return;}
  if(pwd!==pwd2){authErr(t('errPasswordMatch'));return;}
  const heightRaw=parseInt(document.getElementById('a-height')?.value||'');
  if(isNaN(heightRaw)||heightRaw<100||heightRaw>250){authErr(t('errValidHeightCm'));return;}
  const fullPhone=phone?(cc+phone):'';
  try{
    if(SECURE_AUTH){
      const height=isNaN(heightRaw)?null:heightRaw;
      const newId=uid();
      const{data,error}=await sb.rpc('customer_signup',{
        p_id:newId,p_name:name,p_email:email,p_phone:fullPhone,
        p_pwd_hash:await makePwdHash(pwd),p_height:height,
        p_type_preference:S.signupTypePref||'Any',p_gender:S.signupGender});
      if(error){authErr((error.code==='23505'||/DUPLICATE/i.test(error.message||''))?t('errEmailExists'):t('errConnection'));return;}
      const tok=(data&&data[0]&&data[0].session_token)||null;
      const safeCustomer={id:newId,name,email,phone:fullPhone,height,type_preference:S.signupTypePref||'Any',created_at:new Date().toISOString(),session_token:tok};
      S.loggedIn=safeCustomer;setSession(safeCustomer);
      await loadData();
      closeAuthModal();prefillFromAccount();renderTopbarRight();renderRegister();renderMyRides();
      logAction(t('logAcctCreated')+name);
      toast(`${name}! ${t('toastAccountCreated')}`);
      return;
    }
    if(email){const{data:ex}=await sb.from('customers').select('id').eq('email',email).maybeSingle();if(ex){authErr(t('errEmailExists'));return;}}
    if(fullPhone){const{data:ex}=await sb.from('customers').select('id').eq('phone',fullPhone).maybeSingle();if(ex){authErr(t('errPhoneExists'));return;}}
    const height=isNaN(heightRaw)?null:heightRaw;
    const type_preference=S.signupTypePref||'Any';
    const gender=S.signupGender;
    const customer={id:uid(),name,email,phone:fullPhone,password_hash:await makePwdHash(pwd),created_at:new Date().toISOString(),height,type_preference,gender};
    const{error}=await sb.from('customers').insert(customer);
    if(error)throw error;
    await loadData();
    const safeCustomer={id:customer.id,name,email,phone:fullPhone,height,type_preference,created_at:customer.created_at};
    S.loggedIn=safeCustomer;setSession(safeCustomer);
    closeAuthModal();prefillFromAccount();renderTopbarRight();renderRegister();renderMyRides();
    logAction(t('logAcctCreated')+name);
    toast(`${name}! ${t('toastAccountCreated')}`);
  }catch(e){authErr(t('errConnection'));}
}

  if(!session||!session.user)return false;
  const email=(session.user.email||'').trim().toLowerCase();
  const meta=session.user.user_metadata||{};
  const gname=meta.full_name||meta.name||'';
  const gphoto=meta.avatar_url||meta.picture||'';

async function doLogin(){
  const rawInput=(document.getElementById('a-identifier')?.value||'').trim();
  const identifier=rawInput.toLowerCase();
  const pwd=(document.getElementById('a-pwd')?.value||'');
  if(!identifier){authErr(t('errEmailOrPhone'));return;}
  if(!pwd){authErr(t('errPasswordRequired'));return;}
  try{
    if(SECURE_AUTH){
      const{data,error}=await sb.rpc('customer_login',{p_identifier:identifier,p_pwd:pwd});
      const customer=(data&&data[0])||null;
      if(error||!customer){authErr(t('errInvalidCredentials'));return;}
      S.loggedIn=customer;setSession(customer);
      await loadData();
      closeAuthModal();prefillFromAccount();renderTopbarRight();renderRegister();renderMyRides();
      logAction(t('logLoggedIn')+customer.name);
      toast(`${t('toastWelcomeBack')}, ${customer.name}!`);
      return;
    }
    const isEmail=identifier.includes('@');
    const filters=[];
    if(isEmail){
      filters.push(`email.eq.${identifier}`);
    }else{
      const digits=rawInput.replace(/\D/g,''); 
      const bare=digits.replace(/^0+/,'');     
      
      const candidates=new Set([rawInput,digits,bare,`+966${bare}`,`00966${bare}`]);
      candidates.forEach(c=>{if(c&&c.length>=5&&/^[+\d]+$/.test(c))filters.push(`phone.eq.${c}`);});
    }
    const{data:rows}=await sb.from('customers')
      .select('id,name,email,phone,height,type_preference,created_at,birth_date,country,city,photo,password_hash')
      .or(filters.join(','))
      .limit(5);
    let customer=null;
    for(const row of (rows||[])){if(await verifyPwd(pwd,row.password_hash)){customer=row;break;}}
    if(!customer){authErr(t('errInvalidCredentials'));return;}
    
    if(String(customer.password_hash||'').indexOf('sha256:')!==0&&customer.password_hash!=='oauth:google'){
      try{const up=await makePwdHash(pwd);await sb.from('customers').update({password_hash:up}).eq('id',customer.id);}catch(e){}
    }
    delete customer.password_hash;
    S.loggedIn=customer;setSession(customer);
    await loadData();
    closeAuthModal();prefillFromAccount();renderTopbarRight();renderRegister();renderMyRides();
    logAction(t('logLoggedIn')+customer.name);
    toast(`${t('toastWelcomeBack')}, ${customer.name}!`);
  }catch(e){authErr(t('errConnection'));}
}

function prefillFromAccount(){

  if(S.loggedIn.phone){
    const match=COUNTRY_CODES.find(([code])=>S.loggedIn.phone.startsWith(code));
    if(match){S._rCC=match[0];S._rPhone=S.loggedIn.phone.slice(match[0].length);}

}

function renderPinModal(){
  const {until,lockouts,attempts}=_getPinLock();
  const now=Date.now();
  const isLocked=until>now;
  const remaining=isLocked?until-now:0;
  if(S.pinCountdownInterval){clearInterval(S.pinCountdownInterval);S.pinCountdownInterval=null;}
  if(isLocked){
    S.pinCountdownInterval=setInterval(()=>{
      if(Date.now()>=until){clearInterval(S.pinCountdownInterval);S.pinCountdownInterval=null;}
      renderPinModal();
    },1000);
  }
  const dots=Array(4).fill(0).map((_,i)=>{
    const cls=S.pinError?'pin-dot error':i<S.pinDigits.length?'pin-dot filled':'pin-dot';
    return`<div class="${cls}"></div>`;
  }).join('');
  const attemptsLeft=5-attempts;
  const warnMsg=(!isLocked&&attempts>0)?`<div style="font-size:11px;color:var(--muted-l);margin-top:6px">${t('pinAttemptsWarn').replace('{0}',attemptsLeft)}</div>`:'';
  const modal=document.getElementById('pin-modal');
  modal.style.display='flex';
  modal.innerHTML=`<div class="pin-backdrop" onclick="if(event.target===this)closePinModal()">
    <div class="pin-box" id="pin-box">
      <img class="pin-logo" src="logo.png" alt="">
      <div class="pin-title">${t('pinTitle')}</div>
      ${isLocked
        ?`<div class="pin-sub" style="color:var(--red);font-weight:700;text-align:center">${t('pinLocked').replace('{0}',_fmtLock(remaining))}</div>`
        :`<div class="pin-sub">${t('pinSub')}</div>`
      }
      ${isLocked?'':`<div class="pin-dots">${dots}</div>`}
      <div class="pin-error">${!isLocked&&S.pinError?t('errPinWrong'):''}</div>
      ${warnMsg}
      ${isLocked?'':`<div class="pin-numpad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="pinPress('${n}')">${n}</button>`).join('')}
        <button class="pin-key empty"></button>
        <button class="pin-key" onclick="pinPress('0')">0</button>
        <button class="pin-key del" onclick="pinDel()">&#x232B;</button>
      </div>`}
      <button class="pin-cancel" onclick="closePinModal()">${t('cancelBtn')}</button>
    </div>
  </div>`;
}

async function pinPress(d){
  const {until,lockouts,attempts}=_getPinLock();
  if(until>Date.now())return;
  if(S.pinDigits.length>=4)return;
  S.pinDigits+=d;
  S.pinError=false;
  if(S.pinDigits.length===4){
    const pinOK=_cryptoOK()&&(await sha256Hex('mmpin:'+S.pinDigits))===STAFF_PIN_HASH;
    if(pinOK){
      _clearPinLock();
      if(S.pinCountdownInterval){clearInterval(S.pinCountdownInterval);S.pinCountdownInterval=null;}
      const wasUpgrade=S._pinUpgrade;S._pinUpgrade=false;
      closePinModal();
      if(wasUpgrade&&S.view==='staff'){
        setStaffRole('admin');
        logAction(t('logSwitchedAdmin'));
      } else {
        goStaff();
        logAction(t('logStaffUnlocked'));
        toast(t('toastStaffPanel'));
      }
    } else {
      S.pinError=true;
      const newAttempts=attempts+1;
      if(newAttempts>=5){
        const durMin=PIN_LOCKOUT_MINS[Math.min(lockouts,PIN_LOCKOUT_MINS.length-1)];
        try{
          localStorage.setItem('cq_pin_until',Date.now()+durMin*60000);
          localStorage.setItem('cq_pin_lockouts',lockouts+1);
          localStorage.setItem('cq_pin_attempts','0');
        }catch(e){}
        S.pinDigits='';
        renderPinModal();
      } else {
        try{localStorage.setItem('cq_pin_attempts',newAttempts);}catch(e){}
        renderPinModal();
        const box=document.getElementById('pin-box');
        if(box){box.classList.add('shake');setTimeout(()=>{box.classList.remove('shake');S.pinDigits='';renderPinModal();},400);}
      }
    }
  } else {
    renderPinModal();
  }
}

function pinDel(){
  if(S.pinDigits.length===0)return;
  S.pinDigits=S.pinDigits.slice(0,-1);
  S.pinError=false;
  renderPinModal();
}

function closePinModal(){
  if(S.pinCountdownInterval){clearInterval(S.pinCountdownInterval);S.pinCountdownInterval=null;}
  document.getElementById('pin-modal').style.display='none';
  S.pinDigits='';S.pinError=false;
}


document.addEventListener('keydown',e=>{
  if(document.getElementById('pin-modal').style.display==='flex'){
    if(e.key>='0'&&e.key<='9')pinPress(e.key);
    else if(e.key==='Backspace')pinDel();
    else if(e.key==='Escape')closePinModal();
  }
});

function regGoStep(n){S.regStep=n;renderRegister();try{window.scrollTo({top:0,behavior:'smooth'});}catch(e){}}
function _regAddonQty(id){const a=(S.regAddons||[]).find(x=>(x&&typeof x==='object'?x.id:x)===id);return a?(typeof a==='object'?(Number(a.qty)||1):1):0;}
function _setRegAddonQty(id,delta){
  S.regAddons=(S.regAddons||[]).map(x=>(x&&typeof x==='object')?x:{id:x,qty:1});
  const it=(S.inventory||[]).find(x=>x.id===id);const max=it?(Number(it.qty)||0):99;
  let a=S.regAddons.find(x=>x.id===id);
  if(!a){if(delta>0&&max>0)S.regAddons.push({id,qty:1});}
  else{a.qty=Math.min(max,Math.max(0,a.qty+delta));if(a.qty<=0)S.regAddons=S.regAddons.filter(x=>x.id!==id);}
  renderRegister();
}

// Promo codes: discount on the booking total
function _promoDiscount(total){
  const p=S.promoApplied;if(!p)return 0;
  const d=p.kind==='flat'?Number(p.value):total*(Number(p.value)/100);
  return Math.min(total,Math.max(0,Math.round(d*100)/100));
}
function applyPromoCode(){
  const v=(document.getElementById('reg-promo')?.value||'').trim();
  if(!v){S.promoApplied=null;S._promoMsg='';renderRegister();return;}
  const match=(S.promoCodes||[]).find(c=>c.active&&String(c.code).toLowerCase()===v.toLowerCase());
  if(!match){S.promoApplied=null;S._promoMsg=t('promoInvalidMsg');renderRegister();return;}
  S.promoApplied={code:match.code,kind:match.kind,value:match.value};
  S._promoMsg='';renderRegister();
}
function removePromo(){S.promoApplied=null;S._promoMsg='';renderRegister();}

function validateRegInputs(){
  const cust=S.loggedIn||getSession();
  if(!cust){toast(t('errLoginFirst'),'error');return false;}
  if(!S.selSession){toast(t('errSelectSession'),'error');return false;}
  const qty=S.regQty||1;
  ensureBikeSizes();
  for(let i=0;i<qty;i++){
    const h=parseInt(S.regBikeHeights[i]);
    if(isNaN(h)||h<100||h>250){
      const hInp=document.getElementById(`reg-height-${i}`);
      if(hInp){hInp.style.outline='2px solid var(--red)';hInp.style.borderColor='var(--red)';setTimeout(()=>{hInp.style.outline='';hInp.style.borderColor='';},2500);hInp.scrollIntoView({behavior:'smooth',block:'center'});}
      toast(qty>1?`${t('errValidHeightCm')} (${t('bike')} ${i+1})`:t('errValidHeightCm'),'error');return false;
    }
  }
  let firstErrEl=null;
  const markErr=el=>{if(el&&!firstErrEl){firstErrEl=el;el.style.outline='2px solid var(--red)';el.style.borderRadius='10px';setTimeout(()=>{el.style.outline='';el.style.borderRadius='';},2500);}};
  for(let i=0;i<qty;i++){
    if(!S.regBikeTypes[i]){
      markErr(document.getElementById(`reg-type-wrap-${i}`));
      toast(qty>1?`${t('errSelectTypeGeneric')} (${t('bike')} ${i+1})`:t('errSelectTypeGeneric'),'error');
      if(firstErrEl)firstErrEl.scrollIntoView({behavior:'smooth',block:'center'});
      return false;
    }
    if(qty>1&&!(S.regRiderNames[i]!==undefined?S.regRiderNames[i]:i===0?cust.name:'').trim()){
      markErr(document.getElementById(`reg-rider-name-${i}`));
      toast(`${t('riderName')||"Rider's Full Name"} (${t('bike')} ${i+1})`,'error');
      if(firstErrEl)firstErrEl.scrollIntoView({behavior:'smooth',block:'center'});
      return false;
    }
  }
  return true;
}

function ensureBikeSizes(){
  while(S.regBikeHeights.length<S.regQty) S.regBikeHeights.push('');
  while(S.regBikeHeights.length>S.regQty) S.regBikeHeights.pop();
  while(S.regBikeTypes.length<S.regQty)  S.regBikeTypes.push('');
  while(S.regBikeTypes.length>S.regQty)  S.regBikeTypes.pop();
  while(S.regRiderNames.length<S.regQty) S.regRiderNames.push(undefined);
  while(S.regRiderNames.length>S.regQty) S.regRiderNames.pop();
}

function changeRegQty(delta){
  S.regQty=Math.max(1,Math.min(10,S.regQty+delta));
  ensureBikeSizes();
  renderRegister();
}

async function submitReg(){
  if(S.regSubmitting)return;
  const cust=S.loggedIn||getSession();
  if(!cust){toast(t('errLoginFirst'),'error');return;}
  if(!S.selSession){
    const sp=document.getElementById('session-picker-wrap');
    if(sp){sp.style.outline='2px solid var(--red)';sp.style.borderRadius='14px';setTimeout(()=>{sp.style.outline='';sp.style.borderRadius='';},2500);}
    toast(t('errSelectSession'),'error');
    document.getElementById('session-picker-wrap')?.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  const _selSess0=allSessions().find(s=>s.id===S.selSession);
  if(!_selSess0||(_selSess0.status!=='open'&&_selSess0.status!=='full')){toast(t('errSessionClosed'),'error');return;}

  const qty=S.regQty||1;
  ensureBikeSizes();
  if(!validateRegInputs())return;
  const heights=[];
  for(let i=0;i<qty;i++)heights.push(parseInt(S.regBikeHeights[i]));

  // A full session is joinable, but as a waitlist booking (promoted later if a spot opens)
  const sess0=allSessions().find(s=>s.id===S.selSession);
  const bookingStatus=(sess0&&sess0.status==='full')?'waitlist':'waiting';

  const email=cust.email||'',phone=cust.phone||'';
  
  const riderNames=Array.from({length:qty},(_,i)=>{
    const entered=S.regRiderNames[i];
    return (entered!==undefined&&entered.trim())?entered.trim():(i===0?cust.name:'');
  });
  const queue=getQueue();
  
  const activeStatuses=['waiting','active','waitlist'];
  const existingActive=cust.id
    ?queue.find(e=>e.customerId===cust.id&&e.sessionId===S.selSession&&activeStatuses.includes(e.status))
    :(phone?queue.find(e=>e.phone===phone&&e.sessionId===S.selSession&&activeStatuses.includes(e.status)):null);
  if(existingActive){
    
    S._alreadyBookedSession=S.selSession;
    renderRegister();
    
    setTimeout(()=>{const b=document.getElementById('already-booked-banner');if(b)b.scrollIntoView({behavior:'smooth',block:'center'});},80);
    return;
  }

  S.regSubmitting=true;
  renderRegister();
  try{
    
    await loadData();
    const sess=allSessions().find(s=>s.id===S.selSession)||{day:'',session_date:S.selSession};
    const baseQNum=nextQNum(S.selSession);
    
    const entries=Array.from({length:qty},(_,i)=>({
      id:uid(),name:riderNames[i],email,phone,
      size:heights[i]?heightToSize(heights[i]):'',height:heights[i]||null,
      typePreference:S.regBikeTypes[i],paid:false,
      assignedBikeId:null,sessionId:S.selSession,sessionDay:sess.day,sessionDate:sess.session_date||S.selSession,
      queueNum:baseQNum+i,status:bookingStatus,registeredAt:new Date().toISOString(),walkIn:false,
      customerId:cust.id,price:priceForType(S.regBikeTypes[i])
    }));
    // Apply promo discount proportionally across the entries' prices
    if(S.promoApplied){
      const base=entries.reduce((s,e)=>s+(e.price||0),0);
      const disc=_promoDiscount(base);
      if(base>0&&disc>0){const f=(base-disc)/base;entries.forEach(e=>{e.price=Math.max(0,Math.round((e.price||0)*f*100)/100);});}
    }
    const _offline=(typeof navigator!=='undefined'&&navigator.onLine===false);
    let _queued=false;
    if(_offline){
      // Offline: queue the inserts and confirm the booking optimistically (synced on reconnect)
      entries.forEach(e=>_bookOutboxAdd(entryToDB(e)));
      S.queue=[...(S.queue||[]),...entries.map(e=>entryFromDB(entryToDB(e)))];
      _queued=true;_bookOutboxFlush();
    }else{
      let _ok=false;
      for(let _try=0;_try<4&&!_ok;_try++){
        try{
          const insRes=await Promise.all(entries.map(e=>sb.from('queue_entries').insert(entryToDB(e))));
          const insFail=insRes.find(r=>r&&r.error);
          if(insFail)throw insFail.error;
          _ok=true;
        }catch(err){
          if(typeof navigator!=='undefined'&&navigator.onLine===false){
            // Connection dropped mid-submit: queue instead of losing the booking
            entries.forEach(e=>_bookOutboxAdd(entryToDB(e)));
            S.queue=[...(S.queue||[]),...entries.map(e=>entryFromDB(entryToDB(e)))];
            _queued=true;_ok=true;_bookOutboxFlush();
          }else{
            const _msg=((err&&(err.code||err.message))||'')+'';
            const _dup=_msg.includes('23505')||/duplicate|unique/i.test(_msg); // unique (session_id,queue_num) clash
            // Roll back any rows that DID insert before retrying or bailing
            await Promise.all(entries.map(e=>sb.from('queue_entries').delete().eq('id',e.id))).catch(()=>{});
            if(_dup&&_try<3){
              await loadData();
              const _base=nextQNum(S.selSession);entries.forEach((e,i)=>{e.queueNum=_base+i;}); // fresh numbers, then retry
              continue;
            }
            toast((err&&err.message)||t('errConnection'),'error');
            return;
          }
        }
      }
    }
    // Race guard (online inserts only): if a simultaneous booking grabbed the same number(s), renumber ours
    if(!_queued&&bookingStatus==='waiting'){
      await loadData();
      const clash=entries.some(e=>getQueue().some(o=>o.id!==e.id&&o.sessionId===e.sessionId&&o.queueNum===e.queueNum&&!['cancelled','removed','waitlist'].includes(o.status)));
      if(clash){
        const fresh=nextQNum(S.selSession);
        await Promise.all(entries.map((e,i)=>{e.queueNum=fresh+i;return sb.from('queue_entries').update({queue_num:e.queueNum}).eq('id',e.id);}));
      }
    }

    
    if(!cust.height&&heights[0]){
      try{
        await sb.from('customers').update({height:heights[0]}).eq('id',cust.id);
        S.loggedIn.height=heights[0];setSession(S.loggedIn);
      }catch(e){}
    }
    // Save selected add-ons on every entry (tolerant: a missing 'addons' column won't break the booking)
    if((S.regAddons||[]).length){
      const _aj=JSON.stringify(S.regAddons);
      try{await sb.from('queue_entries').update({addons:_aj}).eq('id',entries[0].id);entries[0].addons=S.regAddons;}catch(e){} // add-ons attach to the account holder only (per-rider, not the whole booking)
      // Consume add-on stock once for the whole booking
      if(bookingStatus!=='waitlist')await _addonStockQ(S.regAddons,-1);
    }
    // Record the promo code used (tolerant) so redemptions can be reported
    if(S.promoApplied&&S.promoApplied.code){const _pc=String(S.promoApplied.code);try{await Promise.all(entries.map(e=>sb.from('queue_entries').update({promo_code:_pc}).eq('id',e.id)));}catch(e){}}

    await loadData();
    S.lastTickets=entries.map(e=>getQueue().find(q=>q.id===e.id)||e);
    S._rHeight='';S._rDate='';S.selSession=null;S.regType=null;
    S.regQty=1;S.regBikeSizes=[];S.regBikeHeights=[];S.regBikeTypes=[];S.regRiderNames=[];S._alreadyBookedSession=null;S.regStep=1;S.promoApplied=null;S._promoMsg='';S.regAddons=[];
    const _qn=entries.map(e=>e.queueNum);
    const numStr=qty>1?`#${_qn[0]} – #${_qn[_qn.length-1]}`:`#${_qn[0]}`;
    logAction(`${bookingStatus==='waitlist'?t('logWaitlistedWord'):t('logBookedWord')} ${numStr} (${(S.loggedIn&&S.loggedIn.name)||'rider'})`);
    toast(bookingStatus==='waitlist'?`${t('toastWaitlisted')} ${numStr}`:`${t('toastRegistered')} ${numStr}`);
    renderRegister();renderMyRides();
    showBoothPopup();
  }finally{
    S.regSubmitting=false;
    renderRegister();
  }
}

async function submitModifyBooking(){
  const cust=S.loggedIn||getSession();
  if(!cust){toast(t('errLoginFirst'),'error');return;}
  if(!S.selSession){toast(t('errSelectSession'),'error');return;}

  const existing=getQueue().filter(e=>
    e.customerId===cust.id&&e.sessionId===S.selSession&&e.status==='waiting'
  ).sort((a,b)=>a.queueNum-b.queueNum);

  const newQty=S.regQty||1;
  ensureBikeSizes();

  
  for(let i=0;i<newQty;i++){
    if(!S.regBikeTypes[i]){
      const wrap=document.getElementById(`reg-type-wrap-${i}`);
      if(wrap){wrap.style.outline='2px solid var(--red)';wrap.style.borderRadius='10px';setTimeout(()=>{wrap.style.outline='';wrap.style.borderRadius='';},2500);wrap.scrollIntoView({behavior:'smooth',block:'center'});}
      toast(newQty>1?`${t('errSelectTypeGeneric')} (${t('bike')} ${i+1})`:t('errSelectTypeGeneric'),'error');return;
    }
  }

  const sess=allSessions().find(s=>s.id===S.selSession)||{day:'',session_date:S.selSession};
  const calls=[];

  
  for(let i=0;i<Math.min(newQty,existing.length);i++){
    const entry=existing[i];
    const newType=S.regBikeTypes[i];
    if(entry.typePreference!==newType){
      calls.push(sb.from('queue_entries').update({
        type_preference:newType,price:priceForType(newType)
      }).eq('id',entry.id));
    }
  }

  
  if(newQty<existing.length){
    const toRemove=existing.slice(newQty);
    toRemove.forEach(e=>calls.push(sb.from('queue_entries').update({status:'cancelled'}).eq('id',e.id)));
  }

  
  const addedEntries=[];
  if(newQty>existing.length){
    
    let nextNum=nextQNum(S.selSession);
    for(let i=existing.length;i<newQty;i++){
      const modRiderName=i===0?cust.name:(S.regRiderNames[i]||'').trim();
      const modHeight=parseInt(S.regBikeHeights[i])||null;
      const entry={
        id:uid(),name:modRiderName,email:cust.email||'',phone:cust.phone||'',
        size:modHeight?heightToSize(modHeight):'',height:modHeight,typePreference:S.regBikeTypes[i],
        paid:false,assignedBikeId:null,
        sessionId:S.selSession,sessionDay:sess.day,sessionDate:sess.session_date||S.selSession,
        queueNum:nextNum++,status:'waiting',
        registeredAt:new Date().toISOString(),walkIn:false,
        customerId:cust.id,price:priceForType(S.regBikeTypes[i])
      };
      addedEntries.push(entry);
      calls.push(sb.from('queue_entries').insert(entryToDB(entry)));
    }
  }

  if(calls.length>0){
    const res=await Promise.all(calls);
    const fail=res.find(r=>r&&r.error);
    if(fail){toast(fail.error.message||t('errConnection'),'error');return;}
  }
  await loadData();


  const allUpdatedIds=[...existing.map(e=>e.id),...addedEntries.map(e=>e.id)];
  S.lastTickets=allUpdatedIds.map(id=>getQueue().find(e=>e.id===id)).filter(Boolean).slice(0,newQty);
  logAction(`${t('logUpdatedBooking')} (${(S.loggedIn&&S.loggedIn.name)||'rider'})`);

  if(addedEntries.length>0){
    toast(`${t('toastBookingUpdated')} + ${t('toastRegistered')} ${addedEntries.map(e=>`#${e.queueNum}`).join(', ')}`);
  }else{
    toast(t('toastBookingUpdated'));
  }

  S.modifyEntryId=null;S.selSession=null;S.regStep=1;
  S.regBikeSizes=[];S.regBikeTypes=[];S.regRiderNames=[];S.regQty=1;S.regBikeHeights=[];
  renderRegister();renderMyRides();
}

// Build & download a .ics calendar file for a session (fully client-side, no service)
function downloadBookingICS(sessionId){
  const sess=allSessions().find(s=>s.id===sessionId);
  if(!sess){toast(t('errSessionClosed'),'error');return;}
  const dateRaw=(sess.session_date||sess.id||'').slice(0,10);
  const date=dateRaw.replace(/-/g,'');
  if(date.length!==8){toast(t('errSessionClosed'),'error');return;}
  const raw=((parseSlots(sess.bike_slots)||{})._time)||'09:00 - 11:00';
  const m=raw.match(/(\d{1,2}):(\d{2})\s*[-–]\s*(\d{1,2}):(\d{2})/);
  const pad=n=>String(n).padStart(2,'0');
  let st='090000',en='110000';
  if(m){st=pad(m[1])+pad(m[2])+'00';en=pad(m[3])+pad(m[4])+'00';}
  const stamp=new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  const esc2=s=>String(s).replace(/[\\,;]/g,x=>'\\'+x).replace(/\n/g,'\\n');
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//MicroMobility//Corniche Circuit//EN','CALSCALE:GREGORIAN','BEGIN:VEVENT',
    'UID:'+sessionId+'-'+Date.now()+'@micromobility','DTSTAMP:'+stamp,
    'DTSTART:'+date+'T'+st,'DTEND:'+date+'T'+en,
    'SUMMARY:'+esc2('MicroMobility Ride - '+(dayLabel(sess.day)||'')),
    'LOCATION:'+esc2('Jeddah Corniche Circuit'),
    'DESCRIPTION:'+esc2('Your MicroMobility bike rental booking. Arrive 10 minutes early and show your ticket at the desk.'),
    'BEGIN:VALARM','TRIGGER:-PT2H','ACTION:DISPLAY','DESCRIPTION:MicroMobility ride reminder','END:VALARM',
    'END:VEVENT','END:VCALENDAR'];
  const blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='micromobility-'+date+'.ics';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}

  if(!entries.length)return;
  entries.sort((a,b)=>(a.queueNum||0)-(b.queueNum||0));
  S.regQty=entries.length;
  S.regBikeTypes=entries.map(e=>e.typePreference||'Any');
  S.regBikeHeights=entries.map(e=>e.height?String(e.height):'');
  S.regRiderNames=entries.map(e=>e.name);
  S.regBikeSizes=entries.map(()=>'');
  S.selSession=null;S.regStep=1;S.lastTickets=[];S.modifyEntryId=null;S._alreadyBookedSession=null;
  setCustTab('register');
  try{window.scrollTo({top:0,behavior:'smooth'});}catch(e){}
}

async function submitRating(){
  const id=S._rateId;if(!id)return;
  const note=(document.getElementById('rate-note')?.value||S._rateNote||'').trim();
  const{error}=await sb.from('queue_entries').update({rating_bike:S._rateBike||null,rating_exp:S._rateExp||null,feedback:note||null}).eq('id',id);
  if(error){toast(error.message||t('errConnection'),'error');return;}
  const e=getQueue().find(x=>x.id===id);if(e){e.ratingBike=S._rateBike||null;e.ratingExp=S._rateExp||null;e.feedback=note||null;}
  closeRateModal();toast(t('rateThanks'));renderMyRides();
}

function renderMyRides(){
  const cust=S.loggedIn;
  if(!cust){document.getElementById('tab-myrides').innerHTML='';return;}
  const allEntries=getQueue().filter(e=>e.customerId===cust.id);
  
  const map={};
  allEntries.forEach(e=>{(map[e.sessionId]=map[e.sessionId]||[]).push(e);});
  const currentGroups=[],pastGroups=[];
  Object.values(map).forEach(g=>{

// Output a resized canvas as a small image: upload to the public Supabase Storage bucket 'photos' (tiny
// row payloads, browser-cacheable) and hand back its URL; if Storage isn't set up or fails, fall back to a
// data URL (current behaviour). Existing data-URL photos keep rendering either way.
function _photoOut(c,cb){
  const dataUrl=c.toDataURL('image/jpeg',0.82);
  if(!sb||!sb.storage||!c.toBlob){cb(dataUrl);return;}
  try{
    c.toBlob(async blob=>{
      if(!blob){cb(dataUrl);return;}
      try{
        const path='p/'+uid()+'.jpg';
        const{error}=await sb.storage.from('photos').upload(path,blob,{contentType:'image/jpeg',upsert:true});
        if(error){cb(dataUrl);return;}
        const{data}=sb.storage.from('photos').getPublicUrl(path);
        cb((data&&data.publicUrl)?data.publicUrl:dataUrl);
      }catch(e){cb(dataUrl);}
    },'image/jpeg',0.82);
  }catch(e){cb(dataUrl);}
}
// ── Profile photo: resize client-side to a small square; stored to Storage (URL) or as a data-URL fallback ──
function pickImage(input,cb,max,square){
  const file=input.files&&input.files[0];if(!file)return;
  max=max||300;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      if(square){
        // center-crop to a square, then scale to max×max
        const side=Math.min(img.width,img.height);
        const sx=(img.width-side)/2,sy=(img.height-side)/2;
        const c=document.createElement('canvas');c.width=max;c.height=max;
        c.getContext('2d').drawImage(img,sx,sy,side,side,0,0,max,max);
        _photoOut(c,cb);return;
      }
      let w=img.width,h=img.height;
      if(w>h){if(w>max){h=Math.round(h*max/w);w=max;}}else{if(h>max){w=Math.round(w*max/h);h=max;}}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      _photoOut(c,cb);
    };
    img.onerror=()=>toast(t('photoErrToast'),'error');
    img.src=ev.target.result;
  };
  reader.onerror=()=>toast(t('photoErrToast'),'error');
  reader.readAsDataURL(file);
}

function parseSlots(raw){
  if(!raw)return null;
  if(typeof raw==='string'){try{return JSON.parse(raw);}catch{return null;}}
  return raw;
}
function slotsFormat(s){
  
  if(!s)return null;
  if(s._bikes)return 'ids';
  if(typeof s.Road==='number'||typeof s.Hybrid==='number'||typeof s.Mountain==='number')return 'counts';
  return 'legacy';
}
function slotsLabel(raw){
  const s=parseSlots(raw);if(!s)return'—';
  const fmt=slotsFormat(s);
  const abbr={Road:'Road',Hybrid:'Hybrid',Mountain:'Mtn'};
  if(fmt==='ids'){
    
    const counts={};
    (s._bikes||[]).forEach(id=>{const b=bikeById(id);if(b)counts[b.type]=(counts[b.type]||0)+1;});
    return Object.entries(counts).filter(([,v])=>v>0).map(([ty,v])=>`${abbr[ty]||ty}×${v}`).join(', ')||'—';
  }
  if(fmt==='counts'){
    return Object.entries(s).filter(([k,v])=>v>0&&k!=='_bikes').map(([ty,v])=>`${abbr[ty]||ty}×${v}`).join(', ')||'—';
  }
  
  const parts=[];
  for(const[ty,szs]of Object.entries(s)){
    if(ty==='_bikes')continue;
    const sum=typeof szs==='number'?szs:Object.values(szs||{}).reduce((a,b)=>a+(b||0),0);
    if(sum>0)parts.push(`${abbr[ty]||ty}×${sum}`);
  }
  return parts.join(', ')||'—';
}


function startEditSession(id){
  const sess=allSessions().find(s=>s.id===id);if(!sess)return;
  S.editSessionId=id;
  S.editSessDate=sess.session_date||sess.id;
  S.editSessStatus=sess.status||'closed';
  S.showAddSession=false;
  
  const slots=parseSlots(sess.bike_slots);
  const existingTime=(slots&&slots._time)||'21:00 - 23:00';
  S.editSessStartTime=existingTime.split(/\s*-\s*/)[0]||'21:00';
  S.editSessEndTime=existingTime.split(/\s*-\s*/)[1]||'23:00';
  const fmt=slotsFormat(slots);
  if(fmt==='ids'&&slots._bikes){
    S.editSessMode='fleet';
    S.editSessAssignedIds=[...slots._bikes];
    S.editSessTypeSizes={Road:{XS:0,S:0,M:0,L:0},Hybrid:{XS:0,S:0,M:0,L:0},Mountain:{XS:0,S:0,M:0,L:0}};
  } else if(fmt==='counts'){
    S.editSessMode='counts';
    S.editSessAssignedIds=[];
    const ts={Road:{XS:0,S:0,M:0,L:0},Hybrid:{XS:0,S:0,M:0,L:0},Mountain:{XS:0,S:0,M:0,L:0}};
    ['Road','Hybrid','Mountain'].forEach(ty=>{
      if(slots[ty]&&typeof slots[ty]==='object'){
        ['XS','S','M','L'].forEach(sz=>{ts[ty][sz]=slots[ty][sz]||0;});
      } else if(typeof slots[ty]==='number'){
        
        ts[ty].M=slots[ty]||0;
      }
    });
    S.editSessTypeSizes=ts;
  } else {
    S.editSessMode='fleet';
    S.editSessAssignedIds=[];
    S.editSessTypeSizes={Road:{XS:0,S:0,M:0,L:0},Hybrid:{XS:0,S:0,M:0,L:0},Mountain:{XS:0,S:0,M:0,L:0}};
  }
  S.editSessAddons=(()=>{try{return sess.addons?(Array.isArray(sess.addons)?sess.addons:JSON.parse(sess.addons)):[];}catch(_){return[];}})();
  renderSessions();
  setTimeout(()=>document.getElementById('sess-edit-form')?.scrollIntoView({behavior:'smooth',block:'start'}),80);
}

function _nsBusyIds(){return new Set(getQueue().filter(e=>e.status==='active'||e.status==='waiting').flatMap(e=>getAssignedBikeIds(e)));}

// Read a session's offered add-on inventory items (in stock)
function sessionAddonItems(sess){
  if(!sess)return[];
  let ids=[];try{ids=sess.addons?(Array.isArray(sess.addons)?sess.addons:JSON.parse(sess.addons)):[];}catch(_){ids=[];}
  return ids.map(id=>(S.inventory||[]).find(it=>it.id===id)).filter(it=>it&&(Number(it.qty)||0)>0);
}
// A booking's add-ons normalized to [{id,qty}] (back-compat: legacy format was a flat [id] array)
function entryAddons(e){
  let raw=[];try{raw=e&&e.addons?(Array.isArray(e.addons)?e.addons:JSON.parse(e.addons)):[];}catch(_){raw=[];}
  const out=[];
  (raw||[]).forEach(a=>{
    const id=(a&&typeof a==='object')?a.id:a;
    const qty=(a&&typeof a==='object')?Math.max(1,Number(a.qty)||1):1;
    if(!id)return;const ex=out.find(x=>x.id===id);if(ex)ex.qty+=qty;else out.push({id,qty});
  });
  return out;
}
// Flat list of add-on ids for a booking (back-compat helper)
function entryAddonIds(e){return entryAddons(e).map(a=>a.id);}
// Join add-ons to inventory -> [{id,qty,name,brand,photo,price,lineTotal}]
function addonLineItems(arr){
  return (arr||[]).map(a=>{
    const id=(a&&typeof a==='object')?a.id:a;
    const qty=(a&&typeof a==='object')?Math.max(1,Number(a.qty)||1):1;
    const it=(S.inventory||[]).find(x=>x.id===id)||{};
    const price=it.price!=null?Number(it.price):0;
    return{id,qty,name:it.name||id,brand:it.brand||'',photo:it.photo||'',price,lineTotal:Math.round(price*qty*100)/100};
  }).filter(a=>a.id);
}
// Total SAR cost of a set of add-ons
function addonsCost(arr){return Math.round(addonLineItems(arr).reduce((s,a)=>s+a.lineTotal,0)*100)/100;}
// Tally add-ons across booking groups (qty-aware). Returns {items:[{id,name,brand,units,value}], totalUnits, totalValue}
function addonSalesFromGroups(groups){
  const tally={};let totalUnits=0,totalValue=0;
  (groups||[]).forEach(group=>{
    (group||[]).forEach(e=>entryAddons(e).forEach(({id,qty})=>{ // per-rider: every rider's own add-ons, not just the lead
      const it=(S.inventory||[]).find(x=>x.id===id);
      const name=it?it.name:id,brand=it?(it.brand||''):'',price=(it&&it.price!=null)?Number(it.price):0;
      if(!tally[id])tally[id]={id,name,brand,units:0,value:0};
      tally[id].units+=qty;tally[id].value+=price*qty;totalUnits+=qty;totalValue+=price*qty;
    }));
  });
  return{items:Object.values(tally).sort((a,b)=>b.units-a.units||b.value-a.value),totalUnits,totalValue};
}
// Adjust inventory stock for a set of add-on ids by delta (-1 when a booking consumes them, +1 on cancel/no-show). Clamped at 0; tolerant of a missing qty column.
async function _addonStock(ids,delta){
  if(!ids||!ids.length||!sb)return;
  await Promise.all(ids.map(async id=>{
    const it=(S.inventory||[]).find(x=>x.id===id);if(!it)return;
    const q=Math.max(0,(Number(it.qty)||0)+delta);it.qty=q;
    try{await sb.from('inventory').update({qty:q,updated_at:new Date().toISOString()}).eq('id',id);}catch(e){}
  }));
}
// Qty-aware stock adjustment for a booking's add-ons [{id,qty}] (sign -1 consume, +1 restock)
async function _addonStockQ(arr,sign){
  const norm=(arr||[]).map(a=>(a&&typeof a==='object')?{id:a.id,qty:Math.max(1,Number(a.qty)||1)}:{id:a,qty:1}).filter(a=>a.id);
  if(!norm.length||!sb)return;
  await Promise.all(norm.map(async({id,qty})=>{
    const it=(S.inventory||[]).find(x=>x.id===id);if(!it)return;
    const q=Math.max(0,(Number(it.qty)||0)+sign*qty);it.qty=q;
    try{await sb.from('inventory').update({qty:q,updated_at:new Date().toISOString()}).eq('id',id);}catch(e){}
  }));
}
// Restock a booking's add-ons once, only when its LAST active rider exits (cancel/no-show), so multi-rider bookings don't over-restock.
async function _restockAddonsOnExit(entry){
  const ad=entryAddons(entry);if(!ad.length)return;
  await _addonStockQ(ad,1); // per-rider: restock this rider's own add-ons when they exit (cancel/no-show)
}
// Inverse of _restockAddonsOnExit: reserve a booking's add-on stock once when one of its riders enters a
// confirmed state (waitlist promotion, undo no-show, undo cancel) and is the booking's first confirmed rider.
// Waitlist bookings never reserve stock, so this is the point where a promoted booking finally consumes it.
async function _consumeAddonsOnEnter(entry){
  const ad=entryAddons(entry);if(!ad.length)return;
  await _addonStockQ(ad,-1); // per-rider: reserve this rider's own add-ons when they enter a confirmed state
}

async function _addonPickerStep(addonId,delta){
  const id=S._addonPickerEntry;const e=getQueue().find(x=>x.id===id);if(!e)return;
  const it=(S.inventory||[]).find(x=>x.id===addonId);if(!it)return;
  const stock=Number(it.qty)||0;
  let cur=entryAddons(e);
  const a=cur.find(x=>x.id===addonId);
  if(delta>0){if(stock<=0)return;if(a)a.qty+=1;else cur.push({id:addonId,qty:1});}
  else{if(!a)return;a.qty-=1;if(a.qty<=0)cur=cur.filter(x=>x.id!==addonId);}
  e.addons=cur;                                            // live update so totals/views reflect immediately
  await _addonStockQ([{id:addonId,qty:1}],delta>0?-1:1);   // consume on +, restock on - (per rider)
  try{await sb.from('queue_entries').update({addons:JSON.stringify(cur)}).eq('id',id);}catch(err){} // tolerant: missing column won't break
  renderAddonPicker();
  if(S.view==='staff')renderStaffQueue();else if(S.view==='customer')renderMyRides();
}

async function saveSessionEdit(){
  const oldId=S.editSessionId;
  const sess=allSessions().find(s=>s.id===oldId);if(!sess)return;
  const newDate=S.editSessDate||oldId;
  const esStart=S.editSessStartTime||document.getElementById('es-start')?.value||'21:00';
  const esEnd=S.editSessEndTime||document.getElementById('es-end')?.value||'23:00';
  const timeVal=`${esStart} - ${esEnd}`;
  let slots,total;
  if(S.editSessMode==='counts'){
    const ts=S.editSessTypeSizes||{};
    const sizes=['XS','S','M','L'];
    total=['Road','Hybrid','Mountain'].reduce((sum,ty)=>sum+sizes.reduce((s,sz)=>s+(ts[ty]?.[sz]||0),0),0);
    if(total===0){toast(t('errAddBikeToSession'),'error');return;}
    slots={_time:timeVal};
    ['Road','Hybrid','Mountain'].forEach(ty=>{
      const rowTot=sizes.reduce((s,sz)=>s+(ts[ty]?.[sz]||0),0);
      if(rowTot>0)slots[ty]=ts[ty];
    });
  }else{
    const assignedIds=S.editSessAssignedIds;
    if(assignedIds.length===0){toast(t('errAddBikeToSession'),'error');return;}
    const allBk=getBikes();
    const typeCounts={};
    assignedIds.forEach(id=>{const b=allBk.find(x=>x.id===id);if(b)typeCounts[b.type]=(typeCounts[b.type]||0)+1;});
    slots={_bikes:assignedIds,...typeCounts,_time:timeVal};
    total=assignedIds.length;
  }
  const newStatus=S.editSessStatus||sess.status;
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const newDay=dayNames[new Date(newDate+'T00:00:00').getDay()];

  
  const prevSlots=sess.bike_slots;const prevCap=sess.capacity;
  const prevStatus=sess.status;const prevDate=sess.session_date||sess.id;const prevDay=sess.day;

  try{
    if(newDate!==oldId){
      
      const existing=allSessions().find(s=>s.id===newDate&&s.id!==oldId);
      if(existing){toast(t('errDateExists'),'error');return;}
      await sb.from('sessions').insert({
        id:newDate,day:newDay,session_date:newDate,capacity:total,
        status:newStatus,created_at:sess.created_at||new Date().toISOString(),
        bike_slots:JSON.stringify(slots)
      });
      
      await sb.from('queue_entries').update({
        session_id:newDate,session_date:newDate,session_day:newDay
      }).eq('session_id',oldId);
      await sb.from('sessions').delete().eq('id',oldId);
    } else {
      await sb.from('sessions').update({
        day:newDay,session_date:newDate,capacity:total,
        status:newStatus,bike_slots:JSON.stringify(slots)
      }).eq('id',oldId);
    }
    // Persist offered add-ons separately so a missing column can't block the save (always written so removals stick)
    {try{await sb.from('sessions').update({addons:JSON.stringify(S.editSessAddons||[])}).eq('id',newDate);}catch(e){}}
    await loadData();
    const displayDate=shortDate(newDate);
    toast(t('toastSessionUpdated').replace('{0}',displayDate));
    pushUndo(`${t('undoEditSession')} ${displayDate}`,async()=>{
      const currentId=newDate!==oldId?newDate:oldId;
      if(newDate!==oldId){
        
        await sb.from('sessions').insert({
          id:oldId,day:prevDay,session_date:prevDate,capacity:prevCap,
          status:prevStatus,created_at:sess.created_at||new Date().toISOString(),
          bike_slots:prevSlots||null
        });
        await sb.from('queue_entries').update({
          session_id:oldId,session_date:prevDate,session_day:prevDay
        }).eq('session_id',currentId);
        await sb.from('sessions').delete().eq('id',currentId);
      } else {
        await sb.from('sessions').update({
          day:prevDay,session_date:prevDate,capacity:prevCap,
          status:prevStatus,bike_slots:prevSlots||null
        }).eq('id',oldId);
      }
      await loadData();renderSessions();renderStaffQueue();
    });
    S.editSessionId=null;S.editSessTypeSizes={Road:{XS:0,S:0,M:0,L:0},Hybrid:{XS:0,S:0,M:0,L:0},Mountain:{XS:0,S:0,M:0,L:0}};
    renderSessions();renderStaffQueue();
  }catch(e){toast(t('errServerError'),'error');console.error(e);}
}

async function addSession(){
  const date=document.getElementById('ns-date')?.value;
  if(!date){toast(t('errPickDate'),'error');return;}
  const startEl=document.getElementById('ns-start');const endEl=document.getElementById('ns-end');
  const startT=startEl?startEl.value:'09:00';const endT=endEl?endEl.value:'11:00';
  const timeVal=`${startT} - ${endT}`;
  let slots,total;
  if(S.newSessMode==='counts'){
    
    const ts=S.newSessTypeSizes||{};
    const sizes=['XS','S','M','L'];
    total=['Road','Hybrid','Mountain'].reduce((sum,ty)=>sum+sizes.reduce((s,sz)=>s+(ts[ty]?.[sz]||0),0),0);
    if(total===0){toast(t('errAddBikeToSession'),'error');return;}
    slots={_time:timeVal};
    ['Road','Hybrid','Mountain'].forEach(ty=>{
      const rowTot=sizes.reduce((s,sz)=>s+(ts[ty]?.[sz]||0),0);
      if(rowTot>0){
        slots[ty]=ts[ty]; 
      }
    });
  }else{
    const assignedIds=S.newSessAssignedIds;
    if(assignedIds.length===0){toast(t('errAddBikeToSession'),'error');return;}
    const allBk=getBikes();
    const typeCounts={};
    assignedIds.forEach(id=>{const b=allBk.find(x=>x.id===id);if(b)typeCounts[b.type]=(typeCounts[b.type]||0)+1;});
    slots={_bikes:assignedIds,...typeCounts,_time:timeVal};
    total=assignedIds.length;
  }
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const weeks=Math.max(1,Math.min(12,parseInt(document.getElementById('ns-repeat')?.value||'1')||1));
  // Build one session per week (same weekday/time/config), skipping dates that already exist
  const base=new Date(date+'T00:00:00');
  const _iso=dt=>`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  const rows=[];
  for(let i=0;i<weeks;i++){
    const dt=new Date(base);dt.setDate(base.getDate()+i*7);const ds=_iso(dt);
    rows.push({id:ds,day:dayNames[dt.getDay()],session_date:ds,capacity:total,status:'closed',
      bike_slots:JSON.stringify(slots),created_at:new Date().toISOString()});
  }
  const sessLocation=(document.getElementById('ns-location')?.value||S.newSessLocation||(S.bkLocations&&S.bkLocations[0])||'').trim();
  try{
    let created=0,skipped=0,otherErr=null;const createdIds=[];
    for(const row of rows){
      const{error}=await sb.from('sessions').insert(row);
      if(error){ if(error.code==='23505')skipped++; else otherErr=error; }
      else {created++;createdIds.push(row.id);}
    }
    if(created===0&&otherErr)throw otherErr;
    // Set branch + offered add-ons separately so missing columns can never block session creation
    const _sessUpd={};
    if(sessLocation)_sessUpd.location=sessLocation;
    if((S.newSessAddons||[]).length)_sessUpd.addons=JSON.stringify(S.newSessAddons);
    if(Object.keys(_sessUpd).length&&createdIds.length){try{await Promise.all(createdIds.map(id=>sb.from('sessions').update(_sessUpd).eq('id',id)));}catch(e){}}
    await loadData();
    S.showAddSession=false;S.newSessDate='';S.newSessAssignedIds=[];S.newSessStartTime='21:00';S.newSessEndTime='23:00';S.newSessRepeat='1';S.newSessAddons=[];
    S.newSessTypeSizes={Road:{XS:0,S:0,M:0,L:0},Hybrid:{XS:0,S:0,M:0,L:0},Mountain:{XS:0,S:0,M:0,L:0}};
    if(created===0&&skipped>0)toast(t('errDateExists'),'error');
    else if(skipped>0)toast(t('someDatesSkipped').replace('{0}',created).replace('{1}',skipped));
    else if(created>1)toast(t('toastRecurringCreated').replace('{0}',created));
    else toast(`${shortDate(date)} - ${t('toastSessionReady')}`);
    renderSessions();
  }catch(e){toast(t('errCreateSession'),'error');}
}

async function toggleSession(id,newStatus){
  try{
    const prev=allSessions().find(s=>s.id===id);
    const prevStatus=prev?prev.status:'closed';
    await sb.from('sessions').update({status:newStatus}).eq('id',id);
    await loadData();
    const lbl={open:t('sessOpened'),closed:t('sessClosed'),full:t('statusFull')+'.'}[newStatus]||newStatus;
    toast(lbl);
    pushUndo(`${t('undoSessionStatus')} ${shortDate(prev?.session_date||id)} → ${newStatus}`,async()=>{
      await sb.from('sessions').update({status:prevStatus}).eq('id',id);
      await loadData();renderSessions();renderStaffQueue();
    });
    renderSessions();renderStaffQueue();
  }catch(e){toast(t('errServerError'),'error');}
}

async function deleteSession(id){
  if(!isAdmin()){toast(t('adminOnlyMsg'),'error');return;}
  try{
    const bookings=getQueue().filter(e=>e.sessionId===id&&e.status!=='removed'&&e.status!=='cancelled'&&e.status!=='noshow').length;
    if(bookings>0){toast(t('errHasBookings'),'error');return;}
    // Don't orphan sales: block delete if the session has any non-refunded cashier rows
    const sales=(S.cashSales||[]).filter(r=>r.session_id===id&&r.pay!=='refunded'&&r.category!=='__cardmeta__'&&r.category!=='__discount__').length;
    if(sales>0){toast(t('errHasSales'),'error');return;}

    await sb.from('sessions').update({status:'deleted'}).eq('id',id);
    await loadData();
    toast(t('sessDeleted'));
    renderSessions();
  }catch(e){toast(t('errDeleteSession'),'error');}
}

async function restoreSession(id){
  try{
    await sb.from('sessions').update({status:'closed'}).eq('id',id);
    await loadData();
    toast(t('sessRestored'));
    renderSessions();
  }catch(e){toast(t('errConnection'),'error');}
}

function skeletonList(n=6,tall){return`<div class="sk-wrap">${Array.from({length:n}).map(()=>`<div class="sk-row${tall?' tall':''}"></div>`).join('')}</div>`;}
function renderStaffQueue(){
  if(!S.dataLoaded){const _el=document.getElementById('tab-queue');if(_el)_el.innerHTML=skeletonList(7);return;}
  reconcileOrphanBikes();
  const queue=getQueue();const sessions=allSessions();
  const base=S.sfSession!=='all'
    ?queue.filter(e=>e.sessionId===S.sfSession&&e.status!=='removed'&&e.status!=='cancelled')
    :queue.filter(e=>e.status!=='removed'&&e.status!=='cancelled');
  const total=base.length,nWait=base.filter(e=>e.status==='waiting').length,
        nBike=base.filter(e=>e.status==='active').length,nDone=base.filter(e=>e.status==='done').length,
        nDonePaid=base.filter(e=>e.status==='done'&&e.paid).length;
  const nRiders=new Set(base.map(e=>e.customerId||e.id)).size;
  const nWaitingRiders=new Set(base.filter(e=>e.status==='waiting').map(e=>e.customerId||e.id)).size;
  let filtered=[...base];
  if(S.sfStatus==='cancelled'){
    filtered=S.sfSession!=='all'
      ?queue.filter(e=>e.sessionId===S.sfSession&&e.status==='cancelled')
      :queue.filter(e=>e.status==='cancelled');
  }else if(S.sfStatus!=='all'){
    filtered=filtered.filter(e=>e.status===S.sfStatus);
  }
  if(S.sfPay==='paid')  filtered=filtered.filter(e=>e.paid);
  if(S.sfPay==='pending')filtered=filtered.filter(e=>!e.paid);
  if(S.sfSize!=='all')  filtered=filtered.filter(e=>e.size===S.sfSize);
  if(S.sfSearch.trim()){const q=S.sfSearch.trim().toLowerCase().replace(/^#/,'');filtered=filtered.filter(e=>e.name.toLowerCase().includes(q)||(e.phone||'').includes(q)||(e.email||'').toLowerCase().includes(q)||String(e.queueNum)===q);}
  const _sfd=S.sfSortDir;
  filtered.sort((a,b)=>{
    if(S.sfSort==='name')   return _sfd*a.name.localeCompare(b.name);
    if(S.sfSort==='type')   return _sfd*resolvedType(a).localeCompare(resolvedType(b));
    if(S.sfSort==='paid')   return _sfd*(Number(a.paid)-Number(b.paid));
    if(S.sfSort==='status') return _sfd*(a.status||'').localeCompare(b.status||'');
    return _sfd*(a.sessionId.localeCompare(b.sessionId)||a.queueNum-b.queueNum);
  });
  function thQSort(col,label,cls=''){
    const active=S.sfSort===col;
    const arrow=active?(S.sfSortDir===1?'↑':'↓'):'';
    return`<th class="an-sort-th${active?' an-sort-active':''}${cls?' '+cls:''}" onclick="setSfSort('${col}')">${label}${active?' '+arrow:''}</th>`;
  }
  const waitingBase=base.filter(e=>e.status==='waiting').sort((a,b)=>a.queueNum-b.queueNum);
  const nextRider=waitingBase[0];
  const totalWaiting=new Set(waitingBase.map(e=>`${e.sessionId}:${e.queueNum}`)).size;
  const nextUp=nextRider?`<div class="next-up-banner">
    <div>
      <div class="next-up-label">${t('nextUpLabel')} &nbsp;<span style="font-size:12px;color:var(--muted);font-weight:600">${totalWaiting} ${t('inLine')}</span></div>
      <div class="next-up-name">#${nextRider.queueNum} - ${esc(nextRider.name)}</div>
      <div class="next-up-details">${typeLabel(nextRider.typePreference)} &middot; ${nextRider.paid?'✓ '+t('paidLabel'):' '+t('pendingLabel')}</div>
    </div>
    <button class="btn-primary" onclick="openModal('${nextRider.id}')">${t('assignBikeCheckin')}</button>
  </div>`:'';
  const qSessOpts=`<option value="all"${S.sfSession==='all'?' selected':''}>${t('allSessions')}</option>`+
    sessions.filter(s=>s.status!=='deleted').map(s=>`<option value="${s.id}"${S.sfSession===s.id?' selected':''}>${dayLabel(s.day)} ${shortDate(s.session_date||s.id)}</option>`).join('');
  const qStatusOpts=['all','waiting','active','done','noshow','cancelled'].map(s=>{
    const l={all:t('filterAll'),waiting:t('filterWaiting'),active:t('filterOnBike'),done:t('filterDone'),noshow:t('filterNoshow'),cancelled:t('statusCancelled')}[s];
    return`<option value="${s}"${S.sfStatus===s?' selected':''}>${l}</option>`;}).join('');
  const qPayOpts=['all','paid','pending'].map(p=>{
    const l={all:t('filterAll'),paid:t('paidLabel'),pending:t('pendingLabel')}[p];
    return`<option value="${p}"${S.sfPay===p?' selected':''}>${l}</option>`;}).join('');
  
  const livePosMap={};
  const allWaiting=getQueue().filter(e=>e.status==='waiting').sort((a,b)=>a.sessionId.localeCompare(b.sessionId)||a.queueNum-b.queueNum);
  const sessPosCounter={};
  const seenBookings=new Set();
  allWaiting.forEach(e=>{
    const key=`${e.sessionId}:${e.queueNum}`;
    if(!seenBookings.has(key)){
      seenBookings.add(key);
      sessPosCounter[e.sessionId]=(sessPosCounter[e.sessionId]||0)+1;
    }
    livePosMap[e.id]=sessPosCounter[e.sessionId]||0;
  });
  
  const sessWaitCount={};
  allWaiting.forEach(e=>{
    const key=`${e.sessionId}:${e.queueNum}`;
    if(!sessWaitCount[`_seen_${key}`]){
      sessWaitCount[`_seen_${key}`]=true;
      sessWaitCount[e.sessionId]=(sessWaitCount[e.sessionId]||0)+1;
    }
  });

  
  function buildQueueGroups(entries){
    const groups=[],handled=new Set();
    for(const e of entries){
      if(handled.has(e.id))continue;
      if(!e.customerId){groups.push([e]);handled.add(e.id);continue;}
      const siblings=entries
        .filter(x=>!handled.has(x.id)&&x.customerId===e.customerId&&x.sessionId===e.sessionId)
        .sort((a,b)=>a.queueNum-b.queueNum);
      siblings.forEach(x=>handled.add(x.id));
      groups.push(siblings);
    }
    return groups;
  }

  function entryPhone(e){
    if(e.phone)return e.phone;
    if(e.customerId){const c=getCustomers().find(x=>x.id===e.customerId);if(c&&c.phone)return c.phone;}
    return'';
  }

  function _bulkChk(e){
    if(e.status!=='waiting'&&e.status!=='active')return'';
    const on=S.sfSelected.includes(e.id);
    return`<button class="btn-sm" title="${t('selectRowTip')}" aria-label="Select booking #${e.queueNum}" onclick="toggleSfSelect('${e.id}')" style="padding:5px 9px;background:${on?'rgba(3,255,137,.18)':'rgba(255,255,255,.04)'};border:1px solid ${on?'var(--green)':'rgba(255,255,255,.14)'};color:${on?'var(--green)':'var(--muted)'}">${on?'☑':'☐'}</button>`;
  }
  function _reorderBtns(e){
    if(e.status!=='waiting')return'';
    return`<button class="btn-sm btn-muted" title="${t('moveUpLabel')}" aria-label="${t('moveUpLabel')}" style="padding:5px 8px" onclick="moveQueueEntry('${e.id}',-1)">▲</button><button class="btn-sm btn-muted" title="${t('moveDownLabel')}" aria-label="${t('moveDownLabel')}" style="padding:5px 8px" onclick="moveQueueEntry('${e.id}',1)">▼</button>`;
  }
  function _entryActions(e){
    if(e.status==='waitlist')return`<button class="btn-sm btn-green" onclick="promoteWaitlist('${e.id}')">${ICON_PROMOTE} ${t('promoteBtn')}</button><button class="btn-sm btn-muted" onclick="staffCancelEntry('${e.id}')">${t('cancelBtn')}</button>`;
    if(e.status==='waiting')return`${_bulkChk(e)}<button class="btn-sm btn-green" onclick="openModal('${e.id}')">${t('checkInBtn')}</button><button class="btn-sm btn-red" onclick="confirmNoShow('${e.id}')">${t('noShowBtn')}</button><button class="btn-sm btn-muted" onclick="staffCancelEntry('${e.id}')">${t('cancelBtn')}</button>`;
    if(e.status==='active')return`${_bulkChk(e)}<button class="btn-sm btn-blue" onclick="openModal('${e.id}')">${t('changeBikeBtn')}</button><button class="btn-sm btn-orange" onclick="doReturn('${e.id}')">${t('returnBikeBtn')}</button><button class="btn-sm btn-muted" onclick="showCashierModal('${e.id}')">${t('cashierAddBtn')}</button><button class="btn-sm btn-muted" onclick="doUndoCheckin('${e.id}')">${t('undoCheckinBtn')}</button><button class="btn-sm btn-muted" onclick="staffCancelEntry('${e.id}')">${t('cancelBtn')}</button>`;
    if(e.status==='done')return`<button class="btn-sm btn-blue" onclick="doReopen('${e.id}')">${t('reopenBookingBtn')}</button><button class="btn-sm btn-muted" onclick="confirmRemove('${e.id}')">${t('removeBtn')}</button>`;
    if(e.status==='noshow')return`<button class="btn-sm btn-green" onclick="doUndoNoShow('${e.id}')">${t('customerShowedBtn')}</button><button class="btn-sm btn-muted" onclick="confirmRemove('${e.id}')">${t('removeBtn')}</button>`;
    return`<button class="btn-sm btn-muted" onclick="confirmRemove('${e.id}')">${t('removeBtn')}</button>`;

    </tr>`;
  }

  function renderGroupRow(group){
    if(group.length===1)return renderQRow(group[0]);
    const primary=group[0];
    const n=group.length;
    const allSameQ=group.every(e=>e.queueNum===primary.queueNum);
    const isConsec=!allSameQ&&group.every((e,i)=>i===0||e.queueNum===group[i-1].queueNum+1);
    const qNumDisplay=allSameQ
      ?`#${primary.queueNum}`
      :isConsec
        ?`#${primary.queueNum}&thinsp;-&thinsp;#${group[n-1].queueNum}`
        :group.map(e=>`#${e.queueNum}`).join(', ');
    const allTerminal=group.every(e=>['done','noshow','cancelled'].includes(e.status));
    const groupCls=group.some(e=>e.status==='active')?'row-active'
      :group.every(e=>['noshow','cancelled'].includes(e.status))?'row-noshow-cancel'
      :(allTerminal&&group.filter(e=>e.status==='done').every(e=>e.paid)&&group.some(e=>e.status==='done'))?'row-done-paid'
      :allTerminal?'row-done':'';
    const lp=livePosMap[primary.id];
    const totalW=sessWaitCount[primary.sessionId]||0;
    const posCell=primary.status==='waiting'&&lp
      ?`<div class="pos-badge" style="font-size:12px;padding:3px 8px">${lp} / ${totalW}</div>`
      :`<span style="color:var(--muted);font-size:12px">—</span>`;
    const activeGroup=group.filter(e=>!['cancelled','noshow'].includes(e.status));
    const totalPrice=activeGroup.reduce((s,e)=>s+(e.price??DEFAULT_PRICE),0);
    const paidAmt=activeGroup.filter(e=>e.paid&&(e.price??DEFAULT_PRICE)>0).reduce((s,e)=>s+(e.price??DEFAULT_PRICE),0);
    const houseAmt=activeGroup.filter(e=>e.paid&&(e.price??DEFAULT_PRICE)===0).length;
    const remaining=totalPrice-paidAmt;
    const paidCount=activeGroup.filter(e=>e.paid&&(e.price??DEFAULT_PRICE)>0).length;
    const priceSpan=`<span style="font-weight:800;white-space:nowrap">SAR ${totalPrice}</span>
      <div style="font-size:10px;color:var(--muted);font-weight:600;margin-top:2px">${paidCount}/${activeGroup.length} ${t('paidLabel')}${houseAmt>0?` · ${houseAmt} `:''}</div>

    return group.map((e,i)=>{
      const isFirst=i===0;
      const isLast=i===n-1;
      const rowCls=e.status==='active'?'row-active':(e.status==='noshow'||e.status==='cancelled')?'row-noshow-cancel':(e.status==='done'&&e.paid)?'row-done-paid':(e.status==='done')?'row-done':groupCls;
      const assignedBikes=getAssignedBikes(e);

        ?allColors.map(c=>`<span style="display:inline-block;width:13px;height:13px;border-radius:50%;background:${c};border:1.5px solid rgba(0,0,0,.3);flex-shrink:0"></span>`).join('')

        ?assignedBikes.map(b=>`<span style="font-weight:700;font-size:13px">${esc(b.name)}</span>`).join('<br>')
        :'<span style="color:var(--muted)">—</span>';

  function renderGroupCard(group){
    const n=group.length;
    const primary=group[0];
    const allSameQ=group.every(e=>e.queueNum===primary.queueNum);
    const isConsec=!allSameQ&&group.every((e,i)=>i===0||e.queueNum===group[i-1].queueNum+1);
    const qNumDisplay=allSameQ?`#${primary.queueNum}`:isConsec?`#${primary.queueNum}&ndash;#${group[n-1].queueNum}`:group.map(e=>`#${e.queueNum}`).join(', ');
    const groupCls=group.some(e=>e.status==='active')?'row-active':group.every(e=>['noshow','cancelled'].includes(e.status))?'row-noshow-cancel':group.every(e=>['done','noshow','cancelled'].includes(e.status))&&group.some(e=>e.status==='done'&&e.paid)?'row-done-paid':group.every(e=>['done','noshow','cancelled'].includes(e.status))?'row-done':'';
    const lp=livePosMap[primary.id];const totalW=sessWaitCount[primary.sessionId]||0;
    const posTag=primary.status==='waiting'&&lp?`<span class="pos-badge" style="font-size:11px;padding:2px 7px">${lp}/${totalW}</span>`:'';
    const sessLabel=S.sfSession==='all'?`<div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px">${dayLabel(primary.sessionDay)||''} &middot; ${shortDate(primary.sessionDate)}</div>`:'';
    const riderRows=group.map((e,i)=>{
      const assignedBikes=getAssignedBikes(e);
      const bikeInfo=assignedBikes.length?assignedBikes.map(b=>b.name).join(', '):'';
      const isHouse=e.paid&&(e.price??DEFAULT_PRICE)===0;
      const payTag=isHouse?`<span style="font-size:12px"></span>`:e.paid?`<span style="font-size:12px;font-weight:800;color:var(--green)">✓</span>`:`<span style="font-size:12px;font-weight:800;color:var(--muted)"></span>`;
      const indent=n>1?'padding-left:22px':'';
      return`<div style="padding:6px 0;${i>0?'border-top:1px solid rgba(255,255,255,.05)':''}">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <div style="display:flex;align-items:center;gap:6px;min-width:0">
            ${n>1?`<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--green);color:#000;font-size:9px;font-weight:900;flex-shrink:0">${i+1}</span>`:''}
            <span style="font-weight:800;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px">${esc(e.name)}</span>
            ${e.height?`<span style="font-size:11px;font-weight:800;color:var(--green);flex-shrink:0"><bdi>${e.height} ${t('cmUnit')}</bdi></span>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">${statusBadge(e.status)}${payTag}</div>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;${indent}">
          ${typeLabel(e.typePreference)}${bikeInfo?` &middot; <span style="color:var(--muted-l)">${esc(bikeInfo)}</span>`:''}
        </div>
      </div>`;
    }).join('');
    const actionsHtml=group.map((e,i)=>`<div style="${n>1&&i>0?'border-top:1px solid rgba(255,255,255,.05);padding-top:6px;margin-top:2px':''}">
      ${n>1?`<div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:4px">${esc(e.name)}</div>`:''}
      <div style="display:flex;gap:6px;flex-wrap:wrap">${_entryActions(e)}</div>
    </div>`).join('');
    return`<div class="q-card${groupCls?' '+groupCls:''}" style="${n>1?'border-left:2px solid rgba(3,255,137,.25)':''}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:${sessLabel?'4':'6'}px">
        <span class="queue-num-cell" style="font-size:22px">${qNumDisplay}</span>
        ${n>1?`<span style="font-size:10px;color:var(--green);font-weight:800">${n} ${t('bike')||'Bikes'}</span>`:''}
        ${posTag}
        <button onclick="showEditQNumModal('${primary.id}')" title="${t('editQNumTip')}" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 4px;line-height:1;margin-left:auto" onmouseover="this.style.color='var(--green)'" onmouseout="this.style.color='var(--muted)'">#</button>
      </div>

      <div>${riderRows}</div>
      ${(()=>{
        const canEdit=group.some(e=>['waiting','active','waitlist'].includes(e.status));
        return group.map(e=>{
          const ad=addonLineItems(entryAddons(e));
          if(!ad.length&&!canEdit)return'';
          return`<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <span style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">${n>1?esc(e.name)+' · ':''}${t('addonsLabel')}</span>
              ${canEdit?`<button type="button" onclick="event.stopPropagation();showAddonPicker('${e.id}')" style="background:rgba(3,255,137,.1);border:1px solid rgba(3,255,137,.25);color:var(--green);font-family:inherit;font-size:11px;font-weight:800;padding:3px 9px;border-radius:7px;cursor:pointer">+ ${t('addonAddBtn')}</button>`:''}
            </div>
            ${ad.map(a=>`<div style="display:flex;align-items:center;gap:7px;margin-top:5px;font-size:12px"><span style="flex:1;min-width:0;font-weight:700">${esc(a.name)}${a.qty>1?` ×${a.qty}`:''}</span><bdi style="font-weight:800">SAR ${a.lineTotal}</bdi></div>`).join('')}

        }).join('');

    </div>`;
  }

      <div class="form-group" style="margin-bottom:10px">

  const _sessSummaryBar=(()=>{
    const openSess=allSessions().filter(s=>s.status==='open'||s.status==='full').sort((a,b)=>new Date(a.session_date||a.id)-new Date(b.session_date||b.id));
    if(!openSess.length)return'';
    const chips=openSess.map(s=>{
      const q=getQueue().filter(e=>e.sessionId===s.id);
      const sWait=q.filter(e=>e.status==='waiting').length;
      const sActive=q.filter(e=>e.status==='active').length;
      const sDone=q.filter(e=>e.status==='done').length;
      const cap=s.capacity||12;
      const fillPct=Math.round(Math.min((sWait+sActive+sDone)/cap*100,100));
      const fillClr=fillPct>=90?'var(--red)':'var(--green)';
      const isCurrent=S.sfSession===s.id;
      return`<div class="sess-summary-chip${isCurrent?' active-sess':''}"
        onclick="setSfSession('${s.id}')" title="${dayLabel(s.day)} ${shortDate(s.session_date||s.id)}">

          <div class="sess-chip-date">${dayLabel(s.day)}, ${shortDate(s.session_date||s.id)} &nbsp;·&nbsp; ${sessionTime(s)}</div>

            <span style="color:var(--green)">${sWait} ${t('waitingStat').toLowerCase()}</span>
            ${sActive?` &middot; <span style="color:var(--text)">${sActive} ${t('activeSessChip')}</span>`:''}
            ${sDone?` &middot; <span style="color:var(--muted)">${sDone} ${t('doneSessChip')}</span>`:''}
          </div>
          <div class="sess-chip-bar"><div class="sess-chip-fill" style="width:${fillPct}%;background:${fillClr}"></div></div>
        </div>
        <div class="sess-chip-badge"><span class="badge-${s.status}">${{open:t('statusOpen'),full:t('statusFull'),closed:t('statusClosed')}[s.status]}</span></div>

      if(!sessFiltered.length)return'';

    emptyRow=filtered.length===0?`<tr><td colspan="13"><div style="padding:8px">${emptyIllustration(ILLUS_PEOPLE,t('noHistory'))}</div></td></tr>`:'';

    if(!filtered.length)mobileCards=`<div style="padding:8px">${emptyIllustration(ILLUS_PEOPLE,t('noHistory'))}</div>`;
  }
  document.getElementById('tab-queue').innerHTML=_queueHeader+_sessSummaryBar+`

        ${recent.map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;margin-bottom:6px;background:rgba(224,64,64,.07);border:1px solid rgba(224,64,64,.2);border-radius:10px;font-size:12px">
