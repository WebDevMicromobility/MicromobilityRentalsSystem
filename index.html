<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MicroMobility: Corniche Circuit Queue</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="logo.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    :root {
      --bg:#090909; --s1:#0d0d0d; --s2:#121212; --s3:#181818;
      --green:#03ff89; --green-h:#00e07a; --green-d:#00cc6a;
      --red:#d90909; --orange:#e08828; --blue:#4aa8f8; --purple:#a06af0;
      --text:#fcf9f4; --muted:#6b6b6b; --muted-l:#888888; --border:rgba(252,249,244,0.08);
      /* ── palette aliases: all non-green accents map to green/muted ── */
      --accent2:rgba(3,255,137,.55); --warn:rgba(255,255,255,.55);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

    /* ── TOPBAR ──────────────────────────────────────────── */
    #topbar{position:sticky;top:0;z-index:100;
      background:linear-gradient(180deg,#090909 0%,#0d0d0d 100%);
      border-bottom:1px solid rgba(3,255,137,.14);
      box-shadow:0 1px 0 rgba(3,255,137,.06),0 8px 32px rgba(0,0,0,.55);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .topbar-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .topbar-logo img{height:44px;width:auto;max-width:160px;object-fit:contain;}
    @media(max-width:767px){.topbar-logo img{height:32px;max-width:110px;}}
    .topbar-brand{display:flex;flex-direction:column;line-height:1.25;}
    .topbar-brand-name{font-size:16px;font-weight:900;color:var(--green);
      text-shadow:0 0 20px rgba(3,255,137,.35);letter-spacing:-.2px;}
    .topbar-brand-sub{font-size:14px;font-weight:700;color:var(--text);letter-spacing:.2px;}
    .topbar-right{display:flex;align-items:center;gap:10px;}
    .view-badge{font-size:11px;font-weight:900;padding:5px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.7px;}
    .view-badge.staff{background:rgba(3,255,137,.15);color:var(--green);border:1px solid rgba(3,255,137,.35);box-shadow:0 0 12px rgba(3,255,137,.12);}
    .view-badge.customer{background:rgba(3,255,137,.1);color:var(--green);border:1px solid rgba(3,255,137,.25);}
    .topbar-btn{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);color:var(--muted-l);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
    .topbar-btn:hover{border-color:rgba(3,255,137,.4);color:var(--text);background:rgba(3,255,137,.06);}
    .topbar-btn.danger:hover{border-color:rgba(224,64,64,.5);color:var(--red);background:rgba(224,64,64,.06);}
    .topbar-btn.undo-btn{color:var(--green);border-color:rgba(3,255,137,.3);}
    .topbar-btn.undo-btn:hover{border-color:rgba(3,255,137,.55);background:rgba(3,255,137,.08);color:var(--green);}
    @keyframes undoPulse{0%,100%{box-shadow:0 0 0 0 rgba(3,255,137,.35);}60%{box-shadow:0 0 0 5px rgba(3,255,137,0);}}

    /* ── TAB NAV ─────────────────────────────────────────── */
    .tab-nav{background:linear-gradient(180deg,#111111 0%,#101010 100%);
      border-bottom:1px solid rgba(255,255,255,.06);
      padding:0 16px;display:flex;justify-content:center;gap:2px;overflow-x:auto;scrollbar-width:none;}
    .tab-nav::-webkit-scrollbar{display:none;}
    .tab-btn{padding:15px 20px;min-height:48px;background:none;border:none;border-bottom:2px solid transparent;
      color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;
      cursor:pointer;white-space:nowrap;transition:color .2s,border-color .2s;
      touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
    .tab-btn:hover{color:rgba(255,255,255,.75);}
    .tab-btn.active{color:var(--green);border-bottom-color:var(--green);
      text-shadow:0 0 16px rgba(3,255,137,.3);}

    /* ── VIEWS ───────────────────────────────────────────── */
    #view-landing,#view-customer,#view-staff{display:none;}
    #view-landing.active,#view-customer.active,#view-staff.active{display:block;}

    /* ── LANDING PAGE ────────────────────────────────────── */
    #landing-body{
      min-height:calc(100vh - 64px);
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:40px 24px;
      background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(3,255,137,.055) 0%,transparent 65%),
                 radial-gradient(ellipse 40% 30% at 80% 80%,rgba(74,168,248,.03) 0%,transparent 60%);
    }
    /* ── Landing main heading ── */
    .landing-main-title{font-size:44px;font-weight:900;text-align:center;letter-spacing:.5px;line-height:1.15;margin-bottom:32px;color:var(--text);text-transform:uppercase;}
    .landing-main-title span{background:linear-gradient(135deg,var(--green) 0%,var(--green-h) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    /* ── Hero card (clickable) ── */
    .landing-hero-card{
      max-width:320px;width:100%;
      background:linear-gradient(145deg,#1a1a1a,#161616);
      border:1.5px solid rgba(255,255,255,.1);
      border-radius:18px;overflow:hidden;cursor:pointer;
      transition:transform .28s cubic-bezier(.2,.8,.2,1),border-color .28s,box-shadow .28s;
      box-shadow:0 6px 32px rgba(0,0,0,.38);
      position:relative;
      padding:0;text-align:left;display:block;
    }
    .landing-hero-card:hover{
      border-color:rgba(3,255,137,.55);
      transform:translateY(-8px) scale(1.012);
      box-shadow:0 20px 56px rgba(3,255,137,.18),0 6px 32px rgba(0,0,0,.45);
    }
    .landing-hero-card img{width:100%;height:auto;display:block;opacity:.94;transition:opacity .28s;}
    .landing-hero-card:hover img{opacity:1;}
    .landing-hero-card-cta{
      position:absolute;bottom:0;left:0;right:0;
      padding:28px 24px 22px;
      background:linear-gradient(to top,rgba(0,0,0,.72) 0%,transparent 100%);
      display:flex;align-items:center;justify-content:flex-end;
    }
    html[dir="rtl"] .landing-hero-card-cta{justify-content:flex-start;}
    .landing-hero-cta-btn{
      width:46px;height:46px;border-radius:50%;
      background:var(--green);
      display:flex;align-items:center;justify-content:center;
      color:#060f09;font-size:20px;font-weight:900;
      transition:transform .28s cubic-bezier(.2,.8,.2,1),box-shadow .28s;
      box-shadow:0 0 24px rgba(3,255,137,.45);
      flex-shrink:0;
    }
    .landing-hero-card:hover .landing-hero-cta-btn{transform:scale(1.15) translateX(3px);box-shadow:0 0 32px rgba(3,255,137,.7);}
    html[dir="rtl"] .landing-hero-card:hover .landing-hero-cta-btn{transform:scale(1.15) translateX(-3px);}
    /* legacy hero kept for RTL setLang guard */
    .landing-hero{display:none;}
    .landing-brand-row{display:none;}
    .landing-hero-img{display:none;}
    .landing-cards{display:none;}
    .landing-title{font-size:34px;font-weight:900;margin-bottom:8px;letter-spacing:-.5px;}
    .landing-title span{
      background:linear-gradient(135deg,var(--green) 0%,var(--green-h) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .landing-sub{font-size:15px;color:var(--muted);font-weight:500;letter-spacing:.1px;}
    .landing-cards{display:flex;justify-content:center;width:100%;max-width:680px;}
    .landing-card{max-width:360px;width:100%;}
    .landing-card{
      background:linear-gradient(145deg,#1a1a1a 0%,#161616 100%);
      border:1.5px solid rgba(255,255,255,.07);border-radius:20px;
      padding:36px 32px;cursor:pointer;
      transition:border-color .25s,transform .25s cubic-bezier(.2,.8,.2,1),box-shadow .25s;
      text-align:left;display:flex;flex-direction:column;gap:10px;
      box-shadow:0 4px 24px rgba(0,0,0,.35),0 1px 0 rgba(255,255,255,.04) inset;
    }
    .landing-card:hover{
      border-color:rgba(3,255,137,.5);
      background:linear-gradient(145deg,#1c1f1c 0%,#171a17 100%);
      transform:translateY(-4px);
      box-shadow:0 12px 48px rgba(3,255,137,.14),0 4px 24px rgba(0,0,0,.4);
    }
    .landing-card-icon{font-size:36px;line-height:1;margin-bottom:4px;}
    .landing-card-title{font-size:19px;font-weight:900;letter-spacing:-.2px;}
    .landing-card-desc{font-size:13px;color:var(--muted);line-height:1.65;}
    .landing-card-arrow{font-size:20px;color:var(--green);margin-top:4px;transition:transform .25s;}
    .landing-card:hover .landing-card-arrow{transform:translateX(5px);}
    .landing-footer{margin-top:48px;text-align:center;}
    .staff-access-btn{background:none;border:none;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;cursor:pointer;padding:8px 16px;border-radius:8px;transition:all .2s;opacity:.45;}
    .staff-access-btn:hover{color:var(--green);opacity:1;}

    /* ── Landing availability strip ── */
    .landing-avail-strip{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;}
    .landing-avail-chip{display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 24px;border-radius:16px;min-width:140px;
      border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
      font-size:15px;font-weight:800;cursor:pointer;transition:all .22s;text-align:center;}
    .landing-avail-chip.has-spots{border-color:rgba(3,255,137,.3);background:rgba(3,255,137,.06);color:var(--green);}
    .landing-avail-chip.has-spots:hover{background:rgba(3,255,137,.14);border-color:rgba(3,255,137,.6);}
    .landing-avail-chip.full{border-color:rgba(252,249,244,.15);background:rgba(255,255,255,.04);color:var(--muted-l);}
    .landing-avail-chip.no-sessions{color:var(--muted);}
    .landing-avail-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .landing-subtitle{font-size:15px;color:var(--muted);font-weight:500;text-align:center;margin-bottom:28px;line-height:1.6;}

    /* ── Modal animations ── */
    @keyframes modalFadeIn{from{opacity:0}to{opacity:1}}
    @keyframes modalSlideUp{from{transform:translateY(28px) scale(.97);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
    @keyframes modalSheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-backdrop{animation:modalFadeIn .22s ease both;}
    .modal-box{animation:modalSlideUp .28s cubic-bezier(.2,.8,.2,1) both;}
    @media(max-width:767px){
      .modal-box{animation:modalSheetUp .32s cubic-bezier(.2,.8,.2,1) both;}
    }

    /* ── Staff session summary bar ── */
    .sess-summary-bar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
    .sess-bar-mobile{display:none;}  /* hidden on desktop */
    .sess-summary-chip{
      display:flex;align-items:center;gap:10px;
      background:linear-gradient(145deg,#1a1a1a,#161616);
      border:1px solid rgba(255,255,255,.07);border-radius:12px;
      padding:10px 14px;cursor:pointer;transition:all .2s;flex:1;min-width:160px;}
    .sess-summary-chip:hover{border-color:rgba(3,255,137,.35);background:#1c1f1c;}
    .sess-summary-chip.active-sess{border-color:rgba(3,255,137,.3);}
    .sess-chip-info{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0;}
    .sess-chip-date{font-size:12px;font-weight:900;white-space:nowrap;}
    .sess-chip-counts{font-size:11px;color:var(--muted);font-weight:700;}
    .sess-chip-bar{height:4px;border-radius:2px;background:var(--border);overflow:hidden;margin-top:6px;}
    .sess-chip-fill{height:100%;border-radius:2px;background:var(--green);transition:width .4s;}
    .sess-chip-badge{flex-shrink:0;}
    @media(max-width:767px){.sess-summary-bar{gap:6px;}.sess-summary-chip{min-width:140px;padding:8px 10px;}}

    /* ── Account stats strip ── */
    .account-stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px;}
    .account-stat{background:linear-gradient(145deg,#1a1a1a,#161616);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px 16px;text-align:center;}
    .account-stat-val{font-size:22px;font-weight:900;line-height:1;margin-bottom:4px;}
    .account-stat-lbl{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
    @media(max-width:767px){.account-stats-strip{grid-template-columns:repeat(2,1fr);gap:8px;}}

    /* ── Undo toast bar ── */
    .undo-bar{
      display:flex;align-items:center;gap:12px;
      background:#1e1e1e;border:1px solid rgba(3,255,137,.3);border-radius:14px;
      padding:12px 16px;pointer-events:all;min-width:260px;max-width:380px;
      box-shadow:0 8px 32px rgba(0,0,0,.45),0 0 0 1px rgba(3,255,137,.08);
      position:relative;overflow:hidden;}
    .undo-bar-text{flex:1;font-size:13px;font-weight:700;color:var(--text);line-height:1.3;}
    .undo-bar-action{background:var(--green);color:#060f09;border:none;border-radius:8px;
      padding:6px 14px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:900;
      cursor:pointer;flex-shrink:0;transition:all .18s;letter-spacing:.2px;}
    .undo-bar-action:hover{background:var(--green-h);transform:scale(1.04);}
    .undo-bar-progress{position:absolute;bottom:0;left:0;height:3px;background:rgba(3,255,137,.4);
      border-radius:0 0 0 14px;transition:width linear;}

    /* ── Auto-refresh indicator ── */
    .refresh-indicator{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.2px;}
    .refresh-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

    /* ── MAIN CONTENT ────────────────────────────────────── */
    .view-main{max-width:1160px;margin:0 auto;padding:28px 28px;}
    /* ── App footer ── */
    body.view-staff #app-footer{display:none;}
    #app-footer{
      background:#1a1919;border-top:1px solid rgba(252,249,244,.07);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:10px;padding:28px 16px 32px;margin-top:48px;}
    .footer-social{display:flex;align-items:center;justify-content:center;gap:10px;}
    .footer-social-link{display:flex;align-items:center;justify-content:center;
      width:36px;height:36px;border-radius:10px;
      color:var(--green);background:rgba(3,255,137,.07);
      border:1px solid rgba(3,255,137,.2);
      transition:all .22s;text-decoration:none;flex-shrink:0;}
    .footer-social-link svg{width:16px;height:16px;}
    .footer-social-link:hover{background:rgba(3,255,137,.18);border-color:rgba(3,255,137,.55);
      transform:translateY(-3px);box-shadow:0 6px 18px rgba(3,255,137,.22);}
    .footer-copy{font-size:10.5px;color:var(--muted);font-weight:600;letter-spacing:.2px;}
    .tab-panel{display:none;}
    .tab-panel.active{display:block;}
    .page-title{font-size:23px;font-weight:900;margin-bottom:4px;letter-spacing:-.3px;}
    .page-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5;}
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
    .label-hint{font-size:11px;font-weight:400;color:var(--muted);text-transform:none;letter-spacing:0;}
    .card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.2);}

    /* ── PIN MODAL ───────────────────────────────────────── */
    .pin-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
    .pin-box{background:linear-gradient(160deg,#161616,#131313);border:1px solid rgba(3,255,137,.18);border-radius:24px;padding:36px 32px;width:100%;max-width:340px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.7),0 0 40px rgba(3,255,137,.06);}
    .pin-logo{height:72px;width:auto;object-fit:contain;margin-bottom:18px;display:block;margin-left:auto;margin-right:auto;}
    .pin-title{font-size:20px;font-weight:900;margin-bottom:4px;}
    .pin-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
    .pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:28px;}
    .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s;}
    .pin-dot.filled{background:var(--green);border-color:var(--green);}
    .pin-dot.error{background:var(--red);border-color:var(--red);}
    .pin-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
    .pin-key{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:20px;font-weight:800;color:var(--text);cursor:pointer;transition:all .15s;font-family:'Space Grotesk',sans-serif;}
    .pin-key:hover{background:var(--s3);border-color:var(--green);}
    .pin-key:active{transform:scale(.94);}
    .pin-key.del{color:var(--muted);font-size:16px;}
    .pin-key.empty{visibility:hidden;}
    .pin-error{font-size:13px;color:var(--red);font-weight:700;height:20px;margin-bottom:16px;}
    .pin-cancel{background:none;border:none;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;padding:8px;transition:color .2s;}
    .pin-cancel:hover{color:var(--text);}
    @keyframes pinShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
    .pin-box.shake{animation:pinShake .35s ease;}

    /* ── AUTH OVERLAY ────────────────────────────────────── */
    .auth-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
    .auth-box{background:linear-gradient(160deg,#161616 0%,#131313 100%);border:1px solid rgba(255,255,255,.09);border-radius:24px;padding:36px 32px;width:100%;max-width:420px;max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;box-shadow:0 32px 80px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.04) inset;margin:auto;}
    .auth-logo{height:80px;width:auto;object-fit:contain;margin-bottom:20px;display:block;margin-left:auto;margin-right:auto;}
    .auth-title{font-size:22px;font-weight:900;margin-bottom:4px;letter-spacing:-.3px;}
    .auth-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.5;}
    .auth-tabs{display:flex;gap:0;margin-bottom:28px;background:rgba(255,255,255,.04);border-radius:12px;padding:4px;border:1px solid rgba(255,255,255,.06);}
    .auth-tab{flex:1;padding:9px;border:none;border-radius:9px;background:none;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;}
    .auth-tab.active{background:rgba(3,255,137,.13);color:var(--green);box-shadow:0 0 12px rgba(3,255,137,.1);}
    .auth-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
    .auth-field label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;}
    .auth-field input{background:#1c1c1c;border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:500;outline:none;transition:all .2s;width:100%;box-shadow:0 1px 3px rgba(0,0,0,.2) inset;}
    .auth-field input:focus{border-color:rgba(3,255,137,.55);background:#1e201e;box-shadow:0 0 0 3px rgba(3,255,137,.1),0 1px 3px rgba(0,0,0,.2) inset;}
    .auth-or{text-align:center;color:var(--muted);font-size:12px;font-weight:700;margin:10px 0;position:relative;}
    .auth-or::before,.auth-or::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border);}
    .auth-or::before{left:0;}.auth-or::after{right:0;}
    .auth-submit{width:100%;margin-top:6px;}
    .auth-err{font-size:13px;color:var(--red);font-weight:700;margin-bottom:10px;min-height:18px;text-align:center;}

    /* ── PRICE PREVIEW ───────────────────────────────────── */
    .price-preview{display:flex;align-items:center;justify-content:space-between;
      background:linear-gradient(135deg,rgba(3,255,137,.09) 0%,rgba(3,255,137,.04) 100%);

    .qty-val{font-size:20px;font-weight:900;min-width:28px;text-align:center;letter-spacing:-.5px;}
    /* ── SESSION PICKER ───────────────────────────────────── */
    .session-picker-wrap{margin-bottom:24px;}

    .sess-card{background:linear-gradient(145deg,#1a1a1a,#161616);border:1.5px solid rgba(255,255,255,.07);border-radius:14px;padding:18px 20px;cursor:pointer;transition:all .22s cubic-bezier(.2,.8,.2,1);box-shadow:0 2px 12px rgba(0,0,0,.25);}

    .sess-admin-table th,.sess-admin-table td{padding:12px 16px;text-align:left;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;}

    .sess-admin-table th.an-sort-th{cursor:pointer;user-select:none;transition:color .15s;white-space:nowrap;}
    .sess-admin-table th.an-sort-th:hover{color:rgba(255,255,255,.8);}
    .sess-admin-table th.an-sort-active{color:var(--green);}
    .sess-admin-table tbody tr:hover td{background:rgba(255,255,255,.018);}
    .badge-open{background:rgba(3,255,137,.12);color:var(--green);border:1px solid rgba(3,255,137,.3);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:900;box-shadow:0 0 10px rgba(3,255,137,.1);letter-spacing:.3px;}
