let _undoBarTimer=null;
function showUndoBar(label,fn){
  // Clear any existing undo bar
  const old=document.getElementById('undo-bar-el');if(old)old.remove();
  clearInterval(_undoBarTimer);
  const DURATION=5000;
  const bar=document.createElement('div');
  bar.id='undo-bar-el';bar.className='undo-bar';
  bar.innerHTML=`
    <div class="undo-bar-text">${esc(label)}</div>
    <button class="undo-bar-action" id="undo-bar-btn">${t('undoBtn')}</button>
    <div class="undo-bar-progress" id="undo-bar-prog" style="width:100%"></div>`;
  document.getElementById('toast-container').appendChild(bar);
  const prog=document.getElementById('undo-bar-prog');
  const btn=document.getElementById('undo-bar-btn');
  const start=Date.now();
  // Countdown progress bar
  _undoBarTimer=setInterval(()=>{
    const elapsed=Date.now()-start;
    const pct=Math.max(0,100-elapsed/DURATION*100);
    if(prog)prog.style.width=pct+'%';
    if(elapsed>=DURATION){clearInterval(_undoBarTimer);bar.remove();}
  },80);
  btn.onclick=async()=>{
    clearInterval(_undoBarTimer);bar.remove();
    try{await fn();toast(t('undoneMsg'));}catch(e){toast(t('undoFailed'),'error');}
    renderTopbarRight();renderStaffQueue();
  };
}

      </div>`:''}
    </div>
  </div>`;
}

function switchAuthMode(mode){S.authMode=mode;if(mode!=='forgot'){S.forgotStep=1;S.forgotEmail='';}renderAuthModal();}

async function doForgotStep1(){
  const email=(document.getElementById('a-forgot-email')?.value||'').trim().toLowerCase();
  if(!email||!/^\S+@\S+\.\S+$/.test(email)){authErr(t('errValidEmail'));return;}
  // Check account exists
  const{data:customer}=await sb.from('customers').select('id,name').eq('email',email).maybeSingle();
  if(!customer){authErr(t('errAccountNotFound'));return;}
  S.forgotEmail=email;S.forgotStep=2;
  renderAuthModal();
}

async function doResetPassword(){
  const code=(document.getElementById('a-reset-code')?.value||'').trim();
  const pwd=(document.getElementById('a-reset-pwd')?.value||'');
  const pwd2=(document.getElementById('a-reset-pwd2')?.value||'');
  if(!code||code.length!==6){authErr(t('errOTPInvalid'));return;}
  if(pwd.length<8||!/[A-Z]/.test(pwd)||!/[0-9]/.test(pwd)){authErr(t('errPasswordLen'));return;}
  if(pwd!==pwd2){authErr(t('errPasswordMatch'));return;}
  const expected=generateResetOTP(S.forgotEmail);
  if(code!==expected){authErr(t('errOTPInvalid'));return;}
  try{
    const{data:customer}=await sb.from('customers')
      .select('id,name,email,phone,height,type_preference,created_at')
      .eq('email',S.forgotEmail).maybeSingle();
    if(!customer){authErr(t('errAccountNotFound'));return;}
    const{error}=await sb.from('customers').update({password_hash:hashPwd(pwd)}).eq('id',customer.id);
    if(error)throw error;
    S.loggedIn=customer;setSession(customer);S.forgotStep=1;S.forgotEmail='';S.authMode='login';
    await loadData();
    closeAuthModal();prefillFromAccount();renderTopbarRight();renderRegister();renderMyRides();
    toast(t('toastPwReset'));
  }catch(e){authErr(t('errConnection'));}
}
function authErr(msg){const el=document.getElementById('auth-err');if(el)el.textContent=msg;}

async function doSignup(){
  const name=(document.getElementById('a-name')?.value||'').trim();
  const email=(document.getElementById('a-email')?.value||'').trim().toLowerCase();
  const cc=document.getElementById('a-cc')?.value||'+966';
  const phone=(document.getElementById('a-phone')?.value||'').trim();
  const pwd=(document.getElementById('a-pwd')?.value||'');
  const pwd2=(document.getElementById('a-pwd2')?.value||'');
  if(!name||name.trim().split(/\s+/).length<2){authErr(t('errEnterName'));return;}
  if(!email){authErr(t('errValidEmail'));return;}
  if(!/^\S+@\S+\.\S+$/.test(email)){authErr(t('errValidEmail'));return;}
  if(!phone){authErr(t('errEmailOrPhone').replace('email or ',''));return;}
  if(pwd.length<8||!/[A-Z]/.test(pwd)||!/[0-9]/.test(pwd)){authErr(t('errPasswordLen'));return;}
  if(pwd!==pwd2){authErr(t('errPasswordMatch'));return;}
  const heightRaw=parseInt(document.getElementById('a-height')?.value||'');
  if(isNaN(heightRaw)||heightRaw<100||heightRaw>250){authErr(t('errValidHeightCm'));return;}
  const fullPhone=phone?(cc+phone):'';
  try{
    if(email){const{data:ex}=await sb.from('customers').select('id').eq('email',email).maybeSingle();if(ex){authErr(t('errEmailExists'));return;}}
    if(fullPhone){const{data:ex}=await sb.from('customers').select('id').eq('phone',fullPhone).maybeSingle();if(ex){authErr(t('errPhoneExists'));return;}}
    const height=heightRaw;
    const type_preference=S.signupTypePref||'Any';
    const customer={id:uid(),name,email,phone:fullPhone,password_hash:hashPwd(pwd),created_at:new Date().toISOString(),height,type_preference};
    const{error}=await sb.from('customers').insert(customer);
    if(error)throw error;
    await loadData();
    const safeCustomer={id:customer.id,name,email,phone:fullPhone,height,type_preference,created_at:customer.created_at};
    S.loggedIn=safeCustomer;setSession(safeCustomer);
    closeAuthModal();prefillFromAccount();renderTopbarRight();renderRegister();renderMyRides();
    toast(`${name}! ${t('toastAccountCreated')}`);
  }catch(e){authErr(t('errConnection'));}
}

async function doLogin(){
  const rawInput=(document.getElementById('a-identifier')?.value||'').trim();
  const identifier=rawInput.toLowerCase();
  const pwd=(document.getElementById('a-pwd')?.value||'');
  if(!identifier){authErr(t('errEmailOrPhone'));return;}
  if(!pwd){authErr(t('authPassword'));return;}
  try{
    // Build filter candidates — handles: email, +966xxx, 05xxx, 5xxx
    const isEmail=identifier.includes('@');
    const filters=[];
    if(isEmail){
      filters.push(`email.eq.${identifier}`);
    }else{
      const digits=rawInput.replace(/\D/g,''); // strip everything except digits
      const bare=digits.replace(/^0+/,'');     // strip leading zeros (e.g. 0501 → 501)
      // Try all reasonable formats the number could be stored as
      const candidates=new Set([rawInput,digits,bare,`+966${bare}`,`00966${bare}`]);
      candidates.forEach(c=>{if(c&&c.length>=5)filters.push(`phone.eq.${c}`);});
    }
    const{data:customer}=await sb.from('customers')
      .select('id,name,email,phone,height,type_preference,created_at')
      .or(filters.join(','))
      .eq('password_hash',hashPwd(pwd))
      .maybeSingle();
    if(!customer){authErr(t('errInvalidCredentials'));return;}
    S.loggedIn=customer;setSession(customer);
    await loadData();
    closeAuthModal();prefillFromAccount();renderTopbarRight();renderRegister();renderMyRides();
    toast(`${t('toastWelcomeBack')}, ${customer.name}!`);
  }catch(e){authErr(t('errConnection'));}
}


function doLogout(){
  S.loggedIn=null;clearSession();
  S._rName='';S._rEmail='';S._rPhone='';S._rHeight='';
  S.regBikeSizes=[];S.regBikeHeights=[];S.regBikeTypes=[];S.regQty=1;S.regType=null;S.selSession=null;S.lastTicket=null;
  renderTopbarRight();
  goLanding();
  toast(t('toastLoggedOut'));
}

function prefillFromAccount(){
  if(!S.loggedIn)return;
  S._rName=S.loggedIn.name||'';
  S._rEmail=S.loggedIn.email||'';
  if(S.loggedIn.phone){
    const match=COUNTRY_CODES.find(([code])=>S.loggedIn.phone.startsWith(code));
    if(match){S._rCC=match[0];S._rPhone=S.loggedIn.phone.slice(match[0].length);}
    else S._rPhone=S.loggedIn.phone;
  }
  if(S.loggedIn.height){
    S._rHeight=String(S.loggedIn.height);
    const sz=heightToSize(S.loggedIn.height);
    if(S.regBikeSizes.length===0)S.regBikeSizes=[sz]; else S.regBikeSizes[0]=sz;
    if(S.regBikeHeights.length===0)S.regBikeHeights=[String(S.loggedIn.height)]; else S.regBikeHeights[0]=String(S.loggedIn.height);
  }
  // Pre-fill default bike type from saved preference (only if not already set by user)
  if(S.loggedIn.type_preference&&S.loggedIn.type_preference!=='Any'){
    if(S.regBikeTypes.length===0)S.regBikeTypes=[S.loggedIn.type_preference];
    else if(!S.regBikeTypes[0])S.regBikeTypes[0]=S.loggedIn.type_preference;
  }
}

}

function goStaff(){
  localStorage.setItem('cq_staff','1');
  showView('staff');

  // Auto-select the first open/full session so queues never overlap
  _autoSelectSession();
  renderStaffQueue();
  renderSessions();
  renderBikes();
  renderHistory();
}
function _autoSelectSession(){
  // Pick today's open session, or the first open session available
  const today=new Date().toLocaleDateString('en-CA',{timeZone:KSA_TZ});
  const open=allSessions().filter(s=>s.status==='open'||s.status==='full')
    .sort((a,b)=>new Date(a.session_date||a.id)-new Date(b.session_date||b.id));
  if(!open.length){S.sfSession='all';return;}
  // Prefer today's session, else earliest open
  const todaySess=open.find(s=>(s.session_date||s.id)===today);
  S.sfSession=(todaySess||open[0]).id;
}

function openPinModal(){
  S.pinDigits='';S.pinError=false;
  renderPinModal();
}

function renderPinModal(){
  const dots=Array(4).fill(0).map((_,i)=>{
    const cls=S.pinError?'pin-dot error':i<S.pinDigits.length?'pin-dot filled':'pin-dot';
    return`<div class="${cls}"></div>`;
  }).join('');

  const modal=document.getElementById('pin-modal');
  modal.style.display='flex';
  modal.innerHTML=`<div class="pin-backdrop" onclick="if(event.target===this)closePinModal()">
    <div class="pin-box" id="pin-box">
      <img class="pin-logo" src="logo.png" alt="">
      <div class="pin-title">${t('pinTitle')}</div>
      <div class="pin-sub">${t('pinSub')}</div>
      <div class="pin-dots">${dots}</div>
      <div class="pin-error" id="pin-err">${S.pinError?t('errPinWrong'):''}</div>
      <div class="pin-numpad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="pinPress('${n}')">${n}</button>`).join('')}
        <button class="pin-key empty"></button>
        <button class="pin-key" onclick="pinPress('0')">0</button>
        <button class="pin-key del" onclick="pinDel()">&#x232B;</button>
      </div>
      <button class="pin-cancel" onclick="closePinModal()">${t('cancelBtn')}</button>
    </div>
  </div>`;
}

function pinPress(d){
  if(S.pinDigits.length>=4)return;
  S.pinDigits+=d;
  S.pinError=false;
  if(S.pinDigits.length===4){
    if(S.pinDigits===STAFF_PIN){
      closePinModal();
      goStaff();
      toast(t('toastStaffPanel'));
    } else {
      S.pinError=true;
      renderPinModal();
      const box=document.getElementById('pin-box');
      if(box){box.classList.add('shake');setTimeout(()=>{box.classList.remove('shake');S.pinDigits='';renderPinModal();},400);}
    }
  } else {
    renderPinModal();
  }
}

function pinDel(){
  if(S.pinDigits.length===0)return;
  S.pinDigits=S.pinDigits.slice(0,-1);
  S.pinError=false;
  renderPinModal();
}

function closePinModal(){
  document.getElementById('pin-modal').style.display='none';
  S.pinDigits='';S.pinError=false;
}

// Also handle keyboard input when pin modal is open
document.addEventListener('keydown',e=>{
  if(document.getElementById('pin-modal').style.display==='flex'){
    if(e.key>='0'&&e.key<='9')pinPress(e.key);
    else if(e.key==='Backspace')pinDel();
    else if(e.key==='Escape')closePinModal();
  }
});

function renderRegister(){
  const cust=S.loggedIn||getSession();
  const available=openSessions();
  ensureBikeSizes();

  // Session cards
  const sessCards=available.length
    ? available.map(s=>{
        const manuallyFull=s.status==='full';
        const full=manuallyFull||spotsLeft(s.id)===0;
        const sl=full?t('statusFull'):t('availLabel');
        const sc=full?'spots-orange':'spots-green';
        const sel=S.selSession===s.id;
        return`<div class="sess-card${sel?' sess-selected':''}${full?' sess-full':''}"
          ${full?'':` onclick="S.selSession='${s.id}';renderRegister()"`}>
          <div class="sess-card-day">${dayLabel(s.day)}</div>
          <div class="sess-card-date">${shortDate(s.session_date||s.id)}</div>
          <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:3px">${sessionTime(s)}</div>
          <div class="sess-card-spots ${sc}">${sl}</div>
        </div>`;
      }).join('')
    : emptyIllustration(ILLUS_CALENDAR,t('noSessions'),'');
  if(S.selSession&&!available.find(s=>s.id===S.selSession))S.selSession=null;

  // ── Modify mode: detect ALL existing waiting bookings for this customer/session ──
  let existingEntries=[];
  if(S.selSession&&cust&&cust.id){
    existingEntries=getQueue().filter(e=>
      e.customerId===cust.id&&
      e.sessionId===S.selSession&&
      e.status==='waiting'
    );
    if(existingEntries.length>0){
      const firstId=existingEntries[0].id;
      if(S.modifyEntryId!==firstId){
        // First time selecting this session — pre-fill qty, sizes, types from existing
        S.modifyEntryId=firstId;
        S.regQty=existingEntries.length;
        S.regBikeSizes=existingEntries.map(e=>e.size);
        S.regBikeTypes=existingEntries.map(e=>e.typePreference);

    }else{

    }

function onBikeHeightInput(idx,value){
  S.regBikeHeights[idx]=value;
  const h=parseInt(value);
  if(!isNaN(h)&&h>=100&&h<=250){
    const sz=heightToSize(h);
    S.regBikeSizes[idx]=sz;
    const badge=document.getElementById(`bike-size-badge-${idx}`);
    if(badge)badge.innerHTML=`<div class="size-chip">${sz}<span class="size-chip-label">${sizeLabel(sz)}</span></div>`;
    document.querySelectorAll(`[data-slot="${idx}"]`).forEach(btn=>{
      btn.classList.toggle('active',btn.dataset.size===sz);
    });
  }else{
    const badge=document.getElementById(`bike-size-badge-${idx}`);
    if(badge)badge.innerHTML='';
  }
}

function setBikeType(idx,type){

  document.querySelectorAll(`[data-type-slot="${idx}"]`).forEach(btn=>{
    btn.classList.toggle('active',btn.dataset.type===type);
  });
  // update price preview if visible
  const pp=document.getElementById('price-preview-wrap');

    if(allSet){
      const tMin=S.regBikeTypes.slice(0,S.regQty).reduce((s,ty)=>s+priceForType(ty||'Any'),0);
      const tMax=S.regBikeTypes.slice(0,S.regQty).reduce((s,ty)=>s+priceForTypeMax(ty||'Any'),0);
      const hAny=S.regBikeTypes.slice(0,S.regQty).some(ty=>ty==='Any');
      const tDisplay=hAny?`SAR ${tMin}/${tMax}`:`SAR ${tMin.toFixed(2).replace(/\.00$/,'')}`;
      const breakdown=S.regQty>1
        ?S.regBikeTypes.slice(0,S.regQty).map((ty,i)=>`${t('bike')} ${i+1}: ${priceDisplay(ty)}`).join(' &nbsp;&middot;&nbsp; ')
        :t('pricePerBike');

        <div class="price-preview-breakdown">${breakdown}</div>

function ensureBikeSizes(){
  const h=parseInt(S._rHeight);
  const defaultSz=(!isNaN(h)&&h>=100&&h<=250)?heightToSize(h):'M';
  while(S.regBikeSizes.length<S.regQty)  S.regBikeSizes.push(S.regBikeSizes.length===0?defaultSz:'M');
  while(S.regBikeSizes.length>S.regQty)  S.regBikeSizes.pop();
  while(S.regBikeHeights.length<S.regQty) S.regBikeHeights.push('');
  while(S.regBikeHeights.length>S.regQty) S.regBikeHeights.pop();
  while(S.regBikeTypes.length<S.regQty)  S.regBikeTypes.push('');
  while(S.regBikeTypes.length>S.regQty)  S.regBikeTypes.pop();
}

function setBikeSize(idx,size){
  S.regBikeSizes[idx]=size;
  // targeted update - no full re-render needed
  document.querySelectorAll(`[data-slot="${idx}"]`).forEach(btn=>{
    btn.classList.toggle('active',btn.dataset.size===size);
  });
  // update size description label next to the toggles
  const row=document.querySelector(`[data-slot="${idx}"]`)?.closest('.form-group');
  if(row){const desc=row.querySelector('.size-desc');if(desc)desc.textContent=sizeLabel(size);}
}

function changeRegQty(delta){
  S.regQty=Math.max(1,Math.min(6,S.regQty+delta));
  ensureBikeSizes();
  renderRegister();
}

function set(k,v){S[k]=v;if(S.view==='customer'){renderRegister();renderMyRides();}else if(S.view==='staff'){renderStaffQueue();renderBikes();renderHistory();}}

async function submitReg(){
  const cust=S.loggedIn||getSession();
  if(!cust){toast(t('errLoginFirst'),'error');return;}
  if(!S.selSession){toast(t('errSelectSession'),'error');return;}
  if(!openSessions().find(s=>s.id===S.selSession)){toast(t('errSessionClosed'),'error');return;}

  const qty=S.regQty||1;
  ensureBikeSizes();

  // Resolve per-bike heights
  const heights=[];
  for(let i=0;i<qty;i++){
    if(i===0&&cust.height){
      heights.push(cust.height);
    }else{
      const h=parseInt(S.regBikeHeights[i]);
      if(isNaN(h)||h<100||h>250){
        toast(qty>1?`${t('errValidHeightCm')} (${t('bike')} ${i+1})`:t('errValidHeightCm'),'error');return;
      }
      heights.push(h);
    }
  }

  // Validate sizes and types per bike
  for(let i=0;i<qty;i++){
    if(!S.regBikeSizes[i]){toast(qty>1?`${t('errSelectSizeGeneric')} (${t('bike')} ${i+1})`:t('errSelectSizeGeneric'),'error');return;}
    if(!S.regBikeTypes[i]){toast(qty>1?`${t('errSelectTypeGeneric')} (${t('bike')} ${i+1})`:t('errSelectTypeGeneric'),'error');return;}
  }

  if(spotsLeft(S.selSession)<qty){toast(`${t('errNotEnoughSpots')} (${spotsLeft(S.selSession)})`,'error');return;}

  const name=cust.name,email=cust.email||'',phone=cust.phone||'';
  const queue=getQueue();
  // If logged-in customer already has a waiting booking, redirect to modify mode
  if(cust.id&&queue.some(e=>e.customerId===cust.id&&e.sessionId===S.selSession&&e.status==='waiting'))
    {S.modifyEntryId=null;renderRegister();return;}
  if(phone&&queue.find(e=>e.phone===phone&&e.sessionId===S.selSession&&e.status!=='noshow'&&e.status!=='cancelled'))
    {toast(t('errPhoneInSession'),'error');return;}

  const sess=allSessions().find(s=>s.id===S.selSession)||{day:'',session_date:S.selSession};
  const baseQNum=nextQNum(S.selSession);
  const entries=Array.from({length:qty},(_,i)=>({
    id:uid(),name,email,phone,
    size:S.regBikeSizes[i]||heightToSize(heights[i]),
    typePreference:S.regBikeTypes[i],paid:false,
    assignedBikeId:null,sessionId:S.selSession,sessionDay:sess.day,sessionDate:sess.session_date||S.selSession,
    queueNum:baseQNum+i,status:'waiting',registeredAt:new Date().toISOString(),walkIn:false,
    customerId:cust.id,price:priceForType(S.regBikeTypes[i])
  }));
  await Promise.all(entries.map(e=>sb.from('queue_entries').insert(entryToDB(e))));

  // Save bike 0 height to account if not already stored
  if(!cust.height&&heights[0]){
    try{
      await sb.from('customers').update({height:heights[0]}).eq('id',cust.id);
      S.loggedIn.height=heights[0];setSession(S.loggedIn);
    }catch(e){/* non-fatal */}
  }

  await loadData();
  S.lastTicket=entries[0];S._rHeight='';S._rDate='';S.selSession=null;S.regType=null;
  S.regQty=1;S.regBikeSizes=[];S.regBikeHeights=[];S.regBikeTypes=[];
  toast(qty>1?`${t('toastRegisteredRange')} #${baseQNum}-#${baseQNum+qty-1}`:`${t('toastRegistered')} #${baseQNum}`);
  renderRegister();
  showBoothPopup();
}

async function submitModifyBooking(){
  const cust=S.loggedIn||getSession();
  if(!cust){toast(t('errLoginFirst'),'error');return;}
  if(!S.selSession){toast(t('errSelectSession'),'error');return;}

  const existing=getQueue().filter(e=>
    e.customerId===cust.id&&e.sessionId===S.selSession&&e.status==='waiting'
  );
  const newQty=S.regQty||1;
  ensureBikeSizes();

  // Validate all new bike slots
  for(let i=0;i<newQty;i++){
    if(!S.regBikeSizes[i]){toast(newQty>1?`${t('errSelectSizeGeneric')} (${t('bike')} ${i+1})`:t('errSelectSizeGeneric'),'error');return;}
    if(!S.regBikeTypes[i]){toast(newQty>1?`${t('errSelectTypeGeneric')} (${t('bike')} ${i+1})`:t('errSelectTypeGeneric'),'error');return;}
  }

  const sess=allSessions().find(s=>s.id===S.selSession)||{day:'',session_date:S.selSession};

  // For each slot: if size OR type changed vs original, OR brand new slot → add as a NEW independent booking
  // Original unchanged bookings are left completely untouched
  const newEntries=[];
  let baseQNum=nextQNum(S.selSession);
  for(let i=0;i<newQty;i++){
    const orig=existing[i]||null;
    const newSize=S.regBikeSizes[i];
    const newType=S.regBikeTypes[i];
    const isNew=!orig;
    const isChanged=orig&&(orig.size!==newSize||orig.typePreference!==newType);
    if(isNew||isChanged){
      // Check there is a spot available (existing unchanged bookings already occupy their spots)
      const spotsNeeded=newEntries.length+1;
      if(spotsLeft(S.selSession)<spotsNeeded){
        toast(`${t('errNotEnoughSpots')} (${spotsLeft(S.selSession)})`,'error');return;
      }
      newEntries.push({
        id:uid(),name:cust.name,email:cust.email||'',phone:cust.phone||'',
        size:newSize,typePreference:newType,
        paid:false,assignedBikeId:null,
        sessionId:S.selSession,sessionDay:sess.day,sessionDate:sess.session_date||S.selSession,
        queueNum:baseQNum+newEntries.length,status:'waiting',
        registeredAt:new Date().toISOString(),walkIn:false,
        customerId:cust.id,price:priceForType(newType)
      });
    }
    // Unchanged original entry → do nothing, it stays as-is in the queue
  }

  if(newEntries.length===0){
    toast(t('toastBookingUpdated'));
  }else{
    await Promise.all(newEntries.map(e=>sb.from('queue_entries').insert(entryToDB(e))));
    await loadData();
    const nums=newEntries.map(e=>`#${e.queueNum}`).join(', ');
    toast(`${t('toastRegistered')} ${nums}`);
  }

  S.modifyEntryId=null;S.selSession=null;
  S.regBikeSizes=[];S.regBikeTypes=[];S.regQty=1;
  renderRegister();renderMyRides();
}

function renderMyRides(){
  const cust=S.loggedIn;
  if(!cust){document.getElementById('tab-myrides').innerHTML='';return;}
  const allEntries=getQueue().filter(e=>e.customerId===cust.id);
  const visible=allEntries.filter(e=>e.status==='waiting'||e.status==='active'||e.status==='done');
  const completed=visible.filter(e=>e.status==='done');
  const totalPaid=visible.filter(e=>e.paid).reduce((sum,e)=>sum+(e.price||DEFAULT_PRICE),0);
  const pending=visible.filter(e=>!e.paid&&e.status!=='cancelled').reduce((sum,e)=>sum+(e.price||DEFAULT_PRICE),0);
  // Assign personal order numbers chronologically
  const chronological=[...visible].sort((a,b)=>new Date(a.registeredAt)-new Date(b.registeredAt));
  const withIndex=chronological.map((e,i)=>({...e,orderNum:i+1}));
  // Apply filters + sort
  let displayOrder=[...withIndex];
  if(S.myStatus!=='all') displayOrder=displayOrder.filter(e=>e.status===S.myStatus);
  const _myd=S.mySortDir;
  const _mySizeOrd={XS:0,S:1,M:2,L:3};
  displayOrder.sort((a,b)=>{
    if(S.mySort==='size')    return _myd*((_mySizeOrd[a.size]??9)-(_mySizeOrd[b.size]??9));
    if(S.mySort==='type')    return _myd*(a.typePreference||'').localeCompare(b.typePreference||'');
    if(S.mySort==='payment') return _myd*(Number(a.paid)-Number(b.paid));
    if(S.mySort==='status')  return _myd*(a.status||'').localeCompare(b.status||'');
    return _myd*(new Date(a.registeredAt)-new Date(b.registeredAt));

    `<option value="${v}"${S.mySort===v?' selected':''}>${l}</option>`).join('');

    return`<tr>
      <td>
        <span class="queue-num-cell">#${e.queueNum}</span>
        <div style="font-size:10px;color:var(--muted);margin-top:3px;font-weight:600">${t('rideHistory').split(' ')[0]} ${e.orderNum}</div>
      </td>
      <td>
        <div style="font-weight:800;font-size:13px">${dayLabel(e.sessionDay)||''}</div>
        <div style="color:var(--muted);font-size:12px;margin-top:1px">${shortDate(e.sessionDate)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${sessionTime(allSessions().find(s=>s.id===e.sessionId))}</div>

    </tr>`;

function refreshAccSizeBadge(){

  const wrap=document.getElementById('acc-size-wrap');
  if(!wrap)return;
  if(!isNaN(h)&&h>=100&&h<=250){

    wrap.innerHTML=`<div class="size-chip">${sz}<span class="size-chip-label">${sizeLabel(sz)}</span></div>`;

async function saveAccount(){
  const cust=S.loggedIn||getSession();
  if(!cust)return;
  const name=(document.getElementById('acc-name')?.value||'').trim();
  const email=(document.getElementById('acc-email')?.value||'').trim().toLowerCase();
  const cc=document.getElementById('acc-cc')?.value||'+966';
  const phone=(document.getElementById('acc-phone')?.value||'').trim();
  const heightRaw=parseInt(document.getElementById('acc-height')?.value||'');
  const errEl=document.getElementById('acc-err');
  const setErr=msg=>{if(errEl)errEl.textContent=msg;};
  if(!name){setErr(t('errAccountName'));return;}
  if(email&&!/^\S+@\S+\.\S+$/.test(email)){setErr(t('errValidEmail'));return;}
  setErr('');
  const fullPhone=phone?(cc+phone):'';
  const height=(!isNaN(heightRaw)&&heightRaw>=100&&heightRaw<=250)?heightRaw:null;
  try{
    const type_preference=S.loggedIn.type_preference||'Any';
    const updates={name,height,type_preference};
    if(email!==undefined)updates.email=email;
    if(fullPhone!==undefined)updates.phone=fullPhone;
    const{error}=await sb.from('customers').update(updates).eq('id',cust.id);
    if(error)throw error;
    S.loggedIn={...cust,name,email,phone:fullPhone,height,type_preference};
    setSession(S.loggedIn);
    // Sync registration form defaults
    if(height){S._rHeight=String(height);S.regBikeSizes[0]=heightToSize(height);}
    if(type_preference&&S.regBikeTypes.length===0)S.regBikeTypes=[type_preference];
    toast(t('accountSaved'));
    renderAccount();
    renderTopbarRight();
  }catch(e){setErr(t('errSaveAccount'));}
}

function parseSlots(raw){
  if(!raw)return null;
  if(typeof raw==='string'){try{return JSON.parse(raw);}catch{return null;}}
  return raw;
}
function slotsFormat(s){
  // Returns 'ids' | 'counts' | 'legacy' | null
  if(!s)return null;
  if(s._bikes)return 'ids';
  if(typeof s.Road==='number'||typeof s.Hybrid==='number'||typeof s.Mountain==='number')return 'counts';
  return 'legacy';
}
function slotsLabel(raw){
  const s=parseSlots(raw);if(!s)return'—';
  const fmt=slotsFormat(s);
  const abbr={Road:'Road',Hybrid:'Hybrid',Mountain:'Mtn'};
  if(fmt==='ids'){
    // Count IDs by type from fleet
    const counts={};
    (s._bikes||[]).forEach(id=>{const b=bikeById(id);if(b)counts[b.type]=(counts[b.type]||0)+1;});
    return Object.entries(counts).filter(([,v])=>v>0).map(([ty,v])=>`${abbr[ty]||ty}×${v}`).join(', ')||'—';
  }
  if(fmt==='counts'){
    return Object.entries(s).filter(([k,v])=>v>0&&k!=='_bikes').map(([ty,v])=>`${abbr[ty]||ty}×${v}`).join(', ')||'—';
  }
  // Legacy type+size format
  const parts=[];
  for(const[ty,szs]of Object.entries(s)){
    if(ty==='_bikes')continue;
    const sum=typeof szs==='number'?szs:Object.values(szs||{}).reduce((a,b)=>a+(b||0),0);
    if(sum>0)parts.push(`${abbr[ty]||ty}×${sum}`);
  }
  return parts.join(', ')||'—';
}


function startEditSession(id){
  const sess=allSessions().find(s=>s.id===id);if(!sess)return;
  S.editSessionId=id;
  S.editSessDate=sess.session_date||sess.id;
  S.editSessStatus=sess.status||'closed';
  S.showAddSession=false;
  // Load existing assigned bikes from bike_slots
  const slots=parseSlots(sess.bike_slots);
  const fmt=slotsFormat(slots);
  if(fmt==='ids'&&slots._bikes){
    S.editSessAssignedIds=[...slots._bikes];
  } else {
    // Old format or counts-only — no specific bikes stored, start fresh
    S.editSessAssignedIds=[];
  }
  renderSessions();
  setTimeout(()=>document.getElementById('sess-edit-form')?.scrollIntoView({behavior:'smooth',block:'start'}),80);
}
function toggleAssignBike(bikeId){
  const idx=S.editSessAssignedIds.indexOf(bikeId);
  if(idx>=0) S.editSessAssignedIds.splice(idx,1);
  else S.editSessAssignedIds.push(bikeId);
  renderSessions();
  setTimeout(()=>document.getElementById('sess-edit-form')?.scrollIntoView({behavior:'smooth',block:'nearest'}),40);
}
function toggleNewSessBike(bikeId){
  const idx=S.newSessAssignedIds.indexOf(bikeId);
  if(idx>=0) S.newSessAssignedIds.splice(idx,1);
  else S.newSessAssignedIds.push(bikeId);
  renderSessions();
  setTimeout(()=>document.getElementById('sess-add-form')?.scrollIntoView({behavior:'smooth',block:'nearest'}),40);
}

            <span style="color:var(--muted);font-weight:700">-</span>
            <input type="time" id="ns-end" value="11:00" style="background:#1a1a1a;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;padding:6px 10px;cursor:pointer">
          </div>
        </div>
      </div>
      <label style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;display:block">
        ${t('bikeFleetComp')} &nbsp;&middot;&nbsp; <span style="color:var(--green)">${nsTotal} ${t('bike').toLowerCase()}${nsTotal!==1?'s':''} ${t('assignBikeTitle').toLowerCase()}</span>
      </label>
      ${newBikePicker()}
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn-primary" onclick="addSession()">${t('createSession')}</button>
        <button class="btn-secondary" onclick="S.showAddSession=false;S.newSessAssignedIds=[];renderSessions()">${t('cancelBtn')}</button>
      </div>
    </div>`:'';

  // ── Edit form with exact bike picker ─────────────────
  const editSess=S.editSessionId?allSessions().find(s=>s.id===S.editSessionId):null;
  const esAssigned=S.editSessAssignedIds;
  const esTotal=esAssigned.length;

  function bikePicker(){
    const currentSessId=editSess?editSess.id:null;
    const queue=getQueue();
    // A bike is "busy" if it has an active/waiting booking in a DIFFERENT session
    const busyIds=new Set(
      queue.filter(e=>e.sessionId!==currentSessId&&(e.status==='active'||e.status==='waiting')&&e.assignedBikeId)
        .map(e=>e.assignedBikeId)
    );
    return types.map(ty=>{

              ${sel?`<div class="bike-assign-check">✓ ${t('assignBikeTitle')}</div>`:''}
              ${busy?`<div style="font-size:10px;color:var(--muted);margin-top:4px">${t('inUseLabel')}</div>`:''}
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('');
  }

  const editForm=editSess?`
    <div class="inline-form" style="margin-bottom:24px;border-color:rgba(3,255,137,.25)" id="sess-edit-form">
      <div class="form-title" style="color:var(--green)">${t('editSessionTitle')}: ${shortDate(editSess.session_date||editSess.id)}</div>
      <div class="form-row" style="margin-bottom:20px">
        <div class="form-group">
          <label>${t('dateLabel')}</label>
          <input type="date" id="es-date" value="${esc(S.editSessDate)}"
            oninput="S.editSessDate=this.value" style="max-width:240px">
          <div style="font-size:11px;color:var(--muted-l);margin-top:5px;font-weight:600">${t('dateWarning')}</div>
        </div>
        <div class="form-group">
          <label>${t('colStatus')}</label>
          <div class="toggle-group" style="margin-top:4px">
            ${['closed','open','full'].map(st=>`<button class="toggle-btn${S.editSessStatus===st?' active':''}"

async function saveSessionEdit(){
  const oldId=S.editSessionId;
  const sess=allSessions().find(s=>s.id===oldId);if(!sess)return;
  const newDate=S.editSessDate||oldId;
  const assignedIds=S.editSessAssignedIds;
  if(assignedIds.length===0){toast(t('errAddBikeToSession'),'error');return;}
  // Build slots object with IDs and a type summary
  const allBk=getBikes();
  const typeCounts={};
  assignedIds.forEach(id=>{const b=allBk.find(x=>x.id===id);if(b)typeCounts[b.type]=(typeCounts[b.type]||0)+1;});
  const esStart=document.getElementById('es-start')?.value||'09:00';
  const esEnd=document.getElementById('es-end')?.value||'11:00';
  const slots={_bikes:assignedIds,...typeCounts,_time:`${esStart} - ${esEnd}`};
  const total=assignedIds.length;
  const newStatus=S.editSessStatus||sess.status;
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const newDay=dayNames[new Date(newDate+'T00:00:00').getDay()];

  // Save previous state for undo
  const prevSlots=sess.bike_slots;const prevCap=sess.capacity;
  const prevStatus=sess.status;const prevDate=sess.session_date||sess.id;const prevDay=sess.day;

  try{
    if(newDate!==oldId){
      // Date changed — need to migrate: insert new session, update entries, delete old
      const existing=allSessions().find(s=>s.id===newDate&&s.id!==oldId);
      if(existing){toast(t('errDateExists'),'error');return;}
      await sb.from('sessions').insert({
        id:newDate,day:newDay,session_date:newDate,capacity:total,
        status:newStatus,created_at:sess.created_at||new Date().toISOString(),
        bike_slots:JSON.stringify(slots)
      });
      // Move queue entries to new session
      await sb.from('queue_entries').update({
        session_id:newDate,session_date:newDate,session_day:newDay
      }).eq('session_id',oldId);
      await sb.from('sessions').delete().eq('id',oldId);
    } else {
      await sb.from('sessions').update({
        day:newDay,session_date:newDate,capacity:total,
        status:newStatus,bike_slots:JSON.stringify(slots)
      }).eq('id',oldId);
    }
    await loadData();
    const displayDate=shortDate(newDate);
    toast(`Session ${displayDate} updated.`);
    pushUndo(`Edit session ${displayDate}`,async()=>{
      const currentId=newDate!==oldId?newDate:oldId;
      if(newDate!==oldId){
        // Undo migration: re-create old session, move entries back, delete new
        await sb.from('sessions').insert({
          id:oldId,day:prevDay,session_date:prevDate,capacity:prevCap,
          status:prevStatus,created_at:sess.created_at||new Date().toISOString(),
          bike_slots:prevSlots||null
        });
        await sb.from('queue_entries').update({
          session_id:oldId,session_date:prevDate,session_day:prevDay
        }).eq('session_id',currentId);
        await sb.from('sessions').delete().eq('id',currentId);
      } else {
        await sb.from('sessions').update({
          day:prevDay,session_date:prevDate,capacity:prevCap,
          status:prevStatus,bike_slots:prevSlots||null
        }).eq('id',oldId);
      }
      await loadData();renderSessions();renderStaffQueue();
    });
    S.editSessionId=null;
    renderSessions();renderStaffQueue();
  }catch(e){toast(t('errServerError'),'error');console.error(e);}
}

async function addSession(){
  const date=document.getElementById('ns-date')?.value;
  if(!date){toast(t('errPickDate'),'error');return;}
  const assignedIds=S.newSessAssignedIds;
  if(assignedIds.length===0){toast(t('errAddBikeToSession'),'error');return;}
  // Build slots with exact bike IDs and type counts
  const allBk=getBikes();
  const typeCounts={};
  assignedIds.forEach(id=>{const b=allBk.find(x=>x.id===id);if(b)typeCounts[b.type]=(typeCounts[b.type]||0)+1;});
  const startEl=document.getElementById('ns-start');const endEl=document.getElementById('ns-end');
  const startT=startEl?startEl.value:'09:00';const endT=endEl?endEl.value:'11:00';
  const timeVal=startT&&endT?`${startT} - ${endT}`:(S.newSessTime||'09:00 - 11:00');
  const slots={_bikes:assignedIds,...typeCounts,_time:timeVal};
  const total=assignedIds.length;
  const d=new Date(date+'T00:00:00');
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const session={id:date,day:dayNames[d.getDay()],session_date:date,capacity:total,
    bike_slots:JSON.stringify(slots),created_at:new Date().toISOString()};
  try{
    const{error}=await sb.from('sessions').insert(session);
    if(error){
      if(error.code==='23505'){toast(t('errDateExists'),'error');return;}
      throw error;
    }
    await loadData();
    S.showAddSession=false;S.newSessDate='';S.newSessAssignedIds=[];S.newSessTime='09:00 - 11:00';
    toast(`${shortDate(date)} - ${t('toastSessionReady')}`);
    renderSessions();
  }catch(e){toast(t('errCreateSession'),'error');}
}

async function toggleSession(id,newStatus){
  try{
    const prev=allSessions().find(s=>s.id===id);
    const prevStatus=prev?prev.status:'closed';
    await sb.from('sessions').update({status:newStatus}).eq('id',id);
    await loadData();
    const lbl={open:t('sessOpened'),closed:t('sessClosed'),full:t('statusFull')+'.'}[newStatus]||newStatus;
    toast(lbl);
    pushUndo(`Session ${shortDate(prev?.session_date||id)} → ${newStatus}`,async()=>{
      await sb.from('sessions').update({status:prevStatus}).eq('id',id);
      await loadData();renderSessions();renderStaffQueue();
    });
    renderSessions();renderStaffQueue();
  }catch(e){toast(t('errServerError'),'error');}
}

async function deleteSession(id){
  try{
    const bookings=getQueue().filter(e=>e.sessionId===id&&e.status!=='removed'&&e.status!=='cancelled'&&e.status!=='noshow').length;
    if(bookings>0){toast(t('errHasBookings'),'error');return;}
    // Soft-delete: mark as 'deleted' so it can be restored with all its data
    await sb.from('sessions').update({status:'deleted'}).eq('id',id);
    await loadData();
    toast(t('sessDeleted'));
    renderSessions();
  }catch(e){toast(t('errDeleteSession'),'error');}
}

async function restoreSession(id){
  try{
    await sb.from('sessions').update({status:'closed'}).eq('id',id);
    await loadData();
    toast(t('sessOpened'));
    renderSessions();
  }catch(e){toast(t('errConnection'),'error');}
}

function renderStaffQueue(){
  const queue=getQueue();const sessions=allSessions();
  const base=S.sfSession!=='all'
    ?queue.filter(e=>e.sessionId===S.sfSession&&e.status!=='removed')
    :queue.filter(e=>e.status!=='removed');
  const total=base.length,nWait=base.filter(e=>e.status==='waiting').length,
        nBike=base.filter(e=>e.status==='active').length,nDone=base.filter(e=>e.status==='done').length;
  let filtered=[...base];
  if(S.sfStatus!=='all')filtered=filtered.filter(e=>e.status===S.sfStatus);
  if(S.sfSize!=='all')  filtered=filtered.filter(e=>e.size===S.sfSize);
  if(S.sfPay==='paid')  filtered=filtered.filter(e=>e.paid);
  if(S.sfPay==='pending')filtered=filtered.filter(e=>!e.paid);
  if(S.sfSearch.trim()){const q=S.sfSearch.trim().toLowerCase();filtered=filtered.filter(e=>e.name.toLowerCase().includes(q)||e.phone.includes(q));}
  const sizeOrder={XS:0,S:1,M:2,L:3};
  const _sfd=S.sfSortDir;
  filtered.sort((a,b)=>{
    if(S.sfSort==='name')   return _sfd*a.name.localeCompare(b.name);
    if(S.sfSort==='size')   return _sfd*((sizeOrder[a.size]??9)-(sizeOrder[b.size]??9));
    if(S.sfSort==='type')   return _sfd*a.typePreference.localeCompare(b.typePreference);
    if(S.sfSort==='paid')   return _sfd*(Number(a.paid)-Number(b.paid));
    if(S.sfSort==='status') return _sfd*(a.status||'').localeCompare(b.status||'');
    return _sfd*(a.sessionId.localeCompare(b.sessionId)||a.queueNum-b.queueNum);
  });
  function thQSort(col,label,cls=''){
    const active=S.sfSort===col;
    const arrow=active?(S.sfSortDir===1?'↑':'↓'):'';
    return`<th class="an-sort-th${active?' an-sort-active':''}${cls?' '+cls:''}" onclick="setSfSort('${col}')">${label}${active?' '+arrow:''}</th>`;
  }
  const waitingBase=base.filter(e=>e.status==='waiting').sort((a,b)=>a.queueNum-b.queueNum);
  const nextRider=waitingBase[0];
  const totalWaiting=waitingBase.length;
  const nextUp=nextRider?`<div class="next-up-banner">
    <div>
      <div class="next-up-label">${t('nextUpLabel')} &nbsp;<span style="font-size:12px;color:var(--muted);font-weight:600">${totalWaiting} ${t('inLine')}</span></div>
      <div class="next-up-name">#${nextRider.queueNum} - ${esc(nextRider.name)}</div>
      <div class="next-up-details">${nextRider.size} &middot; ${typeLabel(nextRider.typePreference)} &middot; ${nextRider.paid?'✓ '+t('paidLabel'):'⏳ '+t('pendingLabel')}</div>
    </div>
    <button class="btn-primary" onclick="openModal('${nextRider.id}')">${t('assignBikeCheckin')}</button>
  </div>`:'';
  const qSessOpts=`<option value="all"${S.sfSession==='all'?' selected':''}>${t('allSessions')}</option>`+
    sessions.filter(s=>s.status!=='deleted').map(s=>`<option value="${s.id}"${S.sfSession===s.id?' selected':''}>${dayLabel(s.day)} ${shortDate(s.session_date||s.id)}</option>`).join('');
  const qStatusOpts=['all','waiting','active','done','noshow','cancelled'].map(s=>{
    const l={all:t('filterAll'),waiting:t('filterWaiting'),active:t('filterOnBike'),done:t('filterDone'),noshow:t('filterNoshow'),cancelled:t('statusCancelled')}[s];
    return`<option value="${s}"${S.sfStatus===s?' selected':''}>${l}</option>`;}).join('');
  const qSizeOpts=['all','XS','S','M','L'].map(sz=>
    `<option value="${sz}"${S.sfSize===sz?' selected':''}>${sz==='all'?t('filterAll'):sz}</option>`).join('');

  // ── Compute live queue positions (per session, waiting riders only, by queueNum order) ──

    const openSess=allSessions().filter(s=>s.status==='open'||s.status==='full').sort((a,b)=>new Date(a.session_date||a.id)-new Date(b.session_date||b.id));

    rows=orderedSessions.map(sess=>{

      if(!sessFiltered.length)return'';

      const nA=sessFiltered.filter(e=>e.status==='active').length;
      const nD=sessFiltered.filter(e=>e.status==='done').length;

        ${nD?` &middot; <span style="color:var(--muted)">${nD} ${t('doneStat').toLowerCase()}</span>`:''}

      </td></tr>`;
      return hdr+sessFiltered.map(e=>renderQRow(e)).join('');
    }).join('');
    if(!filtered.length)emptyRow=`<tr><td colspan="13"><div style="padding:8px">${emptyIllustration(ILLUS_PEOPLE,t('noHistory'))}</div></td></tr>`;
  }else{
    rows=filtered.map(e=>renderQRow(e)).join('');
    emptyRow=filtered.length===0?`<tr><td colspan="13"><div style="padding:8px">${emptyIllustration(ILLUS_PEOPLE,t('noHistory'))}</div></td></tr>`:'';
  }
  document.getElementById('tab-queue').innerHTML=_queueHeader+_sessSummaryBar+`
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">${t('totalStat')}</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--green)">${nWait}</div><div class="stat-label">${t('waitingStat')}</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#a0f0c0">${nBike}</div><div class="stat-label">${t('onBikeStat')}</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--muted)">${nDone}</div><div class="stat-label">${t('doneStat')}</div></div>
    </div>
    ${nextUp}
    <div class="filter-bar">
      <div class="filter-row">
        <span class="filter-label">${t('colSession')}:</span>
        <select class="filter-select" style="min-width:160px" onchange="setSfSession(this.value)">${qSessOpts}</select>
        <span class="filter-label" style="margin-left:8px">${t('filterStatus')}:</span>
        <select class="filter-select" onchange="setSfStatus(this.value)">${qStatusOpts}</select>
        <span class="filter-label" style="margin-left:8px">${t('filterSize')}:</span>

      </div>
      ${filtered.length!==base.length?`<div class="result-count">${filtered.length} ${t('resultOf')} ${base.length} ${t('resultRiders')}</div>`:''}
    </div>
    <div class="table-wrapper"><table class="queue-table${S.queueDensity==='compact'?' compact':''}">
      <thead><tr>
        ${thQSort('queue',t('colBookingNum'))}
        <th style="color:var(--muted);font-size:10px;text-align:center">${t('colPosition')}</th>
        ${thQSort('name',t('colRider'))}
        ${thQSort('size',t('frameSizeLabel'))}
        ${thQSort('type',t('bikeTypeLabel'))}
        <th class="hide-mobile" style="display:none"></th>
        <th>${t('colBike')}</th>
        <th>${t('colColor')}</th>
        <th>${t('colPrice')||'Price'}</th>
        ${thQSort('paid',t('colPayment'))}
        ${thQSort('status',t('colStatus'))}
        <th style="font-size:10px;color:var(--muted)">${t('colContact')}</th>
        <th></th>
      </tr></thead>
      <tbody>${rows}${emptyRow}</tbody>
    </table></div>`;
}

async function togglePayment(id,paid){
  // Optimistic update: flip state locally and re-render immediately so button responds instantly
  const entry=getQueue().find(e=>e.id===id);
  if(!entry)return;
  entry.paid=paid;
  renderStaffQueue();renderHistory();
  toast(paid?'✓ '+t('paidLabel'):t('pendingLabel'), paid?'':'warning');
  // Persist to database in background, then sync
  await sb.from('queue_entries').update({paid}).eq('id',id);
  await loadData();
  renderStaffQueue();renderHistory();
  const lbl=`Payment #${entry.queueNum} ${entry.name}`;
  pushUndo(`${paid?'Mark paid':'Mark unpaid'} - ${lbl}`,async()=>{
    await sb.from('queue_entries').update({paid:!paid}).eq('id',id);
    await loadData();renderStaffQueue();renderHistory();
  });
}

/* ══════════════════════════════════════════════
   UNDO SYSTEM
══════════════════════════════════════════════ */
function pushUndo(label,fn){
  S.undoStack.push({label,fn});
  if(S.undoStack.length>20)S.undoStack.shift();
  showUndoBar(label,async()=>{
    S.undoStack=S.undoStack.filter(i=>i.label!==label||i.fn!==fn);
    await fn();
  });
  renderTopbarRight();
}
async function doUndo(){
  const item=S.undoStack.pop();
  if(!item)return;
  try{
    await item.fn();
    toast(t('undoneMsg'));
  }catch(e){
    S.undoStack.push(item);
    toast('Undo failed.','error');
  }
  renderTopbarRight();
}

async function cancelBooking(id){
  const entry=getQueue().find(e=>e.id===id);
  if(!entry||entry.status!=='waiting'){toast(t('errCancelWaiting'),'error');return;}
  const behind=getQueue().filter(e=>e.sessionId===entry.sessionId&&e.status==='waiting'&&e.queueNum>entry.queueNum);
  const savedBehind=behind.map(e=>({id:e.id,queueNum:e.queueNum}));
  const savedQNum=entry.queueNum;
  await sb.from('queue_entries').update({status:'cancelled'}).eq('id',id);
  await Promise.all(savedBehind.map(e=>sb.from('queue_entries').update({queue_num:e.queueNum-1}).eq('id',e.id)));
  await loadData();
  toast(t('toastBookingCancelled'));
  pushUndo(`Cancel booking #${savedQNum} ${entry.name}`,async()=>{
    await sb.from('queue_entries').update({status:'waiting',queue_num:savedQNum}).eq('id',id);
    await Promise.all(savedBehind.map(e=>sb.from('queue_entries').update({queue_num:e.queueNum}).eq('id',e.id)));
    await loadData();renderMyRides();renderStaffQueue();
  });
  renderMyRides();
}

async function doNoShow(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry)return;
  // Shift subsequent waiting riders down (same as cancel — keeps numbers gapless)
  const behind=getQueue().filter(e=>e.sessionId===entry.sessionId&&e.status==='waiting'&&e.queueNum>entry.queueNum);
  const savedBehind=behind.map(e=>({id:e.id,queueNum:e.queueNum}));
  const savedQNum=entry.queueNum;
  await sb.from('queue_entries').update({status:'noshow'}).eq('id',id);
  await Promise.all(behind.map(e=>sb.from('queue_entries').update({queue_num:e.queueNum-1}).eq('id',e.id)));
  await loadData();toast(t('toastNoShow'));
  pushUndo(`No-show #${savedQNum} ${entry.name}`,async()=>{
    await sb.from('queue_entries').update({status:'waiting',queue_num:savedQNum}).eq('id',id);
    await Promise.all(savedBehind.map(e=>sb.from('queue_entries').update({queue_num:e.queueNum}).eq('id',e.id)));
    await loadData();renderStaffQueue();
  });
  renderStaffQueue();
}
async function doReturn(id){
  const q=getQueue();const entry=q.find(e=>e.id===id);if(!entry)return;

  if(!entry.paid){
    showReturnPayModal(id);

function closeReturnPayModal(){const m=document.getElementById('return-pay-modal');if(m)m.style.display='none';}
async function _execReturn(id,markPaid){
  const q=getQueue();const entry=q.find(e=>e.id===id);if(!entry)return;
  const bikeId=entry.assignedBikeId;const name=entry.name;const qn=entry.queueNum;
  const updates={status:'done'};if(markPaid)updates.paid=true;
  const calls=[sb.from('queue_entries').update(updates).eq('id',id)];
  if(bikeId)calls.push(sb.from('bikes').update({status:'available'}).eq('id',bikeId));
  await Promise.all(calls);
  await loadData();
  toast(markPaid?t('toastBikeReturnedPaid'):t('toastBikeReturned'));
  pushUndo(`Return bike - #${qn} ${name}`,async()=>{
    const u={status:'active'};if(markPaid)u.paid=false;
    const calls2=[sb.from('queue_entries').update(u).eq('id',id)];
    if(bikeId)calls2.push(sb.from('bikes').update({status:'in-use'}).eq('id',bikeId));
    await Promise.all(calls2);
    await loadData();renderStaffQueue();
  });
  renderStaffQueue();
}
async function doReopen(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry)return;
  const bikeId=entry.assignedBikeId;
  const calls=[sb.from('queue_entries').update({status:'active'}).eq('id',id)];
  if(bikeId){
    const bike=bikeById(bikeId);
    if(bike&&bike.status==='available')calls.push(sb.from('bikes').update({status:'in-use'}).eq('id',bikeId));
  }
  await Promise.all(calls);
  await loadData();toast(t('toastReopened'));
  pushUndo(`Re-open #${entry.queueNum} ${entry.name}`,async()=>{
    const calls2=[sb.from('queue_entries').update({status:'done'}).eq('id',id)];
    if(bikeId)calls2.push(sb.from('bikes').update({status:'available'}).eq('id',bikeId));
    await Promise.all(calls2);
    await loadData();renderStaffQueue();
  });
  renderStaffQueue();
}
function addHistLog(action,entry){

  if(!confirm(msg))return;
  doRemove(id);
}

async function doRemove(id){

    const prevStatus=entry.status==='done'?'done':'waiting';
    addHistLog('Restored',entry);
    await sb.from('queue_entries').update({status:prevStatus}).eq('id',id);
    await loadData();renderStaffQueue();renderHistory();

}

async function doRestoreEntry(id){

  addHistLog('Restored',entry);
  await sb.from('queue_entries').update({status:'done'}).eq('id',id);
  await loadData();toast(t('restoreEntryBtn')||'Restored');
  renderHistory();
}

/* ══════════════════════════════════════════════
   BIKE ASSIGN MODAL
══════════════════════════════════════════════ */
function openModal(riderId){S.modalRider=riderId;S.modalBike=null;S.modalShowAll=false;renderModal();}
function renderModal(){
  const rider=getQueue().find(e=>e.id===S.modalRider);if(!rider)return;
  const allBikes=getBikes();

  // Determine session fleet plan (advisory — for sorting/badging only)
  const sess=S.sessions.find(s=>s.id===rider.sessionId);
  const slots=sess?parseSlots(sess.bike_slots):null;
  const fmt=slotsFormat(slots);

  // Check if a bike is part of the session's fleet plan
  function inFleet(b){
    if(!slots)return true;
    if(fmt==='ids')return(slots._bikes||[]).includes(b.id);
    if(fmt==='counts')return(slots[b.type]||0)>0;
    // legacy type×size format
    return slots[b.type]&&(typeof slots[b.type]==='number'?(slots[b.type]>0):(slots[b.type][b.size]||0)>0);
  }

  // Separate into preferred-type bikes and others
  const prefType=rider.typePreference;
  const sortBikes=arr=>[...arr].sort((a,b)=>{
    const aFree=a.status==='available'?0:1,bFree=b.status==='available'?0:1;
    const aSz=a.size===rider.size?0:1,bSz=b.size===rider.size?0:1;
    const aFleet=inFleet(a)?0:1,bFleet=inFleet(b)?0:1;
    return aFree-bFree||aSz-bSz||aFleet-bFleet||a.name.localeCompare(b.name);
  });
  const prefBikes=sortBikes(allBikes.filter(b=>b.type===prefType));
  const otherBikes=sortBikes(allBikes.filter(b=>b.type!==prefType));
  const otherAvail=otherBikes.filter(b=>b.status==='available').length;

  function bikeCard(b,altType=false){
    const free=b.status==='available';
    const dot=free?'dot-green':b.status==='in-use'?'dot-orange':'dot-red';
    const slbl=free?t('availLabel'):b.status==='in-use'?t('inUseLabel'):t('maintLabel');
    const grad=bikeGradient(b.colors||['#03ff89']);
    const sizeMatch=b.size===rider.size;
    const badges=[];
    if(sizeMatch)badges.push(`<span style="font-size:10px;font-weight:800;color:var(--green);background:rgba(3,255,137,.15);padding:2px 6px;border-radius:6px">${t('sizeMatchLabel')}</span>`);
    if(inFleet(b)&&slots)badges.push(`<span style="font-size:10px;font-weight:800;color:var(--green);background:rgba(3,255,137,.1);padding:2px 6px;border-radius:6px">${t('fleetBadge')}</span>`);
    if(altType)badges.push(`<span style="font-size:10px;font-weight:800;color:var(--muted-l);background:rgba(255,255,255,.07);padding:2px 6px;border-radius:6px">${t('altBadge')}</span>`);
    return`<div class="modal-bike-card${!free?' unavailable':''}${S.modalBike===b.id?' selected':''}" ${free?`onclick="pickBike('${b.id}')"`:''}>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:4px;flex-wrap:wrap">
        <span class="avail-dot ${dot}"></span>
        <div style="display:flex;gap:4px;flex-wrap:wrap">${badges.join('')}</div>
      </div>
      <div style="height:5px;border-radius:3px;background:${grad};margin-bottom:8px"></div>
      <div style="font-weight:900;font-size:14px;margin-bottom:3px">${esc(b.name)}</div>
      <div style="font-size:12px;color:var(--muted)">${typeLabel(b.type)} &middot; ${t('frameSizeLabel')} ${b.size}</div>
      <div style="margin-top:6px">${typeBadge(b.type)}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:5px">${slbl}</div>
    </div>`;
  }

  const prefEmpty=prefBikes.length===0;
  const prefSection=prefBikes.length
    ?`<div class="modal-bikes-grid">${prefBikes.map(b=>bikeCard(b,false)).join('')}</div>`
    :`<div style="color:var(--muted);font-size:13px;font-weight:700;padding:16px 0;text-align:center">
        ${t('noBikesForType').replace('{0}',typeLabel(prefType))}
      </div>`;

  // "Show other types" toggle
  const otherToggle=otherAvail>0||S.modalShowAll?`
    <div style="margin-top:14px">
      <button onclick="S.modalShowAll=!S.modalShowAll;renderModal()"
        style="width:100%;padding:10px;border-radius:10px;border:1.5px dashed rgba(255,255,255,.15);
          background:rgba(255,255,255,.03);cursor:pointer;font-family:'Space Grotesk',sans-serif;
          font-size:12px;font-weight:800;color:var(--muted);transition:all .2s"
        onmouseover="this.style.borderColor='rgba(3,255,137,.35)';this.style.color='var(--green)'"
        onmouseout="this.style.borderColor='rgba(255,255,255,.15)';this.style.color='var(--muted-l)'">
        ${S.modalShowAll
          ?t('hideOtherTypes')
          :`${t('showOtherTypes')} (${otherAvail} ${t('available2')})`}
      </button>
      ${S.modalShowAll?`
        <div style="display:flex;align-items:center;gap:8px;margin:14px 0 10px">
          <div style="flex:1;height:1px;background:var(--border)"></div>
          <span style="font-size:10px;font-weight:900;color:var(--muted-l);text-transform:uppercase;letter-spacing:.6px">${t('showOtherTypes').replace(/^[↓↑]\s*/,'')}</span>
          <div style="flex:1;height:1px;background:var(--border)"></div>
        </div>
        <div class="modal-bikes-grid">${otherBikes.map(b=>bikeCard(b,true)).join('')}</div>`:''}
    </div>`:
    (prefEmpty?`<div style="margin-top:10px;font-size:12px;color:var(--muted);font-weight:600;text-align:center">${t('noOtherTypes')}</div>`:'');

  const cards=`${prefSection}${otherToggle}`;

  const fleetLine=slots?`<div style="font-size:12px;color:var(--muted);margin-bottom:16px">${t('sessionFleetLabel')}: ${slotsLabel(slots)}</div>`:'';

  const payWarning=!rider.paid?`<div style="display:flex;align-items:center;gap:8px;background:rgba(224,136,40,.1);border:1px solid rgba(224,136,40,.3);border-radius:10px;padding:10px 14px;margin-bottom:14px">
    <span style="font-size:16px">⚠️</span>
    <div>
      <span style="font-size:12px;font-weight:800;color:var(--muted-l)">${t('payPendingWarning')} - SAR ${rider.price||DEFAULT_PRICE}</span>
      <button class="pay-toggle pending" style="margin-left:10px;font-size:11px" onclick="togglePayment('${rider.id}',true);renderModal()">⏳ ${t('paidLabel')}?</button>
    </div>
  </div>`:'';
  const modal=document.getElementById('bike-modal');
  modal.style.display='flex';
  modal.innerHTML=`<div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-title">${t('assignBikeTitle')}</div>
      <div class="modal-sub">#${rider.queueNum} ${esc(rider.name)} &middot; ${t('frameSizeLabel')} ${rider.size} &middot; ${typeBadge(rider.typePreference)}</div>
      ${payWarning}
      ${fleetLine}
      ${cards}
      <div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="confirmAssign()">${t('confirmCheckin')}</button></div>
    </div>
  </div>`;
}
function pickBike(id){S.modalBike=id;renderModal();}
function closeModal(){document.getElementById('bike-modal').style.display='none';S.modalRider=null;S.modalBike=null;S.modalShowAll=false;}
async function confirmAssign(){
  if(!S.modalBike){toast(t('errSelectBike'),'error');return;}
  const bikes=getBikes();const bi=bikes.findIndex(b=>b.id===S.modalBike);
  if(bi<0||bikes[bi].status!=='available'){toast(t('errBikeUnavailable'),'error');return;}
  const bikeName=bikes[bi].name;const bikeId=S.modalBike;const riderId=S.modalRider;
  const rider=getQueue().find(e=>e.id===riderId);const qn=rider?rider.queueNum:'?';const rName=rider?rider.name:'';
  await Promise.all([
    sb.from('bikes').update({status:'in-use'}).eq('id',bikeId),
    sb.from('queue_entries').update({status:'active',assigned_bike_id:bikeId}).eq('id',riderId),
  ]);
  await loadData();closeModal();
  toast(`${bikeName} ${t('toastAssignedChecked')}`);
  pushUndo(`Check-in #${qn} ${rName} on ${bikeName}`,async()=>{
    await Promise.all([
      sb.from('bikes').update({status:'available'}).eq('id',bikeId),
      sb.from('queue_entries').update({status:'waiting',assigned_bike_id:null}).eq('id',riderId),
    ]);
    await loadData();renderStaffQueue();
  });
  renderStaffQueue();
}

/* ══════════════════════════════════════════════
   BIKES
══════════════════════════════════════════════ */
function updateColorPreview(){const p=document.getElementById('color-prev');if(p)p.innerHTML=S.addBikeColors.map(c=>`<span style="display:inline-block;width:28px;height:28px;border-radius:50%;background:${c};border:2px solid rgba(0,0,0,.3);flex-shrink:0"></span>`).join('');}
function addColorSlot(){if(S.addBikeColors.length>=4)return;S.addBikeColors.push('#ffffff');renderBikes();}
function removeColor(i){if(S.addBikeColors.length<=1)return;S.addBikeColors.splice(i,1);renderBikes();}

function renderBikes(){
  const bikes=getBikes();
  const total=bikes.length,nAvail=bikes.filter(b=>b.status==='available').length,
        nUse=bikes.filter(b=>b.status==='in-use').length,
        nRoad=bikes.filter(b=>b.type==='Road').length,
        nHybrid=bikes.filter(b=>b.type==='Hybrid').length,
        nMtn=bikes.filter(b=>b.type==='Mountain').length;
  const bkTypeOpts=['all','Road','Hybrid','Mountain'].map(ty=>
    `<option value="${ty}"${S.bkTypeFilter===ty?' selected':''}>${ty==='all'?t('filterAll'):typeLabel(ty)}</option>`).join('');
  const bkStatusOpts=['all','available','in-use','maintenance'].map(s=>{
    const l={all:t('filterAll'),available:t('availLabel'),'in-use':t('inUseLabel'),maintenance:t('maintLabel')}[s];
    return`<option value="${s}"${S.bkStatus===s?' selected':''}>${l}</option>`;}).join('');
  const bkSizeOpts=['all','XS','S','M','L'].map(sz=>
    `<option value="${sz}"${S.bkSize===sz?' selected':''}>${sz==='all'?t('filterAll'):sz}</option>`).join('');
  const isEdit=!!S.editBikeId;const editBike=isEdit?bikes.find(b=>b.id===S.editBikeId):null;
  const curSize=(isEdit&&editBike)?(S.addBikeSize||editBike.size):S.addBikeSize;
  const sizeOpts=['XS','S','M','L'].map(v=>`<option value="${v}"${curSize===v?' selected':''}>${v}</option>`).join('');
  const bkTypeBtns=['Road','Hybrid','Mountain'].map(ty=>
    `<button class="toggle-btn${S.addBikeType===ty?' active':''}" onclick="S.addBikeType='${ty}';renderBikes()">${typeLabel(ty)}</button>`).join('');
  const colorSlots=S.addBikeColors.map((c,i)=>`
    <div class="color-slot"><input type="color" value="${c}" oninput="S.addBikeColors[${i}]=this.value;updateColorPreview()">
      ${S.addBikeColors.length>1?`<button class="color-del" onclick="removeColor(${i})" type="button">&#x2715;</button>`:''}</div>`).join('');
  const addColorBtn=S.addBikeColors.length<4?`<button class="add-color-slot" onclick="addColorSlot()" type="button">+<br>Color</button>`:'';
  const addForm=(S.showAddBike||isEdit)?`<div class="inline-form">
    <div class="form-title">${isEdit?t('editBikeTitle'):t('addBikeTitle')}</div>
    <div class="form-row">
      <div class="form-group"><label>${t('bikeNameLabel')}</label><input type="text" id="bk-name" placeholder="e.g. Spectra One" value="${esc(S._bkName)}"></div>
      <div class="form-group"><label>${t('walkinSize')}</label><select id="bk-size" onchange="S.addBikeSize=this.value">${sizeOpts}</select></div>
    </div>
    <div class="form-group" style="margin-bottom:16px"><label>${t('bikeTypeLabel')}</label><div class="toggle-group">${bkTypeBtns}</div></div>
    <div class="form-group" style="margin-bottom:16px">
      <label>${t('bikeColorsLabel')} &nbsp;<span class="label-hint">${t('colorsHint')}</span></label>
      <div class="color-builder">
        <div id="color-prev" style="display:flex;gap:8px;align-items:center;padding:6px 0">${S.addBikeColors.map(c=>`<span style="display:inline-block;width:28px;height:28px;border-radius:50%;background:${c};border:2px solid rgba(0,0,0,.3);flex-shrink:0"></span>`).join('')}</div>
        <div class="color-slots">${colorSlots}${addColorBtn}</div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-primary" onclick="${isEdit?'saveBikeEdit()':'addBike()'}"> ${isEdit?t('saveBikeBtn'):t('addBikeBtn')}</button>
      <button class="btn-secondary" onclick="cancelBikeForm()">${t('cancelBtn')}</button>
    </div>
  </div>`:'';
  // Active filters (status + size only — type is now handled by sections)
  const sortOrder={available:0,'in-use':1,maintenance:2};
  const sizeOrder={XS:0,S:1,M:2,L:3};

  function renderBikeRow(b){
    const dot=b.status==='available'?'dot-green':b.status==='in-use'?'dot-orange':'dot-red';
    const slbl=b.status==='available'?t('availLabel'):b.status==='in-use'?t('inUseLabel'):t('maintLabel');
    const sclr=b.status==='available'?'var(--green)':b.status==='in-use'?'var(--muted-l)':'var(--red)';
    const colors=b.colors&&b.colors.length?b.colors:['#03ff89'];
    const colorSwatches=colors.map(c=>`<span style="display:inline-block;width:13px;height:13px;border-radius:50%;background:${c};border:1.5px solid rgba(0,0,0,.3);flex-shrink:0"></span>`).join('');
    return`<tr>
      <td><div class="rider-name">${esc(b.name)}</div></td>
      <td>${typeBadge(b.type)}</td>
      <td style="font-weight:800">${b.size}</td>
      <td><div style="display:flex;gap:4px;align-items:center">${colorSwatches}</div></td>
      <td><span class="avail-dot ${dot}" style="display:inline-block;margin-right:6px"></span><span style="color:${sclr};font-weight:700;font-size:12px">${slbl}</span></td>
      <td><div class="actions-cell">
        <button class="btn-sm btn-blue" onclick="startEdit('${b.id}')">${t('editBtn')}</button>
        <button class="btn-sm btn-orange" onclick="toggleMaint('${b.id}')">${b.status==='maintenance'?t('restoreBtn'):t('maintBtn')}</button>
        <button class="btn-sm btn-red" ${b.status!=='in-use'?`onclick="delBike('${b.id}')"`:' disabled'}>${t('deleteBtn')}</button>
      </div></td>
    </tr>`;
  }

  function renderTypeSection(ty,color){
    let typeBikes=bikes.filter(b=>b.type===ty);
    if(S.bkStatus!=='all') typeBikes=typeBikes.filter(b=>b.status===S.bkStatus);
    if(S.bkSize!=='all')   typeBikes=typeBikes.filter(b=>b.size===S.bkSize);
    typeBikes.sort((a,b)=>{
      if(S.bkSort==='size')  return (sizeOrder[a.size]??9)-(sizeOrder[b.size]??9)||a.name.localeCompare(b.name);
      if(S.bkSort==='status')return (sortOrder[a.status]??9)-(sortOrder[b.status]??9)||a.name.localeCompare(b.name);
      return a.name.localeCompare(b.name);
    });
    const all=bikes.filter(b=>b.type===ty);
    const tyAvail=all.filter(b=>b.status==='available').length;
    const tyUse  =all.filter(b=>b.status==='in-use').length;
    const tyMaint=all.filter(b=>b.status==='maintenance').length;
    const rows=typeBikes.length
      ?typeBikes.map(renderBikeRow).join('')
      :`<tr><td colspan="6" style="padding:16px 0">${emptyIllustration(ILLUS_BIKE_OK,t('noBikes'))}</td></tr>`;
    return`<div style="margin-bottom:28px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:4px;height:32px;border-radius:3px;background:${color};flex-shrink:0"></div>
          <div>
            <div style="font-size:17px;font-weight:900">${typeLabel(ty)}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px;font-weight:600">
              ${all.length} ${t('bike').toLowerCase()}${all.length!==1?'s':''} &nbsp;·&nbsp;
              <span style="color:var(--green)">${tyAvail} ${t('availLabel').toLowerCase()}</span>
              ${tyUse>0?` &nbsp;·&nbsp; <span style="color:var(--muted-l)">${tyUse} ${t('inUseLabel').toLowerCase()}</span>`:''}
              ${tyMaint>0?` &nbsp;·&nbsp; <span style="color:var(--red)">${tyMaint} ${t('maintLabel').toLowerCase()}</span>`:''}
            </div>
          </div>
        </div>
        <button class="btn-secondary" style="font-size:12px;padding:6px 12px"
          onclick="S.showAddBike=true;S.addBikeType='${ty}';S.editBikeId=null;S.addBikeSize='M';S.addBikeColors=['#03ff89'];S._bkName='';renderBikes()">
          + ${typeLabel(ty)}
        </button>
      </div>
      <div class="table-wrapper"><table class="queue-table">
        <thead><tr>
          <th>${t('bikeNameLabel')}</th>
          <th>${t('bikeTypeLabel')}</th>
          <th>${t('frameSizeLabel')}</th>
          <th>${t('colColor')}</th>
          <th>${t('colStatus')}</th>
          <th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
  }

  const typeColorMap={Road:'#4aa8f8',Hybrid:'#03ff89',Mountain:'#e08828'};
  const typeSections=['Road','Hybrid','Mountain'].map(ty=>renderTypeSection(ty,typeColorMap[ty])).join('');

  document.getElementById('tab-bikes').innerHTML=`
    <div class="section-header">
      <div>
        <div class="page-title">${t('bikesTitle')}</div>
      </div>
      <button class="btn-primary" onclick="toggleAddBike()">${t('addBike')}</button>
    </div>
    ${addForm}
    <div class="stats-row" style="margin-bottom:20px">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">${t('totalStat')}</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--green)">${nAvail}</div><div class="stat-label">${t('availLabel')}</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--text)">${nUse}</div><div class="stat-label">${t('inUseLabel')}</div></div>
    </div>
    <div class="filter-bar" style="margin-bottom:20px">
      <div class="filter-row">
        <span class="filter-label">${t('filterStatus')}:</span>
        <select class="filter-select" onchange="setBkStatus(this.value)">${bkStatusOpts}</select>
        <span class="filter-label" style="margin-left:8px">${t('filterSize')}:</span>
        <select class="filter-select" onchange="setBkSize(this.value)">${bkSizeOpts}</select>
      </div>
    </div>
    ${typeSections}`;
  const nameEl=document.getElementById('bk-name');
  if(nameEl)nameEl.addEventListener('input',e=>S._bkName=e.target.value);
}

function toggleAddBike(){S.showAddBike=!S.showAddBike;S.editBikeId=null;S.addBikeType=null;S.addBikeSize='M';S.addBikeColors=['#6ee89a'];S._bkName='';renderBikes();}
function cancelBikeForm(){S.showAddBike=false;S.editBikeId=null;S.addBikeType=null;S.addBikeColors=['#6ee89a'];S._bkName='';renderBikes();}
function setBkFilter(v){S.bkTypeFilter=v;renderBikes();}
function setBkSort(v){S.bkSort=v;renderBikes();}
async function addBike(){
  const name=document.getElementById('bk-name').value.trim();const size=document.getElementById('bk-size').value||'M';
  if(!name){toast(t('errBikeName'),'error');return;}
  if(!S.addBikeType){toast(t('errBikeTypeReq'),'error');return;}
  const bike={id:uid(),name,size,type:S.addBikeType,colors:[...S.addBikeColors],status:'available'};
  await sb.from('bikes').insert(bike);
  await loadData();
  S.showAddBike=false;S.addBikeType=null;S.addBikeSize='M';S.addBikeColors=['#6ee89a'];S._bkName='';
  toast(`${name} ${t('toastAddedToFleet')}`);
  pushUndo(`Add bike ${name}`,async()=>{
    await sb.from('bikes').delete().eq('id',bike.id);
    await loadData();renderBikes();
  });
  renderBikes();
}
function startEdit(id){
  const bike=getBikes().find(b=>b.id===id);if(!bike)return;
  S.editBikeId=id;S.showAddBike=false;S.addBikeType=bike.type;S.addBikeSize=bike.size;
  S.addBikeColors=bike.colors&&bike.colors.length?[...bike.colors]:['#6ee89a'];S._bkName=bike.name;renderBikes();
}
async function saveBikeEdit(){
  const name=document.getElementById('bk-name').value.trim();const size=document.getElementById('bk-size').value||'M';
  if(!name){toast(t('errBikeName'),'error');return;}
  if(!S.addBikeType){toast(t('errBikeTypeReq'),'error');return;}
  const b=getBikes();const existing=b.find(x=>x.id===S.editBikeId);if(!existing)return;
  const prev={name:existing.name,size:existing.size,type:existing.type,colors:[...existing.colors],status:existing.status};
  const bid=S.editBikeId;
  await sb.from('bikes').update({name,size,type:S.addBikeType,colors:[...S.addBikeColors],status:existing.status}).eq('id',bid);
  await loadData();
  S.editBikeId=null;S.addBikeType=null;S.addBikeColors=['#6ee89a'];S._bkName='';
  toast(t('toastBikeUpdated'));
  pushUndo(`Edit bike ${name}`,async()=>{
    await sb.from('bikes').update(prev).eq('id',bid);
    await loadData();renderBikes();
  });
  renderBikes();
}
async function toggleMaint(id){
  const b=getBikes();const bike=b.find(x=>x.id===id);if(!bike)return;
  if(bike.status==='in-use'){toast(t('errBikeInUse'),'error');return;}
  const prevStatus=bike.status;
  const newStatus=prevStatus==='maintenance'?'available':'maintenance';
  await sb.from('bikes').update({status:newStatus}).eq('id',id);
  await loadData();toast(`${t('toastStatusChanged')} ${newStatus}`);
  pushUndo(`${newStatus==='maintenance'?'Maintenance':'Restore'} ${bike.name}`,async()=>{
    await sb.from('bikes').update({status:prevStatus}).eq('id',id);
    await loadData();renderBikes();
  });
  renderBikes();
}
async function delBike(id){
  const bike=getBikes().find(x=>x.id===id);
  if(!bike||bike.status==='in-use'){toast(t('errBikeInUse'),'error');return;}
  const saved={id:bike.id,name:bike.name,size:bike.size,type:bike.type,colors:[...(bike.colors||[])],status:'available'};
  await sb.from('bikes').delete().eq('id',id);
  await loadData();toast(`${bike.name} ${t('toastBikeRemoved')}`);
  pushUndo(`Delete bike ${bike.name}`,async()=>{
    await sb.from('bikes').insert(saved);
    await loadData();renderBikes();
  });
  renderBikes();
}

/* ══════════════════════════════════════════════
   HISTORY
══════════════════════════════════════════════ */
function renderHistory(){
  const queue=getQueue();const hist=queue.filter(e=>e.status==='done'||e.status==='noshow'||e.status==='cancelled'||e.status==='removed');
  const sessions=allSessions();
  const nDone=hist.filter(e=>e.status==='done').length,nPaid=hist.filter(e=>e.status==='done'&&e.paid).length,
        nPend=hist.filter(e=>e.status==='done'&&!e.paid).length,nNoShow=hist.filter(e=>e.status==='noshow').length;
  let filtered=[...hist];
  if(S.histSess!=='all')   filtered=filtered.filter(e=>e.sessionId===S.histSess);
  if(S.histStatus!=='all') filtered=filtered.filter(e=>e.status===S.histStatus);
  // By default, exclude removed unless explicitly filtered
  if(S.histStatus==='all') filtered=filtered.filter(e=>e.status!=='removed');
  if(S.histPay==='paid')   filtered=filtered.filter(e=>e.paid);
  if(S.histPay==='pending')filtered=filtered.filter(e=>!e.paid&&e.status==='done');
  if(S.histType!=='all')   filtered=filtered.filter(e=>e.typePreference===S.histType);
  if(S.histSize!=='all')   filtered=filtered.filter(e=>e.size===S.histSize);
  if(S.histSearch.trim()){const q=S.histSearch.trim().toLowerCase();filtered=filtered.filter(e=>e.name.toLowerCase().includes(q)||e.phone.includes(q)||(e.email||'').toLowerCase().includes(q));}
  const sizeOrdH={XS:0,S:1,M:2,L:3};

    if(S.histSort==='size')   return _hd*((sizeOrdH[a.size]??9)-(sizeOrdH[b.size]??9));

function exportHistoryCSV(){
  // Respect the currently selected session filter
  let hist=getQueue().filter(e=>e.status==='done'||e.status==='noshow'||e.status==='cancelled'||e.status==='removed');
  if(S.histSess!=='all') hist=hist.filter(e=>e.sessionId===S.histSess);
  const sess=S.histSess!=='all'?allSessions().find(s=>s.id===S.histSess):null;
  const filename=sess
    ?`rides_${dayLabel(sess.day)}_${sess.session_date||sess.id}.csv`
    :'rides_all_sessions.csv';
  const headers=['#','Name','Phone','Email','Session','Date','Time','Bike','Size','Type','Price (SAR)','Paid','Status'];
  const rows=hist.map(e=>{
    const bike=e.assignedBikeId?getBikes().find(b=>b.id===e.assignedBikeId):null;
    const entSess=allSessions().find(s=>s.id===e.sessionId);
    return[
      e.queueNum,
      e.name,
      e.phone||'',
      e.email||'',
      dayLabel(e.sessionDay)+' '+shortDate(e.sessionDate),
      shortDate(e.sessionDate),
      sessionTime(entSess),
      bike?bike.name:'',
      e.size,
      e.typePreference,
      e.price||DEFAULT_PRICE,
      e.paid?'Yes':'No',
      e.status
    ].map(v=>'"'+String(v).replace(/"/g,'""')+'"');
  });
  if(!rows.length){toast(t('noHistory'),'warning');return;}
  const csv=[headers.map(h=>'"'+h+'"').join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}
