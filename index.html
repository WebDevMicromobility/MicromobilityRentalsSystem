    ${S.showResetTool?`<div class="inline-form" style="max-width:420px">
      <div class="form-title" style="display:flex;align-items:center;gap:8px">🔑 ${t('staffResetTool')}</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:14px">${t('staffResetDesc')}</div>
      <div class="form-group" style="margin-bottom:12px">
        <label>${t('staffResetEmailLabel')}</label>
        <div style="display:flex;gap:8px">
          <input type="email" id="staff-reset-email" placeholder="customer@email.com" style="flex:1">
          <button class="btn-primary" onclick="staffShowResetCode()" style="white-space:nowrap">${t('staffResetGenerate')}</button>
        </div>
      </div>
      <div id="staff-reset-result"></div>
    </div>`:''}`;

  // ── Build session summary chips (always shown) ──
  const _sessSummaryBar=(()=>{
    const openSess=allSessions().filter(s=>s.status==='open'||s.status==='full').sort((a,b)=>new Date(a.session_date||a.id)-new Date(b.session_date||b.id));
    if(!openSess.length)return'';
    const chips=openSess.map(s=>{
      const q=getQueue().filter(e=>e.sessionId===s.id);
      const sWait=q.filter(e=>e.status==='waiting').length;
      const sActive=q.filter(e=>e.status==='active').length;
      const sDone=q.filter(e=>e.status==='done').length;
      const cap=s.capacity||12;
      const fillPct=Math.round(Math.min((sWait+sActive+sDone)/cap*100,100));
      const fillClr=fillPct>=90?'var(--red)':'var(--green)';
      const isCurrent=S.sfSession===s.id;
      return`<div class="sess-summary-chip${isCurrent?' active-sess':''}"
        onclick="setSfSession('${s.id}')" title="${dayLabel(s.day)} ${shortDate(s.session_date||s.id)}">
        <div class="sess-chip-info">
          <div class="sess-chip-date">${dayLabel(s.day)}, ${shortDate(s.session_date||s.id)} &nbsp;·&nbsp; ${sessionTime(s)}</div>
          <div class="sess-chip-counts">
            <span style="color:var(--green)">${sWait} ${t('waitingStat').toLowerCase()}</span>
            ${sActive?` &middot; <span style="color:var(--text)">${sActive} ${t('activeSessChip')}</span>`:''}
            ${sDone?` &middot; <span style="color:var(--muted)">${sDone} ${t('doneSessChip')}</span>`:''}
          </div>
          <div class="sess-chip-bar"><div class="sess-chip-fill" style="width:${fillPct}%;background:${fillClr}"></div></div>
        </div>
        <div class="sess-chip-badge"><span class="badge-${s.status}">${{open:t('statusOpen'),full:t('statusFull'),closed:t('statusClosed')}[s.status]}</span></div>
      </div>`;
    }).join('');

    // Mobile: dropdown instead of chips
    const dropdownOpts=`<option value="all"${S.sfSession==='all'?' selected':''}>${t('allSessions')}</option>`+
      openSess.map(s=>{
        const q=getQueue().filter(e=>e.sessionId===s.id);
        const sWait=q.filter(e=>e.status==='waiting').length;
        const label=`${dayLabel(s.day)}, ${shortDate(s.session_date||s.id)} · ${sessionTime(s)} — ${sWait} ${t('waitingStat').toLowerCase()}`;
        return`<option value="${s.id}"${S.sfSession===s.id?' selected':''}>${label}</option>`;
      }).join('');

    return`
      <div class="sess-summary-bar sess-bar-desktop">${chips}</div>
      <div class="sess-bar-mobile" style="margin-bottom:14px">
        <select class="filter-select" style="width:100%;font-size:14px;height:44px" onchange="setSfSession(this.value)">${dropdownOpts}</select>
      </div>`;
  })();

  // ── Session dashboard (single-session view only) ──

  // ── Build rows: group by session for All Sessions, flat for single session ──
  let rows,emptyRow='';
  let mobileCards='';
  if(S.sfSession==='all'){
    const orderedSessions=[...allSessions()].sort((a,b)=>new Date(a.session_date||a.id)-new Date(b.session_date||b.id));
    rows=orderedSessions.map(sess=>{
      const sessFiltered=filtered.filter(e=>e.sessionId===sess.id);
      if(!sessFiltered.length)return'';
      const nW=sessFiltered.filter(e=>e.status==='waiting').length;
      const nA=sessFiltered.filter(e=>e.status==='active').length;
      const nD=sessFiltered.filter(e=>e.status==='done').length;
      const hdr=`<tr class="sess-group-hdr"><td colspan="13">
        ${dayLabel(sess.day)} &nbsp;${shortDate(sess.session_date||sess.id)} &nbsp;&middot;&nbsp; ${sessionTime(sess)}
        &nbsp;&nbsp;
        <span style="color:var(--green)">${nW} ${t('waitingStat').toLowerCase()}</span>
        ${nA?` &middot; <span style="color:var(--text)">${nA} ${t('onBikeStat').toLowerCase()}</span>`:''}
        ${nD?` &middot; <span style="color:var(--muted)">${nD} ${t('doneStat').toLowerCase()}</span>`:''}
        &nbsp;<span class="badge-${sess.status}" style="margin-left:8px">${{open:t('statusOpen'),closed:t('statusClosed'),full:t('statusFull')}[sess.status]||sess.status}</span>
      </td></tr>`;
      return hdr+buildQueueGroups(sessFiltered).map(g=>renderGroupRow(g)).join('');
    }).join('');
    if(!filtered.length)emptyRow=`<tr><td colspan="13"><div style="padding:8px">${emptyIllustration(ILLUS_PEOPLE,t('noHistory'))}</div></td></tr>`;
    // Mobile cards
    mobileCards=orderedSessions.map(sess=>{
      const sessFiltered=filtered.filter(e=>e.sessionId===sess.id);
      if(!sessFiltered.length)return'';
      const hdr=`<div style="font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:6px 0 4px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:8px">${dayLabel(sess.day)} &middot; ${shortDate(sess.session_date||sess.id)} &middot; ${sessionTime(sess)}</div>`;
      return hdr+buildQueueGroups(sessFiltered).map(g=>renderGroupCard(g)).join('');
    }).join('');
    if(!filtered.length)mobileCards=`<div style="padding:8px">${emptyIllustration(ILLUS_PEOPLE,t('noHistory'))}</div>`;
  }else{
    rows=buildQueueGroups(filtered).map(g=>renderGroupRow(g)).join('');
    emptyRow=filtered.length===0?`<tr><td colspan="13"><div style="padding:8px">${emptyIllustration(ILLUS_PEOPLE,t('noHistory'))}</div></td></tr>`:'';
    mobileCards=buildQueueGroups(filtered).map(g=>renderGroupCard(g)).join('');
    if(!filtered.length)mobileCards=`<div style="padding:8px">${emptyIllustration(ILLUS_PEOPLE,t('noHistory'))}</div>`;
  }
  document.getElementById('tab-queue').innerHTML=_queueHeader+_sessSummaryBar+`
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">${t('totalStat')}</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--green)">${nWait}</div><div class="stat-label">${t('waitingStat')}</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#a0f0c0">${nBike}</div><div class="stat-label">${t('onBikeStat')}</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--muted)">${nDone}</div><div class="stat-label">${t('doneStat')}</div></div>
    </div>
    ${nextUp}
    ${(()=>{
      // Show recent customer cancellations (last 5 minutes) as an alert strip
      const cutoff=Date.now()-5*60*1000;
      const recent=S.cancellationLog.filter(c=>
        (c.timestamp!=null?c.timestamp:Date.now())>=cutoff
      ).slice(0,3);
      if(!recent.length)return'';
      return`<div style="margin-bottom:14px">
        ${recent.map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;margin-bottom:6px;background:rgba(224,64,64,.07);border:1px solid rgba(224,64,64,.2);border-radius:10px;font-size:12px">
          <span style="font-size:14px">❌</span>
          <span style="font-weight:800;color:var(--red)">Cancelled</span>
          <span style="font-weight:700">#${c.queueNum} ${esc(c.name)}</span>
          <span style="color:var(--muted)">${c.session}</span>
          ${c.reason?`<span style="margin-left:auto;background:rgba(255,255,255,.07);padding:2px 8px;border-radius:6px;color:var(--muted-l);font-size:11px">${esc(c.reason)}</span>`:''}
          <button onclick="S.cancellationLog=S.cancellationLog.filter(x=>x.entryId!=='${c.entryId}');try{localStorage.setItem('cq_cancellations',JSON.stringify(S.cancellationLog));}catch(e){}renderStaffQueue()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:0;margin-left:auto;flex-shrink:0">&#x2715;</button>
        </div>`).join('')}
      </div>`;
    })()}
    <div class="filter-bar">
      <div class="filter-row">
        <span class="filter-label">${t('colSession')}:</span>
        <select class="filter-select" style="min-width:160px" onchange="setSfSession(this.value)">${qSessOpts}</select>
        <span class="filter-label" style="margin-left:8px">${t('filterStatus')}:</span>
        <select class="filter-select" onchange="setSfStatus(this.value)">${qStatusOpts}</select>
        <span class="filter-label" style="margin-left:8px">${t('filterPay')}:</span>
        <select class="filter-select" onchange="setSfPay(this.value)">${qPayOpts}</select>
        <div class="search-wrap" style="margin-left:8px">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="white" stroke-width="1.4"/><line x1="9.5" y1="9.5" x2="13" y2="13" stroke="white" stroke-width="1.4" stroke-linecap="round"/></svg>
          <input id="sf-search-input" class="search-input" placeholder="${t('searchPlaceholder')}" value="${esc(S.sfSearch)}"
            oninput="setSfSearch(this.value)">
        </div>
      </div>
      ${filtered.length!==base.length?`<div class="result-count">${filtered.length} ${t('resultOf')} ${base.length} ${t('resultRiders')}</div>`:''}
    </div>
    <div class="queue-mobile-view">${mobileCards}</div>
    <div class="table-wrapper queue-table-desktop-wrap"><table class="queue-table${S.queueDensity==='compact'?' compact':''}">
      <thead><tr>
        ${thQSort('queue',t('colBookingNum'))}
        <th style="color:var(--muted);font-size:10px;text-align:center">${t('colPosition')}</th>
        ${thQSort('name',t('colRider'))}
        <th style="font-size:10px;color:var(--muted)">Height</th>
        ${thQSort('type',t('bikeTypeLabel'))}
        <th class="hide-mobile" style="display:none"></th>
        <th>${t('colBike')}</th>
        <th>${t('colColor')}</th>
        <th>${t('colPrice')||'Price'}</th>
        ${thQSort('paid',t('colPayment'))}
        ${thQSort('status',t('colStatus'))}
        <th style="font-size:10px;color:var(--muted)">${t('colContact')}</th>
        <th></th>
      </tr></thead>
      <tbody>${rows}${emptyRow}</tbody>
    </table></div>`;
}

function setSfStatus(v){S.sfStatus=v;renderStaffQueue();}
function setSfSession(v){S.sfSession=v;renderStaffQueue();}
function setSfSort(col){
  if(S.sfSort===col) S.sfSortDir=-S.sfSortDir;
  else{S.sfSort=col;S.sfSortDir=1;}
  renderStaffQueue();
}
function setSfSearch(v){
  S.sfSearch=v;
  renderStaffQueue();
  // Restore focus and caret position after re-render
  const inp=document.getElementById('sf-search-input');
  if(inp){inp.focus();const l=v.length;inp.setSelectionRange(l,l);}
}
function setSfPay(v){S.sfPay=v;renderStaffQueue();}
function setSfSize(v){S.sfSize=v;renderStaffQueue();}
function toggleResetTool(){S.showResetTool=!S.showResetTool;renderStaffQueue();}
async function staffShowResetCode(){
  const email=(document.getElementById('staff-reset-email')?.value||'').trim().toLowerCase();
  const el=document.getElementById('staff-reset-result');if(!el)return;
  if(!email||!/^\S+@\S+\.\S+$/.test(email)){el.innerHTML=`<div style="color:var(--red);font-size:13px;font-weight:700">${t('errValidEmail')}</div>`;return;}
  const{data:cust}=await sb.from('customers').select('id,name').eq('email',email).maybeSingle();
  if(!cust){el.innerHTML=`<div style="color:var(--red);font-size:13px;font-weight:700">${t('errAccountNotFound')}</div>`;return;}
  const code=generateResetOTP(email);
  const mins=10-Math.floor((Date.now()%(10*60*1000))/(60*1000));
  el.innerHTML=`<div style="background:rgba(3,255,137,.07);border:1px solid rgba(3,255,137,.25);border-radius:12px;padding:16px 20px">
    <div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">${t('staffResetCode')} - ${esc(cust.name)}</div>
    <div style="font-size:42px;font-weight:900;letter-spacing:10px;color:var(--green);font-family:monospace;text-shadow:0 0 20px rgba(3,255,137,.35)">${code}</div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px;font-weight:600">⏱ ${t('staffResetExpiry').replace('10',String(mins))}</div>
  </div>`;
}

function showPayMenu(id,evt){
  document.querySelectorAll('.pay-menu-popup').forEach(m=>m.remove());
  const entry=getQueue().find(e=>e.id===id);
  if(!entry)return;
  const isHouse=entry.paid&&(entry.price??DEFAULT_PRICE)===0;
  const opts=[
    {label:`⏳ ${t('pendingLabel')}`,mode:'pending',active:!entry.paid},
    {label:`✓ ${t('paidLabel')}`,mode:'paid',active:entry.paid&&!isHouse},
    {label:`🏠 ${t('onTheHouseLabel')} · SAR 0`,mode:'house',active:isHouse},
  ];
  const menu=document.createElement('div');
  menu.className='pay-menu-popup';
  menu.style.cssText='position:fixed;z-index:9001;background:#1c1c1c;border:1.5px solid rgba(255,255,255,.15);border-radius:10px;padding:5px;min-width:200px;box-shadow:0 6px 24px rgba(0,0,0,.6)';
  menu.innerHTML=opts.map(o=>`<button class="pay-menu-opt${o.active?' active':''}" onclick="togglePayment('${id}','${o.mode}');document.querySelectorAll('.pay-menu-popup').forEach(m=>m.remove())">${o.label}</button>`).join('');
  document.body.appendChild(menu);
  const r=evt.currentTarget.getBoundingClientRect();
  const mh=menu.offsetHeight||100;
  const top=(r.bottom+4+mh>window.innerHeight)?r.top-mh-4:r.bottom+4;
  menu.style.left=Math.min(r.left,window.innerWidth-210)+'px';
  menu.style.top=top+'px';
  evt.stopPropagation();
  setTimeout(()=>{document.addEventListener('click',function close(e){if(!menu.contains(e.target)){menu.remove();document.removeEventListener('click',close);}});},0);
}
async function togglePayment(id,mode){
  const entry=getQueue().find(e=>e.id===id);
  if(!entry)return;
  const isHouse=entry.paid&&(entry.price??DEFAULT_PRICE)===0;
  // Determine next state: explicit mode or cycle pending→paid→house→pending
  let newPaid,newPrice;
  if(mode==='house'){newPaid=true;newPrice=0;}
  else if(mode===true||mode==='paid'){newPaid=true;newPrice=entry.price===0?_entryFallbackPrice(entry):(entry.price??DEFAULT_PRICE);}
  else if(mode===false||mode==='pending'){newPaid=false;newPrice=entry.price===0?_entryFallbackPrice(entry):(entry.price??DEFAULT_PRICE);}
  else{
    // cycle
    if(!entry.paid){newPaid=true;newPrice=entry.price;}
    else if(!isHouse){newPaid=true;newPrice=0;}
    else{newPaid=false;newPrice=_entryFallbackPrice(entry);}
  }
  const prevPaid=entry.paid,prevPrice=entry.price;
  entry.paid=newPaid;entry.price=newPrice;
  renderStaffQueue();renderHistory();
  const stateLabel=newPaid&&newPrice===0?'🏠 '+t('onTheHouseLabel'):newPaid?'✓ '+t('paidLabel'):t('pendingLabel');
  toast(stateLabel,newPaid?'':'warning');
  await sb.from('queue_entries').update({paid:newPaid,price:newPrice}).eq('id',id);
  await loadData();renderStaffQueue();renderHistory();
  pushUndo(`Payment #${entry.queueNum} ${entry.name}`,async()=>{
    await sb.from('queue_entries').update({paid:prevPaid,price:prevPrice}).eq('id',id);
    await loadData();renderStaffQueue();renderHistory();
  });
}

function pushUndo(label,fn){
  const logId='alog-'+Date.now()+'-'+Math.random().toString(36).slice(2);
  const logEntry={id:logId,label,fn,timestamp:Date.now(),undone:false};
  S.actionLog.unshift(logEntry);
  if(S.actionLog.length>100)S.actionLog.pop();
  S.undoStack.push({label,fn});
  if(S.undoStack.length>20)S.undoStack.shift();
  showUndoBar(label,async()=>{
    S.undoStack=S.undoStack.filter(i=>i.label!==label||i.fn!==fn);
    logEntry.undone=true;
    await fn();
    if(S.staffTab==='logs')renderLogs();
  });
  renderTopbarRight();
  if(S.staffTab==='logs')renderLogs();
}
async function doUndo(){
  const item=S.undoStack.pop();
  if(!item)return;
  try{
    await item.fn();
    toast(t('undoneMsg'));
  }catch(e){
    S.undoStack.push(item);
    toast('Undo failed.','error');
  }
  renderTopbarRight();
}

async function confirmCancelWithReason(id){
  const idx=window._cancelReason;
  if(idx===null||idx===undefined){toast(t('cancelReasonTitle'),'error');return;}
  let reason;

}

async function cancelBooking(id,reason){
  const entry=getQueue().find(e=>e.id===id);
  if(!entry||entry.status!=='waiting'){toast(t('errCancelWaiting'),'error');return;}
  const behind=getQueue().filter(e=>e.sessionId===entry.sessionId&&e.status==='waiting'&&e.queueNum>entry.queueNum);
  const savedBehind=behind.map(e=>({id:e.id,queueNum:e.queueNum}));
  const savedQNum=entry.queueNum;
  await sb.from('queue_entries').update({status:'cancelled'}).eq('id',id);
  await Promise.all(savedBehind.map(e=>sb.from('queue_entries').update({queue_num:e.queueNum-1}).eq('id',e.id)));
  // Log cancellation with reason for staff to see
  if(reason){
    S.cancellationLog.unshift({
      entryId:id,name:entry.name,queueNum:savedQNum,reason,
      session:dayLabel(entry.sessionDay)+' '+shortDate(entry.sessionDate),
      time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),
      timestamp:Date.now()
    });
    if(S.cancellationLog.length>100)S.cancellationLog.pop();
    try{localStorage.setItem('cq_cancellations',JSON.stringify(S.cancellationLog));}catch(e){}
  }
  await loadData();
  toast(t('toastBookingCancelled'));
  pushUndo(`Cancel booking #${savedQNum} ${entry.name}`,async()=>{
    await sb.from('queue_entries').update({status:'waiting',queue_num:savedQNum}).eq('id',id);
    await Promise.all(savedBehind.map(e=>sb.from('queue_entries').update({queue_num:e.queueNum}).eq('id',e.id)));
    await loadData();renderMyRides();renderStaffQueue();
  });
  renderMyRides();
}

async function staffCancelEntry(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry)return;
  if(entry.status!=='waiting'&&entry.status!=='active'){toast('Cannot cancel this entry.','error');return;}
  const statusLabel=entry.status==='active'?'on bike':'waiting';
  confirmDialog({
    title:`Cancel booking #${entry.queueNum}`,
    body:`<strong>${esc(entry.name)}</strong> (${statusLabel})<br>This will release any assigned bike and mark the entry as cancelled.`,
    confirmLabel:'Cancel booking',
    confirmClass:'btn-red',
    onConfirm:async()=>{
      const bikeIds=getAssignedBikeIds(entry);
      const savedStatus=entry.status;
      const savedAssigned=entry.assignedBikeId;
      if(entry.status==='waiting'){
        const behind=getQueue().filter(e=>e.sessionId===entry.sessionId&&e.status==='waiting'&&e.queueNum>entry.queueNum);
        const savedBehind=behind.map(e=>({id:e.id,queueNum:e.queueNum}));
        const savedQNum=entry.queueNum;
        await sb.from('queue_entries').update({status:'cancelled'}).eq('id',id);
        await Promise.all(savedBehind.map(e=>sb.from('queue_entries').update({queue_num:e.queueNum-1}).eq('id',e.id)));
        await loadData();
        toast(`Booking #${savedQNum} cancelled.`);
        pushUndo(`Staff cancel #${savedQNum} ${entry.name}`,async()=>{
          await sb.from('queue_entries').update({status:'waiting',queue_num:savedQNum}).eq('id',id);
          await Promise.all(savedBehind.map(e=>sb.from('queue_entries').update({queue_num:e.queueNum}).eq('id',e.id)));
          await loadData();renderMyRides();renderStaffQueue();
        });
      }else{
        const calls=[sb.from('queue_entries').update({status:'cancelled',assigned_bike_id:null}).eq('id',id)];
        bikeIds.forEach(bid=>calls.push(sb.from('bikes').update({status:'available'}).eq('id',bid)));
        await Promise.all(calls);
        await loadData();
        try{localStorage.removeItem('cq_ct_'+id);}catch(e){}
        toast(`Booking #${entry.queueNum} cancelled.`);
        pushUndo(`Staff cancel #${entry.queueNum} ${entry.name}`,async()=>{
          const assignedVal=bikeIds.length===1?bikeIds[0]:(bikeIds.length?JSON.stringify(bikeIds):null);
          const calls2=[sb.from('queue_entries').update({status:savedStatus,assigned_bike_id:assignedVal}).eq('id',id)];
          bikeIds.forEach(bid=>calls2.push(sb.from('bikes').update({status:'in-use'}).eq('id',bid)));
          await Promise.all(calls2);
          await loadData();renderStaffQueue();
        });
      }
      renderMyRides();renderStaffQueue();
    }
  });
}

async function doNoShow(id){

  const behind=getQueue().filter(e=>e.sessionId===entry.sessionId&&e.status==='waiting'&&e.queueNum>entry.queueNum);
  const savedBehind=behind.map(e=>({id:e.id,queueNum:e.queueNum}));

  await sb.from('queue_entries').update({status:'noshow'}).eq('id',id);
  await Promise.all(behind.map(e=>sb.from('queue_entries').update({queue_num:e.queueNum-1}).eq('id',e.id)));

async function doUndoNoShow(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry||entry.status!=='noshow')return;

  const ahead=getQueue().filter(e=>e.sessionId===entry.sessionId&&e.status==='waiting'&&e.queueNum>=entry.queueNum);
  const savedAhead=ahead.map(e=>({id:e.id,queueNum:e.queueNum}));

  pushUndo(`Undo no-show #${entry.queueNum} ${entry.name}`,async()=>{
    await sb.from('queue_entries').update({status:'noshow'}).eq('id',id);
    await Promise.all(savedAhead.map(e=>sb.from('queue_entries').update({queue_num:e.queueNum}).eq('id',e.id)));

function closeFactoryReset(){const m=document.getElementById('factory-reset-modal');if(m)m.style.display='none';}
async function execFactoryReset(){
  const doQueue    =document.getElementById('rst-queue')?.checked;
  const doSessions =document.getElementById('rst-sessions')?.checked;
  const doBikes    =document.getElementById('rst-bikes')?.checked;
  const doCustomers=document.getElementById('rst-customers')?.checked;
  closeFactoryReset();
  try{
    // Delete in FK dependency order: queue_entries first, then sessions/bikes, then customers last
    // If deleting customers, queue_entries MUST also be cleared (FK constraint)
    const needQueueClear=doQueue||doCustomers;
    if(needQueueClear){
      const{error}=await sb.from('queue_entries').delete().neq('id','__none__');
      if(error)throw error;
    }
    if(doSessions){
      const{error}=await sb.from('sessions').delete().neq('id','__none__');
      if(error)throw error;
    }
    if(doBikes){
      const{error}=await sb.from('bikes').delete().neq('id','__none__');
      if(error)throw error;
    }
    if(doCustomers){
      const{error}=await sb.from('customers').delete().neq('id','__none__');
      if(error)throw error;
    }
    // Clear local state
    localStorage.removeItem('cq_cancellations');
    S.cancellationLog=[];S.histLog=[];
    if(doCustomers){clearSession();S.loggedIn=null;}
    await loadData();
    toast('Reset complete.','warning');
    renderStaffQueue();
    if(doSessions)renderSessions();
    if(doBikes)renderBikes();
    if(needQueueClear)renderHistory();
  }catch(e){
    console.error('Factory reset error:',e);
    toast('Reset failed: '+((e&&e.message)||'check Supabase permissions.'),'error');
  }
}

function rideElapsed(id){
  try{
    const ts=localStorage.getItem('cq_ct_'+id);
    if(!ts)return null;
    const min=Math.floor((Date.now()-Number(ts))/60000);
    if(min<1)return'<1 min';
    if(min<60)return`${min} min`;
    return`${Math.floor(min/60)}h ${min%60}m`;
  }catch(e){return null;}
}
function statusCellHtml(e){
  const badge=statusBadge(e.status);
  const el=e.status==='active'?rideElapsed(e.id):null;

/* ── PRINT REPORT ───────────────────────────────── */
function printSessionReport(){
  const sessId=S.sfSession;if(sessId==='all')return;
  const sess=allSessions().find(s=>s.id===sessId);if(!sess)return;
  const entries=getQueue()
    .filter(e=>e.sessionId===sessId&&e.status!=='removed')
    .sort((a,b)=>a.queueNum-b.queueNum);
  const active=entries.filter(e=>!['noshow','cancelled','removed'].includes(e.status));
  const totalSAR=active.reduce((s,e)=>s+(e.price??DEFAULT_PRICE),0);
  const paidSAR=active.filter(e=>e.paid&&(e.price??DEFAULT_PRICE)>0).reduce((s,e)=>s+(e.price??DEFAULT_PRICE),0);
  const pendingSAR=totalSAR-paidSAR;
  const statusLabels={waiting:'Waiting',active:'On Bike',done:'Done',noshow:'No-Show',cancelled:'Cancelled'};
  // Group entries: multi-entry bookings by same customerId are merged into one row
  const groups=[];
  const usedIds=new Set();
  for(const e of entries){
    if(usedIds.has(e.id))continue;
    if(e.customerId){
      const group=entries.filter(x=>x.customerId===e.customerId&&!usedIds.has(x.id));
      group.forEach(x=>usedIds.add(x.id));
      groups.push(group);
    }else{
      usedIds.add(e.id);
      groups.push([e]);
    }
  }
  const rows=groups.map(group=>{
    const lead=group[0];
    const qNums=group.map(x=>`#${x.queueNum}`).join(', ');
    const allBikes=[...new Set(group.flatMap(x=>getAssignedBikes(x).map(b=>b.name)))].join(', ')||'—';
    const totalPrice=group.reduce((s,x)=>s+(x.price??DEFAULT_PRICE),0);
    const allPaid=group.every(x=>x.paid);
    const somePaid=group.some(x=>x.paid);
    const payLabel=allPaid?'Paid':somePaid?'Partial':'Pending';
    const payColor=allPaid?'#16a34a':somePaid?'#2563eb':'#b45309';
    const statusPriority={active:0,waiting:1,done:2,noshow:3,cancelled:4};
    const topStatus=group.sort((a,b)=>(statusPriority[a.status]??5)-(statusPriority[b.status]??5))[0].status;
    const phone=lead.phone||'';
    const email=lead.email||'';
    const types=[...new Set(group.map(x=>x.typePreference).filter(Boolean))].join(', ')||'—';
    return`<tr>
      <td>${qNums}</td>
      <td>${esc(lead.name)}</td>
      <td>${types}</td>
      <td>${allBikes}</td>
      <td>${phone?`<a href="tel:${phone}">${phone}</a>`:''}</td>
      <td>${email?`<a href="mailto:${email}">${email}</a>`:''}</td>
      <td>SAR ${totalPrice}</td>
      <td style="color:${payColor}">${payLabel}</td>
      <td>${statusLabels[topStatus]||topStatus}</td>
    </tr>`;
  }).join('');
  const html=`<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
    <title>${t('printReportTitle')}</title>
    <style>
      *{box-sizing:border-box;margin:0;padding:0;}
      body{font-family:system-ui,sans-serif;padding:28px 32px;color:#111;font-size:13px;}
      h1{font-size:22px;font-weight:900;margin-bottom:4px;}
      .meta{color:#666;font-size:12px;margin-bottom:20px;}
      .totals{display:flex;gap:24px;padding:14px 0 20px;}
      .total-item{display:flex;flex-direction:column;}
      .total-num{font-size:20px;font-weight:900;}
      .total-lbl{font-size:11px;color:#666;margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}
      table{width:100%;border-collapse:collapse;}
      th{border-bottom:2px solid #222;padding:7px 10px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;}
      td{border-bottom:1px solid #e5e7eb;padding:8px 10px;}
      tr:last-child td{border-bottom:none;}
      a{color:inherit;text-decoration:none;}
      @media print{body{padding:16px;}button{display:none;}}
    </style>
  </head><body>
    <h1>${dayLabel(sess.day)} - ${shortDate(sess.session_date||sess.sessionDate||sess.id)}</h1>
    <div class="meta">${t('printReportTitle')} &nbsp;·&nbsp; ${new Date().toLocaleString('en-SA',{timeZone:KSA_TZ})}</div>
    <div class="totals">
      <div class="total-item"><span class="total-num">${entries.length}</span><span class="total-lbl">${t('printTotalRiders')}</span></div>
      <div class="total-item"><span class="total-num">SAR ${totalSAR}</span><span class="total-lbl">${t('colRevenue')||'Revenue'}</span></div>
      <div class="total-item"><span class="total-num" style="color:#16a34a">SAR ${paidSAR}</span><span class="total-lbl">${t('printCollected')}</span></div>
      <div class="total-item"><span class="total-num" style="color:#b45309">SAR ${pendingSAR}</span><span class="total-lbl">${t('printPending')}</span></div>
    </div>
    <table>
      <thead><tr><th>#</th><th>Name</th><th>Type</th><th>Bike</th><th>Phone</th><th>Email</th><th>Price</th><th>Payment</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <br><button onclick="window.print()" style="margin-top:16px;padding:8px 20px;background:#111;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700">Print</button>
  </body></html>`;
  const w=window.open('','_blank','width=1100,height=720');
  if(!w)return;
  w.document.write(html);w.document.close();w.focus();
  setTimeout(()=>w.print(),400);
}

    action,
    entryId:entry.id,
    name:entry.name,
    queueNum:entry.queueNum,
    session:dayLabel(entry.sessionDay)+' '+shortDate(entry.sessionDate),

async function doRemove(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry)return;
  const prevStatus=entry.status;
  addHistLog('Removed',entry,async()=>{
    await sb.from('queue_entries').update({status:prevStatus==='done'?'done':'waiting'}).eq('id',id);
    await loadData();renderStaffQueue();renderHistory();
  });
  await sb.from('queue_entries').update({status:'removed'}).eq('id',id);
  await loadData();toast(t('toastRiderRemoved'));
  renderStaffQueue();renderHistory();
}

async function doRestoreEntry(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry)return;
  const restoreStatus=entry.assignedBikeId?'done':'waiting';
  addHistLog('Restored',entry,async()=>{
    await sb.from('queue_entries').update({status:'removed'}).eq('id',id);
    await loadData();renderHistory();
  });
  await sb.from('queue_entries').update({status:restoreStatus}).eq('id',id);
  await loadData();toast(t('restoreEntryBtn')||'Restored');
  renderHistory();
}

async function undoHistLog(logId){
  const log=S.histLog.find(l=>l.id===logId);
  if(!log||log.undone||!log.undoFn){toast('Nothing to undo','warning');return;}
  try{
    await log.undoFn();
    log.undone=true;
    renderHistory();
    toast(t('undoneMsg'));
  }catch(e){toast(t('undoFailed'),'error');}
}

function openModal(riderId){

function renderModal(){
  const rider=getQueue().find(e=>e.id===S.modalRider);if(!rider)return;
  const allBikes=getBikes();

  // Determine session fleet plan (advisory — for sorting/badging only)
  const sess=S.sessions.find(s=>s.id===rider.sessionId);
  const slots=sess?parseSlots(sess.bike_slots):null;
  const fmt=slotsFormat(slots);

  // Check if a bike is part of the session's fleet plan
  function inFleet(b){
    if(!slots)return true;
    if(fmt==='ids')return(slots._bikes||[]).includes(b.id);
    if(fmt==='counts')return(slots[b.type]||0)>0;
    // legacy type×size format
    return slots[b.type]&&(typeof slots[b.type]==='number'?(slots[b.type]>0):(slots[b.type][b.size]||0)>0);
  }

  // Separate into preferred-type bikes and others
  const prefType=rider.typePreference;
  const sortBikes=arr=>[...arr].sort((a,b)=>{
    const aFree=a.status==='available'?0:1,bFree=b.status==='available'?0:1;
    const aSz=a.size===rider.size?0:1,bSz=b.size===rider.size?0:1;
    const aFleet=inFleet(a)?0:1,bFleet=inFleet(b)?0:1;
    return aFree-bFree||aSz-bSz||aFleet-bFleet||a.name.localeCompare(b.name);
  });
  const mq=(S.modalSearch||'').trim().toLowerCase();
  const matchSearch=b=>!mq||[b.name,b.brand,b.model,b.type,b.size,b.groupset].some(v=>v&&String(v).toLowerCase().includes(mq));
  const prefBikes=sortBikes((prefType==='Any'?allBikes:allBikes.filter(b=>b.type===prefType)).filter(matchSearch));
  const otherBikes=prefType==='Any'?[]:sortBikes(allBikes.filter(b=>b.type!==prefType&&matchSearch(b)));
  const otherAvail=otherBikes.filter(b=>b.status==='available').length;

function closeModal(){document.getElementById('bike-modal').style.display='none';S.modalRider=null;S.modalBikes=[];S.modalShowAll=false;S.modalShowAddBike=false;S.modalSearch='';}
async function modalQuickAddBike(){
  const name=(document.getElementById('modal-bike-name')?.value||S.modalAddBikeName||'').trim();
  if(!name){toast(t('errBikeName'),'error');return;}
  if(!S.modalAddBikeType){toast(t('errBikeTypeReq'),'error');return;}
  const bike={id:uid(),name,size:S.modalAddBikeSize||'M',type:S.modalAddBikeType,colors:['#6ee89a'],color_names:[''],status:'available',brand:null,model:null,groupset:null,speeds:null};
  await sb.from('bikes').insert(bike);
  await loadData();
  S.modalBikes.push(bike.id);
  S.modalShowAddBike=false;S.modalAddBikeName='';S.modalAddBikeType=null;S.modalAddBikeSize='M';
  toast(`${name} ${t('toastAddedToFleet')}`);
  renderModal();
}
async function confirmAssign(){
  if(S.modalBikes.length===0){toast(t('errSelectBike'),'error');return;}
  const allBikes=getBikes();
  const selected=S.modalBikes.map(id=>allBikes.find(b=>b.id===id)).filter(Boolean);
  // Check all selected bikes are still available (unless already assigned to this rider)
  const rider=getQueue().find(e=>e.id===S.modalRider);
  const alreadyAssigned=rider?getAssignedBikeIds(rider):[];
  const needsUpdate=selected.filter(b=>!alreadyAssigned.includes(b.id));
  const unavail=needsUpdate.filter(b=>b.status!=='available');
  if(unavail.length>0){toast(`${unavail[0].name}: ${t('errBikeUnavailable')}`,'error');return;}
  const riderId=S.modalRider;
  const qn=rider?rider.queueNum:'?';const rName=rider?rider.name:'';
  const bikeNames=selected.map(b=>b.name).join(', ');
  const prevPrice=rider?rider.price:null;
  // Set price from assigned bike's rental_price (falls back to type price if not configured)
  const priceUpdate={};
  if(rider&&selected.length>0){
    priceUpdate.price=selected.length===1
      ?priceForBike(selected[0])
      :Math.max(...selected.map(b=>priceForBike(b)));
  }
  const isReassign=rider&&rider.status==='active';
  // Free old bikes that are being replaced (reassign case)
  const toFree=alreadyAssigned.filter(id=>!S.modalBikes.includes(id));
  // First free replaced bikes, then mark new ones in-use
  await Promise.all([
    ...toFree.map(id=>sb.from('bikes').update({status:'available'}).eq('id',id)),
    ...needsUpdate.map(b=>sb.from('bikes').update({status:'in-use'}).eq('id',b.id)),
  ]);
  // Try to store full ordered list; fall back to first bike ID if FK constraint rejects JSON
  let assignedVal;
  if(S.modalBikes.length===1){
    assignedVal=S.modalBikes[0];
    await sb.from('queue_entries').update({status:'active',assigned_bike_id:assignedVal,...priceUpdate}).eq('id',riderId);
  }else{
    // Try JSON array first
    const jsonVal=JSON.stringify(S.modalBikes);
    const{error}=await sb.from('queue_entries').update({status:'active',assigned_bike_id:jsonVal,...priceUpdate}).eq('id',riderId);
    if(error){
      // FK constraint — store primary bike only, mark others in session notes
      assignedVal=S.modalBikes[0];
      await sb.from('queue_entries').update({status:'active',assigned_bike_id:assignedVal,...priceUpdate}).eq('id',riderId);
      // Store extra bike IDs in queue_num temporarily via a workaround flag in S
      S._extraBikes=S._extraBikes||{};
      S._extraBikes[riderId]=S.modalBikes;
    }else{
      assignedVal=jsonVal;
    }
  }
  await loadData();closeModal();
  if(isReassign){
    toast(t('toastBikeChanged'));
    pushUndo(`Change bike #${qn} ${rName}`,async()=>{
      await Promise.all([
        ...needsUpdate.map(b=>sb.from('bikes').update({status:'available'}).eq('id',b.id)),
        ...toFree.map(id=>sb.from('bikes').update({status:'in-use'}).eq('id',id)),
        sb.from('queue_entries').update({assigned_bike_id:alreadyAssigned.length===1?alreadyAssigned[0]:JSON.stringify(alreadyAssigned)}).eq('id',riderId),
      ]);
      await loadData();renderStaffQueue();
    });
  }else{
    toast(`${bikeNames} ${t('toastAssignedChecked')}`);
    try{localStorage.setItem('cq_ct_'+riderId,Date.now());}catch(e){}
    pushUndo(`Check-in #${qn} ${rName}`,async()=>{
      try{localStorage.removeItem('cq_ct_'+riderId);}catch(e){}
      const undoEntry={status:'waiting',assigned_bike_id:null};
      if(priceUpdate.price!=null&&prevPrice!=null)undoEntry.price=prevPrice;
      await Promise.all([
        ...needsUpdate.map(b=>sb.from('bikes').update({status:'available'}).eq('id',b.id)),
        sb.from('queue_entries').update(undoEntry).eq('id',riderId),
      ]);
      await loadData();renderStaffQueue();
    });
  }
  S._flashId=riderId;S._flashColor='green';setTimeout(()=>{S._flashId=null;},800);
  renderStaffQueue();
}

  });

  function renderBikeRow(b){
    const dot=b.status==='available'?'dot-green':b.status==='in-use'?'dot-blue':'dot-red';
    const slbl=b.status==='available'?t('availLabel'):b.status==='in-use'?t('inUseLabel'):t('maintLabel');
    const sclr=b.status==='available'?'var(--green)':b.status==='in-use'?'var(--blue)':'var(--red)';
    const colors=b.colors&&b.colors.length?b.colors:['#03ff89'];
    const colorSwatches=colors.map((c,ci)=>{
      const cn=b.color_names&&b.color_names[ci]?b.color_names[ci]:'';
      return`<div style="display:flex;flex-direction:column;align-items:center;gap:3px">
        <span title="${esc(cn)}" style="display:inline-block;width:13px;height:13px;border-radius:50%;background:${c};border:1.5px solid rgba(0,0,0,.3);flex-shrink:0"></span>
        ${cn?`<span style="font-size:9px;font-weight:700;color:var(--muted-l);white-space:nowrap;max-width:40px;overflow:hidden;text-overflow:ellipsis">${esc(cn)}</span>`:''}
      </div>`;
    }).join('');
    // Who is currently using this bike?
    const user=bikeUserMap[b.id];
    const orphaned=b.status==='in-use'&&!user;
    const el=b.status==='in-use'&&user?rideElapsed(user.id):null;
    const riderCell=user
      ?`<div style="font-size:12px;font-weight:800;color:var(--text)">${esc(user.name)}</div>
        <div style="font-size:11px;color:var(--blue);font-weight:700">#${user.queueNum}${el?` &nbsp;·&nbsp; <span style="color:var(--muted-l)">&#x23F1; ${el}</span>`:''}</div>`
      :orphaned
        ?`<div style="font-size:11px;font-weight:700;color:#e08828">&#x26A0; ${t('noRiderAssigned')}</div>`
        :`<span style="color:var(--muted)">—</span>`;
    const rowBorderClr=orphaned?'rgba(224,136,40,.7)':b.status==='available'?'rgba(3,255,137,.45)':b.status==='in-use'?'rgba(74,168,248,.45)':'rgba(224,64,64,.45)';
    const rowBg=orphaned?'background:rgba(224,136,40,.06);':b.status==='in-use'?'background:rgba(74,168,248,.025);':b.status==='maintenance'?'background:rgba(224,64,64,.025);opacity:.8;':'';
    return`<tr style="border-left:3px solid ${rowBorderClr};${rowBg}">
      <td><div class="rider-name">${esc(b.name)}</div></td>
      <td style="font-weight:700;font-size:13px">${b.brand?esc(b.brand):`<span style="color:var(--muted)">—</span>`}</td>
      <td style="font-weight:700;font-size:13px">${b.model?esc(b.model):`<span style="color:var(--muted)">—</span>`}</td>
      <td style="font-weight:700;font-size:13px">${b.groupset?esc(b.groupset):`<span style="color:var(--muted)">—</span>`}</td>
      <td style="font-weight:700;font-size:13px;text-align:center">${b.speeds?`${b.speeds}`:`<span style="color:var(--muted)">—</span>`}</td>
      <td>${typeBadge(b.type)}</td>
      <td style="font-weight:800">${b.size}</td>
      <td style="font-weight:700;white-space:nowrap">${b.rental_price!=null?`SAR ${b.rental_price}`:`<span style="color:var(--muted)">—</span>`}</td>
      <td><div style="display:flex;gap:4px;align-items:center">${colorSwatches}</div></td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="avail-dot ${dot}" style="display:inline-block;flex-shrink:0"></span>
          <span style="color:${sclr};font-weight:700;font-size:12px">${slbl}</span>
        </div>
      </td>
      <td>${riderCell}</td>
      <td><div class="actions-cell">
        <button class="btn-sm btn-blue" onclick="startEdit('${b.id}')">${t('editBtn')}</button>
        ${orphaned?`<button class="btn-sm btn-orange" onclick="releaseBike('${b.id}')">${t('releaseBikeBtn')}</button>`:`<button class="btn-sm btn-orange" onclick="toggleMaint('${b.id}')">${b.status==='maintenance'?t('restoreBtn'):t('maintBtn')}</button>`}
        <button class="btn-sm btn-red" ${b.status!=='in-use'?`onclick="delBike('${b.id}')"`:' disabled'}>${t('deleteBtn')}</button>
      </div></td>
    </tr>`;
  }

  function sortDir(col){return S.bkSortCol===col?S.bkSortDir:0;}
  function sortHdr(col,label){
    const d=sortDir(col);
    const arrow=d===1?' ↑':d===-1?' ↓':'';
    return`<th style="cursor:pointer;user-select:none;white-space:nowrap${d?';color:var(--green)':''}" onclick="S.bkSortDir=(S.bkSortCol==='${col}'&&S.bkSortDir===1)?-1:1;S.bkSortCol='${col}';renderBikes()">${label}${arrow}</th>`;
  }

  function renderBikeGrid(typeBikes){
    if(!typeBikes.length)return`<div class="empty-state">${t('noBikes')}</div>`;
    return`<div class="bike-grid">${typeBikes.map(b=>{
      const dot=b.status==='available'?'dot-green':b.status==='in-use'?'dot-blue':'dot-red';
      const user=bikeUserMap[b.id];
      const orphaned=b.status==='in-use'&&!user;
      const sclr=b.status==='available'?'var(--green)':b.status==='in-use'?'var(--blue)':'var(--red)';
      const borderClr=orphaned?'rgba(224,136,40,.7)':b.status==='available'?'rgba(3,255,137,.4)':b.status==='in-use'?'rgba(74,168,248,.4)':'rgba(224,64,64,.4)';
      const bgStyle=orphaned?'background:rgba(224,136,40,.06);':b.status==='in-use'?'background:rgba(74,168,248,.025);':b.status==='maintenance'?'background:rgba(224,64,64,.025);opacity:.8;':'';
      const colors=b.colors&&b.colors.length?b.colors:['#03ff89'];
      const dots=colors.map(c=>`<span style="width:11px;height:11px;border-radius:50%;background:${c};border:1.5px solid rgba(0,0,0,.3);display:inline-block;flex-shrink:0"></span>`).join('');
      const el=b.status==='in-use'&&user?rideElapsed(user.id):null;
      return`<div class="bike-grid-card" style="border-color:${borderClr};${bgStyle}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:6px">
          <div style="font-weight:900;font-size:13px;line-height:1.3">${esc(b.name)}</div>
          <div style="display:flex;gap:3px;flex-shrink:0">${dots}</div>
        </div>
        <div style="display:flex;gap:5px;align-items:center;margin-bottom:8px;flex-wrap:wrap">
          ${typeBadge(b.type)}
          <span style="background:var(--s3);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:800;color:var(--muted-l)">${b.size}</span>
        </div>
        <div style="display:flex;align-items:center;gap:5px${(user||orphaned)?';margin-bottom:5px':''}">
          <span class="avail-dot ${dot}" style="display:inline-block;flex-shrink:0"></span>
          <span style="color:${sclr};font-weight:700;font-size:12px">${b.status==='available'?t('availLabel'):b.status==='in-use'?t('inUseLabel'):t('maintLabel')}</span>
          ${el?`<span style="font-size:10px;color:var(--blue);font-weight:700;margin-left:2px">⏱ ${el}</span>`:''}
        </div>
        ${user?`<div style="font-size:11px;font-weight:700;color:var(--green)">&#x1F464; #${user.queueNum} ${esc(user.name)}</div>`:orphaned?`<div style="font-size:11px;font-weight:700;color:#e08828">&#x26A0; ${t('noRiderAssigned')}</div>`:''}
        <div style="display:flex;flex-direction:column;gap:4px;margin-top:10px">
          <div style="display:flex;gap:4px">
            <button class="btn-sm btn-blue" style="flex:1" onclick="startEdit('${b.id}')">${t('editBtn')}</button>
            <button class="btn-sm btn-red" style="flex:1" ${b.status!=='in-use'?`onclick="delBike('${b.id}')"`:' disabled'}>${t('deleteBtn')}</button>
          </div>
          ${orphaned?`<button class="btn-sm btn-orange" style="width:100%;justify-content:center;text-align:center" onclick="releaseBike('${b.id}')">${t('releaseBikeBtn')}</button>`:`<button class="btn-sm btn-orange" style="width:100%;justify-content:center;text-align:center" onclick="toggleMaint('${b.id}')">${b.status==='maintenance'?t('restoreBtn'):t('maintBtn')}</button>`}
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  function renderTypeSection(ty,color){
    if(S.bkTypeFilter!=='all'&&S.bkTypeFilter!==ty) return '';
    let typeBikes=bikes.filter(b=>b.type===ty);
    if(S.bkStatus!=='all') typeBikes=typeBikes.filter(b=>b.status===S.bkStatus);
    if(S.bkSize!=='all')   typeBikes=typeBikes.filter(b=>b.size===S.bkSize);
    if(bkSearch){
      const q=bkSearch.toLowerCase();
      typeBikes=typeBikes.filter(b=>[b.name,b.brand,b.model,b.groupset,b.size,b.type].some(v=>v&&String(v).toLowerCase().includes(q)));
    }
    const col=S.bkSortCol||'name';const dir=S.bkSortDir||1;
    typeBikes.sort((a,b)=>{
      let v=0;
      if(col==='name')    v=a.name.localeCompare(b.name);
      else if(col==='brand')   v=(a.brand||'').localeCompare(b.brand||'');
      else if(col==='model')   v=(a.model||'').localeCompare(b.model||'');
      else if(col==='groupset')v=(a.groupset||'').localeCompare(b.groupset||'');
      else if(col==='speeds')  v=(a.speeds||0)-(b.speeds||0);
      else if(col==='size')    v=(sizeOrder[a.size]??9)-(sizeOrder[b.size]??9);
      else if(col==='status')  v=(sortOrder[a.status]??9)-(sortOrder[b.status]??9);
      return v!==0?v*dir:a.name.localeCompare(b.name);
    });
    const all=bikes.filter(b=>b.type===ty);
    const tyAvail=all.filter(b=>b.status==='available').length;
    const tyUse  =all.filter(b=>b.status==='in-use').length;
    const tyMaint=all.filter(b=>b.status==='maintenance').length;
    const typeContent=S.bkView==='grid'
      ?renderBikeGrid(typeBikes)
      :`<div class="table-wrapper"><table class="queue-table">
        <thead><tr>
          ${sortHdr('name',t('bikeNameLabel'))}
          ${sortHdr('brand',t('bikeBrand'))}
          ${sortHdr('model',t('bikeModel'))}
          ${sortHdr('groupset',t('bikeGroupset'))}
          ${sortHdr('speeds',t('bikeSpeeds'))}
          <th>${t('bikeTypeLabel')}</th>
          ${sortHdr('size',t('frameSizeLabel'))}
          <th>Rental Price</th>
          <th>${t('colColor')}</th>
          ${sortHdr('status',t('colStatus'))}
          <th>${t('colRider')}</th>
          <th></th>
        </tr></thead>
        <tbody>${typeBikes.length?typeBikes.map(renderBikeRow).join(''):`<tr><td colspan="11" style="padding:16px 0">${emptyIllustration(ILLUS_BIKE_OK,t('noBikes'))}</td></tr>`}</tbody>
      </table></div>`;
    return`<div style="margin-bottom:28px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:4px;height:32px;border-radius:3px;background:${color};flex-shrink:0"></div>
          <div>
            <div style="font-size:17px;font-weight:900">${typeLabel(ty)}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px;font-weight:600">
              ${all.length} ${t('bike').toLowerCase()}${all.length!==1?'s':''} &nbsp;·&nbsp;
              <span style="color:var(--green)">${tyAvail} ${t('availLabel').toLowerCase()}</span>
              ${tyUse>0?` &nbsp;·&nbsp; <span style="color:var(--muted-l)">${tyUse} ${t('inUseLabel').toLowerCase()}</span>`:''}
              ${tyMaint>0?` &nbsp;·&nbsp; <span style="color:var(--red)">${tyMaint} ${t('maintLabel').toLowerCase()}</span>`:''}
            </div>
          </div>
        </div>
        <button class="btn-secondary" style="font-size:12px;padding:6px 12px"
          onclick="S.showAddBike=true;S.addBikeType='${ty}';S.editBikeId=null;S.addBikeSize='M';S.addBikeColors=['#03ff89'];S.addBikeColorNames=[''];S._bkName='';renderBikes()">
          + ${typeLabel(ty)}
        </button>
      </div>
      ${typeContent}
    </div>`;
  }

  const typeColorMap={Road:'#4aa8f8',Hybrid:'#03ff89',Mountain:'#e08828'};
  const typeSections=['Road','Hybrid','Mountain'].map(ty=>renderTypeSection(ty,typeColorMap[ty])).join('');

  document.getElementById('tab-bikes').innerHTML=`
    <div class="section-header">
      <div>
        <div class="page-title">${t('bikesTitle')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="view-toggle">
          <button class="view-toggle-btn${S.bkView==='grid'?' active':''}" onclick="S.bkView='grid';renderBikes()" title="${t('gridViewBtn')}">⊞</button>
          <button class="view-toggle-btn${S.bkView==='table'?' active':''}" onclick="S.bkView='table';renderBikes()" title="${t('tableViewBtn')}">☰</button>
        </div>
        <button class="btn-primary" onclick="toggleAddBike()">${t('addBike')}</button>
      </div>
    </div>
    ${addForm}
    <div class="stats-row" style="margin-bottom:20px">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">${t('totalStat')}</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--green)">${nAvail}</div><div class="stat-label">${t('availLabel')}</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--text)">${nUse}</div><div class="stat-label">${t('inUseLabel')}</div></div>
    </div>
    <div class="filter-bar" style="margin-bottom:20px">
      <div class="filter-row" style="flex-wrap:wrap;gap:10px;align-items:flex-end">
        <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:180px;max-width:280px">
          <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">Search</span>
          <input id="bk-search-input" type="text" class="filter-select" placeholder="Name, brand, model…" value="${esc(bkSearch)}" oninput="setBkSearch(this.value)">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">Type</span>
          <select class="filter-select" onchange="S.bkTypeFilter=this.value;renderBikes()">${bkTypeOpts}</select>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">Status</span>
          <select class="filter-select" onchange="setBkStatus(this.value)">${bkStatusOpts}</select>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">Size</span>
          <select class="filter-select" onchange="setBkSize(this.value)">${bkSizeOpts}</select>
        </div>
        ${bkSearch||S.bkTypeFilter!=='all'||S.bkStatus!=='all'||S.bkSize!=='all'?`<button class="btn-secondary" style="font-size:12px;padding:5px 10px;align-self:flex-end" onclick="S.bkSearch='';S.bkTypeFilter='all';S.bkStatus='all';S.bkSize='all';renderBikes()">✕ Clear</button>`:''}
      </div>
    </div>
    ${typeSections}`;
  const nameEl=document.getElementById('bk-name');
  if(nameEl)nameEl.addEventListener('input',e=>S._bkName=e.target.value);
}

function _resetBikeForm(){S.showAddBike=false;S.editBikeId=null;S.addBikeType=null;S.addBikeSize='M';S.addBikeColors=['#6ee89a'];S.addBikeColorNames=[''];S._bkName='';S._bkBrand='';S._bkModel='';S._bkGroupset='';S._bkSpeeds='';S._bkRentalPrice='';S._bkBrandAdd=false;S._bkModelAdd=false;S._bkGroupsetAdd=false;}

function setBkRentalPrice(v){
  if(v==='custom'){
    _showCustomPriceModal();
  }else{
    S._bkRentalPrice=v;
    renderBikes();
  }
}
function _showCustomPriceModal(){
  const m=document.getElementById('confirm-modal');
  m.style.display='block';
  m.innerHTML=`<div class="modal-backdrop" onclick="if(event.target===this){m.style.display='none';m.innerHTML='';renderBikes();}">
    <div class="confirm-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div style="font-size:18px;font-weight:900">Custom Rental Price</div>
        <button onclick="document.getElementById('confirm-modal').style.display='none';document.getElementById('confirm-modal').innerHTML='';renderBikes()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1;padding:0 4px" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">&times;</button>
      </div>
      <div style="margin-bottom:20px">
        <label style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:8px">Price (SAR)</label>
        <input id="custom-price-inp" type="number" min="1" step="0.5" placeholder="e.g. 120"
          style="width:100%;background:var(--s2);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px 14px;font-size:16px;font-weight:700;color:var(--text);font-family:'Space Grotesk',sans-serif;outline:none"
          onfocus="this.style.borderColor='var(--green)'" onblur="this.style.borderColor='rgba(255,255,255,.12)'"
          onkeydown="if(event.key==='Enter')_submitCustomPrice()">
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn-secondary" onclick="document.getElementById('confirm-modal').style.display='none';document.getElementById('confirm-modal').innerHTML='';renderBikes()">${t('cancelBtn')}</button>
        <button class="btn-primary" onclick="_submitCustomPrice()" style="min-width:100px">Set Price</button>
      </div>
    </div>
  </div>`;
  setTimeout(()=>{const inp=document.getElementById('custom-price-inp');if(inp)inp.focus();},60);
}
function _submitCustomPrice(){
  const inp=document.getElementById('custom-price-inp');
  if(!inp)return;
  const p=parseFloat(inp.value);
  if(isNaN(p)||p<=0){inp.style.borderColor='var(--red)';setTimeout(()=>{inp.style.borderColor='rgba(255,255,255,.12)';},1500);return;}
  S._bkRentalPrice=String(p);
  const m=document.getElementById('confirm-modal');m.style.display='none';m.innerHTML='';
  renderBikes();
}
function toggleAddBike(){S._resetBikeForm?.();_resetBikeForm();S.showAddBike=true;renderBikes();}
function cancelBikeForm(){_resetBikeForm();renderBikes();}
function setBkFilter(v){S.bkTypeFilter=v;renderBikes();}
function setBkSort(v){S.bkSort=v;renderBikes();}
function setBkSearch(v){S.bkSearch=v;renderBikes();const inp=document.getElementById('bk-search-input');if(inp){inp.focus();const l=v.length;inp.setSelectionRange(l,l);}}
async function addBike(){
  const name=document.getElementById('bk-name').value.trim();
  const size=document.getElementById('bk-size').value||'M';
  const brandRaw=document.getElementById('bk-brand')?.value.trim();
  const brand=(brandRaw&&brandRaw!=='__add__')?brandRaw:null;
  const modelRaw=document.getElementById('bk-model')?.value.trim();
  const model=(modelRaw&&modelRaw!=='__add__')?modelRaw:null;
  const groupsetRaw=document.getElementById('bk-groupset')?.value.trim();
  const groupset=(groupsetRaw&&groupsetRaw!=='__add__')?groupsetRaw:null;
  const speedsRaw=document.getElementById('bk-speeds')?.value.trim();
  const speeds=speedsRaw?parseInt(speedsRaw)||null:null;
  if(!name){toast(t('errBikeName'),'error');return;}
  if(!S.addBikeType){toast(t('errBikeTypeReq'),'error');return;}
  _autoSaveBkOpts(brand,model,groupset);
  const colorNames=S.addBikeColorNames.slice(0,S.addBikeColors.length).map(n=>n||'');
  const rentalPrice=S._bkRentalPrice?parseFloat(S._bkRentalPrice)||null:null;
  const bike={id:uid(),name,size,type:S.addBikeType,colors:[...S.addBikeColors],color_names:colorNames,status:'available',brand,model,groupset,speeds,rental_price:rentalPrice};
  await sb.from('bikes').insert(bike);
  await loadData();
  _resetBikeForm();
  toast(`${name} ${t('toastAddedToFleet')}`);
  pushUndo(`Add bike ${name}`,async()=>{
    await sb.from('bikes').delete().eq('id',bike.id);
    await loadData();renderBikes();
  });
  renderBikes();
}
function startEdit(id){
  const bike=getBikes().find(b=>b.id===id);if(!bike)return;
  S.editBikeId=id;S.showAddBike=false;S.addBikeType=bike.type;S.addBikeSize=bike.size;
  S.addBikeColors=bike.colors&&bike.colors.length?[...bike.colors]:['#6ee89a'];
  S.addBikeColorNames=bike.color_names&&bike.color_names.length?[...bike.color_names]:bike.colors.map(()=>'');
  S._bkName=bike.name;S._bkBrand=bike.brand||'';S._bkModel=bike.model||'';
  S._bkGroupset=bike.groupset||'';S._bkSpeeds=bike.speeds!=null?String(bike.speeds):'';S._bkRentalPrice=bike.rental_price!=null?String(bike.rental_price):'';
  S._bkBrandAdd=false;S._bkModelAdd=false;S._bkGroupsetAdd=false;
  _autoSaveBkOpts(bike.brand,bike.model,bike.groupset);
  renderBikes();
}
async function saveBikeEdit(){
  const name=document.getElementById('bk-name').value.trim();
  const size=document.getElementById('bk-size').value||'M';
  const brandRaw=document.getElementById('bk-brand')?.value.trim();
  const brand=(brandRaw&&brandRaw!=='__add__')?brandRaw:null;
  const modelRaw=document.getElementById('bk-model')?.value.trim();
  const model=(modelRaw&&modelRaw!=='__add__')?modelRaw:null;
  const groupsetRaw=document.getElementById('bk-groupset')?.value.trim();
  const groupset=(groupsetRaw&&groupsetRaw!=='__add__')?groupsetRaw:null;
  const speedsRaw=document.getElementById('bk-speeds')?.value.trim();
  const speeds=speedsRaw?parseInt(speedsRaw)||null:null;
  if(!name){toast(t('errBikeName'),'error');return;}
  if(!S.addBikeType){toast(t('errBikeTypeReq'),'error');return;}
  _autoSaveBkOpts(brand,model,groupset);
  const b=getBikes();const existing=b.find(x=>x.id===S.editBikeId);if(!existing)return;
  const editColorNames=S.addBikeColorNames.slice(0,S.addBikeColors.length).map(n=>n||'');
  const rentalPrice=S._bkRentalPrice?parseFloat(S._bkRentalPrice)||null:null;
  const prev={name:existing.name,size:existing.size,type:existing.type,colors:[...existing.colors],color_names:[...(existing.color_names||[])],status:existing.status,brand:existing.brand||null,model:existing.model||null,groupset:existing.groupset||null,speeds:existing.speeds||null,rental_price:existing.rental_price??null};
  const bid=S.editBikeId;
  await sb.from('bikes').update({name,size,type:S.addBikeType,colors:[...S.addBikeColors],color_names:editColorNames,status:existing.status,brand,model,groupset,speeds,rental_price:rentalPrice}).eq('id',bid);
  await loadData();
  _resetBikeForm();
  toast(t('toastBikeUpdated'));
  pushUndo(`Edit bike ${name}`,async()=>{
    await sb.from('bikes').update(prev).eq('id',bid);
    await loadData();renderBikes();
  });
  renderBikes();
}
async function toggleMaint(id){
  const b=getBikes();const bike=b.find(x=>x.id===id);if(!bike)return;
  if(bike.status==='in-use'){toast(t('errBikeInUse'),'error');return;}
  const prevStatus=bike.status;
  const newStatus=prevStatus==='maintenance'?'available':'maintenance';
  await sb.from('bikes').update({status:newStatus}).eq('id',id);
  await loadData();toast(`${t('toastStatusChanged')} ${newStatus}`);
  pushUndo(`${newStatus==='maintenance'?'Maintenance':'Restore'} ${bike.name}`,async()=>{
    await sb.from('bikes').update({status:prevStatus}).eq('id',id);
    await loadData();renderBikes();
  });
  renderBikes();
}
async function releaseBike(id){
  const bike=getBikes().find(x=>x.id===id);if(!bike)return;
  await sb.from('bikes').update({status:'available'}).eq('id',id);
  await loadData();
  toast(`${bike.name} ${t('releaseBikeToast')}`);
  pushUndo(`Release ${bike.name}`,async()=>{
    await sb.from('bikes').update({status:'in-use'}).eq('id',id);
    await loadData();renderBikes();
  });
  renderBikes();
}
function delBike(id){
  const bike=getBikes().find(x=>x.id===id);
  if(!bike||bike.status==='in-use'){toast(t('errBikeInUse'),'error');return;}
  confirmDialog({
    title:t('confirmDeleteBikeTitle'),
    body:bike.name,
    confirmLabel:t('deleteBtn'),
    confirmClass:'btn-red',
    onConfirm:async()=>{
      const saved={id:bike.id,name:bike.name,size:bike.size,type:bike.type,colors:[...(bike.colors||[])],color_names:[...(bike.color_names||[])],brand:bike.brand||null,model:bike.model||null,groupset:bike.groupset||null,speeds:bike.speeds||null,status:'available'};
      await sb.from('bikes').delete().eq('id',id);
      await loadData();toast(`${bike.name} ${t('toastBikeRemoved')}`);
      pushUndo(`Delete bike ${bike.name}`,async()=>{
        await sb.from('bikes').insert(saved);
        await loadData();renderBikes();
      });
      renderBikes();
    }
  });
}

/* ── Bike option dropdowns (brand / model / groupset) ── */
function _bkFieldHtml(id,val,addMode,list){
  if(addMode){
    return`<div style="display:flex;gap:6px">
      <input id="${id}" type="text" value="${esc(val)}" placeholder="${t('typeNewLabel')||'Type new...'}"
        style="flex:1"
        onkeydown="if(event.key==='Enter'){event.preventDefault();_bkOptSave('${id}');}">
      <button class="btn-primary" style="padding:8px 14px;flex-shrink:0;white-space:nowrap" onclick="_bkOptSave('${id}')">✓ ${t('saveBtn')||'Save'}</button>
      <button class="btn-secondary" style="padding:8px 10px;flex-shrink:0" onclick="_bkOptCancel('${id}')">✕</button>
    </div>`;
  }
  const opts=list.map(v=>`<option value="${esc(v)}"${v===val?' selected':''}>${esc(v)}</option>`).join('');
  return`<select id="${id}" onchange="_bkSelChange('${id}',this.value)">
    <option value=""${!val?' selected':''}>—</option>
    ${opts}
    <option value="__add__">➕ ${t('addNewOption')||'Add new...'}</option>
  </select>`;
}
function _bkSelChange(id,val){
  if(val==='__add__'){
    if(id==='bk-brand'){S._bkBrand='';S._bkBrandAdd=true;}
    else if(id==='bk-model'){S._bkModel='';S._bkModelAdd=true;}
    else if(id==='bk-groupset'){S._bkGroupset='';S._bkGroupsetAdd=true;}
    renderBikes();
    setTimeout(()=>document.getElementById(id)?.focus(),50);
  }else{
    if(id==='bk-brand')S._bkBrand=val;
    else if(id==='bk-model')S._bkModel=val;
    else if(id==='bk-groupset')S._bkGroupset=val;
  }
}
function _bkOptSave(id){
  const el=document.getElementById(id);
  const v=(el?el.value:'').trim();
  if(!v)return;
  const _add=(lsKey,arr,stateKey)=>{
    if(!S[arr].includes(v)){S[arr]=[...S[arr],v].sort((a,b)=>a.localeCompare(b));try{localStorage.setItem(lsKey,JSON.stringify(S[arr]));}catch{}}
    S[stateKey]=v;
  };
  if(id==='bk-brand'){_add('cq_bk_brands','bkBrands','_bkBrand');S._bkBrandAdd=false;}
  else if(id==='bk-model'){_add('cq_bk_models','bkModels','_bkModel');S._bkModelAdd=false;}
  else if(id==='bk-groupset'){_add('cq_bk_groupsets','bkGroupsets','_bkGroupset');S._bkGroupsetAdd=false;}
  renderBikes();
}
function _bkOptCancel(id){
  if(id==='bk-brand'){S._bkBrandAdd=false;S._bkBrand='';}
  else if(id==='bk-model'){S._bkModelAdd=false;S._bkModel='';}
  else if(id==='bk-groupset'){S._bkGroupsetAdd=false;S._bkGroupset='';}
  renderBikes();
}
function _autoSaveBkOpts(brand,model,groupset){
  const _add=(lsKey,arr,v)=>{
    if(v&&!S[arr].includes(v)){S[arr]=[...S[arr],v].sort((a,b)=>a.localeCompare(b));try{localStorage.setItem(lsKey,JSON.stringify(S[arr]));}catch{}}
  };
  _add('cq_bk_brands','bkBrands',brand);
  _add('cq_bk_models','bkModels',model);
  _add('cq_bk_groupsets','bkGroupsets',groupset);
}

function renderHistory(){
  const queue=getQueue();const hist=queue.filter(e=>e.status==='done'||e.status==='noshow'||e.status==='cancelled'||e.status==='removed');
  const sessions=allSessions();
  const sessionFiltered=S.histSess!=='all'?hist.filter(e=>e.sessionId===S.histSess):hist;
  const nDone=sessionFiltered.filter(e=>e.status==='done').length,nPaid=sessionFiltered.filter(e=>e.status==='done'&&e.paid).length,
        nPend=sessionFiltered.filter(e=>e.status==='done'&&!e.paid).length,nNoShow=sessionFiltered.filter(e=>e.status==='noshow').length;
  let filtered=[...hist];
  if(S.histSess!=='all')   filtered=filtered.filter(e=>e.sessionId===S.histSess);
  if(S.histStatus!=='all') filtered=filtered.filter(e=>e.status===S.histStatus);
  // By default, exclude removed unless explicitly filtered
  if(S.histStatus==='all') filtered=filtered.filter(e=>e.status!=='removed');
  if(S.histPay==='paid')   filtered=filtered.filter(e=>e.paid);
  if(S.histPay==='pending')filtered=filtered.filter(e=>!e.paid&&e.status==='done');
  if(S.histType!=='all')   filtered=filtered.filter(e=>e.typePreference===S.histType);
  if(S.histSearch.trim()){const q=S.histSearch.trim().toLowerCase();filtered=filtered.filter(e=>e.name.toLowerCase().includes(q)||(e.phone||'').includes(q)||(e.email||'').toLowerCase().includes(q));}
  const _hd=S.histSortDir;
  filtered.sort((a,b)=>{
    if(S.histSort==='name')   return _hd*a.name.localeCompare(b.name);
    if(S.histSort==='amount') return _hd*((a.price||0)-(b.price||0));
    if(S.histSort==='type')   return _hd*(a.typePreference||'').localeCompare(b.typePreference||'');
    if(S.histSort==='status') return _hd*(a.status||'').localeCompare(b.status||'');

            <span style="color:var(--muted);font-size:10px;white-space:nowrap;flex-shrink:0">${l.time}</span>
            <span style="font-weight:800;color:${l.action==='Removed'?'var(--red)':'var(--green)'}${l.undone?';text-decoration:line-through;opacity:.5':''}">${l.action}</span>

            <span style="color:var(--muted);font-size:11px;white-space:nowrap">${l.session}</span>

function exportHistoryCSV(){
  // Respect the currently selected session filter
  let hist=getQueue().filter(e=>e.status==='done'&&e.paid);
  if(S.histSess!=='all') hist=hist.filter(e=>e.sessionId===S.histSess);
  const sess=S.histSess!=='all'?allSessions().find(s=>s.id===S.histSess):null;
  const filename=sess
    ?`rides_${dayLabel(sess.day)}_${sess.session_date||sess.id}.csv`
    :'rides_all_sessions.csv';
  const headers=['#','Name','Phone','Email','Session','Date','Time','Bike','Type','Price (SAR)','Paid','Status'];
  const rows=hist.map(e=>{
    const assignedBikes=getAssignedBikes(e);
    const bikeNamesCsv=assignedBikes.map(b=>b.name).join('; ');
    const entSess=allSessions().find(s=>s.id===e.sessionId);
    return[
      e.queueNum,
      e.name,
      e.phone||'',
      e.email||'',
      dayLabel(e.sessionDay)+' '+shortDate(e.sessionDate),
      shortDate(e.sessionDate),
      sessionTime(entSess),
      bikeNamesCsv,
      e.typePreference,
      e.price??DEFAULT_PRICE,
      e.paid?'Yes':'No',
      e.status
    ].map(v=>'"'+String(v).replace(/"/g,'""')+'"');
  });
  if(!rows.length){toast(t('noHistory'),'warning');return;}
  const csv=[headers.map(h=>'"'+h+'"').join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}

  const e=getQueue().find(x=>x.id===id);if(!e)return;

  const lines=[

    `║      ${t('receiptTitle').padEnd(32)}║`,

    '──────────────────────────────────────',
    `${t('queueNumLabel').padEnd(14)}:  #${e.queueNum}`,
    `${t('colSession').padEnd(14)}:  ${dayLabel(e.sessionDay)}, ${shortDate(e.sessionDate)}`,
    `${t('timeLabel').padEnd(14)}:  ${sessionTime(allSessions().find(s=>s.id===e.sessionId))}`,
    `${t('colBike').padEnd(14)}:  ${bike?bike.name:'N/A'}`,
    `${t('bikeTypeLabel').padEnd(14)}:  ${e.typePreference}`,
    `${t('colPayment').padEnd(14)}:  ${e.paid?t('paidLabel')+' ✓':t('pendingLabel')+' ⏳'}`,
    '──────────────────────────────────────','',
    t('receiptSeeYou'),'',
    'MicroMobility Team','Corniche Circuit, Jeddah',
  ].join('\n');
  const subject=encodeURIComponent(`MicroMobility: ${t('receiptTitle')} #${e.queueNum} (${shortDate(e.sessionDate)})`);
  const body=encodeURIComponent(lines);
  const mailtoLink=`mailto:${e.email}?subject=${subject}&body=${body}`;
  const modal=document.getElementById('receipt-modal');
  modal.style.display='flex';
  modal.innerHTML=`<div class="modal-backdrop" onclick="if(event.target===this)closeReceipt()">
    <div class="modal-box" style="max-width:520px">
      <div class="modal-title">${t('sendReceipt')}</div>
      <div class="modal-sub">${t('authEmail')}: ${esc(e.email)}</div>
      <div class="receipt-box">${esc(lines)}</div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeReceipt()">${t('cancelBtn')}</button>
        <a href="${mailtoLink}" class="btn-primary" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px"
           onclick="setTimeout(closeReceipt,300)">${t('openEmailApp')}</a>
      </div>
    </div>
  </div>`;
}
function closeReceipt(){document.getElementById('receipt-modal').style.display='none';}
