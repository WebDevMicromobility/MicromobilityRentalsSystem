// Reorder a waiting entry by swapping its queue number with the adjacent waiting entry
async function moveQueueEntry(id,dir){
  const e=getQueue().find(x=>x.id===id);if(!e||e.status!=='waiting')return;
  const waiting=getQueue().filter(x=>x.sessionId===e.sessionId&&x.status==='waiting').sort((a,b)=>a.queueNum-b.queueNum);
  const idx=waiting.findIndex(x=>x.id===id);
  const swapWith=waiting[idx+dir];
  if(!swapWith)return;
  const a=e.queueNum,b=swapWith.queueNum;
  // Swap through a temporary number, sequentially, so a unique (session_id, queue_num) index never sees two rows share a number mid-swap.
  const tmp=nextQNum(e.sessionId);
  for(const[eid,num]of[[e.id,tmp],[swapWith.id,a],[e.id,b]]){
    const{error}=await sb.from('queue_entries').update({queue_num:num}).eq('id',eid);
    if(error){toast(error.message||t('errConnection'),'error');await loadData();renderStaffQueue();return;}
  }
  await loadData();renderStaffQueue();
}

async function togglePayment(id,mode){
  const entry=getQueue().find(e=>e.id===id);
  if(!entry)return;
  const isHouse=entry.paid&&(entry.price??DEFAULT_PRICE)===0;
  
  let newPaid,newPrice;
  if(mode==='house'){newPaid=true;newPrice=0;}
  else if(mode===true||mode==='paid'||mode==='cash'||mode==='card'){newPaid=true;newPrice=entry.price===0?_entryFallbackPrice(entry):(entry.price??DEFAULT_PRICE);}
  else if(mode===false||mode==='pending'){newPaid=false;newPrice=entry.price===0?_entryFallbackPrice(entry):(entry.price??DEFAULT_PRICE);}
  else{
    
    if(!entry.paid){newPaid=true;newPrice=entry.price;}
    else if(!isHouse){newPaid=true;newPrice=0;}
    else{newPaid=false;newPrice=_entryFallbackPrice(entry);}
  }
  let newMethod=entry.pay_method||null; // card vs cash for the rental (aggregates to the close-out split)
  if(mode==='card')newMethod='card';else if(mode==='cash')newMethod='cash';else if(mode==='house'||mode==='pending'||mode===false||(newPaid&&newPrice===0))newMethod=null;
  const prevPaid=entry.paid,prevPrice=entry.price,prevMethod=entry.pay_method||null,prevCard=entry.card_amount??null;
  entry.paid=newPaid;entry.price=newPrice;entry.pay_method=newMethod;entry.card_amount=null; // cash/card/house/pending clear any prior split
  renderStaffQueue();renderHistory();
  const stateLabel=newPaid&&newPrice===0?' '+t('onTheHouseLabel'):newPaid?'✓ '+t('paidLabel'):t('pendingLabel');
  toast(stateLabel,newPaid?'':'warning');
  const _pr=await sb.from('queue_entries').update({paid:newPaid,price:newPrice}).eq('id',id);
  if(_writeErr(_pr,'payment')){await loadDataLight();renderStaffQueue();renderHistory();return;} // surface failure and revert the optimistic toggle
  try{await sb.from('queue_entries').update({pay_method:newMethod,card_amount:null}).eq('id',id);}catch(e){} // tolerant: columns may not exist yet
  await loadDataLight();renderStaffQueue();renderHistory(); // queue-only change: slim re-sync (no photo refetch)
  pushUndo(`${t('undoPayment')} #${entry.queueNum} ${entry.name}`,async()=>{
    await sb.from('queue_entries').update({paid:prevPaid,price:prevPrice}).eq('id',id);
    try{await sb.from('queue_entries').update({pay_method:prevMethod,card_amount:prevCard}).eq('id',id);}catch(e){}
    await loadDataLight();renderStaffQueue();renderHistory();
  });
}
// Split a rental between card and cash: prompt for the card portion, the rest is cash
async function splitRentalPayment(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry)return;
  const price=Math.round(((entry.price===0?_entryFallbackPrice(entry):(entry.price??DEFAULT_PRICE)))*100)/100;
  const raw=prompt(t('splitCardPrompt'),entry.card_amount!=null?String(entry.card_amount):'');if(raw===null)return;
  let card=parseFloat(raw);if(isNaN(card)||card<0)card=0;card=Math.round(Math.min(card,price)*100)/100;
  const prevPaid=entry.paid,prevPrice=entry.price,prevMethod=entry.pay_method||null,prevCard=entry.card_amount??null;
  entry.paid=true;entry.price=price;entry.pay_method='split';entry.card_amount=card;
  renderStaffQueue();renderHistory();
  toast(`✓ ${t('cashCard')} ${card} · ${t('cashCash')} ${Math.round((price-card)*100)/100}`);
  const _sr=await sb.from('queue_entries').update({paid:true,price:price}).eq('id',id);
  if(_writeErr(_sr,'split payment')){await loadDataLight();renderStaffQueue();renderHistory();return;}
  try{await sb.from('queue_entries').update({pay_method:'split',card_amount:card}).eq('id',id);}catch(e){}
  await loadDataLight();renderStaffQueue();renderHistory();
  pushUndo(`${t('undoPayment')} #${entry.queueNum} ${entry.name}`,async()=>{
    await sb.from('queue_entries').update({paid:prevPaid,price:prevPrice}).eq('id',id);
    try{await sb.from('queue_entries').update({pay_method:prevMethod,card_amount:prevCard}).eq('id',id);}catch(e){}
    await loadDataLight();renderStaffQueue();renderHistory();
  });
}

function showRescheduleModal(fromSessionId){

async function rescheduleBooking(fromSessionId,toSessionId){
  const cust=S.loggedIn;if(!cust)return;
  const moving=getQueue().filter(e=>e.customerId===cust.id&&e.sessionId===fromSessionId&&(e.status==='waiting'||e.status==='waitlist'));
  if(!moving.length){closeRescheduleModal();return;}
  const newSess=allSessions().find(s=>s.id===toSessionId);if(!newSess){closeRescheduleModal();return;}
  const cap=newSess.capacity||12;
  const taken=getQueue().filter(e=>e.sessionId===toSessionId&&(e.status==='waiting'||e.status==='active')).length;
  if(cap-taken<moving.length){toast(t('rescheduleFull'),'error');return;}
  closeRescheduleModal();
  const base=nextQNum(toSessionId);
  const sorted=moving.slice().sort((a,b)=>(a.queueNum||0)-(b.queueNum||0));
  const wasAllWaitlist=moving.every(e=>e.status==='waitlist');
  await Promise.all(sorted.map((e,i)=>sb.from('queue_entries').update({session_id:toSessionId,session_day:newSess.day,session_date:newSess.session_date||toSessionId,queue_num:base+i,status:'waiting'}).eq('id',e.id)));
  await loadData();
  if(wasAllWaitlist)for(const _m of moving)await _addonStockQ(entryAddons(_m),-1); // per-rider: reserve every moving rider's add-ons (not just the first), now that the waitlist booking is confirmed
  toast(t('toastRescheduled'));
  renderMyRides();
}

async function cancelBooking(id,reason){
  const entry=getQueue().find(e=>e.id===id);
  if(!entry||(entry.status!=='waiting'&&entry.status!=='waitlist')){toast(t('errCancelWaiting'),'error');return;}
  const isWaitlist=entry.status==='waitlist';
  const savedQNum=entry.queueNum;
  // Ticket numbers are stable and never reused; cancelling just frees the slot and leaves a gap (no shifting, which a unique index would reject).
  const bikeIds=getAssignedBikeIds(entry);
  await sb.from('queue_entries').update({status:'cancelled',assigned_bike_id:null}).eq('id',id);
  if(bikeIds.length)await Promise.all(bikeIds.map(bid=>sb.from('bikes').update({status:'available'}).eq('id',bid)));

  if(reason){
    S.cancellationLog.unshift({
      entryId:id,name:entry.name,queueNum:savedQNum,reason,
      session:dayLabel(entry.sessionDay)+' '+shortDate(entry.sessionDate),
      time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),
      timestamp:Date.now()
    });
    if(S.cancellationLog.length>100)S.cancellationLog.pop();
    try{localStorage.setItem('cq_cancellations',JSON.stringify(S.cancellationLog));}catch(e){}
  }
  await loadData();
  if(!isWaitlist)await _restockAddonsOnExit(entry); // waitlist bookings never reserved stock, so nothing to restock
  toast(t('toastBookingCancelled'));
  pushUndo(`${t('undoCancelBooking')} #${savedQNum} ${entry.name}`,async()=>{
    await sb.from('queue_entries').update({status:isWaitlist?'waitlist':'waiting',queue_num:savedQNum}).eq('id',id);
    await loadData();renderMyRides();renderStaffQueue();
  });
  renderMyRides();
}

async function staffCancelEntry(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry)return;
  if(entry.status==='waitlist'){
    await sb.from('queue_entries').update({status:'cancelled'}).eq('id',id);
    await loadData();toast(`${t('cancelBtn')} ✓`);renderStaffQueue();renderMyRides();return;
  }
  if(entry.status!=='waiting'&&entry.status!=='active'){toast(t('toastCannotCancel'),'error');return;}
  const statusLabel=entry.status==='active'?'on bike':'waiting';
  confirmDialog({
    title:`${t('cancelBookingLabel')} #${entry.queueNum}`,
    body:`<strong>${esc(entry.name)}</strong> (${statusLabel})<br>This will release any assigned bike and mark the entry as cancelled.`,
    confirmLabel:t('cancelBookingLabel'),
    confirmClass:'btn-red',
    onConfirm:async()=>{
      const bikeIds=getAssignedBikeIds(entry);
      const savedStatus=entry.status;
      const savedAssigned=entry.assignedBikeId;
      if(entry.status==='waiting'){
        const savedQNum=entry.queueNum;
        // Ticket numbers are stable and never reused; cancel frees the slot and leaves a gap (no shifting, which a unique index would reject).
        await sb.from('queue_entries').update({status:'cancelled'}).eq('id',id);
        await loadData();
        await _restockAddonsOnExit(entry);
        toast(`Booking #${savedQNum} cancelled.`);
        pushUndo(`${t('undoStaffCancel')} #${savedQNum} ${entry.name}`,async()=>{
          await sb.from('queue_entries').update({status:'waiting',queue_num:savedQNum}).eq('id',id);
          await loadData();renderMyRides();renderStaffQueue();
        });
      }else{
        const calls=[sb.from('queue_entries').update({status:'cancelled',assigned_bike_id:null}).eq('id',id)];
        bikeIds.forEach(bid=>calls.push(sb.from('bikes').update({status:'available'}).eq('id',bid)));
        await Promise.all(calls);
        await loadData();
        await _restockAddonsOnExit(entry);
        try{localStorage.removeItem('cq_ct_'+id);}catch(e){}
        toast(`Booking #${entry.queueNum} cancelled.`);
        pushUndo(`${t('undoStaffCancel')} #${entry.queueNum} ${entry.name}`,async()=>{
          const assignedVal=bikeIds.length===1?bikeIds[0]:(bikeIds.length?JSON.stringify(bikeIds):null);
          const calls2=[sb.from('queue_entries').update({status:savedStatus,assigned_bike_id:assignedVal}).eq('id',id)];
          bikeIds.forEach(bid=>calls2.push(sb.from('bikes').update({status:'in-use'}).eq('id',bid)));
          await Promise.all(calls2);
          await loadData();renderStaffQueue();
        });
      }
      renderMyRides();renderStaffQueue();
    }
  });
}

async function promoteWaitlist(id){

  const newNum=nextQNum(e.sessionId);

  if(error){toast(error.message||t('errConnection'),'error');return;}
  await loadData();
  await _consumeAddonsOnEnter(e); // booking is now confirmed, so reserve its add-on stock
  logAction&&logAction(t('logPromotedFromWaitlist').replace('{0}',newNum).replace('{1}',e.name));
  toast(t('toastPromoted'));
  renderStaffQueue();renderMyRides();
}
// When a spot frees up (cancel / no-show), promote the oldest waitlisted rider in that session.
async function _autoPromoteOldestWaitlist(sessionId){
  const wl=getQueue().filter(x=>x.sessionId===sessionId&&x.status==='waitlist')
    .sort((a,b)=>new Date(a.registeredAt)-new Date(b.registeredAt));
  if(!wl.length)return false;
  const e=wl[0];
  const newNum=nextQNum(sessionId);
  await sb.from('queue_entries').update({status:'waiting',queue_num:newNum}).eq('id',e.id);
  await _consumeAddonsOnEnter(e); // promoted booking now reserves its add-on stock
  return true;
}
async function doNoShow(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry)return;
  const savedQNum=entry.queueNum;
  // Ticket numbers are stable and never reused; no-show just frees the slot and leaves a gap (no shifting, which a unique index would reject).
  await sb.from('queue_entries').update({status:'noshow'}).eq('id',id);
  const _promoted=await _autoPromoteOldestWaitlist(entry.sessionId);
  await loadDataLight(); // queue-only status change: slim re-sync (no photo refetch)
  await _restockAddonsOnExit(entry);
  toast(_promoted?`${t('toastNoShow')} · ${t('toastPromoted')}`:t('toastNoShow'));
  S._flashId=id;S._flashColor='orange';setTimeout(()=>{S._flashId=null;},800);
  pushUndo(`${t('undoNoShow')} #${savedQNum} ${entry.name}`,async()=>{
    await sb.from('queue_entries').update({status:'waiting',queue_num:savedQNum}).eq('id',id);
    await loadData();renderStaffQueue();
  });
  renderStaffQueue();
}
async function doUndoNoShow(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry||entry.status!=='noshow')return;
  // The rider keeps their original ticket number. If a live booking already holds that number (a leftover duplicate from the old shifting logic), give this rider a fresh number so the unique index is satisfied.
  const slotTaken=getQueue().some(e=>e.sessionId===entry.sessionId&&e.queueNum===entry.queueNum&&e.id!==id&&['waiting','active','done'].includes(e.status));
  const oldQNum=entry.queueNum;
  const upd={status:'waiting'};
  if(slotTaken)upd.queue_num=nextQNum(entry.sessionId);
  try{
    const{error}=await sb.from('queue_entries').update(upd).eq('id',id); // Supabase returns the error rather than throwing, so check it explicitly
    if(error)throw error;
  }catch(err){
    console.error('doUndoNoShow failed',err);
    toast(t('errSomethingWrong')+(err&&(err.message||err.code)?' ('+(err.message||err.code)+')':''),'error');
    await loadDataLight();renderStaffQueue();
    return;
  }
  if(upd.queue_num!=null)entry.queueNum=upd.queue_num;
  await loadDataLight(); // queue-only status change: slim re-sync
  await _consumeAddonsOnEnter(entry); // rider is active again, re-reserve stock that was restocked on no-show
  toast(t('toastUndoNoShow'));
  pushUndo(`${t('undoUndoNoShow')} #${oldQNum} ${entry.name}`,async()=>{
    await sb.from('queue_entries').update({status:'noshow',queue_num:oldQNum}).eq('id',id);
    await loadData();renderStaffQueue();
  });
  renderStaffQueue();
}

async function saveEditedQNum(entryId){
  const inp=document.getElementById('qnum-inp');
  const newNum=parseInt(inp?.value);
  if(isNaN(newNum)||newNum<1){if(inp)inp.style.borderColor='var(--red)';return;}
  const entry=getQueue().find(e=>e.id===entryId);if(!entry)return;
  const oldNum=entry.queueNum;
  if(newNum===oldNum){closeEditQNumModal();return;}
  // Reject if a live booking already holds the target number (the unique session_id+queue_num index would reject it anyway)
  if(getQueue().some(e=>e.sessionId===entry.sessionId&&e.queueNum===newNum&&!['cancelled','removed','noshow'].includes(e.status))){
    if(inp)inp.style.borderColor='var(--red)';toast(t('errQNumTaken'),'error');return;
  }
  const group=getQueue().filter(e=>e.sessionId===entry.sessionId&&e.queueNum===oldNum&&e.status!=='cancelled'&&e.status!=='removed');
  closeEditQNumModal();
  const _qr=await Promise.all(group.map(e=>sb.from('queue_entries').update({queue_num:newNum}).eq('id',e.id)));
  const _qe=_qr.find(r=>r&&r.error);
  if(_qe){toast(t('errSomethingWrong')+(_qe.error.message?' ('+_qe.error.message+')':''),'error');await loadData();renderStaffQueue();return;}
  await loadData();renderStaffQueue();renderHistory();
  pushUndo(`${t('undoRenumber')} #${oldNum}→#${newNum} ${entry.name}`,async()=>{
    const restored=getQueue().filter(e=>e.sessionId===entry.sessionId&&e.queueNum===newNum&&group.map(x=>x.id).includes(e.id));
    await Promise.all(restored.map(e=>sb.from('queue_entries').update({queue_num:oldNum}).eq('id',e.id)));
    await loadData();renderStaffQueue();renderHistory();
  });

// Admin maintenance: renumber any leftover duplicate (session_id, queue_num) rows so every booking is unique again.
// Keeps the earliest booking's number and pushes each duplicate above that session's current max (collision-safe under the unique index).
async function fixDuplicateQNums(){
  if(!isAdmin()){toast(t('adminOnlyMsg'),'error');return;}
  const bySession={};
  getQueue().forEach(e=>{(bySession[e.sessionId]=bySession[e.sessionId]||[]).push(e);});
  const toFix=[];
  Object.keys(bySession).forEach(sid=>{
    const rows=bySession[sid];
    let maxN=rows.reduce((m,e)=>Math.max(m,e.queueNum||0),0);
    const groups={};
    rows.forEach(e=>{(groups[e.queueNum]=groups[e.queueNum]||[]).push(e);});
    Object.keys(groups).forEach(qn=>{
      const g=groups[qn];
      if(g.length<2)return;
      g.sort((a,b)=>new Date(a.registeredAt||0)-new Date(b.registeredAt||0)||String(a.id).localeCompare(String(b.id)));
      g.slice(1).forEach(e=>{maxN+=1;toFix.push({id:e.id,newNum:maxN});}); // earliest keeps its number; the rest move above the session max
    });
  });
  if(!toFix.length){toast(t('fixDupNone'));return;}
  confirmDialog({
    title:t('fixDupTitle'),
    body:t('fixDupBody').replace('{0}',toFix.length),
    confirmLabel:t('fixDupConfirm'),
    confirmClass:'btn-orange',
    onConfirm:async()=>{
      let ok=0;
      for(const f of toFix){ // sequential: each new number is above the session max, so a unique index never sees a collision
        const res=await sb.from('queue_entries').update({queue_num:f.newNum}).eq('id',f.id);
        if(_writeErr(res,'fix duplicate numbers'))break;
        ok++;
      }
      await loadData();renderStaffQueue();if(S.staffTab==='logs')renderLogs();
      toast(t('fixDupDone').replace('{0}',ok));
      try{logAction&&logAction(t('fixDupLog').replace('{0}',ok));}catch(e){}
    }
  });
}

// End-of-day close-out: bike rentals + product sales for the selected session's whole day, by payment type
function printCloseout(){
  const sel=allSessions().find(s=>s.id===S._ctSession);
  if(!sel){toast(t('errSelectSession'),'error');return;}
  const ar=S.lang==='ar';const r2=n=>Math.round(n*100)/100;
  const date=sel.session_date||sel.id;
  const daySessions=allSessions().filter(s=>(s.session_date||s.id)===date);
  const sessIds=new Set(daySessions.map(s=>s.id));
  const rentEntries=getQueue().filter(e=>sessIds.has(e.sessionId)&&(e.status==='active'||e.status==='done'));
  const rentCollected=r2(rentEntries.filter(e=>e.paid).reduce((s,e)=>s+(e.price??DEFAULT_PRICE),0));
  const rentPending=r2(rentEntries.filter(e=>!e.paid).reduce((s,e)=>s+(e.price??DEFAULT_PRICE),0));
  const _rcard=e=>{const p=e.price??DEFAULT_PRICE;if(e.card_amount!=null)return Math.min(Math.max(0,Number(e.card_amount)||0),p);return e.pay_method==='card'?p:0;};
  const rentCard=r2(rentEntries.filter(e=>e.paid).reduce((s,e)=>s+_rcard(e),0));
  const rentCash=r2(Math.max(0,rentCollected-rentCard));
  // Booking add-on revenue, per-rider, following each rider's paid state (collected if the rider is paid, else pending)
  const addonCollected=r2(rentEntries.filter(e=>e.paid).reduce((s,e)=>s+addonsCost(entryAddons(e)),0));
  const addonPending=r2(rentEntries.filter(e=>!e.paid).reduce((s,e)=>s+addonsCost(entryAddons(e)),0));
  let salesLines=[];daySessions.forEach(s=>{salesLines=salesLines.concat(_cashSessionLines(s.id));});
  const st=_salesTotals(salesLines);
  const grandCollected=r2(rentCollected+st.collected+addonCollected),grandPending=r2(rentPending+st.pending+addonPending);
  let coCard=0,coCash=0;daySessions.forEach(s=>{const c=_cashCardCash(s.id);coCard+=c.card;coCash+=c.cash;});coCard=r2(coCard);coCash=r2(coCash);
  // Reconciliation: the card + cash split should equal everything collected. A non-zero delta flags a data-entry slip
  // (e.g. a rider/sale marked paid with no pay method, or a refund that did not restock) before the drawer is counted.
  const grandCard=r2(rentCard+coCard),grandCash=r2(rentCash+coCash+addonCollected);
  const reconDelta=r2(grandCollected-(grandCard+grandCash));
  const row=(label,val,color)=>`<div style="display:flex;justify-content:space-between;padding:4px 0"><span>${label}</span><strong${color?` style="color:${color}"`:''}>SAR ${val}</strong></div>`;

function addHistLog(action,entry,undoFn){
  logAction(`${action} #${entry.queueNum} ${entry.name}`);
  S.histLog.unshift({
    id:'log-'+Date.now()+'-'+Math.random().toString(36).slice(2),
    action,
    entryId:entry.id,
    name:entry.name,
    queueNum:entry.queueNum,
    session:dayLabel(entry.sessionDay)+' '+shortDate(entry.sessionDate),
    time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),
    undoFn:undoFn||null,
    undone:false
  });
  if(S.histLog.length>200)S.histLog.pop();
}

function confirmHistRemove(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry)return;
  confirmDialog({title:t('confirmRemoveTitle'),body:`#${entry.queueNum} - ${esc(entry.name)}`,confirmLabel:t('removeBtn'),confirmClass:'btn-red',onConfirm:()=>doRemove(id)});
}

async function doRemove(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry)return;
  const prevStatus=entry.status;
  addHistLog(t('histRemoved'),entry,async()=>{
    await sb.from('queue_entries').update({status:prevStatus==='done'?'done':'waiting'}).eq('id',id);
    await loadData();renderStaffQueue();renderHistory();
  });
  await sb.from('queue_entries').update({status:'removed'}).eq('id',id);
  await loadData();toast(t('toastRiderRemoved'));
  renderStaffQueue();renderHistory();
}

async function doRestoreEntry(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry)return;
  const originalStatus=entry.status;
  const restoreStatus=entry.assignedBikeId?'done':'waiting';
  addHistLog(t('histRestored'),entry,async()=>{
    await sb.from('queue_entries').update({status:originalStatus}).eq('id',id);
    await loadData();renderHistory();
  });
  await sb.from('queue_entries').update({status:restoreStatus}).eq('id',id);
  await loadData();toast(t('restoreEntryBtn')||'Restored');
  renderHistory();
}

async function undoHistLog(logId){
  const log=S.histLog.find(l=>l.id===logId);
  if(!log||log.undone||!log.undoFn){toast(t('toastNothingUndo'),'warning');return;}
  try{
    await log.undoFn();
    log.undone=true;
    renderHistory();
    toast(t('undoneMsg'));
  }catch(e){toast(t('undoFailed'),'error');}
}

function renderModal(){
  const rider=getQueue().find(e=>e.id===S.modalRider);if(!rider)return;
  const allBikes=getBikes().filter(b=>b.status!=='retired'&&b.status!=='maintenance');

  
  const sess=S.sessions.find(s=>s.id===rider.sessionId);
  const slots=sess?parseSlots(sess.bike_slots):null;
  const fmt=slotsFormat(slots);

  
  function inFleet(b){
    if(!slots)return true;
    if(fmt==='ids')return(slots._bikes||[]).includes(b.id);
    if(fmt==='counts')return(slots[b.type]||0)>0;
    
    return slots[b.type]&&(typeof slots[b.type]==='number'?(slots[b.type]>0):(slots[b.type][b.size]||0)>0);
  }

  
  const prefType=rider.typePreference;
  const sizeOrd={XS:0,S:1,M:2,L:3};
  const statusOrd={'available':0,'in-use':1,'maintenance':2};
  const sortBikes=arr=>{
    const d=S.modalSortDir;
    if(S.modalSort==='name')return[...arr].sort((a,b)=>d*a.name.localeCompare(b.name));
    if(S.modalSort==='brand')return[...arr].sort((a,b)=>{const ab=(a.brand||'').toLowerCase(),bb=(b.brand||'').toLowerCase();return d*(ab.localeCompare(bb)||(a.model||'').toLowerCase().localeCompare((b.model||'').toLowerCase()));});
    if(S.modalSort==='type')return[...arr].sort((a,b)=>d*a.type.localeCompare(b.type));
    if(S.modalSort==='size')return[...arr].sort((a,b)=>d*((sizeOrd[a.size]??99)-(sizeOrd[b.size]??99)));
    if(S.modalSort==='status')return[...arr].sort((a,b)=>d*((statusOrd[a.status]??99)-(statusOrd[b.status]??99)));
    return[...arr].sort((a,b)=>{const aFree=a.status==='available'?0:1,bFree=b.status==='available'?0:1;const aSz=a.size===rider.size?0:1,bSz=b.size===rider.size?0:1;const aFleet=inFleet(a)?0:1,bFleet=inFleet(b)?0:1;return aFree-bFree||aSz-bSz||aFleet-bFleet||a.name.localeCompare(b.name);});
  };
  const mq=(S.modalSearch||'').trim().toLowerCase();
  const matchSearch=b=>!mq||[b.name,b.brand,b.model,b.type,b.size,b.groupset].some(v=>v&&String(v).toLowerCase().includes(mq));
  const matchFilter=b=>(S.modalFilterSize==='all'||b.size===S.modalFilterSize)&&(S.modalFilterBrand==='all'||(b.brand||'')===S.modalFilterBrand)&&(S.modalFilterModel==='all'||(b.model||'')===S.modalFilterModel);
  const prefBikes=sortBikes((prefType==='Any'?allBikes:allBikes.filter(b=>b.type===prefType)).filter(b=>matchSearch(b)&&matchFilter(b)));
  const otherBikes=prefType==='Any'?[]:sortBikes(allBikes.filter(b=>b.type!==prefType&&matchSearch(b)&&matchFilter(b)));
  const otherAvail=otherBikes.filter(b=>b.status==='available').length;
  const allBrands=[...new Set(allBikes.map(b=>b.brand).filter(Boolean))].sort();
  const brandModels=[...new Set(allBikes.filter(b=>S.modalFilterBrand==='all'||(b.brand||'')===S.modalFilterBrand).map(b=>b.model).filter(Boolean))].sort();

  const thS='padding:7px 14px;text-align:left;font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-bottom:1px solid rgba(255,255,255,.08)';
  const thSort=(col,label,extra='')=>{const act=S.modalSort===col;const arr=act?(S.modalSortDir===1?' ▲':' ▼'):'';return`<th style="${thS}${extra};cursor:pointer;user-select:none${act?';color:var(--green)':''}" onclick="if(S.modalSort==='${col}'){S.modalSortDir*=-1;}else{S.modalSort='${col}';S.modalSortDir=1;}renderModal()">${label}${arr}</th>`;};
  function bikeRow(b,altType=false){

  }

async function saveModalPrice(id){
  const inp=document.getElementById('modal-price-inp');if(!inp)return;
  const val=parseFloat(inp.value);
  if(isNaN(val)||val<0){inp.style.borderColor='var(--red)';return;}
  const entry=getQueue().find(e=>e.id===id);if(!entry)return;
  const prev=entry.price;
  entry.price=val;
  const{error}=await sb.from('queue_entries').update({price:val}).eq('id',id);
  if(error){entry.price=prev;toast(error.message,'error');return;}
  await loadData();S.modalPriceEdit=false;renderModal();
  toast(t('toastPriceSet').replace('{0}',val));
}
async function modalQuickAddBike(){
  if(!S.modalAddBikeType){toast(t('errBikeTypeReq'),'error');return;}
  if(!S.modalAddBikeFrame){toast(t('errBikeFrameReq'),'error');return;}
  const location=(S.modalAddBikeLocation||'').trim();
  if(!location){toast(t('errBikeLocationReq'),'error');return;}
  const bikeNum=parseInt(S.modalAddBikeNumber||'');
  if(!bikeNum||bikeNum<1){toast(t('errBikeNumberReq'),'error');return;}
  if(getBikes().some(b=>Number(b.bike_number)===bikeNum)){toast(t('errBikeNumberDup'),'error');return;}
  const size=S.modalAddBikeSize||'M';
  const name=genBikeName(S.modalAddBikeType,S.modalAddBikeFrame,bikeNum,size);
  const bike={id:uid(),name,size,type:S.modalAddBikeType,colors:['#6ee89a'],color_names:[''],status:'available',brand:null,model:null,groupset:null,speeds:null,location,frame_type:S.modalAddBikeFrame,bike_number:bikeNum};
  const{error:bikeErr}=await sb.from('bikes').insert(bike);
  if(bikeErr){toast(bikeErr.message,'error');return;}
  await loadData();
  
  S.modalBikes=[bike.id];
  S.modalShowAddBike=false;S.modalAddBikeName='';S.modalAddBikeType=null;S.modalAddBikeSize='M';S.modalAddBikeFrame='';S.modalAddBikeNumber='';
  toast(`${name} ${t('toastAddedToFleet')}`);
  renderModal();
}
async function confirmAssign(){
  if(S.modalBikes.length===0){toast(t('errSelectBike'),'error');return;}
  const rider=getQueue().find(e=>e.id===S.modalRider);
  
  if(S.modalBikes.length>1){toast(t('errMaxOneBike'),'error');S.modalBikes=S.modalBikes.slice(0,1);return;}
  const allBikes=getBikes();
  const selected=S.modalBikes.map(id=>allBikes.find(b=>b.id===id)).filter(Boolean);
  
  const alreadyAssigned=rider?getAssignedBikeIds(rider):[];
  const needsUpdate=selected.filter(b=>!alreadyAssigned.includes(b.id));
  const unavail=needsUpdate.filter(b=>b.status!=='available');
  if(unavail.length>0){toast(`${unavail[0].name}: ${t('errBikeUnavailable')}`,'error');return;}
  const riderId=S.modalRider;
  const qn=rider?rider.queueNum:'?';const rName=rider?rider.name:'';
  const bikeNames=selected.map(b=>b.name).join(', ');
  const prevPrice=rider?rider.price:null;
  
  const priceUpdate={};
  if(rider&&selected.length>0){
    priceUpdate.price=selected.reduce((s,b)=>s+priceForBike(b),0);
  }
  const isReassign=rider&&rider.status==='active';
  
  const toFree=alreadyAssigned.filter(id=>!S.modalBikes.includes(id));
  // Atomically claim each needed bike: the conditional .eq('status','available') means only ONE device
  // can flip a given bike available->in-use. If 0 rows come back, another device grabbed it first.
  const claimed=[];
  for(const b of needsUpdate){
    let taken=false;
    try{
      const{data,error}=await sb.from('bikes').update({status:'in-use'}).eq('id',b.id).eq('status','available').select('id');
      if(error)throw error;
      taken=!!(data&&data.length>0);
    }catch(err){
      await Promise.all(claimed.map(id=>sb.from('bikes').update({status:'available'}).eq('id',id))).catch(()=>{});
      toast((err&&err.message)||t('errConnection'),'error');
      await loadData();renderModal();return;
    }
    if(!taken){
      await Promise.all(claimed.map(id=>sb.from('bikes').update({status:'available'}).eq('id',id))).catch(()=>{});
      toast(`${b.name}: ${t('errBikeUnavailable')}`,'error');
      await loadData();renderModal();return; // re-render so the now-taken bike shows as unavailable
    }
    claimed.push(b.id);
  }
  // We own every needed bike now; release any the rider is giving up (reassign case)
  if(toFree.length)await Promise.all(toFree.map(id=>sb.from('bikes').update({status:'available'}).eq('id',id))).catch(()=>{});

  let assignedVal;
  if(S.modalBikes.length===1){
    assignedVal=S.modalBikes[0];
    const _ar=await sb.from('queue_entries').update({status:'active',assigned_bike_id:assignedVal,...priceUpdate}).eq('id',riderId);
    if(_writeErr(_ar,'check-in')){await loadData();closeModal();return;} // surface a failed check-in instead of silently closing
  }else{
    
    const jsonVal=JSON.stringify(S.modalBikes);
    const{error}=await sb.from('queue_entries').update({status:'active',assigned_bike_id:jsonVal,...priceUpdate}).eq('id',riderId);
    if(error){
      
      assignedVal=S.modalBikes[0];
      await sb.from('queue_entries').update({status:'active',assigned_bike_id:assignedVal,...priceUpdate}).eq('id',riderId);
      
      S._extraBikes=S._extraBikes||{};
      S._extraBikes[riderId]=S.modalBikes;
    }else{
      assignedVal=jsonVal;
    }
  }
  if(rider&&rider.typePreference==='Any'&&selected.length>0){
    await sb.from('queue_entries').update({type_preference:selected[0].type}).eq('id',riderId);
  }
  await loadData();closeModal();
  if(isReassign){
    toast(t('toastBikeChanged'));
    pushUndo(`${t('undoChangeBike')} #${qn} ${rName}`,async()=>{
      const undoAssign={assigned_bike_id:alreadyAssigned.length===1?alreadyAssigned[0]:JSON.stringify(alreadyAssigned)};
      if(priceUpdate.price!=null&&prevPrice!=null)undoAssign.price=prevPrice;
      delete S._extraBikes[riderId];
      await Promise.all([
        ...needsUpdate.map(b=>sb.from('bikes').update({status:'available'}).eq('id',b.id)),
        ...toFree.map(id=>sb.from('bikes').update({status:'in-use'}).eq('id',id)),
        sb.from('queue_entries').update(undoAssign).eq('id',riderId),
      ]);
      await loadData();renderStaffQueue();
    });
  }else{
    toast(`${bikeNames} ${t('toastAssignedChecked')}`);
    try{localStorage.setItem('cq_ct_'+riderId,Date.now());}catch(e){}
    pushUndo(`${t('undoCheckin')} #${qn} ${rName}`,async()=>{
      try{localStorage.removeItem('cq_ct_'+riderId);}catch(e){}
      const undoEntry={status:'waiting',assigned_bike_id:null};
      if(priceUpdate.price!=null&&prevPrice!=null)undoEntry.price=prevPrice;
      await Promise.all([
        ...needsUpdate.map(b=>sb.from('bikes').update({status:'available'}).eq('id',b.id)),
        sb.from('queue_entries').update(undoEntry).eq('id',riderId),
      ]);
      await loadData();renderStaffQueue();
    });
  }
  S._flashId=riderId;S._flashColor='green';setTimeout(()=>{S._flashId=null;},800);
  renderStaffQueue();
}

          <button type="button" onclick="openBikeProfile('${b.id}')" style="background:none;border:none;padding:0;cursor:pointer;text-align:start;font-weight:900;font-size:13px;line-height:1.3;color:var(--text)"><span style="text-decoration:underline;text-decoration-color:rgba(255,255,255,.2);text-underline-offset:2px">${esc(b.name)}</span></button>
          <div style="display:flex;gap:3px;flex-shrink:0">${dots}</div>
        </div>
        <div style="display:flex;gap:5px;align-items:center;margin-bottom:8px;flex-wrap:wrap">
          ${typeBadge(b.type)}
          <span style="background:var(--s3);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:800;color:var(--muted-l)">${b.size}</span>
        </div>
        <div style="display:flex;align-items:center;gap:5px${(user||orphaned)?';margin-bottom:5px':''}">
          <span class="avail-dot ${dot}" style="display:inline-block;flex-shrink:0"></span>
          <span style="color:${sclr};font-weight:700;font-size:12px">${b.status==='available'?t('availLabel'):b.status==='in-use'?t('inUseLabel'):isMaintG?t('maintLabel'):t('retiredLabel')}</span>
          ${el?`<span style="font-size:10px;color:var(--blue);font-weight:700;margin-left:2px"> ${el}</span>`:''}
        </div>
        ${user?`<div style="font-size:11px;font-weight:700;color:var(--green)">#${user.queueNum} ${esc(user.name)}</div>`:orphaned?`<div style="font-size:11px;font-weight:700;color:#e08828">${t('noRiderAssigned')}</div>`:''}
        <div style="display:flex;flex-direction:column;gap:4px;margin-top:10px">
          <div style="display:flex;gap:4px">
            <button class="btn-sm btn-blue" style="flex:1" onclick="startEdit('${b.id}')">${t('editBtn')}</button>
            <button class="btn-sm btn-red" style="flex:1" ${b.status!=='in-use'&&!isRetiredG?`onclick="delBike('${b.id}')"`:' disabled'}>${t('deleteBtn')}</button>
          </div>
          ${orphaned?`<button class="btn-sm btn-orange" style="width:100%;justify-content:center;text-align:center" onclick="releaseBike('${b.id}')">${t('releaseBikeBtn')}</button>`:`<button class="btn-sm btn-${isRetiredG?'green':'muted'}" style="width:100%;justify-content:center;text-align:center" onclick="toggleRetire('${b.id}')">${isRetiredG?t('restoreBtn'):t('retireBtn')}</button>`}
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  function renderTypeSection(ty,color){
    if(S.bkTypeFilter!=='all'&&S.bkTypeFilter!==ty) return '';
    let typeBikes=bikes.filter(b=>b.type===ty);
    // Status-aware: 'all' hides retired+maintenance; a specific status (incl. maintenance/retired) shows only that
    if(S.bkStatus==='all') typeBikes=typeBikes.filter(b=>b.status!=='retired'&&b.status!=='maintenance');
    else                   typeBikes=typeBikes.filter(b=>b.status===S.bkStatus);
    if(S.bkSize!=='all')   typeBikes=typeBikes.filter(b=>b.size===S.bkSize);
    if(bkSearch){
      const q=bkSearch.toLowerCase();
      typeBikes=typeBikes.filter(b=>[b.name,b.brand,b.model,b.groupset,b.size,b.type].some(v=>v&&String(v).toLowerCase().includes(q)));
    }
    const col=S.bkSortCol||'name';const dir=S.bkSortDir||1;
    typeBikes.sort((a,b)=>{
      let v=0;
      if(col==='name')    v=a.name.localeCompare(b.name);
      else if(col==='brand')   v=(a.brand||'').localeCompare(b.brand||'');
      else if(col==='model')   v=(a.model||'').localeCompare(b.model||'');
      else if(col==='groupset')v=(a.groupset||'').localeCompare(b.groupset||'');
      else if(col==='speeds')  v=(a.speeds||0)-(b.speeds||0);
      else if(col==='size')    v=(sizeOrder[a.size]??9)-(sizeOrder[b.size]??9);
      else if(col==='status')  v=(sortOrder[a.status]??9)-(sortOrder[b.status]??9);
      return v!==0?v*dir:a.name.localeCompare(b.name);
    });
    const all=bikes.filter(b=>b.type===ty&&b.status!=='retired'&&b.status!=='maintenance');
    const tyAvail=all.filter(b=>b.status==='available').length;
    const tyUse  =all.filter(b=>b.status==='in-use').length;
    const headCount=S.bkStatus==='all'?all.length:typeBikes.length;
    const _vis=typeBikes.map(b=>b.id);
    const _allSel=_vis.length>0&&_vis.every(id=>(S.bkSelected||[]).includes(id));
    const _selHdr=`<th style="width:34px;text-align:center"><input type="checkbox" aria-label="${t('bkSelectAll')}" title="${t('bkSelectAll')}" ${_allSel?'checked':''} onclick="_bkSelectMany(${esc(JSON.stringify(_vis))},this.checked)"></th>`;
    const typeContent=S.bkView==='grid'
      ?renderBikeGrid(typeBikes)
      :`<div class="table-wrapper" style="overflow-x:auto;max-width:100%;-webkit-overflow-scrolling:touch"><table class="queue-table" style="min-width:560px">
        <thead><tr>
          ${_selHdr}
          ${sortHdr('name',t('bikeNameLabel'))}
          ${sortHdr('brand',t('bikeBrand'))}
          ${sortHdr('model',t('bikeModel'))}
          ${sortHdr('groupset',t('bikeGroupset'))}
          ${sortHdr('speeds',t('bikeSpeeds'))}
          <th>${t('bikeTypeLabel')}</th>
          ${sortHdr('size',t('frameSizeLabel'))}
          <th>${t('bikeRentalPrice')}</th>
          <th>${t('colColor')}</th>
          ${sortHdr('status',t('colStatus'))}
          <th>${t('colRider')}</th>
          <th>${t('colManageBike')}</th>
        </tr></thead>
        <tbody>${typeBikes.length?typeBikes.map(renderBikeRow).join(''):`<tr><td colspan="13" style="padding:16px 0">${emptyIllustration(ILLUS_BIKE_OK,t('noBikes'))}</td></tr>`}</tbody>
      </table></div>`;
    return`<div style="margin-bottom:28px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:4px;height:32px;border-radius:3px;background:${color};flex-shrink:0"></div>
          <div>
            <div style="font-size:17px;font-weight:900">${typeLabel(ty)}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px;font-weight:600">
              <bdi>${all.length} ${t('bikesWord')}</bdi> &nbsp;·&nbsp;
              <bdi style="color:var(--green)">${tyAvail} ${t('availLabel').toLowerCase()}</bdi>
              ${tyUse>0?` &nbsp;·&nbsp; <bdi style="color:var(--muted-l)">${tyUse} ${t('inUseLabel').toLowerCase()}</bdi>`:''}
            </div>
          </div>
        </div>
        <button class="btn-secondary" style="font-size:12px;padding:6px 12px"
          onclick="S.showAddBike=true;S.addBikeType='${ty}';S.editBikeId=null;S.addBikeSize='M';S.addBikeColors=['#03ff89'];S.addBikeColorNames=[''];S._bkName='';S._bkFrame='';S._bkLocationAdd=false;S._bkLocation=S.bkLocations[0]||'JCC';S._bkNumber=String(_nextBikeNumber());renderBikes();_scrollToBikeForm()">
          + ${typeLabel(ty)}
        </button>
      </div>
      ${typeContent}
    </div>`;
  }

  const typeColorMap={Road:'#4aa8f8',Hybrid:'#03ff89',Mountain:'#e08828',Gravel:'#a06af0'};
  const typeSections=['Road','Hybrid','Mountain','Gravel'].map(ty=>renderTypeSection(ty,typeColorMap[ty])).join('');
  const retiredBikes=bikes.filter(b=>b.status==='retired'||b.status==='maintenance');
  // Only show the collapsed graveyard in the default 'all' view — a specific status filter shows those bikes inline instead
  const retiredSection=(retiredBikes.length&&S.bkStatus==='all')?`<div style="margin-bottom:28px">
    <button onclick="S.bkShowRetired=!S.bkShowRetired;renderBikes()" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(255,255,255,.02);border:1.5px solid rgba(255,255,255,.07);border-radius:12px;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:border-color .2s" onmouseover="this.style.borderColor='rgba(255,255,255,.15)'" onmouseout="this.style.borderColor='rgba(255,255,255,.07)'">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:4px;height:24px;border-radius:3px;background:rgba(160,160,160,.4);flex-shrink:0"></div>
        <div style="font-size:15px;font-weight:900;color:var(--muted-l)">${t('retiredLabel')} &amp; ${t('maintLabel')}</div>
        <div style="background:rgba(255,255,255,.07);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:800;color:var(--muted)">${retiredBikes.length}</div>
      </div>
      <span style="font-size:16px;color:var(--muted)">${S.bkShowRetired?'▲':'▼'}</span>
    </button>
    ${S.bkShowRetired?`<div style="margin-top:10px">
      ${S.bkView==='grid'
        ?`<div class="bike-grid" style="opacity:.75">${retiredBikes.map(b=>{
          const colors=b.colors&&b.colors.length?b.colors:['#03ff89'];
          const dots=colors.map(c=>`<span style="width:11px;height:11px;border-radius:50%;background:${c};border:1.5px solid rgba(0,0,0,.3);display:inline-block;flex-shrink:0"></span>`).join('');
          return`<div class="bike-grid-card" style="border-color:rgba(160,160,160,.2)">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:6px">
              <div style="font-weight:900;font-size:13px;line-height:1.3;color:var(--muted-l)">${esc(b.name)}</div>
              <div style="display:flex;gap:3px;flex-shrink:0">${dots}</div>
            </div>
            <div style="display:flex;gap:5px;align-items:center;margin-bottom:8px;flex-wrap:wrap">
              ${typeBadge(b.type)}
              <span style="background:var(--s3);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:800;color:var(--muted-l)">${b.size}</span>
            </div>
            <div style="display:flex;align-items:center;gap:5px;margin-bottom:8px">
              <span class="avail-dot dot-red" style="display:inline-block;flex-shrink:0"></span>
              <span style="color:var(--muted);font-weight:700;font-size:12px">${t('retiredLabel')}</span>
            </div>
            <div style="margin-bottom:10px">
              <div style="font-size:9px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">${t('lifespanLabel')}</div>
              <div style="font-size:11px;font-weight:700;color:var(--muted-l)">${_bikeLifespan(b)}</div>
            </div>
            <div style="display:flex;gap:4px">
              <button class="btn-sm btn-blue" style="flex:1" onclick="startEdit('${b.id}')">${t('editBtn')}</button>
              <button class="btn-sm btn-green" style="flex:1" onclick="toggleRetire('${b.id}')">${t('restoreBtn')}</button>
            </div>
          </div>`;
        }).join('')}</div>`
        :`<div class="table-wrapper"><table class="queue-table"><thead><tr>
          <th>${t('bikeNameLabel')}</th><th>${t('bikeBrand')}</th><th>${t('bikeModel')}</th>
          <th>${t('bikeTypeLabel')}</th><th>${t('frameSizeLabel')}</th><th>${t('lifespanLabel')}</th><th>${t('colStatus')}</th><th>${t('colManageBike')}</th>
        </tr></thead><tbody>${retiredBikes.map(b=>`<tr style="opacity:.7">
          <td><div style="display:flex;align-items:center;gap:10px">${b.photo?`<img src="${esc(b.photo)}" alt="" style="width:38px;height:38px;border-radius:8px;object-fit:cover;border:1px solid var(--border);flex-shrink:0">`:''}<div class="rider-name">${esc(b.name)}</div></div></td>
          <td style="font-weight:700;font-size:13px">${b.brand?esc(b.brand):`<span style="color:var(--muted)">—</span>`}</td>
          <td style="font-weight:700;font-size:13px">${b.model?esc(b.model):`<span style="color:var(--muted)">—</span>`}</td>
          <td>${typeBadge(b.type)}</td>
          <td style="font-weight:800">${b.size}</td>
          <td style="font-weight:700;font-size:12px;color:var(--muted-l);white-space:nowrap">${_bikeLifespan(b)}</td>
          <td><span style="color:var(--muted);font-weight:700;font-size:12px">${t('retiredLabel')}</span></td>
          <td><div class="actions-cell">
            <button class="btn-sm btn-blue" onclick="startEdit('${b.id}')">${t('editBtn')}</button>
            <button class="btn-sm btn-green" onclick="toggleRetire('${b.id}')">${t('restoreBtn')}</button>
          </div></td>
        </tr>`).join('')}</tbody></table></div>`}
    </div>`:''}
  </div>`:''

  const _selIds=(S.bkSelected||[]).filter(id=>bikes.some(b=>b.id===id));
  if(_selIds.length!==(S.bkSelected||[]).length)S.bkSelected=_selIds; // drop stale ids
  const bulkBar=_selIds.length?`<div class="bk-bulk-bar">
      <span class="bk-bulk-count">${t('bkSelectedN').replace('{0}',_selIds.length)}</span>
      <button class="btn-sm btn-orange" onclick="bkBulkMaintenance()">${t('bkBulkMaint')}</button>
      <button class="btn-sm btn-muted" onclick="bkBulkRetire()">${t('bkBulkRetire')}</button>
      <span class="bk-bulk-group">
        <select id="bk-bulk-loc" class="filter-select" style="height:32px;min-width:120px">${S.bkLocations.map(l=>`<option value="${esc(l)}">${esc(l)}</option>`).join('')}</select>
        <button class="btn-sm btn-blue" onclick="bkBulkLocation()">${t('bkBulkMove')}</button>
      </span>
      ${isAdmin()?`<span class="bk-bulk-group">
        <input id="bk-bulk-price" type="number" min="0" step="0.5" placeholder="${t('bkBulkPricePh')}" class="filter-select" style="height:32px;width:84px">
        <button class="btn-sm btn-blue" onclick="bkBulkPrice()">${t('bkBulkSetPrice')}</button>
      </span>`:''}
      <button class="btn-sm btn-green" onclick="bkBulkExport()">${t('bkBulkExport')}</button>
      <button class="btn-sm btn-muted" onclick="bkClearSel()">✕ ${t('clearWord')}</button>
    </div>`:'';

  document.getElementById('tab-bikes').innerHTML=`
    <div class="section-header" style="flex-wrap:wrap;gap:10px;max-width:100%">
      <div style="min-width:0">
        <div class="page-title">${t('bikesTitle')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;max-width:100%;min-width:0">
        <div class="view-toggle" style="flex:0 0 auto">
          <button class="view-toggle-btn${S.bkView==='grid'?' active':''}" onclick="S.bkView='grid';renderBikes()" title="${t('gridViewBtn')}">⊞</button>
          <button class="view-toggle-btn${S.bkView==='table'?' active':''}" onclick="S.bkView='table';renderBikes()" title="${t('tableViewBtn')}">☰</button>
        </div>
        <button class="btn-primary" onclick="toggleAddBike()" style="white-space:nowrap;flex:0 1 auto;max-width:100%">${t('addBike')}</button>
      </div>
    </div>
    ${addForm}
    <div class="stats-row" style="margin-bottom:20px">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">${t('totalStat')}</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--green)">${nAvail}</div><div class="stat-label">${t('availLabel')}</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--text)">${nUse}</div><div class="stat-label">${t('inUseLabel')}</div></div>
      <div class="stat-card${nMaint>0?' stat-card-clickable':''}"${nMaint>0?` onclick="setBkStatus('maintenance')" style="cursor:pointer"`:''}><div class="stat-num" style="color:var(--orange)">${nMaint}</div><div class="stat-label">${t('maintLabel')}</div></div>
    </div>
    <div class="filter-bar" style="margin-bottom:20px">
      <div class="filter-row" style="flex-wrap:wrap;gap:10px;align-items:flex-end">
        <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:180px;max-width:280px">
          <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">${t('searchWord')}</span>
          <input id="bk-search-input" type="text" class="filter-select" placeholder="${t('phBikeSearch')}" value="${esc(bkSearch)}" oninput="setBkSearch(this.value)">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">${t('filterType')}</span>
          <select class="filter-select" onchange="S.bkTypeFilter=this.value;renderBikes()">${bkTypeOpts}</select>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">${t('filterStatus')}</span>
          <select class="filter-select" onchange="setBkStatus(this.value)">${bkStatusOpts}</select>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">${t('sizeWord')}</span>
          <select class="filter-select" onchange="setBkSize(this.value)">${bkSizeOpts}</select>
        </div>
        ${bkSearch||S.bkTypeFilter!=='all'||S.bkStatus!=='all'||S.bkSize!=='all'?`<button class="btn-secondary" style="font-size:12px;padding:5px 10px;align-self:flex-end" onclick="S.bkSearch='';S.bkTypeFilter='all';S.bkStatus='all';S.bkSize='all';renderBikes()">✕ ${t('clearWord')}</button>`:''}
      </div>
    </div>
    ${bulkBar}
    ${typeSections}
    ${retiredSection}`;
}

function _resetBikeForm(){S.showAddBike=false;S.editBikeId=null;S.addBikeType=null;S.addBikeSize='M';S.addBikeColors=['#6ee89a'];S.addBikeColorNames=[''];S._bkName='';S._bkNameCustom=false;S._bkBrand='';S._bkModel='';S._bkGroupset='';S._bkSpeeds='';S._bkRentalPrice='';S._bkBrandAdd=false;S._bkModelAdd=false;S._bkGroupsetAdd=false;S._bkLocation=S.bkLocations[0]||'Sharafeyah Branch';S._bkLocationAdd=false;S._bkFrame='';S._bkNumber='';S._bkStartDate=_todayISO();S._bkPhoto='';}

function _bkLocationChange(val){
  if(val==='__add__'){S._bkLocationAdd=true;S._bkLocation='__pending__';renderBikes();setTimeout(()=>document.getElementById('bk-location')?.focus(),50);return;}
  S._bkLocation=val;renderBikes();
}
function _bkLocationSave(){
  const v=(document.getElementById('bk-location')?.value||'').trim();
  if(!v){_bkLocationCancel();return;}
  if(!S.bkLocations.includes(v)){S.bkLocations=[...S.bkLocations,v];try{localStorage.setItem('cq_bk_locations',JSON.stringify(S.bkLocations));}catch(e){}}
  S._bkLocation=v;S._bkLocationAdd=false;renderBikes();
}
function _bkLocationCancel(){S._bkLocationAdd=false;S._bkLocation=S.bkLocations[0]||'Sharafeyah Branch';renderBikes();}
function _updateBkNamePreview(){
  const el=document.getElementById('bk-name');if(!el)return;
  const num=document.getElementById('bk-number')?.value||S._bkNumber;
  const size=document.getElementById('bk-size')?.value||S.addBikeSize;
  const auto=genBikeName(S.addBikeType,S._bkFrame,num,size);
  el.placeholder=auto;
  if(!S._bkNameCustom){el.value=auto;S._bkName=auto;} // keep auto name in sync until the user types a custom one
}
// Reset the bike name back to the auto-generated value
function _bkNameResetAuto(){
  S._bkNameCustom=false;S._bkName='';
  const el=document.getElementById('bk-name');
  const num=document.getElementById('bk-number')?.value||S._bkNumber;
  const size=document.getElementById('bk-size')?.value||S.addBikeSize;
  const auto=genBikeName(S.addBikeType,S._bkFrame,num,size);
  if(el)el.value=auto;
  _bkNameSyncResetBtn();
}
// Enable/disable the "↺ Auto" button without a full re-render (so typing isn't interrupted)
function _bkNameSyncResetBtn(){const b=document.getElementById('bk-name-auto');if(b)b.disabled=!S._bkNameCustom;}

function setBkRentalPrice(v){
  if(!isAdmin()){toast(t('adminOnlyMsg'),'error');return;}
  if(v==='custom'){
    _showCustomPriceModal();
  }else{
    S._bkRentalPrice=v;
    renderBikes();
  }
}
function _showCustomPriceModal(){
  const m=document.getElementById('confirm-modal');
  m.style.display='block';
  m.innerHTML=`<div class="modal-backdrop" onclick="if(event.target===this){var _m=document.getElementById('confirm-modal');_m.style.display='none';_m.innerHTML='';renderBikes();}">
    <div class="confirm-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div style="font-size:18px;font-weight:900">${t('bikeCustomPrice')}</div>
        <button onclick="document.getElementById('confirm-modal').style.display='none';document.getElementById('confirm-modal').innerHTML='';renderBikes()" aria-label="Close" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1;padding:0 4px" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">&times;</button>
      </div>
      <div style="margin-bottom:20px">
        <label style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:8px">Price (SAR)</label>
        <input id="custom-price-inp" type="number" min="1" step="0.5" placeholder="${t('phHeightEg')}"
          style="width:100%;background:var(--s2);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px 14px;font-size:16px;font-weight:700;color:var(--text);font-family:'Space Grotesk',sans-serif;outline:none"
          onfocus="this.style.borderColor='var(--green)'" onblur="this.style.borderColor='rgba(255,255,255,.12)'"
          onkeydown="if(event.key==='Enter')_submitCustomPrice()">
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn-secondary" onclick="document.getElementById('confirm-modal').style.display='none';document.getElementById('confirm-modal').innerHTML='';renderBikes()">${t('cancelBtn')}</button>
        <button class="btn-primary" onclick="_submitCustomPrice()" style="min-width:100px">${t('setPriceBtn')}</button>
      </div>

function delBike(id){
  if(!isAdmin()){toast(t('adminOnlyMsg'),'error');return;}
  const bike=getBikes().find(x=>x.id===id);
  if(!bike||bike.status==='in-use'){toast(t('errBikeInUse'),'error');return;}
  confirmDialog({
    title:t('confirmDeleteBikeTitle'),
    body:bike.name,
    confirmLabel:t('deleteBtn'),
    confirmClass:'btn-red',
    onConfirm:async()=>{
      const saved={id:bike.id,name:bike.name,size:bike.size,type:bike.type,colors:[...(bike.colors||[])],color_names:[...(bike.color_names||[])],brand:bike.brand||null,model:bike.model||null,groupset:bike.groupset||null,speeds:bike.speeds||null,status:'available',location:bike.location||null,frame_type:bike.frame_type||null,bike_number:bike.bike_number??null};
      await sb.from('bikes').delete().eq('id',id);
      await loadData();toast(`${bike.name} ${t('toastBikeRemoved')}`);
      pushUndo(`${t('undoDeleteBike')} ${bike.name}`,async()=>{
        await sb.from('bikes').insert(saved);
        await loadData();renderBikes();
      });
      renderBikes();
    }
  });
}


function _bkFieldHtml(id,val,addMode,list){
  if(addMode){
    return`<div style="display:flex;gap:6px">
      <input id="${id}" type="text" value="${esc(val)}" placeholder="${t('typeNewLabel')||'Type new...'}"
        style="flex:1"
        onkeydown="if(event.key==='Enter'){event.preventDefault();_bkOptSave('${id}');}">
      <button class="btn-primary" style="padding:8px 14px;flex-shrink:0;white-space:nowrap" onclick="_bkOptSave('${id}')">✓ ${t('saveBtn')||'Save'}</button>
      <button class="btn-secondary" style="padding:8px 10px;flex-shrink:0" onclick="_bkOptCancel('${id}')" aria-label="${t('cancelBtn')}">✕</button>
    </div>`;
  }
  const opts=list.map(v=>`<option value="${esc(v)}"${v===val?' selected':''}>${esc(v)}</option>`).join('');
  return`<select id="${id}" onchange="_bkSelChange('${id}',this.value)">
    <option value=""${!val?' selected':''}>—</option>
    ${opts}
    <option value="__add__">+ ${t('addNewOption')||'Add new...'}</option>
  </select>`;
}
function _bkSelChange(id,val){
  if(val==='__add__'){
    if(id==='bk-brand'){S._bkBrand='';S._bkBrandAdd=true;}
    else if(id==='bk-model'){S._bkModel='';S._bkModelAdd=true;}
    else if(id==='bk-groupset'){S._bkGroupset='';S._bkGroupsetAdd=true;}
    renderBikes();
    setTimeout(()=>document.getElementById(id)?.focus(),50);
  }else{
    if(id==='bk-brand')S._bkBrand=val;
    else if(id==='bk-model')S._bkModel=val;
    else if(id==='bk-groupset')S._bkGroupset=val;
  }
}
function _bkOptSave(id){
  const el=document.getElementById(id);
  const v=(el?el.value:'').trim();
  if(!v)return;
  const _add=(lsKey,arr,stateKey)=>{
    if(!S[arr].includes(v)){S[arr]=[...S[arr],v].sort((a,b)=>a.localeCompare(b));try{localStorage.setItem(lsKey,JSON.stringify(S[arr]));}catch{}}
    S[stateKey]=v;
  };
  if(id==='bk-brand'){_add('cq_bk_brands','bkBrands','_bkBrand');S._bkBrandAdd=false;}
  else if(id==='bk-model'){_add('cq_bk_models','bkModels','_bkModel');S._bkModelAdd=false;}
  else if(id==='bk-groupset'){_add('cq_bk_groupsets','bkGroupsets','_bkGroupset');S._bkGroupsetAdd=false;}
  renderBikes();
}
function _bkOptCancel(id){
  if(id==='bk-brand'){S._bkBrandAdd=false;S._bkBrand='';}
  else if(id==='bk-model'){S._bkModelAdd=false;S._bkModel='';}
  else if(id==='bk-groupset'){S._bkGroupsetAdd=false;S._bkGroupset='';}
  renderBikes();
}
function _autoSaveBkOpts(brand,model,groupset){
  const _add=(lsKey,arr,v)=>{
    if(v&&!S[arr].includes(v)){S[arr]=[...S[arr],v].sort((a,b)=>a.localeCompare(b));try{localStorage.setItem(lsKey,JSON.stringify(S[arr]));}catch{}}
  };
  _add('cq_bk_brands','bkBrands',brand);
  _add('cq_bk_models','bkModels',model);
  _add('cq_bk_groupsets','bkGroupsets',groupset);
}


function fmtDur(min){if(!min||min<1)return'—';if(min<60)return`${min} min`;return`${Math.floor(min/60)}h ${min%60}m`;}

// Per-customer profile: aggregate a rider's history from queue data (no customers-table read)
function openCustomerProfile(entryId){
  const e=getQueue().find(x=>x.id===entryId);if(!e)return;
  const mine=e.customerId
    ?getQueue().filter(x=>x.customerId===e.customerId)
    :getQueue().filter(x=>!x.customerId&&x.name===e.name&&(x.phone||'')===(e.phone||''));
  const doneePaid=mine.filter(x=>x.status==='done'&&x.paid);
  const spent=doneePaid.reduce((s,x)=>s+(x.price??DEFAULT_PRICE),0);
  const typeCount={};doneePaid.forEach(x=>{const ty=resolvedType(x);typeCount[ty]=(typeCount[ty]||0)+1;});
  const favType=Object.keys(typeCount).sort((a,b)=>typeCount[b]-typeCount[a])[0]||'—';
  const rated=mine.filter(x=>x.ratingExp||x.ratingBike);
  const avgRating=rated.length?Math.round(rated.map(x=>x.ratingExp||x.ratingBike).reduce((a,b)=>a+b,0)/rated.length*10)/10:0;
  const first=mine.map(x=>x.registeredAt).filter(Boolean).sort()[0];
  const bookings=[...mine].sort((a,b)=>new Date(b.registeredAt||0)-new Date(a.registeredAt||0));
  const kpi=(v,l)=>`<div style="flex:1;min-width:90px;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:12px 14px"><div style="font-size:20px;font-weight:900">${v}</div><div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px">${l}</div></div>`;
  const rows=bookings.length?bookings.map(x=>{
    const bike=getAssignedBikes(x)[0]||null;
    return`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
      <span class="queue-num-cell" style="font-size:14px;min-width:38px">#${x.queueNum}</span>
      <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">${dayLabel(x.sessionDay)||''} · ${shortDate(x.sessionDate)}</div>
        <div style="font-size:11px;color:var(--muted)">${typeLabel(resolvedType(x))}${bike?` · ${esc(bike.name)}`:''}</div></div>
      ${statusBadge(x.status)}
      <span style="font-weight:800;font-size:12px;color:${x.paid?'var(--green)':'var(--muted-l)'}">SAR ${x.price??DEFAULT_PRICE}</span>
    </div>`;
  }).join(''):`<div class="empty-state">${t('custNoBookings')}</div>`;
  document.getElementById('cust-modal').innerHTML=`<div class="modal-backdrop" onclick="if(event.target===this)closeCustomerProfile()">
    <div class="modal-box" role="dialog" aria-modal="true" style="max-width:560px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px">
        <div class="modal-title" style="margin-bottom:0">${esc(e.name)}</div>
        <button onclick="closeCustomerProfile()" aria-label="Close" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1;padding:0 2px">&times;</button>
      </div>
      <div class="modal-sub" style="margin-bottom:12px">${e.customerId?[e.phone,e.email].filter(Boolean).join(' · '):t('custWalkIn')}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
        ${kpi(doneePaid.length,t('custTotalRides'))}
        ${kpi('SAR '+spent,t('custTotalSpent'))}
        ${kpi(favType!=='—'?typeLabel(favType):'—',t('custFavType'))}
        ${kpi(avgRating?avgRating+'/10':'—',t('custAvgRating'))}
      </div>
      ${first?`<div style="font-size:11px;color:var(--muted);margin-bottom:10px">${t('custMemberSince')}: ${shortDate(first.slice(0,10))}</div>`:''}
      <div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px">${t('custBookingsLabel')}</div>
      <div style="max-height:300px;overflow-y:auto">${rows}</div>
    </div>
  </div>`;
  document.getElementById('cust-modal').style.display='flex';
}
function closeCustomerProfile(){document.getElementById('cust-modal').style.display='none';}

function renderHistory(){
  const queue=getQueue();const hist=queue.filter(e=>e.status==='done'||e.status==='noshow'||e.status==='cancelled'||e.status==='removed');
  const sessions=allSessions();
  const sessionFiltered=S.histSess!=='all'?hist.filter(e=>e.sessionId===S.histSess):hist;
  const nDone=sessionFiltered.filter(e=>e.status==='done').length,nPaid=sessionFiltered.filter(e=>e.status==='done'&&e.paid).length,
        nPend=sessionFiltered.filter(e=>e.status==='done'&&!e.paid).length,nNoShow=sessionFiltered.filter(e=>e.status==='noshow').length;
  let filtered=[...hist];
  if(S.histSess!=='all')   filtered=filtered.filter(e=>e.sessionId===S.histSess);
  if(S.histStatus!=='all') filtered=filtered.filter(e=>e.status===S.histStatus);
  if(S.histPay==='paid')   filtered=filtered.filter(e=>e.paid);
  if(S.histPay==='pending')filtered=filtered.filter(e=>!e.paid&&e.status==='done');
  if(S.histType!=='all')   filtered=filtered.filter(e=>resolvedType(e)===S.histType);
  if(S.histSize!=='all')   filtered=filtered.filter(e=>e.size===S.histSize);
  if(S.histSearch.trim()){const q=S.histSearch.trim().toLowerCase().replace(/^#/,'');filtered=filtered.filter(e=>e.name.toLowerCase().includes(q)||(e.phone||'').includes(q)||(e.email||'').toLowerCase().includes(q)||String(e.queueNum)===q);}
  const _hd=S.histSortDir;
  filtered.sort((a,b)=>{
    if(S.histSort==='name')   return _hd*a.name.localeCompare(b.name);
    if(S.histSort==='amount') return _hd*((a.price||0)-(b.price||0));
    if(S.histSort==='type')   return _hd*(resolvedType(a)||'').localeCompare(resolvedType(b)||'');
    if(S.histSort==='status') return _hd*(a.status||'').localeCompare(b.status||'');

function exportHistoryCSV(){
  let hist=getQueue().filter(e=>['done','noshow','cancelled','removed'].includes(e.status));
  if(S.histSess!=='all') hist=hist.filter(e=>e.sessionId===S.histSess);
  const sess=S.histSess!=='all'?allSessions().find(s=>s.id===S.histSess):null;
  const filename=sess
    ?`rides_${dayLabel(sess.day)}_${sess.session_date||sess.id}.csv`
    :'rides_all_sessions.csv';
  const headers=[t('colQueueNum'),t('nameLabel'),t('repColPhone'),t('repColEmail'),t('colSession'),t('colDate'),t('timeLabel'),t('colBike'),t('repColType'),t('repPriceSar'),t('paidLabel'),t('colStatus')];
  const rows=hist.map(e=>{
    const assignedBikes=getAssignedBikes(e);
    const bikeNamesCsv=assignedBikes.map(b=>b.name).join('; ');
    const entSess=allSessions().find(s=>s.id===e.sessionId);
    return[
      e.queueNum,
      e.name,
      e.phone||'',
      e.email||'',
      dayLabel(e.sessionDay),
      shortDate(e.sessionDate),
      sessionTime(entSess),
      bikeNamesCsv,
      resolvedType(e),
      e.price??DEFAULT_PRICE,
      e.paid?t('repYes'):t('repNo'),
      reportStatusLabel(e.status)
    ].map(v=>'"'+String(v).replace(/"/g,'""')+'"');
  });
  if(!rows.length){toast(t('noHistory'),'warning');return;}
  const csv=[headers.map(h=>'"'+h+'"').join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}

function _uid(){return Math.random().toString(36).slice(2,7);}

function _areaChart(series,labels,opts={}){
  const {W=460,H=148,unitPfx=''}=opts;
  const n=labels.length;
  if(!n)return`<div style="padding:28px 0;text-align:center;color:var(--muted);font-size:12px">${t('anNoData2')}</div>`;
  const pL=44,pR=14,pT=14,pB=28,cW=W-pL-pR,cH=H-pT-pB;
  const maxV=Math.max(...series.flatMap(s=>s.vals),1);
  const xOf=i=>pL+(n===1?cW/2:i/(n-1)*cW);
  const yOf=v=>pT+cH-(v/maxV)*cH;
  const nth=Math.ceil(n/7);
  let defs='',paths='';
  series.forEach(s=>{
    const pts=s.vals.map((v,i)=>[xOf(i),yOf(v)]);
    const lD=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    const aD=`M${pts[0][0].toFixed(1)},${(pT+cH).toFixed(1)} ${pts.map(p=>`L${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ')} L${pts[n-1][0].toFixed(1)},${(pT+cH).toFixed(1)}Z`;
    if(s.fill!==false){
      const gid='g'+_uid();
      defs+=`<linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${s.color}" stop-opacity=".25"/><stop offset="100%" stop-color="${s.color}" stop-opacity=".02"/></linearGradient>`;
      paths+=`<path d="${aD}" fill="url(#${gid})"/>`;
    }
    paths+=`<path d="${lD}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"${s.dashed?' stroke-dasharray="5 4"':''}/>`;
    pts.forEach((p,i)=>{if(n<=14||i%2===0||i===n-1)paths+=`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${n>10?2.5:3}" fill="${s.color}" stroke="rgba(10,10,10,.7)" stroke-width="1.5"/>`;});
  });
  const grid=[0,.25,.5,.75,1].map(pct=>{
    const v=maxV*pct,y=(pT+cH-pct*cH).toFixed(1);
    return`<line x1="${pL}" y1="${y}" x2="${pL+cW}" y2="${y}" stroke="rgba(255,255,255,.04)" stroke-width="1"/><text x="${pL-5}" y="${(parseFloat(y)+4).toFixed(1)}" font-size="9" text-anchor="end" fill="rgba(255,255,255,.28)">${unitPfx}${Math.round(v)}</text>`;
  }).join('');
  const xlbls=labels.map((l,i)=>{
    if(i%nth!==0&&i!==n-1)return'';
    const align=i===0?'start':i===n-1?'end':'middle';
    return`<text x="${xOf(i).toFixed(1)}" y="${H-5}" font-size="8.5" text-anchor="${align}" fill="rgba(255,255,255,.28)">${l}</text>`;
  }).join('');
  // Hover columns with native tooltips: exact per-point values for every series
  const bandW=cW/Math.max(n,1);
  const hover=labels.map((l,i)=>{
    const tip=l+'\n'+series.map(s=>`${s.label}: ${opts.unitPfx||''}${Math.round(s.vals[i])}`).join('\n');
    return`<rect class="an-hit" x="${(xOf(i)-bandW/2).toFixed(1)}" y="${pT}" width="${bandW.toFixed(1)}" height="${cH}" fill="transparent"><title>${tip}</title></rect>`;
  }).join('');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block;overflow:visible"><defs>${defs}</defs>${grid}${paths}${xlbls}${hover}</svg>`;
}

function _donut(segs,size=110){
  const total=segs.reduce((s,d)=>s+d.v,0);
  if(!total)return`<div style="padding:16px;text-align:center;color:var(--muted);font-size:12px">${t('anNoData2')}</div>`;
  const r=34,cx=size/2,cy=size/2,sw=13,C=2*Math.PI*r;
  let off=-0.25;
  const arcs=segs.filter(d=>d.v>0).map(d=>{
    const pct=d.v/total,rot=(off*360).toFixed(2);
    off+=pct;
    return`<circle class="an-hit" cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.c}" stroke-width="${sw}" stroke-dasharray="${(C*pct).toFixed(2)} ${(C*(1-pct)).toFixed(2)}" transform="rotate(${rot} ${cx} ${cy})"><title>${d.label?d.label+': ':''}${d.v} (${Math.round(pct*100)}%)</title></circle>`;
  }).join('');
  return`<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="display:block;flex-shrink:0"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="${sw}"/>${arcs}<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="900" fill="white">${total}</text></svg>`;
}

function _vbars(data,opts={}){
  const {W=320,H=130,color='#6ee89a',refVal=null}=opts;
  const n=data.length;
  if(!n)return`<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">${t('anNoData2')}</div>`;
  const pL=8,pR=8,pT=10,pB=22,cW=W-pL-pR,cH=H-pT-pB;
  const maxV=Math.max(...data.map(d=>d.v),refVal||0,1);
  const bW=Math.max(5,cW/n-4);
  const xOf=i=>pL+(i+.5)*(cW/n);
  const yOf=v=>pT+cH-(v/maxV)*cH;
  const nth=Math.ceil(n/8);
  const barsHtml=data.map((d,i)=>{
    const bH=Math.max(2,(d.v/maxV)*cH);
    return`<rect class="an-hit" x="${(xOf(i)-bW/2).toFixed(1)}" y="${(pT+cH-bH).toFixed(1)}" width="${bW.toFixed(1)}" height="${bH.toFixed(1)}" rx="2" fill="${d.c||color}" opacity=".85"><title>${d.label}: ${d.v}%</title></rect>${(i%nth===0||i===n-1)?`<text x="${xOf(i).toFixed(1)}" y="${H-4}" font-size="8" text-anchor="middle" fill="rgba(255,255,255,.3)">${d.label}</text>`:''}`;
  }).join('');
  const refLine=refVal!==null?`<line x1="${pL}" y1="${yOf(refVal).toFixed(1)}" x2="${pL+cW}" y2="${yOf(refVal).toFixed(1)}" stroke="rgba(255,255,255,.2)" stroke-width="1" stroke-dasharray="4 3"/>`:'' ;
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block">${refLine}${barsHtml}</svg>`;
}

// All sale lines for a session, normalized: rental add-ons (entry.purchases) + standalone cashier-tab sales
function _cashSessionLines(sessId){

  getQueue().filter(e=>e.sessionId===sessId).forEach(e=>entryPurchases(e).forEach(p=>lines.push({name:p.name,cat:p.cat,qty:Number(p.qty)||0,price:Number(p.price)||0,pay:p.pay,who:e.name,src:'rental'})));

// Aggregate sale lines -> category breakdown + collected/pending/free/team/refunds/discount totals.
// Special lines: cat '__discount__' (negative, reduces totals), cat '__cardmeta__' (qty 0, ignored), pay 'refunded' (reversed).
function _salesTotals(lines){
  const byCat={};let units=0,value=0,collected=0,pending=0,free=0,team=0,refunded=0,discount=0;
  (lines||[]).forEach(p=>{
    const q=Number(p.qty)||0;
    if(p.cat==='__cardmeta__'||q===0)return; // payment-split metadata, not a real line
    const v=q*(Number(p.price)||0),cat=p.cat||'Other';
    if(p.pay==='refunded'){refunded+=Math.abs(v);return;} // refunded sales reversed out of active totals
    if(cat==='__discount__'){discount+=-v;value+=v;if(p.pay==='paid')collected+=v;else pending+=v;return;} // discount: reduce, not a category
    byCat[cat]=byCat[cat]||{cat,qty:0,value:0};byCat[cat].qty+=q;byCat[cat].value+=v;units+=q;value+=v;
    if(p.pay==='paid')collected+=v;else if(p.pay==='house')free+=v;else if(p.pay==='team')team+=v;else pending+=v;
  });
  const r2=n=>Math.round(n*100)/100;
  return{cats:Object.values(byCat).sort((a,b)=>b.value-a.value),units,value:r2(value),collected:r2(collected),pending:r2(pending),free:r2(free),team:r2(team),refunded:r2(refunded),discount:r2(discount)};
}
// Card vs cash split of collected cashier sales for a session (reads the '__cardmeta__' line per receipt)
function _cashCardCash(sessId){
  const byR={};
  (S.cashSales||[]).filter(r=>r.session_id===sessId).forEach(r=>{
    const k=r.receipt_id||r.id;byR[k]=byR[k]||{paid:0,card:0,refunded:false};
    if(r.pay==='refunded'){byR[k].refunded=true;return;}
    if(r.category==='__cardmeta__'){byR[k].card=Number(r.price)||0;return;}
    if(r.pay==='paid')byR[k].paid+=(Number(r.qty)||0)*(Number(r.price)||0);
  });
  let card=0,cash=0;
  Object.values(byR).forEach(rc=>{if(rc.refunded)return;const c=Math.min(Math.max(0,rc.card),Math.max(0,rc.paid));card+=c;cash+=Math.max(0,rc.paid-c);});
  return{card:Math.round(card*100)/100,cash:Math.round(cash*100)/100};
}

  return m;
}

// Voided sale ids (kept locally so a voided purchase can never reappear, even if the DB DELETE was blocked/no-op)
function _voidedIds(){try{return JSON.parse(localStorage.getItem('cq_sales_voided')||'[]');}catch(_){return[];}}
function _voidedAdd(id){try{const v=_voidedIds();if(v.indexOf(id)<0){v.push(id);localStorage.setItem('cq_sales_voided',JSON.stringify(v));}}catch(_){}}
function _outbox(){try{const o=JSON.parse(localStorage.getItem('cq_sales_outbox')||'[]');let ch=false;o.forEach(op=>{if(!op.oid){op.oid=uid();ch=true;}});if(ch)_outboxSave(o);return o;}catch(_){return[];}}
function _outboxSave(o){try{localStorage.setItem('cq_sales_outbox',JSON.stringify(o));}catch(_){}}
function _outboxCount(){return _outbox().length;}
function _outboxEnqueue(kind,id,data){const o=_outbox();o.push({oid:uid(),kind,id,data:data||null});_outboxSave(o);_outboxFlush();}
let _outboxBusy=false;
async function _outboxFlush(){
  if(_outboxBusy||!sb||(typeof navigator!=='undefined'&&navigator.onLine===false))return;
  _outboxBusy=true;
  const snapshot=_outbox();const doneIds=[];
  for(const op of snapshot){
    try{
      const res=op.kind==='delete'?await sb.from('cashier_sales').delete().eq('id',op.id):await sb.from('cashier_sales').upsert(op.data);
      if(!(res&&res.error))doneIds.push(op.oid);
    }catch(_){/* keep op for retry */}
  }
  // Re-read the live outbox (ops may have been queued during the awaits) and drop only the ones we actually completed
  const cur=_outbox().filter(op=>doneIds.indexOf(op.oid)<0);
  _outboxSave(cur);
  _outboxBusy=false;
  if(doneIds.length&&S.view==='staff'&&S.staffTab==='cashier')renderCashier();
  if(doneIds.length&&cur.length)_outboxFlush(); // drain ops that arrived mid-flush (e.g. a void right after a record)
}
// Local + queued upsert/delete of a sale row (never lost on refresh; syncs to the DB when online)
function _salesUpsert(row){const i=(S.cashSales||[]).findIndex(r=>r.id===row.id);if(i>=0)S.cashSales[i]=row;else S.cashSales=[...(S.cashSales||[]),row];_outboxEnqueue('upsert',row.id,row);}
function _salesDelete(id){_voidedAdd(id);S.cashSales=(S.cashSales||[]).filter(r=>r.id!==id);_outboxEnqueue('delete',id,null);}

function _bookOutboxSave(o){try{localStorage.setItem('cq_book_outbox',JSON.stringify(o));}catch(_){}}

function _applyBookOutbox(){const bo=_bookOutbox();if(!bo.length)return;const have=new Set((S.queue||[]).map(e=>e.id));bo.forEach(db=>{if(!have.has(db.id)){try{S.queue.push(entryFromDB(db));}catch(_){}}});}
let _bookBusy=false;
async function _bookOutboxFlush(){
  if(_bookBusy||!sb||(typeof navigator!=='undefined'&&navigator.onLine===false))return;
  _bookBusy=true;
  const snap=_bookOutbox();const done=[];
  for(const row of snap){try{const res=await sb.from('queue_entries').upsert(row);if(!(res&&res.error))done.push(row.id);}catch(_){}}

// Commit the whole cart as one receipt (shared receipt_id), decrement stock, then print it
function _ctDiscountSAR(cartTotal){const v=parseFloat(S._ctDisc);if(isNaN(v)||v<=0)return 0;const d=S._ctDiscPct?cartTotal*(v/100):v;return Math.min(Math.max(0,cartTotal),Math.round(d*100)/100);}
// Live preview of discounted total + card/cash split without a full re-render (avoids swallowing the next click)
function _ctPreview(){
  const cart=S._ctCart||[];
  const cartTot=Math.round(cart.reduce((s,l)=>s+(Number(l.qty)||0)*(Number(l.price)||0),0)*100)/100;
  const cartPaidNum=cart.filter(l=>l.pay==='paid').reduce((s,l)=>s+(Number(l.qty)||0)*(Number(l.price)||0),0);
  const disc=_ctDiscountSAR(cartTot),after=Math.round((cartTot-disc)*100)/100;
  const paidAfter=Math.max(0,Math.round((cartPaidNum-disc)*100)/100),card=_ctCardSAR(paidAfter),cash=Math.max(0,Math.round((paidAfter-card)*100)/100);
  const g=document.getElementById('ct-grand');if(g)g.textContent='SAR '+after;
  const sp=document.getElementById('ct-split');if(sp)sp.innerHTML=card>0?`<span>${t('cashCard')} SAR ${card}</span><span>${t('cashCash')} SAR ${cash}</span>`:'';
}
function _ctCardSAR(paidTotal){const v=parseFloat(S._ctCard);if(isNaN(v)||v<=0)return 0;const c=S._ctCardPct?paidTotal*(v/100):v;return Math.min(Math.max(0,paidTotal),Math.round(c*100)/100);}
async function _ctRecord(){

  const rid=uid(),cust=(S._ctCust||'').trim()||null,at=new Date().toISOString();
  const rows=S._ctCart.map(l=>({id:uid(),receipt_id:rid,session_id:sessId,customer_name:cust,item_id:l.item_id||null,name:l.name,category:l.cat,qty:l.qty,price:l.price,pay:l.pay,team_name:l.team||null,created_at:at}));
  // Per-receipt discount as a negative 'paid' line (no schema change needed)
  const cartTotal=S._ctCart.reduce((s,l)=>s+l.qty*l.price,0);
  const discSAR=_ctDiscountSAR(cartTotal);
  if(discSAR>0)rows.push({id:uid(),receipt_id:rid,session_id:sessId,customer_name:cust,item_id:null,name:t('cashDiscount'),category:'__discount__',qty:1,price:-discSAR,pay:S._ctCart.some(l=>l.pay==='paid')?'paid':'pending',team_name:null,created_at:at});
  // Card/cash split as a qty-0 metadata line (never affects sales totals)

  const cardSAR=_ctCardSAR(paidTotal);
  if(cardSAR>0)rows.push({id:uid(),receipt_id:rid,session_id:sessId,customer_name:cust,item_id:null,name:t('cashCard'),category:'__cardmeta__',qty:0,price:cardSAR,pay:'paid',team_name:null,created_at:at});

  logAction(`${t('cashierTitle')}: ${t('cashReceiptWord')} ×${S._ctCart.length}${cust?` (${cust})`:''}`);
  S._ctCart=[];S._ctDisc='';S._ctCard='';

  renderCashier();
}

  const payBtn=(val,label)=>`<button onclick="_ctSet('_ctPay','${val}')" style="flex:1;padding:9px;border-radius:9px;border:1.5px solid ${S._ctPay===val?'var(--green)':'var(--border)'};background:${S._ctPay===val?'rgba(3,255,137,.12)':'transparent'};color:${S._ctPay===val?'var(--green)':'var(--muted)'};font-weight:800;font-size:12px;cursor:pointer;font-family:inherit">${label}</button>`;

  const byR={};const rOrder=[];
