}

function goLanding(){showView('landing');renderLandingAvail();}
function renderLandingAvail(){
  const strip=document.getElementById('land-avail-strip');if(!strip)return;
  const open=openSessions();
  if(!open.length){
    strip.innerHTML=`<div class="landing-avail-chip no-sessions"><span class="landing-avail-dot" style="background:var(--muted)"></span>${t('noSessions')}</div>`;
    return;
  }
  strip.innerHTML=open.map(s=>{
    const timeStr=sessionTime(s);
    return`<div class="landing-avail-chip has-spots" onclick="goCustomer('register')">
      <div style="font-size:18px;font-weight:900;line-height:1.2">${dayLabel(s.day)}</div>
      <div style="font-size:13px;font-weight:700;opacity:.85">${shortDate(s.session_date||s.id)}</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;margin-top:2px">
        <span class="landing-avail-dot" style="background:var(--green);width:7px;height:7px;border-radius:50%;flex-shrink:0"></span>
        <span style="opacity:.8">${timeStr} &nbsp;·&nbsp; ${t('availLabel')}</span>
      </div>
    </div>`;
  }).join('');
}

function goCustomer(tab){
  S.loggedIn=getSession();
  if(!S.loggedIn){
    showView('customer');
    openAuthModal();
    S.custTab=tab||'register';
    renderCustomerTabs();
    renderTopbarRight();
    return;
  }
  prefillFromAccount();
  S.custTab=tab||'register';
  showView('customer');
  renderCustomerTabs();
  renderRegister();
  renderMyRides();
}

function goStaff(){
  localStorage.setItem('cq_staff','1');
  showView('staff');
  renderStaffTabs();
  // Auto-select the first open/full session so queues never overlap
  _autoSelectSession();
  renderStaffQueue();
  renderSessions();
  renderBikes();
  renderHistory();
}
function _autoSelectSession(){
  // Pick today's open session, or the first open session available
  const today=new Date().toLocaleDateString('en-CA',{timeZone:KSA_TZ});
  const open=allSessions().filter(s=>s.status==='open'||s.status==='full')
    .sort((a,b)=>new Date(a.session_date||a.id)-new Date(b.session_date||b.id));
  if(!open.length){S.sfSession='all';return;}
  // Prefer today's session, else earliest open
  const todaySess=open.find(s=>(s.session_date||s.id)===today);
  S.sfSession=(todaySess||open[0]).id;
}

function setCustTab(tab){
  S.custTab=tab;
  try{sessionStorage.setItem('cq_nav_ctab',tab);}catch(e){}
  renderCustomerTabs();
  if(tab==='myrides')renderMyRides();
  else if(tab==='register')renderRegister();
  else if(tab==='account')renderAccount();
}
function setStaffTab(tab){
  S.staffTab=tab;
  try{sessionStorage.setItem('cq_nav_stab',tab);}catch(e){}
  renderStaffTabs();
  if(tab==='sessions')renderSessions();
  else if(tab==='queue')renderStaffQueue();
  else if(tab==='bikes')renderBikes();
  else if(tab==='history')renderHistory();
  else if(tab==='analytics')renderAnalytics();
  else if(tab==='logs')renderLogs();
}

function renderCustomerTabs(){
  document.querySelectorAll('#customer-tab-nav .tab-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.ctab===S.custTab);
  });
  document.getElementById('tab-register').classList.toggle('active',S.custTab==='register');
  document.getElementById('tab-myrides').classList.toggle('active',S.custTab==='myrides');
  document.getElementById('tab-account').classList.toggle('active',S.custTab==='account');
  // Sync mobile bottom nav
  document.querySelectorAll('.cust-bnav-btn').forEach((btn,i)=>{
    const tabs=['register','myrides','account'];
    btn.classList.toggle('active',tabs[i]===S.custTab);

  const al=document.getElementById('bnav-account-lbl');if(al)al.textContent=t('tabAccount');

function renderStaffTabs(){
  document.querySelectorAll('#staff-tab-nav .tab-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.stab===S.staffTab);
  });
  document.getElementById('tab-queue')    .classList.toggle('active',S.staffTab==='queue');
  document.getElementById('tab-sessions') .classList.toggle('active',S.staffTab==='sessions');
  document.getElementById('tab-bikes')    .classList.toggle('active',S.staffTab==='bikes');
  document.getElementById('tab-history')  .classList.toggle('active',S.staffTab==='history');
  document.getElementById('tab-analytics').classList.toggle('active',S.staffTab==='analytics');

}

/* ══════════════════════════════════════════════
   PIN MODAL
══════════════════════════════════════════════ */
function openPinModal(){
  S.pinDigits='';S.pinError=false;
  renderPinModal();
}

function renderPinModal(){
  const dots=Array(4).fill(0).map((_,i)=>{
    const cls=S.pinError?'pin-dot error':i<S.pinDigits.length?'pin-dot filled':'pin-dot';
    return`<div class="${cls}"></div>`;
  }).join('');

  const modal=document.getElementById('pin-modal');
  modal.style.display='flex';
  modal.innerHTML=`<div class="pin-backdrop" onclick="if(event.target===this)closePinModal()">
    <div class="pin-box" id="pin-box">
      <img class="pin-logo" src="logo.png" alt="">
      <div class="pin-title">${t('pinTitle')}</div>
      <div class="pin-sub">${t('pinSub')}</div>
      <div class="pin-dots">${dots}</div>
      <div class="pin-error" id="pin-err">${S.pinError?t('errPinWrong'):''}</div>
      <div class="pin-numpad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="pinPress('${n}')">${n}</button>`).join('')}
        <button class="pin-key empty"></button>
        <button class="pin-key" onclick="pinPress('0')">0</button>
        <button class="pin-key del" onclick="pinDel()">&#x232B;</button>
      </div>
      <button class="pin-cancel" onclick="closePinModal()">${t('cancelBtn')}</button>
    </div>
  </div>`;
}

function pinPress(d){
  if(S.pinDigits.length>=4)return;
  S.pinDigits+=d;
  S.pinError=false;
  if(S.pinDigits.length===4){
    if(S.pinDigits===STAFF_PIN){
      closePinModal();
      goStaff();
      toast(t('toastStaffPanel'));
    } else {
      S.pinError=true;
      renderPinModal();
      const box=document.getElementById('pin-box');
      if(box){box.classList.add('shake');setTimeout(()=>{box.classList.remove('shake');S.pinDigits='';renderPinModal();},400);}
    }
  } else {
    renderPinModal();
  }
}

function pinDel(){
  if(S.pinDigits.length===0)return;
  S.pinDigits=S.pinDigits.slice(0,-1);
  S.pinError=false;
  renderPinModal();
}

function closePinModal(){
  document.getElementById('pin-modal').style.display='none';
  S.pinDigits='';S.pinError=false;
}

// Also handle keyboard input when pin modal is open
document.addEventListener('keydown',e=>{
  if(document.getElementById('pin-modal').style.display==='flex'){
    if(e.key>='0'&&e.key<='9')pinPress(e.key);
    else if(e.key==='Backspace')pinDel();
    else if(e.key==='Escape')closePinModal();
  }
});

function renderRegister(){
  const cust=S.loggedIn||getSession();
  const available=openSessions();
  ensureBikeSizes();

  // Session cards
  const sessCards=available.length
    ? available.map(s=>{

          style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;background:rgba(3,255,137,.08);border:1.5px solid rgba(3,255,137,.25);color:var(--green);font-size:13px;font-weight:800;text-decoration:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4.5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
          @MicroMobilitySA
        </a>
      </div>`;
  if(S.selSession&&!available.find(s=>s.id===S.selSession))S.selSession=null;

  // ── Modify mode: detect ALL existing waiting bookings for this customer/session ──
  let existingEntries=[];
  if(S.selSession&&cust&&cust.id){
    existingEntries=getQueue().filter(e=>
      e.customerId===cust.id&&
      e.sessionId===S.selSession&&
      e.status==='waiting'
    );
    if(existingEntries.length>0){
      const firstId=existingEntries[0].id;
      if(S.modifyEntryId!==firstId){
        // First time selecting this session — pre-fill qty, sizes, types from existing
        S.modifyEntryId=firstId;
        S.regQty=existingEntries.length;
        S.regBikeSizes=existingEntries.map(()=>'');
        S.regBikeTypes=existingEntries.map(e=>e.typePreference);
      }
    }else{
      S.modifyEntryId=null;
    }
  }else{
    existingEntries=[];S.modifyEntryId=null;
  }
  const isModifyMode=existingEntries.length>0;

  // Read-only account info block
  const accountInfoBlock=cust?`
    <div style="background:var(--s3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:20px">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px 20px">
        <div>
          <div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">${t('fullName')}</div>
          <div style="font-size:14px;font-weight:700">${esc(cust.name)}</div>
        </div>
        <div>
          <div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">${t('emailAddr')}</div>
          <div style="font-size:14px;font-weight:700">${esc(cust.email||'-')}</div>
        </div>
        <div>
          <div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">${t('phoneNum')}</div>
          <div style="font-size:14px;font-weight:700">${esc(cust.phone||'-')}</div>
        </div>
      </div>
      <div style="margin-top:10px;font-size:12px;color:var(--muted)">
        ${t('needToUpdate')} <button onclick="setCustTab('account')" style="background:none;border:none;color:var(--green);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;cursor:pointer;padding:0;text-decoration:underline">${t('tabAccount')}</button>
      </div>
    </div>`:'';

  // Modify-mode banner (shown above form when customer has existing bookings)
  const qNums=existingEntries.map(e=>`#${e.queueNum}`).join(', ');

    <div style="background:rgba(3,255,137,.06);border:1.5px solid rgba(3,255,137,.28);border-radius:14px;padding:16px 18px;margin-bottom:20px">

          <div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700;flex-shrink:0">

  // Qty stepper — always shown (in modify mode, starts at existing qty)
  const qtyStepper=`
    <div class="form-group" style="margin-bottom:24px">
      <label>${t('numBikes')}</label>
      <div class="qty-stepper">
        <button class="qty-btn" onclick="changeRegQty(-1)" type="button">-</button>
        <span class="qty-val">${S.regQty}</span>
        <button class="qty-btn" onclick="changeRegQty(1)" type="button">+</button>
      </div>
    </div>`;

  // Per-bike sections
  const bikeSections=Array.from({length:S.regQty},(_,i)=>{
    const isFirst=i===0;
    const hasAccH=isFirst&&cust&&cust.height;
    const bikeH=S.regBikeHeights[i]||'';
    const selTy=S.regBikeTypes[i]||null;

    // Height row — always editable, pre-filled from profile for rider 0
    const hSection=`<div class="form-group" style="margin-bottom:14px">

    ).join('');

    const divider=(S.regQty>1&&i<S.regQty-1)?`<div style="border-top:1px solid var(--border);margin:20px 0"></div>`:'';

    // When booking multiple bikes, show a name input for every bike slot
    const riderDefaultName=isFirst&&cust?cust.name:'';

  // All tickets (one per bike booked)
  function renderOneTicket(tkt,idx,total){

    return`<div class="ticket-card" style="${idx>0?'margin-top:16px':''}">
      ${label?`<div style="font-size:11px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;padding:12px 24px 0;border-bottom:1px solid var(--border)">${label}</div>`:''}

        <div class="ticket-num-block">

          <div class="ticket-num">#${tkt.queueNum}</div>

  while(S.regBikeHeights.length<S.regQty) S.regBikeHeights.push('');

  while(S.regBikeTypes.length<S.regQty)  S.regBikeTypes.push('');

  while(S.regRiderNames.length>S.regQty) S.regRiderNames.pop();
}

async function submitReg(){
  if(S.regSubmitting)return;
  const cust=S.loggedIn||getSession();
  if(!cust){toast(t('errLoginFirst'),'error');return;}
  if(!S.selSession){
    const sp=document.getElementById('session-picker-wrap');
    if(sp){sp.style.outline='2px solid var(--red)';sp.style.borderRadius='14px';setTimeout(()=>{sp.style.outline='';sp.style.borderRadius='';},2500);}
    toast(t('errSelectSession'),'error');
    document.getElementById('session-picker-wrap')?.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  if(!openSessions().find(s=>s.id===S.selSession)){toast(t('errSessionClosed'),'error');return;}

  const qty=S.regQty||1;
  ensureBikeSizes();

  // Resolve per-bike heights — required for every rider
  const heights=[];
  for(let i=0;i<qty;i++){
    const h=parseInt(S.regBikeHeights[i]);
    if(isNaN(h)||h<100||h>250){
      const hInp=document.getElementById(`reg-height-${i}`);
      if(hInp){hInp.style.outline='2px solid var(--red)';hInp.style.borderColor='var(--red)';setTimeout(()=>{hInp.style.outline='';hInp.style.borderColor='';},2500);hInp.scrollIntoView({behavior:'smooth',block:'center'});}
      toast(qty>1?`${t('errValidHeightCm')} (${t('bike')} ${i+1})`:t('errValidHeightCm'),'error');return;
    }
    heights.push(h);
  }

  // Validate types and rider names per bike
  let firstErrEl=null;
  function markErr(el){if(el&&!firstErrEl){firstErrEl=el;el.style.outline='2px solid var(--red)';el.style.borderRadius='10px';}}
  function clearFieldErr(el){if(el){el.style.outline='';el.style.borderRadius='';}}
  document.querySelectorAll('[data-type-slot]').forEach(b=>b.closest('.form-group')?.style&&clearFieldErr(b.closest('.form-group')));

  for(let i=0;i<qty;i++){
    if(!S.regBikeTypes[i]){
      const wrap=document.getElementById(`reg-type-wrap-${i}`);
      markErr(wrap);
      toast(qty>1?`${t('errSelectTypeGeneric')} (${t('bike')} ${i+1})`:t('errSelectTypeGeneric'),'error');
      if(firstErrEl)firstErrEl.scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
    if(qty>1&&!(S.regRiderNames[i]!==undefined?S.regRiderNames[i]:i===0?cust.name:'').trim()){
      const inp=document.getElementById(`reg-rider-name-${i}`);
      markErr(inp);
      toast(`${t('riderName')||"Rider's Full Name"} (${t('bike')} ${i+1})`,'error');
      if(firstErrEl)firstErrEl.scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
  }

  // Bookings only blocked when admin manually marks session as 'full' — not by capacity
  const sess0=allSessions().find(s=>s.id===S.selSession);
  if(sess0&&sess0.status==='full'){toast(t('errSessionClosed'),'error');return;}

  const email=cust.email||'',phone=cust.phone||'';
  // Resolve per-rider names: use entered name for each slot, fallback to account name for slot 0
  const riderNames=Array.from({length:qty},(_,i)=>{
    const entered=S.regRiderNames[i];
    return (entered!==undefined&&entered.trim())?entered.trim():(i===0?cust.name:cust.name);
  });
  const queue=getQueue();
  // If logged-in customer already has an active/waiting booking for this session, show clear message
  const activeStatuses=['waiting','active'];
  const existingActive=cust.id
    ?queue.find(e=>e.customerId===cust.id&&e.sessionId===S.selSession&&activeStatuses.includes(e.status))
    :(phone?queue.find(e=>e.phone===phone&&e.sessionId===S.selSession&&activeStatuses.includes(e.status)):null);
  if(existingActive){
    // Show an inline banner instead of a silent redirect or plain error
    S._alreadyBookedSession=S.selSession;
    renderRegister();
    // Scroll the banner into view
    setTimeout(()=>{const b=document.getElementById('already-booked-banner');if(b)b.scrollIntoView({behavior:'smooth',block:'center'});},80);
    return;
  }

  S.regSubmitting=true;
  renderRegister();
  try{
    const sess=allSessions().find(s=>s.id===S.selSession)||{day:'',session_date:S.selSession};
    const baseQNum=nextQNum(S.selSession);
    // All bikes in one booking share the same queue number
    const entries=Array.from({length:qty},(_,i)=>({
      id:uid(),name:riderNames[i],email,phone,
      size:'',height:heights[i]||null,
      typePreference:S.regBikeTypes[i],paid:false,
      assignedBikeId:null,sessionId:S.selSession,sessionDay:sess.day,sessionDate:sess.session_date||S.selSession,
      queueNum:baseQNum,status:'waiting',registeredAt:new Date().toISOString(),walkIn:false,
      customerId:cust.id,price:priceForType(S.regBikeTypes[i])
    }));
    await Promise.all(entries.map(e=>sb.from('queue_entries').insert(entryToDB(e))));

    // Save bike 0 height to account if not already stored
    if(!cust.height&&heights[0]){
      try{
        await sb.from('customers').update({height:heights[0]}).eq('id',cust.id);
        S.loggedIn.height=heights[0];setSession(S.loggedIn);
      }catch(e){/* non-fatal */}
    }

    await loadData();
    S.lastTickets=entries;S._rHeight='';S._rDate='';S.selSession=null;S.regType=null;
    S.regQty=1;S.regBikeSizes=[];S.regBikeHeights=[];S.regBikeTypes=[];S.regRiderNames=[];S._alreadyBookedSession=null;
    toast(`${t('toastRegistered')} #${baseQNum}${qty>1?` (${qty} ${t('bike')||'bikes'})`:''}`);
    renderRegister();
    showBoothPopup();
  }finally{
    S.regSubmitting=false;
    renderRegister();
  }
}

async function submitModifyBooking(){
  const cust=S.loggedIn||getSession();
  if(!cust){toast(t('errLoginFirst'),'error');return;}
  if(!S.selSession){toast(t('errSelectSession'),'error');return;}

  const existing=getQueue().filter(e=>
    e.customerId===cust.id&&e.sessionId===S.selSession&&e.status==='waiting'
  ).sort((a,b)=>a.queueNum-b.queueNum);

  const newQty=S.regQty||1;
  ensureBikeSizes();

  // Validate all new bike slots
  for(let i=0;i<newQty;i++){
    if(!S.regBikeTypes[i]){
      const wrap=document.getElementById(`reg-type-wrap-${i}`);
      if(wrap){wrap.style.outline='2px solid var(--red)';wrap.style.borderRadius='10px';setTimeout(()=>{wrap.style.outline='';wrap.style.borderRadius='';},2500);wrap.scrollIntoView({behavior:'smooth',block:'center'});}
      toast(newQty>1?`${t('errSelectTypeGeneric')} (${t('bike')} ${i+1})`:t('errSelectTypeGeneric'),'error');return;
    }
  }

  const sess=allSessions().find(s=>s.id===S.selSession)||{day:'',session_date:S.selSession};
  const calls=[];

  // ── Update existing entries in-place (same queue number, same position) ──
  for(let i=0;i<Math.min(newQty,existing.length);i++){
    const entry=existing[i];
    const newType=S.regBikeTypes[i];
    if(entry.typePreference!==newType){
      calls.push(sb.from('queue_entries').update({
        type_preference:newType,price:priceForType(newType)
      }).eq('id',entry.id));
    }
  }

  // ── Remove extra existing entries if qty reduced ──
  if(newQty<existing.length){
    const toRemove=existing.slice(newQty);
    toRemove.forEach(e=>calls.push(sb.from('queue_entries').update({status:'cancelled'}).eq('id',e.id)));
  }

  // ── Add new entries if qty increased ──
  const addedEntries=[];
  if(newQty>existing.length){
    const extra=newQty-existing.length;
    // Check spots available for new additions
    // No capacity cap — only admin can block by marking session full
    // New entries share the existing booking's queue number
    const sharedQNum=existing[0].queueNum;
    for(let i=existing.length;i<newQty;i++){
      const modRiderName=i===0?cust.name:(S.regRiderNames[i]||cust.name).trim();
      const modHeight=parseInt(S.regBikeHeights[i])||null;
      const entry={
        id:uid(),name:modRiderName,email:cust.email||'',phone:cust.phone||'',
        size:'',height:modHeight,typePreference:S.regBikeTypes[i],
        paid:false,assignedBikeId:null,
        sessionId:S.selSession,sessionDay:sess.day,sessionDate:sess.session_date||S.selSession,
        queueNum:sharedQNum,status:'waiting',
        registeredAt:new Date().toISOString(),walkIn:false,
        customerId:cust.id,price:priceForType(S.regBikeTypes[i])
      };
      addedEntries.push(entry);
      calls.push(sb.from('queue_entries').insert(entryToDB(entry)));
    }
  }

  if(calls.length>0)await Promise.all(calls);
  await loadData();

  // Refresh all tickets (updated entries + newly added)
  const allUpdatedIds=[...existing.map(e=>e.id),...addedEntries.map(e=>e.id)];
  S.lastTickets=allUpdatedIds.map(id=>getQueue().find(e=>e.id===id)).filter(Boolean).slice(0,newQty);

  if(addedEntries.length>0){
    toast(`${t('toastBookingUpdated')} + ${t('toastRegistered')} ${addedEntries.map(e=>`#${e.queueNum}`).join(', ')}`);
  }else{
    toast(t('toastBookingUpdated'));
  }

  S.modifyEntryId=null;S.selSession=null;
  S.regBikeSizes=[];S.regBikeTypes=[];S.regRiderNames=[];S.regQty=1;
  renderRegister();renderMyRides();
}

function renderMyRides(){
  const cust=S.loggedIn;
  if(!cust){document.getElementById('tab-myrides').innerHTML='';return;}
  const allEntries=getQueue().filter(e=>e.customerId===cust.id);
  const visible=allEntries.filter(e=>e.status==='waiting'||e.status==='active'||e.status==='done');
  const completed=visible.filter(e=>e.status==='done');
  const totalPaid=visible.filter(e=>e.paid).reduce((sum,e)=>sum+(e.price??DEFAULT_PRICE),0);
  const pending=visible.filter(e=>!e.paid&&e.status!=='cancelled').reduce((sum,e)=>sum+(e.price??DEFAULT_PRICE),0);
  // Assign personal order numbers chronologically
  const chronological=[...visible].sort((a,b)=>new Date(a.registeredAt)-new Date(b.registeredAt));
  const withIndex=chronological.map((e,i)=>({...e,orderNum:i+1}));
  // Apply filters + sort
  let displayOrder=[...withIndex];
  const _myd=S.mySortDir;
  const _mySizeOrd={XS:0,S:1,M:2,L:3};
  displayOrder.sort((a,b)=>{
    if(S.mySort==='size')    return _myd*((_mySizeOrd[a.size]??9)-(_mySizeOrd[b.size]??9));
    if(S.mySort==='type')    return _myd*(a.typePreference||'').localeCompare(b.typePreference||'');
    if(S.mySort==='payment') return _myd*(Number(a.paid)-Number(b.paid));
    if(S.mySort==='status')  return _myd*(a.status||'').localeCompare(b.status||'');
    return _myd*(new Date(a.registeredAt)-new Date(b.registeredAt));
  });
  function thMySort(col,label,cls=''){
    const active=S.mySort===col;
    const arrow=active?(S.mySortDir===1?'↑':'↓'):'';
    return`<th class="an-sort-th${active?' an-sort-active':''}${cls?' '+cls:''}" onclick="setMySort('${col}')">${label}${active?' '+arrow:''}</th>`;
  }
  const mySortOpts=[['date',t('colSession')],['type',t('bikeTypeLabel')],['payment',t('colPayment')],['status',t('colStatus')]].map(([v,l])=>
    `<option value="${v}"${S.mySort===v?' selected':''}>${l}</option>`).join('');
  const rows=(()=>{
    if(!displayOrder.length){
      return`<tr><td colspan="9"><div style="padding:8px">${emptyIllustration(ILLUS_RIDES,t('noRides'))}</div></td></tr>`;
    }
    // Group entries by sessionId, preserving displayOrder sequence
    const handled=new Set();
    const groups=[];
    for(const e of displayOrder){
      if(handled.has(e.id))continue;
      const siblings=displayOrder.filter(x=>!handled.has(x.id)&&x.sessionId===e.sessionId)
        .sort((a,b)=>a.queueNum-b.queueNum);
      siblings.forEach(x=>handled.add(x.id));
      groups.push(siblings);
    }
    return groups.map(group=>{
      const n=group.length;
      const primary=group[0];
      const allSameQ=group.every(e=>e.queueNum===primary.queueNum);
      const isConsec=!allSameQ&&group.every((e,i)=>i===0||e.queueNum===group[i-1].queueNum+1);
      const qNumDisplay=allSameQ
        ?`#${primary.queueNum}`

      const sess=allSessions().find(s=>s.id===primary.sessionId);

          <div style="font-size:11px;color:var(--muted);margin-top:2px">${sessionTime(sess)}</div>`;
      return group.map((e,i)=>{
        const isFirst=i===0;

async function saveAccount(){
  const cust=S.loggedIn||getSession();
  if(!cust)return;
  const name=(document.getElementById('acc-name')?.value||'').trim();
  const email=(document.getElementById('acc-email')?.value||'').trim().toLowerCase();
  const cc=document.getElementById('acc-cc')?.value||'+966';
  const phone=(document.getElementById('acc-phone')?.value||'').trim();
  const heightRaw=parseInt(document.getElementById('acc-height')?.value||'');
  const errEl=document.getElementById('acc-err');
  const setErr=msg=>{if(errEl)errEl.textContent=msg;};
  if(!name){setErr(t('errAccountName'));return;}
  if(email&&!/^\S+@\S+\.\S+$/.test(email)){setErr(t('errValidEmail'));return;}
  setErr('');
  const fullPhone=phone?(cc+phone):'';
  const height=(!isNaN(heightRaw)&&heightRaw>=100&&heightRaw<=250)?heightRaw:null;
  try{
    const type_preference=S.loggedIn.type_preference||'Any';
    const updates={name,height,type_preference};
    if(email!==undefined)updates.email=email;
    if(fullPhone!==undefined)updates.phone=fullPhone;
    const{error}=await sb.from('customers').update(updates).eq('id',cust.id);
    if(error)throw error;
    S.loggedIn={...cust,name,email,phone:fullPhone,height,type_preference};
    setSession(S.loggedIn);
    // Sync registration form defaults
    if(height){S._rHeight=String(height);}
    if(type_preference&&S.regBikeTypes.length===0)S.regBikeTypes=[type_preference];
    toast(t('accountSaved'));
    renderAccount();
    renderTopbarRight();
  }catch(e){setErr(t('errSaveAccount'));}
}

/* ══════════════════════════════════════════════
   SESSION HELPERS
══════════════════════════════════════════════ */
function parseSlots(raw){
  if(!raw)return null;
  if(typeof raw==='string'){try{return JSON.parse(raw);}catch{return null;}}
  return raw;
}
function slotsFormat(s){
  // Returns 'ids' | 'counts' | 'legacy' | null
  if(!s)return null;
  if(s._bikes)return 'ids';
  if(typeof s.Road==='number'||typeof s.Hybrid==='number'||typeof s.Mountain==='number')return 'counts';
  return 'legacy';
}
function slotsLabel(raw){
  const s=parseSlots(raw);if(!s)return'—';
  const fmt=slotsFormat(s);
  const abbr={Road:'Road',Hybrid:'Hybrid',Mountain:'Mtn'};
  if(fmt==='ids'){
    // Count IDs by type from fleet
    const counts={};
    (s._bikes||[]).forEach(id=>{const b=bikeById(id);if(b)counts[b.type]=(counts[b.type]||0)+1;});
    return Object.entries(counts).filter(([,v])=>v>0).map(([ty,v])=>`${abbr[ty]||ty}×${v}`).join(', ')||'—';
  }
  if(fmt==='counts'){
    return Object.entries(s).filter(([k,v])=>v>0&&k!=='_bikes').map(([ty,v])=>`${abbr[ty]||ty}×${v}`).join(', ')||'—';
  }
  // Legacy type+size format
  const parts=[];
  for(const[ty,szs]of Object.entries(s)){
    if(ty==='_bikes')continue;
    const sum=typeof szs==='number'?szs:Object.values(szs||{}).reduce((a,b)=>a+(b||0),0);
    if(sum>0)parts.push(`${abbr[ty]||ty}×${sum}`);
  }
  return parts.join(', ')||'—';
}


function startEditSession(id){
  const sess=allSessions().find(s=>s.id===id);if(!sess)return;
  S.editSessionId=id;
  S.editSessDate=sess.session_date||sess.id;
  S.editSessStatus=sess.status||'closed';
  S.showAddSession=false;
  // Load existing assigned bikes from bike_slots
  const slots=parseSlots(sess.bike_slots);
  const existingTime=(slots&&slots._time)||'21:00 - 23:00';
  S.editSessStartTime=existingTime.split(/\s*-\s*/)[0]||'21:00';
  S.editSessEndTime=existingTime.split(/\s*-\s*/)[1]||'23:00';
  const fmt=slotsFormat(slots);
  if(fmt==='ids'&&slots._bikes){
    S.editSessMode='fleet';
    S.editSessAssignedIds=[...slots._bikes];
    S.editSessTypeSizes={Road:{XS:0,S:0,M:0,L:0},Hybrid:{XS:0,S:0,M:0,L:0},Mountain:{XS:0,S:0,M:0,L:0}};
  } else if(fmt==='counts'){
    S.editSessMode='counts';
    S.editSessAssignedIds=[];
    const ts={Road:{XS:0,S:0,M:0,L:0},Hybrid:{XS:0,S:0,M:0,L:0},Mountain:{XS:0,S:0,M:0,L:0}};
    ['Road','Hybrid','Mountain'].forEach(ty=>{
      if(slots[ty]&&typeof slots[ty]==='object'){
        ['XS','S','M','L'].forEach(sz=>{ts[ty][sz]=slots[ty][sz]||0;});
      } else if(typeof slots[ty]==='number'){
        // Old flat count - can't split by size, put in M
        ts[ty].M=slots[ty]||0;
      }
    });
    S.editSessTypeSizes=ts;
  } else {
    S.editSessMode='fleet';
    S.editSessAssignedIds=[];
    S.editSessTypeSizes={Road:{XS:0,S:0,M:0,L:0},Hybrid:{XS:0,S:0,M:0,L:0},Mountain:{XS:0,S:0,M:0,L:0}};
  }
  renderSessions();
  setTimeout(()=>document.getElementById('sess-edit-form')?.scrollIntoView({behavior:'smooth',block:'start'}),80);
}
function toggleAssignBike(bikeId){
  const idx=S.editSessAssignedIds.indexOf(bikeId);
  if(idx>=0) S.editSessAssignedIds.splice(idx,1);
  else S.editSessAssignedIds.push(bikeId);
  renderSessions();
  setTimeout(()=>document.getElementById('sess-edit-form')?.scrollIntoView({behavior:'smooth',block:'nearest'}),40);
}
function toggleNewSessBike(bikeId){
  const idx=S.newSessAssignedIds.indexOf(bikeId);
  if(idx>=0) S.newSessAssignedIds.splice(idx,1);
  else S.newSessAssignedIds.push(bikeId);
  renderSessions();
  setTimeout(()=>document.getElementById('sess-add-form')?.scrollIntoView({behavior:'smooth',block:'nearest'}),40);
}

function renderSessions(){
  const sessions=allSessions();
  const allBikes=getBikes();
  const types=['Road','Hybrid','Mountain'];
  const typeColorHex={Road:'#4aa8f8',Hybrid:'#03ff89',Mountain:'#e08828'};

  // ── New session form with exact bike picker ───────────
  const nsAssigned=S.newSessAssignedIds;
  const nsTotal=nsAssigned.length;
  function newBikePicker(){
    const queue=getQueue();
    const busyIds=new Set(
      queue.filter(e=>e.status==='active'||e.status==='waiting')
        .flatMap(e=>getAssignedBikeIds(e))
    );
    return types.map(ty=>{
      const typeBikes=allBikes.filter(b=>b.type===ty);
      if(!typeBikes.length)return`<div style="color:var(--muted);font-size:13px;margin-bottom:12px">${typeLabel(ty)}: ${t('noBikes')}</div>`;
      return`<div style="margin-bottom:18px">
        <div style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;color:${typeColorHex[ty]};margin-bottom:8px">${typeLabel(ty)} (${typeBikes.filter(b=>nsAssigned.includes(b.id)).length} ${t('anOf')} ${typeBikes.length})</div>
        <div class="bike-assign-grid">
          ${typeBikes.map(b=>{
            const sel=nsAssigned.includes(b.id);
            const busy=busyIds.has(b.id)&&!sel;
            const dot=b.status==='available'?'&#x1F7E2;':b.status==='in-use'?'&#x1F7E0;':'&#x1F534;';
            const colorDots=(b.colors||['#03ff89']).map(c=>`<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${c};border:1.5px solid rgba(0,0,0,.3);flex-shrink:0"></span>`).join('');
            return`<div class="bike-assign-card${sel?' selected':''}${busy?' busy':''}"
              ${!busy?`onclick="toggleNewSessBike('${b.id}')"`:'title="In use"'}>
              <div style="display:flex;gap:3px;align-items:center;margin-bottom:7px">${colorDots}</div>
              <div class="bike-assign-name">${esc(b.name)}</div>
              <div style="font-size:11px;color:var(--muted)">${dot} ${b.size}</div>
              ${sel?`<div class="bike-assign-check">&#x2713; ${t('assignBikeTitle')}</div>`:''}
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('');
  }
  const addForm=S.showAddSession?`
    <div class="inline-form" style="margin-bottom:24px" id="sess-add-form">
      <div class="form-title">${t('newSessionTitle')}</div>
      <div class="form-row" style="margin-bottom:20px">
        <div class="form-group">
          <label>${t('dateLabel')}</label>
          <input type="date" id="ns-date" value="${esc(S.newSessDate)}" min="${todayStr()}"
            oninput="S.newSessDate=this.value" style="max-width:240px">
        </div>
        <div class="form-group">
          <label>${t('timeLabel')}</label>
          <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
            <input type="time" id="ns-start" value="${S.newSessStartTime||'21:00'}" oninput="S.newSessStartTime=this.value" style="background:#1a1a1a;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;padding:6px 10px;cursor:pointer">
            <span style="color:var(--muted);font-weight:700">-</span>
            <input type="time" id="ns-end" value="${S.newSessEndTime||'23:00'}" oninput="S.newSessEndTime=this.value" style="background:#1a1a1a;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;padding:6px 10px;cursor:pointer">
          </div>
        </div>
      </div>
      <!-- Mode toggle -->
      <div style="display:flex;gap:6px;margin-bottom:16px">
        <button class="toggle-btn${S.newSessMode==='counts'?' active':''}" onclick="S.newSessMode='counts';renderSessions()">&#x1F522; Bike Counts</button>
        <button class="toggle-btn${S.newSessMode==='fleet'?' active':''}" onclick="S.newSessMode='fleet';renderSessions()">&#x1F6B4; From Fleet</button>
      </div>
      <label style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;display:block">
        ${t('bikeFleetComp')}
      </label>
      ${S.newSessMode==='counts'?`
        <div style="overflow-x:auto;margin-bottom:4px">
          <table style="width:100%;border-collapse:collapse">
            <thead><tr>
              <th style="text-align:left;padding:6px 10px;font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase">${t('bikeTypeLabel')}</th>
              ${['XS','S','M','L'].map(sz=>`<th style="padding:6px 8px;font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;text-align:center">${sz}</th>`).join('')}
              <th style="padding:6px 8px;font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;text-align:center">${t('totalStat')}</th>
            </tr></thead>
            <tbody>${types.map(ty=>{
              if(!S.newSessTypeSizes)S.newSessTypeSizes={Road:{XS:0,S:0,M:0,L:0},Hybrid:{XS:0,S:0,M:0,L:0},Mountain:{XS:0,S:0,M:0,L:0}};
              const rowTot=['XS','S','M','L'].reduce((s,sz)=>s+(S.newSessTypeSizes[ty]?.[sz]||0),0);
              return`<tr style="border-top:1px solid var(--border)">
                <td style="padding:8px 10px;font-weight:800;font-size:13px">${typeLabel(ty)}</td>

              <td colspan="5" style="padding:8px 10px;font-size:12px;color:var(--muted);font-weight:700">${t('totalBikesSession')}</td>

  // ── Edit form with exact bike picker ─────────────────
  const editSess=S.editSessionId?allSessions().find(s=>s.id===S.editSessionId):null;
  const esAssigned=S.editSessAssignedIds;
  const esTotal=esAssigned.length;

  function bikePicker(){

    const queue=getQueue();
    // A bike is "busy" if it has an active/waiting booking in a DIFFERENT session
    const busyIds=new Set(

        .flatMap(e=>getAssignedBikeIds(e))

async function saveSessionEdit(){
  const oldId=S.editSessionId;
  const sess=allSessions().find(s=>s.id===oldId);if(!sess)return;
  const newDate=S.editSessDate||oldId;
  const esStart=S.editSessStartTime||document.getElementById('es-start')?.value||'21:00';
  const esEnd=S.editSessEndTime||document.getElementById('es-end')?.value||'23:00';
  const timeVal=`${esStart} - ${esEnd}`;
  let slots,total;
  if(S.editSessMode==='counts'){
    const ts=S.editSessTypeSizes||{};
    const sizes=['XS','S','M','L'];
    total=['Road','Hybrid','Mountain'].reduce((sum,ty)=>sum+sizes.reduce((s,sz)=>s+(ts[ty]?.[sz]||0),0),0);
    if(total===0){toast(t('errAddBikeToSession'),'error');return;}
    slots={_time:timeVal};
    ['Road','Hybrid','Mountain'].forEach(ty=>{
      const rowTot=sizes.reduce((s,sz)=>s+(ts[ty]?.[sz]||0),0);
      if(rowTot>0)slots[ty]=ts[ty];
    });
  }else{
    const assignedIds=S.editSessAssignedIds;
    if(assignedIds.length===0){toast(t('errAddBikeToSession'),'error');return;}
    const allBk=getBikes();
    const typeCounts={};
    assignedIds.forEach(id=>{const b=allBk.find(x=>x.id===id);if(b)typeCounts[b.type]=(typeCounts[b.type]||0)+1;});
    slots={_bikes:assignedIds,...typeCounts,_time:timeVal};
    total=assignedIds.length;
  }
  const newStatus=S.editSessStatus||sess.status;
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const newDay=dayNames[new Date(newDate+'T00:00:00').getDay()];

  // Save previous state for undo
  const prevSlots=sess.bike_slots;const prevCap=sess.capacity;
  const prevStatus=sess.status;const prevDate=sess.session_date||sess.id;const prevDay=sess.day;

  try{
    if(newDate!==oldId){
      // Date changed — need to migrate: insert new session, update entries, delete old
      const existing=allSessions().find(s=>s.id===newDate&&s.id!==oldId);
      if(existing){toast(t('errDateExists'),'error');return;}
      await sb.from('sessions').insert({
        id:newDate,day:newDay,session_date:newDate,capacity:total,
        status:newStatus,created_at:sess.created_at||new Date().toISOString(),
        bike_slots:JSON.stringify(slots)
      });
      // Move queue entries to new session
      await sb.from('queue_entries').update({
        session_id:newDate,session_date:newDate,session_day:newDay
      }).eq('session_id',oldId);
      await sb.from('sessions').delete().eq('id',oldId);
    } else {
      await sb.from('sessions').update({
        day:newDay,session_date:newDate,capacity:total,
        status:newStatus,bike_slots:JSON.stringify(slots)
      }).eq('id',oldId);
    }
    await loadData();
    const displayDate=shortDate(newDate);
    toast(`Session ${displayDate} updated.`);
    pushUndo(`Edit session ${displayDate}`,async()=>{
      const currentId=newDate!==oldId?newDate:oldId;
      if(newDate!==oldId){
        // Undo migration: re-create old session, move entries back, delete new
        await sb.from('sessions').insert({
          id:oldId,day:prevDay,session_date:prevDate,capacity:prevCap,
          status:prevStatus,created_at:sess.created_at||new Date().toISOString(),
          bike_slots:prevSlots||null
        });
        await sb.from('queue_entries').update({
          session_id:oldId,session_date:prevDate,session_day:prevDay
        }).eq('session_id',currentId);
        await sb.from('sessions').delete().eq('id',currentId);
      } else {
        await sb.from('sessions').update({
          day:prevDay,session_date:prevDate,capacity:prevCap,
          status:prevStatus,bike_slots:prevSlots||null
        }).eq('id',oldId);
      }
      await loadData();renderSessions();renderStaffQueue();
    });
    S.editSessionId=null;S.editSessTypeSizes={Road:{XS:0,S:0,M:0,L:0},Hybrid:{XS:0,S:0,M:0,L:0},Mountain:{XS:0,S:0,M:0,L:0}};
    renderSessions();renderStaffQueue();
  }catch(e){toast(t('errServerError'),'error');console.error(e);}
}

async function addSession(){
  const date=document.getElementById('ns-date')?.value;
  if(!date){toast(t('errPickDate'),'error');return;}
  const startEl=document.getElementById('ns-start');const endEl=document.getElementById('ns-end');
  const startT=startEl?startEl.value:'09:00';const endT=endEl?endEl.value:'11:00';
  const timeVal=`${startT} - ${endT}`;
  let slots,total;
  if(S.newSessMode==='counts'){
    // Count mode: store per-type size breakdown
    const ts=S.newSessTypeSizes||{};
    const sizes=['XS','S','M','L'];
    total=['Road','Hybrid','Mountain'].reduce((sum,ty)=>sum+sizes.reduce((s,sz)=>s+(ts[ty]?.[sz]||0),0),0);
    if(total===0){toast(t('errAddBikeToSession'),'error');return;}
    slots={_time:timeVal};
    ['Road','Hybrid','Mountain'].forEach(ty=>{
      const rowTot=sizes.reduce((s,sz)=>s+(ts[ty]?.[sz]||0),0);
      if(rowTot>0){
        slots[ty]=ts[ty]; // store size breakdown {XS:1,S:2,...}
      }
    });
  }else{
    const assignedIds=S.newSessAssignedIds;
    if(assignedIds.length===0){toast(t('errAddBikeToSession'),'error');return;}
    const allBk=getBikes();
    const typeCounts={};
    assignedIds.forEach(id=>{const b=allBk.find(x=>x.id===id);if(b)typeCounts[b.type]=(typeCounts[b.type]||0)+1;});
    slots={_bikes:assignedIds,...typeCounts,_time:timeVal};
    total=assignedIds.length;
  }
  const d=new Date(date+'T00:00:00');
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const session={id:date,day:dayNames[d.getDay()],session_date:date,capacity:total,
    bike_slots:JSON.stringify(slots),created_at:new Date().toISOString()};
  try{
    const{error}=await sb.from('sessions').insert(session);
    if(error){
      if(error.code==='23505'){toast(t('errDateExists'),'error');return;}
      throw error;
    }
    await loadData();
    S.showAddSession=false;S.newSessDate='';S.newSessAssignedIds=[];S.newSessStartTime='21:00';S.newSessEndTime='23:00';
    S.newSessTypeSizes={Road:{XS:0,S:0,M:0,L:0},Hybrid:{XS:0,S:0,M:0,L:0},Mountain:{XS:0,S:0,M:0,L:0}};
    toast(`${shortDate(date)} - ${t('toastSessionReady')}`);
    renderSessions();
  }catch(e){toast(t('errCreateSession'),'error');}
}

async function toggleSession(id,newStatus){
  try{
    const prev=allSessions().find(s=>s.id===id);
    const prevStatus=prev?prev.status:'closed';
    await sb.from('sessions').update({status:newStatus}).eq('id',id);
    await loadData();
    const lbl={open:t('sessOpened'),closed:t('sessClosed'),full:t('statusFull')+'.'}[newStatus]||newStatus;
    toast(lbl);
    pushUndo(`Session ${shortDate(prev?.session_date||id)} → ${newStatus}`,async()=>{
      await sb.from('sessions').update({status:prevStatus}).eq('id',id);
      await loadData();renderSessions();renderStaffQueue();
    });
    renderSessions();renderStaffQueue();
  }catch(e){toast(t('errServerError'),'error');}
}

async function deleteSession(id){
  try{
    const bookings=getQueue().filter(e=>e.sessionId===id&&e.status!=='removed'&&e.status!=='cancelled'&&e.status!=='noshow').length;
    if(bookings>0){toast(t('errHasBookings'),'error');return;}
    // Soft-delete: mark as 'deleted' so it can be restored with all its data
    await sb.from('sessions').update({status:'deleted'}).eq('id',id);
    await loadData();
    toast(t('sessDeleted'));
    renderSessions();
  }catch(e){toast(t('errDeleteSession'),'error');}
}

async function restoreSession(id){
  try{
    await sb.from('sessions').update({status:'closed'}).eq('id',id);
    await loadData();
    toast(t('sessClosed'));
    renderSessions();
  }catch(e){toast(t('errConnection'),'error');}
}

/* ══════════════════════════════════════════════
   STAFF QUEUE
══════════════════════════════════════════════ */
function renderStaffQueue(){
  const queue=getQueue();const sessions=allSessions();
  const base=S.sfSession!=='all'
    ?queue.filter(e=>e.sessionId===S.sfSession&&e.status!=='removed'&&e.status!=='cancelled')
    :queue.filter(e=>e.status!=='removed'&&e.status!=='cancelled');
  const total=base.length,nWait=base.filter(e=>e.status==='waiting').length,
        nBike=base.filter(e=>e.status==='active').length,nDone=base.filter(e=>e.status==='done').length;
  let filtered=[...base];
  if(S.sfStatus==='cancelled'){
    filtered=S.sfSession!=='all'
      ?queue.filter(e=>e.sessionId===S.sfSession&&e.status==='cancelled')
      :queue.filter(e=>e.status==='cancelled');
  }else if(S.sfStatus!=='all'){
    filtered=filtered.filter(e=>e.status===S.sfStatus);
  }
  if(S.sfPay==='paid')  filtered=filtered.filter(e=>e.paid);
  if(S.sfPay==='pending')filtered=filtered.filter(e=>!e.paid);
  if(S.sfSearch.trim()){const q=S.sfSearch.trim().toLowerCase();filtered=filtered.filter(e=>e.name.toLowerCase().includes(q)||(e.phone||'').includes(q));}
  const _sfd=S.sfSortDir;
  filtered.sort((a,b)=>{
    if(S.sfSort==='name')   return _sfd*a.name.localeCompare(b.name);
    if(S.sfSort==='type')   return _sfd*a.typePreference.localeCompare(b.typePreference);
    if(S.sfSort==='paid')   return _sfd*(Number(a.paid)-Number(b.paid));
    if(S.sfSort==='status') return _sfd*(a.status||'').localeCompare(b.status||'');
    return _sfd*(a.sessionId.localeCompare(b.sessionId)||a.queueNum-b.queueNum);
  });
  function thQSort(col,label,cls=''){
    const active=S.sfSort===col;
    const arrow=active?(S.sfSortDir===1?'↑':'↓'):'';
    return`<th class="an-sort-th${active?' an-sort-active':''}${cls?' '+cls:''}" onclick="setSfSort('${col}')">${label}${active?' '+arrow:''}</th>`;
  }
  const waitingBase=base.filter(e=>e.status==='waiting').sort((a,b)=>a.queueNum-b.queueNum);
  const nextRider=waitingBase[0];
  const totalWaiting=new Set(waitingBase.map(e=>`${e.sessionId}:${e.queueNum}`)).size;
  const nextUp=nextRider?`<div class="next-up-banner">
    <div>
      <div class="next-up-label">${t('nextUpLabel')} &nbsp;<span style="font-size:12px;color:var(--muted);font-weight:600">${totalWaiting} ${t('inLine')}</span></div>
      <div class="next-up-name">#${nextRider.queueNum} - ${esc(nextRider.name)}</div>
      <div class="next-up-details">${typeLabel(nextRider.typePreference)} &middot; ${nextRider.paid?'✓ '+t('paidLabel'):'⏳ '+t('pendingLabel')}</div>
    </div>
    <button class="btn-primary" onclick="openModal('${nextRider.id}')">${t('assignBikeCheckin')}</button>
  </div>`:'';
  const qSessOpts=`<option value="all"${S.sfSession==='all'?' selected':''}>${t('allSessions')}</option>`+
    sessions.filter(s=>s.status!=='deleted').map(s=>`<option value="${s.id}"${S.sfSession===s.id?' selected':''}>${dayLabel(s.day)} ${shortDate(s.session_date||s.id)}</option>`).join('');
  const qStatusOpts=['all','waiting','active','done','noshow','cancelled'].map(s=>{
    const l={all:t('filterAll'),waiting:t('filterWaiting'),active:t('filterOnBike'),done:t('filterDone'),noshow:t('filterNoshow'),cancelled:t('statusCancelled')}[s];
    return`<option value="${s}"${S.sfStatus===s?' selected':''}>${l}</option>`;}).join('');
  const qPayOpts=['all','paid','pending'].map(p=>{
    const l={all:t('filterAll'),paid:t('paidLabel'),pending:t('pendingLabel')}[p];
    return`<option value="${p}"${S.sfPay===p?' selected':''}>${l}</option>`;}).join('');
  // ── Compute live queue positions (per session, waiting riders only, by queueNum order) ──
  const livePosMap={};
  const allWaiting=getQueue().filter(e=>e.status==='waiting').sort((a,b)=>a.sessionId.localeCompare(b.sessionId)||a.queueNum-b.queueNum);
  const sessPosCounter={};
  const seenBookings=new Set();
  allWaiting.forEach(e=>{
    const key=`${e.sessionId}:${e.queueNum}`;
    if(!seenBookings.has(key)){
      seenBookings.add(key);
      sessPosCounter[e.sessionId]=(sessPosCounter[e.sessionId]||0)+1;
    }
    livePosMap[e.id]=sessPosCounter[e.sessionId]||0;
  });
  // Total waiting per session (unique booking numbers only)
  const sessWaitCount={};
  allWaiting.forEach(e=>{
    const key=`${e.sessionId}:${e.queueNum}`;
    if(!sessWaitCount[`_seen_${key}`]){
      sessWaitCount[`_seen_${key}`]=true;
      sessWaitCount[e.sessionId]=(sessWaitCount[e.sessionId]||0)+1;
    }
  });

  // Group entries belonging to the same multi-bike booking (same customerId + sessionId)
  function buildQueueGroups(entries){
    const groups=[],handled=new Set();
    for(const e of entries){
      if(handled.has(e.id))continue;
      if(!e.customerId){groups.push([e]);handled.add(e.id);continue;}
      const siblings=entries
        .filter(x=>!handled.has(x.id)&&x.customerId===e.customerId&&x.sessionId===e.sessionId)
        .sort((a,b)=>a.queueNum-b.queueNum);
      siblings.forEach(x=>handled.add(x.id));
      groups.push(siblings);
    }
    return groups;
  }

  function entryPhone(e){
    if(e.phone)return e.phone;
    if(e.customerId){const c=getCustomers().find(x=>x.id===e.customerId);if(c&&c.phone)return c.phone;}
    return'';
  }

  function _contactCell(phone){
    if(!phone)return'<span style="color:var(--muted)">—</span>';
    return`<div style="display:flex;gap:5px;align-items:center">
      <a href="tel:${esc(phone)}" title="${t('callLabel')||'Call'}" style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:rgba(3,255,137,.1);border:1px solid rgba(3,255,137,.25);color:var(--green);text-decoration:none;transition:all .18s" onmouseover="this.style.background='rgba(3,255,137,.22)'" onmouseout="this.style.background='rgba(3,255,137,.1)'">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.1a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.62 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.18 6.18l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </a>
      <a href="https://wa.me/${phone.replace(/\D/g,'')}" target="_blank" rel="noopener" title="WhatsApp" style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:rgba(3,255,137,.1);border:1px solid rgba(3,255,137,.25);color:var(--green);text-decoration:none;transition:all .18s" onmouseover="this.style.background='rgba(3,255,137,.22)'" onmouseout="this.style.background='rgba(3,255,137,.1)'">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
      </a>
    </div>`;
  }

  function _entryActions(e){
    if(e.status==='waiting')return`<button class="btn-sm btn-green" onclick="openModal('${e.id}')">${t('checkInBtn')}</button><button class="btn-sm btn-red" onclick="confirmNoShow('${e.id}')">${t('noShowBtn')}</button><button class="btn-sm btn-muted" onclick="staffCancelEntry('${e.id}')">Cancel</button>`;
    if(e.status==='active')return`<button class="btn-sm btn-blue" onclick="openModal('${e.id}')">${t('changeBikeBtn')}</button><button class="btn-sm btn-orange" onclick="doReturn('${e.id}')">${t('returnBikeBtn')}</button><button class="btn-sm btn-muted" onclick="doUndoCheckin('${e.id}')">${t('undoCheckinBtn')}</button><button class="btn-sm btn-muted" onclick="staffCancelEntry('${e.id}')">Cancel</button>`;
    if(e.status==='done')return`<button class="btn-sm btn-blue" onclick="doReopen('${e.id}')">${t('reopenBookingBtn')}</button><button class="btn-sm btn-muted" onclick="confirmRemove('${e.id}')">${t('removeBtn')}</button>`;
    if(e.status==='noshow')return`<button class="btn-sm btn-green" onclick="doUndoNoShow('${e.id}')">${t('customerShowedBtn')}</button><button class="btn-sm btn-muted" onclick="confirmRemove('${e.id}')">${t('removeBtn')}</button>`;
    return`<button class="btn-sm btn-muted" onclick="confirmRemove('${e.id}')">${t('removeBtn')}</button>`;
  }

  function renderQRow(e){
    const assignedBikes=getAssignedBikes(e);
    const rowCls=e.status==='active'?'row-active':(e.status==='noshow'||e.status==='cancelled')?'row-noshow-cancel':(e.status==='done'&&e.paid)?'row-done-paid':(e.status==='done')?'row-done':'';
    const wiTag=e.walkIn?`<span class="walk-in-badge">${t('addWalkin').replace(/^\+ /,'')}</span>`:'';
    const allColors=assignedBikes.flatMap(b=>b.colors&&b.colors.length?b.colors:[]);
    const colorSwatches=allColors.length?allColors.map(c=>`<span style="display:inline-block;width:13px;height:13px;border-radius:50%;background:${c};border:1.5px solid rgba(0,0,0,.3);flex-shrink:0"></span>`).join(''):'<span style="color:var(--muted)">—</span>';
    const lp=livePosMap[e.id];
    const totalW=sessWaitCount[e.sessionId]||0;
    const posCell=e.status==='waiting'&&lp
      ?`<div class="pos-badge" style="font-size:12px;padding:3px 8px">${lp} / ${totalW}</div>`
      :`<span style="color:var(--muted);font-size:12px">—</span>`;
    const _flashStyle=S._flashId===e.id?`animation:rowFlash_${S._flashColor||'green'} .75s ease forwards;`:''
    return`<tr class="${rowCls}"${_flashStyle?` style="${_flashStyle}"`:''}>
      <td style="min-width:52px"><span class="queue-num-cell" style="font-size:${e.status!=='waiting'?'18':'22'}px">#${e.queueNum}</span></td>
      <td style="text-align:center">${posCell}</td>
      <td><div class="rider-name">${esc(e.name)}${wiTag}</div><div class="rider-sub">${esc(fmtPhone(e.phone))||'—'}</div></td>
      <td style="font-size:12px;font-weight:700;color:var(--green);white-space:nowrap">${e.height?e.height+' cm':'<span style="color:var(--muted)">—</span>'}</td>
      <td>${typeBadge(e.typePreference)}</td>
      ${S.sfSession==='all'?`<td class="hide-mobile">${dayLabel(e.sessionDay)||''} ${shortDate(e.sessionDate)}</td>`:'<td class="hide-mobile" style="display:none"></td>'}
      <td>${assignedBikes.length>0
        ?assignedBikes.map((b,i)=>`<div style="display:flex;align-items:center;gap:5px;${i>0?'margin-top:3px':''}">
            <span style="font-size:9px;font-weight:900;color:var(--muted);min-width:12px">${i+1}.</span>
            <span style="font-weight:700;font-size:13px">${esc(b.name)}</span>
          </div>`).join('')
        :'<span style="color:var(--muted)">—</span>'}</td>
      <td><div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">${colorSwatches}</div></td>
      <td style="font-weight:800;white-space:nowrap">SAR ${e.price??DEFAULT_PRICE}</td>
      <td onclick="event.stopPropagation()">
        <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
          <button class="pay-toggle ${e.paid&&(e.price??DEFAULT_PRICE)===0?'house':e.paid?'paid':'pending'}" onclick="showPayMenu('${e.id}',event)">
            ${e.paid&&(e.price??DEFAULT_PRICE)===0?'🏠 '+t('onTheHouseLabel'):e.paid?'✓ '+t('paidLabel'):'⏳ '+t('pendingLabel')}
          </button>
          <button onclick="showEditPriceModal('${e.id}')" title="${t('editPriceBtn')}" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 4px;line-height:1" onmouseover="this.style.color='var(--green)'" onmouseout="this.style.color='var(--muted)'">✏️</button>
        </div>
      </td>
      <td>${statusCellHtml(e)}</td>
      <td>${_contactCell(entryPhone(e))}</td>
      <td><div class="actions-cell">${_entryActions(e)}</div></td>
    </tr>`;
  }

  function renderGroupRow(group){
    if(group.length===1)return renderQRow(group[0]);
    const primary=group[0];
    const n=group.length;
    const allSameQ=group.every(e=>e.queueNum===primary.queueNum);
    const isConsec=!allSameQ&&group.every((e,i)=>i===0||e.queueNum===group[i-1].queueNum+1);
    const qNumDisplay=allSameQ
      ?`#${primary.queueNum}`
      :isConsec
        ?`#${primary.queueNum}&thinsp;-&thinsp;#${group[n-1].queueNum}`
        :group.map(e=>`#${e.queueNum}`).join(', ');
    const allTerminal=group.every(e=>['done','noshow','cancelled'].includes(e.status));
    const groupCls=group.some(e=>e.status==='active')?'row-active'
      :group.every(e=>['noshow','cancelled'].includes(e.status))?'row-noshow-cancel'
      :(allTerminal&&group.filter(e=>e.status==='done').every(e=>e.paid)&&group.some(e=>e.status==='done'))?'row-done-paid'
      :allTerminal?'row-done':'';
    const lp=livePosMap[primary.id];
    const totalW=sessWaitCount[primary.sessionId]||0;
    const posCell=primary.status==='waiting'&&lp
      ?`<div class="pos-badge" style="font-size:12px;padding:3px 8px">${lp} / ${totalW}</div>`
      :`<span style="color:var(--muted);font-size:12px">—</span>`;
    const activeGroup=group.filter(e=>!['cancelled','noshow'].includes(e.status));
    const totalPrice=activeGroup.reduce((s,e)=>s+(e.price??DEFAULT_PRICE),0);
    const paidAmt=activeGroup.filter(e=>e.paid&&(e.price??DEFAULT_PRICE)>0).reduce((s,e)=>s+(e.price??DEFAULT_PRICE),0);
    const houseAmt=activeGroup.filter(e=>e.paid&&(e.price??DEFAULT_PRICE)===0).length;
    const remaining=totalPrice-paidAmt;
    const paidCount=activeGroup.filter(e=>e.paid&&(e.price??DEFAULT_PRICE)>0).length;
    const priceSpan=`<span style="font-weight:800;white-space:nowrap">SAR ${totalPrice}</span>
      <div style="font-size:10px;color:var(--muted);font-weight:600;margin-top:2px">${paidCount}/${activeGroup.length} ${t('paidLabel')}${houseAmt>0?` · ${houseAmt} 🏠`:''}</div>
      ${remaining>0?`<div style="font-size:11px;font-weight:800;color:#e08828;margin-top:3px">SAR ${remaining} due</div>`:'<div style="font-size:11px;font-weight:800;color:var(--green);margin-top:3px">✓ Settled</div>'}`;

    return group.map((e,i)=>{
      const isFirst=i===0;
      const isLast=i===n-1;
      const rowCls=e.status==='active'?'row-active':(e.status==='noshow'||e.status==='cancelled')?'row-noshow-cancel':(e.status==='done'&&e.paid)?'row-done-paid':(e.status==='done')?'row-done':groupCls;
      const assignedBikes=getAssignedBikes(e);
      const allColors=assignedBikes.flatMap(b=>b.colors&&b.colors.length?b.colors:[]);
      const colorSwatches=allColors.length
        ?allColors.map(c=>`<span style="display:inline-block;width:13px;height:13px;border-radius:50%;background:${c};border:1.5px solid rgba(0,0,0,.3);flex-shrink:0"></span>`).join('')
        :'<span style="color:var(--muted)">—</span>';
      const bikeNames=assignedBikes.length
        ?assignedBikes.map(b=>`<span style="font-weight:700;font-size:13px">${esc(b.name)}</span>`).join('<br>')
        :'<span style="color:var(--muted)">—</span>';
      const ownerPhone=isFirst?entryPhone(primary):'';
      const riderCell=`<div style="display:flex;align-items:baseline;gap:5px">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;background:var(--green);color:#000;font-size:10px;font-weight:900;flex-shrink:0">${i+1}</span>
        <span class="rider-name" style="margin:0;font-weight:${isFirst?'900':'600'}">${esc(e.name)}</span>
      </div>${isFirst&&ownerPhone?`<div class="rider-sub" style="margin-top:3px;padding-left:22px">${esc(fmtPhone(ownerPhone))}</div>`:''}`;
      const heightCell=`<td style="vertical-align:middle;font-size:12px;font-weight:700;color:var(--green);white-space:nowrap">${e.height?e.height+' cm':'<span style="color:var(--muted)">—</span>'}</td>`;
      const groupLine=isFirst?'border-top:2px solid rgba(3,255,137,.15)':'';
      const bottomLine=isLast?'border-bottom:2px solid rgba(3,255,137,.15)':'';
      const leftLine='border-left:2px solid rgba(3,255,137,.2)';
      const flashAnim=S._flashId===e.id?`animation:rowFlash_${S._flashColor||'green'} .75s ease forwards;`:'';
      const trStyle=[groupLine,bottomLine,leftLine,flashAnim].filter(Boolean).join(';');

      if(isFirst){
        return`<tr class="${rowCls}" style="${trStyle}">
          <td rowspan="${n}" style="min-width:52px;vertical-align:middle">
            <span class="queue-num-cell" style="font-size:15px;line-height:1.25">${qNumDisplay}</span>
            <div style="font-size:10px;color:var(--green);font-weight:800;margin-top:3px">${n} ${t('bike')||'Bikes'}</div>
          </td>
          <td rowspan="${n}" style="text-align:center;vertical-align:middle">${posCell}</td>
          <td style="vertical-align:middle">${riderCell}</td>
          ${heightCell}
          <td style="vertical-align:middle">${typeBadge(e.typePreference)}</td>
          ${S.sfSession==='all'?`<td class="hide-mobile" rowspan="${n}" style="vertical-align:middle">${dayLabel(primary.sessionDay)||''} ${shortDate(primary.sessionDate)}</td>`:'<td class="hide-mobile" style="display:none"></td>'}
          <td style="vertical-align:middle">${bikeNames}</td>
          <td style="vertical-align:middle"><div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">${colorSwatches}</div></td>
          <td rowspan="${n}" style="vertical-align:middle">${priceSpan}</td>
          <td style="vertical-align:middle" onclick="event.stopPropagation()">
            <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
              <button class="pay-toggle ${e.paid&&(e.price??DEFAULT_PRICE)===0?'house':e.paid?'paid':'pending'}" onclick="showPayMenu('${e.id}',event)">
                ${e.paid&&(e.price??DEFAULT_PRICE)===0?'🏠 '+t('onTheHouseLabel'):e.paid?'✓ '+t('paidLabel'):'⏳ '+t('pendingLabel')}
              </button>
              <button onclick="showEditPriceModal('${e.id}')" title="${t('editPriceBtn')}" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 4px;line-height:1" onmouseover="this.style.color='var(--green)'" onmouseout="this.style.color='var(--muted)'">✏️</button>
            </div>
          </td>
          <td style="vertical-align:middle">${statusCellHtml(e)}</td>
          <td rowspan="${n}" style="vertical-align:middle">${_contactCell(entryPhone(primary))}</td>
          <td style="vertical-align:middle"><div class="actions-cell">${_entryActions(e)}</div></td>
        </tr>`;
      }else{
        return`<tr class="${rowCls}" style="${trStyle}">
          <td style="vertical-align:middle">${riderCell}</td>
          ${heightCell}
          <td style="vertical-align:middle">${typeBadge(e.typePreference)}</td>
          ${S.sfSession!=='all'?'<td class="hide-mobile" style="display:none"></td>':''}
          <td style="vertical-align:middle">${bikeNames}</td>
          <td style="vertical-align:middle"><div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">${colorSwatches}</div></td>
          <td style="vertical-align:middle" onclick="event.stopPropagation()">
            <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
              <button class="pay-toggle ${e.paid&&(e.price??DEFAULT_PRICE)===0?'house':e.paid?'paid':'pending'}" onclick="showPayMenu('${e.id}',event)">
                ${e.paid&&(e.price??DEFAULT_PRICE)===0?'🏠 '+t('onTheHouseLabel'):e.paid?'✓ '+t('paidLabel'):'⏳ '+t('pendingLabel')}
              </button>
              <button onclick="showEditPriceModal('${e.id}')" title="${t('editPriceBtn')}" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 4px;line-height:1" onmouseover="this.style.color='var(--green)'" onmouseout="this.style.color='var(--muted)'">✏️</button>
            </div>
          </td>
          <td style="vertical-align:middle">${statusCellHtml(e)}</td>
          <td style="vertical-align:middle"><div class="actions-cell">${_entryActions(e)}</div></td>
        </tr>`;
      }
    }).join('');
  }

  // ── Mobile card renderer ──
  function renderGroupCard(group){
    const n=group.length;
    const primary=group[0];
    const allSameQ=group.every(e=>e.queueNum===primary.queueNum);
    const isConsec=!allSameQ&&group.every((e,i)=>i===0||e.queueNum===group[i-1].queueNum+1);
    const qNumDisplay=allSameQ?`#${primary.queueNum}`:isConsec?`#${primary.queueNum}&ndash;#${group[n-1].queueNum}`:group.map(e=>`#${e.queueNum}`).join(', ');
    const groupCls=group.some(e=>e.status==='active')?'row-active':group.every(e=>['noshow','cancelled'].includes(e.status))?'row-noshow-cancel':group.every(e=>['done','noshow','cancelled'].includes(e.status))&&group.some(e=>e.status==='done'&&e.paid)?'row-done-paid':group.every(e=>['done','noshow','cancelled'].includes(e.status))?'row-done':'';
    const lp=livePosMap[primary.id];const totalW=sessWaitCount[primary.sessionId]||0;
    const posTag=primary.status==='waiting'&&lp?`<span class="pos-badge" style="font-size:11px;padding:2px 7px">${lp}/${totalW}</span>`:'';
    const sessLabel=S.sfSession==='all'?`<div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px">${dayLabel(primary.sessionDay)||''} &middot; ${shortDate(primary.sessionDate)}</div>`:'';
    const riderRows=group.map((e,i)=>{
      const assignedBikes=getAssignedBikes(e);
      const bikeInfo=assignedBikes.length?assignedBikes.map(b=>b.name).join(', '):'';
      const isHouse=e.paid&&(e.price??DEFAULT_PRICE)===0;
      const payTag=isHouse?`<span style="font-size:12px">🏠</span>`:e.paid?`<span style="font-size:12px;font-weight:800;color:var(--green)">✓</span>`:`<span style="font-size:12px;font-weight:800;color:var(--muted)">⏳</span>`;
      const indent=n>1?'padding-left:22px':'';
      return`<div style="padding:6px 0;${i>0?'border-top:1px solid rgba(255,255,255,.05)':''}">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <div style="display:flex;align-items:center;gap:6px;min-width:0">
            ${n>1?`<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--green);color:#000;font-size:9px;font-weight:900;flex-shrink:0">${i+1}</span>`:''}
            <span style="font-weight:800;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px">${esc(e.name)}</span>
            ${e.height?`<span style="font-size:11px;font-weight:800;color:var(--green);flex-shrink:0">${e.height} cm</span>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">${statusBadge(e.status)}${payTag}</div>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;${indent}">
          ${typeLabel(e.typePreference)}${bikeInfo?` &middot; <span style="color:var(--muted-l)">${esc(bikeInfo)}</span>`:''}
        </div>
      </div>`;
    }).join('');
    const actionsHtml=group.map((e,i)=>`<div style="${n>1&&i>0?'border-top:1px solid rgba(255,255,255,.05);padding-top:6px;margin-top:2px':''}">
      ${n>1?`<div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:4px">${esc(e.name)}</div>`:''}
      <div style="display:flex;gap:6px;flex-wrap:wrap">${_entryActions(e)}</div>
    </div>`).join('');
    return`<div class="q-card${groupCls?' '+groupCls:''}" style="${n>1?'border-left:2px solid rgba(3,255,137,.25)':''}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:${sessLabel?'4':'6'}px">
        <span class="queue-num-cell" style="font-size:22px">${qNumDisplay}</span>
        ${n>1?`<span style="font-size:10px;color:var(--green);font-weight:800">${n} ${t('bike')||'Bikes'}</span>`:''}
        ${posTag}
      </div>
      ${sessLabel}
      <div>${riderRows}</div>
      ${(()=>{const ph=entryPhone(primary);return ph?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)">${_contactCell(ph)}</div>`:''})()}
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">${actionsHtml}</div>
    </div>`;

  // ── Common header HTML (used in both early-return and full render) ──
  const _queueHeader=`
    <div class="section-header">
      <div>
        <div class="page-title">${t('staffQueueTitle')}</div>
        <div class="refresh-indicator" style="margin-top:3px">
          <span class="refresh-dot"></span>
          <span>${t('liveLabel')} &nbsp;·&nbsp; </span>
          <span id="staff-refresh-label">${t('justNow')}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${S.sfSession!=='all'?`<button onclick="printSessionReport()" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:700;color:var(--muted);font-family:'Space Grotesk',sans-serif;transition:all .18s;line-height:1" onmouseover="this.style.borderColor='rgba(3,255,137,.35)';this.style.color='var(--text)'" onmouseout="this.style.borderColor='rgba(255,255,255,.1)';this.style.color='var(--muted)'">${t('printReportBtn')}</button>`:''}
        <div class="density-toggle">
          <button class="density-btn${S.queueDensity==='comfortable'?' active':''}" onclick="S.queueDensity='comfortable';renderStaffQueue()" title="Comfortable">⊡</button>
          <button class="density-btn${S.queueDensity==='compact'?' active':''}" onclick="S.queueDensity='compact';renderStaffQueue()" title="Compact">⊟</button>
        </div>
        <button onclick="toggleResetTool()" title="${t('staffResetTool')}" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 9px;cursor:pointer;font-size:15px;line-height:1;transition:all .18s" onmouseover="this.style.borderColor='rgba(3,255,137,.35)'" onmouseout="this.style.borderColor='rgba(255,255,255,.1)'">&#x1F511;</button>
      </div>
