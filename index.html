// Inventory category/brand dropdowns with a custom-add button
function _invSelHtml(id,value,addMode,options,addLabel){
  if(addMode){
    return`<div style="display:flex;gap:6px">
      <input id="${id}" type="text" value="${esc(value==='__pending__'?'':value)}" placeholder="${addLabel}" style="flex:1"
        onkeydown="if(event.key==='Enter'){event.preventDefault();_invOptSave('${id}')}">
      <button class="btn-primary" style="padding:8px 12px;flex-shrink:0" onclick="_invOptSave('${id}')">✓</button>
      <button class="btn-secondary" style="padding:8px 10px;flex-shrink:0" onclick="_invOptCancel('${id}')" aria-label="${t('cancelBtn')}">✕</button>
    </div>`;
  }
  return`<select id="${id}" onchange="_invSelChange('${id}',this.value)">
    ${options.map(o=>`<option value="${esc(o.v)}"${o.v===value?' selected':''}>${esc(o.l)}</option>`).join('')}
    <option value="__add__">+ ${addLabel}</option>
  </select>`;
}
function _invSelChange(id,val){
  if(val==='__add__'){
    if(id==='inv-cat'){S._invCatAdd=true;S._invCat='__pending__';}
    else if(id==='inv-flav'){S._invFlavAdd=true;S._invFlav='__pending__';}
    else{S._invBrandAdd=true;S._invBrand='__pending__';}
    renderInventory();setTimeout(()=>document.getElementById(id)?.focus(),50);return;
  }
  if(id==='inv-cat'){S._invCat=val;renderInventory();}
  else if(id==='inv-flav'){S._invFlav=val;}
  else{S._invBrand=val;const _list=((S.invFlavoursByBrand||{})[val||''])||[];if(S._invFlav&&!_list.includes(S._invFlav))S._invFlav='';renderInventory();} // flavours are per-brand: refresh the list, drop a flavour that doesn't belong to the new brand
}
function _invOptSave(id){
  const v=(document.getElementById(id)?.value||'').trim();
  if(!v){_invOptCancel(id);return;}
  const isSupp=(S.invSection==='supplements');
  if(id==='inv-cat'){
    const listKey=isSupp?'invCatsSupp':'invCatsEquip',lsKey=isSupp?'cq_inv_cats_supp':'cq_inv_cats_eq',presets=isSupp?SUPP_CATS:EQUIP_CATS;
    if(!presets.includes(v)&&!(S[listKey]||[]).includes(v)){S[listKey]=[...(S[listKey]||[]),v];try{localStorage.setItem(lsKey,JSON.stringify(S[listKey]));}catch(e){}}
    S._invCat=v;S._invCatAdd=false;
  }else if(id==='inv-flav'){
    if(_badFlav(v)){_invOptCancel(id);return;}
    const _bk=S._invBrand||'';const _m=S.invFlavoursByBrand||{};if(!((_m[_bk]||[]).includes(v))){_m[_bk]=[...(_m[_bk]||[]),v];S.invFlavoursByBrand=_m;try{localStorage.setItem('cq_inv_flavs_by_brand',JSON.stringify(_m));}catch(e){}}
    S._invFlav=v;S._invFlavAdd=false;
  }else{
    const listKey=isSupp?'invBrandsSupp':'invBrandsEquip',lsKey=isSupp?'cq_inv_brands_supp':'cq_inv_brands_eq';
    if(!(S[listKey]||[]).includes(v)){S[listKey]=[...(S[listKey]||[]),v];try{localStorage.setItem(lsKey,JSON.stringify(S[listKey]));}catch(e){}}
    S._invBrand=v;S._invBrandAdd=false;
    if(S._invFlav&&!(((S.invFlavoursByBrand||{})[v]||[]).includes(S._invFlav)))S._invFlav=''; // new brand has its own flavour list
  }
  renderInventory();
}
function _invOptCancel(id){
  if(id==='inv-cat'){S._invCatAdd=false;if(S._invCat==='__pending__')S._invCat=(S.invSection==='supplements'?'ProteinGummies':'Helmet');}
  else if(id==='inv-flav'){S._invFlavAdd=false;if(S._invFlav==='__pending__')S._invFlav='';}
  else{S._invBrandAdd=false;if(S._invBrand==='__pending__')S._invBrand='';}
  renderInventory();
}

  if(sec==='bikes')renderBikes();

function cancelInvForm(){S.showAddInv=false;S.editInvId=null;S._invCatAdd=false;S._invBrandAdd=false;renderInventory();}
function startInvEdit(id){
  const it=(S.inventory||[]).find(x=>x.id===id);if(!it)return;
  S.editInvId=id;S.showAddInv=false;S._invName=it.name||'';S._invCat=it.category||'Helmet';S._invQty=String(it.qty??'');S._invLow=String(it.low_threshold??'');S._invPrice=it.price!=null?String(it.price):'';S._invBrand=it.brand||'';S._invFlav=it.flavour||'';S._invMl=it.volume_ml!=null?String(it.volume_ml):'';S._invNutri=_itemNutri(it)||{};S._invNutriOpen=false;S._invPhoto=it.photo||'';S._invCatAdd=false;S._invBrandAdd=false;S._invFlavAdd=false;
  S.invSection=_invSecOf(it.category);
  // Make sure a custom category/brand/flavour on this item appears in this section's dropdowns
  const isSupp=S.invSection==='supplements';
  const presets=isSupp?SUPP_CATS:EQUIP_CATS,catKey=isSupp?'invCatsSupp':'invCatsEquip',brandKey=isSupp?'invBrandsSupp':'invBrandsEquip';
  if(S._invCat&&!presets.includes(S._invCat)&&!(S[catKey]||[]).includes(S._invCat))S[catKey]=[...(S[catKey]||[]),S._invCat];
  if(S._invBrand&&!(S[brandKey]||[]).includes(S._invBrand))S[brandKey]=[...(S[brandKey]||[]),S._invBrand];
  if(S._invFlav){const _bk=S._invBrand||'';const _m=S.invFlavoursByBrand||{};if(!((_m[_bk]||[]).includes(S._invFlav))){_m[_bk]=[...(_m[_bk]||[]),S._invFlav];S.invFlavoursByBrand=_m;}}
  renderInventory();
}
async function addInvItem(){
  const name=(S._invName||'').trim();if(!name){toast(t('invItemName'),'error');return;}
  const brand=(document.getElementById('inv-brand')?.value||S._invBrand||'').trim();
  const cat=_invResolveCat();
  const item={id:uid(),name,brand:(brand&&brand!=='__add__')?brand:null,category:cat,qty:parseInt(S._invQty)||0,low_threshold:parseInt(S._invLow)||0,updated_at:new Date().toISOString()};
  const{error}=await sb.from('inventory').insert(item);
  if(error){toast(error.message,'error');return;}
  // Photo and price saved separately (each tolerant) so a missing column can't block adding an item
  if(S._invPhoto){try{await sb.from('inventory').update({photo:S._invPhoto}).eq('id',item.id);}catch(e){}}
  {const _p=parseFloat(S._invPrice);if(!isNaN(_p)&&_p>0){try{await sb.from('inventory').update({price:_p}).eq('id',item.id);}catch(e){}}}
  if(S.invSection==='supplements'){const _fv=(document.getElementById('inv-flav')?.value||S._invFlav||'').trim();const _f=_badFlav(_fv)?null:_fv;try{await sb.from('inventory').update({flavour:_f}).eq('id',item.id);}catch(e){}}
  {const _mlv=_isDrinkCat(cat)?(parseInt(document.getElementById('inv-ml')?.value||S._invMl||'')||null):null;try{await sb.from('inventory').update({volume_ml:_mlv}).eq('id',item.id);}catch(e){}}
  {const _nu=_invNutriJson();try{await sb.from('inventory').update({nutrition:_nu}).eq('id',item.id);}catch(e){}}
  await loadData();S.showAddInv=false;toast(t('invSaved'));renderInventory();
}
async function saveInvEdit(){
  const id=S.editInvId;if(!id)return;
  const name=(S._invName||'').trim();if(!name){toast(t('invItemName'),'error');return;}
  const brand=(document.getElementById('inv-brand')?.value||S._invBrand||'').trim();
  const cat=_invResolveCat();
  const upd={name,brand:(brand&&brand!=='__add__')?brand:null,category:cat,qty:parseInt(S._invQty)||0,low_threshold:parseInt(S._invLow)||0,updated_at:new Date().toISOString()};
  const{error}=await sb.from('inventory').update(upd).eq('id',id);
  if(error){toast(error.message,'error');return;}
  // Photo and price saved separately (each tolerant) so a missing column can't fail the whole edit
  try{await sb.from('inventory').update({photo:S._invPhoto||null}).eq('id',id);}catch(e){}
  {const _p=parseFloat(S._invPrice);try{await sb.from('inventory').update({price:isNaN(_p)?null:_p}).eq('id',id);}catch(e){}}
  {const _fv=(document.getElementById('inv-flav')?.value||S._invFlav||'').trim();const _f=(S.invSection==='supplements'&&!_badFlav(_fv))?_fv:null;try{await sb.from('inventory').update({flavour:_f}).eq('id',id);}catch(e){}}
  {const _mlv=_isDrinkCat(cat)?(parseInt(document.getElementById('inv-ml')?.value||S._invMl||'')||null):null;try{await sb.from('inventory').update({volume_ml:_mlv}).eq('id',id);}catch(e){}}
  {const _nu=_invNutriJson();try{await sb.from('inventory').update({nutrition:_nu}).eq('id',id);}catch(e){}}
  await loadData();S.editInvId=null;toast(t('invSaved'));renderInventory();
}
async function adjInv(id,delta){
  const it=(S.inventory||[]).find(x=>x.id===id);if(!it)return;
  const q=Math.max(0,(Number(it.qty)||0)+delta);
  it.qty=q;renderInventory();
  const{error}=await sb.from('inventory').update({qty:q,updated_at:new Date().toISOString()}).eq('id',id);
  if(error){toast(error.message,'error');await loadData();renderInventory();}
}
function delInvItem(id){
  if(!isAdmin()){toast(t('adminOnlyMsg'),'error');return;}
  const it=(S.inventory||[]).find(x=>x.id===id);if(!it)return;
  confirmDialog({title:t('deleteBtn'),body:it.name,confirmLabel:t('deleteBtn'),confirmClass:'btn-red',onConfirm:async()=>{
    const{error}=await sb.from('inventory').delete().eq('id',id);
    if(error){toast(error.message,'error');return;}
    await loadData();renderInventory();
  }});
}

/* ══════════════════════════════════════════════
   COMMUNITY (leaderboard + upcoming rides)
══════════════════════════════════════════════ */
function setLb(k,v){S[k]=v;if(k==='lbScope')S.lbMetric=(v==='rider'?'duration':'count');renderCommunity();}
function _lbWeekStart(d){const x=new Date(d);x.setHours(0,0,0,0);x.setDate(x.getDate()-x.getDay());return x;}
function _lbInWindow(e,win,ref){
  const ds=(e.sessionDate||e.registeredAt||'').slice(0,10);if(!ds)return false;
  const d=new Date(ds+'T00:00:00');if(isNaN(d))return false;
  if(win==='all')return true;
  const now=ref||new Date();
  if(win==='week'){const s=_lbWeekStart(now);const e2=new Date(s);e2.setDate(s.getDate()+7);return d>=s&&d<e2;}
  if(win==='month')return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  return true;
}
// Aggregate completed+paid rides. scope 'owner' = booking account credited for EVERY rider it booked;
// scope 'rider' = each individual rider counted on their own.
function _lbAgg(win,scope,ref){
  const locOf=id=>{const s=(S.sessions||[]).find(x=>x.id===id);return s?s.location:null;};
  const rides=getQueue().filter(e=>e.status==='done'&&e.paid&&_lbInWindow(e,win,ref)&&(S.lbBranch==='all'||locOf(e.sessionId)===S.lbBranch));
  const map={};
  rides.forEach(e=>{
    const key=scope==='owner'?(e.customerId||('walk:'+e.id)):((e.name||'?').trim().toLowerCase());
    let m=map[key];if(!m)m=map[key]={key,name:e.name||'?',count:0,duration:0,spent:0,minQ:Infinity,weeks:new Set()};
    m.count++;m.duration+=(e.rideDuration||0);m.spent+=(e.price??DEFAULT_PRICE);
    if(scope==='owner'){if((e.queueNum||0)<m.minQ){m.minQ=e.queueNum||0;m.name=e.name||m.name;}}else{m.name=e.name||m.name;}
    const ds=(e.sessionDate||e.registeredAt||'').slice(0,10);if(ds){const w=_lbWeekStart(new Date(ds+'T00:00:00')).getTime();if(!isNaN(w))m.weeks.add(w);}
  });
  return map;
}
function _lbStreak(weeks){if(!weeks||!weeks.size)return 0;const wk=6048e5;const arr=[...weeks].sort((a,b)=>b-a);let s=1;for(let i=1;i<arr.length;i++){if(arr[i-1]-arr[i]===wk)s++;else break;}return s;}
function _riderTier(n){const tiers=[[50,'tierLegend'],[25,'tierElite'],[10,'tierPro'],[3,'tierRegular']];for(const[th,k]of tiers)if(n>=th)return t(k);return t('tierNewcomer');}

function renderCommunity(){
  const el=document.getElementById('tab-community');if(!el)return;
  const scope=S.lbScope,win=S.lbWindow,metric=S.lbMetric;
  const agg=_lbAgg(win,scope);
  const allAgg=win==='all'?agg:_lbAgg('all',scope);
  const mv=m=>metric==='duration'?m.duration:metric==='spent'?m.spent:m.count;
  const list=Object.values(agg).filter(m=>m.count>0).sort((a,b)=>mv(b)-mv(a)||b.count-a.count);
  let prevRank={};
  if(win!=='all'){
    const ref=new Date();if(win==='week')ref.setDate(ref.getDate()-7);else ref.setMonth(ref.getMonth()-1);
    Object.values(_lbAgg(win,scope,ref)).sort((a,b)=>mv(b)-mv(a)).forEach((m,i)=>{prevRank[m.key]=i;});
  }
  const medals=[]; // ranks render as plain numbers (1,2,3) with the top-3 highlighted in green
  const fmtVal=m=>metric==='duration'?fmtDur(m.duration):metric==='spent'?('SAR '+m.spent):String(m.count);
  const valUnit=metric==='count'?(scope==='owner'?t('lbRidersBooked').toLowerCase():t('commRides')):'';
  function rowInner(m,i){
    const initials=(m.name||'?').split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const streak=_lbStreak(m.weeks);
    const tier=_riderTier(allAgg[m.key]?allAgg[m.key].count:m.count);
    let move='';
    if(win!=='all'){const pr=prevRank[m.key];
      if(pr===undefined)move=`<span style="color:var(--green);font-size:10px;font-weight:800">▲${t('lbNewLabel')}</span>`;
      else if(pr>i)move=`<span style="color:var(--green);font-size:11px;font-weight:800">▲${pr-i}</span>`;
      else if(pr<i)move=`<span style="color:var(--red);font-size:11px;font-weight:800">▼${i-pr}</span>`;
      else move=`<span style="color:var(--muted);font-size:11px">–</span>`;}
    return`<span style="width:24px;text-align:center;font-size:${i<3?'16px':'12px'};font-weight:900;color:${i<3?'var(--green)':'var(--muted)'};flex-shrink:0">${medals[i]||(i+1)}</span>
      <span style="width:30px;height:30px;border-radius:50%;background:rgba(3,255,137,.14);border:1px solid rgba(3,255,137,.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:var(--green);flex-shrink:0">${esc(initials)}</span>
      <div style="flex:1;min-width:0">
        <div style="font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(m.name)}</div>
        <div style="font-size:10px;color:var(--muted);font-weight:700">${tier}${streak>=2?` ·  ${t('lbStreakTip').replace('{0}',streak)}`:''}</div>
      </div>
      ${move?`<span style="width:34px;text-align:center;flex-shrink:0">${move}</span>`:''}
      <div style="text-align:right;min-width:50px;flex-shrink:0"><span style="font-weight:900;color:var(--green);font-size:15px">${fmtVal(m)}</span>${valUnit?`<div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase">${valUnit}</div>`:''}</div>`;
  }
  const podium=list.slice(0,3).map((m,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:12px;background:rgba(3,255,137,${i===0?'.08':'.04'});border:1px solid rgba(3,255,137,${i===0?'.3':'.15'});border-radius:14px;margin-bottom:8px">${rowInner(m,i)}</div>`).join('');
  const rest=list.slice(3).map((m,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--border)">${rowInner(m,i+3)}</div>`).join('');
  // Search filter (keeps each rider's real rank); falls back to podium+rest when there is no query
  const _q=(S.lbSearch||'').trim().toLowerCase();
  const lb=_q
    ?(()=>{const shown=list.map((m,i)=>({m,i})).filter(o=>(o.m.name||'').toLowerCase().includes(_q));return shown.length?shown.map(o=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--border)">${rowInner(o.m,o.i)}</div>`).join(''):`<div class="empty-state">${t('commNoMatch')}</div>`;})()
    :(list.length?(podium+rest):`<div class="empty-state">${t('commNoLeaders')}</div>`);
  const searchBox=list.length>=6?`<div style="margin-bottom:12px"><input id="lb-search" type="text" value="${esc(S.lbSearch||'')}" placeholder="${esc(t('commSearchPh'))}" oninput="S.lbSearch=this.value;renderCommunity()" onfocus="S._lbSearchFocused=true" onblur="S._lbSearchFocused=false" style="width:100%;box-sizing:border-box;background:#1a1a1a;border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:9px 12px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;outline:none"></div>`:'';
  // Stash top-10 (first names only, no PII) for the Share button
  S._lbShareTxt=list.length?`${t('commLeaderboard')} · ${({week:t('lbWindowWeek'),month:t('lbWindowMonth'),all:t('lbWindowAll')}[win]||'')}\n`+list.slice(0,10).map((m,i)=>`${i+1}. ${(m.name||'?').split(/\s+/)[0]} - ${fmtVal(m)}`).join('\n'):'';
  const pill=(stateKey,val,label)=>`<button class="filter-pill${S[stateKey]===val?' active':''}" onclick="setLb('${stateKey}','${val}')">${label}</button>`;
  const metricPills=scope==='owner'
    ?[['count',t('lbRidersBooked')],['duration',t('lbMinutes')],['spent',t('lbSpent')]]
    :[['duration',t('lbMinutes')],['count',t('commRides')],['spent',t('lbSpent')]];
  // Branch filter: only when completed+paid rides span more than one branch
  const lbBranches=[...new Set(getQueue().filter(e=>e.status==='done'&&e.paid).map(e=>{const s=(S.sessions||[]).find(x=>x.id===e.sessionId);return s&&s.location;}).filter(Boolean))];
  if(lbBranches.length>1&&S.lbBranch!=='all'&&!lbBranches.includes(S.lbBranch))S.lbBranch='all';
  const branchRow=lbBranches.length>1?`<div class="filter-row" style="margin-bottom:6px">${pill('lbBranch','all',t('allBranchesLabel'))}${lbBranches.map(b=>`<button class="filter-pill${S.lbBranch===b?' active':''}" onclick="setLb('lbBranch','${esc(b).replace(/'/g,"\\'")}')">${esc(b)}</button>`).join('')}</div>`:'';
  // Summary KPIs reflecting the current window/branch filter
  const kRiders=list.length;
  const kRides=list.reduce((s,m)=>s+(m.count||0),0);
  const kMin=list.reduce((s,m)=>s+(m.duration||0),0);
  const kAvg=kRiders?Math.round(kRides/kRiders*10)/10:0;
  const commKpis=`<div class="analytics-kpi-grid" style="margin-bottom:14px">
    <div class="analytics-kpi-card"><div class="analytics-kpi-value" style="color:var(--green)">${kRiders}</div><div class="analytics-kpi-label">${t('commStatRiders')}</div></div>
    <div class="analytics-kpi-card"><div class="analytics-kpi-value" style="color:var(--green)">${kRides}</div><div class="analytics-kpi-label">${t('commStatRides')}</div></div>
    <div class="analytics-kpi-card"><div class="analytics-kpi-value" style="color:var(--blue)">${fmtDur(kMin)}</div><div class="analytics-kpi-label">${t('commStatMinutes')}</div></div>
    <div class="analytics-kpi-card"><div class="analytics-kpi-value" style="color:var(--green)">${kAvg||'—'}</div><div class="analytics-kpi-label">${t('commStatAvg')}</div></div>
  </div>`;
  // Upcoming rides: future-dated sessions, soonest first, with live spots-left
  const _today=_todayISO();
  const _sessStatusLbl={open:t('statusOpen'),full:t('statusFull'),closed:t('statusClosed')};
  const upcoming=(S.sessions||[]).filter(s=>String(s.session_date||s.id||'')>=_today)
    .sort((a,b)=>String(a.session_date||a.id).localeCompare(String(b.session_date||b.id))).slice(0,6);
  const upcomingHtml=upcoming.length?upcoming.map(s=>{
    const sl=spotsLeft(s.id);
    return`<div style="display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--border)">
      <span style="width:8px;height:8px;border-radius:50%;background:${sl>0?'var(--green)':'var(--orange)'};flex-shrink:0"></span>
      <div style="flex:1;min-width:0">
        <div style="font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.day||'')}${s.location?` · ${esc(s.location)}`:''}</div>
        <div style="font-size:11px;color:var(--muted);font-weight:700">${esc(s.session_date||s.id||'')}${s.status&&_sessStatusLbl[s.status]?` · ${_sessStatusLbl[s.status]}`:''}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;font-size:12px;font-weight:800;color:${sl>0?'var(--green)':'var(--orange)'}">${spotsLeftLabel(sl)}</div>
    </div>`;
  }).join(''):`<div class="empty-state">${t('commNoEvents')}</div>`;
  // Rider spotlight: #1 rider with all-time tier and progress toward the next tier
  const _tierProg=c=>{const ths=[[3,'tierRegular'],[10,'tierPro'],[25,'tierElite'],[50,'tierLegend']];let prev=0;for(const[th,k]of ths){if(c<th)return{th,prev,k,away:th-c};prev=th;}return null;};
  let spotlightHtml='';
  if(list.length&&!_q){
    const top=list[0];
    const topAll=allAgg[top.key]?allAgg[top.key].count:top.count;
    const tp=_tierProg(topAll);
    const tInit=(top.name||'?').split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const prog=tp?Math.max(5,Math.min(100,Math.round((topAll-tp.prev)/(tp.th-tp.prev)*100))):100;
    spotlightHtml=`<div class="form-section" style="margin-bottom:14px;border:1px solid rgba(3,255,137,.3);background:rgba(3,255,137,.05)">
      <div class="form-title">${t('commSpotlight')}</div>
      <div style="display:flex;align-items:center;gap:14px;${tp?'margin-bottom:12px':''}">
        <span style="width:48px;height:48px;border-radius:50%;background:rgba(3,255,137,.16);border:1px solid rgba(3,255,137,.35);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:var(--green);flex-shrink:0">${esc(tInit)}</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:900;font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(top.name)}</div>
          <div style="font-size:12px;color:var(--muted);font-weight:700">${_riderTier(topAll)} · ${topAll} ${t('commRides')}</div>

        <div style="text-align:right;flex-shrink:0"><span style="font-weight:900;color:var(--green);font-size:20px">${fmtVal(top)}</span></div>

      ${tp?`<div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px">${t('commToNext').replace('{0}',tp.away).replace('{1}',t(tp.k))}</div>
        <div style="height:7px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden"><div style="height:100%;width:${prog}%;background:var(--green)"></div></div>`
      :`<div style="font-size:11px;font-weight:800;color:var(--green)">${t('commMaxTier')}</div>`}
    </div>`;
  }
  // Milestone watch: riders within 2 rides of their next milestone (all-time counts)
  const _MILE=[3,10,25,50,100];
  const _nextMile=n=>_MILE.find(x=>x>n)||null;
  const _watch=Object.values(allAgg).map(m=>{const nm=_nextMile(m.count);return nm&&(nm-m.count)<=2?{m,next:nm,away:nm-m.count}:null;}).filter(Boolean).sort((a,b)=>a.away-b.away||b.m.count-a.m.count).slice(0,5);
  const milestoneHtml=_watch.length?`<div class="form-section" style="margin-top:14px">
    <div class="form-title">${t('commMilestones')}</div>
    <div style="font-size:11px;color:var(--muted);margin:-6px 0 10px">${t('commMilestonesSub')}</div>
    ${_watch.map(o=>{const mi=(o.m.name||'?').split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();return`<div style="display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--border)">
      <span style="width:30px;height:30px;border-radius:50%;background:rgba(224,136,40,.14);border:1px solid rgba(224,136,40,.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:var(--orange);flex-shrink:0">${esc(mi)}</span>
      <div style="flex:1;min-width:0;font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(o.m.name)}</div>
      <div style="text-align:right;flex-shrink:0"><span style="font-weight:900;color:var(--orange);font-size:13px">${t('commMileAway').replace('{0}',o.away)}</span><div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase">${o.next} ${t('commRides')}</div></div>
    </div>`;}).join('')}
  </div>`:'';
  el.innerHTML=`
    <div class="page-title">${t('commTitle')}</div>
    <div class="page-sub">${t('commSub')}</div>
    <div style="max-width:640px;margin-top:14px">
      ${commKpis}
      ${spotlightHtml}
      <div class="form-section">
        <div class="form-title" style="display:flex;align-items:center;justify-content:space-between;gap:10px"><span>${t('commLeaderboard')}</span>${list.length?`<button onclick="shareLeaderboard()" style="background:rgba(3,255,137,.1);border:1px solid rgba(3,255,137,.25);color:var(--green);font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:800;padding:5px 12px;border-radius:8px;cursor:pointer">${t('commShareBtn')}</button>`:''}</div>
        <div class="filter-row" style="margin-bottom:6px">${pill('lbScope','owner',t('lbScopeOwner'))}${pill('lbScope','rider',t('lbScopeRider'))}</div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:10px">${scope==='owner'?t('lbScopeOwnerSub'):t('lbScopeRiderSub')}</div>

// Ratings summary + per-bike health (avg ratings, usage, service age -> "needs attention")
function bikeHealthSection(){
  const done=getQueue().filter(e=>e.status==='done');
  const rated=done.filter(e=>e.ratingBike||e.ratingExp);
  const avgOf=(arr,k)=>{const v=arr.map(e=>e[k]).filter(Boolean);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length*10)/10:0;};
  const avgBike=avgOf(rated,'ratingBike'),avgExp=avgOf(rated,'ratingExp');
  const bikes=getBikes().filter(b=>b.status!=='retired'&&b.status!=='maintenance');
  const perBike=bikes.map(b=>{
    const rides=done.filter(e=>getAssignedBikeIds(e).includes(b.id));
    const br=rides.map(e=>e.ratingBike).filter(Boolean);
    const avgR=br.length?Math.round(br.reduce((a,c)=>a+c,0)/br.length*10)/10:0;
    const days=b.in_service_date?Math.max(0,Math.floor((Date.now()-new Date(b.in_service_date+'T00:00:00'))/86400000)):null;
    const lowRated=avgR>0&&avgR<5;
    const heavyUse=rides.length>=40;
    return{b,rides:rides.length,avgR,days,lowRated,heavyUse,attn:lowRated||heavyUse};
  });
  const attn=perBike.filter(x=>x.attn).sort((a,b)=>(a.avgR||99)-(b.avgR||99));
  // Bike rating aggregated by model (purchasing/retirement signal; uses all bikes so retired units' history still counts).
  const allBk=getBikes(),rbSumM={},rbCntM={};
  done.forEach(e=>{if(!e.ratingBike)return;getAssignedBikeIds(e).forEach(id=>{const bk=allBk.find(x=>x.id===id);if(!bk)return;const mk=bk.brand&&bk.model?`${bk.brand} - ${bk.model}`:bk.name;rbSumM[mk]=(rbSumM[mk]||0)+e.ratingBike;rbCntM[mk]=(rbCntM[mk]||0)+1;});});
  const modelRows=Object.keys(rbSumM).map(k=>({k,avg:rbSumM[k]/rbCntM[k],n:rbCntM[k]})).sort((a,b)=>b.avg-a.avg);
  const _ratingColor=v=>v>=7?'#03ff89':v>=5?'#e08828':'#f87171';
  const modelCard=modelRows.length?`<div class="chart-card" style="margin-top:14px">
    <div class="chart-card-title">${t('anRatingByModel')}</div>
    <div class="chart-card-sub">${t('anRatingByModelSub')}</div>
    ${modelRows.map(r=>`<div class="analytics-bar-row">
      <div class="analytics-bar-label" style="display:flex;align-items:center;gap:5px">${esc(r.k)}<span style="font-size:10px;background:var(--s3);border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:1px 5px;color:var(--muted-l);font-weight:700">${r.n} ${t('anRatedRidesUnit')}</span></div>
      <div class="analytics-bar-track"><div class="analytics-bar-fill" style="width:${Math.round(r.avg/10*100)}%;background:${_ratingColor(r.avg)}"></div></div>
      <div class="analytics-bar-value">${r.avg.toFixed(1)}${t('anOutOf10')}</div>
    </div>`).join('')}
  </div>`:'';
  const kpis=`<div class="analytics-kpi-grid">
    <div class="analytics-kpi-card"><div class="analytics-kpi-value" style="color:var(--green)">${avgBike?avgBike+t('anOutOf10'):'—'}</div><div class="analytics-kpi-label">${t('anAvgBikeRating')}</div><div class="analytics-kpi-sub">${rated.length} ${t('anRatedRidesUnit')}</div></div>
    <div class="analytics-kpi-card"><div class="analytics-kpi-value" style="color:var(--green)">${avgExp?avgExp+t('anOutOf10'):'—'}</div><div class="analytics-kpi-label">${t('anAvgExpRating')}</div><div class="analytics-kpi-sub">${rated.length} ${t('anRatedRidesUnit')}</div></div>
  </div>`;
  const attnHtml=!rated.length&&!attn.length
    ? `<div class="empty-state">${t('noRatingsYet')}</div>`
    : (attn.length
        ? `<div style="display:flex;flex-direction:column;gap:8px">${attn.map(x=>`
            <div style="display:flex;align-items:center;gap:10px;padding:11px 14px;background:rgba(224,136,40,.06);border:1px solid rgba(224,136,40,.25);border-radius:12px">
              <span style="font-size:16px"></span>
              <div style="flex:1;min-width:0"><div style="font-weight:800;font-size:13px">${esc(x.b.name)}</div>
                <div style="font-size:11px;color:var(--muted);margin-top:1px">${t('anRidesShortN').replace('{0}',x.rides)}${x.days!=null?` · ${t('anDaysInServiceShort').replace('{0}',x.days)}`:''}</div></div>
              <div style="text-align:right">
                <div style="font-weight:900;color:${x.lowRated?'var(--red)':'var(--green)'}">${x.avgR?x.avgR+t('anOutOf10'):'—'}</div>
                <div style="font-size:10px;font-weight:800;color:var(--orange)">${x.lowRated?t('anAttnLowRated'):t('anAttnHeavyUse')}</div>
              </div>
            </div>`).join('')}</div>`
        : `<div class="empty-state">${t('anNoAttention')}</div>`);
  return`<div class="analytics-section-title">${t('anRatingsSection')}</div>
    ${kpis}
    <div style="font-size:13px;font-weight:800;color:var(--muted);margin:14px 0 8px">${t('anNeedsAttention')}</div>
    ${attnHtml}
    ${modelCard}`;
}

function renderAnalytics(){
  const allQ=getQueue();
  const allSess=allSessions();
  if(S.analyticsRange==='custom')S.analyticsRange='all'; // 'custom' (last-N) range was removed; fall back to All time


  let sessCandidates=[...allSess].sort((a,b)=>new Date(a.session_date||a.id)-new Date(b.session_date||b.id));
  if(S.analyticsRange==='month'){
    const mo=new Date();mo.setDate(1);mo.setHours(0,0,0,0);
    sessCandidates=sessCandidates.filter(s=>new Date(s.session_date||s.id)>=mo);
  } else if(S.analyticsRange==='year'){
    const yr=new Date().getFullYear();
    sessCandidates=sessCandidates.filter(s=>new Date(s.session_date||s.id).getFullYear()===yr);
  } else if(S.analyticsRange==='daterange'){
    if(S.analyticsDateFrom) sessCandidates=sessCandidates.filter(s=>(s.session_date||'')>=S.analyticsDateFrom);
    if(S.analyticsDateTo)   sessCandidates=sessCandidates.filter(s=>(s.session_date||'')<=S.analyticsDateTo);
  }
  const sessIds=new Set(sessCandidates.map(s=>s.id));
  const queue=allQ.filter(e=>sessIds.has(e.sessionId));
  const sessions=sessCandidates;
  const done=queue.filter(e=>e.status==='done');
  const noshow=queue.filter(e=>e.status==='noshow');
  // Product sales for the in-range sessions (cashier sales + rental add-ons)
  const anSalesLines=[...sessIds].reduce((acc,sid)=>acc.concat(_cashSessionLines(sid)),[]);
  const anSales=_salesTotals(anSalesLines);
  const anTopItems=(()=>{const c={};anSalesLines.filter(l=>l.cat!=='__discount__'&&l.cat!=='__cardmeta__'&&l.pay!=='refunded'&&(Number(l.qty)||0)>0).forEach(l=>{const k=l.name||'—';if(!c[k])c[k]={name:k,qty:0,value:0};c[k].qty+=(Number(l.qty)||0);c[k].value+=(Number(l.qty)||0)*(Number(l.price)||0);});return Object.values(c).sort((a,b)=>b.qty-a.qty||b.value-a.value).slice(0,8);})();

  function _rangeBar(){
    const _sh=sessions.filter(s=>queue.some(e=>e.sessionId===s.id&&e.status==='done')).length;
    const _td=done.length;
    const rangeLabels={all:t('anAllTime'),month:t('anThisMonth'),year:t('anThisYear')||'This Year',custom:t('anCustom')||'Custom',daterange:t('anDateRange')||'Date Range'};
    return`<div class="an-range-bar">
      <span class="an-range-label">${t('anShowing')}</span>
      ${['all','month','year','daterange'].map(r=>
        `<button class="filter-pill${S.analyticsRange===r?' active':''}" onclick="setAnRange('${r}')">${rangeLabels[r]}</button>`
      ).join('')}
      ${S.analyticsRange==='daterange'?`
        <span style="font-size:12px;font-weight:700;color:var(--muted)">${t('anFromDate')||'From'}:</span>
        <input type="date" value="${S.analyticsDateFrom||''}"
          style="background:#1a1a1a;border:1px solid rgba(255,255,255,.15);border-radius:8px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:4px 8px;cursor:pointer"
          onchange="S.analyticsDateFrom=this.value;renderAnalytics()">
        <span style="font-size:12px;font-weight:700;color:var(--muted)">${t('anToDate')||'To'}:</span>
        <input type="date" value="${S.analyticsDateTo||''}"
          style="background:#1a1a1a;border:1px solid rgba(255,255,255,.15);border-radius:8px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:4px 8px;cursor:pointer"
          onchange="S.analyticsDateTo=this.value;renderAnalytics()">
      `:''}
      <span class="result-count" style="margin-left:4px">${_sh} ${t('anSessionsHeld').toLowerCase()} · ${_td} ${t('anRidesLabel')}</span>
    </div>`;
  }

  

  
  const revCollected=done.filter(e=>e.paid).reduce((s,e)=>s+(e.price??DEFAULT_PRICE),0);
  const revPending  =done.filter(e=>!e.paid).reduce((s,e)=>s+(e.price??DEFAULT_PRICE),0);
  const revTotal    =revCollected+revPending;
  
  function excVAT(v){return v/1.15;}
  function sarBoth(v,precision=0){
    return`SAR ${v.toFixed(precision)}<div style="font-size:11px;color:var(--muted);font-weight:600;margin-top:1px">SAR ${excVAT(v).toFixed(precision)} <span style="font-size:10px">${t('vatExcl')}</span></div>`;
  }
  const sessionsWithDone=sessions.filter(s=>done.some(e=>e.sessionId===s.id));
  const sessionsHeld=sessionsWithDone.length;
  const avgRevPerSession=sessionsHeld?Math.round(revTotal/sessionsHeld):0;
  const collectionRate=revTotal>0?Math.round((revCollected/revTotal)*100):0;

  
  const totalDone=done.length;
  const uniqueCustIds=[...new Set(done.filter(e=>e.customerId).map(e=>e.customerId))];
  const custRideCounts={};
  done.filter(e=>e.customerId).forEach(e=>{custRideCounts[e.customerId]=(custRideCounts[e.customerId]||0)+1;});
  const repeatCustomers=Object.values(custRideCounts).filter(c=>c>=2).length;
  const repeatRideCount=Object.values(custRideCounts).filter(c=>c>=2).reduce((s,c)=>s+c,0);
  const totalAttempted=done.length+noshow.length;
  const noShowRate=totalAttempted>0?Math.round((noshow.length/totalAttempted)*100):0;
  const cancelCount=allQ.filter(e=>sessIds.has(e.sessionId)&&e.status==='cancelled').length;
  const cancelRate=totalAttempted+cancelCount>0?Math.round(cancelCount/(totalAttempted+cancelCount)*100):0;
  const avgOccupancy=sessionsHeld>0
    ?Math.round(sessionsWithDone.reduce((sum,s)=>{
        const cap=s.capacity||12;
        return sum+(done.filter(e=>e.sessionId===s.id).length/cap*100);
      },0)/sessionsHeld)
    :0;

  
  const totalSeatsOffered=sessions.reduce((s,sess)=>s+(sess.capacity||12),0);
  const revPAS=totalSeatsOffered>0?(revCollected/totalSeatsOffered):0;
  const completionRate=totalAttempted>0?Math.round((done.length/totalAttempted)*100):0;

  
  const typeBreak={};
  done.forEach(e=>{const rt=resolvedType(e);typeBreak[rt]=(typeBreak[rt]||0)+1;});
  const dayBreak={};
  done.forEach(e=>{if(e.sessionDay)dayBreak[e.sessionDay]=(dayBreak[e.sessionDay]||0)+1;});
  const revByType={};
  done.filter(e=>e.paid).forEach(e=>{const rt=resolvedType(e);revByType[rt]=(revByType[rt]||0)+(e.price??DEFAULT_PRICE);});
  
  const revByDay={};
  const countByDay={};
  done.filter(e=>e.paid).forEach(e=>{
    if(!e.sessionDay)return;
    revByDay[e.sessionDay]=(revByDay[e.sessionDay]||0)+(e.price??DEFAULT_PRICE);
    countByDay[e.sessionDay]=(countByDay[e.sessionDay]||0)+1;
  });
  
  const typeRevPerRide={};
  Object.keys(revByType).forEach(ty=>{
    const cnt=done.filter(e=>e.paid&&resolvedType(e)===ty).length;
    typeRevPerRide[ty]=cnt>0?(revByType[ty]/cnt):0;
  });
  const typeColor={Road:'var(--text)',Hybrid:'var(--green)',Mountain:'var(--text)',Any:'var(--muted-l)'};
  const typeColorHex={Road:'#4aa8f8',Hybrid:'#03ff89',Mountain:'#e08828',Any:'#777'};
  const dayColorHex='#03ff89';
  const dayOrder=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const dayBreakOrdered=Object.fromEntries(dayOrder.filter(d=>dayBreak[d]).map(d=>[d,dayBreak[d]]));
  const topType=Object.keys(typeBreak).sort((a,b)=>typeBreak[b]-typeBreak[a])[0]||'—';
  const topDay=Object.keys(dayBreak).sort((a,b)=>dayBreak[b]-dayBreak[a])[0]||'—';
  const revPerRide=totalDone>0?(revTotal/totalDone):0;
  const revPerCustomer=uniqueCustIds.length>0?(revTotal/uniqueCustIds.length):0;
  const bestSession=sessionsWithDone.length
    ?sessionsWithDone.reduce((best,s)=>{
        const r=done.filter(e=>e.sessionId===s.id&&e.paid).reduce((sum,e)=>sum+(e.price??DEFAULT_PRICE),0);
        return r>best.r?{s,r}:best;
      },{s:null,r:-1})
    :{s:null,r:0};

  
  const ridesWithDur=done.filter(e=>e.rideDuration&&e.rideDuration>0);
  const avgDurOverall=ridesWithDur.length?Math.round(ridesWithDur.reduce((s,e)=>s+e.rideDuration,0)/ridesWithDur.length):0;
  const maxDurEntry=ridesWithDur.length?ridesWithDur.reduce((best,e)=>e.rideDuration>best.rideDuration?e:best,ridesWithDur[0]):null;
  const minDurEntry=ridesWithDur.length?ridesWithDur.reduce((best,e)=>e.rideDuration<best.rideDuration?e:best,ridesWithDur[0]):null;
  const durBuckets={'<15 min':0,'15-30 min':0,'30-60 min':0,'1h+':0};
  ridesWithDur.forEach(e=>{
    if(e.rideDuration<15)durBuckets['<15 min']++;
    else if(e.rideDuration<30)durBuckets['15-30 min']++;
    else if(e.rideDuration<60)durBuckets['30-60 min']++;
    else durBuckets['1h+']++;
  });
  const durBySession={};
  ridesWithDur.forEach(e=>{if(!durBySession[e.sessionId])durBySession[e.sessionId]={sum:0,cnt:0};durBySession[e.sessionId].sum+=e.rideDuration;durBySession[e.sessionId].cnt++;});
  const avgDurBySession={};
  Object.entries(durBySession).forEach(([sid,{sum,cnt}])=>{const s=allSessions().find(x=>x.id===sid);if(s)avgDurBySession[`${dayLabel(s.day)} ${shortDate(s.session_date||s.id)}`]=Math.round(sum/cnt);});
  const durSumByType={},durCntByType={};
  ridesWithDur.forEach(e=>{const ty=resolvedType(e);durSumByType[ty]=(durSumByType[ty]||0)+e.rideDuration;durCntByType[ty]=(durCntByType[ty]||0)+1;});
  const avgDurByType={};Object.keys(durSumByType).forEach(k=>{avgDurByType[k]=Math.round(durSumByType[k]/durCntByType[k]);});
  const durSumByModel={},durCntByModel={};

  
  const allBikes=getBikes();
  ridesWithDur.forEach(e=>{getAssignedBikeIds(e).forEach(bId=>{const bk=allBikes.find(x=>x.id===bId);if(!bk)return;const mk=bk.brand&&bk.model?`${bk.brand} - ${bk.model}`:bk.name;durSumByModel[mk]=(durSumByModel[mk]||0)+e.rideDuration;durCntByModel[mk]=(durCntByModel[mk]||0)+1;});});
  const avgDurByModel={};Object.keys(durSumByModel).forEach(k=>{avgDurByModel[k]=Math.round(durSumByModel[k]/durCntByModel[k]);});
  const brandRentals={};
  const modelRentals={};
  done.forEach(e=>{
    getAssignedBikeIds(e).forEach(bId=>{
      const bk=allBikes.find(x=>x.id===bId);
      if(!bk)return;
      const brand=bk.brand||'';
      const model=bk.model||'';
      if(brand) brandRentals[brand]=(brandRentals[brand]||0)+1;
      if(brand&&model){
        const mk=`${brand} - ${model}`;
        modelRentals[mk]=(modelRentals[mk]||0)+1;
      }
    });
  });
  
  const modelPieces={};
  allBikes.forEach(bk=>{
    if(!bk.brand||!bk.model)return;
    const mk=`${bk.brand} - ${bk.model}`;
    modelPieces[mk]=(modelPieces[mk]||0)+1;
  });
  
  const modelAvgPerPiece={};
  Object.keys(modelRentals).forEach(mk=>{
    const pieces=modelPieces[mk]||1;
    modelAvgPerPiece[mk]=modelRentals[mk]/pieces;
  });
  
  const modelRevenue={};
  done.filter(e=>e.paid).forEach(e=>{
    getAssignedBikeIds(e).forEach(bId=>{
      const bk=allBikes.find(x=>x.id===bId);
      if(!bk||!bk.brand||!bk.model)return;
      const mk=`${bk.brand} - ${bk.model}`;
      modelRevenue[mk]=(modelRevenue[mk]||0)+(e.price??DEFAULT_PRICE);
    });
  });
  
  const _fleetPalette=['#4aa8f8','#03ff89','#a06af0','#e08828','#e04040','#00c9e0','#f0a06a','#89d4cf','#f06ab8','#c9e089'];
  const _brandKeys=Object.keys(brandRentals).sort((a,b)=>brandRentals[b]-brandRentals[a]);
  const _modelKeys=Object.keys(modelRentals).sort((a,b)=>modelRentals[b]-modelRentals[a]);
  const brandColorMap={};_brandKeys.forEach((k,i)=>{brandColorMap[k]=_fleetPalette[i%_fleetPalette.length];});
  const modelColorMap={};_modelKeys.forEach((k,i)=>{modelColorMap[k]=_fleetPalette[i%_fleetPalette.length];});

  
  const trendData=[...sessions]
    .filter(s=>done.some(e=>e.sessionId===s.id)||noshow.some(e=>e.sessionId===s.id))
    .sort((a,b)=>new Date(a.session_date||a.id)-new Date(b.session_date||b.id))
    .map(s=>{
      const sDone=done.filter(e=>e.sessionId===s.id);
      const sNo  =noshow.filter(e=>e.sessionId===s.id);
      const cap  =s.capacity||12;
      const rev  =sDone.filter(e=>e.paid).reduce((sum,e)=>sum+(e.price??DEFAULT_PRICE),0);
      const pend =sDone.filter(e=>!e.paid).reduce((sum,e)=>sum+(e.price??DEFAULT_PRICE),0);
      const occ  =Math.round(sDone.length/cap*100);
      const types={};sDone.forEach(e=>{const rt=resolvedType(e);types[rt]=(types[rt]||0)+1;});
      const topT =Object.keys(types).sort((a,b)=>types[b]-types[a])[0]||'—';
      const lbl  =shortDate(s.session_date||s.id).replace(/,.*$/,'');
      return{s,sDone,sNo,cap,rev,pend,occ,topT,lbl,riders:sDone.length,revTotal:rev+pend,noShows:sNo.length};
    });

  
  let cumRev=0;
  const cumData=trendData.map(d=>{cumRev+=d.rev;return{...d,cumRev};});

  
  function insightCard(type,icon,title,body){
    return`<div class="insight-card ${type}"><div class="insight-icon">${icon}</div><div><div class="insight-title">${title}</div><div class="insight-body">${body}</div></div></div>`;
  }
  const insights=[];
  if(collectionRate>=80) insights.push(insightCard('good','',t('anCollectionRate'),t('anInsightGoodCollection')));
  else insights.push(insightCard('alert','',t('anCollectionRate'),t('anInsightLowCollection').replace('{0}',revPending.toFixed(0))));
  if(revPending>0&&revTotal>0&&(revPending/revTotal)>0.2)
    insights.push(insightCard('warn','',t('pendingLabel'),t('anInsightPendingHigh').replace('{0}',revPending.toFixed(0)).replace('{1}',Math.round(revPending/revTotal*100))));
  if(avgOccupancy>=75) insights.push(insightCard('good','',t('anAvgOccupancy'),t('anInsightHighOcc')));
  else if(avgOccupancy<50) insights.push(insightCard('warn','',t('anAvgOccupancy'),t('anInsightLowOcc')));
  if(topDay&&topDay!=='—') insights.push(insightCard('info','',t('anBusiestDayLabel'),t('anInsightTopDay').replace('{0}',dayLabel(topDay)||topDay)));
  if(topType&&topType!=='—') insights.push(insightCard('info','',t('anMostPopType'),t('anInsightTopType').replace('{0}',typeLabel(topType))));
  const retentionPct=uniqueCustIds.length>0?Math.round(repeatCustomers/uniqueCustIds.length*100):0;
  if(retentionPct>=30) insights.push(insightCard('purple','',t('anCustRetention'),t('anInsightRetention').replace('{0}',retentionPct)));

  
  function occGauge(pct){
    const r=44,cx=56,cy=56,sw=10;
    const arc=r*Math.PI; 
    const filled=arc*(pct/100);
    const c=pct>=80?'#03ff89':pct>=50?'#e08828':'#d90909';
    return`<div class="occ-gauge-wrap">
      <svg class="occ-gauge-svg" width="112" height="66" viewBox="0 0 112 66">
        <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="${sw}" stroke-linecap="round"/>
        <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="${c}" stroke-width="${sw}" stroke-linecap="round"
          stroke-dasharray="${filled} ${arc}" stroke-dashoffset="0"/>
      </svg>

function bikeTypeIcon(type,size=14){
  const a=`width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"`;
  const icons={
    Road:`<svg ${a} stroke-width="1.6"><circle cx="5.5" cy="17" r="4"/><circle cx="18.5" cy="17" r="4"/><path d="M5.5 17L9.5 8 13 12.5 16 8"/><path d="M18.5 17L16 8"/><path d="M9.5 8L8 5.5Q10 5 11.5 5.5"/></svg>`,
    Hybrid:`<svg ${a} stroke-width="1.6"><circle cx="5.5" cy="17" r="4"/><circle cx="18.5" cy="17" r="4"/><path d="M5.5 17L9 9 12.5 13 16 9"/><path d="M18.5 17L16 9"/><path d="M9 9V6h3"/></svg>`,
    Mountain:`<svg ${a} stroke-width="2"><circle cx="5.5" cy="17" r="4.5"/><circle cx="18.5" cy="17" r="4.5"/><path d="M5.5 17L9.5 8.5 13 13 16 8.5"/><path d="M18.5 17L16 8.5"/><path d="M9.5 8.5L8 6h3.5"/></svg>`,
    Any:`<svg ${a} stroke-width="1.5"><circle cx="5.5" cy="17" r="4"/><circle cx="18.5" cy="17" r="4"/><path d="M5.5 17L10 9 13.5 13 17 9"/><path d="M18.5 17L17 9"/></svg>`,
  };
  return icons[type]||icons.Any;
}

// Connection banner: a thin top strip shown only when the device is offline (reliable signal). Realtime drops

// Slim refresh for the 30s poll: only the volatile, photo-free tables (queue + sessions + sales).
// Bikes/inventory/promo (which carry base64 photo data-URLs) are NOT refetched here - they load on
// full loadData() (boot, manual refresh, tab focus), so the poll payload stays tiny.
async function loadDataLight(){
  if(!sb)return;
  let q,ses,cs,bk;
  try{[q,ses,cs,bk]=await Promise.all([
    sb.from('queue_entries').select('*').gte('session_date',_qWindowCut()).order('session_id').order('queue_num'),
    sb.from('sessions').select('*').order('session_date'),
    sb.from('cashier_sales').select('*'),
    sb.from('bikes').select('id,status'), // status-only (no photos) so availability stays fresh on the poll without a heavy payload
  ]);}catch(e){return;} // offline: keep current state
  if(q&&!q.error){S.queue=(q.data||[]).map(entryFromDB);try{_applyBookOutbox();}catch(_){}_bookOutboxFlush();}
  if(ses&&!ses.error)S.sessions=ses.data||[];
  if(bk&&!bk.error){const _bm=new Map((bk.data||[]).map(r=>[r.id,r.status]));S.bikes=(S.bikes||[]).map(b=>(_bm.has(b.id)&&_bm.get(b.id)!==b.status)?{...b,status:_bm.get(b.id)}:b);} // merge fresh statuses, keep photos/other fields
  if(cs&&!cs.error){S.cashSales=cs.data||[];
    try{_outbox().forEach(op=>{if(op.kind==='delete')S.cashSales=(S.cashSales||[]).filter(r=>r.id!==op.id);else{const i=(S.cashSales||[]).findIndex(r=>r.id===op.id);if(i>=0)S.cashSales[i]=op.data;else S.cashSales.push(op.data);}});}catch(_){}
    try{const _v=_voidedIds();if(_v.length)S.cashSales=(S.cashSales||[]).filter(r=>_v.indexOf(r.id)<0);}catch(_){}}
  _outboxFlush();
}

// ── Supabase Realtime: ONE channel pushes DB changes to the screen (debounced); the 30s poll is the fallback. ──
// Routes by table: bikes/inventory changes trigger a full reload (new rows + photos); everything else uses the slim
// path. Auto-reconnects with capped backoff so a dropped socket recovers instead of going silently stale.
let _rtChannel=null,_rtDebounce=null,_rtRetry=0,_rtWantFull=false;
function _rtApply(){
  if(_rtDebounce)clearTimeout(_rtDebounce);
  _rtDebounce=setTimeout(async()=>{
    const full=_rtWantFull;_rtWantFull=false;
    if(document.hidden)return; // visibilitychange catches us up when the screen returns
    try{
      if(S.view==='staff'){await _autoRefresh(full);}
      else if(S.view==='customer'&&S.custTab==='myrides'){await(full?loadData():loadDataLight());_lastRefresh=Date.now();renderMyRides();renderLandingAvail();}
      else{renderLandingAvail();}
    }catch(e){console.warn('Realtime refresh error:',e);}
  },350);
}
function _onRt(payload){if(payload&&(payload.table==='bikes'||payload.table==='inventory'))_rtWantFull=true;_rtApply();}
function setupRealtime(){
  if(!sb||!sb.channel)return;
  try{if(_rtChannel){sb.removeChannel(_rtChannel);_rtChannel=null;}}catch(_){}
  try{
    _rtChannel=sb.channel('mmcq-live')
      .on('postgres_changes',{event:'*',schema:'public',table:'queue_entries'},_onRt)
      .on('postgres_changes',{event:'*',schema:'public',table:'sessions'},_onRt)
      .on('postgres_changes',{event:'*',schema:'public',table:'bikes'},_onRt)
      .on('postgres_changes',{event:'*',schema:'public',table:'inventory'},_onRt)
      .on('postgres_changes',{event:'*',schema:'public',table:'cashier_sales'},_onRt)
      .subscribe(status=>{
        S._rtConnected=(status==='SUBSCRIBED');
        if(status==='SUBSCRIBED'){_rtRetry=0;}
        else if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'||status==='CLOSED'){
          const delay=Math.min(30000,1000*Math.pow(2,Math.min(_rtRetry++,5))); // 1s,2s,4s…capped 30s
          setTimeout(setupRealtime,delay);
        }
        _updateConnUI();
      });
  }catch(e){console.warn('Realtime init failed:',e);}
}

// ── Modal accessibility: trap Tab focus inside the open dialog + Escape to close ──
function _visibleModals(){return[...document.querySelectorAll('.modal-backdrop,.pin-backdrop,.auth-backdrop')].filter(m=>m.getClientRects().length>0);}
document.addEventListener('keydown',e=>{
  if(e.key!=='Tab'&&e.key!=='Escape')return;
  const modals=_visibleModals();const modal=modals[modals.length-1];
  if(!modal)return;
  if(e.key==='Escape'){
    // Only the standard dismissible modals close on Escape (not the PIN gate / login)
    if(modal.classList.contains('modal-backdrop')){e.preventDefault();modal.click();}
    return;
  }
  const list=[...modal.querySelectorAll('a[href],button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])')].filter(el=>el.getClientRects().length>0);
  if(!list.length)return;
  const first=list[0],last=list[list.length-1],inside=modal.contains(document.activeElement);
  if(e.shiftKey&&(document.activeElement===first||!inside)){e.preventDefault();last.focus();}
  else if(!e.shiftKey&&(document.activeElement===last||!inside)){e.preventDefault();first.focus();}
});

// ── Pull-to-refresh: drag down at the top of the queue / sessions / dashboard / My Rides lists to refresh ──
(function(){
  let startY=0,pulling=false,dist=0;
  function eligible(){
    if(document.querySelector('.modal-backdrop,.pin-backdrop,.auth-backdrop,.pay-menu-popup'))return false;
    if(S.view==='staff')return ['queue','sessions'].includes(S.staffTab);
    if(S.view==='customer')return S.custTab==='myrides';
    return false;
  }
  function ind(){let e=document.getElementById('ptr-ind');if(!e){e=document.createElement('div');e.id='ptr-ind';e.innerHTML='<div class="ptr-spin" aria-hidden="true"></div>';document.body.appendChild(e);}return e;}
  function sTop(){return window.scrollY||document.documentElement.scrollTop||document.body.scrollTop||0;}
  function reset(el){el.classList.remove('ready','refreshing');el.style.transform='translateX(-50%) translateY(-64px)';el.style.opacity='0';}
  document.addEventListener('touchstart',e=>{
    if(!eligible()||sTop()>2||e.touches.length!==1){pulling=false;return;}
    startY=e.touches[0].clientY;pulling=true;dist=0;
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!pulling)return;
    const dy=e.touches[0].clientY-startY;
    if(dy<=0||sTop()>2){pulling=false;ind().style.opacity='0';return;}
    dist=Math.min(dy*0.5,90);
    if(dy>8)e.preventDefault();              // replace native rubber-band with our indicator (only when pulling down at the very top)
    const el=ind();el.style.transform=`translateX(-50%) translateY(${Math.min(dist-50,16)}px)`;el.style.opacity=String(Math.min(1,dist/60));
    el.classList.toggle('ready',dist>=60);
  },{passive:false});
  document.addEventListener('touchend',()=>{
    if(!pulling)return;pulling=false;
    const el=ind();
    if(dist>=60){
      el.classList.add('refreshing','ready');el.style.transform='translateX(-50%) translateY(14px)';el.style.opacity='1';
      Promise.resolve().then(()=>S.view==='staff'?_autoRefresh(true):loadData().then(()=>{renderMyRides();renderLandingAvail();}))
        .catch(()=>{}).finally(()=>setTimeout(()=>reset(el),450));
    }else reset(el);
    dist=0;
  },{passive:true});
})();

// ── Global error capture: keep the last 50 errors locally, surface a throttled toast, log to a tolerant table ──
let _errToastAt=0;
function _logError(msg,src){
  msg=String(msg||'error').slice(0,500);src=String(src||'');
  try{const a=JSON.parse(localStorage.getItem('cq_errors')||'[]');a.push({t:new Date().toISOString(),msg,src});while(a.length>50)a.shift();localStorage.setItem('cq_errors',JSON.stringify(a));}catch(e){}
  try{console.error('[mm]',msg,src);}catch(e){}
  try{if(typeof sb!=='undefined'&&sb)sb.from('error_log').insert({at:new Date().toISOString(),msg,src,ua:(navigator.userAgent||'').slice(0,200)}).then(()=>{},()=>{});}catch(e){}
  const now=Date.now();if(now-_errToastAt>15000){_errToastAt=now;try{toast(t('errSomethingWrong'),'error');}catch(e){}}
}
