function onBikeHeightInput(idx,value){
  S.regBikeHeights[idx]=value;
  const h=parseInt(value);
  if(!isNaN(h)&&h>=100&&h<=250){
    const sz=heightToSize(h);
    S.regBikeSizes[idx]=sz;
    const badge=document.getElementById(`bike-size-badge-${idx}`);
    if(badge)badge.innerHTML=`<div class="size-chip">${sz}<span class="size-chip-label">${sizeLabel(sz)}</span></div>`;
    document.querySelectorAll(`[data-slot="${idx}"]`).forEach(btn=>{
      btn.classList.toggle('active',btn.dataset.size===sz);
    });
  }else{
    const badge=document.getElementById(`bike-size-badge-${idx}`);
    if(badge)badge.innerHTML='';
  }
}

function setBikeType(idx,type){
  S.regBikeTypes[idx]=type;
  document.querySelectorAll(`[data-type-slot="${idx}"]`).forEach(btn=>{
    btn.classList.toggle('active',btn.dataset.type===type);
  });
  // update price preview if visible
  const pp=document.getElementById('price-preview-wrap');
  if(pp){
    const allSet=S.regBikeTypes.slice(0,S.regQty).every(ty=>ty);
    if(allSet){
      const tMin=S.regBikeTypes.slice(0,S.regQty).reduce((s,ty)=>s+priceForType(ty||'Any'),0);
      const tMax=S.regBikeTypes.slice(0,S.regQty).reduce((s,ty)=>s+priceForTypeMax(ty||'Any'),0);
      const hAny=S.regBikeTypes.slice(0,S.regQty).some(ty=>ty==='Any');
      const tDisplay=hAny?`SAR ${tMin}/${tMax}`:`SAR ${tMin.toFixed(2).replace(/\.00$/,'')}`;
      const breakdown=S.regQty>1
        ?S.regBikeTypes.slice(0,S.regQty).map((ty,i)=>`${t('bike')} ${i+1}: ${priceDisplay(ty)}`).join(' &nbsp;&middot;&nbsp; ')
        :t('pricePerBike');
      pp.innerHTML=`<div class="price-preview">
        <div class="price-preview-breakdown">${breakdown}</div>
        <div class="price-preview-total">${tDisplay}</div>
      </div>`;
    }
  }
}

function ensureBikeSizes(){
  const h=parseInt(S._rHeight);
  const defaultSz=(!isNaN(h)&&h>=100&&h<=250)?heightToSize(h):'M';
  while(S.regBikeSizes.length<S.regQty)  S.regBikeSizes.push(S.regBikeSizes.length===0?defaultSz:'M');
  while(S.regBikeSizes.length>S.regQty)  S.regBikeSizes.pop();
  while(S.regBikeHeights.length<S.regQty) S.regBikeHeights.push('');
  while(S.regBikeHeights.length>S.regQty) S.regBikeHeights.pop();
  while(S.regBikeTypes.length<S.regQty)  S.regBikeTypes.push('');
  while(S.regBikeTypes.length>S.regQty)  S.regBikeTypes.pop();
}

function setBikeSize(idx,size){
  S.regBikeSizes[idx]=size;
  // targeted update - no full re-render needed
  document.querySelectorAll(`[data-slot="${idx}"]`).forEach(btn=>{
    btn.classList.toggle('active',btn.dataset.size===size);
  });
  // update size description label next to the toggles
  const row=document.querySelector(`[data-slot="${idx}"]`)?.closest('.form-group');
  if(row){const desc=row.querySelector('.size-desc');if(desc)desc.textContent=sizeLabel(size);}
}

function changeRegQty(delta){
  S.regQty=Math.max(1,Math.min(6,S.regQty+delta));
  ensureBikeSizes();
  renderRegister();
}

function set(k,v){S[k]=v;if(S.view==='customer'){renderRegister();renderMyRides();}else if(S.view==='staff'){renderStaffQueue();renderBikes();renderHistory();}}

async function submitReg(){
  const cust=S.loggedIn||getSession();
  if(!cust){toast(t('errLoginFirst'),'error');return;}
  if(!S.selSession){toast(t('errSelectSession'),'error');return;}
  if(!openSessions().find(s=>s.id===S.selSession)){toast(t('errSessionClosed'),'error');return;}

  const qty=S.regQty||1;
  ensureBikeSizes();

  // Resolve per-bike heights
  const heights=[];
  for(let i=0;i<qty;i++){
    if(i===0&&cust.height){
      heights.push(cust.height);
    }else{
      const h=parseInt(S.regBikeHeights[i]);
      if(isNaN(h)||h<100||h>250){
        toast(qty>1?`${t('errValidHeightCm')} (${t('bike')} ${i+1})`:t('errValidHeightCm'),'error');return;
      }
      heights.push(h);
    }
  }

  // Validate sizes and types per bike
  for(let i=0;i<qty;i++){
    if(!S.regBikeSizes[i]){toast(qty>1?`${t('errSelectSizeGeneric')} (${t('bike')} ${i+1})`:t('errSelectSizeGeneric'),'error');return;}
    if(!S.regBikeTypes[i]){toast(qty>1?`${t('errSelectTypeGeneric')} (${t('bike')} ${i+1})`:t('errSelectTypeGeneric'),'error');return;}
  }

  if(spotsLeft(S.selSession)<qty){toast(`${t('errNotEnoughSpots')} (${spotsLeft(S.selSession)})`,'error');return;}

  const name=cust.name,email=cust.email||'',phone=cust.phone||'';
  const queue=getQueue();
  if(phone&&queue.find(e=>e.phone===phone&&e.sessionId===S.selSession&&e.status!=='noshow'&&e.status!=='cancelled'))
    {toast(t('errPhoneInSession'),'error');return;}

  const sess=allSessions().find(s=>s.id===S.selSession)||{day:'',session_date:S.selSession};
  const baseQNum=nextQNum(S.selSession);
  const entries=Array.from({length:qty},(_,i)=>({
    id:uid(),name,email,phone,
    size:S.regBikeSizes[i]||heightToSize(heights[i]),
    typePreference:S.regBikeTypes[i],paid:false,
    assignedBikeId:null,sessionId:S.selSession,sessionDay:sess.day,sessionDate:sess.session_date||S.selSession,
    queueNum:baseQNum+i,status:'waiting',registeredAt:new Date().toISOString(),walkIn:false,
    customerId:cust.id,price:priceForType(S.regBikeTypes[i])
  }));
  await Promise.all(entries.map(e=>sb.from('queue_entries').insert(entryToDB(e))));

  // Save bike 0 height to account if not already stored
  if(!cust.height&&heights[0]){
    try{
      await sb.from('customers').update({height:heights[0]}).eq('id',cust.id);
      S.loggedIn.height=heights[0];setSession(S.loggedIn);
    }catch(e){/* non-fatal */}
  }

  await loadData();
  S.lastTicket=entries[0];S._rHeight='';S._rDate='';S.selSession=null;S.regType=null;
  S.regQty=1;S.regBikeSizes=[];S.regBikeHeights=[];S.regBikeTypes=[];
  toast(qty>1?`${t('toastRegisteredRange')} #${baseQNum}–#${baseQNum+qty-1}`:`${t('toastRegistered')} #${baseQNum}`);
  renderRegister();
}

function renderMyRides(){
  const cust=S.loggedIn;
  if(!cust){document.getElementById('tab-myrides').innerHTML='';return;}
  const allEntries=getQueue().filter(e=>e.customerId===cust.id);
  const visible=allEntries.filter(e=>e.status==='waiting'||e.status==='active'||e.status==='done');
  const completed=visible.filter(e=>e.status==='done');
  const totalPaid=visible.filter(e=>e.paid).reduce((sum,e)=>sum+(e.price||DEFAULT_PRICE),0);
  const pending=visible.filter(e=>!e.paid&&e.status!=='cancelled').reduce((sum,e)=>sum+(e.price||DEFAULT_PRICE),0);
  // Assign personal order numbers chronologically
  const chronological=[...visible].sort((a,b)=>new Date(a.registeredAt)-new Date(b.registeredAt));
  const withIndex=chronological.map((e,i)=>({...e,orderNum:i+1}));
  // Apply filters + sort
  let displayOrder=[...withIndex];
  if(S.myStatus!=='all') displayOrder=displayOrder.filter(e=>e.status===S.myStatus);
  if(S.mySort==='oldest') displayOrder.sort((a,b)=>new Date(a.registeredAt)-new Date(b.registeredAt));
  else displayOrder.sort((a,b)=>new Date(b.registeredAt)-new Date(a.registeredAt));
  const myStatusPills=['all','waiting','active','done'].map(s=>{
    const l={all:t('filterAll'),waiting:t('filterWaiting'),active:t('filterOnBike'),done:t('filterDone')}[s];
    return`<button class="filter-pill${S.myStatus===s?' active':''}" onclick="setMyStatus('${s}')">${l}</button>`;
  }).join('');
  const mySortPills=['newest','oldest'].map(k=>{
    const lbl={newest:'Newest first',oldest:'Oldest first'}[k];
    return`<button class="sort-pill${S.mySort===k?' active':''}" onclick="setMySort('${k}')">${lbl}</button>`;
  }).join('');
  const rows=displayOrder.length?displayOrder.map(e=>{
    const payColor=e.paid?'var(--green)':'var(--orange)';
    const canCancel=e.status==='waiting';
    const payBadge=e.paid
      ?`<span style="font-size:10px;font-weight:900;color:var(--green);background:rgba(110,232,154,.12);border:1px solid rgba(110,232,154,.25);padding:2px 8px;border-radius:20px;white-space:nowrap">${t('paidLabel')} ✓</span>`
      :`<span style="font-size:10px;font-weight:900;color:var(--orange);background:rgba(224,136,40,.08);border:1px solid rgba(224,136,40,.2);padding:2px 8px;border-radius:20px;white-space:nowrap">${t('pendingLabel')}</span>`;
    return`<tr>
      <td>
        <span class="queue-num-cell">#${e.queueNum}</span>
        <div style="font-size:10px;color:var(--muted);margin-top:3px;font-weight:600">${t('rideHistory').split(' ')[0]} ${e.orderNum}</div>
      </td>
      <td>
        <div style="font-weight:800;font-size:13px">${dayLabel(e.sessionDay)||''}</div>
        <div style="color:var(--muted);font-size:12px;margin-top:1px">${shortDate(e.sessionDate)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">09:00 – 11:00</div>
      </td>
      <td style="font-weight:800;font-size:14px">${e.size}</td>
      <td>${typeBadge(e.typePreference)}</td>
      <td>
        <div style="font-weight:900;font-size:16px;color:${payColor}">SAR ${e.price||DEFAULT_PRICE}</div>
        <div style="margin-top:4px">${payBadge}</div>
      </td>
      <td>${statusBadge(e.status)}</td>
      <td>${canCancel?`<button class="btn-sm btn-red" onclick="cancelBooking('${e.id}')">${t('cancelBooking')}</button>`:`<span style="color:var(--muted);font-size:13px">—</span>`}</td>
    </tr>`;
  }).join(''):`<tr><td colspan="6" class="empty-state">${t('noRides')}</td></tr>`;
  document.getElementById('tab-myrides').innerHTML=`
    <div class="page-title">${t('myRidesTitle')}</div>
    <div class="page-sub">${t('myRidesSub')} ${esc(cust.name)}.</div>
    <div class="filter-bar" style="margin-top:8px">
      <div class="filter-bar-row">
        <span class="filter-group-label">Status:</span>
        ${myStatusPills}
        <div class="filter-spacer"></div>
        ${mySortPills}
      </div>
      ${displayOrder.length!==visible.length?`<div class="result-count">${displayOrder.length} of ${visible.length} rides</div>`:''}
    </div>
    <div class="table-wrapper" style="border-radius:14px;border:1px solid rgba(255,255,255,.07)"><table class="queue-table">
      <thead><tr>
        <th>#</th>
        <th>${t('colSession')}</th>
        <th>${t('frameSizeLabel')}</th>
        <th>${t('bikeTypeLabel')}</th>
        <th>${t('colPayment')}</th>
        <th>${t('colStatus')}</th>
        <th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function refreshAccSizeBadge(){
  const h=parseInt(document.getElementById('acc-height')?.value||'');
  const wrap=document.getElementById('acc-size-wrap');
  if(!wrap)return;
  if(!isNaN(h)&&h>=100&&h<=250){
    const sz=heightToSize(h);
    wrap.innerHTML=`<div class="size-chip">${sz}<span class="size-chip-label">${sizeLabel(sz)}</span></div>`;
  }else{
    wrap.innerHTML='';
  }
}

async function saveAccount(){

  if(!cust)return;
  const name=(document.getElementById('acc-name')?.value||'').trim();
  const email=(document.getElementById('acc-email')?.value||'').trim().toLowerCase();

/* ══════════════════════════════════════════════
   SESSION HELPERS
══════════════════════════════════════════════ */
function parseSlots(raw){
  if(!raw)return null;
  if(typeof raw==='string'){try{return JSON.parse(raw);}catch{return null;}}
  return raw; // already an object
}

function slotsLabel(raw){
  const s=parseSlots(raw);
  if(!s)return '—';
  const parts=[];
  const abbr={Road:'Road',Hybrid:'Hybrid',Mountain:'Mtn'};
  for(const[ty,szs]of Object.entries(s)){
    const sum=Object.values(szs||{}).reduce((a,b)=>a+(b||0),0);
    if(sum>0)parts.push(`${abbr[ty]||ty}×${sum}`);
  }
  return parts.join(', ')||'—';
}

function _updateSlotTotals(prefix,stateKey){
  const types=['Road','Hybrid','Mountain'],sizes=['XS','S','M','L'];
  let total=0;
  for(const ty of types){
    let row=0;
    for(const sz of sizes){
      const v=parseInt(document.getElementById(`${prefix}-${ty}-${sz}`)?.value)||0;
      S[stateKey][ty+sz]=v;
      row+=v;total+=v;
    }
    const rowEl=document.getElementById(`${prefix}-row-${ty}`);
    if(rowEl)rowEl.textContent=row||0;
  }
  const totEl=document.getElementById(`${prefix}-total`);
  if(totEl)totEl.textContent=total;
}
function updateSessTotal(){_updateSlotTotals('ns','newSessSlots');}
function updateEditSessTotal(){_updateSlotTotals('es','editSessSlots');}

function startEditSession(id){
  const sess=allSessions().find(s=>s.id===id);if(!sess)return;
  S.editSessionId=id;
  S.editSessDate=sess.session_date||sess.id;
  S.editSessStatus=sess.status||'closed';
  S.showAddSession=false;
  const slots=parseSlots(sess.bike_slots)||{};
  const types=['Road','Hybrid','Mountain'],sizes=['XS','S','M','L'];
  for(const ty of types)for(const sz of sizes)
    S.editSessSlots[ty+sz]=(slots[ty]&&slots[ty][sz])||0;
  renderSessions();
  // Scroll to edit form
  setTimeout(()=>document.getElementById('sess-edit-form')?.scrollIntoView({behavior:'smooth',block:'start'}),80);
}

async function saveSessionEdit(){
  const oldId=S.editSessionId;
  const sess=allSessions().find(s=>s.id===oldId);if(!sess)return;
  const newDate=S.editSessDate||oldId;
  const types=['Road','Hybrid','Mountain'],sizes=['XS','S','M','L'];
  const slots={};let total=0;
  for(const ty of types){
    slots[ty]={};
    for(const sz of sizes){
      const v=S.editSessSlots[ty+sz]||0;
      slots[ty][sz]=v;total+=v;
    }
  }
  if(total===0){toast(t('errAddBikeToSession'),'error');return;}
  const newStatus=S.editSessStatus||sess.status;
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const newDay=dayNames[new Date(newDate+'T00:00:00').getDay()];

  // Save previous state for undo
  const prevSlots=sess.bike_slots;const prevCap=sess.capacity;
  const prevStatus=sess.status;const prevDate=sess.session_date||sess.id;const prevDay=sess.day;

  try{
    if(newDate!==oldId){
      // Date changed — need to migrate: insert new session, update entries, delete old
      const existing=allSessions().find(s=>s.id===newDate&&s.id!==oldId);
      if(existing){toast(t('errDateExists'),'error');return;}
      await sb.from('sessions').insert({
        id:newDate,day:newDay,session_date:newDate,capacity:total,
        status:newStatus,created_at:sess.created_at||new Date().toISOString(),
        bike_slots:JSON.stringify(slots)
      });
      // Move queue entries to new session
      await sb.from('queue_entries').update({
        session_id:newDate,session_date:newDate,session_day:newDay
      }).eq('session_id',oldId);
      await sb.from('sessions').delete().eq('id',oldId);
    } else {
      await sb.from('sessions').update({
        day:newDay,session_date:newDate,capacity:total,
        status:newStatus,bike_slots:JSON.stringify(slots)
      }).eq('id',oldId);
    }
    await loadData();
    const displayDate=shortDate(newDate);
    toast(`Session ${displayDate} updated.`);
    pushUndo(`Edit session ${displayDate}`,async()=>{
      const currentId=newDate!==oldId?newDate:oldId;
      if(newDate!==oldId){
        // Undo migration: re-create old session, move entries back, delete new
        await sb.from('sessions').insert({
          id:oldId,day:prevDay,session_date:prevDate,capacity:prevCap,
          status:prevStatus,created_at:sess.created_at||new Date().toISOString(),
          bike_slots:prevSlots||null
        });
        await sb.from('queue_entries').update({
          session_id:oldId,session_date:prevDate,session_day:prevDay
        }).eq('session_id',currentId);
        await sb.from('sessions').delete().eq('id',currentId);
      } else {
        await sb.from('sessions').update({
          day:prevDay,session_date:prevDate,capacity:prevCap,
          status:prevStatus,bike_slots:prevSlots||null
        }).eq('id',oldId);
      }
      await loadData();renderSessions();renderStaffQueue();
    });
    S.editSessionId=null;
    renderSessions();renderStaffQueue();
  }catch(e){toast(t('errServerError'),'error');console.error(e);}
}

async function addSession(){
  const date=document.getElementById('ns-date')?.value;
  if(!date){toast(t('errPickDate'),'error');return;}
  const types=['Road','Hybrid','Mountain'],sizes=['XS','S','M','L'];
  const slots={};
  let total=0;
  for(const ty of types){
    slots[ty]={};
    for(const sz of sizes){
      const v=S.newSessSlots[ty+sz]||0;
      slots[ty][sz]=v;
      total+=v;
    }
  }
  if(total===0){toast(t('errAddBikeToSession'),'error');return;}
  const d=new Date(date+'T00:00:00');
  const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const session={id:date,day:dayNames[d.getDay()],session_date:date,capacity:total,
    bike_slots:JSON.stringify(slots),created_at:new Date().toISOString()};
  try{
    const{error}=await sb.from('sessions').insert(session);
    if(error){
      if(error.code==='23505'){toast(t('errDateExists'),'error');return;}
      throw error;
    }
    await loadData();
    S.showAddSession=false;S.newSessDate='';
    for(const k of Object.keys(S.newSessSlots))S.newSessSlots[k]=0;
    toast(`${shortDate(date)} — ${t('toastSessionReady')}`);
    renderSessions();
  }catch(e){toast(t('errCreateSession'),'error');}
}

async function toggleSession(id,newStatus){
  try{
    const prev=allSessions().find(s=>s.id===id);
    const prevStatus=prev?prev.status:'closed';
    await sb.from('sessions').update({status:newStatus}).eq('id',id);
    await loadData();
    const lbl={open:t('sessOpened'),closed:t('sessClosed'),full:t('statusFull')+'.'}[newStatus]||newStatus;
    toast(lbl);
    pushUndo(`Session ${shortDate(prev?.session_date||id)} → ${newStatus}`,async()=>{
      await sb.from('sessions').update({status:prevStatus}).eq('id',id);
      await loadData();renderSessions();renderStaffQueue();
    });
    renderSessions();renderStaffQueue();
  }catch(e){toast(t('errServerError'),'error');}
}

async function deleteSession(id){
  try{
    const bookings=getQueue().filter(e=>e.sessionId===id).length;
    if(bookings>0){toast(t('errHasBookings'),'error');return;}
    const saved=allSessions().find(s=>s.id===id);
    await sb.from('sessions').delete().eq('id',id);
    await loadData();
    toast(t('sessDeleted'));
    if(saved)pushUndo(`Delete session ${shortDate(saved.session_date||id)}`,async()=>{
      await sb.from('sessions').insert({id:saved.id,day:saved.day,session_date:saved.session_date||saved.id,capacity:saved.capacity||12,status:'closed',created_at:saved.created_at||new Date().toISOString(),bike_slots:saved.bike_slots||null});
      await loadData();renderSessions();
    });
    renderSessions();
  }catch(e){toast(t('errDeleteSession'),'error');}
}

/* ══════════════════════════════════════════════

function renderStaffQueue(){
  const queue=getQueue();const sessions=allSessions();
  const base=S.sfSession!=='all'?queue.filter(e=>e.sessionId===S.sfSession):queue;
  const total=base.length,nWait=base.filter(e=>e.status==='waiting').length,
        nBike=base.filter(e=>e.status==='active').length,nDone=base.filter(e=>e.status==='done').length;
  let filtered=[...base];
  if(S.sfStatus!=='all')filtered=filtered.filter(e=>e.status===S.sfStatus);
  if(S.sfSize!=='all')  filtered=filtered.filter(e=>e.size===S.sfSize);
  if(S.sfPay==='paid')  filtered=filtered.filter(e=>e.paid);
  if(S.sfPay==='pending')filtered=filtered.filter(e=>!e.paid);
  if(S.sfSearch.trim()){const q=S.sfSearch.trim().toLowerCase();filtered=filtered.filter(e=>e.name.toLowerCase().includes(q)||e.phone.includes(q));}
  const sizeOrder={XS:0,S:1,M:2,L:3};
  filtered.sort((a,b)=>{
    if(S.sfSort==='name') return a.name.localeCompare(b.name);
    if(S.sfSort==='size') return (sizeOrder[a.size]??9)-(sizeOrder[b.size]??9);
    if(S.sfSort==='type') return a.typePreference.localeCompare(b.typePreference);
    if(S.sfSort==='paid') return Number(b.paid)-Number(a.paid);
    return a.sessionId.localeCompare(b.sessionId)||a.queueNum-b.queueNum;
  });
  const nextRider=base.filter(e=>e.status==='waiting').sort((a,b)=>a.queueNum-b.queueNum)[0];
  const nextUp=nextRider?`<div class="next-up-banner">
    <div>
      <div class="next-up-label">${t('nextUpLabel')}</div>
      <div class="next-up-name">#${nextRider.queueNum} - ${esc(nextRider.name)}</div>
      <div class="next-up-details">Size ${nextRider.size} &middot; ${typeLabel(nextRider.typePreference)} &middot; ${dayLabel(nextRider.sessionDay)} ${shortDate(nextRider.sessionDate)}</div>
    </div>
    <button class="btn-primary" onclick="openModal('${nextRider.id}')">${t('assignBikeCheckin')}</button>
  </div>`:'';
  const statusPills=['all','waiting','active','done','noshow'].map(s=>{
    const label={all:t('filterAll'),waiting:t('filterWaiting'),active:t('filterOnBike'),done:t('filterDone'),noshow:t('filterNoshow')}[s];

    const colorSwatches=bikeColors?bikeColors.map(c=>`<span style="display:inline-block;width:13px;height:13px;border-radius:50%;background:${c};border:1.5px solid rgba(0,0,0,.3);flex-shrink:0"></span>`).join(''):'<span style="color:var(--muted)">—</span>';

  document.getElementById('tab-queue').innerHTML=`

      <button class="btn-secondary" onclick="toggleResetTool()" style="font-size:12px">&#x1F511; ${t('staffResetTool')}</button>
    </div>
    ${S.showResetTool?`<div class="inline-form" style="max-width:420px">
      <div class="form-title" style="display:flex;align-items:center;gap:8px">🔑 ${t('staffResetTool')}</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:14px">${t('staffResetDesc')}</div>
      <div class="form-group" style="margin-bottom:12px">
        <label>${t('staffResetEmailLabel')}</label>
        <div style="display:flex;gap:8px">
          <input type="email" id="staff-reset-email" placeholder="customer@email.com" style="flex:1">
          <button class="btn-primary" onclick="staffShowResetCode()" style="white-space:nowrap">${t('staffResetGenerate')}</button>
        </div>
      </div>
      <div id="staff-reset-result"></div>
    </div>`:''}
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">${t('totalStat')}</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--green)">${nWait}</div><div class="stat-label">${t('waitingStat')}</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#a0f0c0">${nBike}</div><div class="stat-label">${t('onBikeStat')}</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--muted)">${nDone}</div><div class="stat-label">${t('doneStat')}</div></div>
    </div>
    ${nextUp}
    <div class="filter-bar">
      <div class="filter-bar-row">
        <span class="filter-group-label">Status:</span>
        ${statusPills}
        <div class="filter-spacer"></div>
        <select style="width:auto;min-width:160px;font-size:12px" onchange="setSfSession(this.value)">${sessOpts}</select>
      </div>
      <div class="filter-bar-row">
        <span class="filter-group-label">Size:</span>
        ${sizePills}
        <div class="filter-spacer"></div>
        <span class="filter-group-label">Pay:</span>
        ${payPills}

      <div class="filter-bar-row">
        <span class="filter-group-label">${t('sortBy')}:</span>
        ${sortPillsQ}

        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="white" stroke-width="1.4"/><line x1="9.5" y1="9.5" x2="13" y2="13" stroke="white" stroke-width="1.4" stroke-linecap="round"/></svg>

function setSfSearch(v){S.sfSearch=v;renderStaffQueue();}

async function staffShowResetCode(){
  const email=(document.getElementById('staff-reset-email')?.value||'').trim().toLowerCase();
  const el=document.getElementById('staff-reset-result');if(!el)return;
  if(!email||!/^\S+@\S+\.\S+$/.test(email)){el.innerHTML=`<div style="color:var(--red);font-size:13px;font-weight:700">${t('errValidEmail')}</div>`;return;}
  const{data:cust}=await sb.from('customers').select('id,name').eq('email',email).maybeSingle();
  if(!cust){el.innerHTML=`<div style="color:var(--red);font-size:13px;font-weight:700">${t('errAccountNotFound')}</div>`;return;}
  const code=generateResetOTP(email);
  const mins=10-Math.floor((Date.now()%(10*60*1000))/(60*1000));
  el.innerHTML=`<div style="background:rgba(110,232,154,.07);border:1px solid rgba(110,232,154,.25);border-radius:12px;padding:16px 20px">
    <div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">${t('staffResetCode')} — ${esc(cust.name)}</div>
    <div style="font-size:42px;font-weight:900;letter-spacing:10px;color:var(--green);font-family:monospace;text-shadow:0 0 20px rgba(110,232,154,.35)">${code}</div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px;font-weight:600">⏱ ${t('staffResetExpiry').replace('10',String(mins))}</div>
  </div>`;
}

async function togglePayment(id,paid){
  await sb.from('queue_entries').update({paid}).eq('id',id);
  await loadData();
  const cb=document.querySelector(`input.pay-cb[onchange*="${id}"]`);
  if(cb){const lbl=cb.nextElementSibling;if(lbl){lbl.textContent=paid?t('paidLabel'):t('pendingLabel');lbl.style.color=paid?'var(--green)':'var(--orange)';}}
  toast(paid?t('paidLabel')+'.':t('pendingLabel')+'.', paid?'':'warning');
  const entry=getQueue().find(e=>e.id===id);const lbl=entry?`Payment #${entry.queueNum} ${entry.name}`:'Payment';
  pushUndo(`${paid?'Mark paid':'Mark unpaid'} — ${lbl}`,async()=>{
    await sb.from('queue_entries').update({paid:!paid}).eq('id',id);
    await loadData();renderStaffQueue();renderHistory();
  });
}

/* ══════════════════════════════════════════════
   UNDO SYSTEM
══════════════════════════════════════════════ */
function pushUndo(label,fn){
  S.undoStack.push({label,fn});
  if(S.undoStack.length>20)S.undoStack.shift();
  renderTopbarRight();
}
async function doUndo(){
  const item=S.undoStack.pop();
  if(!item)return;
  try{
    await item.fn();
    toast(`Undone: ${item.label}`);
  }catch(e){
    S.undoStack.push(item);
    toast(`Undo failed.`,'error');
  }
  renderTopbarRight();
}

async function cancelBooking(id){
  const entry=getQueue().find(e=>e.id===id);
  if(!entry||entry.status!=='waiting'){toast(t('errCancelWaiting'),'error');return;}
  const behind=getQueue().filter(e=>e.sessionId===entry.sessionId&&e.status==='waiting'&&e.queueNum>entry.queueNum);
  const savedBehind=behind.map(e=>({id:e.id,queueNum:e.queueNum}));
  const savedQNum=entry.queueNum;
  await sb.from('queue_entries').update({status:'cancelled'}).eq('id',id);
  await Promise.all(savedBehind.map(e=>sb.from('queue_entries').update({queue_num:e.queueNum-1}).eq('id',e.id)));
  await loadData();
  toast(t('toastBookingCancelled'));
  pushUndo(`Cancel booking #${savedQNum} ${entry.name}`,async()=>{
    await sb.from('queue_entries').update({status:'waiting',queue_num:savedQNum}).eq('id',id);
    await Promise.all(savedBehind.map(e=>sb.from('queue_entries').update({queue_num:e.queueNum}).eq('id',e.id)));
    await loadData();renderMyRides();renderStaffQueue();
  });
  renderMyRides();
}

async function doNoShow(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry)return;
  await sb.from('queue_entries').update({status:'noshow'}).eq('id',id);
  await loadData();toast(t('toastNoShow'));
  pushUndo(`No-show #${entry.queueNum} ${entry.name}`,async()=>{
    await sb.from('queue_entries').update({status:'waiting'}).eq('id',id);
    await loadData();renderStaffQueue();
  });
  renderStaffQueue();
}
async function doReturn(id){
  const q=getQueue();const i=q.findIndex(e=>e.id===id);if(i<0)return;
  const bikeId=q[i].assignedBikeId;const name=q[i].name;const qn=q[i].queueNum;
  const calls=[sb.from('queue_entries').update({status:'done'}).eq('id',id)];
  if(bikeId)calls.push(sb.from('bikes').update({status:'available'}).eq('id',bikeId));
  await Promise.all(calls);
  await loadData();toast(t('toastBikeReturned'));
  pushUndo(`Return bike — #${qn} ${name}`,async()=>{
    const calls2=[sb.from('queue_entries').update({status:'active'}).eq('id',id)];
    if(bikeId)calls2.push(sb.from('bikes').update({status:'in-use'}).eq('id',bikeId));
    await Promise.all(calls2);
    await loadData();renderStaffQueue();
  });
  renderStaffQueue();
}
async function doRemove(id){
  const entry=getQueue().find(e=>e.id===id);if(!entry)return;
  const saved={...entryToDB(entry)};
  await sb.from('queue_entries').delete().eq('id',id);
  await loadData();toast(t('toastRiderRemoved'));
  pushUndo(`Remove #${entry.queueNum} ${entry.name}`,async()=>{
    await sb.from('queue_entries').insert(saved);
    await loadData();renderStaffQueue();
  });
  renderStaffQueue();
}

/* ══════════════════════════════════════════════
   BIKE ASSIGN MODAL
══════════════════════════════════════════════ */
function openModal(riderId){S.modalRider=riderId;S.modalBike=null;renderModal();}
function renderModal(){
  const rider=getQueue().find(e=>e.id===S.modalRider);if(!rider)return;
  const allBikes=getBikes();

  // Filter to bikes planned for this session
  const sess=S.sessions.find(s=>s.id===rider.sessionId);
  const slots=sess?parseSlots(sess.bike_slots):null;
  const eligible=slots
    ?allBikes.filter(b=>slots[b.type]&&(slots[b.type][b.size]||0)>0)
    :allBikes;

  // Sort: available first, then by type preference match
  const sorted=[...eligible].sort((a,b)=>{
    const aPref=a.type===rider.typePreference?0:1;
    const bPref=b.type===rider.typePreference?0:1;
    const aFree=a.status==='available'?0:1;
    const bFree=b.status==='available'?0:1;
    return aFree-bFree||aPref-bPref;
  });

  const cards=sorted.length?sorted.map(b=>{
    const free=b.status==='available';
    const dot=b.status==='available'?'dot-green':b.status==='in-use'?'dot-orange':'dot-red';
    const slbl=b.status==='available'?t('availLabel'):b.status==='in-use'?t('inUseLabel'):t('maintLabel');
    const grad=bikeGradient(b.colors||['#6ee89a']);
    const sizeMatch=b.size===rider.size;
    return`<div class="modal-bike-card${!free?' unavailable':''}${S.modalBike===b.id?' selected':''}" ${free?`onclick="pickBike('${b.id}')"`:''}>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <span class="avail-dot ${dot}"></span>
        ${sizeMatch?`<span style="font-size:10px;font-weight:800;color:var(--green);background:rgba(110,232,154,.15);padding:2px 6px;border-radius:6px">${t('sizeMatchLabel')}</span>`:''}
      </div>
      <div style="height:5px;border-radius:3px;background:${grad};margin-bottom:8px"></div>
      <div style="font-weight:900;font-size:14px;margin-bottom:3px">${esc(b.name)}</div>
      <div style="font-size:12px;color:var(--muted)">${typeLabel(b.type)} &middot; ${t('frameSizeLabel')} ${b.size}</div>
      <div style="margin-top:6px">${typeBadge(b.type)}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:5px">${slbl}</div>
    </div>`;
  }).join(''):`<div style="color:var(--muted);font-size:14px;padding:12px 0">${t('noBikesMatchFleet')}</div>`;

  const fleetLine=slots?`<div style="font-size:12px;color:var(--muted);margin-bottom:16px">${t('sessionFleetLabel')}: ${slotsLabel(slots)}</div>`:'';

  const modal=document.getElementById('bike-modal');
  modal.style.display='flex';
  modal.innerHTML=`<div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-title">${t('assignBikeTitle')}</div>
      <div class="modal-sub">#${rider.queueNum} ${esc(rider.name)} &middot; Size ${rider.size} &middot; Prefers ${rider.typePreference}</div>
      ${fleetLine}
      <div class="modal-bikes-grid">${cards}</div>
      <div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="confirmAssign()">${t('confirmCheckin')}</button></div>
    </div>
  </div>`;
}
function pickBike(id){S.modalBike=id;renderModal();}
function closeModal(){document.getElementById('bike-modal').style.display='none';S.modalRider=null;S.modalBike=null;}
async function confirmAssign(){
  if(!S.modalBike){toast(t('errSelectBike'),'error');return;}
  const bikes=getBikes();const bi=bikes.findIndex(b=>b.id===S.modalBike);
  if(bi<0||bikes[bi].status!=='available'){toast(t('errBikeUnavailable'),'error');return;}
  const bikeName=bikes[bi].name;const bikeId=S.modalBike;const riderId=S.modalRider;
  const rider=getQueue().find(e=>e.id===riderId);const qn=rider?rider.queueNum:'?';const rName=rider?rider.name:'';
  await Promise.all([
    sb.from('bikes').update({status:'in-use'}).eq('id',bikeId),
    sb.from('queue_entries').update({status:'active',assigned_bike_id:bikeId}).eq('id',riderId),
  ]);
  await loadData();closeModal();
  toast(`${bikeName} ${t('toastAssignedChecked')}`);
  pushUndo(`Check-in #${qn} ${rName} on ${bikeName}`,async()=>{
    await Promise.all([
      sb.from('bikes').update({status:'available'}).eq('id',bikeId),
      sb.from('queue_entries').update({status:'waiting',assigned_bike_id:null}).eq('id',riderId),
    ]);
    await loadData();renderStaffQueue();
  });
  renderStaffQueue();
}

   BIKES

function updateColorPreview(){const p=document.getElementById('color-prev');if(p)p.innerHTML=S.addBikeColors.map(c=>`<span style="display:inline-block;width:28px;height:28px;border-radius:50%;background:${c};border:2px solid rgba(0,0,0,.3);flex-shrink:0"></span>`).join('');}
function addColorSlot(){if(S.addBikeColors.length>=4)return;S.addBikeColors.push('#ffffff');renderBikes();}
function removeColor(i){if(S.addBikeColors.length<=1)return;S.addBikeColors.splice(i,1);renderBikes();}

function renderBikes(){
  const bikes=getBikes();
  const total=bikes.length,nAvail=bikes.filter(b=>b.status==='available').length,
        nUse=bikes.filter(b=>b.status==='in-use').length,
        nRoad=bikes.filter(b=>b.type==='Road').length,
        nHybrid=bikes.filter(b=>b.type==='Hybrid').length,
        nMtn=bikes.filter(b=>b.type==='Mountain').length;
  const typePills=['all','Road','Hybrid','Mountain'].map(ty=>
    `<button class="filter-pill${S.bkTypeFilter===ty?' active':''}" onclick="setBkFilter('${ty}')">${ty==='all'?t('filterAll'):typeLabel(ty)}</button>`).join('');
  const statusPillsBk=['all','available','in-use','maintenance'].map(s=>{
    const l={all:t('filterAll'),available:t('availLabel'),'in-use':t('inUseLabel'),maintenance:t('maintLabel')}[s];
    return`<button class="filter-pill${S.bkStatus===s?' active':''}" onclick="setBkStatus('${s}')">${l}</button>`;
  }).join('');
  const sizePillsBk=['all','XS','S','M','L'].map(sz=>
    `<button class="filter-pill${S.bkSize===sz?' active':''}" onclick="setBkSize('${sz}')">${sz==='all'?t('filterAll'):sz}</button>`).join('');
  const isEdit=!!S.editBikeId;const editBike=isEdit?bikes.find(b=>b.id===S.editBikeId):null;
  const curSize=(isEdit&&editBike)?(S.addBikeSize||editBike.size):S.addBikeSize;
  const sizeOpts=['XS','S','M','L'].map(v=>`<option value="${v}"${curSize===v?' selected':''}>${v}</option>`).join('');
  const bkTypeBtns=['Road','Hybrid','Mountain'].map(ty=>
    `<button class="toggle-btn${S.addBikeType===ty?' active':''}" onclick="S.addBikeType='${ty}';renderBikes()">${typeLabel(ty)}</button>`).join('');
  const colorSlots=S.addBikeColors.map((c,i)=>`
    <div class="color-slot"><input type="color" value="${c}" oninput="S.addBikeColors[${i}]=this.value;updateColorPreview()">
      ${S.addBikeColors.length>1?`<button class="color-del" onclick="removeColor(${i})" type="button">&#x2715;</button>`:''}</div>`).join('');
  const addColorBtn=S.addBikeColors.length<4?`<button class="add-color-slot" onclick="addColorSlot()" type="button">+<br>Color</button>`:'';
  const addForm=(S.showAddBike||isEdit)?`<div class="inline-form">
    <div class="form-title">${isEdit?t('editBikeTitle'):t('addBikeTitle')}</div>
    <div class="form-row">
      <div class="form-group"><label>${t('bikeNameLabel')}</label><input type="text" id="bk-name" placeholder="e.g. Spectra One" value="${esc(S._bkName)}"></div>
      <div class="form-group"><label>${t('walkinSize')}</label><select id="bk-size" onchange="S.addBikeSize=this.value">${sizeOpts}</select></div>
    </div>
    <div class="form-group" style="margin-bottom:16px"><label>${t('bikeTypeLabel')}</label><div class="toggle-group">${bkTypeBtns}</div></div>
    <div class="form-group" style="margin-bottom:16px">
      <label>${t('bikeColorsLabel')} &nbsp;<span class="label-hint">${t('colorsHint')}</span></label>
      <div class="color-builder">
        <div id="color-prev" style="display:flex;gap:8px;align-items:center;padding:6px 0">${S.addBikeColors.map(c=>`<span style="display:inline-block;width:28px;height:28px;border-radius:50%;background:${c};border:2px solid rgba(0,0,0,.3);flex-shrink:0"></span>`).join('')}</div>
        <div class="color-slots">${colorSlots}${addColorBtn}</div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-primary" onclick="${isEdit?'saveBikeEdit()':'addBike()'}"> ${isEdit?t('saveBikeBtn'):t('addBikeBtn')}</button>
      <button class="btn-secondary" onclick="cancelBikeForm()">${t('cancelBtn')}</button>
    </div>
  </div>`:'';
  // Filter
  let filtered=[...bikes];
  if(S.bkTypeFilter!=='all') filtered=filtered.filter(b=>b.type===S.bkTypeFilter);
  if(S.bkStatus!=='all')     filtered=filtered.filter(b=>b.status===S.bkStatus);
  if(S.bkSize!=='all')       filtered=filtered.filter(b=>b.size===S.bkSize);
  // Sort
  const sortOrder={available:0,'in-use':1,maintenance:2};
  const sizeOrder={XS:0,S:1,M:2,L:3};
  filtered.sort((a,b)=>{
    if(S.bkSort==='type')  return a.type.localeCompare(b.type)||a.name.localeCompare(b.name);
    if(S.bkSort==='size')  return (sizeOrder[a.size]??9)-(sizeOrder[b.size]??9)||a.name.localeCompare(b.name);
    if(S.bkSort==='status')return (sortOrder[a.status]??9)-(sortOrder[b.status]??9)||a.name.localeCompare(b.name);
    return a.name.localeCompare(b.name); // default: name
  });
  const sortPills=['name','type','size','status'].map(k=>{

    const dot=b.status==='available'?'dot-green':b.status==='in-use'?'dot-orange':'dot-red';

    const sclr=b.status==='available'?'var(--green)':b.status==='in-use'?'var(--orange)':'var(--red)';
    const colors=b.colors&&b.colors.length?b.colors:['#6ee89a'];

      <div class="bike-list-dot-col"><span class="avail-dot ${dot}"></span></div>
      <div class="bike-list-info">
        <div class="bike-list-name">${esc(b.name)}</div>
        <div class="bike-list-meta">
          ${typeBadge(b.type)}
          <span class="bike-meta">${b.size}</span>
          <div style="display:flex;align-items:center;gap:4px">${colorSwatches}</div>
        </div>
      </div>
      <div class="bike-list-status" style="color:${sclr}">${slbl}</div>
      <div class="bike-list-actions">
        <button class="btn-sm btn-blue" onclick="startEdit('${b.id}')">${t('editBtn')}</button>
        <button class="btn-sm btn-orange" onclick="toggleMaint('${b.id}')">${b.status==='maintenance'?t('restoreBtn'):t('maintBtn')}</button>
        <button class="btn-sm btn-red" ${b.status!=='in-use'?`onclick="delBike('${b.id}')"`:' disabled'}>${t('deleteBtn')}</button>

    <div class="section-header"><div class="page-title">${t('bikesTitle')}</div><button class="btn-primary" onclick="toggleAddBike()">${t('addBike')}</button></div>
    ${addForm}

      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">${t('totalStat')}</div></div>

      <div class="stat-card"><div class="stat-num" style="color:var(--orange)">${nUse}</div><div class="stat-label">${t('inUseLabel')}</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--blue)">${nRoad}</div><div class="stat-label">${typeLabel('Road')}</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#a78bfa">${nHybrid}</div><div class="stat-label">${typeLabel('Hybrid')}</div></div>

function toggleAddBike(){S.showAddBike=!S.showAddBike;S.editBikeId=null;S.addBikeType=null;S.addBikeSize='M';S.addBikeColors=['#6ee89a'];S._bkName='';renderBikes();}
function cancelBikeForm(){S.showAddBike=false;S.editBikeId=null;S.addBikeType=null;S.addBikeColors=['#6ee89a'];S._bkName='';renderBikes();}
function setBkFilter(v){S.bkTypeFilter=v;renderBikes();}
function setBkSort(v){S.bkSort=v;renderBikes();}
async function addBike(){
  const name=document.getElementById('bk-name').value.trim();const size=document.getElementById('bk-size').value||'M';
  if(!name){toast(t('errBikeName'),'error');return;}
  if(!S.addBikeType){toast(t('errBikeTypeReq'),'error');return;}
  const bike={id:uid(),name,size,type:S.addBikeType,colors:[...S.addBikeColors],status:'available'};
  await sb.from('bikes').insert(bike);
  await loadData();
  S.showAddBike=false;S.addBikeType=null;S.addBikeSize='M';S.addBikeColors=['#6ee89a'];S._bkName='';
  toast(`${name} ${t('toastAddedToFleet')}`);
  pushUndo(`Add bike ${name}`,async()=>{
    await sb.from('bikes').delete().eq('id',bike.id);
    await loadData();renderBikes();
  });
  renderBikes();
}
function startEdit(id){
  const bike=getBikes().find(b=>b.id===id);if(!bike)return;
  S.editBikeId=id;S.showAddBike=false;S.addBikeType=bike.type;S.addBikeSize=bike.size;
  S.addBikeColors=bike.colors&&bike.colors.length?[...bike.colors]:['#6ee89a'];S._bkName=bike.name;renderBikes();
}
async function saveBikeEdit(){
  const name=document.getElementById('bk-name').value.trim();const size=document.getElementById('bk-size').value||'M';
  if(!name){toast(t('errBikeName'),'error');return;}
  if(!S.addBikeType){toast(t('errBikeTypeReq'),'error');return;}
  const b=getBikes();const existing=b.find(x=>x.id===S.editBikeId);if(!existing)return;
  const prev={name:existing.name,size:existing.size,type:existing.type,colors:[...existing.colors],status:existing.status};
  const bid=S.editBikeId;
  await sb.from('bikes').update({name,size,type:S.addBikeType,colors:[...S.addBikeColors],status:existing.status}).eq('id',bid);
  await loadData();
  S.editBikeId=null;S.addBikeType=null;S.addBikeColors=['#6ee89a'];S._bkName='';
  toast(t('toastBikeUpdated'));
  pushUndo(`Edit bike ${name}`,async()=>{
    await sb.from('bikes').update(prev).eq('id',bid);
    await loadData();renderBikes();
  });
  renderBikes();
}
async function toggleMaint(id){
  const b=getBikes();const bike=b.find(x=>x.id===id);if(!bike)return;
  if(bike.status==='in-use'){toast(t('errBikeInUse'),'error');return;}
  const prevStatus=bike.status;
  const newStatus=prevStatus==='maintenance'?'available':'maintenance';
  await sb.from('bikes').update({status:newStatus}).eq('id',id);
  await loadData();toast(`${t('toastStatusChanged')} ${newStatus}`);
  pushUndo(`${newStatus==='maintenance'?'Maintenance':'Restore'} ${bike.name}`,async()=>{
    await sb.from('bikes').update({status:prevStatus}).eq('id',id);
    await loadData();renderBikes();
  });
  renderBikes();
}
async function delBike(id){
  const bike=getBikes().find(x=>x.id===id);
  if(!bike||bike.status==='in-use'){toast(t('errBikeInUse'),'error');return;}
  const saved={id:bike.id,name:bike.name,size:bike.size,type:bike.type,colors:[...(bike.colors||[])],status:'available'};
  await sb.from('bikes').delete().eq('id',id);
  await loadData();toast(`${bike.name} ${t('toastBikeRemoved')}`);
  pushUndo(`Delete bike ${bike.name}`,async()=>{
    await sb.from('bikes').insert(saved);
    await loadData();renderBikes();
  });
  renderBikes();
}

  const lines=[
    '╔══════════════════════════════════════╗',
    '║   MICROMOBILITY CORNICHE CIRCUIT     ║',
    `║      ${t('receiptTitle').padEnd(32)}║`,
    '╚══════════════════════════════════════╝',
    '',`${t('receiptDear')} ${e.name},`,'',
    t('receiptThankYou'),'',
    '──────────────────────────────────────',
    `${t('queueNumLabel').padEnd(14)}:  #${e.queueNum}`,
    `${t('colSession').padEnd(14)}:  ${dayLabel(e.sessionDay)}, ${shortDate(e.sessionDate)}`,
    `${t('timeLabel').padEnd(14)}:  09:00 – 11:00`,

    `${t('bikeTypeLabel').padEnd(14)}:  ${e.typePreference}`,
    `${t('colPayment').padEnd(14)}:  ${e.paid?t('paidLabel')+' ✓':t('pendingLabel')+' ⏳'}`,
    '──────────────────────────────────────','',
    t('receiptSeeYou'),'',
    'MicroMobility Team','Corniche Circuit, Jeddah',
  ].join('\n');
  const subject=encodeURIComponent(`MicroMobility: ${t('receiptTitle')} #${e.queueNum} (${shortDate(e.sessionDate)})`);
  const body=encodeURIComponent(lines);
  const mailtoLink=`mailto:${e.email}?subject=${subject}&body=${body}`;
  const modal=document.getElementById('receipt-modal');
  modal.style.display='flex';
  modal.innerHTML=`<div class="modal-backdrop" onclick="if(event.target===this)closeReceipt()">
    <div class="modal-box" style="max-width:520px">
      <div class="modal-title">${t('sendReceipt')}</div>
      <div class="modal-sub">${t('authEmail')}: ${esc(e.email)}</div>
      <div class="receipt-box">${esc(lines)}</div>
      <div class="modal-footer">

        <a href="${mailtoLink}" class="btn-primary" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px"
           onclick="setTimeout(closeReceipt,300)">${t('openEmailApp')}</a>
      </div>
    </div>
  </div>`;
}

function _uid(){return Math.random().toString(36).slice(2,7);}

function _areaChart(series,labels,opts={}){
  const {W=460,H=148,unitPfx=''}=opts;
  const n=labels.length;
  if(!n)return'<div style="padding:28px 0;text-align:center;color:var(--muted);font-size:12px">No data</div>';
  const pL=44,pR=14,pT=14,pB=28,cW=W-pL-pR,cH=H-pT-pB;
  const maxV=Math.max(...series.flatMap(s=>s.vals),1);
  const xOf=i=>pL+(n===1?cW/2:i/(n-1)*cW);
  const yOf=v=>pT+cH-(v/maxV)*cH;
  const nth=Math.ceil(n/7);
  let defs='',paths='';
  series.forEach(s=>{
    const pts=s.vals.map((v,i)=>[xOf(i),yOf(v)]);
    const lD=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    const aD=`M${pts[0][0].toFixed(1)},${(pT+cH).toFixed(1)} ${pts.map(p=>`L${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ')} L${pts[n-1][0].toFixed(1)},${(pT+cH).toFixed(1)}Z`;
    if(s.fill!==false){
      const gid='g'+_uid();
      defs+=`<linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${s.color}" stop-opacity=".25"/><stop offset="100%" stop-color="${s.color}" stop-opacity=".02"/></linearGradient>`;
      paths+=`<path d="${aD}" fill="url(#${gid})"/>`;
    }
    paths+=`<path d="${lD}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"${s.dashed?' stroke-dasharray="5 4"':''}/>`;
    pts.forEach((p,i)=>{if(n<=14||i%2===0||i===n-1)paths+=`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${n>10?2.5:3}" fill="${s.color}" stroke="rgba(10,10,10,.7)" stroke-width="1.5"/>`;});
  });
  const grid=[0,.25,.5,.75,1].map(pct=>{
    const v=maxV*pct,y=(pT+cH-pct*cH).toFixed(1);
    return`<line x1="${pL}" y1="${y}" x2="${pL+cW}" y2="${y}" stroke="rgba(255,255,255,.04)" stroke-width="1"/><text x="${pL-5}" y="${(parseFloat(y)+4).toFixed(1)}" font-size="9" text-anchor="end" fill="rgba(255,255,255,.28)">${unitPfx}${Math.round(v)}</text>`;
  }).join('');
  const xlbls=labels.map((l,i)=>{
    if(i%nth!==0&&i!==n-1)return'';
    const align=i===0?'start':i===n-1?'end':'middle';
    return`<text x="${xOf(i).toFixed(1)}" y="${H-5}" font-size="8.5" text-anchor="${align}" fill="rgba(255,255,255,.28)">${l}</text>`;
  }).join('');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block;overflow:visible"><defs>${defs}</defs>${grid}${paths}${xlbls}</svg>`;
}

function _donut(segs,size=110){
  const total=segs.reduce((s,d)=>s+d.v,0);
  if(!total)return'<div style="padding:16px;text-align:center;color:var(--muted);font-size:12px">No data</div>';
  const r=34,cx=size/2,cy=size/2,sw=13,C=2*Math.PI*r;
  let off=-0.25;
  const arcs=segs.filter(d=>d.v>0).map(d=>{
    const pct=d.v/total,rot=(off*360).toFixed(2);
    off+=pct;
    return`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.c}" stroke-width="${sw}" stroke-dasharray="${(C*pct).toFixed(2)} ${(C*(1-pct)).toFixed(2)}" transform="rotate(${rot} ${cx} ${cy})"/>`;
  }).join('');
  return`<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="display:block;flex-shrink:0"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="${sw}"/>${arcs}<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="900" fill="white">${total}</text></svg>`;
}

function _vbars(data,opts={}){
  const {W=320,H=130,color='#6ee89a',refVal=null}=opts;
  const n=data.length;
  if(!n)return'<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">No data</div>';
  const pL=8,pR=8,pT=10,pB=22,cW=W-pL-pR,cH=H-pT-pB;
  const maxV=Math.max(...data.map(d=>d.v),refVal||0,1);
  const bW=Math.max(5,cW/n-4);
  const xOf=i=>pL+(i+.5)*(cW/n);
  const yOf=v=>pT+cH-(v/maxV)*cH;
  const nth=Math.ceil(n/8);
  const barsHtml=data.map((d,i)=>{
    const bH=Math.max(2,(d.v/maxV)*cH);
    return`<rect x="${(xOf(i)-bW/2).toFixed(1)}" y="${(pT+cH-bH).toFixed(1)}" width="${bW.toFixed(1)}" height="${bH.toFixed(1)}" rx="2" fill="${d.c||color}" opacity=".85"/>${(i%nth===0||i===n-1)?`<text x="${xOf(i).toFixed(1)}" y="${H-4}" font-size="8" text-anchor="middle" fill="rgba(255,255,255,.3)">${d.label}</text>`:''}`;
  }).join('');
  const refLine=refVal!==null?`<line x1="${pL}" y1="${yOf(refVal).toFixed(1)}" x2="${pL+cW}" y2="${yOf(refVal).toFixed(1)}" stroke="rgba(255,255,255,.2)" stroke-width="1" stroke-dasharray="4 3"/>`:'' ;
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block">${refLine}${barsHtml}</svg>`;
}

/* ══════════════════════════════════════════════
   ANALYTICS
══════════════════════════════════════════════ */
function setAnRange(v){S.analyticsRange=v;renderAnalytics();}
function setAnSort(col){
  if(S.analyticsTrendSort===col)S.analyticsTrendDir*=-1;
  else{S.analyticsTrendSort=col;S.analyticsTrendDir=-1;}
  renderAnalytics();
}

function renderAnalytics(){
  const allQ=getQueue();
  const allSess=allSessions();

  // ── Date range filter ────────────────────────────────
  let sessCandidates=[...allSess].sort((a,b)=>new Date(a.session_date||a.id)-new Date(b.session_date||b.id));
  if(S.analyticsRange==='last5') sessCandidates=sessCandidates.slice(-5);
  else if(S.analyticsRange==='last10') sessCandidates=sessCandidates.slice(-10);
  else if(S.analyticsRange==='month'){
    const mo=new Date();mo.setDate(1);mo.setHours(0,0,0,0);
    sessCandidates=sessCandidates.filter(s=>new Date(s.session_date||s.id)>=mo);
  }
  const sessIds=new Set(sessCandidates.map(s=>s.id));
  const queue=allQ.filter(e=>sessIds.has(e.sessionId));
  const sessions=sessCandidates;
  const done=queue.filter(e=>e.status==='done');
  const noshow=queue.filter(e=>e.status==='noshow');

  if(done.length===0&&noshow.length===0){
    document.getElementById('tab-analytics').innerHTML=`
      <div class="page-title">${t('tabAnalytics')}</div>
      <div class="page-sub">Business performance overview.</div>
      ${_rangeBar()}
      <div class="empty-state" style="margin-top:48px">${t('anNoData')}</div>`;
    return;
  }

  // ── Revenue ──────────────────────────────────────────
  const revCollected=done.filter(e=>e.paid).reduce((s,e)=>s+(e.price||DEFAULT_PRICE),0);
  const revPending  =done.filter(e=>!e.paid).reduce((s,e)=>s+(e.price||DEFAULT_PRICE),0);
  const revTotal    =revCollected+revPending;
  const sessionsWithDone=sessions.filter(s=>done.some(e=>e.sessionId===s.id));
  const sessionsHeld=sessionsWithDone.length;
  const avgRevPerSession=sessionsHeld?Math.round(revTotal/sessionsHeld):0;
  const collectionRate=revTotal>0?Math.round((revCollected/revTotal)*100):0;

  // ── Riders ───────────────────────────────────────────
  const totalDone=done.length;
  const uniqueCustIds=[...new Set(done.filter(e=>e.customerId).map(e=>e.customerId))];
  const custRideCounts={};
  done.filter(e=>e.customerId).forEach(e=>{custRideCounts[e.customerId]=(custRideCounts[e.customerId]||0)+1;});
  const repeatCustomers=Object.values(custRideCounts).filter(c=>c>=2).length;
  const repeatRideCount=Object.values(custRideCounts).filter(c=>c>=2).reduce((s,c)=>s+c,0);
  const totalAttempted=done.length+noshow.length;
  const noShowRate=totalAttempted>0?Math.round((noshow.length/totalAttempted)*100):0;
  const cancelCount=allQ.filter(e=>sessIds.has(e.sessionId)&&e.status==='cancelled').length;
  const cancelRate=totalAttempted+cancelCount>0?Math.round(cancelCount/(totalAttempted+cancelCount)*100):0;
  const avgOccupancy=sessionsHeld>0
    ?Math.round(sessionsWithDone.reduce((sum,s)=>{
        const cap=s.capacity||12;
        return sum+(done.filter(e=>e.sessionId===s.id).length/cap*100);
      },0)/sessionsHeld)
    :0;

  // ── Breakdowns ───────────────────────────────────────
  const typeBreak={};
  done.forEach(e=>{typeBreak[e.typePreference]=(typeBreak[e.typePreference]||0)+1;});
  const sizeBreak={XS:0,S:0,M:0,L:0};
  done.forEach(e=>{if(sizeBreak.hasOwnProperty(e.size))sizeBreak[e.size]++;});
  const dayBreak={};
  done.forEach(e=>{if(e.sessionDay)dayBreak[e.sessionDay]=(dayBreak[e.sessionDay]||0)+1;});
  const revByType={};
  done.filter(e=>e.paid).forEach(e=>{revByType[e.typePreference]=(revByType[e.typePreference]||0)+(e.price||DEFAULT_PRICE);});
  const typeColor={Road:'var(--blue)',Hybrid:'var(--green)',Mountain:'var(--orange)',Any:'var(--muted)'};
  const typeColorHex={Road:'#4aa8f8',Hybrid:'#6ee89a',Mountain:'#e08828',Any:'#777'};
  const sizeColorHex={XS:'#a06af0',S:'#4aa8f8',M:'#6ee89a',L:'#e08828'};
  const dayOrder=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const dayBreakOrdered=Object.fromEntries(dayOrder.filter(d=>dayBreak[d]).map(d=>[d,dayBreak[d]]));
  const topType=Object.keys(typeBreak).sort((a,b)=>typeBreak[b]-typeBreak[a])[0]||'—';
  const topSize=Object.keys(sizeBreak).filter(k=>sizeBreak[k]).sort((a,b)=>sizeBreak[b]-sizeBreak[a])[0]||'—';
  const topDay=Object.keys(dayBreak).sort((a,b)=>dayBreak[b]-dayBreak[a])[0]||'—';
  const revPerRide=totalDone>0?(revTotal/totalDone):0;
  const revPerCustomer=uniqueCustIds.length>0?(revTotal/uniqueCustIds.length):0;
  const bestSession=sessionsWithDone.length
    ?sessionsWithDone.reduce((best,s)=>{
        const r=done.filter(e=>e.sessionId===s.id&&e.paid).reduce((sum,e)=>sum+(e.price||DEFAULT_PRICE),0);
        return r>best.r?{s,r}:best;
      },{s:null,r:-1})
    :{s:null,r:0};

  // ── Per-session data for charts ───────────────────────
  const trendData=[...sessions]
    .filter(s=>done.some(e=>e.sessionId===s.id)||noshow.some(e=>e.sessionId===s.id))
    .sort((a,b)=>new Date(a.session_date||a.id)-new Date(b.session_date||b.id))
    .map(s=>{
      const sDone=done.filter(e=>e.sessionId===s.id);
      const sNo  =noshow.filter(e=>e.sessionId===s.id);
      const cap  =s.capacity||12;
      const rev  =sDone.filter(e=>e.paid).reduce((sum,e)=>sum+(e.price||DEFAULT_PRICE),0);
      const pend =sDone.filter(e=>!e.paid).reduce((sum,e)=>sum+(e.price||DEFAULT_PRICE),0);
      const occ  =Math.round(sDone.length/cap*100);
      const types={};sDone.forEach(e=>{types[e.typePreference]=(types[e.typePreference]||0)+1;});
      const topT =Object.keys(types).sort((a,b)=>types[b]-types[a])[0]||'—';
      const lbl  =shortDate(s.session_date||s.id).replace(/,.*$/,'');
      return{s,sDone,sNo,cap,rev,pend,occ,topT,lbl,riders:sDone.length,revTotal:rev+pend,noShows:sNo.length};
    });

  // cumulative revenue
  let cumRev=0;
  const cumData=trendData.map(d=>{cumRev+=d.rev;return{...d,cumRev};});

  // ── Bar chart builder (CSS) ───────────────────────────
  function bars(data,colorFn,valueFmt){
    const max=Math.max(...Object.values(data),1);
    return Object.entries(data).sort((a,b)=>b[1]-a[1]).filter(([,v])=>v>0).map(([k,v])=>
      `<div class="analytics-bar-row">
        <div class="analytics-bar-label">${typeLabel(k)||k}</div>
        <div class="analytics-bar-track"><div class="analytics-bar-fill" style="width:${Math.round(v/max*100)}%;background:${colorFn(k)}"></div></div>
        <div class="analytics-bar-value">${valueFmt?valueFmt(v):v}</div>
      </div>`).join('');
  }

  // ── Range bar helper ──────────────────────────────────
  function _rangeBar(){
    const rangeLabels={all:t('anAllTime'),last5:t('anLast5'),last10:t('anLast10'),month:t('anThisMonth')};
    return`<div class="an-range-bar">
      <span class="an-range-label">${t('anShowing')}</span>
      ${['all','last5','last10','month'].map(r=>
        `<button class="filter-pill${S.analyticsRange===r?' active':''}" onclick="setAnRange('${r}')">${rangeLabels[r]}</button>`
      ).join('')}
      <span class="result-count" style="margin-left:4px">${sessionsHeld} ${t('anSessionsHeld').toLowerCase()} · ${totalDone} ${t('anRidesLabel')}</span>
    </div>`;
  }

  // ── Sort trend table ──────────────────────────────────
  const sd=S.analyticsTrendDir,ss=S.analyticsTrendSort;
  const sortedTrend=[...trendData].sort((a,b)=>{
    if(ss==='riders')    return sd*(a.riders-b.riders);
    if(ss==='revenue')   return sd*(a.rev-b.rev);
    if(ss==='pending')   return sd*(a.pend-b.pend);
    if(ss==='occupancy') return sd*(a.occ-b.occ);
    if(ss==='noshow')    return sd*(a.noShows-b.noShows);
    return sd*(new Date(a.s.session_date||a.s.id)-new Date(b.s.session_date||b.s.id));
  });
  function thSort(col,label){
    const active=ss===col;
    return`<th class="an-sort-th${active?' an-sort-active':''}${active&&sd===1?' desc':''}" onclick="setAnSort('${col}')">${label}</th>`;
  }
  const trendRows=sortedTrend.map(({s,sDone,sNo,cap,rev,pend,occ,topT,riders,noShows})=>{
    const occColor=occ>=80?'var(--green)':occ>=50?'var(--orange)':'var(--red)';
    return`<tr>
      <td style="font-weight:800;white-space:nowrap">${shortDate(s.session_date||s.id)}</td>
      <td style="color:var(--muted);font-size:12px">${dayLabel(s.day)||''}</td>
      <td style="font-weight:900;font-size:16px">${riders}<span style="font-size:11px;color:var(--muted);font-weight:600"> / ${cap}</span></td>
      <td style="color:var(--green);font-weight:800">SAR ${rev.toFixed(0)}</td>
      <td style="color:var(--orange);font-weight:700">${pend>0?`SAR ${pend.toFixed(0)}`:'<span style="color:var(--muted)">—</span>'}</td>
      <td style="color:${noShows>0?'var(--red)':'var(--muted)'};font-weight:700">${noShows||'—'}</td>
      <td><div class="analytics-occ-bar">
        <div class="analytics-occ-track"><div class="analytics-occ-fill" style="width:${occ}%;background:${occColor}"></div></div>
        <span style="font-size:12px;font-weight:800;color:${occColor}">${occ}%</span>
      </div></td>
      <td>${topT!=='—'?`<span class="type-badge ${TYPE_CLS[topT]||'type-any'}">${typeLabel(topT)}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
    </tr>`;
  });

  // ── SVG Charts ────────────────────────────────────────
  const chartLabels=trendData.map(d=>d.lbl);
  const revenueChart=_areaChart([
    {vals:trendData.map(d=>d.rev),  color:'#6ee89a',label:'Collected',fill:true},
    {vals:trendData.map(d=>d.revTotal),color:'rgba(110,232,154,.35)',label:'Total',fill:false,dashed:true},
  ],chartLabels,{unitPfx:'SAR '});

  const ridersChart=_areaChart([
    {vals:trendData.map(d=>d.riders),color:'#4aa8f8',label:'Riders',fill:true},
    {vals:trendData.map(d=>d.cap),  color:'rgba(255,255,255,.18)',label:'Capacity',fill:false,dashed:true},
  ],chartLabels);

  const occChart=_vbars(
    trendData.map(d=>({label:d.lbl,v:d.occ,c:d.occ>=80?'#6ee89a':d.occ>=50?'#e08828':'#e04040'})),
    {color:'#6ee89a',refVal:100}
  );

  const cumChart=_areaChart([
    {vals:cumData.map(d=>d.cumRev),color:'#a06af0',label:'Cumulative',fill:true},
  ],chartLabels,{unitPfx:'SAR '});

  const payDonut=_donut([
    {v:done.filter(e=>e.paid).length,  c:'#6ee89a',label:'Paid'},
    {v:done.filter(e=>!e.paid).length, c:'#e08828',label:'Pending'},
  ]);
  const payLegend=`<div class="donut-legend">
    <div class="donut-legend-item"><span class="donut-dot" style="background:#6ee89a"></span>${t('paidLabel')} — ${done.filter(e=>e.paid).length} (${collectionRate}%)</div>
    <div class="donut-legend-item"><span class="donut-dot" style="background:#e08828"></span>${t('pendingLabel')} — ${done.filter(e=>!e.paid).length}</div>
    <div style="margin-top:6px;font-size:13px;font-weight:900;color:var(--green)">SAR ${revCollected.toFixed(0)}</div>
    <div style="font-size:11px;color:var(--muted);font-weight:600">${t('anCollected').toLowerCase()}</div>
  </div>`;

  const typeSegs=Object.entries(typeBreak).map(([k,v])=>({v,c:typeColorHex[k]||'#777',label:k}));
  const typeDonut=_donut(typeSegs);
  const typeLegend=`<div class="donut-legend">${typeSegs.sort((a,b)=>b.v-a.v).map(d=>{
    const pct=Math.round(d.v/totalDone*100);
    return`<div class="donut-legend-item"><span class="donut-dot" style="background:${d.c}"></span>${typeLabel(d.label)} — ${d.v} (${pct}%)</div>`;
  }).join('')}</div>`;

  const sizeSegs=Object.entries(sizeBreak).filter(([,v])=>v>0).map(([k,v])=>({v,c:sizeColorHex[k]||'#777',label:k}));
  const sizeDonut=_donut(sizeSegs);
  const sizeLegend=`<div class="donut-legend">${sizeSegs.sort((a,b)=>b.v-a.v).map(d=>{
    const pct=Math.round(d.v/totalDone*100);
    return`<div class="donut-legend-item"><span class="donut-dot" style="background:${d.c}"></span>${d.label} — ${d.v} (${pct}%)</div>`;
  }).join('')}</div>`;

  const noDataStr=`<div style="color:var(--muted);font-size:13px;padding-top:8px">${t('anNoData2')}</div>`;

  // ── Render ────────────────────────────────────────────
  document.getElementById('tab-analytics').innerHTML=`
    <div class="page-title">${t('tabAnalytics')}</div>
    <div class="page-sub">${t('anPageSub')}</div>
    ${_rangeBar()}

    <div class="analytics-section-title">${t('anRevenue')}</div>
    <div class="analytics-kpi-grid">
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value" style="color:var(--green)">SAR ${revCollected.toFixed(0)}</div>
        <div class="analytics-kpi-label">${t('anCollected')}</div>
        <div class="analytics-kpi-sub">${collectionRate}% ${t('anCollRateLabel')}</div>
      </div>
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value" style="color:var(--orange)">SAR ${revPending.toFixed(0)}</div>
        <div class="analytics-kpi-label">${t('pendingLabel')}</div>
        <div class="analytics-kpi-sub">${done.filter(e=>!e.paid).length} ${t('anUnpaidRides')}</div>
      </div>
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value">SAR ${revTotal.toFixed(0)}</div>
        <div class="analytics-kpi-label">${t('anRevTotal')}</div>
        <div class="analytics-kpi-sub">${sessionsHeld} ${t('anSessionsHeld').toLowerCase()}</div>
      </div>
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value" style="color:var(--blue)">SAR ${avgRevPerSession}</div>
        <div class="analytics-kpi-label">${t('anAvgPerSession')}</div>
        <div class="analytics-kpi-sub">SAR ${revPerRide.toFixed(1)} ${t('anPerRide')}</div>
      </div>
    </div>
    <div class="chart-grid-wide">
      <div class="chart-card">
        <div class="chart-card-title">${t('anChartRevPerSession')}</div>
        <div class="chart-card-sub">${t('anChartRevSub')}</div>
        ${revenueChart}
        <div class="chart-legend">
          <div class="chart-legend-item"><span class="chart-legend-dot" style="background:#6ee89a"></span>${t('anCollected')}</div>
          <div class="chart-legend-item"><span class="chart-legend-dot" style="background:rgba(110,232,154,.5)"></span>${t('anTotal')}</div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">${t('anChartPaySplit')}</div>
        <div class="chart-card-sub">${t('anChartPaySub')}</div>
        <div class="donut-wrap">${payDonut}${payLegend}</div>
      </div>
    </div>
    <div class="chart-grid-wide">
      <div class="chart-card">
        <div class="chart-card-title">${t('anChartCumRev')}</div>
        <div class="chart-card-sub">${t('anChartCumSub')}</div>
        ${cumChart}
      </div>
      <div class="chart-card">
        <div class="chart-card-title">${t('anByRevType')}</div>
        <div class="chart-card-sub">${t('anCollectedOnly')}</div>
        ${Object.keys(revByType).length?bars(revByType,k=>typeColorHex[k]||'#777',v=>`SAR ${v.toFixed(0)}`):noDataStr}
      </div>
    </div>

    <div class="analytics-section-title">${t('anRidership')}</div>
    <div class="analytics-kpi-grid">
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value">${totalDone}</div>
        <div class="analytics-kpi-label">${t('anTotalRides')}</div>
        <div class="analytics-kpi-sub">${noshow.length} ${t('filterNoshow').toLowerCase()} · ${cancelCount} ${t('anCancellations')}</div>
      </div>
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value" style="color:var(--green)">${uniqueCustIds.length}</div>
        <div class="analytics-kpi-label">${t('anUniqueCustomers')}</div>
        <div class="analytics-kpi-sub">SAR ${revPerCustomer.toFixed(1)} ${t('anAvgSpend')}</div>
      </div>
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value" style="color:var(--purple)">${repeatCustomers}</div>
        <div class="analytics-kpi-label">${t('anRepeatRiders')}</div>
        <div class="analytics-kpi-sub">${repeatRideCount} ${t('anRidesFromReturning')}</div>
      </div>
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value" style="color:${noShowRate>15?'var(--red)':noShowRate>8?'var(--orange)':'var(--green)'}">${noShowRate}%</div>
        <div class="analytics-kpi-label">${t('anNoShowRate')}</div>
        <div class="analytics-kpi-sub">${noshow.length} ${t('anOf')} ${totalAttempted} ${t('anAttempts')}</div>
      </div>
    </div>
    <div class="chart-grid-wide">
      <div class="chart-card">
        <div class="chart-card-title">${t('anChartRidersPerSession')}</div>
        <div class="chart-card-sub">${t('anChartRidersSub')}</div>
        ${ridersChart}
        <div class="chart-legend">
          <div class="chart-legend-item"><span class="chart-legend-dot" style="background:#4aa8f8"></span>${t('anRiders')}</div>
          <div class="chart-legend-item"><span class="chart-legend-dot" style="background:rgba(255,255,255,.3)"></span>${t('anCapacity')}</div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">${t('anChartTypeDistrib')}</div>
        <div class="chart-card-sub">${t('anChartTypeSubtext')}</div>
        <div class="donut-wrap">${typeDonut}${typeLegend}</div>
      </div>
    </div>

    <div class="analytics-section-title">${t('anOperations')}</div>
    <div class="analytics-kpi-grid">
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value">${sessionsHeld}</div>
        <div class="analytics-kpi-label">${t('anSessionsHeld')}</div>
        <div class="analytics-kpi-sub">${allSess.length} ${t('anTotalCreated')}</div>
      </div>
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value" style="color:${avgOccupancy>=80?'var(--green)':avgOccupancy>=50?'var(--orange)':'var(--red)'}">${avgOccupancy}%</div>
        <div class="analytics-kpi-label">${t('anAvgOccupancy')}</div>
        <div class="analytics-kpi-sub">${t('anRidersCapacity')}</div>
      </div>
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value" style="color:${cancelRate>10?'var(--orange)':'var(--muted)'}">${cancelRate}%</div>
        <div class="analytics-kpi-label">${t('anCancellationRate')}</div>
        <div class="analytics-kpi-sub">${cancelCount} ${t('anCancellations')}</div>
      </div>
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value" style="color:var(--green)">${collectionRate}%</div>
        <div class="analytics-kpi-label">${t('anCollectionRate')}</div>
        <div class="analytics-kpi-sub">SAR ${revCollected.toFixed(0)} / SAR ${revTotal.toFixed(0)}</div>
      </div>
    </div>
    <div class="chart-grid-3">
      <div class="chart-card">
        <div class="chart-card-title">${t('anChartOccupancy')}</div>
        <div class="chart-card-sub">${t('anChartOccSub')}</div>
        ${occChart}
      </div>
      <div class="chart-card">
        <div class="chart-card-title">${t('anBySize')}</div>
        <div class="chart-card-sub">${t('anChartFrameSub')}</div>
        <div class="donut-wrap" style="justify-content:center;flex-direction:column;gap:12px;align-items:flex-start">
          ${sizeDonut}${sizeLegend}
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">${t('anByDay')}</div>
        <div class="chart-card-sub">${t('anChartDaySub')}</div>
        ${Object.keys(dayBreakOrdered).length?bars(dayBreakOrdered,()=>'#6ee89a'):noDataStr}
      </div>
    </div>

    <div class="analytics-section-title">${t('anHighlights')}</div>
    <div class="analytics-highlight-row">
      <div class="analytics-highlight-card">
        <div class="hl-item">
          <div class="hl-label">${t('anMostPopType')}</div>
          <div class="hl-value">${topType!=='—'?`<span class="type-badge ${TYPE_CLS[topType]||'type-any'}">${typeLabel(topType)}</span>`:topType}
            ${topType!=='—'?`<span style="font-size:13px;color:var(--muted);font-weight:600;margin-left:8px">${typeBreak[topType]} ${t('anRidesLabel')}</span>`:''}
          </div>
        </div>
        <div class="hl-item">
          <div class="hl-label">${t('anMostPopFrame')}</div>
          <div class="hl-value" style="color:var(--text)">${topSize}
            ${topSize!=='—'?`<span style="font-size:13px;color:var(--muted);font-weight:600;margin-left:8px">${sizeBreak[topSize]} ${t('anRidesLabel')}</span>`:''}
          </div>
        </div>
        <div class="hl-item">
          <div class="hl-label">${t('anBusiestDayLabel')}</div>
          <div class="hl-value" style="color:var(--text)">${dayLabel(topDay)}
            ${topDay!=='—'?`<span style="font-size:13px;color:var(--muted);font-weight:600;margin-left:8px">${dayBreak[topDay]} ${t('anRidesLabel')}</span>`:''}
          </div>
        </div>
        <div class="hl-item" style="margin-bottom:0">
          <div class="hl-label">${t('anBestSession')}</div>
          <div class="hl-value" style="color:var(--green)">${bestSession.s?`SAR ${bestSession.r.toFixed(0)} — ${shortDate(bestSession.s.session_date||bestSession.s.id)}`:'—'}</div>
        </div>
      </div>
      <div class="analytics-highlight-card">
        <div class="hl-item">
          <div class="hl-label">${t('anRevPerRide')}</div>
          <div class="hl-value" style="color:var(--green)">SAR ${revPerRide.toFixed(2)}</div>
        </div>
        <div class="hl-item">
          <div class="hl-label">${t('anRevPerCust')}</div>
          <div class="hl-value" style="color:var(--blue)">SAR ${revPerCustomer.toFixed(2)}</div>
        </div>
        <div class="hl-item">
          <div class="hl-label">${t('anCollectionRate')}</div>
          <div class="hl-value" style="color:${collectionRate>=80?'var(--green)':collectionRate>=60?'var(--orange)':'var(--red)'}">${collectionRate}%
            <span style="font-size:13px;color:var(--muted);font-weight:600;margin-left:8px">SAR ${revCollected.toFixed(0)} / SAR ${revTotal.toFixed(0)}</span>
          </div>
        </div>
        <div class="hl-item" style="margin-bottom:0">
          <div class="hl-label">${t('anCustRetention')}</div>
          <div class="hl-value" style="color:var(--purple)">${uniqueCustIds.length>0?Math.round(repeatCustomers/uniqueCustIds.length*100):0}%
            <span style="font-size:13px;color:var(--muted);font-weight:600;margin-left:8px">${repeatCustomers} ${t('anOf')} ${uniqueCustIds.length} ${t('anReturned')}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="analytics-section-title">${t('anSessPerformTable')}</div>
    <div class="table-wrapper">
      <table class="analytics-trend-table">
        <thead><tr>
          ${thSort('date',t('anColDate'))}
          <th style="color:var(--muted)">${t('anColDay2')}</th>
          ${thSort('riders',t('anColRiders'))}
          ${thSort('revenue',t('anColRevenue'))}
          ${thSort('pending',t('anColPending'))}
          ${thSort('noshow',t('anColNoShows'))}
          ${thSort('occupancy',t('anColOccupancy'))}
          <th style="color:var(--muted)">${t('anColTopType2')}</th>
        </tr></thead>
        <tbody>${trendRows.length?trendRows.join(''):`<tr><td colspan="8" class="empty-state">${t('anNoDataTrend')}</td></tr>`}</tbody>
      </table>
    </div>`;
}

/* ══════════════════════════════════════════════
   BOOT - load data from API then show landing
══════════════════════════════════════════════ */
(async()=>{
  try{
    await loadData();
  }catch(e){
    console.warn('Could not reach backend:',e.message);
  }
  S.loggedIn=getSession();
  showView('landing');
})();
</script>
</body>
</html>
