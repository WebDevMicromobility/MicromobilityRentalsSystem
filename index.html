}
function closeBoothPopup(){document.getElementById('booth-popup').style.display='none';}

/* ══════════════════════════════════════════════
   ANALYTICS - SVG HELPERS
══════════════════════════════════════════════ */
function _uid(){return Math.random().toString(36).slice(2,7);}

function _areaChart(series,labels,opts={}){
  const {W=460,H=148,unitPfx=''}=opts;
  const n=labels.length;
  if(!n)return`<div style="padding:28px 0;text-align:center;color:var(--muted);font-size:12px">${t('anNoData2')}</div>`;
  const pL=44,pR=14,pT=14,pB=28,cW=W-pL-pR,cH=H-pT-pB;
  const maxV=Math.max(...series.flatMap(s=>s.vals),1);
  const xOf=i=>pL+(n===1?cW/2:i/(n-1)*cW);
  const yOf=v=>pT+cH-(v/maxV)*cH;
  const nth=Math.ceil(n/7);
  let defs='',paths='';
  series.forEach(s=>{
    const pts=s.vals.map((v,i)=>[xOf(i),yOf(v)]);
    const lD=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    const aD=`M${pts[0][0].toFixed(1)},${(pT+cH).toFixed(1)} ${pts.map(p=>`L${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ')} L${pts[n-1][0].toFixed(1)},${(pT+cH).toFixed(1)}Z`;
    if(s.fill!==false){
      const gid='g'+_uid();
      defs+=`<linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${s.color}" stop-opacity=".25"/><stop offset="100%" stop-color="${s.color}" stop-opacity=".02"/></linearGradient>`;
      paths+=`<path d="${aD}" fill="url(#${gid})"/>`;
    }
    paths+=`<path d="${lD}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"${s.dashed?' stroke-dasharray="5 4"':''}/>`;
    pts.forEach((p,i)=>{if(n<=14||i%2===0||i===n-1)paths+=`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${n>10?2.5:3}" fill="${s.color}" stroke="rgba(10,10,10,.7)" stroke-width="1.5"/>`;});
  });
  const grid=[0,.25,.5,.75,1].map(pct=>{
    const v=maxV*pct,y=(pT+cH-pct*cH).toFixed(1);
    return`<line x1="${pL}" y1="${y}" x2="${pL+cW}" y2="${y}" stroke="rgba(255,255,255,.04)" stroke-width="1"/><text x="${pL-5}" y="${(parseFloat(y)+4).toFixed(1)}" font-size="9" text-anchor="end" fill="rgba(255,255,255,.28)">${unitPfx}${Math.round(v)}</text>`;
  }).join('');
  const xlbls=labels.map((l,i)=>{
    if(i%nth!==0&&i!==n-1)return'';
    const align=i===0?'start':i===n-1?'end':'middle';
    return`<text x="${xOf(i).toFixed(1)}" y="${H-5}" font-size="8.5" text-anchor="${align}" fill="rgba(255,255,255,.28)">${l}</text>`;
  }).join('');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block;overflow:visible"><defs>${defs}</defs>${grid}${paths}${xlbls}</svg>`;
}

function _donut(segs,size=110){
  const total=segs.reduce((s,d)=>s+d.v,0);
  if(!total)return`<div style="padding:16px;text-align:center;color:var(--muted);font-size:12px">${t('anNoData2')}</div>`;
  const r=34,cx=size/2,cy=size/2,sw=13,C=2*Math.PI*r;
  let off=-0.25;
  const arcs=segs.filter(d=>d.v>0).map(d=>{
    const pct=d.v/total,rot=(off*360).toFixed(2);
    off+=pct;
    return`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.c}" stroke-width="${sw}" stroke-dasharray="${(C*pct).toFixed(2)} ${(C*(1-pct)).toFixed(2)}" transform="rotate(${rot} ${cx} ${cy})"/>`;
  }).join('');
  return`<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="display:block;flex-shrink:0"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="${sw}"/>${arcs}<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="900" fill="white">${total}</text></svg>`;
}

function _vbars(data,opts={}){
  const {W=320,H=130,color='#6ee89a',refVal=null}=opts;
  const n=data.length;
  if(!n)return`<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">${t('anNoData2')}</div>`;
  const pL=8,pR=8,pT=10,pB=22,cW=W-pL-pR,cH=H-pT-pB;
  const maxV=Math.max(...data.map(d=>d.v),refVal||0,1);
  const bW=Math.max(5,cW/n-4);
  const xOf=i=>pL+(i+.5)*(cW/n);
  const yOf=v=>pT+cH-(v/maxV)*cH;
  const nth=Math.ceil(n/8);
  const barsHtml=data.map((d,i)=>{
    const bH=Math.max(2,(d.v/maxV)*cH);
    return`<rect x="${(xOf(i)-bW/2).toFixed(1)}" y="${(pT+cH-bH).toFixed(1)}" width="${bW.toFixed(1)}" height="${bH.toFixed(1)}" rx="2" fill="${d.c||color}" opacity=".85"/>${(i%nth===0||i===n-1)?`<text x="${xOf(i).toFixed(1)}" y="${H-4}" font-size="8" text-anchor="middle" fill="rgba(255,255,255,.3)">${d.label}</text>`:''}`;
  }).join('');
  const refLine=refVal!==null?`<line x1="${pL}" y1="${yOf(refVal).toFixed(1)}" x2="${pL+cW}" y2="${yOf(refVal).toFixed(1)}" stroke="rgba(255,255,255,.2)" stroke-width="1" stroke-dasharray="4 3"/>`:'' ;
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block">${refLine}${barsHtml}</svg>`;
}

/* ══════════════════════════════════════════════
   ANALYTICS
══════════════════════════════════════════════ */
function setAnRange(v){S.analyticsRange=v;renderAnalytics();}
function setAnSort(col){
  if(S.analyticsTrendSort===col)S.analyticsTrendDir*=-1;
  else{S.analyticsTrendSort=col;S.analyticsTrendDir=-1;}
  renderAnalytics();
}

function renderAnalytics(){
  const allQ=getQueue();
  const allSess=allSessions();

  // ── Date range filter ────────────────────────────────
  let sessCandidates=[...allSess].sort((a,b)=>new Date(a.session_date||a.id)-new Date(b.session_date||b.id));
  if(S.analyticsRange==='month'){
    const mo=new Date();mo.setDate(1);mo.setHours(0,0,0,0);
    sessCandidates=sessCandidates.filter(s=>new Date(s.session_date||s.id)>=mo);
  } else if(S.analyticsRange==='year'){
    const yr=new Date().getFullYear();
    sessCandidates=sessCandidates.filter(s=>new Date(s.session_date||s.id).getFullYear()===yr);
  } else if(S.analyticsRange==='custom'){
    sessCandidates=sessCandidates.slice(-Math.max(1,S.analyticsCustomN||20));
  } else if(S.analyticsRange==='daterange'){
    if(S.analyticsDateFrom) sessCandidates=sessCandidates.filter(s=>(s.session_date||'')>=S.analyticsDateFrom);
    if(S.analyticsDateTo)   sessCandidates=sessCandidates.filter(s=>(s.session_date||'')<=S.analyticsDateTo);
  }
  const sessIds=new Set(sessCandidates.map(s=>s.id));
  const queue=allQ.filter(e=>sessIds.has(e.sessionId));
  const sessions=sessCandidates;
  const done=queue.filter(e=>e.status==='done');
  const noshow=queue.filter(e=>e.status==='noshow');
  // _rangeBar uses lazy counts — safe because it's only called after this point
  function _rangeBar(){
    const _sh=sessions.filter(s=>queue.some(e=>e.sessionId===s.id&&e.status==='done')).length;
    const _td=done.length;
    const rangeLabels={all:t('anAllTime'),month:t('anThisMonth'),year:t('anThisYear')||'This Year',custom:t('anCustom')||'Custom',daterange:t('anDateRange')||'Date Range'};
    return`<div class="an-range-bar">
      <span class="an-range-label">${t('anShowing')}</span>
      ${['all','month','year','daterange','custom'].map(r=>
        `<button class="filter-pill${S.analyticsRange===r?' active':''}" onclick="setAnRange('${r}')">${rangeLabels[r]}</button>`
      ).join('')}
      ${S.analyticsRange==='custom'?`<input type="number" min="1" max="200" value="${S.analyticsCustomN||20}"
        style="width:64px;padding:4px 8px;background:#1a1a1a;border:1px solid rgba(255,255,255,.15);border-radius:8px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700"
        oninput="S.analyticsCustomN=Math.max(1,parseInt(this.value)||1);renderAnalytics()">`:``}
      ${S.analyticsRange==='daterange'?`
        <span style="font-size:12px;font-weight:700;color:var(--muted)">${t('anFromDate')||'From'}:</span>
        <input type="date" value="${S.analyticsDateFrom||''}"
          style="background:#1a1a1a;border:1px solid rgba(255,255,255,.15);border-radius:8px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:4px 8px;cursor:pointer"
          onchange="S.analyticsDateFrom=this.value;renderAnalytics()">
        <span style="font-size:12px;font-weight:700;color:var(--muted)">${t('anToDate')||'To'}:</span>
        <input type="date" value="${S.analyticsDateTo||''}"
          style="background:#1a1a1a;border:1px solid rgba(255,255,255,.15);border-radius:8px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:4px 8px;cursor:pointer"
          onchange="S.analyticsDateTo=this.value;renderAnalytics()">
      `:''}
      <span class="result-count" style="margin-left:4px">${_sh} ${t('anSessionsHeld').toLowerCase()} · ${_td} ${t('anRidesLabel')}</span>
    </div>`;
  }

  // No early return — always render the full dashboard (values show 0 when no data)

  // ── Revenue ──────────────────────────────────────────
  const revCollected=done.filter(e=>e.paid).reduce((s,e)=>s+(e.price??DEFAULT_PRICE),0);
  const revPending  =done.filter(e=>!e.paid).reduce((s,e)=>s+(e.price??DEFAULT_PRICE),0);
  const revTotal    =revCollected+revPending;
  // VAT exclusive helpers (15% VAT: excl = incl / 1.15)
  function excVAT(v){return v/1.15;}
  function sarBoth(v,precision=0){
    return`SAR ${v.toFixed(precision)}<div style="font-size:11px;color:var(--muted);font-weight:600;margin-top:1px">SAR ${excVAT(v).toFixed(precision)} <span style="font-size:10px">excl.</span></div>`;
  }
  const sessionsWithDone=sessions.filter(s=>done.some(e=>e.sessionId===s.id));
  const sessionsHeld=sessionsWithDone.length;
  const avgRevPerSession=sessionsHeld?Math.round(revTotal/sessionsHeld):0;
  const collectionRate=revTotal>0?Math.round((revCollected/revTotal)*100):0;

  // ── Riders ───────────────────────────────────────────
  const totalDone=done.length;
  const uniqueCustIds=[...new Set(done.filter(e=>e.customerId).map(e=>e.customerId))];
  const custRideCounts={};
  done.filter(e=>e.customerId).forEach(e=>{custRideCounts[e.customerId]=(custRideCounts[e.customerId]||0)+1;});
  const repeatCustomers=Object.values(custRideCounts).filter(c=>c>=2).length;
  const repeatRideCount=Object.values(custRideCounts).filter(c=>c>=2).reduce((s,c)=>s+c,0);
  const totalAttempted=done.length+noshow.length;
  const noShowRate=totalAttempted>0?Math.round((noshow.length/totalAttempted)*100):0;
  const cancelCount=allQ.filter(e=>sessIds.has(e.sessionId)&&e.status==='cancelled').length;
  const cancelRate=totalAttempted+cancelCount>0?Math.round(cancelCount/(totalAttempted+cancelCount)*100):0;
  const avgOccupancy=sessionsHeld>0
    ?Math.round(sessionsWithDone.reduce((sum,s)=>{
        const cap=s.capacity||12;
        return sum+(done.filter(e=>e.sessionId===s.id).length/cap*100);
      },0)/sessionsHeld)
    :0;

  // ── RevPAS & Completion ──────────────────────────────
  const totalSeatsOffered=sessions.reduce((s,sess)=>s+(sess.capacity||12),0);
  const revPAS=totalSeatsOffered>0?(revCollected/totalSeatsOffered):0;
  const completionRate=totalAttempted>0?Math.round((done.length/totalAttempted)*100):0;

  // ── Breakdowns ───────────────────────────────────────
  const typeBreak={};
  done.forEach(e=>{typeBreak[e.typePreference]=(typeBreak[e.typePreference]||0)+1;});
  const dayBreak={};
  done.forEach(e=>{if(e.sessionDay)dayBreak[e.sessionDay]=(dayBreak[e.sessionDay]||0)+1;});
  const revByType={};
  done.filter(e=>e.paid).forEach(e=>{revByType[e.typePreference]=(revByType[e.typePreference]||0)+(e.price??DEFAULT_PRICE);});
  // Revenue per day of week (collected)
  const revByDay={};
  const countByDay={};
  done.filter(e=>e.paid).forEach(e=>{
    if(!e.sessionDay)return;
    revByDay[e.sessionDay]=(revByDay[e.sessionDay]||0)+(e.price??DEFAULT_PRICE);
    countByDay[e.sessionDay]=(countByDay[e.sessionDay]||0)+1;
  });
  // Avg revenue per ride by type (collected only)
  const typeRevPerRide={};
  Object.keys(revByType).forEach(ty=>{
    const cnt=done.filter(e=>e.paid&&e.typePreference===ty).length;
    typeRevPerRide[ty]=cnt>0?(revByType[ty]/cnt):0;
  });
  const typeColor={Road:'var(--text)',Hybrid:'var(--green)',Mountain:'var(--text)',Any:'var(--muted-l)'};
  const typeColorHex={Road:'#4aa8f8',Hybrid:'#03ff89',Mountain:'#e08828',Any:'#777'};
  const dayColorHex='#03ff89';
  const dayOrder=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const dayBreakOrdered=Object.fromEntries(dayOrder.filter(d=>dayBreak[d]).map(d=>[d,dayBreak[d]]));
  const topType=Object.keys(typeBreak).sort((a,b)=>typeBreak[b]-typeBreak[a])[0]||'—';
  const topDay=Object.keys(dayBreak).sort((a,b)=>dayBreak[b]-dayBreak[a])[0]||'—';
  const revPerRide=totalDone>0?(revTotal/totalDone):0;
  const revPerCustomer=uniqueCustIds.length>0?(revTotal/uniqueCustIds.length):0;
  const bestSession=sessionsWithDone.length
    ?sessionsWithDone.reduce((best,s)=>{
        const r=done.filter(e=>e.sessionId===s.id&&e.paid).reduce((sum,e)=>sum+(e.price??DEFAULT_PRICE),0);
        return r>best.r?{s,r}:best;
      },{s:null,r:-1})
    :{s:null,r:0};

  // ── Fleet analytics: brand / model rental counts ─────
  const allBikes=getBikes();
  const brandRentals={};
  const modelRentals={};
  done.forEach(e=>{
    getAssignedBikeIds(e).forEach(bId=>{
      const bk=allBikes.find(x=>x.id===bId);
      if(!bk)return;
      const brand=bk.brand||'';
      const model=bk.model||'';
      if(brand) brandRentals[brand]=(brandRentals[brand]||0)+1;
      if(brand&&model){
        const mk=`${brand} - ${model}`;
        modelRentals[mk]=(modelRentals[mk]||0)+1;
      }
    });
  });
  // Count pieces per model key
  const modelPieces={};
  allBikes.forEach(bk=>{
    if(!bk.brand||!bk.model)return;
    const mk=`${bk.brand} - ${bk.model}`;
    modelPieces[mk]=(modelPieces[mk]||0)+1;
  });
  // Avg rentals per piece for each model
  const modelAvgPerPiece={};
  Object.keys(modelRentals).forEach(mk=>{
    const pieces=modelPieces[mk]||1;
    modelAvgPerPiece[mk]=modelRentals[mk]/pieces;
  });
  // Collected revenue per model
  const modelRevenue={};
  done.filter(e=>e.paid).forEach(e=>{
    getAssignedBikeIds(e).forEach(bId=>{
      const bk=allBikes.find(x=>x.id===bId);
      if(!bk||!bk.brand||!bk.model)return;
      const mk=`${bk.brand} - ${bk.model}`;
      modelRevenue[mk]=(modelRevenue[mk]||0)+(e.price??DEFAULT_PRICE);
    });
  });
  // Color palette for arbitrary brand/model keys
  const _fleetPalette=['#4aa8f8','#03ff89','#a06af0','#e08828','#e04040','#00c9e0','#f0a06a','#89d4cf','#f06ab8','#c9e089'];
  const _brandKeys=Object.keys(brandRentals).sort((a,b)=>brandRentals[b]-brandRentals[a]);
  const _modelKeys=Object.keys(modelRentals).sort((a,b)=>modelRentals[b]-modelRentals[a]);
  const brandColorMap={};_brandKeys.forEach((k,i)=>{brandColorMap[k]=_fleetPalette[i%_fleetPalette.length];});
  const modelColorMap={};_modelKeys.forEach((k,i)=>{modelColorMap[k]=_fleetPalette[i%_fleetPalette.length];});

  // ── Per-session data for charts ───────────────────────
  const trendData=[...sessions]
    .filter(s=>done.some(e=>e.sessionId===s.id)||noshow.some(e=>e.sessionId===s.id))
    .sort((a,b)=>new Date(a.session_date||a.id)-new Date(b.session_date||b.id))
    .map(s=>{
      const sDone=done.filter(e=>e.sessionId===s.id);
      const sNo  =noshow.filter(e=>e.sessionId===s.id);
      const cap  =s.capacity||12;
      const rev  =sDone.filter(e=>e.paid).reduce((sum,e)=>sum+(e.price??DEFAULT_PRICE),0);
      const pend =sDone.filter(e=>!e.paid).reduce((sum,e)=>sum+(e.price??DEFAULT_PRICE),0);
      const occ  =Math.round(sDone.length/cap*100);
      const types={};sDone.forEach(e=>{types[e.typePreference]=(types[e.typePreference]||0)+1;});
      const topT =Object.keys(types).sort((a,b)=>types[b]-types[a])[0]||'—';
      const lbl  =shortDate(s.session_date||s.id).replace(/,.*$/,'');
      return{s,sDone,sNo,cap,rev,pend,occ,topT,lbl,riders:sDone.length,revTotal:rev+pend,noShows:sNo.length};
    });

  // cumulative revenue
  let cumRev=0;
  const cumData=trendData.map(d=>{cumRev+=d.rev;return{...d,cumRev};});

  // ── Auto business insights ────────────────────────────
  function insightCard(type,icon,title,body){
    return`<div class="insight-card ${type}"><div class="insight-icon">${icon}</div><div><div class="insight-title">${title}</div><div class="insight-body">${body}</div></div></div>`;
  }
  const insights=[];
  if(collectionRate>=80) insights.push(insightCard('good','✅',t('anCollectionRate'),t('anInsightGoodCollection')));
  else insights.push(insightCard('alert','⚠️',t('anCollectionRate'),t('anInsightLowCollection').replace('{0}',revPending.toFixed(0))));
  if(revPending>0&&revTotal>0&&(revPending/revTotal)>0.2)
    insights.push(insightCard('warn','💳',t('pendingLabel'),t('anInsightPendingHigh').replace('{0}',revPending.toFixed(0)).replace('{1}',Math.round(revPending/revTotal*100))));
  if(avgOccupancy>=75) insights.push(insightCard('good','📈',t('anAvgOccupancy'),t('anInsightHighOcc')));
  else if(avgOccupancy<50) insights.push(insightCard('warn','📉',t('anAvgOccupancy'),t('anInsightLowOcc')));
  if(topDay&&topDay!=='—') insights.push(insightCard('info','📅',t('anBusiestDayLabel'),t('anInsightTopDay').replace('{0}',dayLabel(topDay)||topDay)));
  if(topType&&topType!=='—') insights.push(insightCard('info','🚴',t('anMostPopType'),t('anInsightTopType').replace('{0}',typeLabel(topType))));
  const retentionPct=uniqueCustIds.length>0?Math.round(repeatCustomers/uniqueCustIds.length*100):0;
  if(retentionPct>=30) insights.push(insightCard('purple','🔄',t('anCustRetention'),t('anInsightRetention').replace('{0}',retentionPct)));

  // ── Occupancy gauge SVG ───────────────────────────────
  function occGauge(pct){
    const r=44,cx=56,cy=56,sw=10;
    const arc=r*Math.PI; // half-circle circumference
    const filled=arc*(pct/100);
    const c=pct>=80?'#03ff89':pct>=50?'#e08828':'#d90909';
    return`<div class="occ-gauge-wrap">
      <svg class="occ-gauge-svg" width="112" height="66" viewBox="0 0 112 66">
        <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="${sw}" stroke-linecap="round"/>
        <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="${c}" stroke-width="${sw}" stroke-linecap="round"
          stroke-dasharray="${filled} ${arc}" stroke-dashoffset="0"/>
      </svg>
      <div style="font-size:26px;font-weight:900;color:${c};margin-top:-28px;line-height:1">${pct}%</div>
      <div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">${t('anAvgOccupancy')}</div>
    </div>`;
  }

  // ── Bar chart builder (CSS) ───────────────────────────
  function bars(data,colorFn,valueFmt){
    const max=Math.max(...Object.values(data),1);
    return Object.entries(data).sort((a,b)=>b[1]-a[1]).filter(([,v])=>v>0).map(([k,v])=>
      `<div class="analytics-bar-row">
        <div class="analytics-bar-label">${typeLabel(k)||k}</div>
        <div class="analytics-bar-track"><div class="analytics-bar-fill" style="width:${Math.round(v/max*100)}%;background:${colorFn(k)}"></div></div>
        <div class="analytics-bar-value">${valueFmt?valueFmt(v):v}</div>
      </div>`).join('');
  }

  // ── Sort trend table ──────────────────────────────────
  const sd=S.analyticsTrendDir,ss=S.analyticsTrendSort;
  const sortedTrend=[...trendData].sort((a,b)=>{
    if(ss==='riders')    return sd*(a.riders-b.riders);
    if(ss==='revenue')   return sd*(a.rev-b.rev);
    if(ss==='pending')   return sd*(a.pend-b.pend);
    if(ss==='occupancy') return sd*(a.occ-b.occ);
    if(ss==='noshow')    return sd*(a.noShows-b.noShows);
    return sd*(new Date(a.s.session_date||a.s.id)-new Date(b.s.session_date||b.s.id));
  });
  function thSort(col,label){
    const active=ss===col;
    return`<th class="an-sort-th${active?' an-sort-active':''}${active&&sd===-1?' desc':''}" onclick="setAnSort('${col}')">${label}</th>`;
  }
  const trendRows=sortedTrend.map(({s,sDone,sNo,cap,rev,pend,occ,topT,riders,noShows})=>{
    const occColor=occ>=50?'var(--green)':'var(--muted-l)';
    return`<tr>
      <td style="font-weight:800;white-space:nowrap">${shortDate(s.session_date||s.id)}</td>
      <td style="color:var(--muted);font-size:12px">${dayLabel(s.day)||''}</td>
      <td style="font-weight:900;font-size:16px">${riders}<span style="font-size:11px;color:var(--muted);font-weight:600"> / ${cap}</span></td>
      <td style="color:var(--green);font-weight:800">${sarBoth(rev)}</td>
      <td style="color:var(--muted-l);font-weight:700">${pend>0?sarBoth(pend):'<span style="color:var(--muted)">—</span>'}</td>
      <td style="color:${noShows>0?'var(--red)':'var(--muted)'};font-weight:700">${noShows||'—'}</td>
      <td><div class="analytics-occ-bar">
        <div class="analytics-occ-track"><div class="analytics-occ-fill" style="width:${occ}%;background:${occColor}"></div></div>
        <span style="font-size:12px;font-weight:800;color:${occColor}">${occ}%</span>
      </div></td>
      <td>${topT!=='—'?`<span class="type-badge ${TYPE_CLS[topT]||'type-any'}">${typeLabel(topT)}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
    </tr>`;
  });

  // ── SVG Charts ────────────────────────────────────────
  const chartLabels=trendData.map(d=>d.lbl);
  const revenueChart=_areaChart([
    {vals:trendData.map(d=>d.rev),     color:'#03ff89',label:t('anCollected'),fill:true},
    {vals:trendData.map(d=>d.revTotal),color:'rgba(3,255,137,.3)',label:t('anTotal'),fill:false,dashed:true},
  ],chartLabels,{unitPfx:'SAR '});

  const ridersChart=_areaChart([
    {vals:trendData.map(d=>d.riders),color:'#4aa8f8',label:t('anRiders'),fill:true},
    {vals:trendData.map(d=>d.cap),   color:'rgba(255,255,255,.15)',label:t('anCapacity'),fill:false,dashed:true},
  ],chartLabels);

  const occChart=_vbars(
    trendData.map(d=>({label:d.lbl,v:d.occ,c:d.occ>=80?'#03ff89':d.occ>=50?'#e08828':'#d90909'})),
    {color:'#03ff89',refVal:100}
  );

  const cumChart=_areaChart([
    {vals:cumData.map(d=>d.cumRev),color:'#a06af0',label:t('anChartCumRev'),fill:true},
  ],chartLabels,{unitPfx:'SAR '});

  const payDonut=_donut([
    {v:done.filter(e=>e.paid).length,  c:'#03ff89',label:t('paidLabel')},
    {v:done.filter(e=>!e.paid).length, c:'#e08828',label:t('pendingLabel')},
  ]);
  const payLegend=`<div class="donut-legend">
    <div class="donut-legend-item"><span class="donut-dot" style="background:#03ff89"></span>${t('paidLabel')} - ${done.filter(e=>e.paid).length} (${collectionRate}%)</div>
    <div class="donut-legend-item"><span class="donut-dot" style="background:#e08828"></span>${t('pendingLabel')} - ${done.filter(e=>!e.paid).length}</div>
    <div style="margin-top:8px;font-size:20px;font-weight:900;color:var(--green)">${sarBoth(revCollected)}</div>
    <div style="font-size:11px;color:var(--muted);font-weight:600">${t('anCollected')}</div>
  </div>`;

  const typeSegs=Object.entries(typeBreak).map(([k,v])=>({v,c:typeColorHex[k]||'#777',label:k}));
  const typeDonut=_donut(typeSegs);
  const typeLegend=`<div class="donut-legend">${typeSegs.sort((a,b)=>b.v-a.v).map(d=>{
    const pct=Math.round(d.v/totalDone*100);
    return`<div class="donut-legend-item"><span class="donut-dot" style="background:${d.c}"></span>${typeLabel(d.label)} - ${d.v} (${pct}%)</div>`;
  }).join('')}</div>`;

  // Rev by day (horizontal bars) — dayOrder already declared above
  const revByDayOrdered=Object.fromEntries(dayOrder.filter(d=>revByDay[d]).map(d=>[d,revByDay[d]]));
  // Type rev per ride (horizontal bars)
  const typeRevPerRideOrdered=Object.fromEntries(
    Object.keys(typeRevPerRide).filter(k=>typeRevPerRide[k]>0)
      .sort((a,b)=>typeRevPerRide[b]-typeRevPerRide[a])
      .map(k=>[k,typeRevPerRide[k]])
  );

  const noDataStr=`<div style="color:var(--muted);font-size:13px;padding-top:8px">${t('anNoData2')}</div>`;

  // ── Render ────────────────────────────────────────────
  document.getElementById('tab-analytics').innerHTML=`
    <div class="page-title">${t('tabAnalytics')}</div>
    <div class="page-sub">${t('anPageSub')}</div>
    ${_rangeBar()}

    <!-- INSIGHTS -->
    <div class="analytics-section-title">${t('anInsights')}</div>
    <div class="insights-grid">${insights.join('')}</div>

    <!-- REVENUE -->
    <div class="analytics-section-title">${t('anRevenue')}</div>
    <div class="analytics-kpi-grid">
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value" style="color:var(--green)">${sarBoth(revCollected)}</div>
        <div class="analytics-kpi-label">${t('anCollected')}</div>
        <div class="analytics-kpi-sub">${collectionRate}% ${t('anCollRateLabel')}</div>
      </div>
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value" style="color:var(--muted-l)">${sarBoth(revPending)}</div>
        <div class="analytics-kpi-label">${t('pendingLabel')}</div>
        <div class="analytics-kpi-sub">${done.filter(e=>!e.paid).length} ${t('anUnpaidRides')}</div>
      </div>
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value" style="color:var(--green)">${sarBoth(revPAS,2)}</div>
        <div class="analytics-kpi-label">${t('anRevPAS')}</div>
        <div class="analytics-kpi-sub">${totalSeatsOffered} ${t('anTotalSeats').toLowerCase()}</div>
      </div>
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value">${sarBoth(avgRevPerSession)}</div>
        <div class="analytics-kpi-label">${t('anAvgPerSession')}</div>
        <div class="analytics-kpi-sub">${sarBoth(revPerRide,1)} ${t('anPerRide')}</div>
      </div>
    </div>
    <div class="chart-grid-wide">
      <div class="chart-card">
        <div class="chart-card-title">${t('anChartRevPerSession')}</div>
        <div class="chart-card-sub">${t('anChartRevSub')}</div>
        ${revenueChart}
        <div class="chart-legend">
          <div class="chart-legend-item"><span class="chart-legend-dot" style="background:#03ff89"></span>${t('anCollected')}</div>
          <div class="chart-legend-item"><span class="chart-legend-dot" style="background:rgba(3,255,137,.4)"></span>${t('anTotal')}</div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">${t('anChartCumRev')}</div>
        <div class="chart-card-sub">${t('anChartCumSub')}</div>
        ${cumChart}
      </div>
    </div>
    <div class="chart-grid-wide">
      <div class="chart-card">
        <div class="chart-card-title">${t('anChartPaySplit')}</div>
        <div class="chart-card-sub">${t('anChartPaySub')}</div>
        <div class="donut-wrap">${payDonut}${payLegend}</div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">${t('anRevByDay')}</div>
        <div class="chart-card-sub">${t('anRevByDaySub')}</div>
        ${Object.keys(revByDayOrdered).length?bars(revByDayOrdered,()=>dayColorHex,v=>sarBoth(v)):noDataStr}
      </div>
    </div>

    <!-- RIDERSHIP -->
    <div class="analytics-section-title">${t('anRidership')}</div>
    <div class="analytics-kpi-grid">
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value">${totalDone}</div>
        <div class="analytics-kpi-label">${t('anTotalRides')}</div>
        <div class="analytics-kpi-sub">${noshow.length} ${t('filterNoshow').toLowerCase()} · ${cancelCount} ${t('anCancellations')}</div>
      </div>
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value" style="color:${completionRate>=70?'var(--green)':'var(--red)'}">${completionRate}%</div>
        <div class="analytics-kpi-label">${t('anCompletionRate')}</div>
        <div class="analytics-kpi-sub">${done.length} ${t('anOf')} ${totalAttempted} ${t('anAttempts')}</div>
      </div>
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value" style="color:var(--green)">${uniqueCustIds.length}</div>
        <div class="analytics-kpi-label">${t('anUniqueCustomers')}</div>
        <div class="analytics-kpi-sub">${sarBoth(revPerCustomer,1)} ${t('anAvgSpend')}</div>
      </div>
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value" style="color:var(--green)">${uniqueCustIds.length>0?Math.round(repeatCustomers/uniqueCustIds.length*100):0}%</div>
        <div class="analytics-kpi-label">${t('anCustRetention')}</div>
        <div class="analytics-kpi-sub">${repeatCustomers} ${t('anOf')} ${uniqueCustIds.length} ${t('anReturned')}</div>
      </div>
    </div>
    <div class="chart-grid-wide">
      <div class="chart-card">
        <div class="chart-card-title">${t('anChartRidersPerSession')}</div>
        <div class="chart-card-sub">${t('anChartRidersSub')}</div>
        ${ridersChart}
        <div class="chart-legend">
          <div class="chart-legend-item"><span class="chart-legend-dot" style="background:#4aa8f8"></span>${t('anRiders')}</div>
          <div class="chart-legend-item"><span class="chart-legend-dot" style="background:rgba(255,255,255,.25)"></span>${t('anCapacity')}</div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">${t('anChartTypeDistrib')}</div>
        <div class="chart-card-sub">${t('anChartTypeSubtext')}</div>
        <div class="donut-wrap">${typeDonut}${typeLegend}</div>
      </div>
    </div>

    <!-- OPERATIONS -->
    <div class="analytics-section-title">${t('anOperations')}</div>
    <div class="analytics-kpi-grid">
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value">${sessionsHeld}</div>
        <div class="analytics-kpi-label">${t('anSessionsHeld')}</div>
        <div class="analytics-kpi-sub">${totalSeatsOffered} ${t('anTotalSeats').toLowerCase()}</div>
      </div>
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value" style="color:${avgOccupancy>=50?'var(--green)':'var(--red)'}">${avgOccupancy}%</div>
        <div class="analytics-kpi-label">${t('anAvgOccupancy')}</div>
        <div class="analytics-kpi-sub">${t('anRidersCapacity')}</div>
      </div>
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value" style="color:${noShowRate>15?'var(--red)':'var(--green)'}">${noShowRate}%</div>
        <div class="analytics-kpi-label">${t('anNoShowRate')}</div>
        <div class="analytics-kpi-sub">${noshow.length} ${t('anOf')} ${totalAttempted} ${t('anAttempts')}</div>
      </div>
      <div class="analytics-kpi-card">
        <div class="analytics-kpi-value" style="color:${cancelRate>10?'var(--red)':'var(--muted-l)'}">${cancelRate}%</div>
        <div class="analytics-kpi-label">${t('anCancellationRate')}</div>
        <div class="analytics-kpi-sub">${cancelCount} ${t('anCancellations')}</div>
      </div>
    </div>
    <div class="chart-grid-3">
      <div class="chart-card">
        <div class="chart-card-title">${t('anChartOccupancy')}</div>
        <div class="chart-card-sub">${t('anChartOccSub')}</div>
        ${occChart}
      </div>
      <div class="chart-card" style="display:flex;flex-direction:column;gap:16px">
        ${occGauge(avgOccupancy)}
      </div>
      <div class="chart-card">
        <div class="chart-card-title">${t('anByDay')}</div>
        <div class="chart-card-sub">${t('anChartDaySub')}</div>
        ${Object.keys(dayBreakOrdered).length?bars(dayBreakOrdered,()=>'#03ff89'):noDataStr}
      </div>
    </div>

    <!-- BIKE PROFITABILITY -->
    <div class="analytics-section-title">${t('anByRevType')}</div>
    <div class="chart-grid-wide">
      <div class="chart-card">
        <div class="chart-card-title">${t('anRevByDay')}</div>
        <div class="chart-card-sub">${t('anCollectedOnly')}</div>
        ${Object.keys(revByType).length?bars(revByType,k=>typeColorHex[k]||'#777',v=>sarBoth(v)):noDataStr}
      </div>
      <div class="chart-card">
        <div class="chart-card-title">${t('anTypeRevPerRide')}</div>
        <div class="chart-card-sub">${t('anTypeRevPerRideSub')}</div>
        ${Object.keys(typeRevPerRideOrdered).length?bars(typeRevPerRideOrdered,k=>typeColorHex[k]||'#777',v=>sarBoth(v,2)):noDataStr}
      </div>
    </div>

    <!-- FLEET ANALYTICS -->
    <div class="analytics-section-title">${t('anFleetSection')}</div>
    <div class="chart-grid-3">
      <div class="chart-card">
        <div class="chart-card-title">${t('anByBrand')}</div>
        <div class="chart-card-sub">${t('anByBrandSub')}</div>
        ${_brandKeys.length
          ? _brandKeys.filter(k=>brandRentals[k]>0).map(k=>`<div class="analytics-bar-row">
              <div class="analytics-bar-label">${esc(k)}</div>
              <div class="analytics-bar-track"><div class="analytics-bar-fill" style="width:${Math.round(brandRentals[k]/Math.max(...Object.values(brandRentals),1)*100)}%;background:${brandColorMap[k]}"></div></div>
              <div class="analytics-bar-value">${brandRentals[k]}</div>
            </div>`).join('')
          : noDataStr}
      </div>
      <div class="chart-card">
        <div class="chart-card-title">${t('anByModel')}</div>
        <div class="chart-card-sub">${t('anByModelSub')}</div>
        ${_modelKeys.length
          ? _modelKeys.filter(k=>modelRentals[k]>0).map(k=>`<div class="analytics-bar-row">
              <div class="analytics-bar-label">${esc(k)}</div>
              <div class="analytics-bar-track"><div class="analytics-bar-fill" style="width:${Math.round(modelRentals[k]/Math.max(...Object.values(modelRentals),1)*100)}%;background:${modelColorMap[k]}"></div></div>
              <div class="analytics-bar-value">${modelRentals[k]}</div>
            </div>`).join('')
          : noDataStr}
      </div>
      <div class="chart-card">
        <div class="chart-card-title">${t('anRevByModel')}</div>
        <div class="chart-card-sub">${t('anRevByModelSub')}</div>
        ${Object.keys(modelRevenue).length
          ? Object.entries(modelRevenue).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="analytics-bar-row">
              <div class="analytics-bar-label">${esc(k)}</div>
              <div class="analytics-bar-track"><div class="analytics-bar-fill" style="width:${Math.round(v/Math.max(...Object.values(modelRevenue),1)*100)}%;background:${modelColorMap[k]||'#4aa8f8'}"></div></div>
              <div class="analytics-bar-value">SAR ${v}</div>
            </div>`).join('')
          : noDataStr}
      </div>
      <div class="chart-card">
        <div class="chart-card-title">${t('anAvgPerPiece')}</div>
        <div class="chart-card-sub">${t('anAvgPerPieceSub')}</div>
        ${Object.keys(modelAvgPerPiece).length
          ? Object.entries(modelAvgPerPiece).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="analytics-bar-row">
              <div class="analytics-bar-label" style="display:flex;align-items:center;gap:5px">
                ${esc(k)}
                ${(modelPieces[k]||1)>1?`<span style="font-size:10px;background:var(--s3);border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:1px 5px;color:var(--muted-l);font-weight:700">${modelPieces[k]} pcs</span>`:''}
              </div>
              <div class="analytics-bar-track"><div class="analytics-bar-fill" style="width:${Math.round(v/Math.max(...Object.values(modelAvgPerPiece),1)*100)}%;background:${modelColorMap[k]||'#4aa8f8'}"></div></div>
              <div class="analytics-bar-value">${v%1===0?v:v.toFixed(1)}x</div>
            </div>`).join('')
          : noDataStr}
      </div>
    </div>

    <!-- HIGHLIGHTS -->
    <div class="analytics-section-title">${t('anHighlights')}</div>
    <div class="analytics-highlight-row">
      <div class="analytics-highlight-card">
        <div class="hl-item">
          <div class="hl-label">${t('anMostPopType')}</div>
          <div class="hl-value">${topType!=='—'?`<span class="type-badge ${TYPE_CLS[topType]||'type-any'}">${typeLabel(topType)}</span>`:topType}
            ${topType!=='—'?`<span style="font-size:13px;color:var(--muted);font-weight:600;margin-left:8px">${typeBreak[topType]} ${t('anRidesLabel')}</span>`:''}
          </div>
        </div>
        <div class="hl-item">
          <div class="hl-label">${t('anBusiestDayLabel')}</div>
          <div class="hl-value">${dayLabel(topDay)||topDay}
            ${topDay!=='—'?`<span style="font-size:13px;color:var(--muted);font-weight:600;margin-left:8px">${dayBreak[topDay]} ${t('anRidesLabel')}</span>`:''}
          </div>
        </div>
        <div class="hl-item" style="margin-bottom:0">
          <div class="hl-label">${t('anBestSession')}</div>
          <div class="hl-value" style="color:var(--green)">${bestSession.s?`${sarBoth(bestSession.r)} <span style="font-size:13px;font-weight:600;color:var(--muted)">${shortDate(bestSession.s.session_date||bestSession.s.id)}</span>`:'—'}</div>
        </div>
      </div>
      <div class="analytics-highlight-card">
        <div class="hl-item">
          <div class="hl-label">${t('anRevPerRide')}</div>
          <div class="hl-value" style="color:var(--green)">${sarBoth(revPerRide,2)}</div>
        </div>
        <div class="hl-item">
          <div class="hl-label">${t('anRevPAS')}</div>
          <div class="hl-value" style="color:var(--green)">${sarBoth(revPAS,2)}</div>
        </div>
        <div class="hl-item">
          <div class="hl-label">${t('anRevPerCust')}</div>
          <div class="hl-value" style="color:var(--green)">${sarBoth(revPerCustomer,2)}</div>
        </div>
        <div class="hl-item" style="margin-bottom:0">
          <div class="hl-label">${t('anCollectionRate')}</div>
          <div class="hl-value" style="color:${collectionRate>=60?'var(--green)':'var(--red)'}">${collectionRate}%
            <span style="font-size:13px;color:var(--muted);font-weight:600;margin-left:6px">${sarBoth(revCollected)} / ${sarBoth(revTotal)}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- SESSION PERFORMANCE TABLE -->
    <div class="analytics-section-title">${t('anSessPerformTable')}</div>
    <div class="table-wrapper">
      <table class="analytics-trend-table">
        <thead><tr>
          ${thSort('date',t('anColDate'))}
          <th style="color:var(--muted)">${t('anColDay2')}</th>
          ${thSort('riders',t('anColRiders'))}
          ${thSort('revenue',t('anColRevenue'))}
          ${thSort('pending',t('anColPending'))}
          ${thSort('noshow',t('anColNoShows'))}
          ${thSort('occupancy',t('anColOccupancy'))}
          <th style="color:var(--muted)">${t('anColTopType2')}</th>
        </tr></thead>
        <tbody>${trendRows.length?trendRows.join(''):`<tr><td colspan="8" class="empty-state">${t('anNoDataTrend')}</td></tr>`}</tbody>
      </table>
    </div>`;
}

// ── 5. Bike type SVG icons ──
function bikeTypeIcon(type,size=14){
  const a=`width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"`;
  const icons={
    Road:`<svg ${a} stroke-width="1.6"><circle cx="5.5" cy="17" r="4"/><circle cx="18.5" cy="17" r="4"/><path d="M5.5 17L9.5 8 13 12.5 16 8"/><path d="M18.5 17L16 8"/><path d="M9.5 8L8 5.5Q10 5 11.5 5.5"/></svg>`,

/* ══════════════════════════════════════════════
   BOOT - load data from API then show landing
══════════════════════════════════════════════ */
(async()=>{
  try{
    await Promise.race([loadData(),new Promise(r=>setTimeout(r,8000))]);
  }catch(e){
    console.warn('Could not reach backend:',e.message);
  }
  const ls=document.getElementById('loading-screen');
  if(ls){ls.style.opacity='0';setTimeout(()=>{ls.style.display='none';},400);}
  S.loggedIn=getSession();
  // Restore cancellation log from localStorage
  try{const cl=localStorage.getItem('cq_cancellations');if(cl)S.cancellationLog=JSON.parse(cl);}catch(e){}
  // Restore previous view and tab after refresh
  if(localStorage.getItem('cq_staff')==='1'){
    goStaff();
    const savedStab=sessionStorage.getItem('cq_nav_stab');
    if(savedStab&&['queue','sessions','bikes','history','analytics','logs'].includes(savedStab))setStaffTab(savedStab);
  } else if(S.loggedIn){
    const savedCtab=sessionStorage.getItem('cq_nav_ctab');
    goCustomer(savedCtab&&['register','myrides','account'].includes(savedCtab)?savedCtab:'register');
  } else {
    showView('landing');
    renderLandingAvail();
  }
})();

// ── Auto-refresh for staff view ──
let _lastRefresh=Date.now();
let _refreshTimer=null;
function _tickRefreshLabel(){
  const el=document.getElementById('staff-refresh-label');
  if(!el)return;
  const sec=Math.round((Date.now()-_lastRefresh)/1000);
  el.textContent=sec<5?t('justNow'):sec<60?`${sec}${t('secondsAgo')}`:`${Math.round(sec/60)}${t('minutesAgo')}`;
}
async function _autoRefresh(){
  if(S.view!=='staff')return;
  try{
    await loadData();
    _lastRefresh=Date.now();
    renderStaffQueue();renderSessions();
    if(S.staffTab==='bikes')renderBikes();
    if(S.staffTab==='history')renderHistory();
    if(S.staffTab==='analytics')renderAnalytics();
    if(S.staffTab==='logs')renderLogs();
    renderLandingAvail();
  }catch(e){
    console.warn('Auto-refresh error:',e);
    const el=document.getElementById('staff-refresh-label');
    if(el)el.textContent=t('errConnection')||'Connection error';
  }
}
setInterval(()=>{_tickRefreshLabel();},5000);
setInterval(()=>{_autoRefresh();},30000);
